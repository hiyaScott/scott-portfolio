<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞机大战 - Aircraft War</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        h1 {
            color: #00d4ff;
            margin: 8px 0;
            font-size: 20px;
            text-shadow: 0 0 20px #00d4ff;
        }
        
        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 10;
        }
        
        .score-board span {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .settings {
            display: flex;
            gap: 15px;
            margin-bottom: 8px;
            z-index: 10;
        }
        
        .settings label {
            color: #888;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .settings input[type="checkbox"] {
            accent-color: #00d4ff;
        }
        
        #gameCanvas {
            border: 2px solid #00d4ff;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            max-width: 95vw;
            background: linear-gradient(180deg, #000428 0%, #004e92 100%);
        }
        
        .controls {
            margin-top: 10px;
            text-align: center;
            color: #888;
            font-size: 12px;
            z-index: 10;
        }
        
        .controls p {
            margin: 2px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 15px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
        
        .btn-small {
            padding: 6px 15px;
            font-size: 12px;
            margin-top: 0;
        }
        
        .gyro-status {
            color: #00d4ff;
            font-size: 11px;
            margin-top: 5px;
        }
        
        .mobile-controls {
            display: none;
            position: absolute;
            bottom: 15px;
            width: 100%;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 20;
        }
        
        .mobile-controls .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .mobile-controls .row {
            display: flex;
            gap: 4px;
        }
        
        .mobile-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            color: #00d4ff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        
        .mobile-btn:active {
            background: #00d4ff;
            color: #000;
        }
        
        .fire-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 107, 107, 0.3);
            border: 3px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 14px;
        }
        
        .fire-btn:active {
            background: #ff6b6b;
            color: #fff;
        }
        
        @media (max-width: 600px) {
            .mobile-controls {
                display: flex;
            }
            
            .controls p:first-child {
                display: none;
            }
            
            #gameCanvas {
                max-height: 50vh;
            }
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 25px 35px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            z-index: 100;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 12px;
            font-size: 26px;
        }
        
        .game-over p {
            color: #fff;
            margin-bottom: 18px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>✈️ 飞机大战</h1>
    
    <div class="score-board">
        <div>得分: <span id="score">0</span></div>
        <div>最高分: <span id="highScore">0</span></div>
    </div>
    
    <div class="settings">
        <label>
            <input type="checkbox" id="soundEnabled" checked>
            音效
        </label>
        <label>
            <input type="checkbox" id="gyroEnabled">
            陀螺仪
        </label>
        <button class="btn btn-small" onclick="requestGyroPermission()">开启陀螺仪</button>
    </div>
    
    <div class="gyro-status" id="gyroStatus"></div>
    
    <canvas id="gameCanvas" width="360" height="480"></canvas>
    
    <div class="controls">
        <p>💻 电脑：方向键移动，空格射击</p>
        <p>📱 手机：拖动/陀螺仪移动，自动射击</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>
    
    <div class="mobile-controls">
        <div class="dpad">
            <div class="row">
                <div class="mobile-btn" ontouchstart="movePlayer(0, -1)" onmousedown="movePlayer(0, -1)">▲</div>
            </div>
            <div class="row">
                <div class="mobile-btn" ontouchstart="movePlayer(-1, 0)" onmousedown="movePlayer(-1, 0)">◀</div>
                <div class="mobile-btn" ontouchstart="movePlayer(0, 1)" onmousedown="movePlayer(0, 1)">▼</div>
                <div class="mobile-btn" ontouchstart="movePlayer(1, 0)" onmousedown="movePlayer(1, 0)">▶</div>
            </div>
        </div>
        <div class="mobile-btn fire-btn" ontouchstart="fireBullet()" onmousedown="fireBullet()">发射</div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束！</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">再来一局</button>
    </div>

    <script>
        // ==================== 音频系统 ====================
        const AudioSys = {
            ctx: null,
            enabled: true,
            
            init() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.enabled = document.getElementById('soundEnabled').checked;
                } catch (e) {
                    console.log('音频初始化失败');
                }
            },
            
            // 播放射击音效
            playShoot() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.1);
            },
            
            // 播放爆炸音效
            playExplosion() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.2);
            },
            
            // 播放游戏结束音效
            playGameOver() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.5);
            },
            
            // 播放得分音效
            playScore() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.setValueAtTime(800, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.1);
            },
            
            // UI 点击音效
            playClick() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(1000, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.05);
            }
        };

        // ==================== 游戏主逻辑 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 160, y: 400, width: 40, height: 40, speed: 5 };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let score = 0;
        let highScore = localStorage.getItem('aircraftHighScore') || 0;
        let gameLoop = null;
        let isGameRunning = false;
        let enemySpawnTimer = 0;
        let bulletCooldown = 0;
        let keys = {};
        
        // 陀螺仪数据
        let gyroData = { beta: 0, gamma: 0 };
        let gyroEnabled = false;
        let gyroPermissionGranted = false;
        
        // 显示最高分
        document.getElementById('highScore').textContent = highScore;
        
        // 音效开关监听
        document.getElementById('soundEnabled').addEventListener('change', (e) => {
            AudioSys.enabled = e.target.checked;
            if (e.target.checked) AudioSys.init();
        });
        
        // 陀螺仪开关监听
        document.getElementById('gyroEnabled').addEventListener('change', (e) => {
            gyroEnabled = e.target.checked;
            if (gyroEnabled && !gyroPermissionGranted) {
                requestGyroPermission();
            }
        });
        
        // 请求陀螺仪权限（iOS 13+ 需要）
        function requestGyroPermission() {
            AudioSys.playClick();
            
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            gyroPermissionGranted = true;
                            gyroEnabled = true;
                            document.getElementById('gyroEnabled').checked = true;
                            document.getElementById('gyroStatus').textContent = '✅ 陀螺仪已启用';
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            document.getElementById('gyroStatus').textContent = '❌ 陀螺仪权限被拒绝';
                        }
                    })
                    .catch(err => {
                        document.getElementById('gyroStatus').textContent = '❌ 陀螺仪不支持';
                    });
            } else {
                // Android 或非 iOS 13+ 设备
                gyroPermissionGranted = true;
                gyroEnabled = true;
                document.getElementById('gyroEnabled').checked = true;
                document.getElementById('gyroStatus').textContent = '✅ 陀螺仪已启用';
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }
        
        // 处理陀螺仪数据
        function handleOrientation(event) {
            if (!gyroEnabled || !isGameRunning) return;
            
            // beta: 前后倾斜 (-180 到 180)
            // gamma: 左右倾斜 (-90 到 90)
            gyroData.beta = event.beta || 0;
            gyroData.gamma = event.gamma || 0;
            
            // 根据倾斜角度移动飞机
            const sensitivity = 0.8;
            
            // 左右移动（gamma）
            if (Math.abs(gyroData.gamma) > 5) {
                player.x += gyroData.gamma * sensitivity;
            }
            
            // 前后移动（beta）
            if (Math.abs(gyroData.beta) > 5) {
                // beta 45度是手机平放，往前倾斜变小
                const tilt = 45 - gyroData.beta;
                player.y += tilt * sensitivity * 0.5;
            }
            
            // 限制在画布内
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
        }
        
        // 初始化游戏
        function init() {
            player = { x: 160, y: 400, width: 40, height: 40, speed: 5 };
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            enemySpawnTimer = 0;
            bulletCooldown = 0;
            keys = {};
            updateScore();
        }
        
        // 绘制玩家飞机
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            
            // 根据移动倾斜飞机
            let tilt = 0;
            if (keys['ArrowLeft'] || keys['a']) tilt = -0.2;
            if (keys['ArrowRight'] || keys['d']) tilt = 0.2;
            if (gyroEnabled && Math.abs(gyroData.gamma) > 5) {
                tilt = gyroData.gamma * 0.005;
                tilt = Math.max(-0.3, Math.min(0.3, tilt));
            }
            ctx.rotate(tilt);
            
            // 机身
            ctx.fillStyle = '#00d4ff';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-15, 15);
            ctx.lineTo(0, 10);
            ctx.lineTo(15, 15);
            ctx.closePath();
            ctx.fill();
            
            // 机翼
            ctx.fillStyle = '#0099cc';
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            ctx.lineTo(-8, 5);
            ctx.lineTo(-8, 15);
            ctx.lineTo(-20, 10);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(8, 5);
            ctx.lineTo(8, 15);
            ctx.lineTo(20, 10);
            ctx.closePath();
            ctx.fill();
            
            // 引擎火焰
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(-5, 15);
            ctx.lineTo(0, 25 + Math.random() * 5);
            ctx.lineTo(5, 15);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        // 绘制子弹
        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffff00';
            
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - 3, bullet.y, 6, 15);
            });
            
            ctx.shadowBlur = 0;
        }
        
        // 绘制敌人
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.moveTo(0, 20);
                ctx.lineTo(-15, -15);
                ctx.lineTo(0, -10);
                ctx.lineTo(15, -15);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#cc0000';
                ctx.beginPath();
                ctx.moveTo(-20, 0);
                ctx.lineTo(-8, -5);
                ctx.lineTo(-8, -15);
                ctx.lineTo(-20, -10);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(8, -5);
                ctx.lineTo(8, -15);
                ctx.lineTo(20, -10);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
        }
        
        // 创建爆炸
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 4 + 2,
                    life: 1,
                    color: color
                });
            }
        }
        
        // 更新游戏
        function update() {
            if (!isGameRunning) return;
            
            // 键盘移动（与陀螺仪不冲突）
            if (!gyroEnabled) {
                if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
                if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
                if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
                if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
                
                player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
                player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            }
            
            // 自动射击
            bulletCooldown--;
            if (bulletCooldown <= 0) {
                fireBullet();
                bulletCooldown = 12;
            }
            
            // 更新子弹
            bullets.forEach(bullet => bullet.y -= 10);
            bullets = bullets.filter(bullet => bullet.y > -20);
            
            // 生成敌人
            enemySpawnTimer--;
            if (enemySpawnTimer <= 0) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40,
                    width: 40,
                    height: 40,
                    speed: Math.random() * 2 + 2 + score / 200
                });
                enemySpawnTimer = Math.max(25, 80 - score / 20);
            }
            
            // 更新敌人
            enemies.forEach(enemy => enemy.y += enemy.speed);
            enemies = enemies.filter(enemy => enemy.y < canvas.height + 40);
            
            // 子弹打敌人
            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    if (bullet.x > enemy.x && bullet.x < enemy.x + enemy.width &&
                        bullet.y > enemy.y && bullet.y < enemy.y + enemy.height) {
                        createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '255, 107, 107');
                        AudioSys.playExplosion();
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        updateScore();
                        AudioSys.playScore();
                        
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('aircraftHighScore', highScore);
                            document.getElementById('highScore').textContent = highScore;
                        }
                    }
                });
            });
            
            // 敌人撞玩家
            enemies.forEach(enemy => {
                if (player.x < enemy.x + enemy.width &&
                    player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y) {
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '0, 212, 255');
                    AudioSys.playExplosion();
                    gameOver();
                }
            });
            
            // 更新粒子
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        // 绘制游戏
        function draw() {
            ctx.fillStyle = 'rgba(0, 4, 40, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 星空
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 20; i++) {
                const x = (i * 37 + Date.now() / 50) % canvas.width;
                const y = (i * 23) % canvas.height;
                ctx.globalAlpha = Math.random() * 0.5 + 0.2;
                ctx.fillRect(x, y, 2, 2);
            }
            ctx.globalAlpha = 1;
            
            drawPlayer();
            drawBullets();
            drawEnemies();
            drawParticles();
        }
        
        // 游戏循环
        function loop() {
            update();
            draw();
        }
        
        // 发射子弹
        function fireBullet() {
            if (!isGameRunning) {
                startGame();
                return;
            }
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y
            });
            AudioSys.playShoot();
        }
        
        // 移动玩家
        function movePlayer(dx, dy) {
            if (!isGameRunning) {
                startGame();
                return;
            }
            player.x += dx * player.speed * 2;
            player.y += dy * player.speed * 2;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
        }
        
        // 开始游戏
        function startGame() {
            AudioSys.playClick();
            AudioSys.init();
            
            if (gameLoop) clearInterval(gameLoop);
            
            document.getElementById('gameOver').style.display = 'none';
            init();
            isGameRunning = true;
            gameLoop = setInterval(loop, 1000 / 60);
        }
        
        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            AudioSys.playGameOver();
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 更新分数
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && isGameRunning) {
                e.preventDefault();
                fireBullet();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // 触摸控制
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            if (x > player.x && x < player.x + player.width &&
                y > player.y && y < player.y + player.height) {
                isDragging = true;
                dragOffsetX = x - player.x;
                dragOffsetY = y - player.y;
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && isGameRunning && !gyroEnabled) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                player.x = (touch.clientX - rect.left) * scaleX - dragOffsetX;
                player.y = (touch.clientY - rect.top) * scaleY - dragOffsetY;
                
                player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
                player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // 鼠标控制
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            if (x > player.x && x < player.x + player.width &&
                y > player.y && y < player.y + player.height) {
                isDragging = true;
                dragOffsetX = x - player.x;
                dragOffsetY = y - player.y;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && isGameRunning && !gyroEnabled) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                player.x = (e.clientX - rect.left) * scaleX - dragOffsetX;
                player.y = (e.clientY - rect.top) * scaleY - dragOffsetY;
                
                player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
                player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
