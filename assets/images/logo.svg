<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景六边形 -->
  <polygon points="32,4 58,18 58,46 32,60 6,46 6,18" fill="#1a1a2e" stroke="url(#cyberGrad)" stroke-width="2" filter="url(#glow)" />
  
  <!-- 内部装饰线条 -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#00ffff" stroke-width="1" opacity="0.6" />
  <line x1="14" y1="24" x2="50" y2="40" stroke="#ff00ff" stroke-width="1" opacity="0.6" />
  <line x1="50" y1="24" x2="14" y2="40" stroke="#39ff14" stroke-width="1" opacity="0.6" />
  
  <!-- 中心符号 S -->
  <text x="32" y="38" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle" fill="url(#cyberGrad)" filter="url(#glow)">S</text>
  
  <!-- 角落点缀 -->
  <circle cx="32" cy="8" r="2" fill="#00ffff" />
  <circle cx="54" cy="20" r="1.5" fill="#ff00ff" />
  <circle cx="54" cy="44" r="1.5" fill="#39ff14" />
  <circle cx="32" cy="56" r="2" fill="#ffff00" />
  <circle cx="10" cy="44" r="1.5" fill="#ff00ff" />
  <circle cx="10" cy="20" r="1.5" fill="#39ff14" />
</svg>