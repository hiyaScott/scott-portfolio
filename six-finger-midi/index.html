<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六指迷笛 | Six-Finger MIDI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0f0a1a 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 赛博朋克网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        #gameContainer {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite, gradient 5s ease infinite;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            letter-spacing: 5px;
        }
        
        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
            letter-spacing: 3px;
        }
        
        /* 模式选择 */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            color: #00ffff;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        .mode-btn:hover::before {
            left: 100%;
        }
        
        .mode-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .mode-btn.active {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border-color: transparent;
            color: #000;
            font-weight: bold;
        }
        
        /* 游戏主区域 */
        #gameArea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        /* 过关模式关卡选择 */
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .level-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #ff00ff;
            background: rgba(0, 0, 0, 0.5);
            color: #ff00ff;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .level-btn.completed {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        
        .level-btn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .level-btn.active {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: #000;
            border-color: transparent;
        }
        
        .level-btn.locked {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #666;
            color: #666;
        }
        
        /* 声部轨道容器 */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .track {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.05), rgba(255, 0, 255, 0.05));
            border-left: 4px solid;
            padding: 15px;
            border-radius: 5px;
            position: relative;
        }
        
        .track.drums { border-left-color: #ff0055; }
        .track.bass { border-left-color: #00ff88; }
        .track.melody { border-left-color: #00ccff; }
        .track.harmony { border-left-color: #ffaa00; }
        
        .track-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .track-label {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 3px;
            margin-right: 15px;
            min-width: 100px;
            text-align: center;
        }
        
        .track.drums .track-label { color: #ff0055; border: 1px solid #ff0055; }
        .track.bass .track-label { color: #00ff88; border: 1px solid #00ff88; }
        .track.melody .track-label { color: #00ccff; border: 1px solid #00ccff; }
        .track.harmony .track-label { color: #ffaa00; border: 1px solid #ffaa00; }
        
        .track-visualizer {
            flex: 1;
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        
        .visualizer-bar {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: currentColor;
            transition: height 0.1s;
        }
        
        /* 片段选择区 */
        .clips-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        
        .clip {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }
        
        .clip:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
        
        .clip.selected {
            border-color: currentColor;
            box-shadow: 0 0 20px currentColor, inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        .track.drums .clip { color: #ff0055; }
        .track.bass .clip { color: #00ff88; }
        .track.melody .clip { color: #00ccff; }
        .track.harmony .clip { color: #ffaa00; }
        
        .clip-waveform {
            width: 80%;
            height: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        
        .wave-bar {
            width: 3px;
            background: currentColor;
            opacity: 0.6;
        }
        
        .clip-number {
            font-size: 0.7em;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        /* 播放指示器 */
        .clip.playing {
            animation: pulse 0.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px currentColor; }
            50% { box-shadow: 0 0 40px currentColor, 0 0 60px currentColor; }
        }
        
        /* 控制按钮区 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .control-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: inherit;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }
        
        .play-btn {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #000;
            font-weight: bold;
        }
        
        .play-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }
        
        .play-btn.playing {
            background: linear-gradient(45deg, #ff0055, #ff5500);
            color: #fff;
        }
        
        .submit-btn {
            background: linear-gradient(45deg, #ff00ff, #aa00ff);
            color: #fff;
        }
        
        .submit-btn:hover {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }
        
        .target-btn {
            background: linear-gradient(45deg, #ffaa00, #ff5500);
            color: #000;
        }
        
        .target-btn:hover {
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
        }
        
        .share-btn {
            background: linear-gradient(45deg, #00ccff, #0088ff);
            color: #000;
        }
        
        .share-btn:hover {
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.6);
        }
        
        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .clear-btn:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff0055;
        }
        
        /* BPM 控制 */
        .bpm-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }
        
        .bpm-label {
            color: #888;
            font-size: 0.9em;
        }
        
        .bpm-value {
            font-size: 1.5em;
            color: #00ffff;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        
        /* 消息提示 */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid;
            border-radius: 10px;
            font-size: 1.3em;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: messageIn 0.3s ease;
        }
        
        .message.success {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
        }
        
        .message.error {
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.5);
        }
        
        .message.info {
            border-color: #00ccff;
            color: #00ccff;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.5);
        }
        
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        /* 分享链接对话框 */
        .share-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.98);
            border: 2px solid #00ccff;
            border-radius: 10px;
            padding: 30px;
            z-index: 1001;
            display: none;
            min-width: 400px;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.3);
        }
        
        .share-dialog h3 {
            color: #00ccff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .share-url {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 204, 255, 0.3);
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 20px;
            user-select: all;
        }
        
        .share-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .share-actions button {
            padding: 10px 25px;
            border: 1px solid #00ccff;
            background: transparent;
            color: #00ccff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .share-actions button:hover {
            background: rgba(0, 204, 255, 0.2);
        }
        
        /* 背景动画粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .clip { width: 45px; height: 45px; }
            .control-btn { padding: 12px 25px; font-size: 0.9em; }
            .track-label { min-width: 70px; font-size: 0.75em; }
        }
        
        /* 目标旋律提示 */
        .target-hint {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.3);
            border-radius: 5px;
            color: #ffaa00;
        }
        
        .target-hint.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div id="gameContainer">
        <header>
            <h1>六指迷笛</h1>
            <div class="subtitle">SIX-FINGER MIDI // 多声部音乐合成器</div>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="modeChallenge" onclick="setMode('challenge')">过关模式</button>
            <button class="mode-btn" id="modeCreate" onclick="setMode('create')">创作模式</button>
        </div>
        
        <div id="gameArea">
            <!-- 过关模式关卡选择 -->
            <div class="level-selector" id="levelSelector">
                <button class="level-btn active" data-level="1">1</button>
                <button class="level-btn locked" data-level="2">2</button>
                <button class="level-btn locked" data-level="3">3</button>
                <button class="level-btn locked" data-level="4">4</button>
                <button class="level-btn locked" data-level="5">5</button>
            </div>
            
            <!-- 目标旋律提示 -->
            <div class="target-hint hidden" id="targetHint">
                聆听目标旋律，然后从下方选择正确的片段组合
            </div>
            
            <!-- BPM 控制 -->
            <div class="bpm-control">
                <span class="bpm-label">TEMPO</span>
                <span class="bpm-value" id="bpmValue">120</span>
                <input type="range" id="bpmSlider" min="80" max="160" value="120" onchange="updateBPM(this.value)">
                <span class="bpm-label">BPM</span>
            </div>
            
            <!-- 声部轨道 -->
            <div class="tracks-container" id="tracksContainer">
                <!-- 轨道将通过JS动态生成 -->
            </div>
            
            <!-- 控制按钮 -->
            <div class="controls" id="controls">
                <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">▶ 播放</button>
                <button class="control-btn target-btn" id="targetBtn" onclick="playTargetWithCheck()">🎵 播放目标</button>
                <button class="control-btn submit-btn" id="submitBtn" onclick="submitAnswer()">✓ 提交答案</button>
                <button class="control-btn share-btn hidden" id="shareBtn" onclick="showShareDialog()">🔗 保存/分享</button>
                <button class="control-btn clear-btn" onclick="clearSelection()">✕ 清空</button>
            </div>
            
            <!-- 音频提示 -->
            <div id="audioNotice" style="color: #ff00ff; font-size: 12px; text-align: center; margin-top: 10px; animation: blink 2s infinite;">
                🔊 首次使用请先点击任意按钮启用音频
            </div>
        </div>
    </div>
    
    <!-- 消息提示 -->
    <div class="message" id="message"></div>
    
    <!-- 分享对话框 -->
    <div class="share-dialog" id="shareDialog">
        <h3>分享你的创作</h3>
        <div class="share-url" id="shareUrl"></div>
        <div class="share-actions">
            <button onclick="copyShareUrl()">复制链接</button>
            <button onclick="closeShareDialog()">关闭</button>
        </div>
    </div>

    <script>
        // ==================== 音频合成系统 ====================
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let masterGain = null;
        let isPlaying = false;
        let currentLoop = null;
        let bpm = 120;
        let beatInterval = null;
        let currentBeat = 0;
        
        // 音符频率映射 (C3 - B5)
        const NOTE_FREQUENCIES = {
            'C2': 65.41, 'C#2': 69.30, 'D2': 73.42, 'D#2': 77.78, 'E2': 82.41, 'F2': 87.31,
            'F#2': 92.50, 'G2': 98.00, 'G#2': 103.83, 'A2': 110.00, 'A#2': 116.54, 'B2': 123.47,
            'C3': 130.81, 'C#3': 138.59, 'D3': 146.83, 'D#3': 155.56, 'E3': 164.81, 'F3': 174.61,
            'F#3': 185.00, 'G3': 196.00, 'G#3': 207.65, 'A3': 220.00, 'A#3': 233.08, 'B3': 246.94,
            'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23,
            'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
            'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25, 'E5': 659.25, 'F5': 698.46,
            'F#5': 739.99, 'G5': 783.99, 'G#5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'B5': 987.77,
        };
        
        // 初始化音频上下文
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.5;
                masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        // 鼓声合成器
        function playDrum(type, time) {
            const t = time || audioCtx.currentTime;
            
            if (type === 'kick') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.5);
                gain.gain.setValueAtTime(0.8, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(t);
                osc.stop(t + 0.5);
            } else if (type === 'snare') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                noise.connect(gain);
                gain.connect(masterGain);
                noise.start(t);
            } else if (type === 'hihat') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                noise.start(t);
            } else if (type === 'clap') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                gain.gain.setValueAtTime(0.3, t + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                noise.connect(gain);
                gain.connect(masterGain);
                noise.start(t);
            } else if (type === 'tom') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(100, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.3);
                gain.gain.setValueAtTime(0.6, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(t);
                osc.stop(t + 0.3);
            }
        }
        
        // 贝斯合成器
        function playBass(note, time, duration = 0.25) {
            const t = time || audioCtx.currentTime;
            const freq = NOTE_FREQUENCIES[note] || 65.41;
            
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, t);
            filter.frequency.exponentialRampToValueAtTime(400, t + duration);
            
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.setValueAtTime(0.4, t + duration * 0.8);
            gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            
            osc.start(t);
            osc.stop(t + duration);
        }
        
        // 旋律合成器
        function playMelody(note, time, duration = 0.2) {
            const t = time || audioCtx.currentTime;
            const freq = NOTE_FREQUENCIES[note] || 440;
            
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.value = freq;
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, t);
            filter.frequency.exponentialRampToValueAtTime(1000, t + duration);
            filter.Q.value = 5;
            
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.25, t + 0.01);
            gain.gain.setValueAtTime(0.25, t + duration * 0.7);
            gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            
            osc.start(t);
            osc.stop(t + duration);
        }

                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                filter.type = 'lowpass';
                filter.frequency.value = 1500;
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.15 / notes.length, t + 0.1);
                gain.gain.setValueAtTime(0.15 / notes.length, t + duration - 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                
                osc.start(t);
                osc.stop(t + duration);
            });
        }

            const clips = ALL_CLIPS[trackId];
            let html = '';
            
            clips.forEach((clip, index) => {
                // 过关模式只显示前8个，创作模式显示全部
                if (gameMode === 'challenge' && index >= 8) return;
                
                const waveBars = Array(6).fill(0).map(() => 
                    `<div class="wave-bar" style="height: ${20 + Math.random() * 60}%"></div>`
                ).join('');
                
                html += `
                    <div class="clip" id="clip-${trackId}-${index}" onclick="selectClip('${trackId}', ${index})">
                        <div class="clip-waveform">${waveBars}</div>
                        <div class="clip-number">${String.fromCharCode(65 + index)}</div>

                `;
            });
            
            return html;

        // 选择片段

            initAudio();

            if (notice) {
                notice.style.display = 'none';
            }
            
            // 取消同一轨道的其他选择
            const clips = document.querySelectorAll(`#clips-${trackId} .clip`);
            clips.forEach(clip => clip.classList.remove('selected'));
            
            // 如果点击已选中的，则取消选择
            if (currentSelection[trackId] === clipIndex) {
                currentSelection[trackId] = null;
            } else {
                currentSelection[trackId] = clipIndex;
                document.getElementById(`clip-${trackId}-${clipIndex}`).classList.add('selected');
                
                // 播放预览
                previewClip(trackId, clipIndex);
            }
        }
        
        // 预览片段
        function previewClip(trackId, clipIndex) {
            const clip = ALL_CLIPS[trackId][clipIndex];
            const now = audioCtx.currentTime;
            const beatDuration = 60 / bpm;
            
            if (trackId === 'drums') {
                clip.pattern.forEach((sounds, i) => {
                    sounds.forEach(sound => {
                        playDrum(sound, now + i * beatDuration);
                    });
                });
            } else if (trackId === 'bass') {
                clip.pattern.forEach((notes, i) => {
                    notes.forEach(note => {
                        playBass(note, now + i * beatDuration, beatDuration);
                    });
                });
            } else if (trackId === 'melody') {
                clip.pattern.forEach((notes, i) => {
                    notes.forEach(note => {
                        playMelody(note, now + i * beatDuration, beatDuration * 0.8);
                    });
                });
            } else if (trackId === 'harmony') {
                clip.chords.forEach((chord, i) => {
                    if (chord.length > 0) {
                        playHarmony(chord, now + i * beatDuration, beatDuration * 2);
                    }
                });
            }
        }

            document.getElementById('levelSelector').style.display = mode === 'challenge' ? 'flex' : 'none';

            document.getElementById('targetHint').classList.toggle('hidden', mode === 'create');

            renderTracks();
            
            if (mode === 'challenge') {
                loadLevel(1);
            }

                const level = parseInt(e.target.dataset.level);
                loadLevel(level);
            }
        });
        
        function loadLevel(level) {
            currentLevel = level;
            updateLevelButtons();
            clearSelection();
            stop();
            
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.level) === level);
            });
            
            showMessage(`第 ${level} 关`, 'info');
        }
        
        function updateLevelButtons() {
            document.querySelectorAll('.level-btn').forEach(btn => {
                const level = parseInt(btn.dataset.level);
                btn.classList.toggle('completed', completedLevels.includes(level));
                btn.classList.toggle('locked', level > 1 && !completedLevels.includes(level - 1) && !completedLevels.includes(level));
            });
        }
        
        // 播放目标旋律（带用户交互检查）
        function playTargetWithCheck() {
            initAudio();
            
            // 隐藏音频提示
            const notice = document.getElementById('audioNotice');
            if (notice) {
                notice.style.display = 'none';
            }
            
            // 检查音频上下文是否已恢复
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    playTarget();
                });
            } else {
                playTarget();
            }
        }
        
        // 播放目标旋律
        function playTarget() {
            initAudio();
            stop();
            
            const target = LEVEL_TARGETS[currentLevel - 1];
            const now = audioCtx.currentTime;
            const beatDuration = 60 / bpm;
            
            // 播放两小节
            for (let bar = 0; bar < 2; bar++) {
                const barOffset = bar * 8 * beatDuration;
                
                // 鼓组
                const drumClip = DRUM_CLIPS[target.drums];
                drumClip.pattern.forEach((sounds, i) => {
                    sounds.forEach(sound => {
                        playDrum(sound, now + barOffset + i * beatDuration);
                    });
                });
                
                // 贝斯
                const bassClip = BASS_CLIPS[target.bass];
                bassClip.pattern.forEach((notes, i) => {
                    notes.forEach(note => {
                        playBass(note, now + barOffset + i * beatDuration, beatDuration);
                    });
                });
                
                // 旋律
                const melodyClip = MELODY_CLIPS[target.melody];
                melodyClip.pattern.forEach((notes, i) => {
                    notes.forEach(note => {
                        playMelody(note, now + barOffset + i * beatDuration, beatDuration * 0.8);
                    });
                });
                
                // 和声
                const harmonyClip = HARMONY_CLIPS[target.harmony];
                harmonyClip.chords.forEach((chord, i) => {
                    if (chord.length > 0) {
                        playHarmony(chord, now + barOffset + i * beatDuration, beatDuration * 2);
                    }
                });
            }
        }
        
        // 播放/停止
        function togglePlay() {
            initAudio();
            
            if (isPlaying) {
                stop();
            } else {
                play();
            }
        }
        
        function play() {
            if (Object.values(currentSelection).every(v => v === null)) {
                showMessage('请先选择至少一个片段', 'error');
                return;
            }
            
            isPlaying = true;
            currentBeat = 0;
            
            const playBtn = document.getElementById('playBtn');
            playBtn.textContent = '⏹ 停止';
            playBtn.classList.add('playing');
            
            // 添加播放动画
            document.querySelectorAll('.clip.selected').forEach(clip => {
                clip.classList.add('playing');
            });
            
            const beatDuration = 60 / bpm;
            
            // 立即播放第一拍
            playCurrentBeat();
            
            // 设置循环
            beatInterval = setInterval(() => {
                currentBeat = (currentBeat + 1) % 8;
                playCurrentBeat();
                updateVisualizers();
            }, beatDuration * 1000);
        }
        
        function stop() {
            isPlaying = false;
            
            if (beatInterval) {
                clearInterval(beatInterval);
                beatInterval = null;
            }
            
            const playBtn = document.getElementById('playBtn');
            playBtn.textContent = '▶ 播放';
            playBtn.classList.remove('playing');
            
            document.querySelectorAll('.clip').forEach(clip => {
                clip.classList.remove('playing');
            });
        }
        
        function playCurrentBeat() {
            const now = audioCtx.currentTime;
            const beatDuration = 60 / bpm;
            
            // 鼓组
            if (currentSelection.drums !== null) {
                const clip = DRUM_CLIPS[currentSelection.drums];
                const sounds = clip.pattern[currentBeat];
                sounds.forEach(sound => {
                    playDrum(sound, now);
                });
            }
            
            // 贝斯
            if (currentSelection.bass !== null) {
                const clip = BASS_CLIPS[currentSelection.bass];
                const notes = clip.pattern[currentBeat];
                notes.forEach(note => {
                    playBass(note, now, beatDuration);
                });
            }
            
            // 旋律
            if (currentSelection.melody !== null) {
                const clip = MELODY_CLIPS[currentSelection.melody];
                const notes = clip.pattern[currentBeat];
                notes.forEach(note => {
                    playMelody(note, now, beatDuration * 0.8);
                });
            }
            
            // 和声
            if (currentSelection.harmony !== null) {
                const clip = HARMONY_CLIPS[currentSelection.harmony];
                const chord = clip.chords[currentBeat];
                if (chord.length > 0) {
                    playHarmony(chord, now, beatDuration * 2);
                }
            }
        }
        
        // 可视化器动画
        function updateVisualizers() {
            TRACKS.forEach(track => {
                const visualizer = document.getElementById(`visualizer-${track.id}`);
                if (!visualizer) return;
                
                // 如果该轨道有选中片段，显示动画
                if (currentSelection[track.id] !== null && isPlaying) {
                    const bars = 20;
                    let html = '';
                    for (let i = 0; i < bars; i++) {
                        const height = Math.random() * 100;
                        const left = (i / bars) * 100;
                        html += `<div class="visualizer-bar" style="left: ${left}%; height: ${height}%; opacity: 0.8;"></div>`;
                    }
                    visualizer.innerHTML = html;
                    visualizer.style.color = track.color;
                } else {
                    visualizer.innerHTML = '';
                }
            });
        }
        
        // 提交答案（过关模式）
        function submitAnswer() {
            if (gameMode !== 'challenge') return;
            
            const target = LEVEL_TARGETS[currentLevel - 1];
            const correct = 
                currentSelection.drums === target.drums &&
                currentSelection.bass === target.bass &&
                currentSelection.melody === target.melody &&
                currentSelection.harmony === target.harmony;
            
            if (correct) {
                if (!completedLevels.includes(currentLevel)) {
                    completedLevels.push(currentLevel);
                }
                
                showMessage(`🎉 第 ${currentLevel} 关通过！`, 'success');
                updateLevelButtons();
                
                if (currentLevel < 5) {
                    setTimeout(() => {
                        loadLevel(currentLevel + 1);
                    }, 2000);
                } else {
                    setTimeout(() => {
                        showMessage('🏆 恭喜通关所有关卡！', 'success');
                    }, 2000);
                }
            } else {
                showMessage('❌ 不匹配，请再试一次', 'error');
            }
        }
        
        // 清空选择
        function clearSelection() {
            currentSelection = { drums: null, bass: null, melody: null, harmony: null };
            document.querySelectorAll('.clip').forEach(clip => {
                clip.classList.remove('selected');
            });
        }
        
        // 更新BPM
        function updateBPM(value) {
            bpm = parseInt(value);
            document.getElementById('bpmValue').textContent = bpm;
            
            if (isPlaying) {
                stop();
                play();
            }
        }
        
        // 显示分享对话框
        function showShareDialog() {
            const url = generateShareURL();
            document.getElementById('shareUrl').textContent = url;
            document.getElementById('shareDialog').style.display = 'block';
        }
        
        function closeShareDialog() {
            document.getElementById('shareDialog').style.display = 'none';
        }
        
        function copyShareUrl() {
            const url = document.getElementById('shareUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showMessage('链接已复制到剪贴板！', 'success');
            });
        }
        
        // 生成分享URL
        function generateShareURL() {
            const params = new URLSearchParams();
            params.set('mode', 'create');
            params.set('drums', currentSelection.drums !== null ? currentSelection.drums : '');
            params.set('bass', currentSelection.bass !== null ? currentSelection.bass : '');
            params.set('melody', currentSelection.melody !== null ? currentSelection.melody : '');
            params.set('harmony', currentSelection.harmony !== null ? currentSelection.harmony : '');
            params.set('bpm', bpm);
            
            return window.location.origin + window.location.pathname + '?' + params.toString();
        }
        
        // 从URL加载
        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            
            if (params.has('mode') && params.get('mode') === 'create') {
                setMode('create');
                
                if (params.has('drums') && params.get('drums') !== '') {
                    selectClip('drums', parseInt(params.get('drums')));
                }
                if (params.has('bass') && params.get('bass') !== '') {
                    selectClip('bass', parseInt(params.get('bass')));
                }
                if (params.has('melody') && params.get('melody') !== '') {
                    selectClip('melody', parseInt(params.get('melody')));
                }
                if (params.has('harmony') && params.get('harmony') !== '') {
                    selectClip('harmony', parseInt(params.get('harmony')));
                }
                if (params.has('bpm')) {
                    updateBPM(params.get('bpm'));
                    document.getElementById('bpmSlider').value = params.get('bpm');
                }
            }
        }
        
        // 显示消息
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            
            setTimeout(() => {
                message.style.display = 'none';
            }, 2500);
        }
        
        // 点击空白处关闭分享对话框
        document.addEventListener('click', (e) => {
            const dialog = document.getElementById('shareDialog');
            if (dialog.style.display === 'block' && !dialog.contains(e.target) && !e.target.closest('.share-btn')) {
                closeShareDialog();
            }
        });
        
        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>
