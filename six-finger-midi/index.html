<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六指迷笛 | Six-Finger MIDI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0f0a1a 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 赛博朋克网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        #gameContainer {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite, gradient 5s ease infinite;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            letter-spacing: 5px;
        }
        
        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
            letter-spacing: 3px;
        }
        
        /* 音频启用提示覆盖层 */
        #audioOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        #audioOverlay.hidden {
            display: none;
        }
        
        .audio-prompt {
            text-align: center;
            padding: 50px;
            border: 2px solid #00ffff;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            animation: pulse-border 2s ease-in-out infinite;
        }
        
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }
            50% { box-shadow: 0 0 60px rgba(0, 255, 255, 0.8); }
        }
        
        .audio-prompt h2 {
            font-size: 2em;
            color: #00ffff;
            margin-bottom: 20px;
        }
        
        .audio-prompt p {
            color: #888;
            font-size: 1.1em;
        }
        
        .audio-prompt .click-hint {
            margin-top: 30px;
            font-size: 0.9em;
            color: #ff00ff;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 模式选择 */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            color: #00ffff;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        .mode-btn:hover::before {
            left: 100%;
        }
        
        .mode-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .mode-btn.active {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border-color: transparent;
            color: #000;
            font-weight: bold;
        }
        
        /* 游戏主区域 */
        #gameArea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        /* 过关模式关卡选择 */
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .level-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #ff00ff;
            background: rgba(0, 0, 0, 0.5);
            color: #ff00ff;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .level-btn.completed {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        
        .level-btn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .level-btn.active {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: #000;
            border-color: transparent;
        }
        
        .level-btn.playing {
            animation: pulse 0.5s infinite;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
            border-color: #00ff00;
        }
        
        .level-btn.playing::after {
            content: '▶';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 10px;
            color: #00ff00;
        }
        
        .level-btn.locked {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #666;
            color: #666;
        }
        
        /* 片段循环播放样式 */
        .clip.playing {
            animation: pulse 0.5s infinite;
            box-shadow: 0 0 20px currentColor;
            border-width: 3px;
        }
        
        .clip.playing::after {
            content: '🔊';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 10px;
        }
        
        /* 进度显示 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            width: 20%;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        /* 教程区域 */
        .tutorial-section {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .tutorial-title {
            color: #00ffff;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tutorial-steps {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .tutorial-step {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .tutorial-step.active {
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
        }
        
        .tutorial-step.completed {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .tutorial-step-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #888;
            margin-bottom: 5px;
        }
        
        .tutorial-step.active .tutorial-step-number {
            color: #ffaa00;
        }
        
        .tutorial-step.completed .tutorial-step-number {
            color: #00ff00;
        }
        
        .tutorial-step-text {
            font-size: 0.85em;
            color: #aaa;
        }
        
        /* 声部轨道容器 */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .track {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.05), rgba(255, 0, 255, 0.05));
            border-left: 4px solid;
            padding: 15px;
            border-radius: 5px;
            position: relative;
        }
        
        .track.drums { border-left-color: #ff0055; }
        .track.bass { border-left-color: #00ff88; }
        .track.melody { border-left-color: #00ccff; }
        .track.harmony { border-left-color: #ffaa00; }
        
        .track-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .track-label {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 3px;
            margin-right: 15px;
            min-width: 100px;
            text-align: center;
        }
        
        .track.drums .track-label { color: #ff0055; border: 1px solid #ff0055; }
        .track.bass .track-label { color: #00ff88; border: 1px solid #00ff88; }
        .track.melody .track-label { color: #00ccff; border: 1px solid #00ccff; }
        .track.harmony .track-label { color: #ffaa00; border: 1px solid #ffaa00; }
        
        .track-visualizer {
            flex: 1;
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        
        .visualizer-bar {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: currentColor;
            transition: height 0.1s;
        }
        
        /* 片段选择区 */
        .clips-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        
        .clip {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }
        
        .clip:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
        
        .clip.selected {
            border-color: currentColor;
            box-shadow: 0 0 20px currentColor, inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        .clip.correct {
            border-color: #00ff00 !important;
            box-shadow: 0 0 20px #00ff00, inset 0 0 20px rgba(0, 255, 0, 0.2);
            animation: correct-pulse 0.5s ease;
        }
        
        .clip.wrong {
            border-color: #ff0055 !important;
            box-shadow: 0 0 20px #ff0055, inset 0 0 20px rgba(255, 0, 85, 0.2);
            animation: shake 0.5s ease;
        }
        
        @keyframes correct-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .track.drums .clip { color: #ff0055; }
        .track.bass .clip { color: #00ff88; }
        .track.melody .clip { color: #00ccff; }
        .track.harmony .clip { color: #ffaa00; }
        
        .clip-waveform {
            width: 80%;
            height: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        
        .wave-bar {
            width: 3px;
            background: currentColor;
            opacity: 0.6;
        }
        
        .clip-number {
            font-size: 0.7em;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .clip-name {
            font-size: 0.6em;
            opacity: 0.8;
            text-align: center;
            padding: 0 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        
        /* 播放指示器 */
        .clip.playing {
            animation: pulse 0.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px currentColor; }
            50% { box-shadow: 0 0 40px currentColor, 0 0 60px currentColor; }
        }
        
        /* 控制按钮区 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .control-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: inherit;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .play-btn {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #000;
            font-weight: bold;
        }
        
        .play-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }
        
        .play-btn.playing {
            background: linear-gradient(45deg, #ff0055, #ff5500);
            color: #fff;
        }
        
        .submit-btn {
            background: linear-gradient(45deg, #ff00ff, #aa00ff);
            color: #fff;
        }
        
        .submit-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }
        
        .target-btn {
            background: linear-gradient(45deg, #ffaa00, #ff5500);
            color: #000;
        }
        
        .target-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
        }
        
        .share-btn {
            background: linear-gradient(45deg, #00ccff, #0088ff);
            color: #000;
        }
        
        .share-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.6);
        }
        
        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .clear-btn:hover:not(:disabled) {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff0055;
        }
        
        /* BPM 显示 */
        .bpm-display {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }
        
        .bpm-label {
            color: #888;
            font-size: 0.9em;
        }
        
        .bpm-value {
            font-size: 1.5em;
            color: #00ffff;
            font-weight: bold;
        }
        
        /* 关卡信息显示 */
        .level-info {
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.3);
            border-radius: 5px;
        }
        
        .level-info-title {
            color: #ffaa00;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .level-info-desc {
            color: #aaa;
            font-size: 0.9em;
        }
        
        /* 反馈区域 */
        .feedback-area {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        
        .feedback-area.waiting {
            background: rgba(255, 170, 0, 0.1);
            border: 1px dashed rgba(255, 170, 0, 0.5);
            color: #ffaa00;
        }
        
        .feedback-area.correct {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .feedback-area.wrong {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid #ff0055;
            color: #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
        }
        
        .feedback-area.info {
            background: rgba(0, 204, 255, 0.1);
            border: 1px solid #00ccff;
            color: #00ccff;
        }
        
        /* 消息提示 */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid;
            border-radius: 10px;
            font-size: 1.3em;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: messageIn 0.3s ease;
        }
        
        .message.success {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
        }
        
        .message.error {
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.5);
        }
        
        .message.info {
            border-color: #00ccff;
            color: #00ccff;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.5);
        }
        
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        /* 分享链接对话框 */
        .share-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.98);
            border: 2px solid #00ccff;
            border-radius: 10px;
            padding: 30px;
            z-index: 1001;
            display: none;
            min-width: 400px;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.3);
        }
        
        .share-dialog h3 {
            color: #00ccff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .share-url {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 204, 255, 0.3);
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 20px;
            user-select: all;
        }
        
        .share-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .share-actions button {
            padding: 10px 25px;
            border: 1px solid #00ccff;
            background: transparent;
            color: #00ccff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .share-actions button:hover {
            background: rgba(0, 204, 255, 0.2);
        }
        
        /* 背景动画粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .clip { width: 55px; height: 55px; }
            .clip-name { font-size: 0.5em; }
            .control-btn { padding: 12px 25px; font-size: 0.9em; }
            .track-label { min-width: 70px; font-size: 0.75em; }
            .tutorial-step { min-width: 100px; }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 音频启用覆盖层 -->
    <div id="audioOverlay" onclick="enableAudio()">
        <div class="audio-prompt">
            <h2>🎵 点击启用音频</h2>
            <p>由于浏览器安全限制，需要用户交互后才能播放声音</p>
            <p class="click-hint">点击任意位置开始游戏</p>
        </div>
    </div>
    
    <div class="particles" id="particles"></div>
    
    <div id="gameContainer">
        <header>
            <h1>六指迷笛</h1>
            <div class="subtitle">SIX-FINGER MIDI // 多声部音乐记忆游戏</div>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="modeChallenge" onclick="setMode('challenge')">过关模式</button>
            <button class="mode-btn" id="modeCreate" onclick="setMode('create')">创作模式</button>
        </div>
        
        <div id="gameArea">
            <!-- 过关模式关卡选择 -->
            <div class="level-selector" id="levelSelector">
                <button class="level-btn active" data-level="1">1</button>
                <button class="level-btn locked" data-level="2">2</button>

        function enableAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.5;
                masterGain.connect(audioCtx.destination);
            }
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            audioEnabled = true;
            document.getElementById('audioOverlay').classList.add('hidden');
        }
        
        function ensureAudio() {
            if (!audioEnabled) {
                enableAudio();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        // ==================== 乐器合成器 ====================
        
        // 鼓声合成器
        function playDrum(type, time) {
            const t = time || audioCtx.currentTime;
            
            if (type === 'kick') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.5);
                gain.gain.setValueAtTime(0.8, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(t);
                osc.stop(t + 0.5);
            } else if (type === 'snare') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                noise.connect(gain);
                gain.connect(masterGain);
                noise.start(t);
            } else if (type === 'hihat') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                noise.start(t);
            } else if (type === 'clap') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                gain.gain.setValueAtTime(0.3, t + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                noise.connect(gain);
                gain.connect(masterGain);
                noise.start(t);
            }
        }
        
        // 贝斯合成器
        function playBass(note, time, duration = 0.4) {
            const t = time || audioCtx.currentTime;
            const freq = NOTE_FREQUENCIES[note] || 65.41;
            
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, t);
            filter.frequency.exponentialRampToValueAtTime(400, t + duration);
            
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.setValueAtTime(0.4, t + duration * 0.8);
            gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            
            osc.start(t);
            osc.stop(t + duration);
        }
        
        // 旋律合成器
        function playMelody(note, time, duration = 0.35) {
            const t = time || audioCtx.currentTime;
            const freq = NOTE_FREQUENCIES[note] || 440;
            
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.value = freq;
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, t);
            filter.frequency.exponentialRampToValueAtTime(1000, t + duration);
            filter.Q.value = 5;
            
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.25, t + 0.01);
            gain.gain.setValueAtTime(0.25, t + duration * 0.7);
            gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            
            osc.start(t);
            osc.stop(t + duration);
        }
        
        // 和声合成器 (Pad)

            const t = time || audioCtx.currentTime;

                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                filter.type = 'lowpass';
                filter.frequency.value = 1500;
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.15 / notes.length, t + 0.1);
                gain.gain.setValueAtTime(0.15 / notes.length, t + duration - 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);
                
                osc.start(t);
                osc.stop(t + duration);
            });
        }

            const beatDuration = getBeatDuration();
            nextNoteTime += beatDuration;
            currentBeat = (currentBeat + 1) % TOTAL_BEATS;
        }
        
        function scheduleNote(beatNumber, time) {
            if (beatNumber === 0) {
                updateVisualizers();
            }
        }
        
        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_TIME) {
                scheduleNote(currentBeat, nextNoteTime);
                scheduleBeat(currentBeat, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, LOOKAHEAD);
        }
        
        function scheduleBeat(beat, time) {
            const beatInPattern = beat % 8;
            
            if (isPlaying) {
                playSelectionBeat(beatInPattern, time);
            }
            
            if (isTargetPlaying) {
                playTargetBeat(beatInPattern, time);
            }
        }
        
        function playSelectionBeat(beatInPattern, time) {
            const beatDuration = getBeatDuration();
            
            if (currentSelection.drums !== null) {
                const clip = DRUM_CLIPS[currentSelection.drums];
                const sounds = clip.pattern[beatInPattern];
                sounds.forEach(sound => {
                    playDrum(sound, time);
                });
            }
            
            if (currentSelection.bass !== null) {
                const clip = BASS_CLIPS[currentSelection.bass];
                const notes = clip.pattern[beatInPattern];
                notes.forEach(note => {
                    playBass(note, time, beatDuration);
                });
            }
            
            if (currentSelection.melody !== null) {
                const clip = MELODY_CLIPS[currentSelection.melody];
                const notes = clip.pattern[beatInPattern];
                notes.forEach(note => {
                    playMelody(note, time, beatDuration * 0.8);
                });
            }
            
            if (currentSelection.harmony !== null) {
                const clip = HARMONY_CLIPS[currentSelection.harmony];
                const chord = clip.chords[beatInPattern];
                if (chord.length > 0) {
                    playHarmony(chord, time, beatDuration * 2);
                }
            }
        }
        
        function playTargetBeat(beatInPattern, time) {
            const level = LEVELS[currentLevel - 1];
            const target = level.target;
            const beatDuration = getBeatDuration();
            
            const drumClip = DRUM_CLIPS[target.drums];
            drumClip.pattern[beatInPattern].forEach(sound => {
                playDrum(sound, time);
            });
            
            const bassClip = BASS_CLIPS[target.bass];
            bassClip.pattern[beatInPattern].forEach(note => {
                playBass(note, time, beatDuration);
            });
            
            const melodyClip = MELODY_CLIPS[target.melody];
            melodyClip.pattern[beatInPattern].forEach(note => {
                playMelody(note, time, beatDuration * 0.8);
            });
            
            const harmonyClip = HARMONY_CLIPS[target.harmony];
            const chord = harmonyClip.chords[beatInPattern];
            if (chord.length > 0) {
                playHarmony(chord, time, beatDuration * 2);
            }
        }
        
        // ==================== 渲染轨道 ====================
        
        function renderTracks() {
            const container = document.getElementById('tracksContainer');
            container.innerHTML = '';
            
            TRACKS.forEach(track => {
                const trackDiv = document.createElement('div');
                trackDiv.className = `track ${track.id}`;
                trackDiv.innerHTML = `
                    <div class="track-header">
                        <div class="track-label">${track.name}</div>
                        <div class="track-visualizer" id="visualizer-${track.id}"></div>
                    </div>
                    <div class="clips-container" id="clips-${track.id}">
                        ${generateClips(track.id)}
                    </div>
                `;
                container.appendChild(trackDiv);
            });
        }
        
        function generateClips(trackId) {
            const clips = ALL_CLIPS[trackId];
            let html = '';
            
            clips.forEach((clip, index) => {
                const waveBars = Array(6).fill(0).map(() => 
                    `<div class="wave-bar" style="height: ${20 + Math.random() * 60}%"></div>`
                ).join('');
                
                html += `
                    <div class="clip" id="clip-${trackId}-${index}" onclick="selectClip('${trackId}', ${index})" title="${clip.name}">
                        <div class="clip-waveform">${waveBars}</div>
                        <div class="clip-number">${String.fromCharCode(65 + index)}</div>
                        <div class="clip-name">${clip.name}</div>
                    </div>
                `;
            });
            
            return html;
        }
        
        // ==================== 用户交互 ====================
        
        function selectClip(trackId, clipIndex) {
            ensureAudio();
            
            if (gameMode === 'create') {
                toggleClipLoop(trackId, clipIndex);
                return;
            }
            
            const clips = document.querySelectorAll(`#clips-${trackId} .clip`);
            clips.forEach(clip => clip.classList.remove('selected', 'correct', 'wrong'));
            
            if (currentSelection[trackId] === clipIndex) {
                currentSelection[trackId] = null;
            } else {
                currentSelection[trackId] = clipIndex;
                document.getElementById(`clip-${trackId}-${clipIndex}`).classList.add('selected');
                previewClip(trackId, clipIndex);
            }
            
            if (hasListenedToTarget && Object.values(currentSelection).some(v => v !== null)) {
                gameStep = 2;
                updateTutorial();
                updateFeedback('selection');
            }
        }
        
        function toggleClipLoop(trackId, clipIndex) {
            const clipElement = document.getElementById(`clip-${trackId}-${clipIndex}`);
            
            if (loopingClip && loopingClip.trackId === trackId && loopingClip.clipIndex === clipIndex) {
                clearInterval(loopingClip.interval);
                loopingClip = null;
                clipElement.classList.remove('playing');
                return;
            }
            
            if (loopingClip) {
                clearInterval(loopingClip.interval);
                document.querySelectorAll('.clip.playing').forEach(el => el.classList.remove('playing'));
            }
            
            loopingClip = { trackId, clipIndex };
            clipElement.classList.add('playing');
            
            playFullClip(trackId, clipIndex);
            
            const loopInterval = setInterval(() => {
                if (loopingClip && loopingClip.trackId === trackId && loopingClip.clipIndex === clipIndex) {
                    playFullClip(trackId, clipIndex);
                } else {
                    clearInterval(loopInterval);
                }
            }, 2000);
            
            loopingClip.interval = loopInterval;
        }
        
        function playFullClip(trackId, clipIndex) {
            const clip = ALL_CLIPS[trackId][clipIndex];
            const now = audioCtx.currentTime;
            const beatDuration = getBeatDuration();
            
            for (let bar = 0; bar < 2; bar++) {
                const barOffset = bar * 4 * beatDuration;
                
                if (trackId === 'drums') {
                    clip.pattern.forEach((sounds, i) => {
                        sounds.forEach(sound => {
                            playDrum(sound, now + barOffset + i * beatDuration);
                        });
                    });
                } else if (trackId === 'bass') {
                    clip.pattern.forEach((notes, i) => {
                        notes.forEach(note => {
                            playBass(note, now + barOffset + i * beatDuration, beatDuration);
                        });
                    });
                } else if (trackId === 'melody') {
                    clip.pattern.forEach((notes, i) => {
                        notes.forEach(note => {
                            playMelody(note, now + barOffset + i * beatDuration, beatDuration * 0.8);
                        });
                    });
                } else if (trackId === 'harmony') {
                    clip.chords.forEach((chord, i) => {
                        if (chord.length > 0) {
                            playHarmony(chord, now + barOffset + i * beatDuration, beatDuration * 2);
                        }
                    });
                }
            }
        }
        
        function previewClip(trackId, clipIndex) {
            const clip = ALL_CLIPS[trackId][clipIndex];
            const now = audioCtx.currentTime;
            const beatDuration = getBeatDuration();
            
            // 播放前3个音符作为预览
            const previewLength = 3;
            
            if (trackId === 'drums') {
                for (let i = 0; i < previewLength && i < clip.pattern.length; i++) {
                    clip.pattern[i].forEach(sound => {
                        playDrum(sound, now + i * beatDuration * 0.5);
                    });
                }
            } else if (trackId === 'bass') {
                for (let i = 0; i < previewLength && i < clip.pattern.length; i++) {
                    clip.pattern[i].forEach(note => {
                        playBass(note, now + i * beatDuration * 0.5, beatDuration * 0.5);
                    });
                }
            } else if (trackId === 'melody') {
                for (let i = 0; i < previewLength && i < clip.pattern.length; i++) {
                    clip.pattern[i].forEach(note => {
                        playMelody(note, now + i * beatDuration * 0.5, beatDuration * 0.4);
                    });
                }
            } else if (trackId === 'harmony') {
                for (let i = 0; i < previewLength && i < clip.chords.length; i++) {
                    const chord = clip.chords[i];
                    if (chord.length > 0) {
                        playHarmony(chord, now + i * beatDuration * 0.5, beatDuration);
                    }
                }
            }
        }
        
        // ==================== 播放控制 ====================
        
        function togglePlay() {
            ensureAudio();
            
            if (isPlaying) {
                stop();
            } else {
                play();
            }
        }
        
        function play() {
            if (Object.values(currentSelection).every(v => v === null)) {
                showMessage('请先选择至少一个片段', 'error');
                return;
            }
            
            isPlaying = true;
            currentBeat = 0;
            nextNoteTime = audioCtx.currentTime + 0.1;
            
            const playBtn = document.getElementById('playBtn');
            playBtn.textContent = '⏹ 停止播放';
            playBtn.classList.add('playing');
            
            document.querySelectorAll('.clip.selected').forEach(clip => {
                clip.classList.add('playing');
            });
            
            scheduler();
        }
        
        function playTarget() {
            ensureAudio();
            
            if (isTargetPlaying) {
                stop();
            } else {
                isTargetPlaying = true;
                currentBeat = 0;
                nextNoteTime = audioCtx.currentTime + 0.1;
                
                const targetBtn = document.getElementById('targetBtn');
                targetBtn.textContent = '⏹ 停止播放';
                targetBtn.classList.add('playing');
                
                document.querySelectorAll('.level-btn').forEach(btn => {
                    btn.classList.remove('playing');
                });
                const currentBtn = document.querySelector(`.level-btn[data-level="${currentLevel}"]`);
                if (currentBtn) {
                    currentBtn.classList.add('playing');
                }
                
                hasListenedToTarget = true;
                gameStep = 2;
                updateTutorial();
                updateFeedback('listened');
                
                scheduler();
            }
        }
        
        function stop() {
            isPlaying = false;
            isTargetPlaying = false;
            
            if (timerID) {
                clearTimeout(timerID);
                timerID = null;
            }
            
            const playBtn = document.getElementById('playBtn');
            playBtn.textContent = '▶ 播放我的选择';
            playBtn.classList.remove('playing');
            
            const targetBtn = document.getElementById('targetBtn');
            targetBtn.textContent = '🎵 播放目标旋律';
            targetBtn.classList.remove('playing');
            
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('playing');
            });
            
            document.querySelectorAll('.clip').forEach(clip => {
                clip.classList.remove('playing');
            });
            
            TRACKS.forEach(track => {
                const visualizer = document.getElementById(`visualizer-${track.id}`);
                if (visualizer) visualizer.innerHTML = '';
            });
        }
        
        // ==================== 游戏模式与关卡 ====================
        
        function setMode(mode) {
            stop();
            gameMode = mode;
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode === 'challenge' ? 'modeChallenge' : 'modeCreate').classList.add('active');
            
            document.getElementById('levelSelector').style.display = mode === 'challenge' ? 'flex' : 'none';
            document.getElementById('levelInfo').style.display = mode === 'challenge' ? 'block' : 'none';
            document.getElementById('progressBar').style.display = mode === 'challenge' ? 'block' : 'none';
            document.getElementById('tutorialSection').style.display = mode === 'challenge' ? 'block' : 'none';
            document.getElementById('targetBtn').style.display = mode === 'challenge' ? 'inline-block' : 'none';
            document.getElementById('submitBtn').style.display = mode === 'challenge' ? 'inline-block' : 'none';
            document.getElementById('shareBtn').classList.toggle('hidden', mode === 'challenge');
            document.getElementById('feedbackArea').style.display = mode === 'challenge' ? 'flex' : 'none';
            
            clearSelection();
            renderTracks();
            
            if (mode === 'challenge') {
                loadLevel(1);
            }
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('level-btn') && !e.target.classList.contains('locked')) {
                const level = parseInt(e.target.dataset.level);
                if (level === currentLevel) {
                    toggleTargetPlay();
                } else {
                    loadLevel(level);
                }
            }
        });
        
        function toggleTargetPlay() {
            ensureAudio();
            if (isTargetPlaying) {
                stop();
            } else {
                playTarget();
            }
        }
        
        function loadLevel(level) {
            stop();
            currentLevel = level;
            gameStep = 1;
            hasListenedToTarget = false;
            
            updateLevelButtons();
            updateProgress();
            updateLevelInfo();
            updateTutorial();
            clearSelection();
            clearFeedback();
            
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.level) === level);
            });
            
            showMessage(`第 ${level} 关 - ${LEVELS[level-1].title}`, 'info');
        }
        
        function updateLevelInfo() {
            const level = LEVELS[currentLevel - 1];
            const infoDiv = document.getElementById('levelInfo');
            infoDiv.innerHTML = `
                <div class="level-info-title">第 ${level.id} 关 - ${level.title} (${level.difficulty})</div>
                <div class="level-info-desc">${level.description}</div>
            `;
        }
        
        function updateLevelButtons() {
            document.querySelectorAll('.level-btn').forEach(btn => {
                const level = parseInt(btn.dataset.level);
                btn.classList.toggle('completed', completedLevels.includes(level));
                btn.classList.toggle('locked', level > 1 && !completedLevels.includes(level - 1) && !completedLevels.includes(level));
            });
        }
        
        function updateProgress() {
            const progress = (completedLevels.length / LEVELS.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        // ==================== 教程与反馈 ====================
        
        function updateTutorial() {
            document.querySelectorAll('.tutorial-step').forEach((step, index) => {
                step.classList.remove('active', 'completed');
                if (index + 1 < gameStep) {
                    step.classList.add('completed');
                } else if (index + 1 === gameStep) {
                    step.classList.add('active');
                }
            });
        }
        
        function updateFeedback(type) {
            const feedback = document.getElementById('feedbackArea');
            feedback.className = 'feedback-area';
            
            switch(type) {
                case 'listened':
                    feedback.classList.add('info');
                    feedback.textContent = '已聆听目标旋律。现在从每个轨道选择匹配的片段';
                    break;
                case 'selection':
                    feedback.classList.add('waiting');
                    feedback.textContent = '已选择片段。点击"播放我的选择"预览，或点击"提交答案"验证';
                    break;
                case 'correct':
                    feedback.classList.add('correct');
                    feedback.textContent = '🎉 答案正确！';
                    break;
                case 'wrong':
                    feedback.classList.add('wrong');
                    feedback.textContent = '❌ 答案不正确，请再聆听目标旋律并重试';
                    break;
                default:
                    feedback.classList.add('waiting');
                    feedback.textContent = '点击"播放目标旋律"聆听音乐，然后从每个轨道选择匹配的旋律片段';
            }
        }
        
        function clearFeedback() {
            updateFeedback('default');
        }
        
        // ==================== 提交答案 ====================
        
        function submitAnswer() {
            if (gameMode !== 'challenge') return;
            
            ensureAudio();
            
            const missing = [];
            TRACKS.forEach(track => {
                if (currentSelection[track.id] === null) {
                    missing.push(track.name);
                }
            });
            
            if (missing.length > 0) {
                showMessage(`请先选择: ${missing.join(', ')}`, 'error');
                return;
            }
            
            const level = LEVELS[currentLevel - 1];
            const target = level.target;
            
            const results = {
                drums: currentSelection.drums === target.drums,
                bass: currentSelection.bass === target.bass,
                melody: currentSelection.melody === target.melody,
                harmony: currentSelection.harmony === target.harmony
            };
            
            const allCorrect = Object.values(results).every(r => r);
            
            TRACKS.forEach(track => {
                const clipElement = document.getElementById(`clip-${track.id}-${currentSelection[track.id]}`);
                if (clipElement) {
                    clipElement.classList.remove('correct', 'wrong');
                    clipElement.classList.add(results[track.id] ? 'correct' : 'wrong');
                }
            });
            
            gameStep = 3;
            updateTutorial();
            
            if (allCorrect) {
                if (!completedLevels.includes(currentLevel)) {
                    completedLevels.push(currentLevel);
                }
                
                updateFeedback('correct');
                updateProgress();
                updateLevelButtons();
                
                showMessage(`🎉 第 ${currentLevel} 关通过！`, 'success');
                
                if (currentLevel < LEVELS.length) {
                    setTimeout(() => {
                        loadLevel(currentLevel + 1);
                    }, 3000);
                } else {
                    setTimeout(() => {
                        showMessage('🏆 恭喜通关所有关卡！', 'success');
                    }, 3000);
                }
            } else {
                updateFeedback('wrong');
                showMessage('❌ 答案不正确，红色标记的片段有误', 'error');
                
                setTimeout(() => {
                    document.querySelectorAll('.clip').forEach(clip => {
                        clip.classList.remove('correct', 'wrong');
                    });
                }, 3000);
            }
        }
        
        // ==================== 可视化 ====================
        
        function updateVisualizers() {
            TRACKS.forEach(track => {
                const visualizer = document.getElementById(`visualizer-${track.id}`);
                if (!visualizer) return;
                
                if ((currentSelection[track.id] !== null && isPlaying) || isTargetPlaying) {
                    const bars = 20;
                    let html = '';
                    for (let i = 0; i < bars; i++) {
                        const height = Math.random() * 100;
                        const left = (i / bars) * 100;
                        html += `<div class="visualizer-bar" style="left: ${left}%; height: ${height}%; opacity: 0.8;"></div>`;
                    }
                    visualizer.innerHTML = html;
                    visualizer.style.color = track.color;
                }
            });
        }
        
        // ==================== 选择与清空 ====================
        
        function clearSelection() {
            currentSelection = { drums: null, bass: null, melody: null, harmony: null };
            document.querySelectorAll('.clip').forEach(clip => {
                clip.classList.remove('selected', 'correct', 'wrong');
            });
            if (hasListenedToTarget) {
                updateFeedback('listened');
            } else {
                updateFeedback('default');
            }
        }
        
        // ==================== 分享功能 ====================
        
        function showShareDialog() {
            const url = generateShareURL();
            document.getElementById('shareUrl').textContent = url;
            document.getElementById('shareDialog').style.display = 'block';
        }
        
        function closeShareDialog() {
            document.getElementById('shareDialog').style.display = 'none';
        }
        
        function copyShareUrl() {
            const url = document.getElementById('shareUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showMessage('链接已复制到剪贴板！', 'success');
            });
        }
        
        function generateShareURL() {
            const params = new URLSearchParams();
            params.set('mode', 'create');
            params.set('drums', currentSelection.drums !== null ? currentSelection.drums : '');
            params.set('bass', currentSelection.bass !== null ? currentSelection.bass : '');
            params.set('melody', currentSelection.melody !== null ? currentSelection.melody : '');
            params.set('harmony', currentSelection.harmony !== null ? currentSelection.harmony : '');
            
            return window.location.origin + window.location.pathname + '?' + params.toString();
        }
        
        function loadFromURL() {
            const params = new URLSearchParams(window.location.search);
            
            if (params.has('mode') && params.get('mode') === 'create') {
                setMode('create');
                
                setTimeout(() => {
                    if (params.has('drums') && params.get('drums') !== '') {
                        selectClip('drums', parseInt(params.get('drums')));
                    }
                    if (params.has('bass') && params.get('bass') !== '') {
                        selectClip('bass', parseInt(params.get('bass')));
                    }
                    if (params.has('melody') && params.get('melody') !== '') {
                        selectClip('melody', parseInt(params.get('melody')));
                    }
                    if (params.has('harmony') && params.get('harmony') !== '') {
                        selectClip('harmony', parseInt(params.get('harmony')));
                    }
                }, 100);
            }
        }
        
        // ==================== 消息提示 ====================
        
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            
            setTimeout(() => {
                message.style.display = 'none';
            }, 2500);
        }
        
        // 点击空白处关闭分享对话框
        document.addEventListener('click', (e) => {
            const dialog = document.getElementById('shareDialog');
            if (dialog.style.display === 'block' && !dialog.contains(e.target) && !e.target.closest('.share-btn')) {
                closeShareDialog();
            }
        });
        
        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>
