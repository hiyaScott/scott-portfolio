<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六指迷笛 - 音乐听辨训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 标题 */
        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .level-info {
            color: #a0a0a0;
            font-size: 1rem;
        }

        /* 阶段指示器 */
        .stage-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .stage-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .stage-dot.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: pulse 1.5s infinite;
        }

        .stage-dot.completed {
            background: #48dbfb;
            border-color: #48dbfb;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        /* 系统对话框 */
        .dialog-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .dialog-box::before {
            content: '💬';
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 2rem;
        }

        .dialog-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fff;
            margin-top: 10px;
        }

        .dialog-hint {
            color: #888;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        /* 音频可视化 */
        .audio-visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 80px;
            margin: 20px 0;
            padding: 10px;
        }

        .visualizer-bar {
            width: 6px;
            background: linear-gradient(to top, #e94560, #ff6b6b, #feca57);
            border-radius: 3px;
            transition: height 0.1s ease;
            opacity: 0.3;
        }

        .visualizer-bar.active {
            opacity: 1;
        }

        /* 按钮样式 */
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #00d2d3, #48dbfb);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 211, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 210, 211, 0.6);
        }

        .btn-large {
            padding: 18px 50px;
            font-size: 1.2rem;
        }

        /* 声部选择网格 */
        .parts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 700px;
            margin: 20px 0;
        }

        .part-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .part-section.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        .part-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .part-icon {
            font-size: 1.8rem;
        }

        .part-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .part-status {
            margin-left: auto;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #444;
        }

        .part-status.playing {
            background: #00d2d3;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .part-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .part-option {
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .part-option:hover {
            background: rgba(255,255,255,0.2);
        }

        .part-option.selected {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-color: #ff6b6b;
            transform: scale(1.05);
        }

        /* 确认区域 */
        .confirm-area {
            margin-top: 30px;
            text-align: center;
        }

        .selection-summary {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item .label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .summary-item .value {
            font-size: 1.1rem;
            color: #fff;
        }

        .summary-item .value.selected {
            color: #00d2d3;
        }

        /* 结果展示 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }

        .result-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .result-text {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .result-text.success {
            color: #00d2d3;
        }

        .result-text.fail {
            color: #ff6b6b;
        }

        /* 混音控制器 */
        .mixer-info {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .mixer-info .playing-parts {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .mixer-info .part-badge {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .parts-grid {
                grid-template-columns: 1fr;
            }

            .btn {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 提示信息 */
        .tips {
            background: rgba(254, 202, 87, 0.1);
            border-left: 4px solid #feca57;
            padding: 15px 20px;
            border-radius: 0 10px 10px 0;
            margin: 20px 0;
            color: #feca57;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <h1>🎵 六指迷笛</h1>
            <div class="level-info">第 <span id="currentLevel">1</span> 关</div>
        </header>

        <!-- 阶段指示器 -->
        <div class="stage-indicator">
            <div class="stage-dot active" id="stage1" title="聆听">👂</div>
            <div class="stage-dot" id="stage2" title="选择">🎹</div>
            <div class="stage-dot" id="stage3" title="验证">✅</div>
        </div>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 阶段1：聆听 -->
            <div id="phase1" class="phase-content">
                <div class="dialog-box">
                    <div class="dialog-text">请仔细听听这段曲子 👂</div>
                    <div class="dialog-hint">仔细听每个声部的组合，记住它们的特点</div>
                </div>

                <div class="audio-visualizer" id="targetVisualizer">
                    <!-- 动态生成 -->
                </div>

                <div style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="replayTarget()">
                        🔁 再听一遍
                    </button>
                    <button class="btn btn-primary btn-large" onclick="startSelection()">
                        🎹 可以开始选择了
                    </button>
                </div>
            </div>

            <!-- 阶段2：选择 -->
            <div id="phase2" class="phase-content" style="display: none;">
                <div class="tips">
                    💡 点击片段即可听到它，四个声部会同时播放。边听边调整，直到你觉得对了再确认！
                </div>

                <div class="mixer-info">
                    <div>🎧 当前播放组合</div>
                    <div class="playing-parts" id="playingParts">
                        <span style="color: #888;">请选择声部...</span>
                    </div>
                </div>

                <div class="parts-grid">
                    <!-- 鼓组 -->
                    <div class="part-section" id="drumsSection">
                        <div class="part-header">
                            <span class="part-icon">🥁</span>
                            <span class="part-name">鼓组</span>
                            <span class="part-status" id="drumsStatus"></span>
                        </div>
                        <div class="part-options" id="drumsOptions">
                            <div class="part-option" data-part="drums" data-option="A" onclick="selectOption('drums', 'A')">节奏 A</div>
                            <div class="part-option" data-part="drums" data-option="B" onclick="selectOption('drums', 'B')">节奏 B</div>
                            <div class="part-option" data-part="drums" data-option="C" onclick="selectOption('drums', 'C')">节奏 C</div>
                        </div>
                    </div>

                    <!-- 贝斯 -->
                    <div class="part-section" id="bassSection">
                        <div class="part-header">
                            <span class="part-icon">🎸</span>
                            <span class="part-name">贝斯</span>
                            <span class="part-status" id="bassStatus"></span>
                        </div>
                        <div class="part-options" id="bassOptions">
                            <div class="part-option" data-part="bass" data-option="A" onclick="selectOption('bass', 'A')">低音 A</div>
                            <div class="part-option" data-part="bass" data-option="B" onclick="selectOption('bass', 'B')">低音 B</div>
                            <div class="part-option" data-part="bass" data-option="C" onclick="selectOption('bass', 'C')">低音 C</div>
                        </div>
                    </div>

                    <!-- 旋律 -->
                    <div class="part-section" id="melodySection">
                        <div class="part-header">
                            <span class="part-icon">🎺</span>
                            <span class="part-name">旋律</span>
                            <span class="part-status" id="melodyStatus"></span>
                        </div>
                        <div class="part-options" id="melodyOptions">
                            <div class="part-option" data-part="melody" data-option="A" onclick="selectOption('melody', 'A')">旋律 A</div>
                            <div class="part-option" data-part="melody" data-option="B" onclick="selectOption('melody', 'B')">旋律 B</div>
                            <div class="part-option" data-part="melody" data-option="C" onclick="selectOption('melody', 'C')">旋律 C</div>
                        </div>
                    </div>

                    <!-- 和声 -->
                    <div class="part-section" id="harmonySection">
                        <div class="part-header">
                            <span class="part-icon">🎹</span>
                            <span class="part-name">和声</span>
                            <span class="part-status" id="harmonyStatus"></span>
                        </div>
                        <div class="part-options" id="harmonyOptions">
                            <div class="part-option" data-part="harmony" data-option="A" onclick="selectOption('harmony', 'A')">和声 A</div>
                            <div class="part-option" data-part="harmony" data-option="B" onclick="selectOption('harmony', 'B')">和声 B</div>
                            <div class="part-option" data-part="harmony" data-option="C" onclick="selectOption('harmony', 'C')">和声 C</div>
                        </div>
                    </div>
                </div>

                <div class="confirm-area">
                    <div class="selection-summary">
                        <div class="summary-item">
                            <div class="label">🥁 鼓组</div>
                            <div class="value" id="summaryDrums">未选择</div>
                        </div>
                        <div class="summary-item">
                            <div class="label">🎸 贝斯</div>
                            <div class="value" id="summaryBass">未选择</div>
                        </div>
                        <div class="summary-item">
                            <div class="label">🎺 旋律</div>
                            <div class="value" id="summaryMelody">未选择</div>
                        </div>
                        <div class="summary-item">
                            <div class="label">🎹 和声</div>
                            <div class="value" id="summaryHarmony">未选择</div>
                        </div>
                    </div>
                    <button class="btn btn-success btn-large" onclick="confirmSelection()">
                        ✅ 确定
                    </button>
                </div>
            </div>

            <!-- 阶段3：验证 -->
            <div id="phase3" class="phase-content" style="display: none;">
                <div class="dialog-box">
                    <div class="dialog-text">我开始验证啦 🔍</div>
                    <div class="dialog-hint">请听一下你选择的组合</div>
                </div>

                <div class="audio-visualizer" id="verifyVisualizer">
                    <!-- 动态生成 -->
                </div>

                <div class="selection-summary" style="margin: 30px 0;">
                    <div class="summary-item">
                        <div class="label">🥁 鼓组</div>
                        <div class="value selected" id="verifyDrums">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🎸 贝斯</div>
                        <div class="value selected" id="verifyBass">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🎺 旋律</div>
                        <div class="value selected" id="verifyMelody">-</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🎹 和声</div>
                        <div class="value selected" id="verifyHarmony">-</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-icon" id="resultIcon">🎉</div>
        <div class="result-text" id="resultText">恭喜过关！</div>
        <button class="btn btn-primary btn-large" id="resultBtn" onclick="nextLevel()">
            下一关 ➡️
        </button>
    </div>

    <script>
        // ==================== 游戏状态 ====================
        const gameState = {
            currentLevel: 1,
            currentPhase: 1,
            targetCombination: {},
            userSelection: {
                drums: null,
                bass: null,
                melody: null,
                harmony: null
            },
            isPlaying: false,
            audioContext: null,
            activeSources: {}
        };

        const parts = ['drums', 'bass', 'melody', 'harmony'];
        const options = ['A', 'B', 'C'];

        // ==================== 音频合成器 ====================
        // 使用 Web Audio API 生成音乐片段
        
        const noteFrequencies = {
            'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61, 'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99, 'A5': 880.00
        };

        function initAudioContext() {
            if (!gameState.audioContext) {
                gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放单个音符
        function playTone(frequency, duration, startTime, volume = 0.3, type = 'sine') {
            const ctx = gameState.audioContext;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = type;
            osc.frequency.value = frequency;

            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(volume, startTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration - 0.05);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(startTime);
            osc.stop(startTime + duration);

            return { osc, gain };
        }

        // 鼓声合成
        function playDrumSound(type, startTime) {
            const ctx = gameState.audioContext;
            
            if (type === 'kick') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(150, startTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                gain.gain.setValueAtTime(0.8, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                osc.stop(startTime + 0.5);
            } else if (type === 'snare') {
                const noise = ctx.createBufferSource();
                const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.5, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);
                noise.connect(gain);
                gain.connect(ctx.destination);
                noise.start(startTime);
            } else if (type === 'hihat') {
                const noise = ctx.createBufferSource();
                const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 8000;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.3, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.05);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start(startTime);
            }
        }

        // 生成鼓组片段
        function generateDrumsPattern(variant) {
            const patterns = {
                'A': ['kick', null, 'snare', null, 'kick', 'kick', 'snare', null],
                'B': ['kick', 'hihat', 'kick', 'snare', 'kick', 'hihat', 'snare', 'hihat'],
                'C': ['kick', 'kick', 'snare', 'kick', 'hihat', 'snare', 'kick', 'hihat']
            };
            return patterns[variant] || patterns['A'];
        }

        // 生成贝斯片段
        function generateBassPattern(variant) {
            const patterns = {
                'A': ['C3', null, 'C3', null, 'G3', null, 'C3', null],
                'B': ['C3', 'E3', 'G3', null, 'F3', 'A3', 'G3', null],
                'C': ['C3', 'G3', 'C3', 'E3', 'F3', 'C3', 'G3', 'B3']
            };
            return patterns[variant] || patterns['A'];
        }

        // 生成旋律片段
        function generateMelodyPattern(variant) {
            const patterns = {
                'A': ['C5', 'D5', 'E5', 'C5', null, 'G4', 'A4', 'C5'],
                'B': ['E5', 'D5', 'C5', 'B4', 'C5', 'D5', 'E5', 'G5'],
                'C': ['G4', 'A4', 'C5', 'E5', 'D5', 'C5', 'B4', 'G4']
            };
            return patterns[variant] || patterns['A'];
        }

        // 生成和声片段
        function generateHarmonyPattern(variant) {
            const patterns = {
                'A': [['C4', 'E4', 'G4'], null, ['C4', 'E4', 'G4'], null, ['F4', 'A4', 'C5'], null, ['C4', 'E4', 'G4'], null],
                'B': [['C4', 'E4', 'G4'], ['E4', 'G4', 'B4'], null, ['F4', 'A4', 'C5'], ['G4', 'B4', 'D5'], null, ['C4', 'E4', 'G4'], null],
                'C': [['A3', 'C4', 'E4'], null, ['G3', 'B3', 'D4'], ['C4', 'E4', 'G4'], ['F3', 'A3', 'C4'], null, ['G3', 'B3', 'D4'], null]
            };
            return patterns[variant] || patterns['A'];
        }

        // 播放片段
        function playPart(part, variant, loop = true, duration = 4000) {
            initAudioContext();
            const ctx = gameState.audioContext;
            const startTime = ctx.currentTime;
            const beatDuration = 0.5; // 每个节拍0.5秒

            // 停止之前同类型的音频
            if (gameState.activeSources[part]) {
                // 这里简化处理，实际应该妥善管理音频源
            }

            function playBeat(time) {
                if (part === 'drums') {
                    const pattern = generateDrumsPattern(variant);
                    pattern.forEach((drum, i) => {
                        if (drum) playDrumSound(drum, time + i * beatDuration);
                    });
                } else if (part === 'bass') {
                    const pattern = generateBassPattern(variant);
                    pattern.forEach((note, i) => {
                        if (note) playTone(noteFrequencies[note], beatDuration * 0.9, time + i * beatDuration, 0.4, 'triangle');
                    });
                } else if (part === 'melody') {
                    const pattern = generateMelodyPattern(variant);
                    pattern.forEach((note, i) => {
                        if (note) playTone(noteFrequencies[note], beatDuration * 0.8, time + i * beatDuration, 0.25, 'sine');
                    });
                } else if (part === 'harmony') {
                    const pattern = generateHarmonyPattern(variant);
                    pattern.forEach((chord, i) => {
                        if (chord) {
                            chord.forEach(note => {
                                playTone(noteFrequencies[note], beatDuration * 1.2, time + i * beatDuration, 0.15, 'sine');
                            });
                        }
                    });
                }
            }

            // 播放一次
            playBeat(startTime);

            // 如果需要循环
            if (loop) {
                const loopInterval = setInterval(() => {
                    if (gameState.userSelection[part] !== variant) {
                        clearInterval(loopInterval);
                        return;
                    }
                    playBeat(ctx.currentTime);
                }, duration);

                return loopInterval;
            }
        }

        // 播放目标组合
        function playTargetCombination(loop = true) {
            initAudioContext();
            parts.forEach(part => {
                playPart(part, gameState.targetCombination[part], loop);
            });
        }

        // 播放用户选择
        function playUserSelection(loop = true) {
            initAudioContext();
            parts.forEach(part => {
                if (gameState.userSelection[part]) {
                    playPart(part, gameState.userSelection[part], loop);
                }
            });
        }

        // ==================== 游戏逻辑 ====================

        // 初始化游戏
        function initGame() {
            generateTargetCombination();
            createVisualizer('targetVisualizer');
            createVisualizer('verifyVisualizer');
            
            // 自动开始播放目标音乐
            setTimeout(() => {
                playTargetCombination(true);
                animateVisualizer('targetVisualizer', true);
            }, 500);
        }

        // 生成目标组合
        function generateTargetCombination() {
            parts.forEach(part => {
                gameState.targetCombination[part] = options[Math.floor(Math.random() * options.length)];
            });
            console.log('目标组合:', gameState.targetCombination);
        }

        // 创建可视化条
        function createVisualizer(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'visualizer-bar';
                bar.style.height = '10px';
                bar.style.animationDelay = `${i * 0.05}s`;
                container.appendChild(bar);
            }
        }

        // 动画可视化
        function animateVisualizer(containerId, active) {
            const container = document.getElementById(containerId);
            const bars = container.querySelectorAll('.visualizer-bar');
            
            if (active) {
                bars.forEach((bar, i) => {
                    bar.classList.add('active');
                    setInterval(() => {
                        if (bar.classList.contains('active')) {
                            bar.style.height = `${Math.random() * 60 + 10}px`;
                        }
                    }, 100 + i * 20);
                });
            } else {
                bars.forEach(bar => {
                    bar.classList.remove('active');
                    bar.style.height = '10px';
                });
            }
        }

        // 再听一遍
        function replayTarget() {
            playTargetCombination(true);
            animateVisualizer('targetVisualizer', true);
        }

        // 开始选择
        function startSelection() {
            gameState.currentPhase = 2;
            updateStageIndicator();
            
            document.getElementById('phase1').style.display = 'none';
            document.getElementById('phase2').style.display = 'block';
            
            // 停止目标音乐
            animateVisualizer('targetVisualizer', false);
            
            // 初始化音频上下文（需要用户交互）
            initAudioContext();
        }

        // 选择片段
        function selectOption(part, option) {
            initAudioContext();
            
            // 更新状态
            gameState.userSelection[part] = option;
            
            // 更新UI
            const optionsContainer = document.getElementById(part + 'Options');
            optionsContainer.querySelectorAll('.part-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            optionsContainer.querySelector(`[data-option="${option}"]`).classList.add('selected');
            
            // 更新声部状态
            document.getElementById(part + 'Status').classList.add('playing');
            document.getElementById(part + 'Section').classList.add('active');
            
            // 更新摘要
            document.getElementById('summary' + part.charAt(0).toUpperCase() + part.slice(1)).textContent = 
                option + ' ✓';
            document.getElementById('summary' + part.charAt(0).toUpperCase() + part.slice(1)).classList.add('selected');
            
            // 更新混音器显示
            updateMixerDisplay();
            
            // 播放该声部（循环）
            playPart(part, option, true);
        }

        // 更新混音器显示
        function updateMixerDisplay() {
            const container = document.getElementById('playingParts');
            const activeParts = [];
            
            const partNames = { drums: '🥁 鼓组', bass: '🎸 贝斯', melody: '🎺 旋律', harmony: '🎹 和声' };
            
            parts.forEach(part => {
                if (gameState.userSelection[part]) {
                    activeParts.push(`${partNames[part]} ${gameState.userSelection[part]}`);
                }
            });
            
            if (activeParts.length === 0) {
                container.innerHTML = '<span style="color: #888;">请选择声部...</span>';
            } else {
                container.innerHTML = activeParts.map(p => `<span class="part-badge">${p}</span>`).join('');
            }
        }

        // 确认选择
        function confirmSelection() {
            // 检查是否所有声部都已选择
            const missing = parts.filter(p => !gameState.userSelection[p]);
            if (missing.length > 0) {
                const partNames = { drums: '鼓组', bass: '贝斯', melody: '旋律', harmony: '和声' };
                alert('请先选择：' + missing.map(p => partNames[p]).join('、'));
                return;
            }
            
            gameState.currentPhase = 3;
            updateStageIndicator();
            
            document.getElementById('phase2').style.display = 'none';
            document.getElementById('phase3').style.display = 'block';
            
            // 更新验证页面显示
            document.getElementById('verifyDrums').textContent = gameState.userSelection.drums;
            document.getElementById('verifyBass').textContent = gameState.userSelection.bass;
            document.getElementById('verifyMelody').textContent = gameState.userSelection.melody;
            document.getElementById('verifyHarmony').textContent = gameState.userSelection.harmony;
            
            // 播放用户选择的组合
            setTimeout(() => {
                playUserSelection(true);
                animateVisualizer('verifyVisualizer', true);
            }, 500);
            
            // 2.5秒后显示结果
            setTimeout(() => {
                showResult();
            }, 3500);
        }

        // 显示结果
        function showResult() {
            animateVisualizer('verifyVisualizer', false);
            
            const isCorrect = parts.every(part => 
                gameState.userSelection[part] === gameState.targetCombination[part]
            );
            
            const overlay = document.getElementById('resultOverlay');
            const icon = document.getElementById('resultIcon');
            const text = document.getElementById('resultText');
            const btn = document.getElementById('resultBtn');
            
            if (isCorrect) {
                icon.textContent = '🎉';
                text.textContent = '恭喜过关！';
                text.className = 'result-text success';
                btn.textContent = '下一关 ➡️';
                btn.onclick = nextLevel;
            } else {
                icon.textContent = '❌';
                text.textContent = '不对哦，再听一遍吧';
                text.className = 'result-text fail';
                btn.textContent = '🔁 返回聆听';
                btn.onclick = restartLevel;
            }
            
            overlay.classList.add('show');
        }

        // 下一关
        function nextLevel() {
            document.getElementById('resultOverlay').classList.remove('show');
            
            gameState.currentLevel++;
            document.getElementById('currentLevel').textContent = gameState.currentLevel;
            
            resetLevel();
        }

        // 重新开始当前关
        function restartLevel() {
            document.getElementById('resultOverlay').classList.remove('show');
            resetLevel();
        }

        // 重置关卡
        function resetLevel() {
            // 重置选择
            gameState.userSelection = { drums: null, bass: null, melody: null, harmony: null };
            
            // 重置UI
            parts.forEach(part => {
                document.getElementById(part + 'Status').classList.remove('playing');
                document.getElementById(part + 'Section').classList.remove('active');
                document.getElementById('summary' + part.charAt(0).toUpperCase() + part.slice(1)).textContent = '未选择';
                document.getElementById('summary' + part.charAt(0).toUpperCase() + part.slice(1)).classList.remove('selected');
                
                const optionsContainer = document.getElementById(part + 'Options');
                optionsContainer.querySelectorAll('.part-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
            });
            
            updateMixerDisplay();
            
            // 返回第一阶段
            gameState.currentPhase = 1;
            updateStageIndicator();
            
            document.getElementById('phase3').style.display = 'none';
            document.getElementById('phase1').style.display = 'block';
            
            // 生成新目标
            generateTargetCombination();
            
            // 自动播放
            setTimeout(() => {
                playTargetCombination(true);
                animateVisualizer('targetVisualizer', true);
            }, 300);
        }

        // 更新阶段指示器
        function updateStageIndicator() {
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('stage' + i);
                dot.classList.remove('active', 'completed');
                
                if (i < gameState.currentPhase) {
                    dot.classList.add('completed');
                } else if (i === gameState.currentPhase) {
                    dot.classList.add('active');
                }
            }
        }

        // 启动游戏
        window.onload = initGame;
    </script>
</body>
