<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../favicon.ico">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词语炼金术2.0 - Word Alchemy Roguelike</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-purple: #9d00ff;
            --neon-yellow: #ffff00;
            --neon-green: #00ff88;
            --neon-orange: #ff6600;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(20, 20, 35, 0.9);
        }
        
        body {
            background: var(--dark-bg);
            color: #e0e0ff;
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }
        
        /* 霓虹背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255,0,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,255,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(157,0,255,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* 头部 */
        header {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .version-badge {
            position: absolute;
            top: 0;
            right: -60px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        h1 {
            font-size: 32px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255,0,255,0.5);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #666;
            font-size: 12px;
            letter-spacing: 3px;
        }
        
        /* 游戏主区域 */
        .game-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 15px;
        }
        
        @media (max-width: 768px) {
            .game-container {
                grid-template-columns: 1fr;
            }
            .version-badge {
                right: 0;
                top: -20px;
            }
        }
        
        .main-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .panel-box {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }
        
        /* 统计栏 */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        
        .stat-item.score .stat-value { color: var(--neon-yellow); text-shadow: 0 0 10px rgba(255,255,0,0.3); }
        .stat-item.combo .stat-value { color: var(--neon-green); text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .stat-item.time .stat-value { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,255,0.3); }
        .stat-item.level .stat-value { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255,0,255,0.3); }
        
        /* 目标区域 */
        .target-section {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,0,255,0.15), rgba(157,0,255,0.15));
            border-radius: 15px;
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)) 1;
            position: relative;
            overflow: hidden;
        }
        
        .target-section::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
            z-index: -1;
            border-radius: 15px;
            opacity: 0.3;
            filter: blur(8px);
        }
        
        .target-label {
            font-size: 11px;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        
        .target-word {
            font-size: 42px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,0,255,0.6), 0 0 60px rgba(157,0,255,0.3);
            animation: targetPulse 2s ease-in-out infinite;
        }
        
        @keyframes targetPulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 30px rgba(255,0,255,0.6), 0 0 60px rgba(157,0,255,0.3); }
            50% { transform: scale(1.02); text-shadow: 0 0 40px rgba(255,0,255,0.8), 0 0 80px rgba(157,0,255,0.5); }
        }
        
        .target-category {
            margin-top: 8px;
            font-size: 11px;
            color: #888;
        }
        
        /* 炼金台 */
        .alchemy-table {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            flex-wrap: wrap;
        }
        
        .slot {
            width: 90px;
            height: 90px;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .slot:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.08);
            transform: translateY(-3px);
        }
        
        .slot.filled {
            border-style: solid;
            border-color: var(--neon-cyan);
            background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(0,255,255,0.05));
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        
        .slot.selected {
            border-color: var(--neon-pink);
            box-shadow: 0 0 25px rgba(255,0,255,0.4), inset 0 0 15px rgba(255,0,255,0.1);
        }
        
        .slot .category-indicator {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .operator {
            font-size: 24px;
            font-weight: bold;
            color: #555;
        }
        
        .plus { color: var(--neon-purple); }
        .equals { color: var(--neon-yellow); }
        
        .result-slot {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255,200,0,0.2), rgba(255,150,0,0.1));
            border: 2px solid var(--neon-yellow);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            animation: resultGlow 2s ease-in-out infinite;
            cursor: pointer;
        }
        
        @keyframes resultGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,200,0,0.3), inset 0 0 20px rgba(255,200,0,0.05); }
            50% { box-shadow: 0 0 35px rgba(255,200,0,0.5), inset 0 0 30px rgba(255,200,0,0.1); }
        }
        
        /* 操作按钮 */
        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,0,255,0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 30px rgba(255,0,255,0.5);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 模式切换 */
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .mode-btn {
            padding: 8px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
        
        /* 元素库 */
        .inventory-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .category-section {
            margin-bottom: 15px;
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .category-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .category-name {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .category-count {
            margin-left: auto;
            font-size: 10px;
            color: #666;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .category-elements {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .element {
            padding: 6px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            position: relative;
            user-select: none;
        }
        
        .element:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .element.selected {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255,0,255,0.4);
            color: #fff;
        }
        
        .element.new {
            animation: newElement 0.6s ease-out;
        }
        
        @keyframes newElement {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        
        /* 侧边栏面板 */
        .panel-title {
            font-size: 12px;
            color: var(--neon-cyan);
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* 配方书 */
        .recipes-container {
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        
        .recipes-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .recipes-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        
        .recipe-category {
            margin-bottom: 12px;
        }
        
        .recipe-category-title {
            font-size: 10px;
            color: #666;
            padding: 4px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            margin-bottom: 6px;
        }
        
        .recipe-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .recipe-item {
            padding: 5px 10px;
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 10px;
            font-size: 11px;
            color: var(--neon-green);
        }
        
        .recipe-item.easter-egg {
            background: rgba(255,102,0,0.1);
            border-color: rgba(255,102,0,0.3);
            color: var(--neon-orange);
        }
        
        /* 进度条 */
        .progress-section {
            margin-top: 10px;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            border-radius: 3px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
        
        /* 连击显示 */
        .combo-display {
            text-align: center;
            padding: 15px;
        }
        
        .combo-count {
            font-size: 48px;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 30px rgba(0,255,136,0.5);
            line-height: 1;
        }
        
        .combo-label {
            font-size: 11px;
            color: #888;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        
        .combo-multiplier {
            font-size: 14px;
            color: var(--neon-yellow);
            margin-top: 5px;
        }
        
        /* 消息提示 */
        .message-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .message-overlay.show {
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .message-box {
            background: linear-gradient(135deg, rgba(30,30,50,0.95), rgba(20,20,35,0.95));
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan)) 1;
            border-radius: 20px;
            padding: 30px 50px;
            text-align: center;
            max-width: 400px;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,0,255,0.1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.7) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .message-icon {
            font-size: 56px;
            margin-bottom: 15px;
        }
        
        .message-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .message-text {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
        }
        
        .message-tip {
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(255,102,0,0.1);
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 10px;
            font-size: 12px;
            color: var(--neon-orange);
            font-style: italic;
        }
        
        .message-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .message-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(255,0,255,0.4);
        }
        
        /* 浮动提示 */
        .floating-tip {
            position: fixed;
            pointer-events: none;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(255,102,0,0.9), rgba(255,50,0,0.9));
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            z-index: 999;
            animation: floatUp 2s ease-out forwards;
            box-shadow: 0 4px 15px rgba(255,102,0,0.4);
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.9); opacity: 0; }
            10% { transform: translateY(-10px) scale(1); opacity: 1; }
            90% { transform: translateY(-60px) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
        }
        
        /* 连击动画 */
        .combo-animation {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-green);
            z-index: 998;
            animation: comboFloat 1s ease-out forwards;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
        }
        
        @keyframes comboFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        /* 计时器 */
        .timer-bar {
            height: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-yellow), var(--neon-orange), var(--neon-pink));
            border-radius: 2px;
            transition: width 1s linear;
        }
        
        .timer-fill.warning {
            animation: timerPulse 0.5s ease-in-out infinite;
        }
        
        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 游戏结束面板 */
        .game-over-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .game-over-stat {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .game-over-stat-label {
            font-size: 10px;
            color: #888;
        }
        
        .game-over-stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-cyan);
        }
        
        /* 分类颜色 */
        .cat-basic { background: var(--neon-pink); }
        .cat-nature { background: var(--neon-cyan); }
        .cat-material { background: var(--neon-purple); }
        .cat-life { background: var(--neon-green); }
        .cat-abstract { background: var(--neon-yellow); }
        .cat-easter { background: var(--neon-orange); }
        
        /* 震动动画 */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        /* 成功闪光 */
        .flash {
            animation: flash 0.5s;
        }
        
        @keyframes flash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🔮 词语炼金术2.0</h1>
        <span class="version-badge">ROGUELIKE</span>

        // 基础元素（开局解锁）
        const STARTING_ELEMENTS = [

        ];

        const EXTRA_ELEMENTS = [
            { name: '风', category: 'basic' },

        // ==================== 游戏状态 ====================
        
        let gameState = {
            score: 0,
            level: 1,
            combo: 0,
            maxCombo: 0,

            timeLeft: 0,
            timerInterval: null,

        };
        
        // 音频上下文
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        // 播放音效
        function playSound(type) {
            if (!gameState.audioEnabled) return;
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'success':
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.1);
                    osc.frequency.exponentialRampToValueAtTime(2093.0, now + 0.2);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                    break;
                    
                case 'newElement':
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(1100, now + 0.05);
                    osc.frequency.setValueAtTime(1320, now + 0.1);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                    
                case 'knownElement':
                    osc.frequency.setValueAtTime(440, now);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                    
                case 'fail':
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                    
                case 'levelUp':
                    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.2, now + i * 0.08);
                        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
                        o.start(now + i * 0.08);
                        o.stop(now + i * 0.08 + 0.3);
                    });
                    break;
                    
                case 'combo':
                    osc.frequency.setValueAtTime(600 + gameState.combo * 50, now);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                    
                case 'easterEgg':
                    // 特殊彩蛋音效
                    [440, 554, 659, 880].forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.15, now + i * 0.05);
                        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.2);
                        o.start(now + i * 0.05);
                        o.stop(now + i * 0.05 + 0.2);
                    });
                    break;
            }
        }
        
        // ==================== 游戏逻辑 ====================
        
        function init() {
            loadProgress();
            newGame();
            
            // 首次交互启用音频
            document.addEventListener('click', function enableAudio() {
                initAudio();
                document.removeEventListener('click', enableAudio);
            }, { once: true });
        }
        
        function newGame() {
            // 重置游戏状态
            gameState.score = 0;
            gameState.level = 1;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.slots = [null, null];
            gameState.selectedSlot = null;
            gameState.gameActive = true;
            gameState.hintUsed = false;
            
            // 重置元素（保留基础）
            gameState.unlockedElements = new Map();
            STARTING_ELEMENTS.forEach(el => {
                gameState.unlockedElements.set(el.name, el);
            });
            
            // 重置配方
            gameState.unlockedRecipes = [];
            
            // 清除定时器
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }
            
            // 设置时间
            updateTimerForMode();
            
            // 生成第一个目标
            generateNewTarget();
            
            // 更新UI
            updateUI();
            renderElements();
            renderRecipes();
            
            // 显示开始消息
            const modeNames = { normal: '标准模式', timed: '限时挑战', hardcore: '硬核模式' };
            showMessage('🎮', '游戏开始', `当前模式：${modeNames[gameState.mode]}`, null, false);
        }
        
        function setMode(mode) {
            gameState.mode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            newGame();
        }
        
        function updateTimerForMode() {
            const timerBar = document.getElementById('timerBar');
            const timeDisplay = document.getElementById('time');
            
            switch(gameState.mode) {
                case 'normal':
                    gameState.timeLeft = 0;
                    timerBar.style.display = 'none';
                    timeDisplay.textContent = '∞';
                    break;
                case 'timed':
                    gameState.timeLeft = 180; // 3分钟
                    timerBar.style.display = 'block';
                    timeDisplay.textContent = formatTime(gameState.timeLeft);
                    startTimer();
                    break;
                case 'hardcore':
                    gameState.timeLeft = 60; // 1分钟
                    timerBar.style.display = 'block';
                    timeDisplay.textContent = formatTime(gameState.timeLeft);
                    startTimer();
                    break;
            }
        }
        
        function startTimer() {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            
            gameState.timerInterval = setInterval(() => {
                if (!gameState.gameActive) return;
                
                gameState.timeLeft--;
                document.getElementById('time').textContent = formatTime(gameState.timeLeft);
                
                const percent = (gameState.timeLeft / (gameState.mode === 'timed' ? 180 : 60)) * 100;
                document.getElementById('timerFill').style.width = percent + '%';
                
                if (percent < 20) {
                    document.getElementById('timerFill').classList.add('warning');
                }
                
                if (gameState.timeLeft <= 0) {
                    gameOver();
                }
            }, 1000);
        }
        
        function formatTime(seconds) {
            if (seconds === 0) return '∞';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        
        function generateNewTarget() {
            // 获取所有可能的合成结果
            const possibleTargets = [];
            const allRecipes = Object.entries(RECIPES);
            
            // 根据当前解锁的元素筛选可达成的目标
            const unlockedNames = Array.from(gameState.unlockedElements.keys());
            
            for (const [key, recipe] of allRecipes) {
                const [a, b] = key.split('+');
                // 目标可以是通过当前已解锁元素直接或间接合成的
                if (!gameState.unlockedElements.has(recipe.result)) {
                    possibleTargets.push(recipe);
                }
            }
            
            // 如果没有可选目标，从所有配方中随机选择
            if (possibleTargets.length === 0) {
                allRecipes.forEach(([_, recipe]) => {
                    if (!gameState.unlockedElements.has(recipe.result)) {
                        possibleTargets.push(recipe);
                    }
                });
            }
            
            // 如果所有元素都已解锁，游戏胜利
            if (possibleTargets.length === 0) {
                victory();
                return;
            }
            
            // 随机选择目标
            gameState.currentTarget = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
            gameState.hintUsed = false;
        }
        
        function combine() {
            if (!gameState.gameActive) return;
            
            const [slot1, slot2] = gameState.slots;
            if (!slot1 || !slot2) {
                showMessage('⚠️', '提示', '请先选择两个元素', null, false);
                return;
            }
            
            const key1 = `${slot1}+${slot2}`;
            const key2 = `${slot2}+${slot1}`;
            const recipe = RECIPES[key1] || RECIPES[key2];
            
            if (recipe) {
                const isNewElement = !gameState.unlockedElements.has(recipe.result);
                const isTarget = recipe.result === gameState.currentTarget.result;
                const isEasterEgg = recipe.category === 'easter';
                
                // 解锁新元素
                if (isNewElement) {
                    gameState.unlockedElements.set(recipe.result, {
                        name: recipe.result,
                        category: recipe.category
                    });
                    
                    // 记录配方
                    gameState.unlockedRecipes.push({
                        inputs: [slot1, slot2].sort(),
                        output: recipe.result,
                        category: recipe.category
                    });
                }
                
                // 计算得分
                let points = 10;
                if (isNewElement) points = 50;
                if (isTarget) points = 100;
                
                // 连击加成
                gameState.combo++;
                if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
                const multiplier = 1 + (gameState.combo * 0.1);
                points = Math.floor(points * multiplier);
                
                gameState.score += points;
                
                // 播放音效
                if (isEasterEgg) {
                    playSound('easterEgg');
                } else if (isNewElement) {
                    playSound('newElement');
                } else {
                    playSound('knownElement');
                }
                playSound('combo');
                
                // 显示浮动连击
                showComboAnimation(points);
                
                // 检查是否达成目标
                if (isTarget) {
                    playSound('levelUp');
                    gameState.level++;
                    gameState.combo = 0; // 过关重置连击
                    
                    // 时间奖励
                    if (gameState.mode !== 'normal') {
                        const timeBonus = gameState.mode === 'timed' ? 30 : 15;
                        gameState.timeLeft += timeBonus;
                    }
                    
                    // 显示消息
                    const tip = isEasterEgg ? recipe.tip : null;
                    showMessage('🎉', '目标达成！', `合成成功：${recipe.result}`, tip, false);
                    
                    // 延迟生成新目标
                    setTimeout(() => {
                        generateNewTarget();
                        updateUI();
                    }, 2000);
                } else {
                    // 显示结果消息
                    const title = isNewElement ? '✨ 新发现！' : '📝 已知配方';
                    const text = isNewElement ? `解锁新元素：${recipe.result}` : `${recipe.result}（已收录）`;
                    const tip = isEasterEgg ? recipe.tip : null;
                    
                    if (isEasterEgg) {
                        showFloatingTip(recipe.tip);
                    }
                    
                    showMessage(isNewElement ? '✨' : '📝', title, text, tip, false);
                }
                
                // 清空槽位
                clearSlots();
                updateUI();
                renderElements();
                renderRecipes();
                saveProgress();
                
            } else {
                // 合成失败
                gameState.combo = 0;
                playSound('fail');
                document.querySelector('.alchemy-table').classList.add('shake');
                setTimeout(() => {
                    document.querySelector('.alchemy-table').classList.remove('shake');
                }, 500);
                showMessage('✗', '合成失败', '这两个元素无法组合', null, false);
            }
        }
        
        function selectSlot(num) {
            gameState.selectedSlot = num;
            updateSlots();
        }
        
        function selectElement(elementName) {
            const element = gameState.unlockedElements.get(elementName);
            if (!element) return;
            
            // 如果没有选中槽位，自动选择第一个空的
            if (gameState.selectedSlot === null) {
                if (gameState.slots[0] === null) gameState.selectedSlot = 1;
                else if (gameState.slots[1] === null) gameState.selectedSlot = 2;
                else gameState.selectedSlot = 1;
            }
            
            // 放入槽位
            gameState.slots[gameState.selectedSlot - 1] = elementName;
            updateSlots();
            
            // 切换到另一个槽位
            gameState.selectedSlot = gameState.selectedSlot === 1 ? 2 : 1;
            
            // 视觉反馈
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
            const selectedEl = document.querySelector(`[data-element="${elementName}"]`);
            if (selectedEl) selectedEl.classList.add('selected');
        }
        
        function updateSlots() {
            gameState.slots.forEach((content, i) => {
                const slot = document.getElementById(`slot${i + 1}`);
                slot.textContent = content || '';
                slot.classList.toggle('filled', content !== null);
                slot.classList.toggle('selected', gameState.selectedSlot === i + 1);
                
                // 添加分类指示器
                if (content) {
                    const el = gameState.unlockedElements.get(content);
                    if (el) {
                        slot.innerHTML = `${content}<div class="category-indicator ${CATEGORIES[el.category].class}"></div>`;
                    }
                }
            });
            
            // 更新结果槽预览
            const resultSlot = document.getElementById('resultSlot');
            if (gameState.slots[0] && gameState.slots[1]) {
                const key1 = `${gameState.slots[0]}+${gameState.slots[1]}`;
                const key2 = `${gameState.slots[1]}+${gameState.slots[0]}`;
                const recipe = RECIPES[key1] || RECIPES[key2];
                resultSlot.textContent = recipe ? recipe.result : '?';
                resultSlot.style.opacity = recipe ? '1' : '0.3';
            } else {
                resultSlot.textContent = '?';
                resultSlot.style.opacity = '1';
            }
        }
        
        function clearSlots() {
            gameState.slots = [null, null];
            gameState.selectedSlot = null;
            updateSlots();
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
        }
        
        function showHint() {
            // 查找当前目标的配方
            let hintText = '暂无提示';
            
            for (const [key, recipe] of Object.entries(RECIPES)) {
                if (recipe.result === gameState.currentTarget.result) {
                    const [a, b] = key.split('+');
                    hintText = `试试：${a} + ${b}`;
                    break;
                }
            }
            
            gameState.hintUsed = true;
            showMessage('💡', '提示', hintText, null, false);
        }
        
        // ==================== UI更新 ====================
        
        function updateUI() {
            document.getElementById('score').textContent = gameState.score.toLocaleString();
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('combo').textContent = '×' + (1 + gameState.combo * 0.1).toFixed(1);
            document.getElementById('comboDisplay').textContent = gameState.combo;
            document.getElementById('comboMultiplier').textContent = `+${(gameState.combo * 10)}% 得分加成`;
            
            // 更新目标
            if (gameState.currentTarget) {
                document.getElementById('targetWord').textContent = gameState.currentTarget.result;
                document.getElementById('targetCategory').textContent = CATEGORIES[gameState.currentTarget.category].name;
                document.getElementById('targetCategory').style.color = CATEGORIES[gameState.currentTarget.category].color;
            }
            
            // 更新进度
            const totalElements = Object.keys(RECIPES).length + STARTING_ELEMENTS.length;
            const unlockedCount = gameState.unlockedElements.size;
            const progress = (unlockedCount / totalElements) * 100;
            
            document.getElementById('totalElements').textContent = unlockedCount;
            document.getElementById('progressText').textContent = `${unlockedCount}/${totalElements}+`;
            document.getElementById('progressBar').style.width = progress + '%';
            
            document.getElementById('recipeProgressText').textContent = `${gameState.unlockedRecipes.length}/${totalElements}+`;
            document.getElementById('recipeProgressBar').style.width = (gameState.unlockedRecipes.length / totalElements * 100) + '%';
        }
        
        function renderElements() {
            const grid = document.getElementById('elementsGrid');
            
            // 按分类组织
            const byCategory = {};
            gameState.unlockedElements.forEach((el, name) => {
                if (!byCategory[el.category]) byCategory[el.category] = [];
                byCategory[el.category].push(name);
            });
            
            // 按分类顺序渲染
            let html = '';
            const categoryOrder = ['basic', 'nature', 'material', 'life', 'abstract', 'easter'];
            
            categoryOrder.forEach(catKey => {
                if (byCategory[catKey]) {
                    const cat = CATEGORIES[catKey];
                    html += `
                        <div class="category-section">
                            <div class="category-header">
                                <div class="category-dot ${cat.class}"></div>
                                <span class="category-name">${cat.name}</span>
                                <span class="category-count">${byCategory[catKey].length}</span>
                            </div>
                            <div class="category-elements">
                                ${byCategory[catKey].map(name => `
                                    <div class="element" data-element="${name}" onclick="selectElement('${name}')">
                                        ${name}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            grid.innerHTML = html || '<div style="text-align: center; color: #666; padding: 20px;">暂无元素</div>';
        }
        
        function renderRecipes() {
            const container = document.getElementById('recipes');
            
            if (gameState.unlockedRecipes.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">暂无配方</div>';
                return;
            }
            
            // 按分类组织
            const byCategory = {};
            gameState.unlockedRecipes.forEach(recipe => {
                if (!byCategory[recipe.category]) byCategory[recipe.category] = [];
                byCategory[recipe.category].push(recipe);
            });
            
            let html = '';
            const categoryOrder = ['basic', 'nature', 'material', 'life', 'abstract', 'easter'];
            
            categoryOrder.forEach(catKey => {
                if (byCategory[catKey]) {
                    html += `
                        <div class="recipe-category">
                            <div class="recipe-category-title">${CATEGORIES[catKey].name}</div>
                            <div class="recipe-list">
                                ${byCategory[catKey].map(r => `
                                    <div class="recipe-item ${r.category === 'easter' ? 'easter-egg' : ''}">
                                        ${r.inputs.join('+')}=${r.output}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
        }
        
        // ==================== 消息系统 ====================
        
        function showMessage(icon, title, text, tip = null, showBtn = false) {
            document.getElementById('messageIcon').textContent = icon;
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageText').textContent = text;
            
            const tipEl = document.getElementById('messageTip');
            if (tip) {
                tipEl.textContent = tip;
                tipEl.style.display = 'block';
            } else {
                tipEl.style.display = 'none';
            }
            
            const btn = document.getElementById('messageBtn');
            btn.style.display = showBtn ? 'block' : 'none';
            
            document.getElementById('messageOverlay').classList.add('show');
            
            if (!showBtn) {
                setTimeout(() => {
                    closeMessage();
                }, 2500);
            }
        }
        
        function closeMessage() {
            document.getElementById('messageOverlay').classList.remove('show');
        }
        
        function showFloatingTip(text) {
            const tip = document.createElement('div');
            tip.className = 'floating-tip';
            tip.textContent = text;
            tip.style.left = '50%';
            tip.style.top = '40%';
            tip.style.transform = 'translateX(-50%)';
            document.body.appendChild(tip);
            
            setTimeout(() => tip.remove(), 2000);
        }
        
        function showComboAnimation(points) {
            const anim = document.createElement('div');
            anim.className = 'combo-animation';
            anim.textContent = `+${points}`;
            anim.style.left = '50%';
            anim.style.top = '45%';
            anim.style.transform = 'translateX(-50%)';
            document.body.appendChild(anim);
            
            setTimeout(() => anim.remove(), 1000);
        }
        
        // ==================== 游戏结束 ====================
        
        function gameOver() {
            gameState.gameActive = false;
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }
            
            const stats = `
                <div class="game-over-stats">
                    <div class="game-over-stat">
                        <div class="game-over-stat-label">最终得分</div>
                        <div class="game-over-stat-value">${gameState.score.toLocaleString()}</div>
                    </div>
                    <div class="game-over-stat">
                        <div class="game-over-stat-label">最高关卡</div>
                        <div class="game-over-stat-value">${gameState.level}</div>
                    </div>
                    <div class="game-over-stat">
                        <div class="game-over-stat-label">最大连击</div>
                        <div class="game-over-stat-value">${gameState.maxCombo}</div>
                    </div>
                    <div class="game-over-stat">
                        <div class="game-over-stat-label">解锁元素</div>
                        <div class="game-over-stat-value">${gameState.unlockedElements.size}</div>
                    </div>
                </div>
            `;
            
            document.getElementById('messageBox').innerHTML = `
                <div class="message-icon">🏁</div>
                <div class="message-title">游戏结束</div>
                <div class="message-text">时间到！看看你的成就：</div>
                ${stats}
                <button class="message-btn" onclick="newGame()">再玩一次</button>
            `;
            
            document.getElementById('messageOverlay').classList.add('show');
        }
        
        function victory() {
            gameState.gameActive = false;
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }
            
            showMessage('🏆', '恭喜通关！', '你已经解锁了所有元素！你是真正的炼金大师！', null, true);
        }
        
        // ==================== 本地存储 ====================
        
        function saveProgress() {
            const data = {
                score: gameState.score,
                unlockedElements: Array.from(gameState.unlockedElements.keys()),
                unlockedRecipes: gameState.unlockedRecipes,
                timestamp: Date.now()
            };
            localStorage.setItem('wordAlchemy2_progress', JSON.stringify(data));
        }
        
        function loadProgress() {
            const saved = localStorage.getItem('wordAlchemy2_progress');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    // 可以在这里加载之前的进度
                    console.log('加载存档成功');
                } catch (e) {
                    console.error('加载存档失败', e);
                }
            }
        }
        
        // ==================== 启动游戏 ====================
        
        init();
    </script>
</body>
</html>
