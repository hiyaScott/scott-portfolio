<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../favicon.ico">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#007 节奏指挥官 | Rhythm Commander</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Share Tech Mono', 'Noto Sans SC', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #gameCanvas {
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            background: #111;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cmd-btn {
            padding: 15px 25px;
            border: 2px solid;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.1s;
            position: relative;
        }

        .cmd-btn.attack { border-color: #ff0000; color: #ff0000; }
        .cmd-btn.defend { border-color: #00ffff; color: #00ffff; }
        .cmd-btn.heal { border-color: #39ff14; color: #39ff14; }
        .cmd-btn.special { border-color: #ffff00; color: #ffff00; }

        .cmd-btn:hover, .cmd-btn.active {
            background: currentColor;
            color: #000;
            box-shadow: 0 0 20px currentColor;
        }

        .cmd-btn .key {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 3px;
        }

        .info {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            font-size: 14px;
        }

        .stat {
            color: #fff;
        }

        .stat span {
            color: #ff00ff;
            font-weight: bold;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff0000;
            padding: 40px;
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 0 0 30px #ff0000;
        }

        .game-over.show { display: block; }
        .game-over.victory { border-color: #00ff00; box-shadow: 0 0 30px #00ff00; }
        .game-over.victory h2 { color: #00ff00; }

        .game-over h2 {
            color: #ff0000;
            margin-bottom: 20px;
            text-shadow: 0 0 20px currentColor;
        }

        .restart-btn {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid currentColor;
            color: inherit;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: currentColor;
            color: #000;
        }

        .combo {
            position: fixed;
            top: 100px;
            right: 50px;
            font-size: 48px;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combo.show { opacity: 1; }

        /* 移动端触摸控制 */
        @media (max-width: 768px) {
            h1 {
                font-size: 20px;
                margin-bottom: 5px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 10px;
            }

            #gameCanvas {
                width: 95vw;
                max-width: 400px;
                height: auto;
            }

            .controls {
                gap: 8px;
                margin-top: 15px;
            }

            .cmd-btn {
                padding: 20px 15px;
                font-size: 14px;
                min-width: 70px;
            }

            .cmd-btn .key {
                font-size: 10px;
                padding: 1px 5px;
            }

            .stats {
                gap: 15px;
                font-size: 12px;
            }

            .info {
                font-size: 10px;
                padding: 0 10px;
            }
        }

        .cmd-btn:active {
            transform: scale(0.95);
        }
    
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            text-decoration: none;
            font-family: monospace;
            z-index: 1000;
            transition: all 0.3s;
            border-radius: 4px;
            font-size: 14px;
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 返回主页</a>
    <h1>#007 节奏指挥官 | RHYTHM COMMANDER</h1>
    <div class="subtitle">音乐即战术 · 在节拍点上执行指令</div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="stats">
        <div class="stat">生命值: <span id="hp">100</span>/<span>100</span></div>
        <div class="stat">分数: <span id="score">0</span></div>
        <div class="stat">连击: <span id="combo">0</span></div>
    </div>

    <div class="controls">
        <button class="cmd-btn attack" onclick="game.executeCommand('attack')">
            <span class="key">Q</span>
            ⚔️ 攻击
        </button>
        <button class="cmd-btn defend" onclick="game.executeCommand('defend')">
            <span class="key">W</span>
            🛡️ 防御
        </button>
        <button class="cmd-btn heal" onclick="game.executeCommand('heal')">
            <span class="key">E</span>
            💚 治疗
        </button>
        <button class="cmd-btn special" onclick="game.executeCommand('special')">
            <span class="key">R</span>
            ⚡ 必杀
        </button>
    </div>

    <div class="info">
        当节拍点到达中心线时按下对应按键 | 完美时机 = 2倍效果 | 错过时机 = 失败<br>
        攻击造成伤害 | 防御减少伤害 | 治疗恢复生命 | 必杀需要满能量
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2 id="gameOverTitle">💀 战斗失败</h2>
        <p id="gameOverText">节奏被打乱了...</p>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="game.restart()">重新开始</button>
    </div>

    <div class="combo" id="comboDisplay"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 霓虹配色
        const COLORS = {
            attack: '#ff0000',
            defend: '#00ffff',
            heal: '#39ff14',
            special: '#ffff00',
            beat: '#ffffff',
            perfect: '#ff00ff',
            good: '#00ffff',
            miss: '#ff0000',
            lane: '#333',
            center: '#ff00ff'
        };

        class Game {
            constructor() {
                this.bpm = 120;
                this.beatInterval = 60 / this.bpm;
                this.lastBeatTime = 0;
                this.beats = []; // 节拍点
                this.player = { hp: 100, maxHp: 100, energy: 0, maxEnergy: 100 };
                this.enemy = { hp: 500, maxHp: 500 };
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.isPlaying = true;
                this.damageQueue = []; // 待处理的伤害

                this.setupInput();
                this.generateBeats();
                this.loop();
            }

            setupInput() {
                window.addEventListener('keydown', (e) => {
                    if (!this.isPlaying) return;

                    const key = e.key.toLowerCase();
                    const cmdMap = { 'q': 'attack', 'w': 'defend', 'e': 'heal', 'r': 'special' };

                    if (cmdMap[key]) {
                        e.preventDefault();
                        this.executeCommand(cmdMap[key]);
                    }
                });
            }

            generateBeats() {
                // 生成节拍序列
                const commands = ['attack', 'attack', 'defend', 'attack', 'heal', 'attack', 'defend', 'special'];
                let time = 2; // 从2秒后开始

                for (let i = 0; i < 50; i++) {
                    const cmd = commands[i % commands.length];
                    this.beats.push({
                        time: time,
                        command: cmd,
                        hit: false,
                        result: null
                    });
                    time += this.beatInterval;
                }

                // 敌人攻击节拍
                let enemyTime = 3;
                for (let i = 0; i < 30; i++) {
                    this.damageQueue.push({
                        time: enemyTime,
                        damage: 15,
                        blocked: false
                    });
                    enemyTime += this.beatInterval * 2;
                }
            }

            executeCommand(command) {
                if (!this.isPlaying) return;

                // 检查是否有对应类型的节拍点在判定区域内
                const now = this.getAudioTime();
                const hitWindow = 0.3; // 判定窗口 ±0.3秒

                let hitBeat = null;
                let bestTiming = Infinity;

                for (let beat of this.beats) {
                    if (!beat.hit && beat.command === command) {
                        const timing = Math.abs(now - beat.time);
                        if (timing < hitWindow && timing < bestTiming) {
                            bestTiming = timing;
                            hitBeat = beat;
                        }
                    }
                }

                if (hitBeat) {
                    // 判定精度
                    let result, multiplier;
                    if (bestTiming < 0.1) {
                        result = 'PERFECT';
                        multiplier = 2;
                        this.combo++;
                    } else if (bestTiming < 0.2) {
                        result = 'GOOD';
                        multiplier = 1.5;
                        this.combo++;
                    } else {
                        result = 'OK';
                        multiplier = 1;
                        this.combo = 0;
                    }

                    hitBeat.hit = true;
                    hitBeat.result = result;

                    // 执行效果
                    this.applyCommandEffect(command, multiplier);

                    // 显示连击
                    this.showCombo(result);

                } else {
                    // 空挥 - 打断连击
                    this.combo = 0;
                    this.showCombo('MISS');
                }

                this.updateUI();
            }

            applyCommandEffect(command, multiplier) {
                switch(command) {
                    case 'attack':
                        const damage = Math.floor(20 * multiplier * (1 + this.combo * 0.1));
                        this.enemy.hp -= damage;
                        this.score += damage * 10;
                        this.player.energy = Math.min(this.player.energy + 10, this.player.maxEnergy);
                        break;

                    case 'defend':
                        // 阻挡下一次伤害
                        const nextDamage = this.damageQueue.find(d => !d.blocked &> d.time > this.getAudioTime());
                        if (nextDamage) {
                            nextDamage.blocked = true;
                            nextDamage.damage = Math.floor(nextDamage.damage * 0.3);
                        }
                        this.score += 50 * multiplier;
                        break;

                    case 'heal':
                        const heal = Math.floor(15 * multiplier);
                        this.player.hp = Math.min(this.player.hp + heal, this.player.maxHp);
                        this.score += 30 * multiplier;
                        break;

                    case 'special':
                        if (this.player.energy >= 100) {
                            this.player.energy = 0;
                            const specialDamage = Math.floor(100 * multiplier);
                            this.enemy.hp -= specialDamage;
                            this.score += specialDamage * 20;
                        } else {
                            this.combo = 0; // 能量不足，打断连击
                        }
                        break;
                }

                // 检查胜利
                if (this.enemy.hp <= 0) {
                    this.victory();
                }
            }

            showCombo(result) {
                const display = document.getElementById('comboDisplay');
                const texts = {
                    'PERFECT': 'PERFECT!',
                    'GOOD': 'GOOD',
                    'OK': 'OK',
                    'MISS': 'MISS'
                };

                display.textContent = texts[result] || result;
                display.style.color = result === 'PERFECT' ? '#ff00ff' :
                                      result === 'GOOD' ? '#00ffff' :
                                      result === 'OK' ? '#39ff14' : '#ff0000';
                display.classList.add('show');

                setTimeout(() => display.classList.remove('show'), 500);
            }

            getAudioTime() {
                return performance.now() / 1000;
            }

            update() {
                if (!this.isPlaying) return;

                const now = this.getAudioTime();

                // 处理敌人攻击
                for (let dmg of this.damageQueue) {
                    if (!dmg.processed && now > dmg.time) {
                        dmg.processed = true;
                        this.player.hp -= dmg.blocked ? dmg.damage : dmg.damage;

                        if (this.player.hp <= 0) {
                            this.gameOver();
                        }
                    }
                }

                // 清理已过期的节拍
                this.beats = this.beats.filter(b => b.time > now - 1);

                // 检查是否还有节拍
                if (this.beats.length === 0 && this.enemy.hp > 0) {
                    // 生成更多节拍
                    this.generateBeats();
                }
            }

            draw() {
                // 清空画布
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制背景网格
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }

                // 绘制轨道
                const lanes = {
                    attack: 100,
                    defend: 200,
                    heal: 300,
                    special: 400
                };

                // 轨道线
                ctx.strokeStyle = COLORS.lane;
                ctx.lineWidth = 2;
                for (let y of Object.values(lanes)) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                // 判定线
                const hitLineX = 200;
                ctx.strokeStyle = COLORS.center;
                ctx.lineWidth = 3;
                ctx.shadowColor = COLORS.center;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(hitLineX, 50);
                ctx.lineTo(hitLineX, 450);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // 绘制节拍点
                const now = this.getAudioTime();
                const pixelsPerSecond = 200; // 移动速度

                for (let beat of this.beats) {
                    if (beat.hit) continue;

                    const timeDiff = beat.time - now;
                    const x = hitLineX + timeDiff * pixelsPerSecond;

                    if (x > -50 && x < canvas.width + 50) {
                        const y = lanes[beat.command];
                        const size = 20;

                        ctx.fillStyle = COLORS[beat.command];
                        ctx.shadowColor = COLORS[beat.command];
                        ctx.shadowBlur = 15;

                        // 绘制形状
                        if (beat.command === 'attack') {
                            // 菱形
                            ctx.beginPath();
                            ctx.moveTo(x, y - size);
                            ctx.lineTo(x + size, y);
                            ctx.lineTo(x, y + size);
                            ctx.lineTo(x - size, y);
                            ctx.closePath();
                            ctx.fill();
                        } else if (beat.command === 'defend') {
                            // 方形
                            ctx.fillRect(x - size, y - size, size * 2, size * 2);
                        } else if (beat.command === 'heal') {
                            // 圆形
                            ctx.beginPath();
                            ctx.arc(x, y, size, 0, Math.PI * 2);
                            ctx.fill();
                        } else if (beat.command === 'special') {
                            // 星形
                            ctx.beginPath();
                            for (let i = 0; i < 5; i++) {
                                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                                const px = x + Math.cos(angle) * size;
                                const py = y + Math.sin(angle) * size;
                                if (i === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                            ctx.fill();
                        }

                        ctx.shadowBlur = 0;
                    }
                }

                // 绘制玩家和敌人
                this.drawCharacters();

                // 绘制能量条
                this.drawEnergyBar();
            }

            drawCharacters() {
                // 玩家 (左侧)
                const playerX = 80;
                const playerY = 250;

                // 玩家身体
                ctx.fillStyle = '#00ffff';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 20;
                ctx.fillRect(playerX - 30, playerY - 40, 60, 80);
                ctx.shadowBlur = 0;

                // 玩家生命条背景
                ctx.fillStyle = '#333';
                ctx.fillRect(playerX - 40, playerY - 70, 80, 10);
                // 玩家生命条
                ctx.fillStyle = this.player.hp > 30 ? '#00ff00' : '#ff0000';
                ctx.fillRect(playerX - 40, playerY - 70, 80 * (this.player.hp / this.player.maxHp), 10);

                // 敌人 (右侧)
                const enemyX = 820;
                const enemyY = 250;

                // 敌人身体
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(enemyX, enemyY, 50, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 敌人生命条背景
                ctx.fillStyle = '#333';
                ctx.fillRect(enemyX - 60, enemyY - 80, 120, 10);
                // 敌人生命条
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(enemyX - 60, enemyY - 80, 120 * (this.enemy.hp / this.enemy.maxHp), 10);
            }

            drawEnergyBar() {
                // 能量条
                const x = canvas.width / 2 - 100;
                const y = 470;

                ctx.fillStyle = '#333';
                ctx.fillRect(x, y, 200, 15);

                ctx.fillStyle = this.player.energy >= 100 ? '#ffff00' : '#ffff0055';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = this.player.energy >= 100 ? 20 : 0;
                ctx.fillRect(x, y, 200 * (this.player.energy / this.player.maxEnergy), 15);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#fff';
                ctx.font = '12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`ENERGY: ${Math.floor(this.player.energy)}%`, canvas.width / 2, y + 30);
            }

            updateUI() {
                document.getElementById('hp').textContent = Math.max(0, Math.floor(this.player.hp));
                document.getElementById('score').textContent = Math.floor(this.score);
                document.getElementById('combo').textContent = this.combo;
            }

            victory() {
                this.isPlaying = false;
                document.getElementById('gameOverTitle').textContent = '🎉 战斗胜利！';
                document.getElementById('gameOverText').textContent = '你掌握了节奏的真谛！';
                document.getElementById('finalScore').textContent = Math.floor(this.score);
                document.getElementById('gameOverScreen').classList.add('show', 'victory');
            }

            gameOver() {
                this.isPlaying = false;
                document.getElementById('gameOverScreen').classList.add('show');
            }

            restart() {
                this.player = { hp: 100, maxHp: 100, energy: 0, maxEnergy: 100 };
                this.enemy = { hp: 500, maxHp: 500 };
                this.score = 0;
                this.combo = 0;
                this.beats = [];
                this.damageQueue = [];
                this.isPlaying = true;
                this.generateBeats();
                document.getElementById('gameOverScreen').classList.remove('show', 'victory');
                this.updateUI();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        // 响应式画布尺寸
        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                const maxWidth = Math.min(window.innerWidth - 20, 400);
                const scale = maxWidth / 900;
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (500 * scale) + 'px';
            } else {
                canvas.style.width = '';
                canvas.style.height = '';
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 防止页面滚动
        document.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
        }, { passive: false });

        const game = new Game();
    </script>
</body>
</html>
