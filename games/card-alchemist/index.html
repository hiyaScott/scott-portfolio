<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../favicon.ico">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌炼金术师 Card Alchemist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0f0f23 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffff;
            font-size: 16px;
            text-shadow: 0 0 10px #00ffff;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0080;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 30px #ff0080;
            display: none;
            text-align: center;
        }
        #help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
        }
    
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            text-decoration: none;
            font-family: monospace;
            z-index: 1000;
            transition: all 0.3s;
            border-radius: 4px;
            font-size: 14px;
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 返回主页</a>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>生命: <span id="health">100</span></div>
        <div>分数: <span id="score">0</span></div>
        <div>波次: <span id="wave">1</span></div>
    </div>
    <div id="gameOver">
        <div>GAME OVER</div>
        <div style="font-size: 24px; margin-top: 20px;">点击重新开始</div>
    </div>
    <div id="help">
        点击手牌选择 → 放入合成区 → 点击合成 → 点击敌人攻击
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 游戏状态
        const game = {
            health: 100,
            score: 0,
            wave: 1,
            gameOver: false,
            selectedCard: null,
            fusionSlots: [null, null],
            particles: [],
            enemies: [],
            hand: [],
            handSize: 6,
            fusionAnimation: 0,
            lastSpawnTime: 0,
            spawnInterval: 3000,
            combo: 0
        };
        
        // 元素类型定义
        const elements = {
            fire: { name: '火', color: '#ff4444', glow: '#ff8888', icon: '🔥', weakness: 'water' },
            water: { name: '水', color: '#4444ff', glow: '#8888ff', icon: '💧', weakness: 'thunder' },
            wind: { name: '风', color: '#44ff44', glow: '#88ff88', icon: '🌪️', weakness: 'ice' },
            earth: { name: '土', color: '#8B4513', glow: '#CD853F', icon: '🌍', weakness: 'wood' },
            thunder: { name: '雷', color: '#ffff00', glow: '#ffff88', icon: '⚡', weakness: 'earth' },
            ice: { name: '冰', color: '#00ffff', glow: '#88ffff', icon: '❄️', weakness: 'fire' },
            wood: { name: '木', color: '#228B22', glow: '#32CD32', icon: '🌿', weakness: 'fire' },
            steam: { name: '蒸汽', color: '#cccccc', glow: '#ffffff', icon: '💨', weakness: 'thunder' },
            mud: { name: '泥', color: '#8B7355', glow: '#A0522D', icon: '🟫', weakness: 'ice' }
        };
        
        // 合成配方
        const fusionRecipes = {
            'fire+wind': 'thunder',
            'wind+fire': 'thunder',
            'water+earth': 'wood',
            'earth+water': 'wood',
            'fire+water': 'steam',
            'water+fire': 'steam',
            'water+wind': 'ice',
            'wind+water': 'ice',
            'fire+earth': 'mud',
            'earth+fire': 'mud'
        };
        
        // 卡牌类
        class Card {
            constructor(element, isFusion = false) {
                this.element = element;
                this.isFusion = isFusion;
                this.x = 0;
                this.y = 0;
                this.width = 100;
                this.height = 140;
                this.hovered = false;
                this.selected = false;
                this.scale = 1;
            }
            
            draw(ctx, x, y) {
                this.x = x;
                this.y = y;
                
                const element = elements[this.element];
                const scale = this.selected ? 1.1 : (this.hovered ? 1.05 : 1);
                
                ctx.save();
                ctx.translate(x + this.width / 2, y + this.height / 2);
                ctx.scale(scale, scale);
                ctx.translate(-this.width / 2, -this.height / 2);
                
                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = element.glow;
                
                // 卡牌背景
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, this.width, this.height);
                
                // 霓虹边框
                ctx.strokeStyle = element.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(0, 0, this.width, this.height);
                
                // 内发光边框
                ctx.strokeStyle = element.glow;
                ctx.lineWidth = 1;
                ctx.strokeRect(5, 5, this.width - 10, this.height - 10);
                
                // 元素图标
                ctx.shadowBlur = 30;
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = element.color;
                ctx.fillText(element.icon, this.width / 2, this.height / 2 - 10);
                
                // 元素名称
                ctx.font = 'bold 16px Arial';
                ctx.fillStyle = element.color;
                ctx.fillText(element.name, this.width / 2, this.height - 25);
                
                // 合成标记
                if (this.isFusion) {
                    ctx.font = '12px Arial';
                    ctx.fillStyle = '#ffff00';
                    ctx.fillText('★合成', this.width / 2, 20);
                }
                
                ctx.restore();
            }
            
            contains(px, py) {
                return px >= this.x && px <= this.x + this.width &&
                       py >= this.y && py <= this.y + this.height;
            }
        }
        
        // 敌人类
        class Enemy {
            constructor(wave) {
                const elementKeys = Object.keys(elements).filter(k => !['steam', 'mud'].includes(k));
                this.element = elementKeys[Math.floor(Math.random() * elementKeys.length)];
                this.health = 30 + wave * 10;
                this.maxHealth = this.health;
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = -50;
                this.speed = 0.5 + wave * 0.1;
                this.radius = 35;
                this.angle = 0;
                this.damage = 10;
            }
            
            update() {
                this.y += this.speed;
                this.angle += 0.02;
                
                // 到达底部造成伤害
                if (this.y > canvas.height - 150) {
                    game.health -= this.damage;
                    updateUI();
                    return true; // 移除敌人
                }
                return false;
            }
            
            draw(ctx) {
                const element = elements[this.element];
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = element.glow;
                
                // 绘制几何形状
                ctx.fillStyle = element.color;
                ctx.beginPath();
                const sides = 6;
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const r = this.radius + Math.sin(this.angle * 3 + i) * 5;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                // 内部几何
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const r = this.radius * 0.6;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                // 中心图标
                ctx.rotate(-this.angle);
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = element.color;
                ctx.fillText(element.icon, 0, 0);
                
                ctx.restore();
                
                // 血条
                const barWidth = 60;
                const barHeight = 8;
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.radius - 20, barWidth, barHeight);
                
                const healthPercent = this.health / this.maxHealth;
                ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';
                ctx.fillRect(this.x - barWidth / 2, this.y - this.radius - 20, barWidth * healthPercent, barHeight);
                
                // 弱点提示
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#888';
                ctx.fillText(`怕${elements[element.weakness].name}`, this.x, this.y + this.radius + 15);
            }
            
            takeDamage(element) {
                const enemyElement = elements[this.element];
                let damage = 15;
                
                // 弱点判定
                if (enemyElement.weakness === element) {
                    damage *= 2.5;
                    createParticles(this.x, this.y, elements[element].color, 15);
                    showFloatingText(this.x, this.y - 40, '弱点！', '#ff0000');
                } else if (this.element === element) {
                    damage *= 0.5;
                    showFloatingText(this.x, this.y - 40, '抵抗', '#888');
                }
                
                this.health -= damage;
                return this.health <= 0;
            }
            
            contains(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius + 10;
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.color = color;
                this.size = 3 + Math.random() * 5;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                return this.life <= 0;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 浮动文字
        let floatingTexts = [];
        function showFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 1 });
        }
        
        // 创建粒子
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                game.particles.push(new Particle(x, y, color));
            }
        }
        
        // 初始化手牌
        function initHand() {
            const basicElements = ['fire', 'water', 'wind', 'earth', 'thunder', 'ice'];
            for (let i = 0; i < game.handSize; i++) {
                const element = basicElements[Math.floor(Math.random() * basicElements.length)];
                game.hand.push(new Card(element));
            }
        }
        
        // 抽卡
        function drawCard() {
            const basicElements = ['fire', 'water', 'wind', 'earth', 'thunder', 'ice'];
            if (game.hand.length < game.handSize) {
                const element = basicElements[Math.floor(Math.random() * basicElements.length)];
                game.hand.push(new Card(element));
            }
        }
        
        // 合成
        function fuseCards() {
            if (game.fusionSlots[0] && game.fusionSlots[1]) {
                const card1 = game.fusionSlots[0];
                const card2 = game.fusionSlots[1];
                const recipeKey = `${card1.element}+${card2.element}`;
                
                game.fusionAnimation = 30;
                
                // 创建合成粒子效果
                createParticles(canvas.width / 2, 200, '#ffff00', 20);
                
                if (fusionRecipes[recipeKey]) {
                    const resultElement = fusionRecipes[recipeKey];
                    game.fusionSlots = [null, null];
                    
                    // 动画结束后添加合成卡
                    setTimeout(() => {
                        const newCard = new Card(resultElement, true);
                        // 找到空槽或替换
                        game.fusionSlots[0] = newCard;
                        game.fusionSlots[1] = null;
                        showFloatingText(canvas.width / 2, 150, `合成成功！${elements[resultElement].name}`, elements[resultElement].color);
                        createParticles(canvas.width / 2, 200, elements[resultElement].color, 30);
                    }, 500);
                    
                    return true;
                } else {
                    // 合成失败
                    showFloatingText(canvas.width / 2, 150, '合成失败！', '#ff0000');
                    game.fusionSlots = [null, null];
                    return false;
                }
            }
            return false;
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('health').textContent = Math.max(0, game.health);
            document.getElementById('score').textContent = game.score;
            document.getElementById('wave').textContent = game.wave;
            
            if (game.health <= 0 && !game.gameOver) {
                game.gameOver = true;
                document.getElementById('gameOver').style.display = 'block';
            }
        }
        
        // 绘制背景
        function drawBackground() {
            // 网格效果
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 渐变遮罩
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(10, 10, 26, 0.8)');
            gradient.addColorStop(1, 'rgba(26, 10, 46, 0.9)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // 绘制合成区
        function drawFusionArea() {
            const centerX = canvas.width / 2;
            const slotY = 150;
            const slotSize = 120;
            
            // 合成区标题
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';
            ctx.fillText('合成区', centerX, slotY - 60);
            ctx.shadowBlur = 0;
            
            // 合成槽
            for (let i = 0; i < 2; i++) {
                const slotX = centerX - 150 + i * 200;
                
                // 槽位背景
                ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.strokeStyle = game.fusionSlots[i] ? elements[game.fusionSlots[i].element].color : 'rgba(0, 255, 255, 0.5)';
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.roundRect(slotX - slotSize / 2, slotY - slotSize / 2, slotSize, slotSize, 10);
                ctx.fill();
                ctx.stroke();
                
                // 绘制卡牌
                if (game.fusionSlots[i]) {
                    game.fusionSlots[i].draw(ctx, slotX - 50, slotY - 70);
                } else {
                    // 空槽提示
                    ctx.font = '40px Arial';
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('+', slotX, slotY);
                }
            }
            
            // 合成按钮
            const buttonY = slotY + 100;
            const buttonWidth = 120;
            const buttonHeight = 40;
            const canFuse = game.fusionSlots[0] && game.fusionSlots[1];
            
            ctx.fillStyle = canFuse ? '#00ff88' : '#444';
            ctx.strokeStyle = canFuse ? '#00ff88' : '#666';
            ctx.lineWidth = 2;
            
            if (game.fusionAnimation > 0) {
                ctx.fillStyle = '#ffff00';
                game.fusionAnimation--;
            }
            
            ctx.beginPath();
            ctx.roundRect(centerX - buttonWidth / 2, buttonY - buttonHeight / 2, buttonWidth, buttonHeight, 20);
            ctx.fill();
            ctx.stroke();
            
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = canFuse ? '#000' : '#888';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('合成', centerX, buttonY);
            
            // 重置按钮
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.roundRect(centerX - buttonWidth / 2 - 140, buttonY - buttonHeight / 2, buttonWidth, buttonHeight, 20);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.fillText('重置', centerX - 140, buttonY);
        }
        
        // 绘制手牌
        function drawHand() {
            const handY = canvas.height - 120;
            const cardSpacing = 110;
            const startX = canvas.width / 2 - (game.hand.length - 1) * cardSpacing / 2;
            
            for (let i = 0; i < game.hand.length; i++) {
                const card = game.hand[i];
                const cardX = startX + i * cardSpacing;
                
                // 扇形排列效果
                const angle = (i - (game.hand.length - 1) / 2) * 0.1;
                
                ctx.save();
                ctx.translate(cardX + card.width / 2, handY + card.height / 2);
                ctx.rotate(angle);
                ctx.translate(-card.width / 2, -card.height / 2);
                
                card.draw(ctx, 0, 0);
                
                ctx.restore();
            }
        }
        
        // 游戏循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            // 更新和绘制敌人
            for (let i = game.enemies.length - 1; i >= 0; i--) {
                const enemy = game.enemies[i];
                if (enemy.update()) {
                    game.enemies.splice(i, 1);
                } else if (enemy.health <= 0) {
                    game.score += 10;
                    game.enemies.splice(i, 1);
                    drawCard();
                    updateUI();
                } else {
                    enemy.draw(ctx);
                }
            }
            
            // 生成敌人
            const now = Date.now();
            if (now - game.lastSpawnTime > game.spawnInterval) {
                game.enemies.push(new Enemy(game.wave));
                game.lastSpawnTime = now;
                game.spawnInterval = Math.max(1500, 3000 - game.wave * 100);
            }
            
            // 波次更新
            if (game.score > game.wave * 100) {
                game.wave++;
                updateUI();
            }
            
            drawFusionArea();
            drawHand();
            
            // 更新和绘制粒子
            for (let i = game.particles.length - 1; i >= 0; i--) {
                const particle = game.particles[i];
                if (particle.update()) {
                    game.particles.splice(i, 1);
                } else {
                    particle.draw(ctx);
                }
            }
            
            // 绘制浮动文字
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.y -= 1;
                ft.life -= 0.02;
                
                if (ft.life <= 0) {
                    floatingTexts.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = ft.life;
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = ft.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ft.color;
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.restore();
                }
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // 鼠标处理
        let draggedCard = null;
        let dragOffset = { x: 0, y: 0 };
        
        function getCardAtPosition(x, y) {
            const handY = canvas.height - 120;
            const cardSpacing = 110;
            const startX = canvas.width / 2 - (game.hand.length - 1) * cardSpacing / 2;
            
            for (let i = 0; i < game.hand.length; i++) {
                const card = game.hand[i];
                const cardX = startX + i * cardSpacing;
                
                // 简单的矩形检测
                if (x >= cardX - 10 && x <= cardX + card.width + 10 &&
                    y >= handY && y <= handY + card.height) {
                    return { card, index: i };
                }
            }
            return null;
        }
        
        function getFusionSlotAtPosition(x, y) {
            const centerX = canvas.width / 2;
            const slotY = 150;
            const slotSize = 120;
            
            for (let i = 0; i < 2; i++) {
                const slotX = centerX - 150 + i * 200;
                if (x >= slotX - slotSize / 2 && x <= slotX + slotSize / 2 &&
                    y >= slotY - slotSize / 2 && y <= slotY + slotSize / 2) {
                    return i;
                }
            }
            return -1;
        }
        
        function getEnemyAtPosition(x, y) {
            for (const enemy of game.enemies) {
                if (enemy.contains(x, y)) {
                    return enemy;
                }
            }
            return null;
        }
        
        // 检查按钮点击
        function checkButtonClick(x, y) {
            const centerX = canvas.width / 2;
            const buttonY = 250;
            const buttonWidth = 120;
            const buttonHeight = 40;
            
            // 合成按钮
            if (x >= centerX - buttonWidth / 2 && x <= centerX + buttonWidth / 2 &&
                y >= buttonY - buttonHeight / 2 && y <= buttonY + buttonHeight / 2) {
                fuseCards();
                return true;
            }
            
            // 重置按钮
            if (x >= centerX - buttonWidth / 2 - 140 && x <= centerX + buttonWidth / 2 - 140 &&
                y >= buttonY - buttonHeight / 2 && y <= buttonY + buttonHeight / 2) {
                game.fusionSlots = [null, null];
                return true;
            }
            
            return false;
        }
        
        // 攻击敌人
        function attackEnemy(enemy, slotIndex) {
            const card = game.fusionSlots[slotIndex];
            if (!card) return false;
            
            // 创建攻击效果
            createParticles(enemy.x, enemy.y, elements[card.element].color, 10);
            
            const killed = enemy.takeDamage(card.element);
            
            if (killed) {
                createParticles(enemy.x, enemy.y, '#ffff00', 30);
                game.score += 20;
                updateUI();
            }
            
            // 消耗卡牌
            game.fusionSlots[slotIndex] = null;
            
            return true;
        }
        
        canvas.addEventListener('mousedown', (e) => {
            if (game.gameOver) {
                // 重新开始
                game.health = 100;
                game.score = 0;
                game.wave = 1;
                game.gameOver = false;
                game.enemies = [];
                game.fusionSlots = [null, null];
                game.hand = [];
                game.particles = [];
                game.lastSpawnTime = Date.now();
                floatingTexts = [];
                document.getElementById('gameOver').style.display = 'none';
                initHand();
                updateUI();
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 检查按钮
            if (checkButtonClick(x, y)) return;
            
            // 检查点击敌人（攻击）
            const enemy = getEnemyAtPosition(x, y);
            if (enemy) {
                // 优先使用第一个槽位的卡牌
                if (game.fusionSlots[0]) {
                    attackEnemy(enemy, 0);
                } else if (game.fusionSlots[1]) {
                    attackEnemy(enemy, 1);
                }
                return;
            }
            
            // 检查点击手牌
            const cardInfo = getCardAtPosition(x, y);
            if (cardInfo) {
                draggedCard = cardInfo;
                return;
            }
            
            // 检查点击合成区卡牌
            const slotIndex = getFusionSlotAtPosition(x, y);
            if (slotIndex >= 0 && game.fusionSlots[slotIndex]) {
                // 将卡牌返回手牌
                if (game.hand.length < game.handSize) {
                    game.hand.push(game.fusionSlots[slotIndex]);
                    game.fusionSlots[slotIndex] = null;
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 更新卡牌悬停状态
            const cardInfo = getCardAtPosition(x, y);
            game.hand.forEach(card => card.hovered = false);
            if (cardInfo) {
                cardInfo.card.hovered = true;
                canvas.style.cursor = 'pointer';
            } else {
                canvas.style.cursor = 'default';
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (!draggedCard) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 检查是否放入合成槽
            const slotIndex = getFusionSlotAtPosition(x, y);
            if (slotIndex >= 0 && !game.fusionSlots[slotIndex]) {
                game.fusionSlots[slotIndex] = draggedCard.card;
                game.hand.splice(draggedCard.index, 1);
                createParticles(x, y, elements[draggedCard.card.element].color, 10);
            }
            
            draggedCard = null;
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const mouseEvent = new MouseEvent('mouseup', {
                clientX: e.changedTouches[0].clientX,
                clientY: e.changedTouches[0].clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // 初始化游戏
        initHand();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
