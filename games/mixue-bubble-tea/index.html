<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
 <title>hiya Max奶茶店</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
 <style>
 * { -webkit-tap-highlight-color: transparent; }
 
 body {
 font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
 overscroll-behavior-y: contain;
 user-select: none;
 touch-action: manipulation;
 }

 /* 漂浮气泡 */
 .bubble {
 position: fixed;
 border-radius: 50%;
 animation: floatUp linear infinite;
 z-index: 5;
 pointer-events: none;
 opacity: 0.6;
 }
 @keyframes floatUp {
 0% { transform: translateY(100vh) scale(0); opacity: 0; }
 10% { opacity: 0.6; }
 90% { opacity: 0.6; }
 100% { transform: translateY(-20vh) scale(1); opacity: 0; }
 }

 /* Max击掌小人弹跳 */
 .max-character {
 animation: bounce 2s ease-in-out infinite;
 }
 @keyframes bounce {
 0%, 100% { transform: translateY(0); }
 50% { transform: translateY(-15px); }
 }

 /* 奶茶杯 */
 .cup {
 width: 85px;
 height: 110px;
 background: linear-gradient(to bottom, #fff 0%, #f5f5f5 100%);
 border: 3px solid #0d9488;
 border-radius: 0 0 14px 14px;
 position: relative;
 overflow: hidden;
 transition: all 0.3s;
 }
 .cup::before {
 content: '';
 position: absolute;
 top: -10px;
 left: 50%;
 transform: translateX(-50%);
 width: 70px;
 height: 10px;
 background: #0d9488;
 border-radius: 50%;
 }
 .cup-straw {
 position: absolute;
 top: -28px;
 left: 50%;
 transform: translateX(-50%);
 width: 6px;
 height: 40px;
 background: #f59e0b;
 border-radius: 4px;
 }
 .cup-content {
 position: absolute;
 bottom: 0;
 left: 0;
 right: 0;
 transition: height 0.5s ease;
 border-radius: 0 0 10px 10px;
 }

 /* 原料 - 紧凑网格 */
 .ingredient {
 cursor: pointer;
 transition: transform 0.1s, box-shadow 0.1s;
 }
 .ingredient:active {
 transform: scale(0.92);
 }
 .ingredient.dragging {
 opacity: 0.4;
 }

 /* 顾客 */
 .customer {
 animation: customerEnter 0.4s ease-out;
 }
 @keyframes customerEnter {
 from { transform: translateX(80px); opacity: 0; }
 to { transform: translateX(0); opacity: 1; }
 }
 .customer-leave {
 animation: customerLeave 0.4s ease-in forwards;
 }
 @keyframes customerLeave {
 to { transform: translateX(-80px); opacity: 0; }
 }

 /* 耐心条 */
 .patience-bar {
 transition: width 0.1s linear;
 }

 /* 反馈动画 */
 .feedback-popup {
 animation: popUp 0.7s ease-out forwards;
 pointer-events: none;
 }
 @keyframes popUp {
 0% { transform: scale(0) translateY(0); opacity: 1; }
 50% { transform: scale(1.2) translateY(-15px); opacity: 1; }
 100% { transform: scale(1) translateY(-40px); opacity: 0; }
 }

 /* 开始按钮 */
 .start-btn {
 background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
 box-shadow: 0 6px 0 #115e59, 0 10px 15px rgba(0,0,0,0.2);
 transition: all 0.1s;
 }
 .start-btn:active {
 transform: translateY(6px);
 box-shadow: 0 0 0 #115e59, 0 3px 8px rgba(0,0,0,0.2);
 }

 .shake {
 animation: shake 0.4s;
 }
 @keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-8px); }
 75% { transform: translateX(8px); }
 }

 .pulse-glow {
 animation: pulseGlow 0.8s infinite;
 }
 @keyframes pulseGlow {
 0%, 100% { box-shadow: 0 0 5px rgba(13, 148, 136, 0.5); }
 50% { box-shadow: 0 0 18px rgba(13, 148, 136, 0.8); }
 }

 /* 原料网格 */
 .ingredient-grid {
 display: grid;
 grid-template-columns: repeat(5, 1fr);
 gap: 4px;
 }
 
 @media (min-width: 640px) {
 .cup { width: 100px; height: 130px; }
 .cup::before { width: 80px; height: 12px; top: -12px; }
 .cup-straw { top: -35px; height: 50px; width: 7px; }
 .ingredient-grid { gap: 6px; }
 }
 </style>
</head>
<body class="h-[100dvh] bg-gradient-to-b from-teal-500 via-teal-300 to-amber-50 relative overflow-hidden">

 <!-- 漂浮气泡容器 -->
 <div id="bubble-container"></div>

 <!-- 开始页面 -->
 <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center z-10 px-4">
 <div class="max-character mb-4">
 <svg width="120" height="155" viewBox="0 0 140 180" xmlns="http://www.w3.org/2000/svg">

 <circle cx="70" cy="65" r="32" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
 <path d="M 45 55 Q 55 35 70 33 Q 85 35 95 55" fill="none" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>
 <path d="M 50 50 Q 60 38 70 38 Q 80 38 90 50" fill="#4b5563"/>
 <ellipse cx="60" cy="62" rx="4" ry="5" fill="#1f2937"/>
 <ellipse cx="80" cy="62" rx="4" ry="5" fill="#1f2937"/>
 <circle cx="61" cy="60" r="1.5" fill="white"/>
 <circle cx="81" cy="60" r="1.5" fill="white"/>
 <path d="M 58 75 Q 70 84 82 75" fill="none" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>
 <circle cx="52" cy="72" r="4" fill="#fca5a5" opacity="0.6"/>
 <circle cx="88" cy="72" r="4" fill="#fca5a5" opacity="0.6"/>
 <line x1="52" y1="105" x2="32" y2="125" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>

 <line x1="88" y1="100" x2="115" y2="55" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
 <circle cx="118" cy="50" r="10" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
 <line x1="112" y1="42" x2="124" y2="42" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>

 <line x1="116" y1="52" x2="120" y2="52" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
 <line x1="60" y1="148" x2="55" y2="168" stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
 <line x1="80" y1="148" x2="85" y2="168" stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
 <ellipse cx="53" cy="170" rx="10" ry="5" fill="#f97316"/>
 <ellipse cx="87" cy="170" rx="10" ry="5" fill="#f97316"/>
 </svg>
 </div>

 <h1 class="text-3xl sm:text-5xl text-white mb-1 drop-shadow-lg text-center" style="text-shadow: 2px 2px 0 #0f766e;">hiya Max奶茶店</h1>
 <p class="text-base sm:text-xl text-teal-900 mb-6 font-bold">奶茶版分手厨房 🧋</p>

 <button id="start-btn" class="start-btn text-white text-xl sm:text-3xl px-10 py-3 sm:py-5 rounded-2xl font-bold w-full max-w-[280px]">
 开始游戏
 </button>
 </div>

 <!-- 游戏页面 -->
 <div id="game-screen" class="hidden h-[100dvh] z-10 flex flex-col">
 <!-- 顶部信息栏 -->
 <div class="flex justify-between items-center px-3 py-1.5 bg-white/90 shadow flex-shrink-0">
 <div class="flex items-center gap-3">
 <div class="text-sm text-teal-600 font-bold">⏱️<span id="timer">60</span></div>
 <div class="text-sm text-teal-600 font-bold">⭐<span id="score">0</span></div>
 </div>
 <div class="text-sm text-teal-600 font-bold">✅<span id="success-count">0</span> ❌<span id="fail-count">0</span></div>
 </div>

 <!-- 顾客区域 -->
 <div id="customer-area" class="flex justify-center items-end pt-1 h-24 relative flex-shrink-0"></div>

 <!-- 杯子区域 -->
 <div class="flex-1 flex flex-col items-center justify-center min-h-0">
 <div class="relative flex flex-col items-center">
 <div class="cup-straw"></div>
 <div id="cup" class="cup flex items-end justify-center">
 <div id="cup-content" class="cup-content w-full" style="height: 0%;"></div>
 </div>
 <div id="cup-label" class="text-center mt-1 text-teal-700 font-bold text-xs">空杯子</div>
 
 <div class="flex gap-2 mt-2">
 <button id="submit-btn" class="bg-teal-500 active:bg-teal-600 text-white px-4 py-1.5 rounded-lg font-bold shadow text-sm">提交！</button>
 <button id="clear-btn" class="bg-gray-400 active:bg-gray-500 text-white px-3 py-1.5 rounded-lg font-bold shadow text-sm">清空</button>
 </div>
 </div>
 </div>

 <!-- 原料区域 - 2行5列网格 -->
 <div class="bg-white/95 rounded-t-xl shadow-lg p-2 flex-shrink-0">
 <div id="ingredients" class="ingredient-grid">
 <!-- 原料会动态生成 -->
 </div>
 </div>
 </div>

 <!-- 结果页面 -->
 <div id="result-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center z-20 bg-black/50 backdrop-blur-sm px-4">
 <div class="bg-white rounded-2xl p-5 sm:p-8 shadow-2xl text-center max-w-[320px] w-full">
 <div class="text-5xl mb-2">🎉</div>
 <h2 class="text-2xl sm:text-3xl text-teal-600 font-bold mb-3">游戏结束！</h2>

 <div class="space-y-2 mb-4">
 <div class="flex justify-between items-center bg-teal-50 p-3 rounded-lg">
 <span class="text-teal-700 font-bold text-sm">✅ 成功制作</span>
 <span id="result-success" class="text-xl text-teal-600 font-bold">0</span>
 </div>
 <div class="flex justify-between items-center bg-teal-50 p-3 rounded-lg">
 <span class="text-teal-700 font-bold text-sm">❌ 失败次数</span>
 <span id="result-fail" class="text-xl text-teal-600 font-bold">0</span>
 </div>
 <div class="flex justify-between items-center bg-gradient-to-r from-teal-100 to-teal-200 p-3 rounded-lg">
 <span class="text-teal-800 font-bold text-sm">🏆 最终得分</span>
 <span id="result-score" class="text-2xl text-teal-600 font-bold">0</span>
 </div>
 </div>

 <div id="result-message" class="text-sm text-teal-600 mb-4 font-bold"></div>

 <button id="restart-btn" class="start-btn text-white text-lg px-8 py-2.5 rounded-xl font-bold">
 再来一局
 </button>
 </div>
 </div>

 <!-- 反馈弹窗容器 -->
 <div id="feedback-container" class="fixed inset-0 pointer-events-none z-50"></div>

 <script>
 // ==================== 游戏数据 ====================
 const INGREDIENTS = [
 { id: 'milk_tea', name: '奶茶底', emoji: '🍵', color: '#C4A77D' },
 { id: 'green_tea', name: '绿茶底', emoji: '🌿', color: '#90EE90' },
 { id: 'black_tea', name: '红茶底', emoji: '🫖', color: '#8B4513' },
 { id: 'milk', name: '牛奶', emoji: '🥛', color: '#FFFDD0' },
 { id: 'pearl', name: '珍珠', emoji: '⚫', color: '#2D2D2D' },
 { id: 'coconut', name: '椰果', emoji: '🥥', color: '#FFF8DC' },
 { id: 'pudding', name: '布丁', emoji: '🍮', color: '#FFE4B5' },
 { id: 'red_bean', name: '红豆', emoji: '🔴', color: '#8B0000' },
 { id: 'sugar', name: '糖浆', emoji: '🍯', color: '#FFD700' },
 { id: 'ice', name: '冰块', emoji: '🧊', color: '#E0FFFF' },
 ];

 const RECIPES = [
 { name: '珍珠奶茶', ingredients: ['milk_tea', 'pearl', 'sugar'], emoji: '🧋' },
 { name: '椰果奶茶', ingredients: ['milk_tea', 'coconut', 'sugar'], emoji: '🥥' },
 { name: '布丁奶茶', ingredients: ['milk_tea', 'pudding', 'sugar'], emoji: '🍮' },
 { name: '红豆奶茶', ingredients: ['milk_tea', 'red_bean', 'sugar'], emoji: '🔴' },
 { name: '绿茶拿铁', ingredients: ['green_tea', 'milk', 'ice'], emoji: '🍃' },
 { name: '红茶拿铁', ingredients: ['black_tea', 'milk', 'ice'], emoji: '☕' },
 { name: '珍珠绿茶', ingredients: ['green_tea', 'pearl', 'sugar'], emoji: '🌱' },
 { name: '椰果红茶', ingredients: ['black_tea', 'coconut', 'sugar'], emoji: '🍂' },
 ];

 const CUSTOMER_AVATARS = ['👧', '👦', '👩', '👨', '👵', '👴', '👱‍♀️', '👱‍♂️', '🧑', '👩‍🦰'];

 // ==================== 游戏状态 ====================
 let gameState = {
 score: 0, successCount: 0, failCount: 0, timeLeft: 60,
 currentOrder: null, cupIngredients: [], isPlaying: false,
 timerInterval: null, patienceInterval: null,
 currentPatience: 100, maxPatience: 100, customerPatienceDecrease: 0.5,
 };

 // ==================== DOM 元素 ====================
 const startScreen = document.getElementById('start-screen');
 const gameScreen = document.getElementById('game-screen');
 const resultScreen = document.getElementById('result-screen');
 const startBtn = document.getElementById('start-btn');
 const restartBtn = document.getElementById('restart-btn');
 const submitBtn = document.getElementById('submit-btn');
 const clearBtn = document.getElementById('clear-btn');
 const cup = document.getElementById('cup');
 const cupContent = document.getElementById('cup-content');
 const cupLabel = document.getElementById('cup-label');
 const ingredientsContainer = document.getElementById('ingredients');
 const customerArea = document.getElementById('customer-area');
 const feedbackContainer = document.getElementById('feedback-container');

 // ==================== 漂浮气泡 ====================
 function createBubbles() {
 const container = document.getElementById('bubble-container');
 const colors = ['rgba(13,148,136,0.3)', 'rgba(245,158,11,0.3)', 'rgba(255,255,255,0.4)'];
 for (let i = 0; i < 15; i++) {
 const bubble = document.createElement('div');
 bubble.className = 'bubble';
 const size = Math.random() * 16 + 6;
 bubble.style.width = size + 'px';
 bubble.style.height = size + 'px';
 bubble.style.left = Math.random() * 100 + 'vw';
 bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
 bubble.style.animationDuration = (Math.random() * 4 + 3) + 's';
 bubble.style.animationDelay = Math.random() * 6 + 's';
 container.appendChild(bubble);
 }
 }

 // ==================== 初始化原料台 - 紧凑网格 ====================
 function initIngredients() {
 ingredientsContainer.innerHTML = '';
 INGREDIENTS.forEach(ing => {
 const div = document.createElement('div');
 div.className = 'ingredient bg-white border border-teal-200 rounded-lg py-1 px-0.5 flex flex-col items-center shadow-sm active:shadow-md';
 div.dataset.id = ing.id;
 div.innerHTML = `
 <span class="text-lg sm:text-2xl leading-none">${ing.emoji}</span>
 <span class="text-[10px] sm:text-xs text-teal-700 font-bold mt-0.5">${ing.name}</span>
 `;
 div.addEventListener('click', () => addIngredientToCup(ing.id));
 ingredientsContainer.appendChild(div);
 });
 }

 // ==================== 添加原料到杯子 ====================
 function addIngredientToCup(ingredientId) {
 if (!gameState.isPlaying) return;
 const ingredient = INGREDIENTS.find(i => i.id === ingredientId);
 if (!ingredient) return;

 if (gameState.cupIngredients.length >= 5) {
 showFeedback('满了！', '⚠️', '#f59e0b');
 cup.classList.add('shake');
 setTimeout(() => cup.classList.remove('shake'), 400);
 return;
 }

 gameState.cupIngredients.push(ingredient);
 updateCupVisual();

 // 脉冲反馈
 cup.classList.add('pulse-glow');
 setTimeout(() => cup.classList.remove('pulse-glow'), 400);
 }

 function updateCupVisual() {
 const height = Math.min(gameState.cupIngredients.length * 20, 100);
 cupContent.style.height = height + '%';

 if (gameState.cupIngredients.length > 0) {
 const colors = gameState.cupIngredients.map(i => i.color);
 cupContent.style.background = colors.length === 1 
 ? colors[0] 
 : `linear-gradient(to top, ${colors.join(', ')})`;
 } else {
 cupContent.style.background = 'transparent';
 }

 cupLabel.textContent = gameState.cupIngredients.length === 0 
 ? '空杯子' 
 : gameState.cupIngredients.map(i => i.name).join('+');
 }

 // ==================== 顾客系统 ====================
 function spawnCustomer() {
 if (!gameState.isPlaying) return;

 const recipe = RECIPES[Math.floor(Math.random() * RECIPES.length)];
 gameState.currentOrder = recipe;
 gameState.currentPatience = gameState.maxPatience;

 const avatar = CUSTOMER_AVATARS[Math.floor(Math.random() * CUSTOMER_AVATARS.length)];

 customerArea.innerHTML = `
 <div id="customer" class="customer flex flex-col items-center">
 <div class="order-bubble mb-1">
 <div class="text-lg">${recipe.emoji}</div>
 <div class="text-teal-700 font-bold text-xs">${recipe.name}</div>
 <div class="text-[10px] text-gray-500 mt-0.5">${recipe.ingredients.map(id => INGREDIENTS.find(i => i.id === id).emoji).join(' ')}</div>
 </div>
 <div class="text-3xl">${avatar}</div>
 <div class="w-20 h-2.5 bg-gray-200 rounded-full mt-1 overflow-hidden border border-teal-300">
 <div id="patience-bar" class="patience-bar h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full" style="width: 100%"></div>
 </div>
 </div>
 `;

 startPatienceTimer();
 }

 function startPatienceTimer() {
 if (gameState.patienceInterval) clearInterval(gameState.patienceInterval);

 gameState.patienceInterval = setInterval(() => {
 if (!gameState.isPlaying) return;

 gameState.currentPatience -= gameState.customerPatienceDecrease;
 const bar = document.getElementById('patience-bar');
 if (bar) {
 bar.style.width = gameState.currentPatience + '%';
 if (gameState.currentPatience > 60) {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full';
 } else if (gameState.currentPatience > 30) {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-yellow-400 to-yellow-500 rounded-full';
 } else {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-red-400 to-red-500 rounded-full';
 }
 }

 if (gameState.currentPatience <= 0) {
 handleOrderFail('顾客等不及走掉了！');
 }
 }, 100);
 }

 // ==================== 提交订单 ====================
 submitBtn.addEventListener('click', () => {
 if (!gameState.isPlaying || !gameState.currentOrder) return;

 const orderIngIds = [...gameState.currentOrder.ingredients].sort();
 const cupIngIds = gameState.cupIngredients.map(i => i.id).sort();

 const isCorrect = JSON.stringify(orderIngIds) === JSON.stringify(cupIngIds);

 if (isCorrect) {
 handleOrderSuccess();
 } else {
 handleOrderFail('配方不对哦！');
 }
 });

 clearBtn.addEventListener('click', () => {
 gameState.cupIngredients = [];
 updateCupVisual();
 });

 function handleOrderSuccess() {
 gameState.successCount++;
 const bonus = Math.ceil(gameState.currentPatience / 10);
 const points = 100 + bonus * 10;
 gameState.score += points;

 updateUI();
 showFeedback(`+${points}分！`, '✅', '#22c55e');

 const customer = document.getElementById('customer');
 if (customer) {
 customer.innerHTML += '<div class="text-2xl absolute -top-1">😊</div>';
 customer.classList.add('customer-leave');
 }

 gameState.cupIngredients = [];
 updateCupVisual();

 setTimeout(() => {
 if (gameState.isPlaying) spawnCustomer();
 }, 700);
 }

 function handleOrderFail(reason) {
 gameState.failCount++;
 updateUI();
 showFeedback(reason, '❌', '#ef4444');

 const customer = document.getElementById('customer');
 if (customer) {
 customer.innerHTML += '<div class="text-2xl absolute -top-1">😠</div>';
 customer.classList.add('customer-leave');
 }

 gameState.cupIngredients = [];
 updateCupVisual();

 setTimeout(() => {
 if (gameState.isPlaying) spawnCustomer();
 }, 700);
 }

 // ==================== 反馈弹窗 ====================
 function showFeedback(text, emoji, color) {
 const div = document.createElement('div');
 div.className = 'feedback-popup fixed text-2xl font-bold z-50';
 div.style.color = color;
 div.style.left = '50%';
 div.style.top = '38%';
 div.style.transform = 'translateX(-50%)';
 div.innerHTML = `<div class="text-center">${emoji}<br><span class="text-base">${text}</span></div>`;
 feedbackContainer.appendChild(div);
 setTimeout(() => div.remove(), 800);
 }

 // ==================== 更新UI ====================
 function updateUI() {
 document.getElementById('score').textContent = gameState.score;
 document.getElementById('success-count').textContent = gameState.successCount;
 document.getElementById('fail-count').textContent = gameState.failCount;
 }

 // ==================== 计时器 ====================
 function startTimer() {
 gameState.timerInterval = setInterval(() => {
 gameState.timeLeft--;
 document.getElementById('timer').textContent = gameState.timeLeft;

 if (gameState.timeLeft <= 10) {
 document.getElementById('timer').classList.add('text-red-600', 'animate-pulse');
 }

 if (gameState.timeLeft <= 0) {
 endGame();
 }
 }, 1000);
 }

 // ==================== 游戏控制 ====================
 function startGame() {
 gameState = {
 score: 0, successCount: 0, failCount: 0, timeLeft: 60,
 currentOrder: null, cupIngredients: [], isPlaying: true,
 timerInterval: null, patienceInterval: null,
 currentPatience: 100, maxPatience: 100, customerPatienceDecrease: 0.5,
 };

 startScreen.classList.add('hidden');
 resultScreen.classList.add('hidden');
 gameScreen.classList.remove('hidden');

 updateUI();
 document.getElementById('timer').textContent = '60';
 document.getElementById('timer').classList.remove('text-red-600', 'animate-pulse');

 initIngredients();
 updateCupVisual();

 spawnCustomer();
 startTimer();
 }

 function endGame() {
 gameState.isPlaying = false;
 clearInterval(gameState.timerInterval);
 clearInterval(gameState.patienceInterval);

 gameScreen.classList.add('hidden');
 resultScreen.classList.remove('hidden');

 document.getElementById('result-success').textContent = gameState.successCount;
 document.getElementById('result-fail').textContent = gameState.failCount;
 document.getElementById('result-score').textContent = gameState.score;

 let message = '';
 if (gameState.score >= 800) {
 message = '🏆 奶茶大师！Max为你点赞！';
 } else if (gameState.score >= 500) {
 message = '⭐ 优秀店员！顾客们都爱死你啦！';
 } else if (gameState.score >= 200) {
 message = '👍 不错的开始！继续加油！';
 } else {
