<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>hiya Max奶茶店</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
 <style>
 * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
 
 body {
 font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
 user-select: none;
 -webkit-user-select: none;
 overflow: hidden;
 }

 /* 背景粒子 */
 .particle {
 position: fixed;
 border-radius: 50%;
 pointer-events: none;
 z-index: 1;
 animation: float linear infinite;
 }
 @keyframes float {
 0% { transform: translateY(100vh) scale(0); opacity: 0; }
 10% { opacity: 1; }
 90% { opacity: 1; }
 100% { transform: translateY(-10vh) scale(1); opacity: 0; }
 }

 /* Max 击掌动画 */
 .max-character {
 animation: highFive 2s ease-in-out infinite;
 transform-origin: bottom center;
 }
 @keyframes highFive {
 0%, 100% { transform: rotate(-3deg) translateY(0); }
 25% { transform: rotate(3deg) translateY(-8px); }
 50% { transform: rotate(-3deg) translateY(0); }
 75% { transform: rotate(3deg) translateY(-4px); }
 }

 /* 奶茶杯 */
 .cup {
 width: 100px;
 height: 130px;
 background: linear-gradient(to bottom, #fff 0%, #f5f5f5 100%);
 border: 3px solid #ff6b6b;
 border-radius: 0 0 16px 16px;
 position: relative;
 overflow: hidden;
 transition: all 0.3s;
 }
 .cup::before {
 content: '';
 position: absolute;
 top: -12px;
 left: 50%;
 transform: translateX(-50%);
 width: 80px;
 height: 12px;
 background: #ff6b6b;
 border-radius: 50%;
 }
 .cup-straw {
 position: absolute;
 top: -35px;
 left: 50%;
 transform: translateX(-50%);
 width: 6px;
 height: 50px;
 background: #ffd93d;
 border-radius: 3px;
 }
 .cup-content {
 position: absolute;
 bottom: 0;
 left: 0;
 right: 0;
 transition: height 0.5s ease;
 border-radius: 0 0 13px 13px;
 }

 /* 原料 */
 .ingredient {
 cursor: grab;
 transition: transform 0.15s, box-shadow 0.15s;
 position: relative;
 touch-action: none;
 }
 .ingredient:active {
 transform: scale(1.15);
 }
 .ingredient.dragging {
 opacity: 0.5;
 transform: scale(1.2);
 }

 /* 顾客 */
 .customer {
 animation: customerEnter 0.5s ease-out;
 }
 @keyframes customerEnter {
 from { transform: translateX(60px); opacity: 0; }
 to { transform: translateX(0); opacity: 1; }
 }
 .customer-leave {
 animation: customerLeave 0.5s ease-in forwards;
 }
 @keyframes customerLeave {
 to { transform: translateX(-60px); opacity: 0; }
 }

 /* 耐心条 */
 .patience-bar {
 transition: width 0.1s linear;
 }

 /* 反馈动画 */
 .feedback-popup {
 animation: popUp 0.8s ease-out forwards;
 }
 @keyframes popUp {
 0% { transform: scale(0) translateY(0); opacity: 1; }
 50% { transform: scale(1.3) translateY(-15px); opacity: 1; }
 100% { transform: scale(1) translateY(-40px); opacity: 0; }
 }

 /* 开始按钮 */
 .start-btn {
 background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
 box-shadow: 0 6px 0 #c92a2a, 0 10px 20px rgba(0,0,0,0.15);
 transition: all 0.1s;
 }
 .start-btn:active {
 transform: translateY(6px);
 box-shadow: 0 0 0 #c92a2a, 0 4px 8px rgba(0,0,0,0.15);
 }

 /* 拖拽时的幽灵元素 */
 .drag-ghost {
 position: fixed;
 pointer-events: none;
 z-index: 1000;
 transform: scale(1.2);
 opacity: 0.9;
 }

 /* 订单气泡 */
 .order-bubble {
 position: relative;
 background: white;
 border: 2px solid #ff6b6b;
 border-radius: 16px;
 padding: 8px 12px;
 }
 .order-bubble::after {
 content: '';
 position: absolute;
 bottom: -8px;
 left: 50%;
 transform: translateX(-50%);
 border-width: 8px 8px 0;
 border-style: solid;
 border-color: #ff6b6b transparent transparent transparent;
 }

 .shake {
 animation: shake 0.4s;
 }
 @keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-8px); }
 75% { transform: translateX(8px); }
 }

 .pulse-glow {
 animation: pulseGlow 1s infinite;
 }
 @keyframes pulseGlow {
 0%, 100% { box-shadow: 0 0 5px rgba(255, 107, 107, 0.5); }
 50% { box-shadow: 0 0 15px rgba(255, 107, 107, 0.8); }
 }

 /* 手机适配 */
 @media (max-width: 640px) {
 .cup { width: 85px; height: 110px; }
 .cup-straw { top: -28px; height: 40px; }
 .game-title { font-size: 2rem !important; }
 .game-subtitle { font-size: 1rem !important; }
 .start-btn { font-size: 1.5rem !important; padding: 12px 40px !important; }
 .ingredient { padding: 6px !important; width: 64px !important; }
 .ingredient .text-3xl { font-size: 1.5rem !important; }
 .ingredient .text-xs { font-size: 10px !important; }
 #submit-btn, #clear-btn { font-size: 14px !important; padding: 6px 12px !important; }
 .customer-area { height: 140px !important; }
 }
 </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-orange-400 via-pink-300 to-yellow-100 relative">

 <!-- 背景粒子 -->
 <div id="particle-container"></div>

 <!-- 开始页面 -->
 <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center z-10 px-4">
 <!-- Max 击掌小人 -->
 <div class="max-character mb-6">
 <svg width="100" height="140" viewBox="0 0 100 140">
 <!-- 身体 -->
 <ellipse cx="50" cy="110" rx="25" ry="22" fill="#ffd93d" stroke="#333" stroke-width="2"/>
 <!-- 头 -->
 <circle cx="50" cy="55" r="30" fill="#ffd93d" stroke="#333" stroke-width="2"/>
 <!-- 头发 -->
 <path d="M20 45 Q30 20 50 25 Q70 20 80 45" fill="#ff6b6b" stroke="#333" stroke-width="2"/>
 <!-- 眼睛 -->
 <circle cx="40" cy="52" r="4" fill="#333"/>
 <circle cx="60" cy="52" r="4" fill="#333"/>
 <!-- 眨眼 -->
 <ellipse cx="40" cy="52" rx="5" ry="1" fill="#ffd93d" opacity="0">
 <animate attributeName="opacity" values="0;0;1;0;0" dur="3s" repeatCount="indefinite"/>
 </ellipse>
 <!-- 嘴巴（大笑） -->
 <path d="M38 62 Q50 72 62 62" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
 <!-- 腮红 -->
 <circle cx="32" cy="58" r="5" fill="#ff9999" opacity="0.6"/>
 <circle cx="68" cy="58" r="5" fill="#ff9999" opacity="0.6"/>
 <!-- 左手（击掌） -->
 <path d="M20 85 Q5 60 15 40" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
 <circle cx="15" cy="35" r="8" fill="#ffd93d" stroke="#333" stroke-width="2"/>
 <!-- 右手（拿奶茶） -->
 <path d="M80 85 Q95 70 85 55" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
 <!-- 奶茶杯 -->
 <rect x="75" y="35" width="18" height="24" rx="3" fill="#e11d48" stroke="#333" stroke-width="1.5"/>
 <rect x="78" y="30" width="12" height="5" rx="2" fill="#333"/>
 <line x1="84" y1="30" x2="84" y2="20" stroke="#ffd93d" stroke-width="2"/>
 <!-- 腿 -->
 <line x1="40" y1="132" x2="35" y2="140" stroke="#333" stroke-width="3" stroke-linecap="round"/>
 <line x1="60" y1="132" x2="65" y2="140" stroke="#333" stroke-width="3" stroke-linecap="round"/>
 </svg>
 </div>

 <h1 class="text-5xl sm:text-6xl text-white mb-1 drop-shadow-lg text-center" style="text-shadow: 2px 2px 0 #e11d48;">hiya Max</h1>
 <p class="text-2xl text-pink-700 mb-1 font-bold text-center">奶茶店</p>
 <p class="text-lg text-pink-800 mb-8 font-bold text-center opacity-80">（奶茶版分手厨房）</p>

 <button id="start-btn" class="start-btn text-white text-2xl sm:text-3xl px-12 sm:px-16 py-4 sm:py-5 rounded-2xl font-bold">
 开始营业 🧋
 </button>

 <div class="mt-6 text-pink-700 text-base sm:text-lg bg-white/70 px-4 sm:px-6 py-2 sm:py-3 rounded-xl text-center">
 🎮 拖拽原料 → 制作奶茶 → 满足顾客！
 </div>
 </div>

 <!-- 游戏页面 -->
 <div id="game-screen" class="hidden absolute inset-0 z-10 flex flex-col">
 <!-- 顶部信息栏 -->
 <div class="flex justify-between items-center px-3 sm:px-6 py-2 sm:py-3 bg-white/90 shadow-lg shrink-0">
 <div class="flex items-center gap-2 sm:gap-4">
 <div class="text-lg sm:text-2xl text-pink-600 font-bold">⏱️ <span id="timer">60</span></div>
 <div class="text-lg sm:text-2xl text-pink-600 font-bold">⭐ <span id="score">0</span></div>
 </div>
 <div class="text-sm sm:text-2xl text-pink-600 font-bold">✅ <span id="success-count">0</span> | ❌ <span id="fail-count">0</span></div>
 </div>

 <!-- 顾客区域 -->
 <div id="customer-area" class="customer-area flex justify-center items-end mt-2 sm:mt-4 h-36 sm:h-48 relative shrink-0">
 <!-- 顾客动态插入 -->
 </div>

 <!-- 奶茶杯区域 -->
 <div class="flex justify-center items-center mt-2 sm:mt-4 h-36 sm:h-44 shrink-0">
 <div class="relative flex items-center gap-4">
 <div class="relative">
 <div class="cup-straw"></div>
 <div id="cup" class="cup flex items-end justify-center">
 <div id="cup-content" class="cup-content w-full" style="height: 0%;"></div>
 </div>
 <div id="cup-label" class="text-center mt-1 text-pink-700 font-bold text-xs sm:text-sm">空杯子</div>
 </div>
 <div class="flex flex-col gap-2">
 <button id="submit-btn" class="bg-pink-500 active:bg-pink-600 text-white px-3 sm:px-4 py-2 rounded-xl font-bold shadow-lg text-sm sm:text-base">
 提交！
 </button>
 <button id="clear-btn" class="bg-gray-400 active:bg-gray-500 text-white px-3 sm:px-4 py-1 rounded-lg text-xs sm:text-sm shadow">
 清空
 </button>
 </div>
 </div>
 </div>

 <!-- 原料区域 -->
 <div class="mt-auto bg-white/95 rounded-t-3xl shadow-2xl p-3 sm:p-6 shrink-0">
 <div class="text-center text-pink-600 font-bold mb-2 sm:mb-3 text-lg sm:text-xl">🧋 原料台</div>
 <div id="ingredients" class="flex justify-center gap-2 sm:gap-4 flex-wrap">
 <!-- 原料动态生成 -->
 </div>
 </div>
 </div>

 <!-- 结果页面 -->
 <div id="result-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center z-20 bg-black/50 backdrop-blur-sm px-4">
 <div class="bg-white rounded-3xl p-6 sm:p-10 shadow-2xl text-center max-w-sm w-full">
 <div class="text-5xl sm:text-6xl mb-4">🎉</div>
 <h2 class="text-3xl sm:text-4xl text-pink-600 font-bold mb-4 sm:mb-6">打烊啦！</h2>

 <div class="space-y-3 sm:space-y-4 mb-6 sm:mb-8">
 <div class="flex justify-between items-center bg-pink-50 p-3 sm:p-4 rounded-xl">
 <span class="text-pink-700 font-bold text-base sm:text-xl">✅ 成功制作</span>
 <span id="result-success" class="text-2xl sm:text-3xl text-pink-600 font-bold">0</span>
 </div>
 <div class="flex justify-between items-center bg-pink-50 p-3 sm:p-4 rounded-xl">
 <span class="text-pink-700 font-bold text-base sm:text-xl">❌ 失败次数</span>
 <span id="result-fail" class="text-2xl sm:text-3xl text-pink-600 font-bold">0</span>
 </div>
 <div class="flex justify-between items-center bg-gradient-to-r from-pink-100 to-pink-200 p-3 sm:p-4 rounded-xl">
 <span class="text-pink-800 font-bold text-base sm:text-xl">🏆 最终得分</span>
 <span id="result-score" class="text-3xl sm:text-4xl text-pink-600 font-bold">0</span>
 </div>
 </div>

 <div id="result-message" class="text-base sm:text-lg text-pink-600 mb-4 sm:mb-6 font-bold"></div>

 <button id="restart-btn" class="start-btn text-white text-xl sm:text-2xl px-10 sm:px-12 py-3 sm:py-4 rounded-2xl font-bold">
 再来一局 🧋
 </button>
 </div>
 </div>

 <!-- 反馈弹窗容器 -->
 <div id="feedback-container" class="fixed inset-0 pointer-events-none z-50"></div>

 <script>
 // ==================== 游戏数据 ====================
 const INGREDIENTS = [
 { id: 'milk_tea', name: '奶茶底', emoji: '🍵', color: '#C4A77D', type: 'base' },
 { id: 'green_tea', name: '绿茶底', emoji: '🌿', color: '#90EE90', type: 'base' },
 { id: 'black_tea', name: '红茶底', emoji: '🫖', color: '#8B4513', type: 'base' },
 { id: 'milk', name: '牛奶', emoji: '🥛', color: '#FFFDD0', type: 'milk' },
 { id: 'pearl', name: '珍珠', emoji: '⚫', color: '#2D2D2D', type: 'topping' },
 { id: 'coconut', name: '椰果', emoji: '🥥', color: '#FFF8DC', type: 'topping' },
 { id: 'pudding', name: '布丁', emoji: '🍮', color: '#FFE4B5', type: 'topping' },
 { id: 'red_bean', name: '红豆', emoji: '🔴', color: '#8B0000', type: 'topping' },
 { id: 'sugar', name: '糖浆', emoji: '🍯', color: '#FFD700', type: 'syrup' },
 { id: 'ice', name: '冰块', emoji: '🧊', color: '#E0FFFF', type: 'ice' },
 ];

 const RECIPES = [
 { name: '珍珠奶茶', ingredients: ['milk_tea', 'pearl', 'sugar'], emoji: '🧋' },
 { name: '椰果奶茶', ingredients: ['milk_tea', 'coconut', 'sugar'], emoji: '🥥' },
 { name: '布丁奶茶', ingredients: ['milk_tea', 'pudding', 'sugar'], emoji: '🍮' },
 { name: '红豆奶茶', ingredients: ['milk_tea', 'red_bean', 'sugar'], emoji: '🔴' },
 { name: '绿茶拿铁', ingredients: ['green_tea', 'milk', 'ice'], emoji: '🍃' },
 { name: '红茶拿铁', ingredients: ['black_tea', 'milk', 'ice'], emoji: '☕' },
 { name: '珍珠绿茶', ingredients: ['green_tea', 'pearl', 'sugar'], emoji: '🌱' },
 { name: '椰果红茶', ingredients: ['black_tea', 'coconut', 'sugar'], emoji: '🍂' },
 ];

 const CUSTOMER_AVATARS = ['👧', '👦', '👩', '👨', '👵', '👴', '👱‍♀️', '👱‍♂️', '🧑', '👩‍🦰'];

 // ==================== 游戏状态 ====================
 let gameState = {
 score: 0,
 successCount: 0,
 failCount: 0,
 timeLeft: 60,
 currentOrder: null,
 cupIngredients: [],
 isPlaying: false,
 timerInterval: null,
 patienceInterval: null,
 currentPatience: 100,
 maxPatience: 100,
 customerPatienceDecrease: 0.5,
 };

 // ==================== DOM 元素 ====================
 const startScreen = document.getElementById('start-screen');
 const gameScreen = document.getElementById('game-screen');
 const resultScreen = document.getElementById('result-screen');
 const startBtn = document.getElementById('start-btn');
 const restartBtn = document.getElementById('restart-btn');
 const submitBtn = document.getElementById('submit-btn');
 const clearBtn = document.getElementById('clear-btn');
 const cup = document.getElementById('cup');
 const cupContent = document.getElementById('cup-content');
 const cupLabel = document.getElementById('cup-label');
 const ingredientsContainer = document.getElementById('ingredients');
 const customerArea = document.getElementById('customer-area');
 const feedbackContainer = document.getElementById('feedback-container');

 // ==================== 背景粒子 ====================
 function createParticles() {
 const container = document.getElementById('particle-container');
 const colors = ['#ff6b6b', '#ffd93d', '#6bcf7f', '#4ecdc4', '#ff9999'];

 for (let i = 0; i < 30; i++) {
 const p = document.createElement('div');
 p.className = 'particle';
 const size = Math.random() * 10 + 4;
 p.style.width = size + 'px';
 p.style.height = size + 'px';
 p.style.background = colors[Math.floor(Math.random() * colors.length)];
 p.style.left = Math.random() * 100 + 'vw';
 p.style.animationDuration = (Math.random() * 6 + 4) + 's';
 p.style.animationDelay = Math.random() * 5 + 's';
 p.style.opacity = Math.random() * 0.4 + 0.2;
 container.appendChild(p);
 }
 }

 // ==================== 初始化原料台 ====================
 function initIngredients() {
 ingredientsContainer.innerHTML = '';
 INGREDIENTS.forEach(ing => {
 const div = document.createElement('div');
 div.className = 'ingredient bg-white border-2 border-pink-200 rounded-xl p-2 sm:p-3 flex flex-col items-center gap-1 shadow-md active:shadow-xl w-16 sm:w-20';
 div.draggable = true;
 div.dataset.id = ing.id;
 div.innerHTML = `
 <span class="text-2xl sm:text-3xl">${ing.emoji}</span>
 <span class="text-[10px] sm:text-xs text-pink-700 font-bold">${ing.name}</span>
 `;

 // 拖拽事件
 div.addEventListener('dragstart', handleDragStart);
 div.addEventListener('dragend', handleDragEnd);

 // 触摸事件（移动端）
 div.addEventListener('touchstart', handleTouchStart, { passive: false });
 div.addEventListener('touchmove', handleTouchMove, { passive: false });
 div.addEventListener('touchend', handleTouchEnd);

 ingredientsContainer.appendChild(div);
 });
 }

 // ==================== 拖拽逻辑 ====================
 let draggedElement = null;
 let dragGhost = null;

 function handleDragStart(e) {
 draggedElement = e.target.closest('.ingredient');
 if (draggedElement) {
 draggedElement.classList.add('dragging');
 e.dataTransfer.effectAllowed = 'copy';
 }
 }

 function handleDragEnd(e) {
 if (draggedElement) {
 draggedElement.classList.remove('dragging');
 draggedElement = null;
 }
 }

 // 触摸拖拽
 let touchDragItem = null;
 let touchOffsetX = 0;
 let touchOffsetY = 0;

 function handleTouchStart(e) {
 e.preventDefault();
 const touch = e.touches[0];
 touchDragItem = e.target.closest('.ingredient');
 if (!touchDragItem) return;
 const rect = touchDragItem.getBoundingClientRect();
 touchOffsetX = touch.clientX - rect.left;
 touchOffsetY = touch.clientY - rect.top;

 dragGhost = touchDragItem.cloneNode(true);
 dragGhost.classList.add('drag-ghost');
 dragGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
 dragGhost.style.top = (touch.clientY - touchOffsetY) + 'px';
 document.body.appendChild(dragGhost);
 touchDragItem.style.opacity = '0.5';
 }

 function handleTouchMove(e) {
 e.preventDefault();
 if (!dragGhost) return;
 const touch = e.touches[0];
 dragGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
 dragGhost.style.top = (touch.clientY - touchOffsetY) + 'px';
 }

 function handleTouchEnd(e) {
 if (!touchDragItem) return;
 const touch = e.changedTouches[0];
 const cupRect = cup.getBoundingClientRect();

 // 扩大判定区域方便手机操作
 const margin = 20;
 if (touch.clientX >= cupRect.left - margin && touch.clientX <= cupRect.right + margin &&
 touch.clientY >= cupRect.top - margin && touch.clientY <= cupRect.bottom + margin) {
 addIngredientToCup(touchDragItem.dataset.id);
 }

 if (dragGhost) {
 dragGhost.remove();
 dragGhost = null;
 }
 touchDragItem.style.opacity = '1';
 touchDragItem = null;
 }

 // 杯子接收拖拽
 cup.addEventListener('dragover', (e) => {
 e.preventDefault();
 e.dataTransfer.dropEffect = 'copy';
 cup.classList.add('pulse-glow');
 });

 cup.addEventListener('dragleave', () => {
 cup.classList.remove('pulse-glow');
 });

 cup.addEventListener('drop', (e) => {
 e.preventDefault();
 cup.classList.remove('pulse-glow');
 if (draggedElement) {
 addIngredientToCup(draggedElement.dataset.id);
 }
 });

 // ==================== 添加原料到杯子 ====================
 function addIngredientToCup(ingredientId) {
 if (!gameState.isPlaying) return;

 const ingredient = INGREDIENTS.find(i => i.id === ingredientId);
 if (!ingredient) return;

 if (gameState.cupIngredients.length >= 5) {
 showFeedback('满啦！', '⚠️', '#f59e0b');
 cup.classList.add('shake');
 setTimeout(() => cup.classList.remove('shake'), 400);
 return;
 }

 gameState.cupIngredients.push(ingredient);
 updateCupVisual();

 // 视觉反馈
 const ripple = document.createElement('div');
 ripple.className = 'absolute inset-0 bg-white/30 rounded-full animate-ping';
 cup.appendChild(ripple);
 setTimeout(() => ripple.remove(), 500);
 }

 function updateCupVisual() {
 const height = Math.min(gameState.cupIngredients.length * 20, 100);
 cupContent.style.height = height + '%';

 if (gameState.cupIngredients.length > 0) {
 const colors = gameState.cupIngredients.map(i => i.color);
 const gradient = colors.length === 1
 ? colors[0]
 : `linear-gradient(to top, ${colors.join(', ')})`;
 cupContent.style.background = gradient;
 } else {
 cupContent.style.background = 'transparent';
 }

 if (gameState.cupIngredients.length === 0) {
 cupLabel.textContent = '空杯子';
 } else {
 const names = gameState.cupIngredients.map(i => i.name).join(' + ');
 cupLabel.textContent = names;
 }
 }

 // ==================== 顾客系统 ====================
 function spawnCustomer() {
 if (!gameState.isPlaying) return;

 const recipe = RECIPES[Math.floor(Math.random() * RECIPES.length)];
 gameState.currentOrder = recipe;
 gameState.currentPatience = gameState.maxPatience;

 const avatar = CUSTOMER_AVATARS[Math.floor(Math.random() * CUSTOMER_AVATARS.length)];

 customerArea.innerHTML = `
 <div id="customer" class="customer flex flex-col items-center">
 <div class="order-bubble mb-2 sm:mb-3">
 <div class="text-xl sm:text-2xl">${recipe.emoji}</div>
 <div class="text-pink-700 font-bold text-xs sm:text-sm">${recipe.name}</div>
 <div class="text-[10px] sm:text-xs text-gray-500 mt-1">
 ${recipe.ingredients.map(id => INGREDIENTS.find(i => i.id === id).emoji).join(' ')}
 </div>
 </div>
 <div class="text-4xl sm:text-6xl">${avatar}</div>
 <div class="w-24 sm:w-32 h-3 sm:h-4 bg-gray-200 rounded-full mt-2 overflow-hidden border-2 border-pink-300">
 <div id="patience-bar" class="patience-bar h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full" style="width: 100%"></div>
 </div>
 </div>
 `;

 startPatienceTimer();
 }

 function startPatienceTimer() {
 if (gameState.patienceInterval) clearInterval(gameState.patienceInterval);

 gameState.patienceInterval = setInterval(() => {
 if (!gameState.isPlaying) return;

 gameState.currentPatience -= gameState.customerPatienceDecrease;
 const bar = document.getElementById('patience-bar');
 if (bar) {
 bar.style.width = gameState.currentPatience + '%';

 if (gameState.currentPatience > 60) {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full';
 } else if (gameState.currentPatience > 30) {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-yellow-400 to-yellow-500 rounded-full';
 } else {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-red-400 to-red-500 rounded-full';
 }
 }

 if (gameState.currentPatience <= 0) {
 handleOrderFail('顾客等不及走掉了！');
 }
 }, 100);
 }

 // ==================== 提交订单 ====================
 submitBtn.addEventListener('click', () => {
 if (!gameState.isPlaying || !gameState.currentOrder) return;

 const orderIngIds = [...gameState.currentOrder.ingredients].sort();
 const cupIngIds = gameState.cupIngredients.map(i => i.id).sort();

 const isCorrect = JSON.stringify(orderIngIds) === JSON.stringify(cupIngIds);

 if (isCorrect) {
 handleOrderSuccess();
 } else {
 handleOrderFail('配方不对哦！');
 }
 });

 clearBtn.addEventListener('click', () => {
 gameState.cupIngredients = [];
 updateCupVisual();
 });

 function handleOrderSuccess() {
 gameState.successCount++;
 const bonus = Math.ceil(gameState.currentPatience / 10);
 const points = 100 + bonus * 10;
 gameState.score += points;

 updateUI();
 showFeedback(`+${points}分！`, '✅', '#22c55e');

 const customer = document.getElementById('customer');
 if (customer) {
 customer.innerHTML += '<div class="text-3xl sm:text-4xl absolute -top-2 sm:-top-4">😊</div>';
 customer.classList.add('customer-leave');
 }

 gameState.cupIngredients = [];
 updateCupVisual();

 setTimeout(() => {
 if (gameState.isPlaying) spawnCustomer();
 }, 800);
 }

 function handleOrderFail(reason) {
 gameState.failCount++;
 updateUI();
 showFeedback(reason, '❌', '#ef4444');

 const customer = document.getElementById('customer');
 if (customer) {
 customer.innerHTML += '<div class="text-3xl sm:text-4xl absolute -top-2 sm:-top-4">😠</div>';
 customer.classList.add('customer-leave');
 }

 gameState.cupIngredients = [];
 updateCupVisual();

 setTimeout(() => {
 if (gameState.isPlaying) spawnCustomer();
 }, 800);
 }

 // ==================== 反馈弹窗 ====================
 function showFeedback(text, emoji, color) {
 const div = document.createElement('div');
 div.className = 'feedback-popup fixed text-3xl sm:text-4xl font-bold z-50';
 div.style.color = color;
 div.style.left = '50%';
 div.style.top = '35%';
 div.style.transform = 'translateX(-50%)';
 div.innerHTML = `<div class="text-center">${emoji}<br><span class="text-lg sm:text-2xl">${text}</span></div>`;
 feedbackContainer.appendChild(div);

 setTimeout(() => div.remove(), 1000);
 }

 // ==================== 更新UI ====================
 function updateUI() {
 document.getElementById('score').textContent = gameState.score;
 document.getElementById('success-count').textContent = gameState.successCount;
 document.getElementById('fail-count').textContent = gameState.failCount;
 }

 // ==================== 计时器 ====================
 function startTimer() {
 gameState.timerInterval = setInterval(() => {
 gameState.timeLeft--;
 document.getElementById('timer').textContent = gameState.timeLeft;

 if (gameState.timeLeft <= 10) {
 document.getElementById('timer').classList.add('text-red-600', 'animate-pulse');
 }

 if (gameState.timeLeft <= 0) {
 endGame();
 }
 }, 1000);
 }

 // ==================== 游戏控制 ====================
 function startGame() {
 gameState = {
 score: 0,
 successCount: 0,
 failCount: 0,
 timeLeft: 60,
 currentOrder: null,
 cupIngredients: [],
 isPlaying: true,
 timerInterval: null,
 patienceInterval: null,
 currentPatience: 100,
 maxPatience: 100,
 customerPatienceDecrease: 0.5,
 };

 startScreen.classList.add('hidden');
 resultScreen.classList.add('hidden');
 gameScreen.classList.remove('hidden');

 updateUI();
 document.getElementById('timer').textContent = '60';
 document.getElementById('timer').classList.remove('text-red-600', 'animate-pulse');

 initIngredients();
 updateCupVisual();

 spawnCustomer();
 startTimer();
 }

 function endGame() {
 gameState.isPlaying = false;
 clearInterval(gameState.timerInterval);
 clearInterval(gameState.patienceInterval);

 gameScreen.classList.add('hidden');
 resultScreen.classList.remove('hidden');

 document.getElementById('result-success').textContent = gameState.successCount;
 document.getElementById('result-fail').textContent = gameState.failCount;
 document.getElementById('result-score').textContent = gameState.score;

 let message = '';
 if (gameState.score >= 800) {
 message = '🏆 奶茶大师！Max为你点赞！';
 } else if (gameState.score >= 500) {
 message = '⭐ 优秀店员！顾客都爱死你啦！';
 } else if (gameState.score >= 200) {
 message = '👍 不错的开始！继续加油！';
 } else {
 message = '💪 别灰心，多练习就能成为奶茶达人！';
 }
 document.getElementById('result-message').textContent = message;
 }

 // ==================== 事件绑定 ====================
 startBtn.addEventListener('click', startGame);
 restartBtn.addEventListener('click', startGame);

 // ==================== 初始化 ====================
 createParticles();
 </script>
</body>
</html>
