<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
 <title>hiya Max奶茶店</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
 <style>
 * { -webkit-tap-highlight-color: transparent; }
 
 body {
 font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
 overscroll-behavior-y: contain;
 user-select: none;
 touch-action: manipulation;
 }

 /* 漂浮气泡 */
 .bubble {
 position: fixed;
 border-radius: 50%;
 animation: floatUp linear infinite;
 z-index: 5;
 pointer-events: none;
 opacity: 0.6;
 }
 @keyframes floatUp {
 0% { transform: translateY(100vh) scale(0); opacity: 0; }
 10% { opacity: 0.6; }
 90% { opacity: 0.6; }
 100% { transform: translateY(-20vh) scale(1); opacity: 0; }
 }

 /* Max击掌小人弹跳 */
 .max-character {
 animation: bounce 2s ease-in-out infinite;
 }
 @keyframes bounce {
 0%, 100% { transform: translateY(0); }
 50% { transform: translateY(-15px); }
 }

 /* 奶茶杯 */
 .cup {
 width: 100px;
 height: 130px;
 background: linear-gradient(to bottom, #fff 0%, #f5f5f5 100%);
 border: 4px solid #0d9488;
 border-radius: 0 0 18px 18px;
 position: relative;
 overflow: hidden;
 transition: all 0.3s;
 flex-shrink: 0;
 }
 .cup::before {
 content: '';
 position: absolute;
 top: -12px;
 left: 50%;
 transform: translateX(-50%);
 width: 80px;
 height: 12px;
 background: #0d9488;
 border-radius: 50%;
 }
 .cup-straw {
 position: absolute;
 top: -35px;
 left: 50%;
 transform: translateX(-50%);
 width: 7px;
 height: 50px;
 background: #f59e0b;
 border-radius: 4px;
 }
 .cup-content {
 position: absolute;
 bottom: 0;
 left: 0;
 right: 0;
 transition: height 0.5s ease;
 border-radius: 0 0 14px 14px;
 }

 /* 原料 */
 .ingredient {
 cursor: grab;
 transition: transform 0.15s, box-shadow 0.15s;
 position: relative;
 flex-shrink: 0;
 }
 .ingredient:active {
 transform: scale(0.95);
 }
 .ingredient.dragging {
 opacity: 0.4;
 transform: scale(1.15);
 }

 /* 顾客 */
 .customer {
 animation: customerEnter 0.4s ease-out;
 }
 @keyframes customerEnter {
 from { transform: translateX(80px); opacity: 0; }
 to { transform: translateX(0); opacity: 1; }
 }
 .customer-leave {
 animation: customerLeave 0.4s ease-in forwards;
 }
 @keyframes customerLeave {
 to { transform: translateX(-80px); opacity: 0; }
 }

 /* 耐心条 */
 .patience-bar {
 transition: width 0.1s linear;
 }

 /* 反馈动画 */
 .feedback-popup {
 animation: popUp 0.7s ease-out forwards;
 pointer-events: none;
 }
 @keyframes popUp {
 0% { transform: scale(0) translateY(0); opacity: 1; }
 50% { transform: scale(1.2) translateY(-15px); opacity: 1; }
 100% { transform: scale(1) translateY(-40px); opacity: 0; }
 }

 /* 开始按钮 */
 .start-btn {
 background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
 box-shadow: 0 6px 0 #115e59, 0 10px 15px rgba(0,0,0,0.2);
 transition: all 0.1s;
 }
 .start-btn:active {
 transform: translateY(6px);
 box-shadow: 0 0 0 #115e59, 0 3px 8px rgba(0,0,0,0.2);
 }

 /* 拖拽时的幽灵元素 */
 .drag-ghost {
 position: fixed;
 pointer-events: none;
 z-index: 1000;
 transform: scale(1.2);
 opacity: 0.85;
 }

 /* 订单气泡 */
 .order-bubble {
 position: relative;
 background: white;
 border: 3px solid #0d9488;
 border-radius: 16px;
 padding: 8px 12px;
 }
 .order-bubble::after {
 content: '';
 position: absolute;
 bottom: -8px;
 left: 50%;
 transform: translateX(-50%);
 border-width: 8px 8px 0;
 border-style: solid;
 border-color: #0d9488 transparent transparent transparent;
 }

 .shake {
 animation: shake 0.4s;
 }
 @keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-8px); }
 75% { transform: translateX(8px); }
 }

 .pulse-glow {
 animation: pulseGlow 0.8s infinite;
 }
 @keyframes pulseGlow {
 0%, 100% { box-shadow: 0 0 5px rgba(13, 148, 136, 0.5); }
 50% { box-shadow: 0 0 18px rgba(13, 148, 136, 0.8); }
 }

 /* 手机专用布局 */
 @media (max-width: 640px) {
 .cup { width: 85px; height: 110px; }
 .cup-straw { top: -28px; height: 40px; width: 6px; }
 }
 
 /* 防止iOS橡皮筋 */
 .game-container {
 overscroll-behavior-y: none;
 }
 </style>
</head>
<body class="h-[100dvh] bg-gradient-to-b from-teal-500 via-teal-300 to-amber-50 relative overflow-hidden">

 <!-- 漂浮气泡容器 -->
 <div id="bubble-container"></div>

 <!-- 开始页面 -->
 <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center z-10 px-4">
 <!-- Max击掌小人 -->
 <div class="max-character mb-6">
 <svg width="140" height="180" viewBox="0 0 140 180" xmlns="http://www.w3.org/2000/svg">

 <!-- 头发 -->
 <path d="M 45 55 Q 55 35 70 33 Q 85 35 95 55" fill="none" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>

 <circle cx="81" cy="60" r="1.5" fill="white"/>

 <!-- 右手（击掌姿势！高举） -->
 <line x1="88" y1="100" x2="115" y2="55" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
 <circle cx="118" cy="50" r="10" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
 
 <!-- 手掌细节（击掌线条） -->
 <line x1="112" y1="42" x2="124" y2="42" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
 <line x1="114" y1="47" x2="122" y2="47" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
 <line x1="116" y1="52" x2="120" y2="52" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
 
 <!-- 腿部 -->
 <line x1="60" y1="148" x2="55" y2="168" stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
 <line x1="80" y1="148" x2="85" y2="168" stroke="#0d9488" stroke-width="10" stroke-linecap="round"/>
 
 <!-- 鞋子 -->
 <ellipse cx="53" cy="170" rx="10" ry="5" fill="#f97316"/>
 <ellipse cx="87" cy="170" rx="10" ry="5" fill="#f97316"/>
 </svg>
 </div>

 <h1 class="text-4xl sm:text-5xl text-white mb-1 drop-shadow-lg text-center" style="text-shadow: 2px 2px 0 #0f766e;">hiya Max奶茶店</h1>
 <p class="text-lg sm:text-xl text-teal-900 mb-8 font-bold">奶茶版分手厨房 🧋</p>

 <button id="start-btn" class="start-btn text-white text-2xl sm:text-3xl px-10 sm:px-16 py-4 sm:py-5 rounded-2xl font-bold w-full max-w-xs">
 开始游戏
 </button>

 <div class="mt-6 text-teal-800 text-base bg-white/70 px-5 py-3 rounded-xl text-center max-w-xs">
 🎮 拖拽原料制作奶茶，满足顾客需求！
 </div>
 </div>

 <!-- 游戏页面 -->
 <div id="game-screen" class="hidden h-[100dvh] z-10 flex flex-col">
 <!-- 顶部信息栏 -->
 <div class="flex justify-between items-center px-3 sm:px-6 py-2 bg-white/90 shadow-lg flex-shrink-0">
 <div class="flex items-center gap-2 sm:gap-4">
 <div class="text-base sm:text-xl text-teal-600 font-bold">⏱️ <span id="timer">60</span>秒</div>
 <div class="text-base sm:text-xl text-teal-600 font-bold">⭐ <span id="score">0</span></div>
 </div>
 <div class="text-base sm:text-xl text-teal-600 font-bold">✅ <span id="success-count">0</span> | ❌ <span id="fail-count">0</span></div>
 </div>

 <!-- 顾客区域 -->
 <div id="customer-area" class="flex justify-center items-end mt-2 h-28 sm:h-36 relative flex-shrink-0">
 <!-- 顾客会动态插入这里 -->
 </div>

 <!-- 中间区域：杯子+按钮 -->
 <div class="flex-1 flex flex-col items-center justify-center min-h-0 px-4">
 <div class="relative flex flex-col items-center">
 <div class="cup-straw"></div>
 <div id="cup" class="cup flex items-end justify-center">
 <div id="cup-content" class="cup-content w-full" style="height: 0%;"></div>
 </div>
 <div id="cup-label" class="text-center mt-1 text-teal-700 font-bold text-xs sm:text-sm">空杯子</div>
 
 <!-- 按钮组 -->
 <div class="flex gap-3 mt-3">
 <button id="submit-btn" class="bg-teal-500 active:bg-teal-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg transition-all active:scale-95 text-sm sm:text-base">
 提交！
 </button>
 <button id="clear-btn" class="bg-gray-400 active:bg-gray-500 text-white px-4 py-2 rounded-xl font-bold shadow transition-all active:scale-95 text-sm sm:text-base">
 清空
 </button>
 </div>
 </div>
 </div>

 <!-- 原料区域 -->
 <div class="bg-white/95 rounded-t-2xl shadow-2xl p-3 sm:p-4 flex-shrink-0">
 <div class="text-center text-teal-600 font-bold mb-2 text-sm sm:text-base">🧋 原料台</div>
 <div id="ingredients" class="flex gap-2 overflow-x-auto pb-2 px-1 justify-start sm:justify-center" style="-webkit-overflow-scrolling: touch;">
 <!-- 原料会动态生成 -->
 </div>
 </div>
 </div>

 <!-- 结果页面 -->
 <div id="result-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center z-20 bg-black/50 backdrop-blur-sm px-4">
 <div class="bg-white rounded-3xl p-6 sm:p-10 shadow-2xl text-center max-w-sm w-full">
 <div class="text-5xl sm:text-6xl mb-3">🎉</div>
 <h2 class="text-3xl sm:text-4xl text-teal-600 font-bold mb-4">游戏结束！</h2>

 <div class="space-y-3 mb-6">
 <div class="flex justify-between items-center bg-teal-50 p-3 sm:p-4 rounded-xl">
 <span class="text-teal-700 font-bold text-base sm:text-xl">✅ 成功制作</span>
 <span id="result-success" class="text-2xl sm:text-3xl text-teal-600 font-bold">0</span>
 </div>
 <div class="flex justify-between items-center bg-teal-50 p-3 sm:p-4 rounded-xl">
 <span class="text-teal-700 font-bold text-base sm:text-xl">❌ 失败次数</span>
 <span id="result-fail" class="text-2xl sm:text-3xl text-teal-600 font-bold">0</span>
 </div>
 <div class="flex justify-between items-center bg-gradient-to-r from-teal-100 to-teal-200 p-3 sm:p-4 rounded-xl">
 <span class="text-teal-800 font-bold text-base sm:text-xl">🏆 最终得分</span>
 <span id="result-score" class="text-3xl sm:text-4xl text-teal-600 font-bold">0</span>
 </div>
 </div>

 <div id="result-message" class="text-base sm:text-lg text-teal-600 mb-4 font-bold"></div>

 <button id="restart-btn" class="start-btn text-white text-xl sm:text-2xl px-8 sm:px-12 py-3 sm:py-4 rounded-2xl font-bold">
 再来一局
 </button>
 </div>
 </div>

 <!-- 反馈弹窗容器 -->
 <div id="feedback-container" class="fixed inset-0 pointer-events-none z-50"></div>

 <script>
 // ==================== 游戏数据 ====================
 const INGREDIENTS = [
 { id: 'milk_tea', name: '奶茶底', emoji: '🍵', color: '#C4A77D', type: 'base' },
 { id: 'green_tea', name: '绿茶底', emoji: '🌿', color: '#90EE90', type: 'base' },
 { id: 'black_tea', name: '红茶底', emoji: '🫖', color: '#8B4513', type: 'base' },
 { id: 'milk', name: '牛奶', emoji: '🥛', color: '#FFFDD0', type: 'milk' },
 { id: 'pearl', name: '珍珠', emoji: '⚫', color: '#2D2D2D', type: 'topping' },
 { id: 'coconut', name: '椰果', emoji: '🥥', color: '#FFF8DC', type: 'topping' },
 { id: 'pudding', name: '布丁', emoji: '🍮', color: '#FFE4B5', type: 'topping' },
 { id: 'red_bean', name: '红豆', emoji: '🔴', color: '#8B0000', type: 'topping' },
 { id: 'sugar', name: '糖浆', emoji: '🍯', color: '#FFD700', type: 'syrup' },
 { id: 'ice', name: '冰块', emoji: '🧊', color: '#E0FFFF', type: 'ice' },
 ];

 const RECIPES = [
 { name: '珍珠奶茶', ingredients: ['milk_tea', 'pearl', 'sugar'], emoji: '🧋' },
 { name: '椰果奶茶', ingredients: ['milk_tea', 'coconut', 'sugar'], emoji: '🥥' },
 { name: '布丁奶茶', ingredients: ['milk_tea', 'pudding', 'sugar'], emoji: '🍮' },
 { name: '红豆奶茶', ingredients: ['milk_tea', 'red_bean', 'sugar'], emoji: '🔴' },
 { name: '绿茶拿铁', ingredients: ['green_tea', 'milk', 'ice'], emoji: '🍃' },
 { name: '红茶拿铁', ingredients: ['black_tea', 'milk', 'ice'], emoji: '☕' },
 { name: '珍珠绿茶', ingredients: ['green_tea', 'pearl', 'sugar'], emoji: '🌱' },
 { name: '椰果红茶', ingredients: ['black_tea', 'coconut', 'sugar'], emoji: '🍂' },
 ];

 const CUSTOMER_AVATARS = ['👧', '👦', '👩', '👨', '👵', '👴', '👱‍♀️', '👱‍♂️', '🧑', '👩‍🦰'];

 // ==================== 游戏状态 ====================
 let gameState = {
 score: 0,
 successCount: 0,
 failCount: 0,
 timeLeft: 60,
 currentOrder: null,
 cupIngredients: [],
 isPlaying: false,
 timerInterval: null,
 patienceInterval: null,
 currentPatience: 100,
 maxPatience: 100,
 customerPatienceDecrease: 0.5,
 };

 // ==================== DOM 元素 ====================
 const startScreen = document.getElementById('start-screen');
 const gameScreen = document.getElementById('game-screen');
 const resultScreen = document.getElementById('result-screen');
 const startBtn = document.getElementById('start-btn');
 const restartBtn = document.getElementById('restart-btn');
 const submitBtn = document.getElementById('submit-btn');
 const clearBtn = document.getElementById('clear-btn');
 const cup = document.getElementById('cup');
 const cupContent = document.getElementById('cup-content');
 const cupLabel = document.getElementById('cup-label');
 const ingredientsContainer = document.getElementById('ingredients');
 const customerArea = document.getElementById('customer-area');
 const feedbackContainer = document.getElementById('feedback-container');

 // ==================== 漂浮气泡效果 ====================
 function createBubbles() {
 const container = document.getElementById('bubble-container');
 const colors = ['rgba(13,148,136,0.3)', 'rgba(245,158,11,0.3)', 'rgba(255,255,255,0.4)'];

 for (let i = 0; i < 20; i++) {
 const bubble = document.createElement('div');
 bubble.className = 'bubble';
 const size = Math.random() * 20 + 8;
 bubble.style.width = size + 'px';
 bubble.style.height = size + 'px';
 bubble.style.left = Math.random() * 100 + 'vw';
 bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
 bubble.style.animationDuration = (Math.random() * 4 + 3) + 's';
 bubble.style.animationDelay = Math.random() * 6 + 's';
 container.appendChild(bubble);
 }
 }

 // ==================== 初始化原料台 ====================
 function initIngredients() {
 ingredientsContainer.innerHTML = '';
 INGREDIENTS.forEach(ing => {
 const div = document.createElement('div');
 // 手机加大触摸区域
 div.className = 'ingredient bg-white border-2 border-teal-200 rounded-xl p-2 sm:p-3 flex flex-col items-center gap-1 shadow-md min-w-[60px] sm:min-w-[72px]';
 div.draggable = true;
 div.dataset.id = ing.id;
 div.innerHTML = `
 <span class="text-2xl sm:text-3xl">${ing.emoji}</span>
 <span class="text-xs text-teal-700 font-bold">${ing.name}</span>
 `;

 // 拖拽事件
 div.addEventListener('dragstart', handleDragStart);
 div.addEventListener('dragend', handleDragEnd);

 // 触摸事件（移动端）
 div.addEventListener('touchstart', handleTouchStart, { passive: false });
 div.addEventListener('touchmove', handleTouchMove, { passive: false });
 div.addEventListener('touchend', handleTouchEnd);

 // 点击直接添加（手机更友好）
 div.addEventListener('click', (e) => {
 if (!dragGhost) {
 addIngredientToCup(ing.id);
 }
 });

 ingredientsContainer.appendChild(div);
 });
 }

 // ==================== 拖拽逻辑 ====================
 let draggedElement = null;
 let dragGhost = null;

 function handleDragStart(e) {
 draggedElement = e.target.closest('.ingredient');
 if (draggedElement) {
 draggedElement.classList.add('dragging');
 e.dataTransfer.effectAllowed = 'copy';
 }
 }

 function handleDragEnd(e) {
 if (draggedElement) {
 draggedElement.classList.remove('dragging');
 draggedElement = null;
 }
 }

 // 触摸拖拽
 let touchDragItem = null;
 let touchOffsetX = 0;
 let touchOffsetY = 0;
 let touchStartTime = 0;

 function handleTouchStart(e) {
 touchStartTime = Date.now();
 const touch = e.touches[0];
 touchDragItem = e.target.closest('.ingredient');
 if (!touchDragItem) return;
 
 const rect = touchDragItem.getBoundingClientRect();
 touchOffsetX = touch.clientX - rect.left;
 touchOffsetY = touch.clientY - rect.top;

 dragGhost = touchDragItem.cloneNode(true);
 dragGhost.classList.add('drag-ghost');
 dragGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
 dragGhost.style.top = (touch.clientY - touchOffsetY) + 'px';
 document.body.appendChild(dragGhost);
 touchDragItem.style.opacity = '0.5';
 }

 function handleTouchMove(e) {
 if (!dragGhost) return;
 e.preventDefault();
 const touch = e.touches[0];
 dragGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
 dragGhost.style.top = (touch.clientY - touchOffsetY) + 'px';
 }

 function handleTouchEnd(e) {
 if (!touchDragItem) return;
 const touch = e.changedTouches[0];
 const cupRect = cup.getBoundingClientRect();

 // 检查是否拖到杯子上
 if (touch.clientX >= cupRect.left - 20 && touch.clientX <= cupRect.right + 20 &&
 touch.clientY >= cupRect.top - 20 && touch.clientY <= cupRect.bottom + 20) {
 addIngredientToCup(touchDragItem.dataset.id);
 }

 if (dragGhost) {
 dragGhost.remove();
 dragGhost = null;
 }
 touchDragItem.style.opacity = '1';
 touchDragItem = null;
 }

 // 杯子接收拖拽
 cup.addEventListener('dragover', (e) => {
 e.preventDefault();
 e.dataTransfer.dropEffect = 'copy';
 cup.classList.add('pulse-glow');
 });

 cup.addEventListener('dragleave', () => {
 cup.classList.remove('pulse-glow');
 });

 cup.addEventListener('drop', (e) => {
 e.preventDefault();
 cup.classList.remove('pulse-glow');
 if (draggedElement) {
 addIngredientToCup(draggedElement.dataset.id);
 }
 });

 // ==================== 添加原料到杯子 ====================
 function addIngredientToCup(ingredientId) {
 if (!gameState.isPlaying) return;

 const ingredient = INGREDIENTS.find(i => i.id === ingredientId);
 if (!ingredient) return;

 // 限制原料数量
 if (gameState.cupIngredients.length >= 5) {
 showFeedback('杯子满了！', '⚠️', '#f59e0b');
 cup.classList.add('shake');
 setTimeout(() => cup.classList.remove('shake'), 400);
 return;
 }

 gameState.cupIngredients.push(ingredient);
 updateCupVisual();

 // 视觉反馈
 const ripple = document.createElement('div');
 ripple.className = 'absolute inset-0 bg-white/30 rounded-full animate-ping';
 cup.appendChild(ripple);
 setTimeout(() => ripple.remove(), 400);
 }

 function updateCupVisual() {
 const height = Math.min(gameState.cupIngredients.length * 20, 100);
 cupContent.style.height = height + '%';

 // 混合颜色
 if (gameState.cupIngredients.length > 0) {
 const colors = gameState.cupIngredients.map(i => i.color);
 const gradient = colors.length === 1 
 ? colors[0] 
 : `linear-gradient(to top, ${colors.join(', ')})`;
 cupContent.style.background = gradient;
 } else {
 cupContent.style.background = 'transparent';
 }

 // 更新标签
 if (gameState.cupIngredients.length === 0) {
 cupLabel.textContent = '空杯子';
 } else {
 const names = gameState.cupIngredients.map(i => i.name).join(' + ');
 cupLabel.textContent = names;
 }
 }

 // ==================== 顾客系统 ====================
 function spawnCustomer() {
 if (!gameState.isPlaying) return;

 const recipe = RECIPES[Math.floor(Math.random() * RECIPES.length)];
 gameState.currentOrder = recipe;
 gameState.currentPatience = gameState.maxPatience;

 const avatar = CUSTOMER_AVATARS[Math.floor(Math.random() * CUSTOMER_AVATARS.length)];

 customerArea.innerHTML = `
 <div id="customer" class="customer flex flex-col items-center">
 <div class="order-bubble mb-2">
 <div class="text-xl sm:text-2xl">${recipe.emoji}</div>
 <div class="text-teal-700 font-bold text-xs sm:text-sm">${recipe.name}</div>
 <div class="text-xs text-gray-500 mt-1">
 ${recipe.ingredients.map(id => INGREDIENTS.find(i => i.id === id).emoji).join(' ')}
 </div>
 </div>
 <div class="text-4xl sm:text-5xl">${avatar}</div>
 <div class="w-24 sm:w-32 h-3 sm:h-4 bg-gray-200 rounded-full mt-2 overflow-hidden border-2 border-teal-300">
 <div id="patience-bar" class="patience-bar h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full" style="width: 100%"></div>
 </div>
 </div>
 `;

 // 启动耐心条
 startPatienceTimer();
 }

 function startPatienceTimer() {
 if (gameState.patienceInterval) clearInterval(gameState.patienceInterval);

 gameState.patienceInterval = setInterval(() => {
 if (!gameState.isPlaying) return;

 gameState.currentPatience -= gameState.customerPatienceDecrease;
 const bar = document.getElementById('patience-bar');
 if (bar) {
 bar.style.width = gameState.currentPatience + '%';

 // 颜色变化
 if (gameState.currentPatience > 60) {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full';
 } else if (gameState.currentPatience > 30) {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-yellow-400 to-yellow-500 rounded-full';
 } else {
 bar.className = 'patience-bar h-full bg-gradient-to-r from-red-400 to-red-500 rounded-full';
 }
 }

 if (gameState.currentPatience <= 0) {
 handleOrderFail('顾客等不及走掉了！');
 }
 }, 100);
 }

 // ==================== 提交订单 ====================
 submitBtn.addEventListener('click', () => {
 if (!gameState.isPlaying || !gameState.currentOrder) return;

 const orderIngIds = [...gameState.currentOrder.ingredients].sort();
 const cupIngIds = gameState.cupIngredients.map(i => i.id).sort();

 const isCorrect = JSON.stringify(orderIngIds) === JSON.stringify(cupIngIds);

 if (isCorrect) {
 handleOrderSuccess();
 } else {
 handleOrderFail('配方不对哦！');
 }
 });

 clearBtn.addEventListener('click', () => {
 gameState.cupIngredients = [];
 updateCupVisual();
 });

 function handleOrderSuccess() {
 gameState.successCount++;
 const bonus = Math.ceil(gameState.currentPatience / 10);
 const points = 100 + bonus * 10;
 gameState.score += points;

 updateUI();
 showFeedback(`+${points}分！`, '✅', '#22c55e');

 // 顾客开心离开
 const customer = document.getElementById('customer');
 if (customer) {
 customer.innerHTML += '<div class="text-3xl absolute -top-2">😊</div>';
 customer.classList.add('customer-leave');
 }

 // 清空杯子
 gameState.cupIngredients = [];
 updateCupVisual();

 // 下一个顾客
 setTimeout(() => {
 if (gameState.isPlaying) spawnCustomer();
 }, 700);
 }

 function handleOrderFail(reason) {
 gameState.failCount++;
 updateUI();
 showFeedback(reason, '❌', '#ef4444');

 // 顾客生气离开
 const customer = document.getElementById('customer');
 if (customer) {
 customer.innerHTML += '<div class="text-3xl absolute -top-2">😠</div>';
 customer.classList.add('customer-leave');
 }

 // 清空杯子
 gameState.cupIngredients = [];
 updateCupVisual();

 // 下一个顾客
 setTimeout(() => {
 if (gameState.isPlaying) spawnCustomer();
 }, 700);
 }

 // ==================== 反馈弹窗 ====================
 function showFeedback(text, emoji, color) {
 const div = document.createElement('div');
 div.className = 'feedback-popup fixed text-3xl sm:text-4xl font-bold z-50';
 div.style.color = color;
 div.style.left = '50%';
 div.style.top = '35%';
 div.style.transform = 'translateX(-50%)';
 div.innerHTML = `<div class="text-center">${emoji}<br><span class="text-lg sm:text-2xl">${text}</span></div>`;
 feedbackContainer.appendChild(div);

 setTimeout(() => div.remove(), 800);
 }

 // ==================== 更新UI ====================
 function updateUI() {
 document.getElementById('score').textContent = gameState.score;
 document.getElementById('success-count').textContent = gameState.successCount;
 document.getElementById('fail-count').textContent = gameState.failCount;
 }

 // ==================== 计时器 ====================
 function startTimer() {
 gameState.timerInterval = setInterval(() => {
 gameState.timeLeft--;
 document.getElementById('timer').textContent = gameState.timeLeft;

 if (gameState.timeLeft <= 10) {
 document.getElementById('timer').classList.add('text-red-600', 'animate-pulse');
 }

 if (gameState.timeLeft <= 0) {
 endGame();
 }
 }, 1000);
 }

 // ==================== 游戏控制 ====================
 function startGame() {
 gameState = {
 score: 0,
 successCount: 0,
 failCount: 0,
 timeLeft: 60,
 currentOrder: null,
 cupIngredients: [],
 isPlaying: true,
 timerInterval: null,
 patienceInterval: null,
 currentPatience: 100,
 maxPatience: 100,
 customerPatienceDecrease: 0.5,
 };

 startScreen.classList.add('hidden');
 resultScreen.classList.add('hidden');
 gameScreen.classList.remove('hidden');

 updateUI();
 document.getElementById('timer').textContent = '60';
 document.getElementById('timer').classList.remove('text-red-600', 'animate-pulse');

 initIngredients();
 updateCupVisual();

 spawnCustomer();
 startTimer();
 }

 function endGame() {
 gameState.isPlaying = false;
 clearInterval(gameState.timerInterval);
 clearInterval(gameState.patienceInterval);

 gameScreen.classList.add('hidden');
 resultScreen.classList.remove('hidden');

 document.getElementById('result-success').textContent = gameState.successCount;
 document.getElementById('result-fail').textContent = gameState.failCount;
 document.getElementById('result-score').textContent = gameState.score;

 // 评价
 let message = '';
 if (gameState.score >= 800) {
 message = '🏆 奶茶大师！Max为你点赞！';
 } else if (gameState.score >= 500) {
 message = '⭐ 优秀店员！顾客们都爱死你啦！';
 } else if (gameState.score >= 200) {
 message = '👍 不错的开始！继续加油！';
 } else {
 message = '💪 别灰心，多练习就能成为奶茶达人！';
 }
 document.getElementById('result-message').textContent = message;
 }

 // ==================== 事件绑定 ====================
 startBtn.addEventListener('click', startGame);
 restartBtn.addEventListener('click', startGame);

 // ==================== 初始化 ====================
 createBubbles();
 </script>
</body>
</html>
