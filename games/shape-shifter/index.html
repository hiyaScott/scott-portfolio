<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../favicon.ico">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形状变形记 Shape Shifter | 虾折腾</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
        }

        .game-title {
            color: #00ffff;
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin-bottom: 20px;
            letter-spacing: 4px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff; }
            50% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #00ffff; }
        }

        .game-container {
            position: relative;
            border: 3px solid #ff00ff;
            border-radius: 10px;
            box-shadow: 0 0 20px #ff00ff, inset 0 0 20px rgba(255, 0, 255, 0.2);
            background: #0a0a0a;
        }

        canvas {
            display: block;
            border-radius: 8px;
        }

        .ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .level-info {
            color: #39ff14;
            font-size: 1rem;
            text-shadow: 0 0 10px #39ff14;
        }

        .shape-indicator {
            display: flex;
            gap: 10px;
        }

        .shape-icon {
            width: 30px;
            height: 30px;
            border: 2px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .shape-icon.active {
            border-color: #fff;
            box-shadow: 0 0 15px currentColor;
            transform: scale(1.1);
        }

        .shape-icon.circle { color: #00ffff; }
        .shape-icon.square { color: #ff00ff; }
        .shape-icon.triangle { color: #39ff14; }

        /* 移动端触摸控制 */
        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }

            .game-title {
                font-size: 1.5rem;
                margin-bottom: 10px;
            }

            .game-container {
                width: 95vw;
                max-width: 400px;
            }

            canvas {
                width: 100%;
                height: auto;
            }

            .controls-hint {
                display: none;
            }
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .d-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 10px;
            color: #00ffff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .d-btn:active {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .d-btn.empty {
            border: none;
            background: transparent;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shape-switch-btn {
            width: 80px;
            height: 80px;
            border: 3px solid;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .shape-switch-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .controls-hint {
            margin-top: 20px;
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.6;
        }

        .controls-hint span {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        .shape-ability {
            margin-top: 10px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            border-radius: 5px;
            color: #00ffff;
            font-size: 0.85rem;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 10;
        }

        .overlay h2 {
            color: #00ffff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffff;
        }

        .overlay p {
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            border: 2px solid #ff00ff;
            background: transparent;
            color: #ff00ff;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .btn:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 40px #ff00ff;
        }

        .hidden {
            display: none !important;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 255, 0.02) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            border-radius: 8px;
        }
    
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            text-decoration: none;
            font-family: monospace;
            z-index: 1000;
            transition: all 0.3s;
            border-radius: 4px;
            font-size: 14px;
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 返回主页</a>
    <h1 class="game-title">SHAPE SHIFTER</h1>

    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="scanline"></div>

        <div class="ui-panel">
            <div class="level-info">关卡 <span id="levelNum">1</span> / 3</div>
            <div class="shape-indicator">
                <div class="shape-icon circle active" id="icon-circle">●</div>
                <div class="shape-icon square" id="icon-square">■</div>
                <div class="shape-icon triangle" id="icon-triangle">▲</div>
            </div>
        </div>

        <div class="overlay" id="startScreen">
            <h2>形状变形记</h2>
            <p>
                使用 <span style="color:#00ffff">方向键</span> 或 <span style="color:#00ffff">WASD</span> 移动<br>
                按 <span style="color:#ff00ff">空格键</span> 或 <span style="color:#ff00ff">点击</span> 切换形状<br><br>
                <span style="color:#00ffff">● 圆形</span>：滚动快速移动，通过狭窄通道<br>
                <span style="color:#ff00ff">■ 方形</span>：推动物体，踩下开关<br>
                <span style="color:#39ff14">▲ 三角形</span>：攀爬墙壁，刺破气球
            </p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>

        <div class="overlay hidden" id="levelCompleteScreen">
            <h2>关卡完成！</h2>
            <p>准备好挑战下一关了吗？</p>
            <button class="btn" onclick="nextLevel()">下一关</button>
        </div>

        <div class="overlay hidden" id="gameCompleteScreen">
            <h2 style="color:#39ff14">恭喜通关！</h2>
            <p>你已经掌握了所有形状的奥秘！</p>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <div class="controls-hint">
        <span>WASD / 方向键</span> 移动 | <span>空格 / 点击</span> 切换形状
    </div>

    <!-- 移动端触摸控制 -->
    <div class="mobile-controls">
        <div class="d-pad">
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btn-up">▲</div>
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btn-left">◀</div>
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btn-right">▶</div>
            <div class="d-btn empty"></div>
            <div class="d-btn" id="btn-down">▼</div>
            <div class="d-btn empty"></div>
        </div>
        <div class="action-buttons">
            <div class="shape-switch-btn" id="btn-shape" style="border-color: #00ffff; color: #00ffff;">●</div>
        </div>
    </div>

    <div class="shape-ability" id="abilityText">当前：圆形 - 可以滚动通过狭窄通道</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameState = 'start'; // start, playing, levelComplete, gameComplete
        let currentLevel = 1;
        let animationId;
        let particles = [];

        // 按键状态
        const keys = {};

        // 形状类型
        const SHAPES = {
            CIRCLE: 0,
            SQUARE: 1,
            TRIANGLE: 2
        };

        // 颜色配置
        const COLORS = {
            cyan: '#00ffff',
            pink: '#ff00ff',
            green: '#39ff14',
            dark: '#0a0a0a',
            grid: '#1a1a2e'
        };

        // 玩家对象
        const player = {
            x: 50,
            y: 300,
            size: 25,
            shape: SHAPES.CIRCLE,
            vx: 0,
            vy: 0,
            speed: 5,
            jumpPower: 12,
            onGround: false,
            onWall: false,
            rotation: 0
        };

        // 关卡数据
        const levels = {
            1: {
                // 第一关：教学关 - 展示圆形和方形
                walls: [
                    {x: 0, y: 550, w: 800, h: 50}, // 地面
                    {x: 0, y: 0, w: 20, h: 600}, // 左墙
                    {x: 780, y: 0, w: 20, h: 600}, // 右墙
                    {x: 200, y: 400, w: 20, h: 150}, // 障碍物1
                    {x: 400, y: 300, w: 20, h: 250}, // 障碍物2
                    {x: 600, y: 200, w: 20, h: 350}, // 障碍物3
                ],
                narrowGaps: [
                    {x: 220, y: 450, w: 180, h: 40}, // 狭窄通道1
                    {x: 420, y: 350, w: 180, h: 40}, // 狭窄通道2
                ],
                switches: [],
                pushables: [],
                balloons: [],
                exit: {x: 720, y: 480, w: 60, h: 70}
            },
            2: {
                // 第二关：方形专题 - 推箱子和开关
                walls: [
                    {x: 0, y: 550, w: 800, h: 50},
                    {x: 0, y: 0, w: 20, h: 600},
                    {x: 780, y: 0, w: 20, h: 600},
                    {x: 300, y: 300, w: 20, h: 250},
                    {x: 500, y: 200, w: 20, h: 350},
                    {x: 300, y: 200, w: 220, h: 20}, // 阻挡门
                ],
                narrowGaps: [],
                switches: [
                    {x: 150, y: 520, w: 50, h: 30, pressed: false, target: 'door1'}
                ],
                pushables: [
                    {x: 100, y: 450, w: 60, h: 60, vx: 0, vy: 0, id: 'box1'},
                    {x: 200, y: 480, w: 50, h: 50, vx: 0, vy: 0, id: 'box2'}
                ],
                balloons: [],
                exit: {x: 700, y: 480, w: 80, h: 70},
                doors: [
                    {x: 300, y: 200, w: 220, h: 20, id: 'door1', open: false}
                ]
            },
            3: {
                // 第三关：三角形专题 - 爬墙和气球
                walls: [
                    {x: 0, y: 550, w: 800, h: 50},
                    {x: 0, y: 0, w: 20, h: 600},
                    {x: 780, y: 0, w: 20, h: 600},
                    {x: 150, y: 200, w: 20, h: 350}, // 可攀爬墙1
                    {x: 350, y: 100, w: 20, h: 450}, // 可攀爬墙2
                    {x: 550, y: 250, w: 20, h: 300}, // 可攀爬墙3
                ],
                narrowGaps: [],
                switches: [],
                pushables: [],
                balloons: [
                    {x: 280, y: 200, r: 30, popped: false},
                    {x: 480, y: 150, r: 25, popped: false},
                    {x: 680, y: 300, r: 35, popped: false}
                ],
                exit: {x: 720, y: 100, w: 60, h: 70}
            }
        };

        let currentLevelData = null;
        let doors = [];

        // 初始化关卡
        function initLevel(levelNum) {
            currentLevel = levelNum;
            currentLevelData = JSON.parse(JSON.stringify(levels[levelNum]));
            doors = currentLevelData.doors || [];

            // 重置玩家位置
            player.x = 50;
            player.y = 400;
            player.vx = 0;
            player.vy = 0;
            player.shape = SHAPES.CIRCLE;
            player.rotation = 0;

            // 更新UI
            document.getElementById('levelNum').textContent = levelNum;
            updateShapeIndicator();
            updateAbilityText();

            // 生成背景粒子
            generateParticles();
        }

        // 生成装饰粒子
        function generateParticles() {
            particles = [];
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    alpha: Math.random() * 0.5 + 0.2,
                    color: [COLORS.cyan, COLORS.pink, COLORS.green][Math.floor(Math.random() * 3)]
                });
            }
        }

        // 更新形状指示器
        function updateShapeIndicator() {
            document.querySelectorAll('.shape-icon').forEach((icon, index) => {
                icon.classList.toggle('active', index === player.shape);
            });
        }

        // 更新能力描述
        function updateAbilityText() {
            const texts = [
                '当前：圆形 - 可以滚动通过狭窄通道，移动更快',
                '当前：方形 - 可以推动物体，踩下开关开门',
                '当前：三角形 - 可以攀爬墙壁，刺破气球'
            ];
            document.getElementById('abilityText').textContent = texts[player.shape];
        }

        // 切换形状
        function shiftShape() {
            if (gameState !== 'playing') return;
            player.shape = (player.shape + 1) % 3;
            updateShapeIndicator();
            updateAbilityText();
            createShiftEffect();
        }

        // 创建变形特效
        function createShiftEffect() {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: player.x + player.size / 2,
                    y: player.y + player.size / 2,
                    size: Math.random() * 4 + 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    alpha: 1,
                    life: 30,
                    color: [COLORS.cyan, COLORS.pink, COLORS.green][player.shape]
                });
            }
        }

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        // 圆形与矩形碰撞
        function circleRectCollision(circle, rect) {
            let closestX = Math.max(rect.x, Math.min(circle.x + circle.size/2, rect.x + rect.w));
            let closestY = Math.max(rect.y, Math.min(circle.y + circle.size/2, rect.y + rect.h));
            let dx = circle.x + circle.size/2 - closestX;
            let dy = circle.y + circle.size/2 - closestY;
            return (dx * dx + dy * dy) < (circle.size/2) * (circle.size/2);
        }

        // 更新物理
        function updatePhysics() {
            const level = currentLevelData;

            // 应用重力
            player.vy += 0.5;

            // 根据形状调整速度
            let moveSpeed = player.speed;
            if (player.shape === SHAPES.CIRCLE) {
                moveSpeed *= 1.3; // 圆形更快
            } else if (player.shape === SHAPES.TRIANGLE) {
                moveSpeed *= 0.9; // 三角形稍慢
            }

            // 水平移动
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -moveSpeed;
                player.rotation -= 0.1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = moveSpeed;
                player.rotation += 0.1;
            } else {
                player.vx *= 0.8; // 摩擦力
            }

            // 跳跃
            if ((keys['ArrowUp'] || keys['KeyW'] || keys[' ']) && player.onGround) {
                player.vy = -player.jumpPower;
                player.onGround = false;
            }

            // 三角形爬墙
            player.onWall = false;
            if (player.shape === SHAPES.TRIANGLE) {
                // 检测是否贴着墙
                for (let wall of level.walls) {
                    if (Math.abs(player.x + player.size - wall.x) < 5 &&
                        player.y + player.size > wall.y &&
                        player.y < wall.y + wall.h) {
                        player.onWall = true;
                    }
                    if (Math.abs(player.x - (wall.x + wall.w)) < 5 &&
                        player.y + player.size > wall.y &&
                        player.y < wall.y + wall.h) {
                        player.onWall = true;
                    }
                }

                // 爬墙
                if (player.onWall && (keys['ArrowUp'] || keys['KeyW'])) {
                    player.vy = -3;
                }
            }

            // 更新位置
            player.x += player.vx;

            // 墙壁碰撞（水平）
            for (let wall of level.walls) {
                if (checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, wall)) {
                    if (player.vx > 0) {
                        player.x = wall.x - player.size;
                    } else if (player.vx < 0) {
                        player.x = wall.x + wall.w;
                    }
                    player.vx = 0;
                }
            }

            // 门碰撞
            for (let door of doors) {
                if (!door.open && checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, door)) {
                    if (player.vx > 0) {
                        player.x = door.x - player.size;
                    } else if (player.vx < 0) {
                        player.x = door.x + door.w;
                    }
                    player.vx = 0;
                }
            }

            player.y += player.vy;
            player.onGround = false;

            // 墙壁碰撞（垂直）
            for (let wall of level.walls) {
                if (checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, wall)) {
                    if (player.vy > 0) {
                        player.y = wall.y - player.size;
                        player.onGround = true;
                    } else if (player.vy < 0) {
                        player.y = wall.y + wall.h;
                    }
                    player.vy = 0;
                }
            }

            // 门碰撞（垂直）
            for (let door of doors) {
                if (!door.open && checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, door)) {
                    if (player.vy > 0) {
                        player.y = door.y - player.size;
                        player.onGround = true;
                    } else if (player.vy < 0) {
                        player.y = door.y + door.h;
                    }
                    player.vy = 0;
                }
            }

            // 狭窄通道检测（只有圆形可以通过）
            if (level.narrowGaps) {
                for (let gap of level.narrowGaps) {
                    if (player.shape !== SHAPES.CIRCLE) {
                        // 非圆形会被阻挡
                        if (checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, gap)) {
                            // 简单的推回逻辑
                            const centerX = gap.x + gap.w / 2;
                            const centerY = gap.y + gap.h / 2;
                            const playerCX = player.x + player.size / 2;
                            const playerCY = player.y + player.size / 2;

                            if (Math.abs(playerCX - centerX) / gap.w > Math.abs(playerCY - centerY) / gap.h) {
                                if (player.vx > 0) player.x = gap.x - player.size;
                                else player.x = gap.x + gap.w;
                                player.vx = 0;
                            }
                        }
                    }
                }
            }

            // 推箱子逻辑
            if (level.pushables && player.shape === SHAPES.SQUARE) {
                for (let box of level.pushables) {
                    if (checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, box)) {
                        if (player.vx > 0) {
                            box.x = player.x + player.size;
                        } else if (player.vx < 0) {
                            box.x = player.x - box.w;
                        }
                        box.vx = player.vx * 0.5;
                    }

                    // 更新箱子物理
                    box.vy += 0.5;
                    box.x += box.vx;
                    box.y += box.vy;
                    box.vx *= 0.9;

                    // 箱子与墙碰撞
                    for (let wall of level.walls) {
                        if (checkCollision(box, wall)) {
                            if (box.vy > 0) {
                                box.y = wall.y - box.h;
                                box.vy = 0;
                            }
                        }
                    }

                    // 限制箱子在画面内
                    box.x = Math.max(20, Math.min(760 - box.w, box.x));
                }
            }

            // 开关检测
            if (level.switches) {
                for (let sw of level.switches) {
                    let pressed = false;

                    // 玩家踩开关
                    if (player.shape === SHAPES.SQUARE &&
                        checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, sw)) {
                        pressed = true;
                    }

                    // 箱子压开关
                    if (level.pushables) {
                        for (let box of level.pushables) {
                            if (checkCollision(box, sw)) {
                                pressed = true;
                            }
                        }
                    }

                    sw.pressed = pressed;

                    // 开门
                    if (pressed && sw.target) {
                        for (let door of doors) {
                            if (door.id === sw.target) {
                                door.open = true;
                            }
                        }
                    }
                }
            }

            // 气球检测（三角形刺破）
            if (level.balloons && player.shape === SHAPES.TRIANGLE) {
                for (let balloon of level.balloons) {
                    if (!balloon.popped) {
                        const dx = player.x + player.size/2 - balloon.x;
                        const dy = player.y + player.size/2 - balloon.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);

                        if (dist < balloon.r + player.size/2) {
                            balloon.popped = true;
                            // 爆炸特效
                            for (let i = 0; i < 15; i++) {
                                particles.push({
                                    x: balloon.x,
                                    y: balloon.y,
                                    size: Math.random() * 5 + 3,
                                    vx: (Math.random() - 0.5) * 10,
                                    vy: (Math.random() - 0.5) * 10,
                                    alpha: 1,
                                    life: 40,
                                    color: COLORS.pink
                                });
                            }
                        }
                    }
                }
            }

            // 检测是否到达出口
            if (checkCollision({x: player.x, y: player.y, w: player.size, h: player.size}, level.exit)) {
                levelComplete();
            }

            // 边界限制
            player.x = Math.max(20, Math.min(780 - player.size, player.x));
            player.y = Math.min(550, player.y);
        }

        // 渲染游戏
        function render() {
            // 清空画布
            ctx.fillStyle = COLORS.dark;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格背景
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            const level = currentLevelData;
            if (!level) return;

            // 绘制狭窄通道（霓虹管效果）
            if (level.narrowGaps) {
                for (let gap of level.narrowGaps) {
                    ctx.strokeStyle = COLORS.cyan;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = COLORS.cyan;
                    ctx.strokeRect(gap.x, gap.y, gap.w, gap.h);
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                    ctx.fillRect(gap.x, gap.y, gap.w, gap.h);

                    // 标签
                    ctx.fillStyle = COLORS.cyan;
                    ctx.font = '12px Orbitron';
                    ctx.fillText('仅圆形', gap.x + gap.w/2 - 25, gap.y + gap.h/2 + 5);
                }
            }

            // 绘制墙壁
            for (let wall of level.walls) {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);

                // 科技感边框
                ctx.strokeStyle = COLORS.pink;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.3;
                ctx.strokeRect(wall.x + 2, wall.y + 2, wall.w - 4, wall.h - 4);
                ctx.globalAlpha = 1;
            }

            // 绘制门
            for (let door of doors) {
                if (!door.open) {
                    ctx.fillStyle = '#ff0066';
                    ctx.fillRect(door.x, door.y, door.w, door.h);
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(door.x, door.y, door.w, door.h);

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px Orbitron';
                    ctx.fillText('🔒', door.x + door.w/2 - 10, door.y + door.h/2 + 5);
                }
            }

            // 绘制开关
            if (level.switches) {
                for (let sw of level.switches) {
                    ctx.fillStyle = sw.pressed ? COLORS.green : '#444';
                    ctx.fillRect(sw.x, sw.y, sw.w, sw.h);
                    ctx.strokeStyle = sw.pressed ? COLORS.green : '#666';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sw.x, sw.y, sw.w, sw.h);

                    if (sw.pressed) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = COLORS.green;
                        ctx.strokeRect(sw.x, sw.y, sw.w, sw.h);
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // 绘制推箱子
            if (level.pushables) {
                for (let box of level.pushables) {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(box.x, box.y, box.w, box.h);
                    ctx.strokeStyle = '#D2691E';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(box.x, box.y, box.w, box.h);

                    // 箱子纹理
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(box.x + 10, box.y + 10);
                    ctx.lineTo(box.x + box.w - 10, box.y + box.h - 10);
                    ctx.moveTo(box.x + box.w - 10, box.y + 10);
                    ctx.lineTo(box.x + 10, box.y + box.h - 10);
                    ctx.stroke();
                }
            }

            // 绘制气球
            if (level.balloons) {
                for (let balloon of level.balloons) {
                    if (!balloon.popped) {
                        ctx.beginPath();
                        ctx.arc(balloon.x, balloon.y, balloon.r, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255, 0, 255, 0.6)';
                        ctx.fill();
                        ctx.strokeStyle = COLORS.pink;
                        ctx.lineWidth = 2;
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = COLORS.pink;
                        ctx.stroke();
                        ctx.shadowBlur = 0;

                        // 气球线
                        ctx.beginPath();
                        ctx.moveTo(balloon.x, balloon.y + balloon.r);
                        ctx.lineTo(balloon.x, balloon.y + balloon.r + 20);
                        ctx.strokeStyle = '#aaa';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            // 绘制出口
            const exit = level.exit;
            ctx.fillStyle = 'rgba(57, 255, 20, 0.3)';
            ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
            ctx.strokeStyle = COLORS.green;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = COLORS.green;
            ctx.strokeRect(exit.x, exit.y, exit.w, exit.h);
            ctx.shadowBlur = 0;

            ctx.fillStyle = COLORS.green;
            ctx.font = 'bold 16px Orbitron';
            ctx.fillText('EXIT', exit.x + exit.w/2 - 20, exit.y + exit.h/2 + 5);

            // 绘制玩家
            ctx.save();
            const cx = player.x + player.size / 2;
            const cy = player.y + player.size / 2;

            // 发光效果
            ctx.shadowBlur = 25;

            if (player.shape === SHAPES.CIRCLE) {
                // 圆形
                ctx.shadowColor = COLORS.cyan;
                ctx.fillStyle = COLORS.cyan;
                ctx.beginPath();
                ctx.arc(cx, cy, player.size / 2, 0, Math.PI * 2);
                ctx.fill();

                // 滚动效果线
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, player.size / 3, player.rotation, player.rotation + Math.PI);
                ctx.stroke();

            } else if (player.shape === SHAPES.SQUARE) {
                // 方形
                ctx.shadowColor = COLORS.pink;
                ctx.fillStyle = COLORS.pink;
                ctx.fillRect(player.x, player.y, player.size, player.size);

                // 内部装饰
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(player.x + 5, player.y + 5, player.size - 10, player.size - 10);

            } else if (player.shape === SHAPES.TRIANGLE) {
                // 三角形
                ctx.shadowColor = COLORS.green;
                ctx.fillStyle = COLORS.green;
                ctx.beginPath();
                ctx.moveTo(cx, player.y);
                ctx.lineTo(player.x + player.size, player.y + player.size);
                ctx.lineTo(player.x, player.y + player.size);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();

            // 绘制粒子
            updateAndDrawParticles();
        }

        // 更新和绘制粒子
        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];

                if (p.vx !== undefined) {
                    // 特效粒子
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    p.alpha = p.life / 40;

                    if (p.life <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                } else {
                    // 背景粒子
                    p.y -= p.speed;
                    if (p.y < 0) p.y = canvas.height;
                }

                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 游戏循环
        function gameLoop() {
            if (gameState === 'playing') {
                updatePhysics();
            }
            render();
            animationId = requestAnimationFrame(gameLoop);
        }

        // 关卡完成
        function levelComplete() {
            gameState = 'levelComplete';

            if (currentLevel >= 3) {
                document.getElementById('gameCompleteScreen').classList.remove('hidden');
                gameState = 'gameComplete';
            } else {
                document.getElementById('levelCompleteScreen').classList.remove('hidden');
            }
        }

        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            gameState = 'playing';
            initLevel(1);
            gameLoop();
        }

        // 下一关
        function nextLevel() {
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            gameState = 'playing';
            initLevel(currentLevel + 1);
        }

        // 重新开始
        function restartGame() {
            document.getElementById('gameCompleteScreen').classList.add('hidden');
            gameState = 'playing';
            initLevel(1);
        }

        // 事件监听
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    shiftShape();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 点击切换形状
        canvas.addEventListener('click', () => {
            if (gameState === 'playing') {
                shiftShape();
            }
        });

        // 防止空格键滚动页面
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
            }
        });

        // 移动端触摸控制
        function setupMobileControls() {
            const btnUp = document.getElementById('btn-up');
            const btnDown = document.getElementById('btn-down');
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnShape = document.getElementById('btn-shape');

            function addTouchListener(element, keyCode) {
                if (!element) return;
                element.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    keys[keyCode] = true;
                    element.style.transform = 'scale(0.95)';
                    element.style.background = 'rgba(0, 255, 255, 0.4)';
                });
                element.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    keys[keyCode] = false;
                    element.style.transform = 'scale(1)';
                    element.style.background = 'rgba(0, 255, 255, 0.1)';
                });
            }

            addTouchListener(btnUp, 'ArrowUp');
            addTouchListener(btnDown, 'ArrowDown');
            addTouchListener(btnLeft, 'ArrowLeft');
            addTouchListener(btnRight, 'ArrowRight');

            if (btnShape) {
                btnShape.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (gameState === 'playing') {
                        shiftShape();
                    }
                    btnShape.style.transform = 'scale(0.95)';
                });
                btnShape.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    btnShape.style.transform = 'scale(1)';
                });
            }
        }

        setupMobileControls();

        // 响应式画布尺寸
        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const isMobile = window.innerWidth <= 768;
            const canvas = document.getElementById('gameCanvas');

            if (isMobile) {
                const maxWidth = Math.min(window.innerWidth - 20, 400);
                const scale = maxWidth / 800;
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (600 * scale) + 'px';
            } else {
                canvas.style.width = '';
                canvas.style.height = '';
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 初始渲染
        generateParticles();
        render();
    </script>
</body>
</html>
