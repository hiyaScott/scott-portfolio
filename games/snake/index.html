<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../favicon.ico">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        h1 {
            color: #4ecca3;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 0 0 10px #4ecca3;
        }
        
        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 16px;
        }
        
        .score-board span {
            color: #4ecca3;
            font-weight: bold;
        }
        
        #gameCanvas {
            border: 2px solid #4ecca3;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
            max-width: 95vw;
            max-height: 60vh;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
        
        .controls p {
            margin: 5px 0;
        }
        
        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #3db892;
            transform: scale(1.05);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
        }
        
        .mobile-controls .row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 5px 0;
        }
        
        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(78, 204, 163, 0.2);
            border: 2px solid #4ecca3;
            border-radius: 10px;
            color: #4ecca3;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .mobile-btn:active {
            background: #4ecca3;
            color: #1a1a2e;
        }
        
        @media (max-width: 600px) {
            .mobile-controls {
                display: block;
            }
            
            .controls p:first-child {
                display: none;
            }
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #4ecca3;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
        }
        
        .game-over p {
            color: #fff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="score-board">
        <div>得分: <span id="score">0</span></div>
        <div>最高分: <span id="highScore">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls">
        <p>💻 电脑：方向键或 WASD 控制</p>
        <p>📱 手机：点击方向按钮或滑动屏幕</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>
    
    <!-- 移动端控制 -->
    <div class="mobile-controls">
        <div class="row">
            <div class="mobile-btn" ontouchstart="changeDirection('up')" onmousedown="changeDirection('up')">▲</div>
        </div>
        <div class="row">
            <div class="mobile-btn" ontouchstart="changeDirection('left')" onmousedown="changeDirection('left')">◀</div>
            <div class="mobile-btn" ontouchstart="changeDirection('down')" onmousedown="changeDirection('down')">▼</div>
            <div class="mobile-btn" ontouchstart="changeDirection('right')" onmousedown="changeDirection('right')">▶</div>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束！</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="startGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isGameRunning = false;
        
        // 显示最高分
        document.getElementById('highScore').textContent = highScore;
        
        // 初始化游戏
        function init() {
            snake = [
                {x: 10, y: 10}
            ];
            generateFood();
            dx = 0;
            dy = 0;
            score = 0;
            updateScore();
        }
        
        // 生成食物
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // 确保食物不在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }
        
        // 更新游戏状态
        function update() {
            if (!isGameRunning) return;
            
            // 如果还没开始移动（dx=0, dy=0），不执行更新
            if (dx === 0 && dy === 0) return;
            
            // 移动蛇头
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // 撞自己检测
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃食物检测
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                generateFood();
                
                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
            } else {
                snake.pop();
            }
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格（可选， subtle）
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#4ecca3';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#4ecca3';
                } else {
                    // 蛇身
                    ctx.fillStyle = '#3db892';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            
            ctx.shadowBlur = 0;
            
            // 绘制食物
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 游戏循环
        function loop() {
            update();
            draw();
        }
        
        // 开始游戏
        function startGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            
            document.getElementById('gameOver').style.display = 'none';
            init();
            isGameRunning = true;
            gameLoop = setInterval(loop, 100);
        }
        
        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 更新分数显示
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // 改变方向
        function changeDirection(direction) {
            if (!isGameRunning) {
                startGame();
                return;
            }
            
            switch(direction) {
                case 'up':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning && e.key !== ' ') return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    startGame();
                    break;
            }
        });
        
        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        
        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning) {
                startGame();
                return;
            }
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (dx > 0) {
                    changeDirection('right');
                } else {
                    changeDirection('left');
                }
            } else {
                // 垂直滑动
                if (dy > 0) {
                    changeDirection('down');
                } else {
                    changeDirection('up');
                }
            }
        }, {passive: true});
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
