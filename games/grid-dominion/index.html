		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: #0a0a0a;
	overflow: hidden;
	touch-action: none;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

/* 加载动画背景 */
#status::before {
	content: '';
	position: absolute;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background:
		repeating-linear-gradient(
			90deg,
			transparent,
			transparent 50px,
			rgba(0, 255, 255, 0.03) 50px,
			rgba(0, 255, 255, 0.03) 51px
		);
	animation: scanline 8s linear infinite;
	pointer-events: none;
}

@keyframes scanline {
	0% { transform: translateX(-50px); }
	100% { transform: translateX(0); }
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
	animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
	0%, 100% { opacity: 0.8; transform: scale(1); }
	50% { opacity: 1; transform: scale(1.02); }
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

/* 优化进度条样式 */
#status-progress {
	bottom: 15%;
	width: 60%;
	max-width: 400px;
	height: 8px;
	border-radius: 4px;
	border: none;
	background: rgba(255, 255, 255, 0.1);
	overflow: hidden;
}

#status-progress::-webkit-progress-bar {
	background: rgba(255, 255, 255, 0.1);
	border-radius: 4px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
	background-size: 200% 100%;
	border-radius: 4px;
	animation: progressGlow 2s linear infinite, shimmer 1.5s linear infinite;
	box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(255, 0, 255, 0.3);
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
	background-size: 200% 100%;
	border-radius: 4px;
	animation: progressGlow 2s linear infinite, shimmer 1.5s linear infinite;
	box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(255, 0, 255, 0.3);
}

@keyframes progressGlow {
	0%, 100% { filter: brightness(1); }
	50% { filter: brightness(1.3); }
}

@keyframes shimmer {
	0% { background-position: 0% 0%; }
	100% { background-position: 200% 0%; }
}

/* 加载百分比显示 */
#status-percentage {
	position: absolute;
	bottom: calc(15% + 20px);
	left: 50%;
	transform: translateX(-50%);
	color: #00ffff;
	font-size: 1.2rem;
	font-weight: bold;
	text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
	letter-spacing: 2px;
}

/* 加载文字 */
#status-text {
	position: absolute;
	bottom: calc(15% - 30px);
	left: 50%;
	transform: translateX(-50%);
	color: rgba(255, 255, 255, 0.7);
	font-size: 0.9rem;
	letter-spacing: 3px;
	text-transform: uppercase;
}

#status-text::after {
	content: '';
	animation: loadingDots 1.5s steps(4, end) infinite;
}

@keyframes loadingDots {
	0% { content: ''; }
	25% { content: '.'; }
	50% { content: '..'; }
	75% { content: '...'; }
}

#status-notice {
	background: linear-gradient(135deg, #5b3943, #3d2530);
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
	box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
}
		
        .back-btn {
            position: fixed;
            top: 20px;

            padding: 10px 20px;

            color: #00ffff;
            text-decoration: none;
            font-family: monospace;
            z-index: 1000;
            transition: all 0.3s;

        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
/* 返回按钮 - 深空风格 */
.back-nav {
	position: fixed;
	top: 20px;
	left: 20px;
	z-index: 1000;
}
.back-nav a {
	display: flex;
	align-items: center;
	gap: 8px;
	padding: 10px 20px;
	background: rgba(10, 10, 26, 0.9);
	border: 2px solid #00ffff;
	border-radius: 25px;
	color: #00ffff;
	text-decoration: none;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	font-size: 14px;
	font-weight: 600;
	text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
	box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
	transition: all 0.3s ease;
	backdrop-filter: blur(10px);
}
.back-nav a:hover {
	background: rgba(0, 255, 255, 0.2);
	box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 15px rgba(0, 255, 255, 0.2);
	transform: translateX(-3px);
}
.back-nav a::before {
	content: '←';
	font-size: 16px;
}

	<body>
    <a href="../../index.html" class="back-btn">← 返回主页</a>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":39084,"index.wasm":37685705},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
