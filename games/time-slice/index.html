<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../favicon.ico">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间切片 - Time Slice | 虾折腾</title>
    <meta name="description" content="时间切片 - 在时间缝隙中穿梭的动作解谜游戏" >
    <meta property="og:title" content="时间切片 - Time Slice | 虾折腾">
    <meta property="og:description" content="时间切片 - 动作解谜游戏">
    <meta property="og:type" content="website">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        h1 {
            margin: 20px 0 10px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }
        
        .ui {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .ui span {
            color: #888;
        }
        
        .ui .value {
            color: #ff6600;
            font-weight: bold;
        }
        
        .energy-bar {
            width: 200px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6600, #ffaa00);
            transition: width 0.3s;
        }
        
        #gameCanvas {
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            background: #111;
        }
        
        .controls {
            margin-top: 15px;
            text-align: center;
        }
        
        .btn {
            background: linear-gradient(135deg, #00ffff, #0088aa);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border: 2px solid #ff6600;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            color: #ff6600;
            margin-bottom: 20px;
        }
        
        .level-complete {
            border-color: #00ff00;
        }
        
        .level-complete h2 {
            color: #00ff00;
        }
    
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            text-decoration: none;
            font-family: monospace;
            z-index: 1000;
            transition: all 0.3s;
            border-radius: 4px;
            font-size: 14px;
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 返回主页</a>
    <h1>⏱️ 时间切片</h1>
    
    <div class="ui">
        <div>
            关卡: <span class="value" id="level">1</span>
        </div>
        <div>
            能量: <div class="energy-bar"><div class="energy-fill" id="energyBar" style="width: 100%"></div></div>
        </div>
        <div>
            状态: <span class="value" id="status">流动</span>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <button class="btn" id="freezeBtn" onclick="toggleFreeze()">❄️ 冻结时间 (空格)</button>
        <button class="btn" id="executeBtn" onclick="executePlan()" disabled>▶️ 执行计划 (Enter)</button>
        <button class="btn" onclick="resetLevel()">🔄 重置</button>
    </div>
    
    <div class="instructions">
        方向键移动 | 空格冻结时间规划路径 | Enter执行 | 目标：消灭所有敌人并到达出口
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>你被敌人发现了！</p>
        <button class="btn" onclick="resetLevel()">再试一次</button>
    </div>
    
    <div class="game-over level-complete" id="levelComplete">
        <h2>关卡完成！</h2>
        <p>完美的时间规划！</p>
        <button class="btn" onclick="nextLevel()">下一关</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const TILE_SIZE = 40;
        const GRID_W = 15;
        const GRID_H = 10;
        
        // 游戏状态
        let level = 1;
        let isFrozen = false;
        let energy = 100;
        let planning = []; // 规划的路径
        let gameState = 'playing'; // playing, planning, executing, won, lost
        
        // 实体
        let player = { x: 1, y: 1, dir: { x: 0, y: 0 } };
        let enemies = [];
        let exit = { x: 13, y: 8 };
        let walls = [];
        
        // 关卡设计
        const levels = [
            {
                player: { x: 1, y: 1 },
                exit: { x: 13, y: 8 },
                enemies: [
                    { x: 5, y: 5, pattern: 'patrol', dir: { x: 1, y: 0 }, patrolRange: [3, 7] }
                ],
                walls: [
                    { x: 3, y: 3, w: 1, h: 4 },
                    { x: 7, y: 2, w: 1, h: 5 },
                    { x: 10, y: 5, w: 3, h: 1 }
                ]
            },
            {
                player: { x: 1, y: 1 },
                exit: { x: 13, y: 8 },
                enemies: [
                    { x: 4, y: 4, pattern: 'circle', center: { x: 4, y: 4 }, radius: 2, angle: 0 },
                    { x: 10, y: 6, pattern: 'patrol', dir: { x: 0, y: 1 }, patrolRange: [4, 8] }
                ],
                walls: [
                    { x: 2, y: 2, w: 2, h: 1 },
                    { x: 6, y: 4, w: 1, h: 4 },
                    { x: 9, y: 2, w: 1, h: 4 },
                    { x: 11, y: 6, w: 3, h: 1 }
                ]
            },
            {
                player: { x: 1, y: 5 },
                exit: { x: 13, y: 5 },
                enemies: [
                    { x: 5, y: 3, pattern: 'patrol', dir: { x: 0, y: 1 }, patrolRange: [2, 8] },
                    { x: 9, y: 7, pattern: 'patrol', dir: { x: 0, y: -1 }, patrolRange: [2, 8] },
                    { x: 7, y: 5, pattern: 'static' }
                ],
                walls: [
                    { x: 3, y: 1, w: 1, h: 4 },
                    { x: 3, y: 6, w: 1, h: 4 },
                    { x: 11, y: 1, w: 1, h: 4 },
                    { x: 11, y: 6, w: 1, h: 4 }
                ]
            }
        ];
        
        // 初始化关卡
        function initLevel() {
            const data = levels[(level - 1) % levels.length];
            player = { ...data.player, dir: { x: 0, y: 0 } };
            exit = { ...data.exit };
            enemies = data.enemies.map(e => ({ ...e, initialPos: { x: e.x, y: e.y } }));
            walls = [];
            data.walls.forEach(w => {
                for (let i = 0; i < w.w; i++) {
                    for (let j = 0; j < w.h; j++) {
                        walls.push({ x: w.x + i, y: w.y + j });
                    }
                }
            });
            planning = [];
            energy = 100;
            isFrozen = false;
            gameState = 'playing';
            updateUI();
        }
        
        // 切换冻结状态
        function toggleFreeze() {
            if (gameState !== 'playing' && gameState !== 'planning') return;
            
            isFrozen = !isFrozen;
            gameState = isFrozen ? 'planning' : 'playing';
            planning = isFrozen ? [{ x: player.x, y: player.y }] : [];
            
            document.getElementById('freezeBtn').textContent = isFrozen ? '🔥 解除冻结 (空格)' : '❄️ 冻结时间 (空格)';
            document.getElementById('executeBtn').disabled = !isFrozen;
            updateUI();
        }
        
        // 添加规划步骤
        function addPlanningStep(dx, dy) {
            if (!isFrozen || planning.length === 0) return;
            
            const last = planning[planning.length - 1];
            const next = { x: last.x + dx, y: last.y + dy };
            
            // 检查边界和墙壁
            if (next.x < 0 || next.x >= GRID_W || next.y < 0 || next.y >= GRID_H) return;
            if (walls.some(w => w.x === next.x && w.y === next.y)) return;
            if (planning.some(p => p.x === next.x && p.y === next.y)) return;
            
            planning.push(next);
            energy = Math.max(0, 100 - planning.length * 10);
            updateUI();
        }
        
        // 执行计划
        function executePlan() {
            if (planning.length <= 1) return;
            
            gameState = 'executing';
            isFrozen = false;
            document.getElementById('freezeBtn').textContent = '❄️ 冻结时间 (空格)';
            document.getElementById('executeBtn').disabled = true;
            
            let stepIndex = 0;
            const executeInterval = setInterval(() => {
                stepIndex++;
                if (stepIndex >= planning.length) {
                    clearInterval(executeInterval);
                    player.x = planning[planning.length - 1].x;
                    player.y = planning[planning.length - 1].y;
                    planning = [];
                    gameState = 'playing';
                    checkWin();
                    return;
                }
                
                player.x = planning[stepIndex].x;
                player.y = planning[stepIndex].y;
                
                // 检查碰撞
                if (checkEnemyCollision()) {
                    clearInterval(executeInterval);
                    gameOver();
                }
            }, 200);
        }
        
        // 更新敌人位置
        function updateEnemies() {
            if (isFrozen) return;
            
            enemies.forEach(enemy => {
                if (enemy.pattern === 'patrol') {
                    const nextX = enemy.x + enemy.dir.x;
                    const nextY = enemy.y + enemy.dir.y;
                    
                    if (enemy.dir.x !== 0) {
                        if (nextX < enemy.patrolRange[0] || nextX > enemy.patrolRange[1]) {
                            enemy.dir.x *= -1;
                        } else {
                            enemy.x = nextX;
                        }
                    }
                    if (enemy.dir.y !== 0) {
                        if (nextY < enemy.patrolRange[0] || nextY > enemy.patrolRange[1]) {
                            enemy.dir.y *= -1;
                        } else {
                            enemy.y = nextY;
                        }
                    }
                } else if (enemy.pattern === 'circle') {
                    enemy.angle += 0.1;
                    enemy.x = Math.round(enemy.center.x + Math.cos(enemy.angle) * enemy.radius);
                    enemy.y = Math.round(enemy.center.y + Math.sin(enemy.angle) * enemy.radius);
                }
            });
            
            if (checkEnemyCollision()) {
                gameOver();
            }
        }
        
        // 检查敌人碰撞
        function checkEnemyCollision() {
            return enemies.some(e => e.x === player.x && e.y === player.y);
        }
        
        // 检查胜利
        function checkWin() {
            if (player.x === exit.x && player.y === exit.y) {
                document.getElementById('levelComplete').style.display = 'block';
                gameState = 'won';
            }
        }
        
        // 游戏结束
        function gameOver() {
            document.getElementById('gameOver').style.display = 'block';
            gameState = 'lost';
        }
        
        // 重置关卡
        function resetLevel() {
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'none';
            initLevel();
        }
        
        // 下一关
        function nextLevel() {
            level++;
            document.getElementById('levelComplete').style.display = 'none';
            initLevel();
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('level').textContent = level;
            document.getElementById('energyBar').style.width = energy + '%';
            document.getElementById('status').textContent = isFrozen ? '冻结中' : '流动';
            document.getElementById('status').style.color = isFrozen ? '#00ffff' : '#ff6600';
        }
        
        // 绘制
        function draw() {
            // 清空
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let x = 0; x <= GRID_W; x++) {
                ctx.beginPath();
                ctx.moveTo(x * TILE_SIZE, 0);
                ctx.lineTo(x * TILE_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= GRID_H; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * TILE_SIZE);
                ctx.lineTo(canvas.width, y * TILE_SIZE);
                ctx.stroke();
            }
            
            // 绘制墙壁
            ctx.fillStyle = '#444';
            walls.forEach(w => {
                ctx.fillRect(w.x * TILE_SIZE + 2, w.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
            });
            
            // 绘制出口
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(exit.x * TILE_SIZE + 5, exit.y * TILE_SIZE + 5, TILE_SIZE - 10, TILE_SIZE - 10);
            ctx.fillStyle = '#000';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('出口', exit.x * TILE_SIZE + TILE_SIZE/2, exit.y * TILE_SIZE + TILE_SIZE/2 + 7);
            
            // 绘制规划路径
            if (planning.length > 1) {
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(planning[0].x * TILE_SIZE + TILE_SIZE/2, planning[0].y * TILE_SIZE + TILE_SIZE/2);
                for (let i = 1; i < planning.length; i++) {
                    ctx.lineTo(planning[i].x * TILE_SIZE + TILE_SIZE/2, planning[i].y * TILE_SIZE + TILE_SIZE/2);
                }
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 绘制规划点
                ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
                planning.forEach((p, i) => {
                    if (i > 0) {
                        ctx.beginPath();
                        ctx.arc(p.x * TILE_SIZE + TILE_SIZE/2, p.y * TILE_SIZE + TILE_SIZE/2, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }
            
            // 绘制敌人
            enemies.forEach(e => {
                ctx.fillStyle = isFrozen ? '#ff0000' : '#ff6600';
                ctx.beginPath();
                ctx.arc(e.x * TILE_SIZE + TILE_SIZE/2, e.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/3, 0, Math.PI * 2);
                ctx.fill();
                
                // 敌人视线范围（冻结时显示）
                if (isFrozen && e.pattern !== 'static') {
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(e.x * TILE_SIZE + TILE_SIZE/2, e.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE * 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
            
            // 绘制玩家
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(player.x * TILE_SIZE + TILE_SIZE/2, player.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/3, 0, Math.PI * 2);
            ctx.fill();
            
            // 冻结效果
            if (isFrozen) {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        // 游戏循环
        function gameLoop() {
            updateEnemies();
            draw();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (gameState === 'lost' || gameState === 'won') return;
            
            if (e.key === ' ') {
                e.preventDefault();
                toggleFreeze();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (isFrozen) executePlan();
            } else if (isFrozen) {
                switch(e.key) {
                    case 'ArrowUp': case 'w': case 'W':
                        e.preventDefault();
                        addPlanningStep(0, -1);
                        break;
                    case 'ArrowDown': case 's': case 'S':
                        e.preventDefault();
                        addPlanningStep(0, 1);
                        break;
                    case 'ArrowLeft': case 'a': case 'A':
                        e.preventDefault();
                        addPlanningStep(-1, 0);
                        break;
                    case 'ArrowRight': case 'd': case 'D':
                        e.preventDefault();
                        addPlanningStep(1, 0);
                        break;
                }
            } else {
                // 普通移动
                let dx = 0, dy = 0;
                switch(e.key) {
                    case 'ArrowUp': case 'w': case 'W': dy = -1; break;
                    case 'ArrowDown': case 's': case 'S': dy = 1; break;
                    case 'ArrowLeft': case 'a': case 'A': dx = -1; break;
                    case 'ArrowRight': case 'd': case 'D': dx = 1; break;
                }
                if (dx !== 0 || dy !== 0) {
                    e.preventDefault();
                    const nextX = player.x + dx;
                    const nextY = player.y + dy;
                    if (nextX >= 0 && nextX < GRID_W && nextY >= 0 && nextY < GRID_H) {
                        if (!walls.some(w => w.x === nextX && w.y === nextY)) {
                            player.x = nextX;
                            player.y = nextY;
                            if (checkEnemyCollision()) {
                                gameOver();
                            } else {
                                checkWin();
                            }
                        }
                    }
                }
            }
        });
        
        // 初始化
        initLevel();
        setInterval(gameLoop, 500);
    </script>
</body>
</html>
