<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谁是卧底 - 小学生版</title>
    <link href="https://fonts.googleapis.com/css2?family=Zcool+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/deepspace-daylight.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Zcool KuaiLe', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        body.daylight {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7b8d8 100%);
        }
        
        .game-container {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        body.daylight .game-container {
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .header {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            padding: 25px;
            text-align: center;
            color: #fff;
        }
        
        .header h1 {
            font-size: 32px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content { padding: 25px; }
        
        .setup-section { margin-bottom: 25px; }
        
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        .word-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .word-display .label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        
        .word-display .word {
            font-size: 48px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        
        .player-info {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .hidden { display: none !important; }
        
        .vote-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .vote-btn {
            padding: 15px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
        
        .vote-btn:hover {
            border-color: #667eea;
            background: #f8f8ff;
        }
        
        .vote-btn.voted {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }
        
        .vote-btn.eliminated {
            opacity: 0.5;
            text-decoration: line-through;
            pointer-events: none;
        }
        
        .timer {
            text-align: center;
            font-size: 48px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .timer.warning { color: #f5576c; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .result-card {
            background: #f8f8f8;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .result-card.winner {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        
        .result-card.loser {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: #fff;
        }
        
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            transition: all 0.2s;
        }
        .nav a:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎭 谁是卧底</h1>
            <p class="subtitle">小学生版 - 友谊第一，比赛第二</p>
        </div>
        
        <div class="nav">
            <a href="../../index.html">← 首页</a>
            <a href="../../kimi-claw/">能力图谱 →</a>
        </div>
        
        <div class="content">
            <!-- 设置阶段 -->
            <div id="setupSection" class="setup-section">
                <div class="section-title">👥 游戏设置</div>
                
                <div class="input-group">
                    <label>玩家人数</label>
                    <select id="playerCount">
                        <option value="4">4人</option>
                        <option value="5">5人</option>
                        <option value="6" selected>6人</option>
                        <option value="7">7人</option>
                        <option value="8">8人</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>卧底人数</label>
                    <select id="spyCount">
                        <option value="1" selected>1人</option>
                        <option value="2">2人</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>发言时间（秒）</label>
                    <input type="number" id="speakTime" value="60" min="30" max="180">
                </div>
                
                <button class="btn btn-primary" onclick="startGame()">🚀 开始游戏</button>
            </div>
            
            <!-- 游戏阶段 -->
            <div id="gameSection" class="hidden">
                <div class="word-display" id="wordDisplay">
                    <div class="label">👤 玩家 <span id="currentPlayer">1</span> 请看词</div>
                    <div class="word" id="currentWord">🤫</div>
                    <div class="player-info" id="playerInfo">你是平民</div>
                </div>
                
                <button class="btn btn-primary" id="nextBtn" onclick="nextPlayer()">👍 我看好了</button>
                <button class="btn btn-secondary hidden" id="startSpeakBtn" onclick="startSpeaking()">🎤 开始发言</button>
            </div>
            
            <!-- 发言阶段 -->
            <div id="speakSection" class="hidden">
                <div class="section-title">🎤 发言阶段 - 第 <span id="roundNum">1</span> 轮</div>
                
                <div class="timer" id="timer">60</div>
                
                <p style="text-align: center; color: #666; margin-bottom: 20px;">
                    请按顺序描述你的词语，不能直接说出词语哦！
                </p>
                
                <button class="btn btn-primary" onclick="endSpeaking()">⏭️ 发言结束，进入投票</button>
            </div>
            
            <!-- 投票阶段 -->
            <div id="voteSection" class="hidden">
                <div class="section-title">🗳️ 投票阶段</div>
                
                <p style="text-align: center; color: #666; margin-bottom: 20px;">
                    选出你认为是卧底的人
                </p>
                
                <div class="vote-section" id="voteButtons"></div>
                
                <div id="voteResult" class="hidden">
                    <div class="result-card" id="resultCard">
                        <h3 id="resultTitle"></h3>
                        <p id="resultDesc"></p>
                    </div>
                    
                    <button class="btn btn-primary" id="continueBtn" onclick="nextRound()">➡️ 继续下一轮</button>
                    <button class="btn btn-secondary hidden" id="endBtn" onclick="endGame()">🏆 查看最终结果</button>
                </div>
            </div>
            
            <!-- 结果阶段 -->
            <div id="resultSection" class="hidden">
                <div class="section-title">🏆 游戏结束</div>
                
                <div id="finalResult"></div>
                
                <button class="btn btn-primary" onclick="location.reload()">🔄 再来一局</button>
            </div>
        </div>
    </div>
    
    <script>
        // 词库
        const wordPairs = [
            ['苹果', '香蕉'],
            ['牛奶', '豆浆'],
            ['地铁', '公交车'],
            ['篮球', '足球'],
            ['冰淇淋', '雪糕'],
            ['书包', '背包'],
            ['铅笔', '钢笔'],
            ['蛋糕', '面包'],
            ['医生', '护士'],
            ['老师', '教授'],
            ['警察', '保安'],
            ['手机', '电话'],
            ['电脑', '平板'],
            ['电视', '电影'],
            ['小说', '漫画'],
            ['钢琴', '小提琴'],
            ['猫', '狗'],
            ['春天', '秋天'],
            ['早餐', '晚餐'],
            ['眼睛', '眼镜']
        ];
        
        let gameData = {
            players: [],
            currentPlayer: 0,
            currentRound: 1,
            words: [],
            spyIndices: [],
            eliminated: [],
            votes: [],
            timer: null,
            timeLeft: 60
        };
        
        function startGame() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const spyCount = parseInt(document.getElementById('spyCount').value);
            gameData.timeLeft = parseInt(document.getElementById('speakTime').value);
            
            // 随机选择词对
            const wordPair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
            gameData.words = wordPair;
            
            // 分配卧底
            gameData.spyIndices = [];
            while (gameData.spyIndices.length < spyCount) {
                const idx = Math.floor(Math.random() * playerCount);
                if (!gameData.spyIndices.includes(idx)) {
                    gameData.spyIndices.push(idx);
                }
            }
            
            // 初始化玩家
            gameData.players = [];
            for (let i = 0; i < playerCount; i++) {
                gameData.players.push({
                    id: i + 1,
                    isSpy: gameData.spyIndices.includes(i),
                    eliminated: false
                });
            }
            
            gameData.currentPlayer = 0;
            gameData.currentRound = 1;
            gameData.eliminated = [];
            gameData.votes = new Array(playerCount).fill(0);
            
            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('gameSection').classList.remove('hidden');
            
            showWord();
        }
        
        function showWord() {
            const player = gameData.players[gameData.currentPlayer];
            document.getElementById('currentPlayer').textContent = player.id;
            document.getElementById('currentWord').textContent = player.isSpy ? gameData.words[1] : gameData.words[0];
            document.getElementById('playerInfo').textContent = player.isSpy ? '你是卧底！🕵️' : '你是平民👥';
        }
        
        function nextPlayer() {
            gameData.currentPlayer++;
            
            if (gameData.currentPlayer >= gameData.players.length) {
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('startSpeakBtn').classList.remove('hidden');
                document.getElementById('wordDisplay').innerHTML = '<div class="word">🎭</div><div class="label">所有人都已看词</div>';
            } else {
                showWord();
            }
        }
        
        function startSpeaking() {
            document.getElementById('gameSection').classList.add('hidden');
            document.getElementById('speakSection').classList.remove('hidden');
            
            document.getElementById('roundNum').textContent = gameData.currentRound;
            startTimer();
        }
        
        function startTimer() {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = gameData.timeLeft;
            timerEl.classList.remove('warning');
            
            gameData.timer = setInterval(() => {
                gameData.timeLeft--;
                timerEl.textContent = gameData.timeLeft;
                
                if (gameData.timeLeft <= 10) {
                    timerEl.classList.add('warning');
                }
                
                if (gameData.timeLeft <= 0) {
                    clearInterval(gameData.timer);
                    endSpeaking();
                }
            }, 1000);
        }
        
        function endSpeaking() {
            clearInterval(gameData.timer);
            document.getElementById('speakSection').classList.add('hidden');
            document.getElementById('voteSection').classList.remove('hidden');
            
            setupVoteButtons();
        }
        
        function setupVoteButtons() {
            const container = document.getElementById('voteButtons');
            container.innerHTML = '';
            
            gameData.players.forEach((player, index) => {
                if (!player.eliminated) {
                    const btn = document.createElement('button');
                    btn.className = 'vote-btn';
                    btn.textContent = `玩家${player.id}`;
                    btn.onclick = () => vote(index);
                    container.appendChild(btn);
                }
            });
            
            document.getElementById('voteResult').classList.add('hidden');
        }
        
        function vote(targetIndex) {
            // 统计票数
            gameData.votes[targetIndex]++;
            
            // 简单AI投票
            gameData.players.forEach((player, index) => {
                if (!player.eliminated && index !== targetIndex) {
                    // 随机投票给非自己的人
                    const validTargets = gameData.players
                        .map((p, i) => ({ p, i }))
                        .filter(({ p, i }) => !p.eliminated && i !== index)
                        .map(({ i }) => i);
                    
                    if (validTargets.length > 0) {
                        const randomTarget = validTargets[Math.floor(Math.random() * validTargets.length)];
                        gameData.votes[randomTarget]++;
                    }
                }
            });
            
            // 找出最高票
            let maxVotes = 0;
            let maxIndex = -1;
            gameData.votes.forEach((votes, index) => {
                if (votes > maxVotes) {
                    maxVotes = votes;
                    maxIndex = index;
                }
            });
            
            // 淘汰
            if (maxIndex >= 0) {
                gameData.players[maxIndex].eliminated = true;
                gameData.eliminated.push(maxIndex);
                
                const isSpy = gameData.players[maxIndex].isSpy;
                
                document.getElementById('resultTitle').textContent = `玩家${gameData.players[maxIndex].id} 被淘汰！`;
                document.getElementById('resultDesc').textContent = isSpy ? 'TA 是卧底！🕵️' : 'TA 是平民...😢';
                
                const card = document.getElementById('resultCard');
                card.className = 'result-card ' + (isSpy ? 'winner' : 'loser');
            }
            
            document.getElementById('voteResult').classList.remove('hidden');
            document.getElementById('voteButtons').style.pointerEvents = 'none';
            
            // 检查游戏结束
            const remainingSpies = gameData.players.filter((p, i) => !p.eliminated && p.isSpy).length;
            const remainingCivilians = gameData.players.filter((p, i) => !p.eliminated && !p.isSpy).length;
            
            if (remainingSpies === 0 || remainingSpies >= remainingCivilians) {
                document.getElementById('continueBtn').classList.add('hidden');
                document.getElementById('endBtn').classList.remove('hidden');
            }
            
            // 重置票数
            gameData.votes = new Array(gameData.players.length).fill(0);
        }
        
        function nextRound() {
            gameData.currentRound++;
            gameData.timeLeft = parseInt(document.getElementById('speakTime').value);
            gameData.currentPlayer = 0;
            
            document.getElementById('voteSection').classList.add('hidden');
            document.getElementById('voteButtons').style.pointerEvents = 'auto';
            document.getElementById('speakSection').classList.remove('hidden');
            
            startTimer();
        }
        
        function endGame() {
            document.getElementById('voteSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            const remainingSpies = gameData.players.filter((p, i) => !p.eliminated && p.isSpy).length;
            const spiesWin = remainingSpies > 0;
            
            const container = document.getElementById('finalResult');
            container.innerHTML = `
                <div class="result-card ${spiesWin ? 'loser' : 'winner'}" style="padding: 40px;">
                    <div style="font-size: 64px; margin-bottom: 20px;">${spiesWin ? '🕵️' : '👥'}</div>
                    <h2 style="font-size: 28px; margin-bottom: 15px;">${spiesWin ? '卧底获胜！' : '平民获胜！'}</h2>
                    <p>${spiesWin ? '卧底成功隐藏身份！' : '平民成功找出所有卧底！'}</p>
                </div>
                <div style="margin-top: 20px; padding: 20px; background: #f8f8f8; border-radius: 15px;">
                    <p style="color: #666; margin-bottom: 10px;"><strong>词语揭晓：</strong></p>
                    <p>平民词：<strong>${gameData.words[0]}</strong> | 卧底词：<strong>${gameData.words[1]}</strong></p>
                </div>
            `;
        }
    </script>
    <script src="../../js/theme-system.js"></script>
</body>
</html>
