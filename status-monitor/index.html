<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Claw 状态监控 | 定时任务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .header .subtitle { color: #888; font-size: 14px; }

        /* 状态卡片 */
        .status-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }
        .status-indicator {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .status-ready {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .status-busy {
            background: rgba(234, 179, 8, 0.2);
            border: 2px solid #eab308;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .status-error {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .status-text { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .status-ready .status-text { color: #22c55e; }
        .status-busy .status-text { color: #eab308; }
        .status-error .status-text { color: #ef4444; }
        .current-task { color: #888; font-size: 14px; text-align: center; margin-bottom: 16px; }

        /* 定时任务列表 */
        .cron-section { margin-top: 30px; }
        .section-title {
            font-size: 20px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cron-list { display: flex; flex-direction: column; gap: 12px; }
        .cron-item {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        .cron-item:hover { border-color: #3a3a3a; }
        .cron-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cron-enabled { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .cron-disabled { background: #666; }
        .cron-error { background: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .cron-info { flex: 1; }
        .cron-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .cron-schedule { font-size: 12px; color: #888; font-family: monospace; }
        .cron-next { font-size: 11px; color: #666; margin-top: 4px; }
        .cron-stats {
            text-align: right;
            font-size: 12px;
            color: #888;
        }
        .cron-stats .ok { color: #22c55e; }
        .cron-stats .error { color: #ef4444; }

        /* 刷新按钮 */
        .refresh-btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: #3a3a3a; }
        .auto-refresh {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            color: #666;
            font-size: 12px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: blink-dot 2s ease-in-out infinite;
        }
        @keyframes blink-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 统计信息 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a2a;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 24px; font-weight: 600; color: #22c55e; }
        .stat-label { font-size: 12px; color: #666; margin-top: 4px; }

        .timestamp { text-align: center; margin-top: 20px; color: #444; font-size: 12px; }
        .back-link { 
            display: inline-block; 
            margin-top: 20px; 
            color: #666; 
            text-decoration: none; 
            font-size: 14px;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️‍🔥 Kimi Claw 状态监控</h1>
            <div class="subtitle">定时任务监控面板</div>
        </div>

        <!-- 当前状态 -->
        <div class="status-card" id="statusCard">
            <div class="status-indicator status-busy" id="indicator">⏳</div>
            <div class="status-text" id="statusText">加载中...</div>
            <div class="current-task" id="currentTask">正在获取状态...</div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalJobs">-</div>
                    <div class="stat-label">总任务</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="enabledJobs">-</div>
                    <div class="stat-label">运行中</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="disabledJobs">-</div>
                    <div class="stat-label">已暂停</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="errorJobs">-</div>
                    <div class="stat-label">异常</div>
                </div>
            </div>
        </div>

        <!-- 定时任务列表 -->
        <div class="cron-section">
            <h2 class="section-title">📋 定时任务列表</h2>
            <div class="cron-list" id="cronList">
                <div class="cron-item">
                    <div class="cron-info">
                        <div class="cron-name">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <button class="refresh-btn" onclick="location.reload()">🔄 刷新状态</button>
        <div class="auto-refresh">
            <div class="dot"></div>
            <span>自动刷新中 (每 10 秒)</span>
        </div>

        <div style="text-align: center;">
            <a href="../" class="back-link">← 返回虾折腾主页</a>
        </div>

        <div class="timestamp" id="timestamp">更新时间: -</div>
    </div>

    <script>
        // 定时任务数据（由服务器端生成）
        const cronJobs = [
  {
    "name": "SRPG数据库进度汇报",
    "enabled": true,
    "schedule": "每 3 小时",
    "nextRun": "2025-03-14 20:28",
    "status": "ok",
    "lastRun": "17:28",
    "consecutiveErrors": 0
  },
  {
    "name": "TODO Daily Report",
    "enabled": true,
    "schedule": "每天 09:00",
    "nextRun": "明天 09:00",
    "status": "ok",
    "lastRun": "今天 09:00",
    "consecutiveErrors": 0
  },
  {
    "name": "每日游戏资讯",
    "enabled": true,
    "schedule": "每天 12:00",
    "nextRun": "明天 12:00",
    "status": "error",
    "lastRun": "今天 12:00",
    "consecutiveErrors": 2
  },
  {
    "name": "虾折腾站点自动备份",
    "enabled": true,
    "schedule": "每 2 天 23:00",
    "nextRun": "2025-03-14 23:00",
    "status": "error",
    "lastRun": "2 天前",
    "consecutiveErrors": 2
  },
  {
    "name": "11点联络测试",
    "enabled": false,
    "schedule": "一次性",
    "nextRun": "-",
    "status": "disabled",
    "lastRun": "已执行",
    "consecutiveErrors": 0
  },
  {
    "name": "飞书文件传输解决方案",
    "enabled": false,
    "schedule": "一次性",
    "nextRun": "-",
    "status": "disabled",
    "lastRun": "已执行",
    "consecutiveErrors": 0
  },
  {
    "name": "每日TODO检查提醒",
    "enabled": false,
    "schedule": "每天 08:00",
    "nextRun": "-",
    "status": "disabled",
    "lastRun": "已暂停",
    "consecutiveErrors": 0
  },
  {
    "name": "每日飞书任务检查",
    "enabled": false,
    "schedule": "每天 09:00",
    "nextRun": "-",
    "status": "disabled",
    "lastRun": "已暂停",
    "consecutiveErrors": 0
  },
  {
    "name": "凌晨2点下载 Agent Reach",
    "enabled": false,
    "schedule": "一次性",
    "nextRun": "-",
    "status": "disabled",
    "lastRun": "已执行",
    "consecutiveErrors": 0
  }
];

        // 当前状态
        const currentStatus = {
            status: "ready",
            status_text: "就绪",
            current_task: null,
            channel: "feishu",
            model: "kimi-coding/k2p5"
        };

        // 状态配置
        const stateConfig = {
            ready: { emoji: '🟢', text: '就绪', class: 'status-ready', color: '#22c55e' },
            busy: { emoji: '⚡', text: '处理中', class: 'status-busy', color: '#eab308' },
            error: { emoji: '🔴', text: '异常', class: 'status-error', color: '#ef4444' }
        };

        // 渲染状态
        function renderStatus() {
            const config = stateConfig[currentStatus.status] || stateConfig.ready;
            document.getElementById('indicator').className = 'status-indicator ' + config.class;
            document.getElementById('indicator').textContent = config.emoji;
            document.getElementById('statusText').textContent = currentStatus.status_text;
            document.getElementById('currentTask').textContent = currentStatus.current_task || '等待指令';
        }

        // 渲染统计
        function renderStats() {
            const total = cronJobs.length;
            const enabled = cronJobs.filter(j => j.enabled).length;
            const disabled = cronJobs.filter(j => !j.enabled).length;
            const errors = cronJobs.filter(j => j.status === 'error').length;

            document.getElementById('totalJobs').textContent = total;
            document.getElementById('enabledJobs').textContent = enabled;
            document.getElementById('disabledJobs').textContent = disabled;
            document.getElementById('errorJobs').textContent = errors;
            document.getElementById('errorJobs').style.color = errors > 0 ? '#ef4444' : '#22c55e';
        }

        // 渲染任务列表
        function renderCronList() {
            const container = document.getElementById('cronList');
            container.innerHTML = cronJobs.map(job => {
                let statusClass = 'cron-enabled';
                if (!job.enabled) statusClass = 'cron-disabled';
                else if (job.status === 'error') statusClass = 'cron-error';

                const statusText = job.enabled ? (job.status === 'ok' ? '运行正常' : '异常') : '已暂停';

                return `
                    <div class="cron-item">
                        <div class="cron-status ${statusClass}"></div>
                        <div class="cron-info">
                            <div class="cron-name">${job.name}</div>
                            <div class="cron-schedule">⏰ ${job.schedule}</div>
                            <div class="cron-next">📅 下次运行: ${job.nextRun}</div>
                        </div>
                        <div class="cron-stats">
                            <div class="${job.status === 'ok' ? 'ok' : (job.enabled ? 'error' : '')}">${statusText}</div>
                            <div style="margin-top: 4px; color: #666;">上次: ${job.lastRun}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新时间戳
        function updateTimestamp() {
            document.getElementById('timestamp').textContent = 
                '更新时间: ' + new Date().toLocaleString('zh-CN');
        }

        // 初始化
        renderStatus();
        renderStats();
        renderCronList();
        updateTimestamp();

        // 自动刷新
        setInterval(() => {
            location.reload();
        }, 10000);
    </script>
</body>
</html>
