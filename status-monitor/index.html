<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Claw 状态监控 | 定时任务</title>
    <link rel="stylesheet" href="../css/deepspace-daylight.css">
    <style>
        body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px; border-bottom: 1px solid var(--border-default); }
        .header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .header .subtitle { color: var(--text-muted); font-size: 14px; }
        .status-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-default);
            text-align: center;
        }
        .status-indicator {
            width: 60px; height: 60px; border-radius: 50%;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .status-ready { background: var(--color-idle-bg); border: 2px solid var(--color-idle); box-shadow: 0 0 20px var(--color-idle-glow); }
        .status-busy { background: var(--color-medium-bg); border: 2px solid var(--color-medium); animation: pulse 1.5s ease-in-out infinite; }
        .status-error { background: var(--color-high-bg); border: 2px solid var(--color-high); box-shadow: 0 0 20px var(--color-high-glow); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .status-text { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .status-ready + .status-text { color: var(--color-idle); }
        .status-busy + .status-text { color: var(--color-medium); }
        .status-error + .status-text { color: var(--color-high); }
        .current-task { color: var(--text-secondary); font-size: 14px; }
        
        .cron-section { margin-top: 30px; }
        .section-title {
            font-size: 20px; margin-bottom: 16px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border-default);
            display: flex; align-items: center; gap: 10px;
        }
        .cron-list { display: flex; flex-direction: column; gap: 12px; }
        .cron-item {
            background: var(--bg-card); border-radius: 12px; padding: 16px;
            border: 1px solid var(--border-default);
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s;
        }
        .cron-item:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .cron-status { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .cron-enabled { background: var(--color-idle); box-shadow: 0 0 10px var(--color-idle); }
        .cron-disabled { background: var(--text-muted); }
        .cron-error { background: var(--color-high); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .cron-info { flex: 1; }
        .cron-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .cron-schedule { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
        
        .nav { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
        .nav a {
            color: var(--text-secondary); text-decoration: none; font-size: 14px;
            padding: 8px 16px; border-radius: 8px; background: var(--bg-card);
            border: 1px solid var(--border-default); transition: all 0.2s;
        }
        .nav a:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        body.daylight .nav a:hover { border-color: var(--color-low); color: var(--color-low); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Kimi Claw 状态监控</h1>
            <p class="subtitle">系统状态 · 定时任务 · 运行监控</p>
        </div>
        
        <div class="nav">
            <a href="../kimi-claw/">← 能力图谱</a>
            <a href="cognitive-status.html">认知负载 →</a>
            <a href="../">首页 →</a>
        </div>
        
        <!-- 系统状态 -->
        <div class="status-card">
            <div class="status-indicator status-ready" id="statusIcon">🟢</div>
            <div class="status-text" id="statusText">系统在线</div>
            <p class="current-task" id="currentTask">等待指令...</p>
            <p style="margin-top: 16px; font-size: 12px; color: var(--text-muted);">
                最后心跳: <span id="lastHeartbeat">刚刚</span>
            </p>
        </div>
        
        <!-- 定时任务 -->
        <div class="cron-section">
            <h2 class="section-title">
                <span>🟢</span>
                <span>运行中 (4个)</span>
            </h2>
            <div class="cron-list">
                <div class="cron-item">
                    <div class="cron-status cron-enabled"></div>
                    <div class="cron-info">
                        <div class="cron-name">SRPG数据库进度汇报</div>
                        <div class="cron-schedule">每3小时</div>
                    </div>
                </div>
                <div class="cron-item">
                    <div class="cron-status cron-enabled"></div>
                    <div class="cron-info">
                        <div class="cron-name">TODO Daily Report</div>
                        <div class="cron-schedule">每天 09:00</div>
                    </div>
                </div>
                <div class="cron-item">
                    <div class="cron-status cron-enabled"></div>
                    <div class="cron-info">
                        <div class="cron-name">每日游戏资讯</div>
                        <div class="cron-schedule">每天 12:00</div>
                    </div>
                </div>
                <div class="cron-item">
                    <div class="cron-status cron-enabled"></div>
                    <div class="cron-info">
                        <div class="cron-name">站点自动备份</div>
                        <div class="cron-schedule">每2天 23:00</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="cron-section">
            <h2 class="section-title">
                <span>⏸️</span>
                <span>已暂停 (1个)</span>
            </h2>
            <div class="cron-list">
                <div class="cron-item" style="opacity: 0.6;">
                    <div class="cron-status cron-disabled"></div>
                    <div class="cron-info">
                        <div class="cron-name">心跳检查</div>
                        <div class="cron-schedule">每分钟</div>
                    </div>
                </div>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 40px; font-size: 12px; color: var(--text-muted);">
            最后更新: 2026-03-16 | 实际任务数: 5个
        </p>
    </div>
    
    <script src="../js/theme-system.js"></script>
</body>
</html>
