<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Claw 实时状态监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 520px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .header .subtitle { color: #888; font-size: 14px; }
        
        .status-card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .status-indicator {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .status-indicator::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            opacity: 0.5;
            filter: blur(8px);
            transition: all 0.5s;
        }
        
        .status-ready {
            background: rgba(34, 197, 94, 0.15);
            border: 3px solid #22c55e;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34, 197, 94, 0.1);
        }
        .status-ready::before { background: #22c55e; }
        
        .status-busy {
            background: rgba(234, 179, 8, 0.15);
            border: 3px solid #eab308;
            box-shadow: 0 0 40px rgba(234, 179, 8, 0.4), inset 0 0 20px rgba(234, 179, 8, 0.1);
            animation: pulse-ring 2s ease-in-out infinite;
        }
        .status-busy::before { background: #eab308; }
        
        .status-error {
            background: rgba(239, 68, 68, 0.15);
            border: 3px solid #ef4444;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.1);
        }
        .status-error::before { background: #ef4444; }
        
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .status-text { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .status-ready .status-text { color: #22c55e; }
        .status-busy .status-text { color: #eab308; }
        .status-error .status-text { color: #ef4444; }
        
        .current-task {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 32px;
            min-height: 22px;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .metric {
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 12px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .metric-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        .metric-value {
            color: #fff;
            font-size: 14px;
            font-family: 'SF Mono', Monaco, monospace;
        }
        
        .latency-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 24px;
            overflow: hidden;
        }
        
        .latency-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #eab308);
            border-radius: 2px;
            transition: width 0.3s ease;
            animation: shimmer 2s linear infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .latency-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .timestamp {
            text-align: center;
            margin-top: 24px;
            color: #444;
            font-size: 12px;
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 20px;
            font-size: 12px;
            color: #22c55e;
            margin-top: 16px;
        }
        
        .connection-status.offline {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .config-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .config-panel h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .config-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 10px;
        }
        
        .config-input::placeholder { color: #555; }
        .config-input:focus {
            outline: none;
            border-color: #22c55e;
        }
        
        .btn {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn:hover { background: #2ddc6b; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️‍🔥 Kimi Claw</h1>
            <div class="subtitle">实时状态监控</div>
        </div>
        
        <div class="status-card">
            <div class="status-indicator status-busy" id="indicator">⏳</div>
            <div class="status-text" id="statusText">连接中...</div>
            <div class="current-task" id="currentTask">正在初始化...</div>
            
            <div class="connection-status" id="connStatus">
                <div class="dot"></div>
                <span>实时连接中</span>
            </div>
            
            <div class="latency-bar">
                <div class="latency-fill" id="latencyFill" style="width: 0%"></div>
            </div>
            <div class="latency-text">
                <span>延迟</span>
                <span id="latencyValue">-- ms</span>
            </div>
            
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">频道</div>
                    <div class="metric-value" id="channel">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">模型</div>
                    <div class="metric-value" id="model">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">会话</div>
                    <div class="metric-value" id="session">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">最后心跳</div>
                    <div class="metric-value" id="lastHeartbeat">--</div>
                </div>
            </div>
            
            <div class="config-panel" id="configPanel">
                <h3>🔧 Upstash 配置</h3>
                <input type="text" class="config-input" id="upstashUrl" 
                       placeholder="Redis REST URL (如: https://xxx.upstash.io)" />
                <input type="password" class="config-input" id="upstashToken" 
                       placeholder="Redis REST Token" />
                <button class="btn" onclick="saveConfig()">保存并连接</button>
            </div>
        </div>
        
        <div class="timestamp" id="timestamp">等待配置...</div>
    </div>

    <script>
        // 配置 (从 localStorage 读取或用户输入)
        let config = {
            url: localStorage.getItem('upstash_url') || 'https://singular-snake-71209.upstash.io',
            token: localStorage.getItem('upstash_token') || 'gQAAAAAAARYpAAIncDE2NmRhOGU0OWFhZWM0N2I4OGZlMGZkNGM5NjdjMTI5NnAxNzEyMDk'
        };
        
        // 状态配置
        const stateConfig = {
            ready: { emoji: '🟢', text: '就绪', class: 'status-ready', color: '#22c55e' },
            busy: { emoji: '⚡', text: '处理中', class: 'status-busy', color: '#eab308' },
            error: { emoji: '🔴', text: '异常', class: 'status-error', color: '#ef4444' },
            unknown: { emoji: '⚪', text: '未知', class: '', color: '#888' }
        };
        
        // 如果有配置，隐藏配置面板
        if (config.url && config.token) {
            document.getElementById('configPanel').style.display = 'none';
            document.getElementById('upstashUrl').value = config.url;
            startPolling();
        }
        
        function saveConfig() {
            config.url = document.getElementById('upstashUrl').value.trim();
            config.token = document.getElementById('upstashToken').value.trim();
            
            if (!config.url || !config.token) {
                alert('请填写完整的 URL 和 Token');
                return;
            }
            
            localStorage.setItem('upstash_url', config.url);
            localStorage.setItem('upstash_token', config.token);
            
            document.getElementById('configPanel').style.display = 'none';
            startPolling();
        }
        
        async function fetchStatus() {
            const startTime = performance.now();
            
            try {
                // Upstash GET /get/:key
                const response = await fetch(`${config.url}/get/status.json`, {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const latency = Math.round(performance.now() - startTime);
                
                if (data.result) {
                    const status = JSON.parse(data.result);
                    updateUI(status, latency);
                    return true;
                }
            } catch (err) {
                console.error('Fetch error:', err);
                showOffline();
            }
            return false;
        }
        
        function updateUI(data, latency) {
            const statusKey = data.status || 'unknown';
            const cfg = stateConfig[statusKey] || stateConfig.unknown;
            
            // 更新指示器
            const indicator = document.getElementById('indicator');
            indicator.className = `status-indicator ${cfg.class}`;
            indicator.textContent = cfg.emoji;
            
            // 更新文本
            document.getElementById('statusText').textContent = data.status_text || cfg.text;
            document.getElementById('currentTask').textContent = data.current_task || '无任务';
            
            // 更新指标
            document.getElementById('channel').textContent = data.channel || '--';
            document.getElementById('model').textContent = data.model || '--';
            document.getElementById('session').textContent = data.session_uptime || '--';
            
            // 格式化心跳时间
            const hb = data.last_heartbeat || data.since;
            document.getElementById('lastHeartbeat').textContent = formatTime(hb);
            
            // 更新延迟
            document.getElementById('latencyValue').textContent = `${latency} ms`;
            const latencyPercent = Math.min(latency / 500 * 100, 100);
            document.getElementById('latencyFill').style.width = `${latencyPercent}%`;
            document.getElementById('latencyFill').style.background = 
                latency < 100 ? '#22c55e' : latency < 300 ? '#eab308' : '#ef4444';
            
            // 更新连接状态
            const connStatus = document.getElementById('connStatus');
            connStatus.className = 'connection-status';
            connStatus.innerHTML = `<div class="dot"></div><span>实时连接 (${latency}ms)</span>`;
            
            // 更新时间戳
            document.getElementById('timestamp').textContent = 
                `最后同步: ${new Date().toLocaleString('zh-CN')}`;
        }
        
        function showOffline() {
            const connStatus = document.getElementById('connStatus');
            connStatus.className = 'connection-status offline';
            connStatus.innerHTML = `<div class="dot"></div><span>连接断开</span>`;
            document.getElementById('latencyFill').style.width = '0%';
        }
        
        function formatTime(isoString) {
            if (!isoString) return '--';
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
                });
            } catch { return isoString; }
        }
        
        function startPolling() {
            fetchStatus(); // 立即获取
            setInterval(fetchStatus, 3000); // 每 3 秒轮询
        }
    </script>
</body>
</html>
