<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Jetton 认知负载监控</title>
    <link rel="stylesheet" href="cognitive-status.css?v=5.22.1">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧠 Shrimp Jetton</h1>
            <div class="subtitle">认知负载监控 - 基于会话分析的科学指标</div>
            <div class="version">
                <span id="versionText">v5.22.1</span> | <span class="countdown-simple">⏱️ <span class="num" id="countdownSec">30</span>s</span> | 💓 <span id="lastHeartbeat">--:--:--</span>
            </div>
        </div>
        <!-- Compact Status Bar -->
        <div class="compact-status">
            <div class="compact-status-item">
                <div class="compact-status-label">连接</div>
                <div class="compact-status-value" id="connectionValue">检测中...</div>
            </div>
            <div class="compact-status-item">
                <div class="compact-status-label">频道</div>
                <div class="compact-status-value">多源聚合</div>
            </div>
            <div class="compact-status-item">
                <div class="compact-status-label">模型</div>
                <div class="compact-status-value">Kimi K2.5</div>
            </div>
            <div class="compact-status-item">
                <div class="compact-status-label">状态</div>
                <div class="compact-status-value" id="modelStatusValue">待命</div>
            </div>
            <div class="compact-status-item">
                <div class="compact-status-label">CPU</div>
                <div class="compact-status-value" id="cpuValue">--</div>
            </div>
            <div class="compact-status-item">
                <div class="compact-status-label">内存</div>
                <div class="compact-status-value" id="memoryValue">--</div>
            </div>
            <div class="compact-status-item">
                <div class="compact-status-label">心跳</div>
                <div class="compact-status-value online" id="heartbeatValue">💓</div>
            </div>
        </div>
        <!-- Radio Gauge -->
        <div class="radio-gauge">
            <div class="radio-header">
                <div class="radio-title">
                    <span class="icon">📻</span>
                    <span class="text">STATUS TUNER</span>
                </div>
                <div class="radio-screen">
                    <div class="radio-screen-text" id="radioStatusText">检测中...</div>
                </div>
            </div>
            
            <div class="radio-main">
                <div class="radio-left">
                    <div class="radio-percent" id="scorePercent">--</div>
                </div>
                <div class="radio-right">
                    <div class="radio-scale-container">
                        <div class="radio-track">
                            <div class="radio-ticks">
                                <div class="tick-major"></div>
                                <div class="tick-major"></div>
                                <div class="tick-major"></div>
                                <div class="tick-major"></div>
                                <div class="tick-major"></div>
                                <div class="tick-major"></div>
                            </div>
                            <div class="radio-gradient"></div>
                            <div class="radio-pointer" id="gaugePointer"></div>
                        </div>
                        <div class="radio-numbers">
                            <span>0</span>
                            <span>20</span>
                            <span>40</span>
                            <span>60</span>
                            <span>80</span>
                            <span>100</span>
                        </div>
                    </div>
                    
                    <div class="radio-zones">
                        <div class="radio-zone idle" id="zoneIdle">IDLE</div>
                        <div class="radio-zone low" id="zoneLow">LOW</div>
                        <div class="radio-zone medium" id="zoneMedium">MID</div>
                        <div class="radio-zone high" id="zoneHigh">BUSY</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Metrics Grid -->
        <div class="metrics-grid">
            <div class="metric-card" onclick="showMetricTip('sessions')">
                <div class="metric-label">Sessions</div>
                <div class="metric-value" id="sessionsValue">--</div>
            </div>
            <div class="metric-card" onclick="showMetricTip('pending')">
                <div class="metric-label">Pending</div>
                <div class="metric-value" id="pendingValue">--</div>
            </div>
            <div class="metric-card" onclick="showMetricTip('processing')">
                <div class="metric-label">Processing</div>
                <div class="metric-value" id="processingValue">--</div>
            </div>
            <div class="metric-card" onclick="showMetricTip('tokens')">
                <div class="metric-label">Tokens</div>
                <div class="metric-value" id="tokensValue">--</div>
            </div>
            <div class="metric-card" onclick="showMetricTip('wait')">
                <div class="metric-label">Est.Wait</div>
                <div class="metric-value" id="waitValue">--</div>
            </div>
        </div>
        <!-- Task Queue -->
        <div class="task-queue">
            <h3>📋 当前任务队列</h3>
            <div id="taskList">
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-name">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Stock Chart -->
        <div class="stock-chart-container">
            <div class="stock-chart-header">
                <div class="stock-chart-title">📈 认知负载走势</div>
                <div class="time-range-buttons">
                    <button class="time-btn active" onclick="switchTimeRange('5m')">5分</button>
                    <button class="time-btn" onclick="switchTimeRange('15m')">15分</button>
                    <button class="time-btn" onclick="switchTimeRange('1h')">1小时</button>
                </div>
            </div>
            <div class="stock-chart-wrapper">
                <canvas class="stock-chart-canvas" id="stockChart"></canvas>
            </div>
            <div class="stock-legend">
                <div class="legend-item">
                    <div class="legend-color" style="background:#00ffff"></div>
                    <span>评分范围</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background:rgba(255,255,255,0.3)"></div>
                    <span>平均线</span>
                </div>
                <span id="stockStats"></span>
            </div>
        </div>
        
        <!-- Tooltip -->
        <div class="metric-tooltip" id="metricTooltip" onclick="hideMetricTip()">
            <div class="tooltip-content" onclick="event.stopPropagation()">
                <div class="tooltip-title" id="tooltipTitle"></div>
                <div class="tooltip-desc" id="tooltipDesc"></div>
                <div class="tooltip-formula" id="tooltipFormula"></div>
                <button class="tooltip-close" onclick="hideMetricTip()">知道了</button>
            </div>
        </div>
        
        <div class="update-time" id="updateTime"></div>
    </div>
    
    <script src="cognitive-status.js?v=5.22.1"></script>
</body>
</html>
