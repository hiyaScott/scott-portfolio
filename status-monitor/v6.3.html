<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Shrimp Jetton 认知负载监控 - v6.3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header .subtitle { color: #888; font-size: 14px; }
        .version {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 15px;
        }
        
        .status-card {
            background: linear-gradient(180deg, rgba(35,35,50,0.95) 0%, rgba(25,25,40,0.98) 100%);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .tuner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tuner-title { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .status-badge {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .radio-display {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .percent-display { text-align: center; min-width: 80px; }
        .percent-number {
            font-size: 64px;
            font-weight: bold;
            line-height: 1;
        }
        .percent-number.idle { color: #22c55e; }
        .percent-number.low { color: #3b82f6; }
        .percent-number.medium { color: #eab308; }
        .percent-number.high { color: #ef4444; }
        .percent-label { font-size: 12px; color: #666; margin-top: 5px; }
        
        .radio-track-container { flex: 1; }
        .radio-track {
            height: 60px;
            background: linear-gradient(90deg, #22c55e 0%, #22c55e 25%, #3b82f6 25%, #3b82f6 45%, #eab308 45%, #eab308 65%, #ef4444 65%, #ef4444 100%);
            border-radius: 8px;
            position: relative;
            margin-bottom: 10px;
        }
        .radio-pointer {
            position: absolute;
            top: -5px;
            width: 4px;
            height: 70px;
            background: #fff;
            border-radius: 2px;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: left 0.5s ease;
        }
        .radio-scale {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            padding: 0 5px;
        }
        
        .zone-indicators {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .zone {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0.4;
        }
        .zone.active { opacity: 1; background: rgba(255,255,255,0.1); }
        .zone-idle { color: #22c55e; }
        .zone-low { color: #3b82f6; }
        .zone-medium { color: #eab308; }
        .zone-high { color: #ef4444; }
        .zone-dot { width: 10px; height: 10px; border-radius: 50%; }
        .zone-idle .zone-dot { background: #22c55e; }
        .zone-low .zone-dot { background: #3b82f6; }
        .zone-medium .zone-dot { background: #eab308; }
        .zone-high .zone-dot { background: #ef4444; }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .metric-card {
            background: rgba(255,255,255,0.03);
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
        }
        .metric-label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .metric-value { font-size: 18px; font-weight: bold; }
        
        .task-queue {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .task-queue h3 { font-size: 16px; margin-bottom: 15px; color: #aaa; }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .task-name { font-size: 14px; }
        .task-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
        }
        .task-badge.processing { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .task-badge.waiting { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .task-badge.idle { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        
        .cache-info {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
        }
        .cache-info .live { color: #22c55e; }
        
        @media (max-width: 600px) {
            .metrics-grid { grid-template-columns: repeat(3, 1fr); }
            .percent-number { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 40px;">🧠</div>
            <h1>Shrimp Jetton</h1>
            <div class="subtitle">认知负载监控 - 基于会话分析的科学指标</div>
            <div class="version">v6.3 · 实时直连模式 · 绕过CDN缓存</div>
        </div>
        
        <div class="cache-info">
            <div>🔄 数据更新时间: <span id="dataTime">--</span></div>
            <div class="live">⚡ 直连服务器数据（非GitHub Pages缓存）</div>
        </div>
        
        <div class="status-card">
            <div class="tuner-header">
                <div class="tuner-title">📻 STATUS TUNER</div>
                <div class="status-badge" id="mainStatus">检测中...</div>
            </div>
            
            <div class="radio-display">
                <div class="percent-display">
                    <div class="percent-number idle" id="scoreDisplay">--</div>
                    <div class="percent-label">PERCENT</div>
                </div>
                <div class="radio-track-container">
                    <div class="radio-track">
                        <div class="radio-pointer" id="pointer" style="left: 0%;"></div>
                    </div>
                    <div class="radio-scale">
                        <span>0</span><span>20</span><span>40</span>
                        <span>60</span><span>80</span><span>100</span>
                    </div>
                </div>
            </div>
            
            <div class="zone-indicators">
                <div class="zone zone-idle active" id="zoneIdle"><div class="zone-dot"></div>IDLE</div>
                <div class="zone zone-low" id="zoneLow"><div class="zone-dot"></div>LOW</div>
                <div class="zone zone-medium" id="zoneMedium"><div class="zone-dot"></div>MID</div>
                <div class="zone zone-high" id="zoneHigh"><div class="zone-dot"></div>BUSY</div>
            </div>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card"><div class="metric-label">Sessions</div><div class="metric-value" id="sessionsVal">--</div></div>
            <div class="metric-card"><div class="metric-label">Pending</div><div class="metric-value" id="pendingVal">--</div></div>
            <div class="metric-card"><div class="metric-label">Processing</div><div class="metric-value" id="processingVal">--</div></div>
            <div class="metric-card"><div class="metric-label">Tokens</div><div class="metric-value" id="tokensVal">--</div></div>
            <div class="metric-card"><div class="metric-label">Est.Wait</div><div class="metric-value" id="estVal">--</div></div>
        </div>
        
        <div class="task-queue">
            <h3>📋 当前任务队列</h3>
            <div id="taskList"><div style="color:#666;padding:20px;text-align:center;">加载中...</div></div>
        </div>
    </div>

<script>
// v6.3: 使用fetch API + 强制绕过缓存
var API_BASE = 'https://raw.githubusercontent.com/hiyaScott/scott-portfolio/main/status-monitor';
var REFRESH_INTERVAL = 10000; // 10秒刷新

function $(id) { return document.getElementById(id); }

function getStatusInfo(score) {
    if (score >= 75) return { className: 'high', label: '高负载', color: '#ef4444' };
    if (score >= 50) return { className: 'medium', label: '中等', color: '#eab308' };
    if (score >= 25) return { className: 'low', label: '轻载', color: '#3b82f6' };
    return { className: 'idle', label: '空闲', color: '#22c55e' };
}

async function fetchData() {
    try {
        // 方法1: 使用GitHub Raw + 时间戳（绕过Pages CDN）
        var url = API_BASE + '/cognitive-data.json?_=' + Date.now();
        console.log('[v6.3] Fetching:', url);
        
        var response = await fetch(url, {
            method: 'GET',
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
        });
        
        if (!response.ok) throw new Error('HTTP ' + response.status);
        
        var data = await response.json();
        console.log('[v6.3] Data:', data);
        
        // 更新时间显示
        $('dataTime').textContent = new Date().toLocaleTimeString('zh-CN');
        
        // 更新UI
        updateUI(data);
        
    } catch (e) {
        console.error('[v6.3] Error:', e);
        $('mainStatus').textContent = '⚠️ ' + e.message;
        
        // 失败时尝试备用方法
        fetchWithXHR();
    }
}

function fetchWithXHR() {
    // 备用: XMLHttpRequest
    var xhr = new XMLHttpRequest();
    var url = API_BASE + '/cognitive-data.json?_=' + Date.now();
    
    xhr.open('GET', url, true);
    xhr.setRequestHeader('Cache-Control', 'no-cache');
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var data = JSON.parse(xhr.responseText);
                $('dataTime').textContent = new Date().toLocaleTimeString('zh-CN') + ' (XHR)';
                updateUI(data);
            } catch(e) {}
        }
    };
    xhr.send();
}

function updateUI(data) {
    var score = data.cognitive_score || 0;
    var info = getStatusInfo(score);
    
    $('scoreDisplay').textContent = score;
    $('scoreDisplay').className = 'percent-number ' + info.className;
    $('mainStatus').textContent = info.label;
    $('mainStatus').style.color = info.color;
    $('pointer').style.left = score + '%';
    
    // 更新区域
    document.querySelectorAll('.zone').forEach(function(z) { z.classList.remove('active'); });
    $('zone' + info.className.charAt(0).toUpperCase() + info.className.slice(1)).classList.add('active');
    
    // 更新指标
    $('sessionsVal').textContent = data.active_sessions || 0;
    $('pendingVal').textContent = data.pending_count || 0;
    $('processingVal').textContent = data.processing_count || 0;
    $('tokensVal').textContent = data.total_tokens_formatted || '0';
    
    var waitText = '立即';
    var queue = (data.processing_count || 0) + (data.pending_count || 0);
    if (queue === 1) waitText = '~30秒';
    else if (queue === 2) waitText = '~1分钟';
    else if (queue > 2) waitText = '~' + Math.ceil(queue * 0.5) + '分钟';
    $('estVal').textContent = waitText;
    
    // 更新任务
    var tasks = data.task_queue || [];
    if (tasks.length === 0) {
        $('taskList').innerHTML = '<div style="color:#666;padding:20px;text-align:center;">✅ 无活跃任务</div>';
    } else {
        var html = '';
        for (var i = 0; i < tasks.length; i++) {
            var task = tasks[i];
            var statusClass = 'idle';
            var statusText = '已回复';
            var ts = task.status || '';
            
            if (ts.indexOf('处理') !== -1 || ts.indexOf('🔄') !== -1) {
                statusClass = 'processing';
                statusText = '处理中';
            } else if (ts.indexOf('等待') !== -1 || ts.indexOf('⏳') !== -1) {
                statusClass = 'waiting';
                statusText = '等待中';
            }
            
            html += '<div class="task-item">' +
                '<span class="task-name">' + (task.label || '💭 任务') + '</span>' +
                '<span class="task-badge ' + statusClass + '"\u003e' + statusText + '</span>' +
                '</div>';
        }
        $('taskList').innerHTML = html;
    }
}

// 启动
document.addEventListener('DOMContentLoaded', function() {
    console.log('[v6.3] Starting...');
    fetchData();
    setInterval(fetchData, REFRESH_INTERVAL);
});
</script>
</body>
</html>
