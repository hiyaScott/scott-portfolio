<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Jetton 认知负载监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header .subtitle { color: #666; font-size: 14px; }
        .header .version {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 12px;
            font-size: 12px;
            color: #22c55e;
        }
        
        /* 倒计时 */
        .countdown-simple {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            font-family: 'SF Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: #00ffff;
        }
        .countdown-simple .num {
            font-size: 14px;
            min-width: 20px;
            text-align: center;
        }
        
        /* 收音机调频仪表盘 */
        .radio-gauge {
            background: linear-gradient(180deg, rgba(30,30,40,0.95) 0%, rgba(20,20,30,0.98) 100%);
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 8px 32px rgba(0,0,0,0.4);
        }
        
        .radio-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .radio-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .radio-title .icon { font-size: 1.4rem; }
        .radio-title .text { 
            font-size: 0.95rem; 
            font-weight: 600; 
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
        }
        
        .radio-freq-display {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }
        
        .radio-scale { position: relative; padding: 0 5px; }
        
        .radio-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.75rem;
        }
        
        .radio-labels span { opacity: 0.5; }
        .radio-labels .green { color: #22c55e; opacity: 0.8; }
        .radio-labels .blue { color: #3b82f6; opacity: 0.8; }
        .radio-labels .yellow { color: #eab308; opacity: 0.8; }
        .radio-labels .red { color: #ef4444; opacity: 0.8; }
        
        .radio-track {
            position: relative;
            height: 55px;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 100%);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .radio-ticks {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
        }
        
        .tick-major {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
        }
        
        .tick-major:nth-child(1) { left: 0%; background: rgba(255,255,255,0.25); }
        .tick-major:nth-child(2) { left: 30%; background: rgba(34,197,94,0.6); }
        .tick-major:nth-child(3) { left: 55%; background: rgba(59,130,246,0.6); }
        .tick-major:nth-child(4) { left: 80%; background: rgba(234,179,8,0.6); }
        .tick-major:nth-child(5) { left: 100%; background: rgba(239,68,68,0.6); }
        
        .tick-minor {
            position: absolute;
            top: 35%;
            width: 1px;
            height: 30%;
            background: rgba(255,255,255,0.12);
        }
        
        .radio-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, 
                #22c55e 0%, #22c55e 30%, 
                #3b82f6 30%, #3b82f6 55%, 
                #eab308 55%, #eab308 80%, 
                #ef4444 80%, #ef4444 100%
            );
            border-radius: 0 0 8px 8px;
        }
        
        .radio-pointer {
            position: absolute;
            top: 6px;
            left: 0%;
            width: 3px;
            height: 70%;
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 2px;
            box-shadow: 0 0 15px #ff6b6b, 0 0 30px rgba(255,107,107,0.5);
            transform: translateX(-50%);
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }
        
        .radio-pointer::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #ff6b6b;
            filter: drop-shadow(0 0 5px #ff6b6b);
        }
        
        .radio-numbers {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-family: 'SF Mono', monospace;
            font-size: 0.7rem;
        }
        
        .radio-numbers span { color: rgba(255,255,255,0.35); }
        
        .radio-status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        
        .radio-status-item { display: flex; align-items: center; gap: 8px; }
        
        .radio-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
            box-shadow: 0 0 10px rgba(102,102,102,0.4);
            transition: all 0.3s ease;
        }
        
        .radio-status-text { font-size: 0.95rem; font-weight: 600; transition: color 0.3s; }
        .radio-hint { font-size: 0.8rem; color: rgba(255,255,255,0.45); }
        
        /* 紧凑状态栏 */
        .compact-status {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 20px;
            border: 1px solid #222;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        .compact-status-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            white-space: nowrap;
        }
        
        .compact-status-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1px;
        }
        
        .compact-status-value {
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            font-family: 'SF Mono', monospace;
        }
        
        .compact-status-value.online { color: #22c55e; }
        .compact-status-value.busy { color: #eab308; }
        .compact-status-value.high { color: #ef4444; }
        
        /* 指标网格 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .metric-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #222;
        }
        
        .metric-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'SF Mono', monospace;
        }
        
        /* 任务队列 */
        .task-queue {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #222;
            margin-bottom: 24px;
        }
        
        .task-queue h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .task-item:last-child { border-bottom: none; }
        .task-name { font-weight: 500; }
        .task-stats { font-size: 13px; color: #666; }
        
        /* 说明 */
        .info-section {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #222;
        }
        .info-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }
        .info-item {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .update-time {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Shrimp Jetton</h1>
            <div class="subtitle">认知负载监控 - 基于会话分析的科学指标</div>
            <div class="version">
                v5.11.0 | <span class="countdown-simple">⏱️ <span class="num" id="countdownSec">15</span>s</span> | 收音机调频仪表盘
            </div>
        </div>
        
        <!-- 紧凑状态栏 -->
        <div class="compact-status">
            <div class="compact-status-item"><span class="compact-status-label">● 连接</span><span class="compact-status-value online" id="connectionValue">实时</span></div>
            <div class="compact-status-item"><span class="compact-status-label">频道</span><span class="compact-status-value" id="channelValue">feishu</span></div>
            <div class="compact-status-item"><span class="compact-status-label">模型</span><span class="compact-status-value" id="modelValue">k2p5</span></div>
            <div class="compact-status-item"><span class="compact-status-label">状态</span><span class="compact-status-value online" id="agentStatusValue">active</span></div>
            <div class="compact-status-item"><span class="compact-status-label">CPU</span><span class="compact-status-value" id="cpuValue">--%</span></div>
            <div class="compact-status-item"><span class="compact-status-label">内存</span><span class="compact-status-value" id="memoryValue">--%</span></div>
            <div class="compact-status-item"><span class="compact-status-label">心跳</span><span class="compact-status-value" id="heartbeatValue">--:--:--</span></div>
        </div>
        
        <!-- 收音机调频仪表盘 -->
        <div class="radio-gauge">
            <div class="radio-header">
                <div class="radio-title"><span class="icon">📻</span><span class="text">STATUS TUNER</span></div>
                <div class="radio-freq-display" id="radioFreq">--%</div>
            </div>
            
            <div class="radio-scale">
                <div class="radio-labels">
                    <span class="green">🟢 空闲</span>
                    <span class="blue">🔵 轻载</span>
                    <span class="yellow">🟡 中等</span>
                    <span class="red">🔴 忙碌</span>
                </div>
                
                <div class="radio-track">
                    <div class="radio-ticks">
                        <div class="tick-major"></div><div class="tick-major"></div><div class="tick-major"></div><div class="tick-major"></div><div class="tick-major"></div>
                        <div class="tick-minor" style="left: 10%"></div><div class="tick-minor" style="left: 20%"></div><div class="tick-minor" style="left: 40%"></div><div class="tick-minor" style="left: 50%"></div><div class="tick-minor" style="left: 60%"></div><div class="tick-minor" style="left: 70%"></div><div class="tick-minor" style="left: 90%"></div>
                    </div>
                    <div class="radio-gradient"></div>
                    <div class="radio-pointer" id="radioPointer"></div>
                </div>
                
                <div class="radio-numbers">
                    <span>0</span><span style="color: rgba(34,197,94,0.6)">30</span><span style="color: rgba(59,130,246,0.6)">55</span><span style="color: rgba(234,179,8,0.6)">80</span><span>100</span>
                </div>
            </div>
            
            <div class="radio-status-bar">
                <div class="radio-status-item"><div class="radio-dot" id="radioDot"></div><span class="radio-status-text" id="radioStatus">检测中...</span></div>
                <div style="width: 1px; height: 16px; background: rgba(255,255,255,0.15);"></div>
                <span class="radio-hint" id="radioHint">基于响应延迟计算</span>
            </div>
        </div>
        
        <!-- 指标网格 -->
        <div class="metrics-grid">
            <div class="metric-card"><div class="metric-label">活跃会话</div><div class="metric-value" id="sessionsValue">--</div></div>
            <div class="metric-card"><div class="metric-label">待处理</div><div class="metric-value" id="pendingValue">--</div></div>
            <div class="metric-card"><div class="metric-label">最长等待</div><div class="metric-value" id="waitValue">--</div></div>
            <div class="metric-card"><div class="metric-label">最后活跃</div><div class="metric-value" id="lastActiveValue">--</div></div>
        </div>
        
        <!-- 任务队列 -->
        <div class="task-queue"><h3>📋 当前任务队列</h3><div id="taskList">加载中...</div></div>
        
        <!-- 说明 -->
        <div class="info-section">
            <div class="info-title">📋 状态说明</div>
            <div class="info-item"><span style="color: #eab308;">⏳</span> <b>等待中</b>：用户发了消息，我还没开始处理</div>
            <div class="info-item"><span style="color: #3b82f6;">🔄</span> <b>处理中</b>：正在执行任务</div>
            <div class="info-item"><span style="color: #22c55e;">✅</span> <b>已回复</b>：任务已完成</div>
        </div>
        
        <div class="update-time" id="updateTime">--</div>
    </div>

    <script>
        const config = {
            url: 'https://singular-snake-71209.upstash.io',
            token: 'gQAAAAAAARYpAAIncDE2NmRhOGU0OWFhZWM0N2I4OGZlMGZkNGM5NjdjMTI5NnAxNzEyMDk'
        };
        
        async function fetchData() {
            try {
                const response = await fetch(`${config.url}/get/cognitive.json`, {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                
                if (!response.ok) throw new Error('Fetch failed');
                
                const data = await response.json();
                if (!data.result) return;
                
                const outer = JSON.parse(data.result);
                const metrics = JSON.parse(outer.value);
                
                updateUI(metrics);
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        function updateUI(data) {
            const score = data.cognitive_score || 0;
            
            // 更新心跳
            document.getElementById('heartbeatValue').textContent = new Date().toLocaleTimeString('zh-CN', {hour12: false});
            
            // 更新CPU和内存
            const cpuEl = document.getElementById('cpuValue');
            const memEl = document.getElementById('memoryValue');
            if (cpuEl) cpuEl.textContent = (data.cpu_percent || 0) + '%';
            if (memEl) memEl.textContent = (data.memory_percent || 0) + '%';
            
            // 更新连接状态
            const connStatus = score > 80 ? '高负载' : score > 55 ? '中等' : score > 30 ? '轻负载' : '空闲';
            const connColor = score > 80 ? 'high' : score > 55 ? 'busy' : 'online';
            const connEl = document.getElementById('connectionValue');
            if (connEl) {
                connEl.textContent = '实时 (' + connStatus + ')';
                connEl.className = 'compact-status-value ' + connColor;
            }
            
            // 更新agent状态
            const agentStatusEl = document.getElementById('agentStatusValue');
            if (agentStatusEl) {
                agentStatusEl.textContent = data.pending_count > 0 ? 'busy' : 'active';
                agentStatusEl.className = 'compact-status-value ' + (data.pending_count > 0 ? 'busy' : 'online');
            }
            
            // 更新收音机调频仪表盘
            const radioFreq = document.getElementById('radioFreq');
            const radioPointer = document.getElementById('radioPointer');
            const radioStatus = document.getElementById('radioStatus');
            const radioDot = document.getElementById('radioDot');
            const radioHint = document.getElementById('radioHint');
            
            if (radioFreq && radioPointer) {
                radioFreq.textContent = score + '%';
                radioPointer.style.left = score + '%';
                
                let status = '空闲', color = '#22c55e', hint = '可立即响应', glow = 'rgba(34,197,94,0.5)';
                
                if (score >= 80) {
                    status = '高负载'; color = '#ef4444'; hint = '建议稍后派发任务'; glow = 'rgba(239,68,68,0.5)';
                } else if (score >= 55) {
                    status = '中等负载'; color = '#eab308'; hint = '可派发简单任务'; glow = 'rgba(234,179,8,0.5)';
                } else if (score >= 30) {
                    status = '轻负载'; color = '#3b82f6'; hint = '30秒内响应'; glow = 'rgba(59,130,246,0.5)';
                }
                
                radioFreq.style.color = color;
                radioFreq.style.textShadow = `0 0 20px ${glow}`;
                if (radioStatus) { radioStatus.textContent = status; radioStatus.style.color = color; }
                if (radioDot) { radioDot.style.background = color; radioDot.style.boxShadow = `0 0 10px ${glow}`; }
                if (radioHint) radioHint.textContent = hint;
            }
            
            // 更新指标
            document.getElementById('sessionsValue').textContent = data.active_sessions || 0;
            document.getElementById('pendingValue').textContent = data.pending_count || 0;
            
            const waitSec = data.max_wait_sec || 0;
            document.getElementById('waitValue').textContent = waitSec > 60 ? Math.floor(waitSec/60) + 'm' + (waitSec%60) + 's' : waitSec + 's';
            
            const lastSec = data.last_active_sec || 0;
            document.getElementById('lastActiveValue').textContent = lastSec > 60 ? Math.floor(lastSec/60) + 'm前' : lastSec + 's';
            
            // 更新任务队列
            const taskList = document.getElementById('taskList');
            if (data.task_queue && data.task_queue.length > 0) {
                taskList.innerHTML = data.task_queue.map(task => `
                    <div class="task-item">
                        <span class="task-name">${task.name || '💭 未知'}</span>
                        <span class="task-stats">${task.status || '✅ 已回复'}</span>
                    </div>
                `).join('');
            } else {
                taskList.innerHTML = '<div class="task-item"><span class="task-name">无活跃任务</span></div>';
            }
            
            document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
        }
        
        // 初始加载
        fetchData();
        
        // 倒计时刷新
        const UPDATE_INTERVAL = 15;
        let countdown = UPDATE_INTERVAL;
        
        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                countdown = UPDATE_INTERVAL;
                fetchData();
            }
            const el = document.getElementById('countdownSec');
            if (el) el.textContent = countdown;
        }, 1000);
    </script>
</body>
</html>
