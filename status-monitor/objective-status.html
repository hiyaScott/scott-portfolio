<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Claw 客观状态监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header .subtitle { color: #666; font-size: 14px; }
        
        /* 忙碌仪表盘 */
        .busyness-gauge {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid #333;
            margin-bottom: 24px;
        }
        
        .gauge-value {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
        }
        .gauge-value.high { color: #ef4444; }
        .gauge-value.medium { color: #eab308; }
        .gauge-value.low { color: #22c55e; }
        
        .gauge-label {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .gauge-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .gauge-fill {
            height: 100%;
            border-radius: 6px;
            transition: all 0.5s ease;
        }
        .gauge-fill.high { background: linear-gradient(90deg, #ef4444, #f87171); }
        .gauge-fill.medium { background: linear-gradient(90deg, #eab308, #facc15); }
        .gauge-fill.low { background: linear-gradient(90deg, #22c55e, #4ade80); }
        
        .gauge-hints {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }
        
        /* 指标卡片 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .metric-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #222;
        }
        .metric-card:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .metric-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'SF Mono', monospace;
        }
        .metric-value.high { color: #ef4444; }
        .metric-value.medium { color: #eab308; }
        .metric-value.low { color: #22c55e; }
        
        .metric-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        .metric-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.5s ease;
        }
        
        /* 建议区域 */
        .suggestion {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .suggestion.busy {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .suggestion-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .suggestion-text {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
        }
        
        /* 更新时间 */
        .update-time {
            text-align: center;
            color: #444;
            font-size: 12px;
            padding: 20px;
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 20px;
            font-size: 12px;
            color: #22c55e;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️‍🔥 Kimi Claw</h1>
            <div class="subtitle">客观状态监控 - 无法伪造的系统指标</div>
        </div>
        
        <!-- 忙碌仪表盘 -->
        <div class="busyness-gauge">
            <div class="gauge-value" id="busynessValue">--</div>
            <div class="gauge-label" id="statusText">加载中...</div>
            <div class="gauge-bar">
                <div class="gauge-fill" id="busynessBar" style="width: 0%"></div>
            </div>
            <div class="gauge-hints">
                <span>空闲 (0%)</span>
                <span>中等 (30%)</span>
                <span>高负载 (70%+)</span>
            </div>
        </div>
        
        <!-- 建议区域 -->
        <div class="suggestion" id="suggestionBox">
            <div class="suggestion-title" id="suggestionTitle">检测中...</div>
            <div class="suggestion-text" id="suggestionText">正在获取系统指标...</div>
        </div>
        
        <!-- 指标卡片 -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">CPU 使用率</div>
                <div class="metric-value" id="cpuValue">--%</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="cpuBar" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">内存占用</div>
                <div class="metric-value" id="memoryValue">--%</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="memoryBar" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">活跃会话</div>
                <div class="metric-value" id="sessionsValue">--</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="sessionsBar" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">运行中子代理</div>
                <div class="metric-value" id="subagentsValue">--</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="subagentsBar" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="update-time">
            <div class="connection-status">
                <div class="dot"></div>
                <span id="connStatus">实时连接中</span>
            </div>
            <div style="margin-top: 12px;" id="lastUpdate">--</div>
        </div>
    </div>

    <script>
        // Upstash 配置
        const config = {
            url: 'https://singular-snake-71209.upstash.io',
            token: 'gQAAAAAAARYpAAIncDE2NmRhOGU0OWFhZWM0N2I4OGZlMGZkNGM5NjdjMTI5NnAxNzEyMDk'
        };
        
        // 建议文案
        const suggestions = {
            high: {
                title: '🔴 当前高负载',
                text: 'CPU或内存占用较高，或有多个任务在并行处理。建议稍后再分配新任务，或等待当前任务完成。',
                busy: true
            },
            medium: {
                title: '🟡 当前中等负载',
                text: '正在处理一些任务，但仍有余力。可以分配中小型任务，或等待几分钟让当前任务消化。',
                busy: false
            },
            low: {
                title: '🟢 当前空闲',
                text: '系统资源充足，无活跃任务。可以放心分配新任务，我会立即开始处理。',
                busy: false
            }
        };
        
        async function fetchMetrics() {
            try {
                const startTime = performance.now();
                const response = await fetch(`${config.url}/get/metrics.json`, {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const latency = Math.round(performance.now() - startTime);
                
                if (data.result) {
                    const outer = JSON.parse(data.result);
                    const metrics = JSON.parse(outer.value);
                    updateUI(metrics, latency);
                    return true;
                }
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('connStatus').textContent = '连接断开';
            }
            return false;
        }
        
        function updateUI(metrics, latency) {
            const busyness = metrics.busyness_score || 0;
            const statusCode = metrics.status_code || 'low';
            
            // 更新忙碌仪表盘
            const busynessEl = document.getElementById('busynessValue');
            busynessEl.textContent = busyness + '%';
            busynessEl.className = 'gauge-value ' + statusCode;
            
            document.getElementById('statusText').textContent = metrics.status_text || '--';
            
            const barEl = document.getElementById('busynessBar');
            barEl.style.width = busyness + '%';
            barEl.className = 'gauge-fill ' + statusCode;
            
            // 更新指标卡片
            updateMetricCard('cpu', metrics.cpu_percent || 0, '%');
            updateMetricCard('memory', metrics.memory_percent || 0, '%');
            updateMetricCard('sessions', metrics.active_sessions || 0, '');
            updateMetricCard('subagents', metrics.running_subagents || 0, '');
            
            // 更新建议
            const suggestion = suggestions[statusCode];
            if (suggestion) {
                const box = document.getElementById('suggestionBox');
                box.className = 'suggestion' + (suggestion.busy ? ' busy' : '');
                document.getElementById('suggestionTitle').textContent = suggestion.title;
                document.getElementById('suggestionText').textContent = suggestion.text;
            }
            
            // 更新时间
            const time = new Date().toLocaleString('zh-CN');
            document.getElementById('lastUpdate').textContent = `最后更新: ${time} (${latency}ms)`;
            document.getElementById('connStatus').textContent = `实时连接 (${latency}ms)`;
        }
        
        function updateMetricCard(type, value, unit) {
            const valueEl = document.getElementById(type + 'Value');
            const barEl = document.getElementById(type + 'Bar');
            
            valueEl.textContent = value + unit;
            
            // 根据数值确定颜色
            let level = 'low';
            if (value >= 70) level = 'high';
            else if (value >= 30) level = 'medium';
            
            valueEl.className = 'metric-value ' + level;
            barEl.style.width = Math.min(value, 100) + '%';
            barEl.className = 'metric-bar-fill ' + level;
        }
        
        // 启动
        fetchMetrics();
        setInterval(fetchMetrics, 5000);
    </script>
</body>
</html>
