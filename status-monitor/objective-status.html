<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Claw 客观状态监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header .subtitle { color: #666; font-size: 14px; }
        
        /* 忙碌仪表盘 */
        .busyness-gauge {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid #333;
            margin-bottom: 24px;
        }
        
        .gauge-value {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
        }
        .gauge-value.high { color: #ef4444; }
        .gauge-value.medium { color: #eab308; }
        .gauge-value.low { color: #22c55e; }
        
        .gauge-label {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .gauge-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .gauge-fill {
            height: 100%;
            border-radius: 6px;
            transition: all 0.5s ease;
        }
        .gauge-fill.high { background: linear-gradient(90deg, #ef4444, #f87171); }
        .gauge-fill.medium { background: linear-gradient(90deg, #eab308, #facc15); }
        .gauge-fill.low { background: linear-gradient(90deg, #22c55e, #4ade80); }
        
        .gauge-hints {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }
        
        /* 指标卡片 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .metric-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #222;
        }
        .metric-card:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .metric-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'SF Mono', monospace;
        }
        .metric-value.high { color: #ef4444; }
        .metric-value.medium { color: #eab308; }
        .metric-value.low { color: #22c55e; }
        
        .metric-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        .metric-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.5s ease;
        }
        
        /* 建议区域 */
        .suggestion {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .suggestion.busy {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .suggestion-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .suggestion-text {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
        }
        
        /* 更新时间 */
        .update-time {
            text-align: center;
            color: #444;
            font-size: 12px;
            padding: 20px;
        }
        
        /* 说明区域 */
        .info-section {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #222;
        }
        .info-title {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-text {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }
        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }
        .info-icon {
            color: #22c55e;
            flex-shrink: 0;
        }
        
        /* 智能诊断 */
        .diagnosis {
            background: linear-gradient(135deg, rgba(34,197,94,0.05) 0%, rgba(59,130,246,0.05) 100%);
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .diagnosis-title {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 12px;
        }
        .diagnosis-content {
            font-size: 14px;
            color: #ccc;
            line-height: 1.7;
        }
        .diagnosis-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(34,197,94,0.15);
            border-radius: 4px;
            font-size: 12px;
            color: #22c55e;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .diagnosis-tag.medium { background: rgba(234,179,8,0.15); color: #eab308; }
        .diagnosis-tag.high { background: rgba(239,68,68,0.15); color: #ef4444; }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 20px;
            font-size: 12px;
            color: #22c55e;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️‍🔥 Kimi Claw</h1>
            <div class="subtitle">客观状态监控 - 无法伪造的系统指标</div>
        </div>
        
        <!-- 忙碌仪表盘 -->
        <div class="busyness-gauge">
            <div class="gauge-value" id="busynessValue">--</div>
            <div class="gauge-label" id="statusText">加载中...</div>
            <div class="gauge-bar">
                <div class="gauge-fill" id="busynessBar" style="width: 0%"></div>
            </div>
            <div class="gauge-hints">
                <span>空闲 (0%)</span>
                <span>中等 (30%)</span>
                <span>高负载 (70%+)</span>
            </div>
        </div>
        
        <!-- 建议区域 -->
        <div class="suggestion" id="suggestionBox">
            <div class="suggestion-title" id="suggestionTitle">检测中...</div>
            <div class="suggestion-text" id="suggestionText">正在获取系统指标...</div>
        </div>
        
        <!-- 指标卡片 -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">CPU 使用率</div>
                <div class="metric-value" id="cpuValue">--%</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="cpuBar" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">内存占用</div>
                <div class="metric-value" id="memoryValue">--%</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="memoryBar" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">活跃会话</div>
                <div class="metric-value" id="sessionsValue">--</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="sessionsBar" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">运行中子代理</div>
                <div class="metric-value" id="subagentsValue">--</div>
                <div class="metric-bar">
                    <div class="metric-bar-fill" id="subagentsBar" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="update-time">
            <div class="connection-status">
                <div class="dot"></div>
                <span id="connStatus">实时连接中</span>
            </div>
            <div style="margin-top: 12px;" id="lastUpdate">--</div>
        </div>
        
        <!-- 智能诊断 -->
        <div class="diagnosis" id="diagnosisBox">
            <div class="diagnosis-title">🔍 智能诊断</div>
            <div class="diagnosis-content" id="diagnosisText">
                正在分析系统状态...
            </div>
        </div>
        
        <!-- 页面说明 -->
        <div class="info-section">
            <div class="info-title">📋 关于本页面</div>
            <div class="info-text">
                <div class="info-item">
                    <span class="info-icon">✓</span>
                    <span><strong>客观指标：</strong>所有数据来自系统实时监控，非人工标记，无法伪造</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">✓</span>
                    <span><strong>更新频率：</strong>每 5 秒自动采集一次，延迟约 3-8 秒</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">✓</span>
                    <span><strong>忙碌指数：</strong>综合 CPU、内存、会话数、子代理数加权计算</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">✓</span>
                    <span><strong>使用建议：</strong>🟢 空闲时可放心派活，🟡/🔴 忙碌时建议等待</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Upstash 配置
        const config = {
            url: 'https://singular-snake-71209.upstash.io',
            token: 'gQAAAAAAARYpAAIncDE2NmRhOGU0OWFhZWM0N2I4OGZlMGZkNGM5NjdjMTI5NnAxNzEyMDk'
        };
        
        // 建议文案
        const suggestions = {
            high: {
                title: '🔴 当前高负载',
                text: 'CPU或内存占用较高，或有多个任务在并行处理。建议稍后再分配新任务，或等待当前任务完成。',
                busy: true
            },
            medium: {
                title: '🟡 当前中等负载',
                text: '正在处理一些任务，但仍有余力。可以分配中小型任务，或等待几分钟让当前任务消化。',
                busy: false
            },
            low: {
                title: '🟢 当前空闲',
                text: '系统资源充足，无活跃任务。可以放心分配新任务，我会立即开始处理。',
                busy: false
            }
        };
        
        async function fetchMetrics() {
            try {
                const startTime = performance.now();
                const response = await fetch(`${config.url}/get/metrics.json`, {
                    headers: { 'Authorization': `Bearer ${config.token}` }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const latency = Math.round(performance.now() - startTime);
                
                if (data.result) {
                    const outer = JSON.parse(data.result);
                    const metrics = JSON.parse(outer.value);
                    updateUI(metrics, latency);
                    return true;
                }
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('connStatus').textContent = '连接断开';
            }
            return false;
        }
        
        // 智能诊断函数
        function generateDiagnosis(metrics) {
            const cpu = metrics.cpu_percent || 0;
            const mem = metrics.memory_percent || 0;
            const sessions = metrics.active_sessions || 0;
            const subagents = metrics.running_subagents || 0;
            const busyness = metrics.busyness_score || 0;
            
            let diagnosis = '';
            let tags = [];
            
            // 根据指标判断活动类型
            if (busyness < 30) {
                diagnosis = '当前系统处于空闲状态，CPU 和内存占用都很低，没有检测到活跃的任务会话。可以放心分配新的工作任务，我会立即开始处理。';
                tags = ['空闲', '可分配任务'];
            } else if (busyness < 50) {
                if (sessions > 0 && subagents === 0) {
                    diagnosis = '正在进行对话回复或简单的消息处理。有一些活跃的会话，但没有后台任务在运行。可以分配中小型任务，或等待当前对话完成。';
                    tags = ['对话中', '轻度忙碌'];
                } else if (subagents > 0) {
                    diagnosis = '正在运行后台子代理任务（如数据分析、代码生成等）。虽然有后台任务，但系统资源仍有余量。可以分配不紧急的任务，或等待后台任务完成。';
                    tags = ['后台任务', '中度忙碌'];
                } else {
                    diagnosis = '系统处于轻度忙碌状态，可能在处理一些常规操作。可以分配简单任务，复杂任务建议稍后。';
                    tags = ['轻度忙碌'];
                }
            } else if (busyness < 70) {
                if (cpu > 50) {
                    diagnosis = 'CPU 使用率较高，可能正在进行计算密集型任务（如数据处理、模型推理等）。建议等待当前任务完成后再分配新工作。';
                    tags = ['计算密集', '高CPU'];
                } else if (subagents >= 2) {
                    diagnosis = '同时运行多个子代理任务，系统并行处理多个工作流。此时分配新任务可能会导致响应变慢，建议等待部分任务完成。';
                    tags = ['多任务并行', '资源紧张'];
                } else {
                    diagnosis = '系统处于中度忙碌状态，有一定的负载压力。如果不是紧急任务，建议等待 5-10 分钟让系统消化当前工作。';
                    tags = ['中度忙碌'];
                }
            } else {
                if (cpu > 70 && mem > 70) {
                    diagnosis = '系统资源接近饱和，CPU 和内存都处于高负载状态。此时系统响应可能会变慢，强烈建议等待当前所有任务完成后再分配新工作。';
                    tags = ['高负载', '资源饱和', '建议等待'];
                } else if (subagents >= 3) {
                    diagnosis = '同时运行大量子代理任务，系统处于满负荷运转状态。新任务可能需要排队等待，建议稍后重试。';
                    tags = ['满负荷', '多子代理', '排队中'];
                } else {
                    diagnosis = '系统处于高负载状态，正在全力处理当前任务。为避免任务堆积和响应延迟，请等待当前忙碌期结束。';
                    tags = ['高负载', '建议等待'];
                }
            }
            
            return { diagnosis, tags };
        }
        
        function updateDiagnosis(metrics) {
            const { diagnosis, tags } = generateDiagnosis(metrics);
            const busyness = metrics.busyness_score || 0;
            
            let tagClass = 'diagnosis-tag';
            if (busyness >= 70) tagClass += ' high';
            else if (busyness >= 30) tagClass += ' medium';
            
            const tagsHtml = tags.map(tag => `<span class="${tagClass}">${tag}</span>`).join('');
            
            document.getElementById('diagnosisText').innerHTML = 
                `<div style="margin-bottom: 12px;">${tagsHtml}</div>` +
                `<div>${diagnosis}</div>`;
        }
        
        function updateUI(metrics, latency) {
            const busyness = metrics.busyness_score || 0;
            const statusCode = metrics.status_code || 'low';
            
            // 更新忙碌仪表盘
            const busynessEl = document.getElementById('busynessValue');
            busynessEl.textContent = busyness + '%';
            busynessEl.className = 'gauge-value ' + statusCode;
            
            document.getElementById('statusText').textContent = metrics.status_text || '--';
            
            const barEl = document.getElementById('busynessBar');
            barEl.style.width = busyness + '%';
            barEl.className = 'gauge-fill ' + statusCode;
            
            // 更新指标卡片
            updateMetricCard('cpu', metrics.cpu_percent || 0, '%');
            updateMetricCard('memory', metrics.memory_percent || 0, '%');
            updateMetricCard('sessions', metrics.active_sessions || 0, '');
            updateMetricCard('subagents', metrics.running_subagents || 0, '');
            
            // 更新建议
            const suggestion = suggestions[statusCode];
            if (suggestion) {
                const box = document.getElementById('suggestionBox');
                box.className = 'suggestion' + (suggestion.busy ? ' busy' : '');
                document.getElementById('suggestionTitle').textContent = suggestion.title;
                document.getElementById('suggestionText').textContent = suggestion.text;
            }
            
            // 更新智能诊断
            updateDiagnosis(metrics);
            
            // 更新时间
            const time = new Date().toLocaleString('zh-CN');
            document.getElementById('lastUpdate').textContent = `最后更新: ${time} (${latency}ms)`;
            document.getElementById('connStatus').textContent = `实时连接 (${latency}ms)`;
        }
        
        function updateMetricCard(type, value, unit) {
            const valueEl = document.getElementById(type + 'Value');
            const barEl = document.getElementById(type + 'Bar');
            
            valueEl.textContent = value + unit;
            
            // 根据数值确定颜色
            let level = 'low';
            if (value >= 70) level = 'high';
            else if (value >= 30) level = 'medium';
            
            valueEl.className = 'metric-value ' + level;
            barEl.style.width = Math.min(value, 100) + '%';
            barEl.className = 'metric-bar-fill ' + level;
        }
        
        // 启动
        fetchMetrics();
        setInterval(fetchMetrics, 30000);
        
        // 添加提示: 30秒刷新一次
        document.getElementById('lastUpdate').innerHTML += ' · 每30秒更新一次';
    </script>
</body>
</html>
