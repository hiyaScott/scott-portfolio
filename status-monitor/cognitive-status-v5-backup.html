<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Shrimp Jetton 认知负载监控 - v6.4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 0;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { text-align: center; padding: 30px 0; }
        .header .brain { font-size: 40px; }
        .header h1 { font-size: 28px; margin: 10px 0; }
        .header .subtitle { color: #888; font-size: 14px; }
        .version {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 15px;
        }
        
        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            color: #888;
            font-size: 13px;
        }
        
        /* Info Bar */
        .info-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .info-bar .label { color: #666; }
        .info-bar .value { color: #fff; margin-top: 4px; }
        .info-bar .online { color: #22c55e; }
        
        /* Tuner Card */
        .tuner-card {
            background: linear-gradient(180deg, rgba(35,35,50,0.95) 0%, rgba(25,25,40,0.98) 100%);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .tuner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tuner-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        .tuner-icon { font-size: 24px; }
        .status-badge {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status-badge.detecting { background: rgba(100,100,100,0.3); }
        .status-badge.idle { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-badge.low { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-badge.medium { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .status-badge.high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        /* Radio Display */
        .radio-display {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .percent-display {
            text-align: center;
            min-width: 80px;
        }
        .percent-number {
            font-size: 64px;
            font-weight: bold;
            line-height: 1;
        }
        .percent-number.idle { color: #22c55e; }
        .percent-number.low { color: #3b82f6; }
        .percent-number.medium { color: #eab308; }
        .percent-number.high { color: #ef4444; }
        .percent-label { font-size: 12px; color: #666; margin-top: 5px; }
        
        .radio-track-container { flex: 1; }
        .radio-track {
            height: 60px;
            background: linear-gradient(90deg, #22c55e 0%, #22c55e 25%, #3b82f6 25%, #3b82f6 45%, #eab308 45%, #eab308 65%, #ef4444 65%, #ef4444 100%);
            border-radius: 8px;
            position: relative;
            margin-bottom: 10px;
        }
        .radio-pointer {
            position: absolute;
            top: -5px;
            width: 4px;
            height: 70px;
            background: #fff;
            border-radius: 2px;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: left 0.5s ease;
        }
        .radio-scale {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            padding: 0 5px;
        }
        
        /* Zone Indicators */
        .zone-indicators {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .zone {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0.4;
            transition: all 0.3s;
        }
        .zone.active { opacity: 1; background: rgba(255,255,255,0.1); }
        .zone-idle { color: #22c55e; }
        .zone-low { color: #3b82f6; }
        .zone-medium { color: #eab308; }
        .zone-high { color: #ef4444; }
        .zone-dot { width: 10px; height: 10px; border-radius: 50%; }
        .zone-idle .zone-dot { background: #22c55e; }
        .zone-low .zone-dot { background: #3b82f6; }
        .zone-medium .zone-dot { background: #eab308; }
        .zone-high .zone-dot { background: #ef4444; }
        
        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .metric-card {
            background: rgba(255,255,255,0.03);
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .metric-card:hover { background: rgba(255,255,255,0.06); }
        .metric-label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .metric-value { font-size: 18px; font-weight: bold; }
        
        /* Task Queue */
        .task-queue {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .task-queue h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #aaa;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .task-name { font-size: 14px; }
        .task-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
        }
        .task-badge.processing { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .task-badge.waiting { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .task-badge.idle { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        
        /* Trend Section */
        .trend-section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
        }
        .trend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .trend-header h3 { font-size: 16px; color: #aaa; }
        .trend-controls { display: flex; gap: 8px; }
        .trend-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .trend-btn.active { background: rgba(34, 197, 94, 0.3); color: #22c55e; }
        
        #trendCanvas {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .update-time {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .error-message {
            color: #ef4444;
            padding: 20px;
            text-align: center;
        }
        
        .loading {
            color: #666;
            padding: 40px;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .metrics-grid { grid-template-columns: repeat(3, 1fr); }
            .percent-number { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brain">🧠</div>
            <h1>Shrimp Jetton</h1>
            <div class="subtitle">认知负载监控 - 基于会话分析的科学指标</div>
            <div class="version">v6.4 · 稳定版</div>
        </div>
        
        <div class="status-bar">
            <span>⏱️ <span id="refreshTimer">60s</span></span>
            <span id="lastSyncTime">--:--:--</span>
        </div>
        
        <div class="info-bar">
            <div><div class="label">连接</div><div class="value online" id="connStatus">实时</div></div>
            <div><div class="label">频道</div><div class="value">feishu</div></div>
            <div><div class="label">模型</div><div class="value">k2p5</div></div>
            <div><div class="label">状态</div><div class="value online" id="agentStatus">active</div></div>
            <div><div class="label">CPU</div><div class="value" id="cpuVal">--%</div></div>
            <div><div class="label">内存</div><div class="value" id="memVal">--%</div></div>
        </div>
        
        <div class="tuner-card">
            <div class="tuner-header">
                <div class="tuner-title">
                    <span class="tuner-icon">📻</span>
                    STATUS TUNER
                </div>
                <div class="status-badge detecting" id="mainStatus">检测中...</div>
            </div>
            
            <div id="loadingDisplay" class="loading">正在获取认知负载数据...</div>
            
            <div id="mainDisplay" style="display:none;">
                <div class="radio-display">
                    <div class="percent-display">
                        <div class="percent-number idle" id="scoreDisplay">--</div>
                        <div class="percent-label">PERCENT</div>
                    </div>
                    <div class="radio-track-container">
                        <div class="radio-track">
                            <div class="radio-pointer" id="pointer" style="left: 0%;"></div>
                        </div>
                        <div class="radio-scale">
                            <span>0</span>
                            <span>20</span>
                            <span>40</span>
                            <span>60</span>
                            <span>80</span>
                            <span>100</span>
                        </div>
                    </div>
                </div>
                
                <div class="zone-indicators">
                    <div class="zone zone-idle active" id="zoneIdle"><div class="zone-dot"></div>IDLE</div>
                    <div class="zone zone-low" id="zoneLow"><div class="zone-dot"></div>LOW</div>
                    <div class="zone zone-medium" id="zoneMedium"><div class="zone-dot"></div>MID</div>
                    <div class="zone zone-high" id="zoneHigh"><div class="zone-dot"></div>BUSY</div>
                </div>
            </div>
            
            <div id="errorDisplay" class="error-message" style="display:none;"></div>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Sessions</div>
                <div class="metric-value" id="sessionsVal">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Pending</div>
                <div class="metric-value" id="pendingVal">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Processing</div>
                <div class="metric-value" id="processingVal">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Tokens</div>
                <div class="metric-value" id="tokensVal">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Est.Wait</div>
                <div class="metric-value" id="estVal">--</div>
            </div>
        </div>
        
        <div class="task-queue">
            <h3>📋 当前任务队列</h3>
            <div id="taskList"><div style="color:#666;padding:20px;text-align:center;">加载中...</div></div>
        </div>
        
        <div class="trend-section">
            <div class="trend-header">
                <h3>📈 认知负载走势</h3>
                <div class="trend-controls">
                    <button class="trend-btn active" onclick="setRange('5m')">5分</button>
                    <button class="trend-btn" onclick="setRange('15m')">15分</button>
                    <button class="trend-btn" onclick="setRange('1h')">1小时</button>
                </div>
            </div>
            <canvas id="trendCanvas" width="700" height="200"></canvas>
        </div>
        
        <div class="update-time" id="updateTime">--</div>
    </div>

<script>
// v6.4 - 基于简化版构建的完整监控页面
var DATA_URL = './cognitive-data.json';
var HISTORY_URL = './cognitive-history.jsonl';
var REFRESH_INTERVAL = 30000;
var currentRange = '5m';
var countdown = 60;

function $(id) { return document.getElementById(id); }

function getStatusInfo(score) {
    if (score >= 75) return { className: 'high', label: '高负载', color: '#ef4444' };
    if (score >= 50) return { className: 'medium', label: '中等', color: '#eab308' };
    if (score >= 25) return { className: 'low', label: '轻载', color: '#3b82f6' };
    return { className: 'idle', label: '空闲', color: '#22c55e' };
}

function updateUI(data) {
    $('loadingDisplay').style.display = 'none';
    $('errorDisplay').style.display = 'none';
    $('mainDisplay').style.display = 'block';
    
    var score = data.cognitive_score || 0;
    var info = getStatusInfo(score);
    
    var scoreEl = $('scoreDisplay');
    scoreEl.textContent = score;
    scoreEl.className = 'percent-number ' + info.className;
    
    var statusEl = $('mainStatus');
    statusEl.textContent = info.label;
    statusEl.className = 'status-badge ' + info.className;
    
    $('pointer').style.left = score + '%';
    
    document.querySelectorAll('.zone').forEach(function(z) { z.classList.remove('active'); });
    $('zone' + info.className.charAt(0).toUpperCase() + info.className.slice(1)).classList.add('active');
    
    $('sessionsVal').textContent = data.active_sessions || 0;
    $('pendingVal').textContent = data.pending_count || 0;
    $('processingVal').textContent = data.processing_count || 0;
    $('tokensVal').textContent = data.total_tokens_formatted || '0';
    $('cpuVal').textContent = (data.cpu_percent || 0) + '%';
    $('memVal').textContent = (data.memory_percent || 0) + '%';
    
    var queue = (data.processing_count || 0) + (data.pending_count || 0);
    var waitText = '立即';
    if (queue === 1) waitText = '~30秒';
    else if (queue === 2) waitText = '~1分钟';
    else if (queue > 2) waitText = '~' + Math.ceil(queue * 0.5) + '分钟';
    $('estVal').textContent = waitText;
    
    var tasks = data.task_queue || [];
    if (tasks.length === 0) {
        $('taskList').innerHTML = '<div style="color:#666;padding:20px;text-align:center;">✅ 无活跃任务</div>';
    } else {
        var html = '';
        for (var i = 0; i < tasks.length; i++) {
            var task = tasks[i];
            var statusClass = 'idle';
            var statusText = '已回复';
            var ts = task.status || '';
            
            if (ts.indexOf('处理') !== -1 || ts.indexOf('🔄') !== -1) {
                statusClass = 'processing';
                statusText = '处理中';
            } else if (ts.indexOf('等待') !== -1 || ts.indexOf('⏳') !== -1) {
                statusClass = 'waiting';
                statusText = '等待中';
            }
            
            html += '<div class="task-item">' +
                '<span class="task-name">' + (task.label || '💭 任务') + '</span>' +
                '<span class="task-badge ' + statusClass + '"\u003e' + statusText + '</span>' +
                '</div>';
        }
        $('taskList').innerHTML = html;
    }
    
    $('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
    $('lastSyncTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour12: false});
}

function showError(msg) {
    $('loadingDisplay').style.display = 'none';
    $('mainDisplay').style.display = 'none';
    $('errorDisplay').style.display = 'block';
    $('errorDisplay').textContent = '错误: ' + msg;
}

async function fetchData() {
    try {
        var response = await fetch(DATA_URL + '?t=' + Date.now(), {
            method: 'GET',
            cache: 'no-cache'
        });
        
        if (!response.ok) throw new Error('HTTP ' + response.status);
        
        var data = await response.json();
        updateUI(data);
        
    } catch (err) {
        console.error('[v6.4] Error:', err);
        showError(err.message);
    }
}

function drawTrend(data) {
    var canvas = $('trendCanvas');
    if (!canvas) return;
    
    var ctx = canvas.getContext('2d');
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    
    if (!data || data.length === 0) {
        ctx.fillStyle = '#666';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('暂无历史数据', w / 2, h / 2);
        return;
    }
    
    var padding = { top: 20, right: 30, bottom: 30, left: 40 };
    var chartW = w - padding.left - padding.right;
    var chartH = h - padding.top - padding.bottom;
    
    var scores = [];
    for (var i = 0; i < data.length; i++) scores.push(data[i].score);
    var minScore = Math.min.apply(null, scores);
    var maxScore = Math.max.apply(null, scores);
    var range = maxScore - minScore || 1;
    
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (var j = 0; j <= 4; j++) {
        var y = padding.top + chartH * j / 4;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(padding.left + chartW, y);
        ctx.stroke();
    }
    
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var k = 0; k < data.length; k++) {
        var x = padding.left + chartW * k / (data.length - 1 || 1);
        var y = padding.top + chartH * (1 - (data[k].score - minScore) / range);
        if (k === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

async function fetchTrend() {
    try {
        var response = await fetch(HISTORY_URL + '?t=' + Date.now());
        if (!response.ok) return;
        
        var text = await response.text();
        var lines = text.trim().split('\n');
        var points = [];
        var now = Date.now();
        var cutoff = now - (currentRange === '5m' ? 5 : currentRange === '15m' ? 15 : 60) * 60 * 1000;
        
        for (var i = 0; i < lines.length; i++) {
            try {
                var r = JSON.parse(lines[i]);
                var ts = new Date(r.timestamp).getTime();
                if (ts > cutoff) points.push({ timestamp_ms: ts, score: r.score || 0 });
            } catch (e) {}
        }
        drawTrend(points);
    } catch (e) {
        console.error('[Trend] Error:', e);
    }
}

function setRange(range) {
    currentRange = range;
    document.querySelectorAll('.trend-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    fetchTrend();
}

function startCountdown() {
    countdown = 60;
    setInterval(function() {
        countdown--;
        if (countdown <= 0) {
            countdown = 60;
            fetchData();
            fetchTrend();
        }
        $('refreshTimer').textContent = countdown + 's';
    }, 1000);
}

document.addEventListener('DOMContentLoaded', function() {
    fetchData();
    fetchTrend();
    startCountdown();
    setInterval(fetchData, REFRESH_INTERVAL);
    setInterval(fetchTrend, 300000);
});
</script>
</body>
</html>
