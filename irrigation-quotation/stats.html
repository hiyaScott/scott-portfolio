<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灌溉报价统计后台</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* 登录页 */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-box h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .login-box p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .password-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .password-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .login-btn:hover { opacity: 0.9; }
        
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        
        /* 统计面板 */
        .dashboard {
            display: none;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        
        .dashboard-header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-badge {
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .refresh-btn {
            background: #334155;
            color: var(--text-primary);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover { background: #475569; }
        
        /* 数据卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-card .change {
            font-size: 13px;
            margin-top: 8px;
            color: var(--success);
        }
        
        .stat-card .change.negative { color: #ef4444; }
        
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 24px;
        }
        
        .chart-card h3 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        /* 简单柱状图 */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 100%;
            padding-top: 20px;
        }
        
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 60px;
        }
        
        .bar {
            width: 100%;
            background: linear-gradient(to top, var(--accent), #60a5fa);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.5s ease;
        }
        
        .bar-label {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .bar-value {
            font-size: 11px;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        /* 历史记录 */
        .history-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 24px;
        }
        
        .history-card h3 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }
        
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        
        .history-item:last-child { border-bottom: none; }
        
        .history-date {
            font-size: 14px;
        }
        
        .history-count {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🔐 统计后台</h1>
            <p>S-rain 灌溉报价计算器数据面板</p>
            <input type="password" class="password-input" id="passwordInput" placeholder="输入访问密码" maxlength="6">
            <button class="login-btn" onclick="doLogin()">进入系统</button>
            <div class="error-msg" id="errorMsg">密码错误</div>
        </div>
    </div>
    
    <!-- 统计面板 -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>
                📊 灌溉报价统计
                <span class="status-badge">● 实时</span>
            </h1>
            <div style="display: flex; gap: 12px;">
                <button class="refresh-btn" onclick="exportData()">
                    💾 导出数据
                </button>
                <button class="refresh-btn" onclick="loadStats()">
                    🔄 刷新数据
                </button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总生成次数</div>
                <div class="value" id="totalCount">-</div>
                <div class="change" id="totalChange">↑ 较上月 --%</div>
            </div>
            <div class="stat-card">
                <div class="label">今日生成</div>
                <div class="value" id="todayCount">-</div>
                <div class="change" id="todayChange">--</div>
            </div>
            <div class="stat-card">
                <div class="label">本周累计</div>
                <div class="value" id="weekCount">-</div>
                <div class="change" id="weekChange">--</div>
            </div>
            <div class="stat-card">
                <div class="label">本月累计</div>
                <div class="value" id="monthCount">-</div>
                <div class="change" id="monthChange">--</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 近7天趋势</h3>
                <div class="chart-container">
                    <div class="bar-chart" id="weekChart">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
            
            <div class="chart-card">
                <h3>🕐 时段分布</h3>
                <div class="chart-container">
                    <div class="bar-chart" id="hourChart">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="history-card">
            <h3>📋 每日明细（近30天）</h3>
            <div class="history-list" id="historyList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 配置 - 使用 localStorage 存储（简单方案）
        // 如需云端同步，可更换为 GitHub Gist API
        const CONFIG = {
            password: 'srain8',  // 访问密码，可修改
            storageKey: 'srain_quotation_stats_v1'  // 与计算器埋点使用的 key 一致
        };
        
        // 检查是否已登录
        if (localStorage.getItem('srain_admin_logged_in') === 'true') {
            showDashboard();
        }
        
        function doLogin() {
            const input = document.getElementById('passwordInput').value;
            if (input === CONFIG.password) {
                localStorage.setItem('srain_admin_logged_in', 'true');
                showDashboard();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }
        
        // 回车登录
        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadStats();
        }
        
        // 获取统计数据
        function getStatsData() {
            const data = localStorage.getItem(CONFIG.storageKey);
            if (!data) {
                return { records: [], lastUpdate: null };
            }
            return JSON.parse(data);
        }
        
        // 加载并显示统计
        function loadStats() {
            const data = getStatsData();
            const records = data.records || [];
            
            // 计算基础数据
            const total = records.length;
            const today = new Date().toDateString();
            const todayCount = records.filter(r => new Date(r.time).toDateString() === today).length;
            
            // 本周
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekCount = records.filter(r => new Date(r.time) > weekAgo).length;
            
            // 本月
            const monthAgo = new Date();
            monthAgo.setDate(monthAgo.getDate() - 30);
            const monthCount = records.filter(r => new Date(r.time) > monthAgo).length;
            
            // 更新显示
            document.getElementById('totalCount').textContent = total.toLocaleString();
            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('weekCount').textContent = weekCount;
            document.getElementById('monthCount').textContent = monthCount;
            
            // 渲染图表
            renderWeekChart(records);
            renderHourChart(records);
            renderHistoryList(records);
        }
        
        // 近7天柱状图
        function renderWeekChart(records) {
            const days = [];
            const counts = [];
            
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toDateString();
                const count = records.filter(r => new Date(r.time).toDateString() === dateStr).length;
                
                days.push(d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
                counts.push(count);
            }
            
            const max = Math.max(...counts, 1);
            
            const html = days.map((day, i) => `
                <div class="bar-item">
                    <div class="bar-value">${counts[i]}</div>
                    <div class="bar" style="height: ${(counts[i] / max * 100) || 4}%"></div>
                    <div class="bar-label">${day}</div>
                </div>
            `).join('');
            
            document.getElementById('weekChart').innerHTML = html;
        }
        
        // 时段分布
        function renderHourChart(records) {
            const hours = ['0-4', '4-8', '8-12', '12-16', '16-20', '20-24'];
            const counts = [0, 0, 0, 0, 0, 0];
            
            records.forEach(r => {
                const hour = new Date(r.time).getHours();
                const idx = Math.floor(hour / 4);
                counts[idx]++;
            });
            
            const max = Math.max(...counts, 1);
            
            const html = hours.map((h, i) => `
                <div class="bar-item">
                    <div class="bar-value">${counts[i]}</div>
                    <div class="bar" style="height: ${(counts[i] / max * 100) || 4}%"></div>
                    <div class="bar-label">${h}时</div>
                </div>
            `).join('');
            
            document.getElementById('hourChart').innerHTML = html;
        }
        
        // 历史列表
        function renderHistoryList(records) {
            if (records.length === 0) {
                document.getElementById('historyList').innerHTML = `
                    <div class="empty-state">暂无数据</div>
                `;
                return;
            }
            
            // 按日期分组
            const byDate = {};
            records.forEach(r => {
                const date = new Date(r.time).toLocaleDateString('zh-CN');
                byDate[date] = (byDate[date] || 0) + 1;
            });
            
            // 排序并取最近30天
            const sorted = Object.entries(byDate)
                .sort((a, b) => new Date(b[0]) - new Date(a[0]))
                .slice(0, 30);
            
            const html = sorted.map(([date, count]) => `
                <div class="history-item">
                    <span class="history-date">${date}</span>
                    <span class="history-count">${count} 次</span>
                </div>
            `).join('');
            
            document.getElementById('historyList').innerHTML = html;
        }
        
        // 导出数据
        function exportData() {
            const data = getStatsData();
            const records = data.records || [];
            
            if (records.length === 0) {
                alert('暂无数据可导出');
                return;
            }
            
            // 生成 CSV
            const headers = ['记录ID', '时间', '区域数', '总面积(㎡)', '总报价(元)', '水源类型', '位置类型'];
            const rows = records.map(r => [
                r.id,
                new Date(r.time).toLocaleString('zh-CN'),
                r.areaCount,
                r.totalArea?.toFixed(2) || 0,
                r.totalCost?.toFixed(2) || 0,
                r.waterSource || '-',
                r.locationType || '-'
            ]);
            
            const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            
            // 下载
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `srain_stats_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
        }
        
        // 自动刷新（每30秒）
        setInterval(() => {
            if (document.getElementById('dashboard').style.display !== 'none') {
                loadStats();
            }
        }, 30000);
    </script>
</body>
</html>
