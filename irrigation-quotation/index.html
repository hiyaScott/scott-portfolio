<!DOCTYPE html>

<head>

    <title>花园灌溉报价计算器V1.0</title>
    <!-- 微信兼容性：先加载备用CDN，如果失败再提示 -->
    <script>
        // CDN加载检测和备用方案
        window.xlsxLoaded = false;
        window.xlsxLoadError = false;
        
        function checkXlsxLoaded() {
            if (typeof XLSX !== 'undefined') {
                window.xlsxLoaded = true;
                console.log('[WeChat] XLSX库加载成功');
            } else {
                window.xlsxLoadError = true;
                console.error('[WeChat] XLSX库加载失败');
                showWechatError();
            }
        }
        
        function showWechatError() {
            var ua = navigator.userAgent.toLowerCase();
            var isWechat = ua.indexOf('micromessenger') !== -1;
            
            var errorHtml = '<div style="background:#dc2626;color:white;padding:15px;text-align:center;font-size:14px;line-height:1.6;">';
            if (isWechat) {
                errorHtml += '⚠️ 微信浏览器加载失败，请尝试：<br>';
                errorHtml += '1. 点击右上角 ⋮ 选择"在浏览器打开"<br>';
                errorHtml += '2. 或复制链接到 Safari/Chrome 打开';
            } else {
                errorHtml += '⚠️ 当前网络不稳定，请刷新页面或稍后重试';
            }
            errorHtml += '</div>';
            
            // 插入到body顶部
            if (document.body) {
                var div = document.createElement('div');
                div.innerHTML = errorHtml;
                document.body.insertBefore(div.firstChild, document.body.firstChild);
            } else {
                // 如果body还没加载，等DOMReady
                document.addEventListener('DOMContentLoaded', function() {
                    var div = document.createElement('div');
                    div.innerHTML = errorHtml;
                    document.body.insertBefore(div.firstChild, document.body.firstChild);
                });
            }
        }
        
        // 10秒后检查XLSX是否加载成功
        setTimeout(checkXlsxLoaded, 10000);
    </script>
    <!-- 主CDN：jsDelivr -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" 
            onload="window.xlsxLoaded=true; console.log('[CDN] jsDelivr加载成功');" 
            onerror="window.xlsxLoadError=true; console.error('[CDN] jsDelivr加载失败');"></script>
    <!-- 备用CDN：unpkg -->
    <script>
        // 如果jsDelivr失败，尝试unpkg
        setTimeout(function() {
            if (!window.xlsxLoaded && !window.xlsxLoadError) {
                console.log('[CDN] 尝试备用CDN: unpkg');
                var script = document.createElement('script');
                script.src = 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
                script.onload = function() {
                    window.xlsxLoaded = true;
                    console.log('[CDN] unpkg加载成功');
                };
                script.onerror = function() {
                    window.xlsxLoadError = true;
                    console.error('[CDN] unpkg也加载失败');
                    showWechatError();
                };
                document.head.appendChild(script);
            }
        }, 5000);
    </script>

                        <div class="water-source-desc">标准家庭用水管径，流量约2.5m³/h</div>
                    </div>
                    <div class="water-source-card" onclick="selectPipeSize(this, '32')">
                        <input type="radio" name="pipeSize" value="32">
                        <div class="water-source-icon">🔩</div>
                        <div class="water-source-title">自来水32mm(一寸管)</div>
                        <div class="water-source-desc">大流量进水管，流量约3m³/h</div>
                    </div>
                    <div class="water-source-card" onclick="selectPipeSize(this, 'river_well')">
                        <input type="radio" name="pipeSize" value="river_well">
                        <div class="water-source-icon">💧</div>
                        <div class="water-source-title">河水/井水</div>
                        <div class="water-source-desc">需要配置过滤器和增压设备</div>
                    </div>
                </div>
                
                <div class="form-row" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>花园绿化周长（米）</label>
                        <input type="number" id="gardenPerimeter" min="0" step="0.1" placeholder="请输入花园周长">
                    </div>
                </div>
            </div>
            
            <!-- 绿化区域设置 -->
            <div class="section">
                <div class="section-title">绿化区域设置</div>
                <div id="areasContainer">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        <p>暂无绿化区域，请点击下方按钮添加</p>
                    </div>
                </div>
                <button class="btn-add-area" onclick="addArea()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加绿化区域
                </button>
            </div>
            
            <!-- 生成按钮 -->
            <button class="btn-primary" onclick="generateQuotation()" id="generateBtn">
                生成报价表
            </button>
            
            <!-- 预览结果 -->
            <div class="preview-section hidden" id="previewSection">
                <div class="preview-title">📊 报价预览</div>
                <div class="summary-cards" id="summaryCards"></div>
                <div id="quotationTables"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 微信兼容性检测
        var isWechat = /micromessenger/i.test(navigator.userAgent);
        if (isWechat) {
            console.log('[WeChat] 检测到微信浏览器');
        }
        
        let areaCount = 0;
        let areas = [];
        
        // 喷头配置
        const sprinklerConfig = {
            drip: { name: 'K-rain花园专用滴灌管', price: 7, installFee: 2, flow: 0.01, unit: '米' },
            rect78012: { name: 'PRO-s-78012-矩形', price: 90, installFee: 20, flow: 0.2, unit: '个' },
            rect78004: { name: 'PRO-s-78004-矩形', price: 30, installFee: 20, flow: 0.2, unit: '个' },
            fan78012: { name: 'PRO-s-78012-扇形', price: 90, installFee: 20, flow: 0.5, unit: '个' },
            fan78004: { name: 'PRO-s-78004-扇形', price: 30, installFee: 20, flow: 0.5, unit: '个' },
            mini13012: { name: 'MiniPRO13012', price: 260, installFee: 20, flow: 0.4, unit: '个' },
            mini13003: { name: 'MiniPRO13003', price: 120, installFee: 20, flow: 0.4, unit: '个' },
            super10003: { name: 'SuperPRO10003', price: 150, installFee: 30, flow: 0.8, unit: '个' }
        };
        
        // 选择管径
        function selectPipeSize(el, size) {
            document.querySelectorAll('.water-source-card').forEach(function(item) {
                item.classList.remove('selected');
            });
            el.classList.add('selected');
            var input = el.querySelector('input');
            if (input) input.checked = true;
        }
        
        // 添加绿化区域
        function addArea() {
            areaCount++;
            var container = document.getElementById('areasContainer');
            var emptyState = document.getElementById('emptyState');
            
            if (emptyState) {
                emptyState.remove();
            }
            
            var areaCard = document.createElement('div');
            areaCard.className = 'area-card';
            areaCard.id = 'area-' + areaCount;
            areaCard.innerHTML = 
                '<div class="area-header">' +
                    '<span class="area-title">绿化区域 #' + areaCount + '</span>' +
                    '<button class="btn-delete" onclick="deleteArea(' + areaCount + ')">删除</button>' +
                '</div>' +
                '<div class="form-row">' +
                    '<div class="form-group">' +
                        '<label>长度 (米)</label>' +
                        '<input type="number" id="length-' + areaCount + '" min="0.1" step="0.1" placeholder="请输入长度" onchange="updateLocationVisibility(' + areaCount + ')">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>宽度 (米)</label>' +
                        '<input type="number" id="width-' + areaCount + '" min="0.1" step="0.1" placeholder="请输入宽度" onchange="updateLocationVisibility(' + areaCount + ')">' +
                    '</div>' +
                '</div>' +
                '<div class="form-row">' +
                    '<div class="form-group">' +
                        '<label>植物类型</label>' +
                        '<select id="type-' + areaCount + '">' +
                            '<option value="shrub">灌木带</option>' +
                            '<option value="lawn">草坪</option>' +
                            '<option value="flower">花卉</option>' +
                        '</select>' +
                    '</div>' +
                    '<div class="form-group location-group" id="location-group-' + areaCount + '">' +
                        '<label>位置</label>' +
                        '<select id="location-' + areaCount + '">' +
                            '<option value="edge">边上 (1排)</option>' +
                            '<option value="center">中间 (2排)</option>' +
                        '</select>' +
                    '</div>' +
                '</div>';
            
            container.appendChild(areaCard);
        }
        
        // 删除绿化区域
        function deleteArea(id) {
            var card = document.getElementById('area-' + id);
            if (card) {
                card.remove();
                
                var container = document.getElementById('areasContainer');
                if (container.children.length === 0) {
                    container.innerHTML = 
                        '<div class="empty-state" id="emptyState">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                                '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>' +
                            '</svg>' +
                            '<p>暂无绿化区域，请点击下方按钮添加</p>' +
                        '</div>';
                }
            }
        }
        
        // 更新位置选项可见性
        function updateLocationVisibility(id) {
            var widthEl = document.getElementById('width-' + id);
            var width = parseFloat(widthEl && widthEl.value) || 0;
            var locationGroup = document.getElementById('location-group-' + id);
            
            if (width > 3) {
                locationGroup.classList.add('active');
            } else {
                locationGroup.classList.remove('active');
                document.getElementById('location-' + id).value = 'edge';
            }
        }
        
        // 获取喷头选型
        function getSprinklerType(width, type, location) {
            if (width < 1) {
                if (type === 'shrub' || type === 'flower') {
                    return 'drip';
                }
            }
            
            if (width >= 1 && width <= 1.5) {
                if (type === 'shrub' || type === 'flower') return 'rect78012';
                if (type === 'lawn') return 'rect78004';
            }
            
            if (width > 1.5 && width <= 5) {
                if (type === 'shrub' || type === 'flower') return 'fan78012';
                if (type === 'lawn') return 'fan78004';
            }
            
            if (width >= 5 && width < 9) {
                if (type === 'shrub' || type === 'flower') return 'mini13012';
                if (type === 'lawn') return 'mini13003';
            }

            if (width >= 9 && width <= 30 && type === 'lawn') {
                return 'super10003';
            }
            
            return null;
        }
        
        // 计算喷头数量
        function calculateSprinklerCount(length, width, type, sprinklerType, location) {
            if (sprinklerType === 'drip') {
                var rows = Math.ceil(width / 0.3);
                return { count: length * rows, rows: rows };
            }
            
            if (sprinklerType === 'rect78012' || sprinklerType === 'rect78004') {
                var count = Math.ceil(length / 3);
                return { count: count, rows: 1 };
            }
            
            if (sprinklerType === 'fan78012' || sprinklerType === 'fan78004') {
                var rows = 1;
                if (width > 3) {
                    rows = (location === 'center') ? 2 : 1;
                }
                if (width >= 6 && width <= 9) {
                    rows = 2;
                }
                var spacing = width;
                var countPerRow = Math.ceil(length / spacing);
                return { count: countPerRow * rows, rows: rows };
            }
            
            if (sprinklerType === 'mini13012' || sprinklerType === 'mini13003') {
                var rows = 2;
                var spacing = width;
                var countPerRow = Math.ceil(length / spacing);
                return { count: countPerRow * rows, rows: rows };
            }
            
            if (sprinklerType === 'super10003') {
                var count = Math.ceil((length / 10 + 1)) * Math.ceil((width / 10 + 1));
                return { count: count, rows: 1 };
            }
            
            return { count: 0, rows: 0 };
        }
        
        // 收集区域数据
        function collectAreas() {
            var areas = [];
            var cards = document.querySelectorAll('.area-card');
            
            cards.forEach(function(card) {
                var id = parseInt(card.id.split('-')[1]);
                var lengthEl = document.getElementById('length-' + id);
                var length = parseFloat(lengthEl && lengthEl.value) || 0;
                var widthEl = document.getElementById('width-' + id);
                var width = parseFloat(widthEl && widthEl.value) || 0;
                var typeEl = document.getElementById('type-' + id);
                var type = typeEl && typeEl.value;
                var locationEl = document.getElementById('location-' + id);
                var location = (locationEl && locationEl.value) || 'edge';
                
                if (length > 0 && width > 0) {
                    var sprinklerType = getSprinklerType(width, type, location);
                    var sprinklerCount = calculateSprinklerCount(length, width, type, sprinklerType, location);
                    
                    areas.push({
                        id: id,
                        length: length,
                        width: width,
                        type: type,
                        typeName: type === 'shrub' ? '灌木带' : type === 'lawn' ? '草坪' : '花卉',
                        location: location,
                        locationName: location === 'edge' ? '边上' : '中间',
                        area: length * width,
                        sprinklerType: sprinklerType,
                        sprinklerCount: sprinklerCount.count,
                        sprinklerRows: sprinklerCount.rows
                    });
                }
            });
            
            return areas;
        }
        
        // 计算报价
        function calculateQuotation(areas) {
            var checkedInput = document.querySelector('input[name="pipeSize"]:checked');
            var pipeSizeInput = checkedInput ? checkedInput.value : '25';
            var isRiverWell = pipeSizeInput === 'river_well';
            var pipeSize = isRiverWell ? 'river_well' : parseInt(pipeSizeInput);
            var waterFlow = isRiverWell ? 3.5 : (pipeSize === 25 ? 2.5 : 3);
            
            var gardenPerimeterEl = document.getElementById('gardenPerimeter');
            var gardenPerimeter = parseFloat(gardenPerimeterEl && gardenPerimeterEl.value) || 0;
            
            var sprinklerDetails = [];
            var totalSprinklerCost = 0;
            var totalInstallFee = 0;
            var totalFlow = 0;
            var dripTotalCost = 0;
            
            var sprinklerGroups = {};
            
            areas.forEach(function(area) {
                if (!area.sprinklerType) return;
                
                var config = sprinklerConfig[area.sprinklerType];
                var isDrip = area.sprinklerType === 'drip';
                
                var unitPrice = config.price;
                var installFee = config.installFee;
                var count = area.sprinklerCount;
                
                var itemCost = count * unitPrice;
                var itemInstallFee = count * installFee;
                
                sprinklerDetails.push({
                    area: '区域' + area.id + '(' + area.typeName + ')',
                    size: area.length + '×' + area.width + 'm',
                    model: config.name,
                    count: count,
                    unit: config.unit,
                    unitPrice: unitPrice,
                    cost: itemCost,
                    installFee: itemInstallFee
                });
                
                totalSprinklerCost += itemCost;
                totalInstallFee += itemInstallFee;
                
                if (isDrip) {
                    dripTotalCost += itemCost + itemInstallFee;
                }
                
                if (config.flow > 0) {
                    totalFlow += count * config.flow;
                }
                
                if (!sprinklerGroups[area.sprinklerType]) {
                    var spacing;
                    if (area.sprinklerType === 'rect78012' || area.sprinklerType === 'rect78004') {
                        spacing = 3;
                    } else if (area.sprinklerType === 'super10003') {
                        spacing = 10;
                    } else {
                        spacing = area.width;
                    }
                    sprinklerGroups[area.sprinklerType] = { count: 0, flow: 0, flowPerUnit: config.flow, spacing: spacing };
                }
                sprinklerGroups[area.sprinklerType].count += count;
                sprinklerGroups[area.sprinklerType].flow += count * config.flow;
            });
            
            var buriedCount = 0;
            areas.forEach(function(area) {
                if (area.sprinklerType && area.sprinklerType !== 'drip') {
                    buriedCount += area.sprinklerCount;
                }
            });
            var qianqiuCost = buriedCount * (6 + 1.5);
            
            var valveCount = 0;
            Object.values(sprinklerGroups).forEach(function(group) {
                var groupValves = Math.ceil(group.flow / waterFlow);
                valveCount += groupValves;
            });
            valveCount = Math.max(1, valveCount);
            
            var valveModel = (pipeSize === 25) ? 'K-rain 7075型' : 'K-rain 7001型';
            var valveUnitPrice = (pipeSize === 25) ? (180 + 115) : (196 + 115);
            var valveCost = valveCount * valveUnitPrice;
            
            var valveBoxCost = valveCount * (55 + 20);
            
            var controllerModel, controllerCost, decoderCost = 0;
            if (valveCount <= 4) {
                controllerModel = 'K-rain PRO-LC 3104';
                controllerCost = 1800 + 620;
            } else if (valveCount <= 8) {
                controllerModel = 'K-rain PRO-LC 3108';
                controllerCost = 2000 + 620;
            } else if (valveCount <= 12) {
                controllerModel = 'K-rain PRO-LC 3112';
                controllerCost = 2200 + 620;
            } else {
                controllerModel = 'K-rain PROEX-3.0';
                controllerCost = 4000 + 620;
                decoderCost = valveCount * (530 + 100);
            }
            var controllerCount = 1;
            
            var rainSensorCost = controllerCount * (280 + 80);
            
            var mainPipeLength = gardenPerimeter;
            
            var branchPipeLength = 0;
            Object.values(sprinklerGroups).forEach(function(group) {
                if (group.spacing && group.spacing > 0) {
                    branchPipeLength += group.count * group.spacing;
                }
            });
            
            var tempValveCount = 0;
            Object.values(sprinklerGroups).forEach(function(group) {
                var groupValves = Math.ceil(group.flow / waterFlow);
                tempValveCount += groupValves;
            });
            tempValveCount = Math.max(1, tempValveCount);
            
            var mainPipeSize;
            if (pipeSize === 32 || isRiverWell) {
                mainPipeSize = 32;
            } else {
                mainPipeSize = tempValveCount >= 5 ? 32 : 25;
            }
            
            var pipe32Price = 13 + 8.5;
            var pipe25Price = 9 + 8.5;
            
            var mainPipeCost = mainPipeLength * (mainPipeSize === 32 ? pipe32Price : pipe25Price);
            var branchPipeCost = branchPipeLength * pipe25Price;
            var totalPipeCost = mainPipeCost + branchPipeCost;
            var totalPipeLength = mainPipeLength + branchPipeLength;
            
            var fittingRate;
            if (valveCount < 4) fittingRate = 0.5;
            else if (valveCount <= 10) fittingRate = 0.4;
            else fittingRate = 0.3;
            var fittingCost = totalPipeCost * fittingRate;
            
            var isPROEX = valveCount > 12;
            var controlLineLength;
            if (isPROEX) {
                controlLineLength = mainPipeLength;
            } else {
                controlLineLength = mainPipeLength * valveCount * 0.6;
            }
            var controlLineCost = controlLineLength * (7 + 3);
            
            var conduitCost = mainPipeLength * (3.5 + 1.5);
            
            var pumpCost = 0;
            var riverWellEquipment = null;
            if (isRiverWell) {
                riverWellEquipment = {
                    filter: { name: '自动冲洗过滤器', model: '待定', material: 500, install: 180 },
                    submersiblePump: { name: '灌溉潜水泵', model: '待定', material: 1600, install: 400 },
                    distributionBox: { name: '防雨配电箱', model: '待定', material: 480, install: 380 }
                };
            } else {
                pumpCost = 1450 + 350;
            }
            
            var excavationCost = totalPipeLength * 14;
            var backfillCost = totalPipeLength * 6;
            
            var riverWellCost = 0;
            if (isRiverWell && riverWellEquipment) {
                riverWellCost = riverWellEquipment.filter.material + riverWellEquipment.filter.install +
                               riverWellEquipment.submersiblePump.material + riverWellEquipment.submersiblePump.install +
                               riverWellEquipment.distributionBox.material + riverWellEquipment.distributionBox.install;
            }
            
            var totalCost = totalSprinklerCost + totalInstallFee + qianqiuCost + valveCost + 
                            valveBoxCost + controllerCost + decoderCost + rainSensorCost + 
                            totalPipeCost + fittingCost + controlLineCost + conduitCost + 
                            pumpCost + riverWellCost + excavationCost + backfillCost;
            
            return {
                areas: areas,
                pipeSize: pipeSize,
                waterFlow: waterFlow,
                sprinklerDetails: sprinklerDetails,
                sprinklerCost: totalSprinklerCost,
                installFee: totalInstallFee,
                buriedCount: buriedCount,
                qianqiuCost: qianqiuCost,
                valveCount: valveCount,
                valveModel: valveModel,
                valveCost: valveCost,
                valveBoxCost: valveBoxCost,
                controllerModel: controllerModel,
                controllerCount: controllerCount,
                controllerCost: controllerCost,
                decoderCost: decoderCost,
                rainSensorCost: rainSensorCost,
                mainPipeLength: mainPipeLength,
                branchPipeLength: branchPipeLength,
                mainPipeSize: mainPipeSize,
                mainPipeCost: mainPipeCost,
                branchPipeCost: branchPipeCost,
                totalPipeCost: totalPipeCost,
                totalPipeLength: totalPipeLength,
                fittingCost: fittingCost,
                controlLineLength: controlLineLength,
                controlLineCost: controlLineCost,
                conduitCost: conduitCost,
                pumpCost: pumpCost,
                isRiverWell: isRiverWell,
                riverWellEquipment: riverWellEquipment,
                riverWellCost: riverWellCost,
                excavationCost: excavationCost,
                backfillCost: backfillCost,
                dripTotalCost: dripTotalCost,
                totalCost: totalCost
            };
        }
        
        // 生成报价
        function generateQuotation() {
            if (typeof XLSX === 'undefined') {
                alert('正在加载必要的库，请稍后再试...\n如果持续失败，请用浏览器打开本页面。');
                return;
            }
            
            var areas = collectAreas();
            
            if (areas.length === 0) {
                alert('请至少添加一个绿化区域');
                return;
            }
            
            console.log('开始生成报价，区域数:', areas.length);
            var quotation = calculateQuotation(areas);
            console.log('报价计算完成:', quotation);
            
            displayPreview(quotation);
            
            console.log('开始导出Excel...');
            exportToExcel(quotation);
            console.log('Excel导出完成');
            
            trackQuotationGenerate(quotation);
        }
        
        // 统计埋点功能 - 兼容微信
        function trackQuotationGenerate(quotation) {
            try {
                var recordId = 'qt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                
                var checkedInput = document.querySelector('input[name="pipeSize"]:checked');
                var pipeSizeInput = checkedInput ? checkedInput.value : '25';
                var waterSource = pipeSizeInput === 'river_well' ? '河水/井水' : 
                                   (pipeSizeInput === '32' ? '自来水32mm' : '自来水25mm');
                
                var totalArea = quotation.areas.reduce(function(sum, area) { return sum + (area.length * area.width); }, 0);
                
                var record = {
                    id: recordId,
                    time: new Date().toISOString(),
                    areaCount: quotation.areas.length,
                    totalArea: totalArea,
                    totalCost: quotation.totalCost,
                    waterSource: waterSource,
                    pipeSize: pipeSizeInput
                };
                
                try {
                    var STORAGE_KEY = 'srain_quotation_stats_v1';
                    var statsStr = localStorage.getItem(STORAGE_KEY);
                    var stats = statsStr ? JSON.parse(statsStr) : {records: [], version: '1.0'};
                    stats.records.push(record);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
                    console.log('[Stats] 统计记录已保存:', record);
                } catch (e) {
                    console.log('[Stats] localStorage不可用（微信常见），跳过统计:', e);
                }
            } catch (e) {
                console.error('[Stats] 统计记录失败:', e);
            }
        }
        
        // 显示预览
        function displayPreview(quotation) {
            var previewSection = document.getElementById('previewSection');
            var summaryCards = document.getElementById('summaryCards');
            var tablesContainer = document.getElementById('quotationTables');
            
            previewSection.classList.remove('hidden');
            
            var totalSprinklers = quotation.sprinklerDetails
                .filter(function(item) { return !item.model.includes('滴灌管'); })
                .reduce(function(sum, item) { return sum + item.count; }, 0);
            var totalDripMeters = quotation.sprinklerDetails
                .filter(function(item) { return item.model.includes('滴灌管'); })
                .reduce(function(sum, item) { return sum + item.count; }, 0);
            var totalGreenArea = quotation.areas.reduce(function(sum, area) { return sum + (area.length * area.width); }, 0);
            
            summaryCards.innerHTML = 
                '<div class="summary-card">' +
                    '<div class="label">绿化区域</div>' +
                    '<div class="value">' + quotation.areas.length + ' 个</div>' +
                '</div>' +
                '<div class="summary-card">' +
                    '<div class="label">绿化总面积</div>' +
                    '<div class="value">' + totalGreenArea.toFixed(1) + ' ㎡</div>' +
                '</div>' +
                '<div class="summary-card">' +
                    '<div class="label">喷头总数</div>' +
                    '<div class="value">' + totalSprinklers + ' 个</div>' +
                '</div>' +
                (totalDripMeters > 0 ? 
                '<div class="summary-card">' +
                    '<div class="label">滴灌管长度</div>' +
                    '<div class="value">' + totalDripMeters.toFixed(1) + ' 米</div>' +
                '</div>' : '') +
                '<div class="summary-card">' +
                    '<div class="label">管道总长</div>' +
                    '<div class="value">' + quotation.totalPipeLength.toFixed(1) + ' 米</div>' +
                '</div>' +
                '<div class="summary-card total">' +
                    '<div class="label">总报价</div>' +
                    '<div class="value">¥' + quotation.totalCost.toLocaleString() + '</div>' +
                '</div>';
            
            // ... (rest of displayPreview function remains the same)
            // 为简洁省略，代码与之前相同
            
            previewSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 导出Excel函数 - 简化版
        function exportToExcel(quotation) {
            var wb = XLSX.utils.book_new();
            var today = new Date();
            var dateStr = today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';
            
            var data = [];
            data.push(['灌溉系统 施工报价单', '', '', '', '', '', '', '', '']);
            data.push(['']);
            data.push(['项目地址：', '', '', '', '施工报价单位：', '上海新羽农业科技有限公司', '', '', '']);
            data.push(['联系人及电话：', '', '', '', '合作模式：', '供材+施工安装', '', '', '']);
            data.push(['日期：', dateStr, '', '', '', '', '', '', '']);
            data.push(['']);
            data.push(['序号', '名称/型号/规格', '数量', '单位', '材料单价', '安装费', '单价小计', '合价', '备注（品牌/说明）']);
            
            var rowNum = 1;
            var totalHejia = 0;
            
            quotation.sprinklerDetails.forEach(function(item) {
                var unitTotal = item.unitPrice + item.installFee / (item.count || 1);

                data.push([
                    rowNum++,

                    item.count,
                    item.unit,
                    item.unitPrice,
                    item.installFee / (item.count || 1),
                    unitTotal,
                    hejia,
                    '美国 科雨'

            var date = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, '灌溉系统施工报价单_' + date + '.xlsx');
