<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galcon GSI - 应用安装</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: #2196F3;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            color: white;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { color: #333; font-weight: 500; }
        .download-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #2196F3;
            color: white;
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            margin-top: 24px;
            transition: background 0.2s;
        }
        .download-btn:hover { background: #1976D2; }
        .notice {
            margin-top: 16px;
            padding: 12px;
            background: #fff8e1;
            border-radius: 8px;
            font-size: 13px;
            color: #f57c00;
            line-height: 1.5;
        }
        .alt-links {
            margin-top: 20px;
            text-align: center;
        }
        .alt-links a {
            color: #2196F3;
            text-decoration: none;
            font-size: 14px;
        }
        .alt-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon">💧</div>
        <h1>Galcon GSI</h1>
        <p class="subtitle">灌溉控制器 App</p>
        
        <div class="info-row">
            <span class="info-label">包名</span>
            <span class="info-value">com.ionicframework.myapp246758</span>
        </div>
        <div class="info-row">
            <span class="info-label">版本</span>
            <span class="info-value">1.1.5</span>
        </div>
        <div class="info-row">
            <span class="info-label">大小</span>

        </div>
        <div class="info-row">
            <span class="info-label">系统要求</span>
            <span class="info-value">Android 4.1+</span>
        </div>
        
        <a href="./galcon-gsi-v1.1.5.apk" class="download-btn" download>📥 下载 APK</a>
        
        <div class="notice">
            ⚠️ 此为旧版 Galcon GSI (v1.1.5)，功能与新版本基本一致。新版 (v1.709, 包名 com.galcon.irrigation) 因网络限制暂未获取到。如需最新版，请通过下方 Google Play 链接访问。
        </div>
        
        <div class="alt-links">
            <a href="https://play.google.com/store/apps/details?id=com.galcon.irrigation" target="_blank">🔗 Google Play 官方链接</a>
        </div>
    </div>
</body>
</html>
