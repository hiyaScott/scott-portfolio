<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数轴特工 | 有理数</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-cyan: #00ffff; --neon-pink: #ff00ff; --neon-green: #39ff14;
            --neon-yellow: #ffff00; --neon-red: #ff0040; --neon-purple: #9d00ff;
            --dark: #0a0a0a; --panel: rgba(0,0,0,0.85);
        }
        body {
            background: var(--dark); color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 9999;
        }
        .game-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(0,255,255,0.2); margin-bottom: 20px; }
        .header h1 { font-size: 2rem; color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }
        .header .subtitle { color: #888; margin-top: 8px; }
        .level-indicator { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .level-dot {
            width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
            font-family: 'Share Tech Mono', monospace; cursor: pointer; transition: all 0.3s;
        }
        .level-dot.active { border-color: var(--neon-cyan); background: rgba(0,255,255,0.1); color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .level-dot.completed { border-color: var(--neon-green); background: rgba(57,255,20,0.1); color: var(--neon-green); }
        .level-dot:hover:not(.completed) { border-color: var(--neon-yellow); }
        .game-area {
            background: var(--panel); border: 1px solid rgba(0,255,255,0.2);
            border-radius: 15px; padding: 30px; margin-bottom: 20px;
        }
        .mission-title { font-size: 1.3rem; color: var(--neon-yellow); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .mission-title .icon { font-size: 1.5rem; }
        .mission-desc { color: #aaa; margin-bottom: 20px; line-height: 1.6; }
        /* 数轴样式 */
        .number-line-container { margin: 30px 0; position: relative; height: 200px; }
        .number-line {
            position: absolute; top: 50%; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--neon-red) 0%, #fff 50%, var(--neon-green) 100%);
            border-radius: 2px;
        }
        .number-line-labels {
            position: absolute; top: 50%; left: 0; right: 0; display: flex; justify-content: space-between;
            transform: translateY(15px); font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
        }
        .number-line-labels span { color: #888; }
        .number-line-labels span.zero { color: #fff; font-weight: bold; }
        .number-line-labels span.positive { color: var(--neon-green); }
        .number-line-labels span.negative { color: var(--neon-red); }
        .agent {
            position: absolute; top: 50%; width: 20px; height: 20px;
            background: var(--neon-cyan); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon-cyan);
            transition: left 0.5s ease; z-index: 10;
        }
        .agent::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-top: 10px solid var(--neon-cyan);
        }
        .target {
            position: absolute; top: 50%; width: 16px; height: 16px;
            background: var(--neon-yellow); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon-yellow);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }
        /* 输入区域 */
        .input-area { display: flex; gap: 15px; align-items: center; margin: 20px 0; flex-wrap: wrap; }
        .input-area input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--neon-cyan); color: #fff;
            padding: 12px 20px; border-radius: 8px; font-size: 1.1rem; font-family: 'Share Tech Mono', monospace;
            width: 150px; outline: none;
        }
        .input-area input:focus { box-shadow: 0 0 10px var(--neon-cyan); }
        .btn {
            background: rgba(0,255,255,0.1); border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 1rem;
            transition: all 0.3s; font-family: 'Share Tech Mono', monospace;
        }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        /* 反馈 */
        .feedback { margin: 15px 0; padding: 15px; border-radius: 8px; font-size: 1rem; min-height: 50px; }
        .feedback.correct { background: rgba(57,255,20,0.1); border: 1px solid var(--neon-green); color: var(--neon-green); }
        .feedback.wrong { background: rgba(255,0,64,0.1); border: 1px solid var(--neon-red); color: var(--neon-red); }
        .feedback.info { background: rgba(0,255,255,0.05); border: 1px solid rgba(0,255,255,0.2); color: #aaa; }
        /* 得分板 */
        .score-board { display: flex; justify-content: space-between; margin-bottom: 20px; font-family: 'Share Tech Mono', monospace; }
        .score-item { text-align: center; }
        .score-item .label { color: #888; font-size: 0.8rem; }
        .score-item .value { color: var(--neon-cyan); font-size: 1.5rem; }
        /* 选项按钮 */
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .option-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px; border-radius: 10px; cursor: pointer;
            transition: all 0.3s; text-align: center;
        }
        .option-btn:hover { border-color: var(--neon-cyan); background: rgba(0,255,255,0.05); }
        .option-btn.selected { border-color: var(--neon-cyan); background: rgba(0,255,255,0.1); }
        .option-btn.correct { border-color: var(--neon-green); background: rgba(57,255,20,0.1); }
        .option-btn.wrong { border-color: var(--neon-red); background: rgba(255,0,64,0.1); }
        /* 教程区域 */
        .tutorial-box {
            background: rgba(157,0,255,0.05); border: 1px solid rgba(157,0,255,0.3);
            border-radius: 10px; padding: 20px; margin: 20px 0;
        }
        .tutorial-box h3 { color: var(--neon-purple); margin-bottom: 10px; }
        .tutorial-box p { color: #aaa; line-height: 1.6; margin-bottom: 8px; }
        .tutorial-box code {
            background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 4px;
            color: var(--neon-cyan); font-family: 'Share Tech Mono', monospace;
        }
        /* 动画 */
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.5s ease; }
        /* 移动端 */
        @media (max-width: 600px) {
            .game-container { padding: 10px; }
            .header h1 { font-size: 1.5rem; }
            .options { grid-template-columns: 1fr; }
            .input-area { flex-direction: column; align-items: stretch; }
            .input-area input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔢 数轴特工</h1>
            <p class="subtitle">第1章 有理数 · 沪教版2024新版 · 六年级上册</p>
        </div>

        <div class="level-indicator" id="levelIndicator"></div>

        <div class="score-board">
            <div class="score-item">
                <div class="label">SCORE</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="label">LEVEL</div>
                <div class="value" id="currentLevel">1/8</div>
            </div>
            <div class="score-item">
                <div class="label">STREAK</div>
                <div class="value" id="streak">0</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <!-- 游戏内容动态生成 -->
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            currentLevel: 0,
            score: 0,
            streak: 0,
            completed: new Set(),
            levels: [
                { id: 1, name: '正负号解码', icon: '🔐', desc: '识别正数与负数，理解相反意义的量' },
                { id: 2, name: '数轴定位', icon: '📍', desc: '在数轴上找到正确的位置' },
                { id: 3, name: '镜像破解', icon: '🪞', desc: '找出相反数，破解对称密码' },
                { id: 4, name: '测距系统', icon: '📏', desc: '计算绝对值，测量目标距离' },
                { id: 5, name: '位移运算', icon: '↔️', desc: '有理数的加法与减法' },
                { id: 6, name: '火力覆盖', icon: '💥', desc: '有理数的乘法与除法' },
                { id: 7, name: '爆破密码', icon: '🔐', desc: '有理数的乘方运算' },
                { id: 8, name: '终极任务', icon: '🎯', desc: '有理数的混合运算' }
            ]
        };

        // 关卡数据生成器
        const levelGenerators = {
            // 关卡1: 正数与负数
            1: () => {
                const scenarios = [
                    { q: '零上 5°C 记作 +5，那么零下 3°C 记作？', a: '-3', options: ['3', '-3', '+3', '0'] },
                    { q: '存入 500 元记作 +500，那么支出 200 元记作？', a: '-200', options: ['200', '-200', '+200', '0'] },
                    { q: '向东走 10 米记作 +10，那么向西走 8 米记作？', a: '-8', options: ['8', '-8', '+8', '0'] },
                    { q: '高于海平面 100 米记作 +100，那么低于海平面 50 米记作？', a: '-50', options: ['50', '-50', '+50', '0'] }
                ];
                return scenarios[Math.floor(Math.random() * scenarios.length)];
            },
            // 关卡2: 数轴定位
            2: () => {
                const target = Math.floor(Math.random() * 17) - 8; // -8 到 8
                return { target, range: 10 };
            },
            // 关卡3: 相反数
            3: () => {
                const nums = [5, -3, 7, -9, 4, -6, 8, -2];
                const num = nums[Math.floor(Math.random() * nums.length)];
                const correct = (-num).toString();
                const wrong = [
                    (num).toString(),
                    (num * 2).toString(),
                    (-num * 2).toString()
                ];
                return { q: `${num} 的相反数是？`, a: correct, options: [correct, ...wrong].sort(() => Math.random() - 0.5) };
            },
            // 关卡4: 绝对值
            4: () => {
                const nums = [-5, 3, -8, 12, -15, 7, -9, 20];
                const num = nums[Math.floor(Math.random() * nums.length)];
                const correct = Math.abs(num).toString();
                const wrong = [
                    num.toString(),
                    (-Math.abs(num)).toString(),
                    (Math.abs(num) + 1).toString()
                ];
                return { q: `|${num}| = ?`, a: correct, options: [correct, ...wrong].sort(() => Math.random() - 0.5) };
            },
            // 关卡5: 加减法
            5: () => {
                const ops = [
                    { q: '(-3) + 5 = ?', a: '2' },
                    { q: '7 + (-4) = ?', a: '3' },
                    { q: '(-6) - 2 = ?', a: '-8' },
                    { q: '5 - (-3) = ?', a: '8' },
                    { q: '(-4) + (-7) = ?', a: '-11' },
                    { q: '(-9) - (-5) = ?', a: '-4' }
                ];
                const problem = ops[Math.floor(Math.random() * ops.length)];
                const correct = problem.a;
                const wrong = [
                    (parseInt(correct) + 1).toString(),
                    (parseInt(correct) - 1).toString(),
                    (-parseInt(correct)).toString()
                ];
                return { ...problem, options: [correct, ...wrong].sort(() => Math.random() - 0.5) };
            },
            // 关卡6: 乘除法
            6: () => {
                const ops = [
                    { q: '(-3) × 4 = ?', a: '-12' },
                    { q: '(-5) × (-6) = ?', a: '30' },
                    { q: '24 ÷ (-3) = ?', a: '-8' },
                    { q: '(-36) ÷ (-9) = ?', a: '4' },
                    { q: '(-2) × 7 = ?', a: '-14' },
                    { q: '(-45) ÷ 5 = ?', a: '-9' }
                ];
                const problem = ops[Math.floor(Math.random() * ops.length)];
                const correct = problem.a;
                const wrong = [
                    (parseInt(correct) * -1).toString(),
                    (parseInt(correct) + 10).toString(),
                    (parseInt(correct) - 5).toString()
                ];
                return { ...problem, options: [correct, ...wrong].sort(() => Math.random() - 0.5) };
            },
            // 关卡7: 乘方
            7: () => {
                const ops = [
                    { q: '2³ = ?', a: '8' },
                    { q: '(-3)² = ?', a: '9' },
                    { q: '(-2)⁴ = ?', a: '16' },
                    { q: '5² = ?', a: '25' },
                    { q: '(-1)⁵ = ?', a: '-1' },
                    { q: '10³ = ?', a: '1000' }
                ];
                const problem = ops[Math.floor(Math.random() * ops.length)];
                const correct = problem.a;
                const wrong = [
                    (parseInt(correct) * 2).toString(),
                    (parseInt(correct) / 2).toString(),
                    (parseInt(correct) + 5).toString()
                ];
                return { ...problem, options: [correct, ...wrong].sort(() => Math.random() - 0.5) };
            },
            // 关卡8: 混合运算
            8: () => {
                const ops = [
                    { q: '(-2)³ + 5 × (-2) = ?', a: '-18' },
                    { q: '18 ÷ (-3) - (-4)² = ?', a: '-22' },
                    { q: '(-5) × 2 + 12 ÷ (-3) = ?', a: '-14' },
                    { q: '3 × (-4)² - 20 = ?', a: '28' }
                ];
                const problem = ops[Math.floor(Math.random() * ops.length)];
                const correct = problem.a;
                const wrong = [
                    (parseInt(correct) + 10).toString(),
                    (parseInt(correct) - 10).toString(),
                    (-parseInt(correct)).toString()
                ];
                return { ...problem, options: [correct, ...wrong].sort(() => Math.random() - 0.5) };
            }
        };

        // 渲染关卡指示器
        function renderLevelIndicator() {
            const container = document.getElementById('levelIndicator');
            container.innerHTML = gameState.levels.map((level, idx) => {
                let cls = 'level-dot';
                if (gameState.completed.has(level.id)) cls += ' completed';
                else if (idx === gameState.currentLevel) cls += ' active';
                return `<div class="${cls}" onclick="jumpToLevel(${idx})">${level.id}</div>`;
            }).join('');
        }

        // 渲染游戏区域
        function renderGame() {
            const level = gameState.levels[gameState.currentLevel];
            const area = document.getElementById('gameArea');
            document.getElementById('currentLevel').textContent = `${level.id}/8`;

            let html = `
                <div class="slide-in">
                    <div class="mission-title">
                        <span class="icon">${level.icon}</span>
                        <span>任务 ${level.id}: ${level.name}</span>
                    </div>
                    <p class="mission-desc">${level.desc}</p>
            `;

            // 根据关卡类型渲染不同内容
            if (level.id === 1) {
                // 选择题
                const data = levelGenerators[1]();
                html += `<div class="tutorial-box"><h3>💡 知识点</h3><p>正数 > 0，负数 < 0。用正负数可以表示具有相反意义的量。</p></div>`;
                html += `<p style="font-size:1.1rem;margin:20px 0;">${data.q}</p>`;
                html += `<div class="options">${data.options.map(opt => 
                    `<div class="option-btn" onclick="checkAnswer(this, '${data.a}', '${opt}')">${opt}</div>`
                ).join('')}</div>`;
            } else if (level.id === 2) {
                // 数轴定位
                const data = levelGenerators[2]();
                html += `<div class="tutorial-box"><h3>💡 知识点</h3><p>数轴三要素：原点、正方向、单位长度。右边的数总比左边的大。</p></div>`;
                html += `<p style="margin:15px 0;">请在数轴上找到位置: <strong style="color:var(--neon-yellow)">${data.target}</strong></p>`;
                html += renderNumberLine(data.target, data.range);
                html += `<div class="input-area">
                    <span>输入目标位置的数值：</span>
                    <input type="number" id="targetInput" placeholder="?" />
                    <button class="btn" onclick="checkNumberLine(${data.target})">移动特工</button>
                </div>`;
            } else if ([3, 4, 5, 6, 7, 8].includes(level.id)) {
                // 选择题（相反数、绝对值、运算）
                const data = levelGenerators[level.id]();
                const tips = {
                    3: '相反数：只有符号不同的两个数。如 5 和 -5。0 的相反数是 0。',
                    4: '绝对值：数轴上表示数 a 的点到原点的距离。|正数| = 本身，|负数| = 它的相反数。',
                    5: '加减法：同号相加取相同符号；异号相加取绝对值大的数的符号；减去一个数 = 加它的相反数。',
                    6: '乘除法：同号得正，异号得负。除以一个数 = 乘它的倒数。',
                    7: '乘方：aⁿ 表示 n 个 a 相乘。负数的偶次幂为正，奇次幂为负。',
                    8: '混合运算：先乘方，再乘除，后加减；有括号先算括号内。'
                };
                html += `<div class="tutorial-box"><h3>💡 知识点</h3><p>${tips[level.id]}</p></div>`;
                html += `<p style="font-size:1.2rem;margin:20px 0;color:var(--neon-cyan)">${data.q}</p>`;
                html += `<div class="options">${data.options.map(opt => 
                    `<div class="option-btn" onclick="checkAnswer(this, '${data.a}', '${opt}')">${opt}</div>`
                ).join('')}</div>`;
            }

            html += `<div class="feedback info" id="feedback">选择答案或输入数值开始任务...</div>`;
            html += `</div>`;
            area.innerHTML = html;
        }

        // 渲染数轴
        function renderNumberLine(target, range) {
            const min = -range, max = range;
            const total = max - min;
            const targetPercent = ((target - min) / total) * 100;
            const labels = [];
            for (let i = min; i <= max; i += 2) {
                let cls = i === 0 ? 'zero' : (i > 0 ? 'positive' : 'negative');
                labels.push(`<span class="${cls}" style="position:absolute;left:${((i-min)/total)*100}%;transform:translateX(-50%)">${i}</span>`);
            }
            return `
                <div class="number-line-container">
                    <div class="number-line"></div>
                    <div class="number-line-labels">${labels.join('')}</div>
                    <div class="target" style="left:${targetPercent}%"></div>
                    <div class="agent" id="agent" style="left:50%"></div>
                </div>
            `;
        }

        // 检查答案
        function checkAnswer(element, correct, selected) {
            const feedback = document.getElementById('feedback');
            const allOptions = document.querySelectorAll('.option-btn');
            
            allOptions.forEach(btn => btn.style.pointerEvents = 'none');
            
            if (selected === correct) {
                element.classList.add('correct');
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ 正确！特工任务完成！';
                gameState.score += 100 + (gameState.streak * 10);
                gameState.streak++;
                gameState.completed.add(gameState.currentLevel + 1);
                document.getElementById('score').textContent = gameState.score;
                document.getElementById('streak').textContent = gameState.streak;
                
                setTimeout(() => {
                    if (gameState.currentLevel < 7) {
                        gameState.currentLevel++;
                        renderLevelIndicator();
                        renderGame();
                    } else {
                        showVictory();
                    }
                }, 1500);
            } else {
                element.classList.add('wrong');
                feedback.className = 'feedback wrong';
                feedback.textContent = `❌ 错误！正确答案是 ${correct}`;
                gameState.streak = 0;
                document.getElementById('streak').textContent = 0;
            }
        }

        // 检查数轴输入
        function checkNumberLine(target) {
            const input = document.getElementById('targetInput');
            const value = parseInt(input.value);
            const feedback = document.getElementById('feedback');
            const agent = document.getElementById('agent');
            
            if (value === target) {
                const min = -10, max = 10;
                const percent = ((target - min) / (max - min)) * 100;
                agent.style.left = percent + '%';
                
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ 定位成功！特工已到达目标位置！';
                gameState.score += 100;
                gameState.streak++;
                gameState.completed.add(2);
                document.getElementById('score').textContent = gameState.score;
                document.getElementById('streak').textContent = gameState.streak;
                
                setTimeout(() => {
                    gameState.currentLevel++;
                    renderLevelIndicator();
                    renderGame();
                }, 2000);
            } else {
                feedback.className = 'feedback wrong';
                feedback.textContent = `❌ 错误！正确位置是 ${target}。再试一次！`;
                gameState.streak = 0;
                document.getElementById('streak').textContent = 0;
            }
        }

        // 跳转到关卡
        function jumpToLevel(idx) {
            gameState.currentLevel = idx;
            renderGame();
        }

        // 胜利画面
        function showVictory() {
            const area = document.getElementById('gameArea');
            area.innerHTML = `
                <div class="slide-in" style="text-align:center;padding:40px;">
                    <div style="font-size:4rem;margin-bottom:20px;">🎉</div>
                    <h2 style="color:var(--neon-green);font-size:2rem;margin-bottom:15px;">任务完成！</h2>
                    <p style="color:#aaa;margin-bottom:20px;">你已经掌握了有理数的所有核心知识</p>
                    <div style="font-family:'Share Tech Mono',monospace;font-size:1.5rem;color:var(--neon-cyan);margin-bottom:30px;">
                        最终得分: ${gameState.score}
                    </div>
                    <button class="btn" onclick="resetGame()" style="font-size:1.2rem;padding:15px 40px;">
                        🔄 再次挑战
                    </button>
                </div>
            `;
        }

        // 重置游戏
        function resetGame() {
            gameState.currentLevel = 0;
            gameState.score = 0;
            gameState.streak = 0;
            gameState.completed.clear();
            document.getElementById('score').textContent = '0';
            document.getElementById('streak').textContent = '0';
            renderLevelIndicator();
            renderGame();
        }

        // 初始化
        renderLevelIndicator();
        renderGame();
    </script>
</body>
</html>
