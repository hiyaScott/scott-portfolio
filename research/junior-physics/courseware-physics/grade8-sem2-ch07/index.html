<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第七章 浮力 — 流体动力学实验室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

:root {
  --purple-deep: #9d00ff;
  --purple-bright: #ff00ff;
  --purple-mid: #b366ff;
  --purple-light: #e8ccff;
  --purple-pale: #f5e6ff;
  --bg: #f8f0ff;
  --card: #ffffff;
  --text: #2d0047;
  --text-light: #6b2d8e;
  --accent: #ff00aa;
  --success: #00e676;
  --danger: #ff1744;
  --warn: #ffc107;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ---- 背景装饰 ---- */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ---- 主容器 ---- */
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:12px}

/* ---- 顶部HUD ---- */
.hud{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(255,255,255,.92);border-radius:16px;border:2px solid var(--purple-light);box-shadow:0 4px 20px rgba(157,0,255,.1);margin-bottom:10px}
.hud-left{display:flex;align-items:center;gap:12px}
.hud-right{display:flex;align-items:center;gap:10px}
.hud-title{font-size:13px;font-weight:700;color:var(--purple-deep);letter-spacing:1px}
.hearts{display:flex;gap:3px;font-size:18px}
.heart{transition:all .3s}
.heart.lost{opacity:.2;filter:grayscale(1)}
.combo-badge{background:linear-gradient(135deg,var(--purple-deep),var(--purple-bright));color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;animation:pop .3s ease}
.score{font-size:14px;font-weight:700;color:var(--text)}
.stage-label{font-size:11px;color:var(--text-light);background:var(--purple-pale);padding:2px 8px;border-radius:12px}

@keyframes pop{0%{transform:scale(.6)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

/* ---- 游戏区域 ---- */
#stage{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
#stage::-webkit-scrollbar{width:6px}
#stage::-webkit-scrollbar-thumb{background:var(--purple-mid);border-radius:3px}

/* ---- 开始屏幕 ---- */
.splash{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh}
.splash h1{font-size:36px;font-weight:900;color:var(--purple-deep);margin-bottom:8px;text-shadow:2px 2px 0 var(--purple-light)}
.splash .subtitle{font-size:15px;color:var(--text-light);margin-bottom:30px;letter-spacing:2px}
.splash-dept{display:inline-block;background:linear-gradient(135deg,var(--purple-deep),var(--purple-bright));color:#fff;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:20px;letter-spacing:1px}
.splash-illustration{width:200px;height:200px;margin-bottom:24px;position:relative}
.flask-icon{width:80px;height:100px;border:4px solid var(--purple-mid);border-radius:0 0 40px 40px;border-top:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:linear-gradient(to top,var(--purple-light) 40%,transparent 40%);animation:float 3s ease-in-out infinite}
.flask-icon::before{content:'';position:absolute;top:-20px;left:10px;width:60px;height:20px;border:4px solid var(--purple-mid);border-radius:10px 10px 0 0;border-bottom:none}
.flask-stem{position:absolute;top:-36px;left:50%;transform:translateX(-50%);width:24px;height:16px;border:4px solid var(--purple-mid);border-bottom:none}
.bubbles{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.bubble{width:8px;height:8px;background:var(--purple-bright);border-radius:50%;animation:bub 2s ease-in-out infinite}
.bubble:nth-child(2){animation-delay:.4s;width:6px;height:6px}
.bubble:nth-child(3){animation-delay:.8s;width:10px;height:10px}
@keyframes float{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-58%)}}
@keyframes bub{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-20px);opacity:1}}

.start-btn{background:linear-gradient(135deg,var(--purple-deep),var(--purple-bright));color:#fff;border:none;padding:14px 48px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 30px rgba(157,0,255,.3);transition:all .2s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(157,0,255,.4)}
.badges-row{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.badge-mini{font-size:11px;color:var(--text-light);background:var(--purple-pale);padding:4px 10px;border-radius:12px;border:1px solid var(--purple-light)}

/* ---- 关卡卡片 ---- */
.level-card{background:var(--card);border-radius:16px;border:2px solid var(--purple-light);padding:20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(157,0,255,.06);animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.level-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.level-num{width:36px;height:36px;background:linear-gradient(135deg,var(--purple-deep),var(--purple-bright));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.level-title{font-size:16px;font-weight:700;color:var(--text)}
.level-desc{font-size:12px;color:var(--text-light);margin-top:2px}

/* ---- 题目区 ---- */
.question-text{font-size:15px;line-height:1.7;margin-bottom:16px;font-weight:500}
.question-text .hl{background:var(--purple-pale);color:var(--purple-deep);padding:1px 6px;border-radius:4px;font-weight:700}
.question-text .formula{background:var(--bg);border:1px solid var(--purple-light);padding:2px 8px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;color:var(--purple-deep)}

/* ---- 实验图示 ---- */
.illustration-area{background:var(--purple-pale);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;justify-content:center;align-items:center;min-height:120px;position:relative;overflow:hidden}
.illustration-area::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple-deep),var(--purple-bright));opacity:.3}

/* 弹簧秤SVG */
.svg-scale{width:120px;height:160px}
/* 溢水杯SVG */
.svg-overflow{width:140px;height:130px}
/* 密度柱状图 */
.density-chart{display:flex;align-items:flex-end;gap:30px;height:100px;justify-content:center;padding-bottom:10px}
.chart-bar{display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-bar .bar{width:50px;border-radius:4px 4px 0 0;transition:height .6s ease;position:relative}
.chart-bar .bar-label{font-size:11px;color:var(--text-light);font-weight:700}
.chart-bar .val{font-size:12px;color:var(--purple-deep);font-weight:700}
.bar-liquid{background:linear-gradient(to top,#4facfe,#00f2fe)}
.bar-object{background:linear-gradient(to top,var(--purple-deep),var(--purple-bright))}

/* 轮船剖面 */
.ship-diagram{width:200px;height:120px;position:relative}
.ship-hull{position:absolute;bottom:0;left:20px;right:20px;height:60px;background:linear-gradient(to top,#7a4e2e,#a67c52);border-radius:0 0 40px 40px;border:3px solid #5a3a1e;overflow:hidden}
.ship-hollow{position:absolute;bottom:8px;left:40px;right:40px;height:36px;background:var(--purple-pale);border-radius:0 0 20px 20px;border:2px dashed var(--purple-mid)}
.ship-deck{position:absolute;bottom:60px;left:10px;right:10px;height:20px;background:#8b6f4e;border-radius:4px;border:2px solid #5a3a1e}
.ship-cabin{position:absolute;bottom:80px;left:70px;width:60px;height:30px;background:#fff;border:2px solid #5a3a1e;border-radius:4px}
.water-line{position:absolute;bottom:35px;left:0;right:0;height:2px;background:#00aaff;opacity:.7}
.water-fill{position:absolute;bottom:0;left:0;right:0;height:35px;background:linear-gradient(to top,#00aaff66,#00aaff22);border-radius:0 0 38px 38px}

/* ---- 选项区 ---- */
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:#fff;border:2px solid var(--purple-light);border-radius:12px;padding:12px 16px;text-align:left;font-size:14px;cursor:pointer;transition:all .15s;color:var(--text);position:relative;overflow:hidden}
.opt-btn:hover{border-color:var(--purple-mid);background:var(--purple-pale)}
.opt-btn.correct{border-color:var(--success);background:rgba(0,230,118,.08);color:var(--text)}
.opt-btn.wrong{border-color:var(--danger);background:rgba(255,23,68,.06);color:var(--text);animation:shake .4s}
.opt-btn .opt-label{display:inline-block;width:28px;height:28px;background:var(--purple-pale);border-radius:8px;text-align:center;line-height:28px;font-weight:700;font-size:12px;color:var(--purple-deep);margin-right:10px;flex-shrink:0}
.opt-btn.correct .opt-label{background:var(--success);color:#fff}
.opt-btn.wrong .opt-label{background:var(--danger);color:#fff}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ---- 输入区 ---- */
.input-area{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.input-area input{flex:1;padding:12px 16px;border:2px solid var(--purple-light);border-radius:12px;font-size:15px;outline:none;font-family:'Noto Sans SC',sans-serif;transition:border .2s}
.input-area input:focus{border-color:var(--purple-deep)}
.input-area .unit{color:var(--text-light);font-size:13px;white-space:nowrap}
.submit-btn{background:var(--purple-deep);color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.submit-btn:hover{background:var(--purple-bright)}

/* ---- 反馈区 ---- */
.feedback{margin-top:14px;padding:14px;border-radius:12px;font-size:13px;line-height:1.6;display:none}
.feedback.show{display:block;animation:fadeUp .3s ease}
.feedback.correct{background:rgba(0,230,118,.1);border:1px solid var(--success);color:var(--text)}
.feedback.wrong{background:rgba(255,23,68,.08);border:1px solid var(--danger);color:var(--text)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.feedback-title{font-weight:700;margin-bottom:4px;font-size:14px}
.feedback.correct .feedback-title{color:var(--success)}
.feedback.wrong .feedback-title{color:var(--danger)}

/* 误差提示框 */
.error-tip{background:#fff;border:2px solid var(--warn);border-radius:12px;padding:12px;margin-top:10px;font-size:12px;color:var(--text);display:none}
.error-tip.show{display:block;animation:fadeUp .3s ease}
.error-tip-title{font-weight:700;color:#e65100;margin-bottom:4px;font-size:13px}

/* 查看实验原理按钮 */
.principle-btn{background:transparent;border:1px solid var(--purple-mid);color:var(--purple-deep);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;margin-top:10px;transition:all .2s}
.principle-btn:hover{background:var(--purple-pale)}

/* 实验原理面板 */
.principle-panel{background:var(--purple-pale);border-radius:12px;padding:16px;margin-top:12px;font-size:13px;line-height:1.7;display:none;border-left:4px solid var(--purple-deep)}
.principle-panel.show{display:block;animation:fadeUp .3s ease}
.principle-panel h4{font-size:14px;color:var(--purple-deep);margin-bottom:6px}
.principle-panel .formula-block{background:#fff;padding:8px 12px;border-radius:8px;border:1px solid var(--purple-light);font-family:'Courier New',monospace;margin:6px 0;display:inline-block}

/* ---- 导航 ---- */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:2px solid var(--purple-light);padding:8px 12px;display:flex;justify-content:center;gap:6px;z-index:100}
.nav-btn{flex:1;max-width:80px;padding:8px 4px;border-radius:12px;border:none;background:transparent;color:var(--text-light);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.nav-btn.active{background:linear-gradient(135deg,var(--purple-deep),var(--purple-bright));color:#fff}
.nav-btn.locked{opacity:.4;cursor:not-allowed}
.nav-btn .nav-icon{font-size:16px;display:block;margin-bottom:2px}

/* ---- 结算画面 ---- */
.result-screen{text-align:center;padding:30px 20px}
.result-screen h2{font-size:28px;font-weight:900;color:var(--purple-deep);margin-bottom:10px}
.result-grade{font-size:72px;font-weight:900;line-height:1;margin-bottom:16px}
.result-grade.S{color:var(--success);text-shadow:0 4px 20px rgba(0,230,118,.3)}
.result-grade.A{color:#00b0ff;text-shadow:0 4px 20px rgba(0,176,255,.3)}
.result-grade.B{color:var(--warn);text-shadow:0 4px 20px rgba(255,193,7,.3)}
.result-grade.C{color:var(--danger);text-shadow:0 4px 20px rgba(255,23,68,.3)}
.result-stats{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}
.stat-item{background:var(--purple-pale);padding:10px 18px;border-radius:12px}
.stat-label{font-size:11px;color:var(--text-light)}
.stat-val{font-size:20px;font-weight:700;color:var(--purple-deep)}
.result-badge{display:inline-block;background:linear-gradient(135deg,gold,orange);color:#5a3a00;padding:10px 24px;border-radius:30px;font-size:15px;font-weight:700;margin:16px 0;box-shadow:0 4px 20px rgba(255,165,0,.3);animation:pop .5s ease .3s both}
.restart-btn{background:var(--purple-deep);color:#fff;border:none;padding:12px 36px;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}

/* ---- 倒计时条 ---- */
.timer-bar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--purple-deep),var(--purple-bright));z-index:200;transition:width 1s linear}
.timer-bar.warning{background:linear-gradient(90deg,var(--warn),var(--danger))}

/* ---- 通用 ---- */
.hide{display:none!important}
.floating-anim{animation:float 3s ease-in-out infinite}

/* 数据记录本风格 */
.data-notebook{background:#fffef8;border:1px solid #e8dcc0;border-radius:12px;padding:14px;font-family:'Courier New',monospace;font-size:13px;line-height:1.8;position:relative}
.data-notebook::before{content:'DATA';position:absolute;top:-8px;left:12px;background:#fffef8;padding:0 6px;font-size:10px;color:#b8a070;font-weight:700;border:1px solid #e8dcc0;border-radius:4px}
.data-row{display:flex;justify-content:space-between;border-bottom:1px dashed #e8dcc0;padding:3px 0}
.data-row:last-child{border-bottom:none}
.data-key{color:#8b7355}
.data-val{color:#5a3a1e;font-weight:700}

/* 液体动画容器 */
.liquid-container{position:relative;width:80px;height:100px}
.liquid-beaker{width:60px;height:80px;border:3px solid var(--purple-mid);border-radius:0 0 20px 20px;border-top:none;position:absolute;bottom:0;left:10px;overflow:hidden}
.liquid-beaker::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,#4facfe,#00f2fe);animation:wave 3s ease-in-out infinite}
@keyframes wave{0%,100%{height:55%}50%{height:65%}}
.object-in-liquid{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:24px;height:24px;background:var(--purple-deep);border-radius:50%;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

/* 响应式 */
@media(max-width:600px){
  .splash h1{font-size:26px}
  .hud{flex-wrap:wrap;gap:6px}
  .result-grade{font-size:56px}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="timer-bar hide" id="timerBar"></div>

<div id="app">
  <div class="hud" id="hud">
    <div class="hud-left">
      <div class="hud-title">流体动力学实验室</div>
      <div class="stage-label" id="stageLabel">准备中</div>
    </div>
    <div class="hud-right">
      <div class="combo-badge hide" id="comboBadge">连击 x0</div>
      <div class="hearts" id="hearts">❤️❤️❤️</div>
      <div class="score" id="scoreDisplay">0</div>
    </div>
  </div>

  <div id="stage">
    <!-- 内容动态生成 -->
  </div>

  <div class="nav-bar" id="navBar">
    <button class="nav-btn active" data-s="0" onclick="goStage(0)"><span class="nav-icon">🏠</span>首页</button>
    <button class="nav-btn locked" data-s="1" onclick="goStage(1)"><span class="nav-icon">⚖️</span>测量</button>
    <button class="nav-btn locked" data-s="2" onclick="goStage(2)"><span class="nav-icon">🏺</span>原理</button>
    <button class="nav-btn locked" data-s="3" onclick="goStage(3)"><span class="nav-icon">📊</span>浮沉</button>
    <button class="nav-btn locked" data-s="4" onclick="goStage(4)"><span class="nav-icon">🚢</span>应用</button>
    <button class="nav-btn locked" data-s="5" onclick="goStage(5)"><span class="nav-icon">🏆</span>终极</button>
  </div>
</div>

<script>
/* ========== 游戏状态 ========== */
const state={stage:0,qIndex:0,lives:3,score:0,combo:0,maxCombo:0,correctCount:0,totalQ:0,startTime:null,timer:null,stageScores:[0,0,0,0,0],stageProgress:[0,0,0,0,0],unlocked:[true,false,false,false,false,false],answered:false,principleOpen:false};

/* ========== 关卡数据 ========== */
const STAGES=[
  {id:0,name:"实验室入口",icon:"🏠",questions:[]},
  {id:1,name:"浮力测量",icon:"⚖️",desc:"称重法：空气中重量 − 水中重量 = 浮力",questions:stage1Questions()},
  {id:2,name:"阿基米德原理",icon:"🏺",desc:"F浮 = ρ液 · g · V排 = G排 = m排 · g",questions:stage2Questions()},
  {id:3,name:"浮沉判定",icon:"📊",desc:"比较 ρ物 与 ρ液，判断浮沉状态",questions:stage3Questions()},
  {id:4,name:"浮力应用",icon:"🚢",desc:"轮船、潜水艇、气球——浮力改变生活",questions:stage4Questions()},
  {id:5,name:"终极实验",icon:"🏆",desc:"60秒综合挑战！混合所有题型",questions:stage5Questions(),timed:true,timeLimit:60}
];

function stage1Questions(){
  return [
    {type:"input",text:"一个金属块在空气中用弹簧秤称重，读数为 <span class='hl'>8 N</span>。将其完全浸入水中后，弹簧秤读数变为 <span class='hl'>5 N</span>。求金属块受到的浮力是多少？",unit:"N",answer:"3",tolerance:0,toleranceMsg:"浮力 = 空气中重量 − 水中重量 = 8N − 5N = 3N",principle:"称重法测浮力：物体在液体中受到的浮力等于物体在空气中的重力减去物体浸在液体中时弹簧测力计的示数。公式：<span class='formula-block'>F浮 = G − F拉</span>",illustration:"scale"},
    {type:"input",text:"某物体在空气中重 <span class='hl'>12 N</span>，浸没在水中时弹簧秤示数为 <span class='hl'>7 N</span>。若把它浸没在酒精中（酒精密度比水小），弹簧秤示数会______N。（提示：酒精中浮力更小，所以示数更大，请计算）",unit:"N",answer:"8",tolerance:0,toleranceMsg:"水中浮力=12-7=5N；酒精密度≈0.8g/cm³，浮力为水的0.8倍=4N；示数=12-4=8N",principle:"称重法公式：F浮 = G − F拉。同体积物体在密度较小的液体中受到的浮力更小（F浮 = ρ液gV排），所以弹簧秤示数更大。酒精密度约为水的0.8倍。",illustration:"scale"},
    {type:"choice",text:"把一石块挂在弹簧秤下，在空气中示数为 <span class='hl'>10 N</span>，浸入水中后示数为 <span class='hl'>6 N</span>。下列说法正确的是：",options:["浮力为16 N","浮力为4 N","浮力为6 N","无法判断"],correct:1,principle:"称重法：F浮 = G − F拉 = 10N − 6N = 4N。注意不要用两个示数相加！",illustration:"scale"},
    {type:"input",text:"一个体积为 <span class='hl'>200 cm³</span> 的物体完全浸没在水中，已知它在空气中重 <span class='hl'>5 N</span>。求此时弹簧秤的读数。（g取10 N/kg，ρ水=1 g/cm³）",unit:"N",answer:"3",tolerance:0.1,toleranceMsg:"F浮 = ρ水gV排 = 1g/cm³ × 10N/kg × 200cm³ = 1000kg/m³ × 10 × 2×10⁻⁴m³ = 2N。示数 = 5N − 2N = 3N",principle:"先用阿基米德原理计算浮力：F浮 = ρ液gV排 = 1000×10×2×10⁻⁴ = 2N，再用称重法求拉力：F拉 = G − F浮 = 5 − 2 = 3N",illustration:"scale"},

  ];
}

function stage2Questions(){
  return [
    {type:"input",text:"将一个体积为 <span class='hl'>500 cm³</span> 的物体浸没在水中。已知 ρ水 = <span class='hl'>1.0×10³ kg/m³</span>，g = <span class='hl'>10 N/kg</span>。根据阿基米德原理，求物体受到的浮力。",unit:"N",answer:"5",tolerance:0.1,toleranceMsg:"V排 = 500 cm³ = 5×10⁻⁴ m³。F浮 = ρ液gV排 = 1000×10×5×10⁻⁴ = 5N",principle:"阿基米德原理：浸在液体中的物体受到向上的浮力，浮力的大小等于物体排开的液体所受的重力。公式：<span class='formula-block'>F浮 = ρ液 · g · V排 = G排 = m排 · g</span>",illustration:"overflow"},
    {type:"choice",text:"在做溢水杯实验时，将一物体缓慢浸入装满水的溢水杯中，溢出的水被收集在小桶中。下列说法正确的是：",options:["溢出水的体积一定大于物体体积","溢出水的重力等于物体受到的浮力","只有当物体沉底时才有浮力","漂浮物体不遵循阿基米德原理"],correct:1,principle:"溢水杯实验是验证阿基米德原理的经典方法。溢出水的体积等于物体浸入部分的体积（V排），溢出水的重力等于物体受到的浮力（G排 = F浮）。无论漂浮、悬浮还是沉底，都遵循阿基米德原理。",illustration:"overflow"},
    {type:"input",text:"一物体浸没在煤油中时受到的浮力为 <span class='hl'>4 N</span>。已知煤油密度为 <span class='hl'>0.8×10³ kg/m³</span>，g = 10 N/kg。求该物体的体积。",unit:"cm³",answer:"500",tolerance:5,toleranceMsg:"由 F浮 = ρgV排，V = F浮/(ρg) = 4/(800×10) = 5×10⁻⁴ m³ = 500 cm³",principle:"变形公式：<span class='formula-block'>V排 = F浮 / (ρ液 · g)</span>。先统一单位：ρ煤油 = 800 kg/m³。V = 4 ÷ (800×10) = 0.0005 m³ = 500 cm³",illustration:"overflow"},
    {type:"choice",text:"两个体积相同的铁球和铝球（均实心），同时浸没在水中。比较它们受到的浮力：",options:["铁球浮力大","铝球浮力大","一样大","无法比较"],correct:2,principle:"浮力只与 ρ液 和 V排 有关。两球体积相同且都完全浸没，所以 V排 相同，在同种液体中浮力相同。注意：浮力与物体密度、重量、材料无关！",illustration:"overflow"},
    {type:"input",text:"一边长为 <span class='hl'>10 cm</span> 的正方体木块漂浮在水面上，有 <span class='hl'>4 cm</span> 的高度露出水面。求木块受到的浮力。（g = 10 N/kg）",unit:"N",answer:"6",tolerance:0.2,toleranceMsg:"浸入深度 = 10−4 = 6cm。V排 = 10×10×6 = 600 cm³ = 6×10⁻⁴ m³。F浮 = 1000×10×6×10⁻⁴ = 6N",principle:"漂浮时 V排 是浸入水中的体积。正方体底面 10×10 = 100 cm²，浸入深度 6 cm，V排 = 600 cm³。再用 F浮 = ρgV排 计算。",illustration:"overflow"}
  ];
}

function stage3Questions(){
  return [
    {type:"choice",text:"一个实心物体密度为 <span class='hl'>0.6 g/cm³</span>，放入水中（ρ水=1 g/cm³）后，它将：",options:["沉底","悬浮","漂浮","先沉后浮"],correct:2,principle:"浮沉判定：ρ物 < ρ液 → 漂浮。物体密度小于水，会上浮直至漂浮在水面，此时只有部分体积浸入水中（V排 < V物），使 F浮 = G物 达到平衡。",illustration:"density"},
    {type:"choice",text:"一个实心物体密度为 <span class='hl'>1.5 g/cm³</span>，放入水中后，它将：",options:["漂浮","悬浮","沉底","无法判断"],correct:2,principle:"浮沉判定：ρ物 > ρ液 → 沉底。物体会下沉直至容器底部，此时受到浮力 + 支持力 = 重力。",illustration:"density"},
    {type:"input",text:"一个质量为 <span class='hl'>90 g</span>、体积为 <span class='hl'>100 cm³</span> 的物体放入水中。判断浮沉状态后，求它受到的浮力。（g = 10 N/kg）",unit:"N",answer:"0.9",tolerance:0.05,toleranceMsg:"ρ物 = 90/100 = 0.9 g/cm³ < ρ水，漂浮。F浮 = G = mg = 0.09×10 = 0.9N",principle:"先算密度：ρ物 = m/V = 90/100 = 0.9 g/cm³。因为 0.9 < 1（水的密度），物体漂浮。漂浮时 F浮 = G物 = mg = 0.09kg × 10N/kg = 0.9N。不需要用阿基米德原理算！",illustration:"density"},
    {type:"choice",text:"关于物体的浮沉条件，下列说法正确的是：",options:["ρ物 = ρ液 时物体一定悬浮","上浮的物体受到的浮力大于重力","物体上浮时浮力越来越大","漂浮时浮力小于重力"],correct:1,principle:"浮沉条件本质是力的大小关系：F浮 > G → 上浮；F浮 = G → 悬浮/漂浮；F浮 < G → 下沉。ρ物 = ρ液 时若物体完全浸没则悬浮，但如果只有部分浸没那是漂浮。上浮过程中（未露出水面时）V排不变，浮力不变。",illustration:"density"},
    {type:"input",text:"一个体积为 <span class='hl'>200 cm³</span>、重 <span class='hl'>1.6 N</span> 的物体浸没在水中后松手。求稳定后该物体受到的浮力。（g = 10 N/kg）",unit:"N",answer:"1.6",tolerance:0.05,toleranceMsg:"ρ物 = m/V = (1.6/10)/0.0002 = 0.8 g/cm³ < 水，漂浮。稳定后F浮=G=1.6N",principle:"先判断：若完全浸没，F浮 = ρgV = 1000×10×2×10⁻⁴ = 2N > G = 1.6N，所以上浮。稳定后漂浮，F浮 = G = 1.6N。注意审题：问的是稳定后的浮力，不是最大浮力！",illustration:"density"}
  ];
}

function stage4Questions(){
  return [
    {type:"choice",text:"轮船从长江驶入大海后，船体会：",options:["上浮一些","下沉一些","位置不变","先沉后浮"],correct:0,principle:"轮船始终漂浮，F浮 = G船（不变）。海水的密度比江水大，由 F浮 = ρ液gV排，ρ液增大则 V排减小，所以船体上浮一些。吃水线下降。",illustration:"ship"},
    {type:"input",text:"一艘轮船排水量为 <span class='hl'>5000 吨</span>。求它满载时受到的浮力。（g = 10 N/kg）",unit:"N",answer:"5×10⁷",tolerance:0,toleranceMsg:"排水量 = m排 = 5000t = 5×10⁶ kg。F浮 = G排 = m排·g = 5×10⁶×10 = 5×10⁷ N",principle:"排水量指轮船满载时排开水的质量。m排 = 5000吨 = 5×10⁶ kg。由阿基米德原理，F浮 = G排 = m排·g = 5×10⁶ × 10 = 5×10⁷ N。也可以写成 50000000 N。",illustration:"ship"},
    {type:"choice",text:"潜水艇通过______来实现上浮和下沉：",options:["改变自身重力","改变自身体积","改变海水密度","改变艇身形状"],correct:0,principle:"潜水艇通过向水舱注水/排水来改变自身重力。体积基本不变，所以 V排 不变，浮力不变。注水时重力增大 → 下沉；排水时重力减小 → 上浮。",illustration:"ship"},
    {type:"input",text:"一热气球体积为 <span class='hl'>2000 m³</span>，已知空气密度为 <span class='hl'>1.29 kg/m³</span>，热气球内热空气密度为 <span class='hl'>0.9 kg/m³</span>。求热气球受到的净升力（浮力 − 内热空气重力）。（g = 10 N/kg）",unit:"N",answer:"7800",tolerance:100,toleranceMsg:"F浮 = 1.29×10×2000 = 25800N；内热气重力 = 0.9×10×2000 = 18000N；净升力 = 25800−18000 = 7800N",principle:"气球浮力 = 排开外部空气的重力。F浮 = ρ外·g·V = 1.29×10×2000 = 25800N。内热空气重力 = ρ内·g·V = 0.9×10×2000 = 18000N。净升力 = 25800 − 18000 = 7800N。（若考虑气球壳重力，升力更小）",illustration:"ship"},
    {type:"choice",text:"一艘轮船卸下部分货物后，轮船会：",options:["上浮一些，浮力不变","上浮一些，浮力变小","下沉一些，浮力不变","位置不变"],correct:1,principle:"卸货后船的重力减小，但仍漂浮。漂浮条件：F浮 = G，所以浮力也变小。由 F浮 = ρgV排，浮力变小 → V排减小 → 船体上浮一些。",illustration:"ship"}
  ];
}

function stage5Questions(){
  const all=[
    ...stage1Questions().map(q=>({...q,source:"Stage1"})),
    ...stage2Questions().map(q=>({...q,source:"Stage2"})),
    ...stage3Questions().map(q=>({...q,source:"Stage3"})),
    ...stage4Questions().map(q=>({...q,source:"Stage4"}))
  ];
  // 随机选8题
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]]}
  return all.slice(0,8);
}

/* ========== 渲染 ========== */
function render(){
  const el=document.getElementById('stage');
  el.innerHTML='';

  // 更新HUD
  const h='❤️'.repeat(state.lives)+'<span class="heart lost">'+'❤️'.repeat(3-state.lives)+'</span>';
  document.getElementById('hearts').innerHTML=h;
  document.getElementById('scoreDisplay').textContent=state.score;
  const cb=document.getElementById('comboBadge');
  if(state.combo>1){cb.textContent=`连击 x${state.combo}`;cb.classList.remove('hide')}else{cb.classList.add('hide')}

  // 导航状态
  document.querySelectorAll('.nav-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',i===state.stage);
    btn.classList.toggle('locked',!state.unlocked[i]);
    if(state.unlocked[i])btn.classList.remove('locked');
  });

  if(state.stage===0){renderSplash(el);return}
  if(state.stage===6){renderResult(el);return}

  const st=STAGES[state.stage];
  document.getElementById('stageLabel').textContent=`Stage ${state.stage}: ${st.name}`;

  if(state.qIndex>=st.questions.length){
    // 关卡完成
    state.stageProgress[state.stage-1]=100;
    el.innerHTML=`<div class="level-card" style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:12px">${st.icon}</div>
      <h3 style="font-size:22px;color:var(--purple-deep);margin-bottom:8px">${st.name} 完成！</h3>
      <p style="color:var(--text-light);margin-bottom:20px">得分: ${state.stageScores[state.stage-1]}</p>
      <button class="start-btn" onclick="nextStage()">${state.stage<5?'继续下一关':'进入终极挑战'}</button>
    </div>`;
    return;
  }

  const q=st.questions[state.qIndex];
  const card=document.createElement('div');card.className='level-card';

  let html=`<div class="level-header">
    <div class="level-num">${state.qIndex+1}</div>
    <div><div class="level-title">${st.name}</div><div class="level-desc">${st.desc}</div></div>
  </div>`;

  html+=`<div class="question-text">${q.text}</div>`;

  // 实验图示
  html+=renderIllustration(q);

  if(q.type==='choice'){
    html+=`<div class="options">`;
    q.options.forEach((opt,i)=>{
      html+=`<button class="opt-btn" data-i="${i}" onclick="answerChoice(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
    });
    html+=`</div>`;
  }else{
    html+=`<div class="input-area"><input type="text" id="ansInput" placeholder="输入答案数字" onkeydown="if(event.key==='Enter')answerInput()"><span class="unit">${q.unit}</span><button class="submit-btn" onclick="answerInput()">提交</button></div>`;
  }

  html+=`<div class="feedback" id="feedback"></div>`;
  html+=`<div class="error-tip" id="errorTip"></div>`;
  html+=`<button class="principle-btn" id="principleBtn" onclick="togglePrinciple()">🔬 查看实验原理</button>`;
  html+=`<div class="principle-panel" id="principlePanel"><h4>📐 实验原理</h4>${q.principle||'暂无解析'}</div>`;
  html+=`<button class="start-btn hide" id="nextBtn" style="margin-top:14px;padding:10px 30px;font-size:14px" onclick="nextQ()">下一题 →</button>`;

  card.innerHTML=html;
  el.appendChild(card);

  state.answered=false;state.principleOpen=false;
  document.getElementById('principleBtn').classList.remove('hide');
  document.getElementById('principlePanel').classList.remove('show');
  document.getElementById('nextBtn').classList.add('hide');

  if(st.timed)startTimer();
  else document.getElementById('timerBar').classList.add('hide');
}

    const G_water=G_water_match?G_water_match[1]:'';

      <div class="ship-diagram">
        <div class="ship-hull">
          <div class="ship-hollow">空心</div>
          <div class="water-fill"></div>
        </div>
        <div class="water-line"></div>
        <div class="ship-deck"></div>
        <div class="ship-cabin"></div>
      </div>
      <div style="margin-left:20px;font-size:12px;color:var(--text-light);max-width:160px">
        <strong>轮船结构</strong><br>
        空心设计增大V排<br>
        F浮 = ρgV排<br>
        使钢铁能浮于水面
      </div>
    </div>`;
  }
  return '';
}

function renderSplash(el){
  document.getElementById('stageLabel').textContent='准备中';
  el.innerHTML=`<div class="splash">
    <div class="splash-dept">流体动力学实验室 · 第七章</div>
    <div class="splash-illustration">
      <div class="flask-icon"></div>
      <div class="bubbles"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div>
    </div>
    <h1>浮力</h1>
    <div class="subtitle">BUOYANCY · Archimedes' Principle</div>
    <button class="start-btn" onclick="startGame()">开始实验 →</button>
    <div class="badges-row">
      <span class="badge-mini">❤️ 3条生命</span>
      <span class="badge-mini">⚡ 连击加分</span>
      <span class="badge-mini">🏆 S/A/B/C评级</span>
      <span class="badge-mini">🎖️ 浮力大师徽章</span>
    </div>
  </div>`;
}

function renderResult(el){
  document.getElementById('stageLabel').textContent='实验完成';
  const totalQ=STAGES.slice(1,6).reduce((a,s)=>a+s.questions.length,0);
  const accuracy=state.totalQ>0?Math.round(state.correctCount/state.totalQ*100):0;
  let grade='C';if(accuracy>=90&&state.lives>=2)grade='S';else if(accuracy>=80)grade='A';else if(accuracy>=60)grade='B';
  const badge=grade==='S'?'🏅 浮力大师':'🎖️ 实验研究员';

  el.innerHTML=`<div class="result-screen">
    <h2>实验报告</h2>
    <div class="result-grade ${grade}">${grade}</div>
    <div class="result-stats">
      <div class="stat-item"><div class="stat-label">总得分</div><div class="stat-val">${state.score}</div></div>
      <div class="stat-item"><div class="stat-label">正确率</div><div class="stat-val">${accuracy}%</div></div>
      <div class="stat-item"><div class="stat-label">剩余生命</div><div class="stat-val">${state.lives}</div></div>
      <div class="stat-item"><div class="stat-label">最高连击</div><div class="stat-val">${state.maxCombo}</div></div>
    </div>
    ${grade==='S'?'<div class="result-badge">🏅 获得徽章：浮力大师</div>':'<div class="result-badge">🎖️ 获得徽章：实验研究员</div>'}
    <div style="font-size:13px;color:var(--text-light);margin-top:12px">${accuracy<100?'再试一次，冲击浮力大师吧！':'完美！你是真正的浮力大师！'}</div>
    <button class="restart-btn" onclick="location.reload()">再来一次 ↺</button>
  </div>`;
}

/* ========== 游戏逻辑 ========== */
function startGame(){
  state.stage=1;state.qIndex=0;state.lives=3;state.score=0;state.combo=0;state.maxCombo=0;state.correctCount=0;state.totalQ=0;
  state.stageScores=[0,0,0,0,0];state.stageProgress=[0,0,0,0,0];state.unlocked=[true,true,false,false,false,false];
  render();
}

function goStage(s){
  if(!state.unlocked[s])return;
  if(state.stage===5&&state.timer){clearInterval(state.timer);state.timer=null}
  state.stage=s;
  if(s===0)state.qIndex=0;
  else if(s>=1&&s<=5){
    if(s!==state.stage){state.qIndex=0;}
    // 如果是当前关卡继续，保留进度
  }
  if(s===6){}
  render();
}

function nextStage(){
  if(state.stage<5){
    state.stage++;
    state.unlocked[state.stage]=true;
    state.qIndex=0;
  }else{
    state.stage=6;
  }
  render();
}

function nextQ(){
  state.qIndex++;
  state.totalQ++;
  state.answered=false;
  render();
}

function answerChoice(idx){
  if(state.answered)return;
  state.answered=true;
  const q=STAGES[state.stage].questions[state.qIndex];
  const correct=idx===q.correct;
  handleAnswer(correct,q);

  document.querySelectorAll('.opt-btn').forEach((btn,i)=>{
    btn.style.pointerEvents='none';
    if(i===q.correct)btn.classList.add('correct');
    else if(i===idx)btn.classList.add('wrong');
  });
}

function answerInput(){
  if(state.answered)return;
  const input=document.getElementById('ansInput');
  const val=input.value.trim();
  if(!val)return;
  state.answered=true;
  const q=STAGES[state.stage].questions[state.qIndex];
  // 支持多种等价写法：如 5×10^7, 5*10^7, 50000000, 5e7
  let num=parseFloat(val);
  let correct=false;
  if(q.answer.includes('×10')||q.answer.includes('*10')||q.answer.includes('e')){
    // 科学计数法
    const normalized=val.replace(/[×*]/g,'*').replace(/[\s]/g,'');
    correct=normalized===q.answer.replace(/[×]/g,'*');
  }else{
    correct=Math.abs(num-parseFloat(q.answer))<=(q.tolerance!==undefined?q.tolerance:0.01);
  }
  handleAnswer(correct,q);
  if(correct)input.style.borderColor='var(--success)';
  else input.style.borderColor='var(--danger)';
}

function handleAnswer(correct,q){
  const fb=document.getElementById('feedback');
  const err=document.getElementById('errorTip');
  const nextBtn=document.getElementById('nextBtn');
  const principleBtn=document.getElementById('principleBtn');

  if(correct){
    state.combo++;if(state.combo>state.maxCombo)state.maxCombo=state.combo;
    const base=100;const bonus=Math.min(state.combo-1,5)*20;
    const pts=base+bonus;
    state.score+=pts;state.correctCount++;
    if(state.stage>=1&&state.stage<=5)state.stageScores[state.stage-1]+=pts;
    fb.className='feedback correct show';
    fb.innerHTML=`<div class="feedback-title">✅ 正确！+${pts}分</div>${state.combo>1?`连击 x${state.combo}！`:'继续加油！'}`;
    err.classList.remove('show');
  }else{
    state.combo=0;state.lives--;
    fb.className='feedback wrong show';
    fb.innerHTML=`<div class="feedback-title">❌ 错误</div>${q.toleranceMsg||'请仔细计算，注意单位换算和公式选择。'}`;
    if(q.toleranceMsg&&q.toleranceMsg.length>10){
      err.classList.add('show');
      err.innerHTML=`<div class="error-tip-title">⚠️ 常见错误提示</div>${q.toleranceMsg}`;
    }
    if(state.lives<=0){
      setTimeout(()=>{alert('生命值耗尽！实验失败。');location.reload();},800);
      return;
    }
  }

  nextBtn.classList.remove('hide');
  if(state.stage===5){
    // 终极挑战显示来源
    principleBtn.classList.remove('hide');
  }

  // 更新HUD
  const h='❤️'.repeat(state.lives)+'<span class="heart lost">'+'❤️'.repeat(3-state.lives)+'</span>';
  document.getElementById('hearts').innerHTML=h;
  document.getElementById('scoreDisplay').textContent=state.score;
  const cb=document.getElementById('comboBadge');
  if(state.combo>1){cb.textContent=`连击 x${state.combo}`;cb.classList.remove('hide')}else{cb.classList.add('hide')}
}

function togglePrinciple(){
  const p=document.getElementById('principlePanel');
  p.classList.toggle('show');
  state.principleOpen=p.classList.contains('show');
}

/* ========== 计时器 ========== */
function startTimer(){
  const bar=document.getElementById('timerBar');
  bar.classList.remove('hide');
  const limit=STAGES[state.stage].timeLimit;
  let left=limit;
  bar.style.width='100%';
  bar.classList.remove('warning');
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    left--;
    const pct=(left/limit)*100;
    bar.style.width=pct+'%';
    if(left<=15)bar.classList.add('warning');
    if(left<=0){
      clearInterval(state.timer);state.timer=null;
      // 超时强制进入结算
      state.stage=6;render();
    }
  },1000);
}

/* ========== 背景粒子 ========== */
(function initBg(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let w,h,particles=[];
  function resize(){w=c.width=innerWidth;h=c.height=innerHeight}
  resize();addEventListener('resize',resize);

  class Bubble{
    constructor(){this.reset()}
    reset(){this.x=Math.random()*w;this.y=h+Math.random()*50;this.r=2+Math.random()*6;this.s=0.3+Math.random()*1;this.a=0.2+Math.random()*0.4}
    update(){this.y-=this.s;this.x+=Math.sin(this.y*0.01)*0.5;if(this.y<-20)this.reset()}
    draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(157,0,255,${this.a})`;ctx.fill()}
  }

  for(let i=0;i<40;i++)particles.push(new Bubble());
  function loop(){ctx.clearRect(0,0,w,h);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(loop)}
  loop();
})();

/* ========== 初始渲染 ========== */
render();
</script>
