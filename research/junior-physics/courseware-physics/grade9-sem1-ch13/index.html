<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特工装备室 · 第十三章 电功率</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080f;
    --panel: #11111f;
    --panel2: #1a1a2e;
    --accent: #00f5d4;
    --accent2: #00bbf9;
    --danger: #ef476f;
    --warn: #ffd166;
    --text: #c0c8d8;
    --text2: #8b8b9a;
    --grid: rgba(0,245,212,0.06);
    --success: #06d6a0;
    --glass: rgba(17,17,31,0.92);
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  body {
    font-family: 'Share Tech Mono', 'Courier New', 'PingFang SC', 'Microsoft YaHei', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HUD grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 245, 212, 0.03) 2px,
      rgba(0, 245, 212, 0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Corner decorations */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    pointer-events: none;
    z-index: 9998;
    opacity: 0.6;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* ===================== GAME CONTAINER ===================== */
  .game-container {
    width: 100%; max-width: 720px;
    height: 100vh; max-height: 900px;
    background: var(--glass);
    backdrop-filter: blur(12px);
    position: relative; z-index: 2;
    display: none;
    flex-direction: column;
    border: 1px solid rgba(0,245,212,0.15);
    overflow: hidden;
    margin: 0 auto;
  }

  /* ===================== TOP BAR / HUD ===================== */
  .top-bar {
    background: var(--glass);
    backdrop-filter: blur(8px);
    color: var(--text);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,245,212,0.25);
    position: relative;
  }
  .top-bar::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 120px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .dept-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }
  .dept-badge .icon { font-size: 1.1rem; }
  .lives {
    display: flex;
    gap: 4px;
    font-size: 1.3rem;
  }
  .lives .heart { transition: all 0.3s; }
  .lives .heart.lost { opacity: 0.2; filter: grayscale(1); }
  .lives .heart.hit { animation: heart-beat 0.5s; }
  @keyframes heart-beat {
    0%,100%{transform:scale(1)}
    25%{transform:scale(1.4)}
    50%{transform:scale(0.8)}
  }
  .score-board {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.8rem;
  }
  .score-item { text-align: center; }
  .score-item .val {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .score-item .label {
    font-size: 0.65rem;
    color: var(--text2);
  }
  .combo-bar {
    position: relative;
    width: 80px;
    height: 6px;
    background: rgba(0,245,212,0.15);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 2px;
  }
  .combo-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s;
    width: 0%;
  }

  /* ===================== MAIN AREA ===================== */
  .main-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    position: relative;
  }
  .main-area::-webkit-scrollbar { width: 6px; }
  .main-area::-webkit-scrollbar-track { background: transparent; }
  .main-area::-webkit-scrollbar-thumb { background: rgba(0,245,212,0.3); border-radius: 3px; }

  /* Paper / Panel */
  .paper {
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.15);
    border-radius: 8px;
    padding: 24px;
    position: relative;
  }

  /* Stage header */
  .stage-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(0,245,212,0.15);
  }
  .stage-num {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,245,212,0.2), rgba(0,187,249,0.2));
    border: 1px solid var(--accent);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(0,245,212,0.15);
  }
  .stage-info h2 {
    font-size: 1.15rem;
    color: var(--accent);
    font-weight: 700;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }
  .stage-info .desc {
    font-size: 0.75rem;
    color: var(--text2);
    font-family: 'Share Tech Mono', monospace;
  }

  /* Progress bar */
  .stage-progress {
    height: 3px;
    background: rgba(0,245,212,0.1);
    margin: -16px -20px 20px -20px;
    position: relative;
  }
  .stage-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s;
    box-shadow: 0 0 8px var(--accent);
  }

  /* Question card */
  .q-card {
    background: var(--panel2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 18px 20px;
    margin-bottom: 16px;
    transition: all 0.3s;
    position: relative;
  }
  .q-card:hover { box-shadow: 0 0 20px rgba(0,245,212,0.08); }
  .q-card.correct { border-left-color: var(--success); background: rgba(6,214,160,0.08); }
  .q-card.wrong { border-left-color: var(--danger); background: rgba(239,71,113,0.08); }
  .q-card.locked { opacity: 0.4; pointer-events: none; }

  .q-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    margin-right: 10px;
    vertical-align: middle;
  }
  .q-card.correct .q-num { background: var(--success); color: var(--bg); }
  .q-card.wrong .q-num { background: var(--danger); color: #fff; }

  .q-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 14px;
  }
  .q-text .highlight {
    background: linear-gradient(180deg, transparent 60%, rgba(0,245,212,0.2) 60%);
    padding: 0 2px;
    font-weight: 500;
  }
  .q-formula {
    display: inline-block;
    background: var(--panel);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    margin: 4px 0;
    border: 1px solid rgba(0,245,212,0.2);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    text-align: left;
    padding: 12px 16px;
    border: 1.5px solid rgba(0,245,212,0.2);
    border-radius: 8px;
    background: var(--panel);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Share Tech Mono', 'PingFang SC', sans-serif;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,245,212,0.08);
    transform: translateX(4px);
    box-shadow: 0 0 12px rgba(0,245,212,0.1);
  }
  .opt-btn:disabled { cursor: default; opacity: 0.7; }
  .opt-btn.correct-opt {
    border-color: var(--success);
    background: rgba(6,214,160,0.12);
    color: var(--success);
    font-weight: 500;
  }
  .opt-btn.wrong-opt {
    border-color: var(--danger);
    background: rgba(239,71,113,0.12);
    color: var(--danger);
    font-weight: 500;
  }
  .opt-letter {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: rgba(0,245,212,0.15);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .opt-btn.correct-opt .opt-letter { background: var(--success); color: var(--bg); }
  .opt-btn.wrong-opt .opt-letter { background: var(--danger); color: #fff; }

  /* Feedback */
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.85rem;
    display: none;
    animation: fade-in 0.3s;
  }
  .feedback.show { display: block; }
  .feedback.ok {
    background: rgba(6,214,160,0.1);
    color: var(--success);
    border: 1px solid var(--success);
  }
  .feedback.err {
    background: rgba(239,71,113,0.1);
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  @keyframes fade-in {
    from { opacity:0; transform:translateY(-4px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* Input */
  .input-group {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .input-group input {
    flex: 1;
    min-width: 120px;
    padding: 10px 14px;
    border: 1.5px solid rgba(0,245,212,0.25);
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'Share Tech Mono', monospace;
    outline: none;
    transition: all 0.2s;
    background: var(--panel);
    color: var(--accent);
  }
  .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,245,212,0.15); }
  .input-group input.correct { border-color: var(--success); background: rgba(6,214,160,0.08); }
  .input-group input.wrong { border-color: var(--danger); background: rgba(239,71,113,0.08); }
  .submit-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,245,212,0.3); }
  .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* Timer bar */
  .timer-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(0,245,212,0.1);
    z-index: 10;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--accent), var(--danger));
    transition: width 1s linear;
  }

  /* Bottom nav */
  .bottom-nav {
    background: var(--glass);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(0,245,212,0.2);
    padding: 10px 16px;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  .nav-dot {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: 1.5px solid rgba(0,245,212,0.25);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text2);
    transition: all 0.2s;
  }
  .nav-dot:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px rgba(0,245,212,0.15); }
  .nav-dot.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(0,245,212,0.2), rgba(0,187,249,0.2));
    color: var(--accent);
    box-shadow: 0 0 16px rgba(0,245,212,0.2);
  }
  .nav-dot.cleared { border-color: var(--success); color: var(--success); }
  .nav-dot.boss {
    width: auto;
    padding: 0 16px;
    background: linear-gradient(135deg, rgba(239,71,113,0.3), rgba(255,209,102,0.2));
    border-color: var(--danger);
    color: var(--danger);
  }
  .nav-dot.boss.active {
    background: linear-gradient(135deg, rgba(0,245,212,0.2), rgba(0,187,249,0.2));
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ===================== START SCREEN ===================== */
  .start-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .start-box {
    max-width: 560px;
    padding: 40px 32px;
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.2);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,245,212,0.08);
    position: relative;
  }
  .start-box::before {
    content: 'TOP SECRET';
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 0.65rem;
    color: var(--danger);
    border: 1px solid var(--danger);
    padding: 2px 6px;
    letter-spacing: 2px;
    transform: rotate(3deg);
    opacity: 0.8;
    font-family: 'Orbitron', sans-serif;
  }
  .start-box .dept-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .start-box .decor {
    font-size: 3rem;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-15px)}
  }
  .start-box h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
  }
  .start-box .subtitle {
    font-size: 1rem;
    color: var(--accent2);
    margin-bottom: 32px;
    font-family: 'Share Tech Mono', monospace;
  }
  .start-btn {
    display: inline-block;
    padding: 14px 48px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    font-family: 'Orbitron', sans-serif;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,245,212,0.4); }
  .start-rules {
    margin-top: 24px;
    color: var(--text2);
    font-size: 0.8rem;
    max-width: 320px;
    line-height: 1.8;
    font-family: 'Share Tech Mono', monospace;
  }
  .start-rules span { color: var(--accent); }

  /* ===================== RESULT SCREEN ===================== */
  .result-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(6,8,15,0.95);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }
  .result-screen.show { display: flex; }
  .result-box {
    max-width: 500px;
    padding: 40px 32px;
    background: var(--panel);
    border-radius: 12px;
    border: 1px solid rgba(0,245,212,0.2);
    box-shadow: 0 0 40px rgba(0,245,212,0.08);
  }
  .rank-display {
    font-size: 5rem;
    font-weight: 900;
    font-family: 'Orbitron', sans-serif;
    animation: rank-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 12px;
  }
  .rank-display.S { color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.4); }
  .rank-display.A { color: var(--silver); text-shadow: 0 0 30px rgba(192,192,192,0.3); }
  .rank-display.B { color: var(--bronze); }
  .rank-display.C { color: var(--text2); }
  @keyframes rank-pop {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }
  .result-box .rank-title {
    color: var(--text);
    font-size: 1.1rem;
    margin-bottom: 8px;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }
  .result-box .rank-desc {
    color: var(--text2);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .badge-display {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    margin: 16px auto;
    box-shadow: 0 0 40px rgba(0,245,212,0.3);
    animation: badge-spin 1s ease-out;
  }
  @keyframes badge-spin {
    from { transform: rotateY(360deg) scale(0); }
    to { transform: rotateY(0) scale(1); }
  }
  .result-stats {
    color: var(--text);
    font-size: 0.9rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin: 20px 0;
    max-width: 400px;
    width: 100%;
  }
  .stat-item { text-align: center; }
  .stat-item .num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-item .lbl {
    font-size: 0.7rem;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }
  .restart-btn {
    margin-top: 24px;
    padding: 12px 36px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }
  .restart-btn:hover {
    background: rgba(0,245,212,0.1);
    box-shadow: 0 0 20px rgba(0,245,212,0.2);
  }

  /* ===================== FEEDBACK OVERLAY ===================== */
  .feedback-overlay {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    padding: 14px 32px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 1.05rem;
    z-index: 1000;
    pointer-events: none;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    font-family: 'Share Tech Mono', monospace;
  }
  .feedback-overlay.show { opacity: 1; transform: translateX(-50%) scale(1); }
  .feedback-overlay.ok {
    background: rgba(6,214,160,0.15);
    border: 1px solid var(--success);
    color: var(--success);
    box-shadow: 0 0 20px rgba(6,214,160,0.3);
  }
  .feedback-overlay.err {
    background: rgba(239,71,113,0.15);
    border: 1px solid var(--danger);
    color: var(--danger);
    box-shadow: 0 0 20px rgba(239,71,113,0.3);
  }

  /* ===================== DECORATIONS ===================== */
  .decor-plug {
    position: absolute;
    top: 12px;
    right: 20px;
    font-size: 1.4rem;
    opacity: 0.15;
  }
  .decor-meter {
    position: absolute;
    bottom: 12px;
    left: 20px;
    font-size: 1.2rem;
    opacity: 0.1;
  }
  .decor-bolt {
    position: absolute;
    top: 50%;
    right: 10px;
    font-size: 1.6rem;
    opacity: 0.08;
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 768px) {
    .game-container { max-height: 100vh; }
    .main-area { padding: 12px 14px; }

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, duration, type='square', vol=0.08) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}
function sndOk() {
  playTone(523, 0.12, 'sine', 0.1);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.1), 120);
}
function sndErr() {
  playTone(200, 0.25, 'sawtooth', 0.08);
  setTimeout(() => playTone(150, 0.3, 'sawtooth', 0.08), 200);
}
function sndClick() { playTone(880, 0.06, 'square', 0.05); }
function sndWin() {

// ===================== GAME STATE =====================
let state = {
  stage: 0,
  score: 0,
  lives: 3,
  combo: 0,
  maxCombo: 0,
  correct: 0,
  total: 0,
  answered: [],
  timer: null,
  timeLeft: 0,
  gameOver: false
};

function startGame() {
  sndClick();
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'flex';
  state = {
    stage: 0,
    score: 0,
    lives: 3,
    combo: 0,
    maxCombo: 0,
    correct: 0,
    total: 0,
    answered: new Array(STAGES.length).fill(null).map(() => []),
    timer: null,
    timeLeft: 0,
    gameOver: false
  };
  renderStage(0);
  updateHUD();
}

function restartGame() {
  sndClick();
  document.getElementById('resultScreen').classList.remove('show');
  startGame();
}

function updateHUD() {
  const hearts = '❤️'.repeat(state.lives) + '🖤'.repeat(3 - state.lives);
  document.getElementById('livesDisplay').innerHTML = hearts.split('').map((h, i) =>
    `<span class="heart ${i >= state.lives ? 'lost' : ''}">${h}</span>`
  ).join('');
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('comboDisplay').textContent = 'x' + state.combo;
  document.getElementById('comboFill').style.width = Math.min(state.combo * 10, 100) + '%';

  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === state.stage);
    const cleared = state.answered[i] && state.answered[i].filter(a => a).length === STAGES[i].questions.length;
    dot.classList.toggle('cleared', cleared);
  });
}

function goStage(n) {
  if (n < 0 || n >= STAGES.length || state.gameOver) return;
  sndClick();
  state.stage = n;
  renderStage(n);
  updateHUD();
}

function showOverlay(text, type) {
  const f = document.getElementById('feedbackOverlay');
  f.textContent = text;
  f.className = 'feedback-overlay ' + type;
  void f.offsetWidth;
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 1400);
}

function renderStage(n) {
  const stage = STAGES[n];
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  const answeredInStage = state.answered[n] ? state.answered[n].filter(a => a !== undefined && a !== null).length : 0;
  const totalInStage = stage.questions.length;
  const progressPct = (answeredInStage / totalInStage) * 100;

  let html = `<div class="stage-progress"><div class="stage-progress-fill" style="width:${progressPct}%"></div></div>`;

  html += `<div class="paper">`;
  html += `<div class="decor-plug">🔌</div>`;
  html += `<div class="decor-meter">⚡</div>`;
  html += `<div class="decor-bolt">⚡</div>`;

  html += `<div class="stage-header">`;
  html += `<div class="stage-num">${n+1}</div>`;
  html += `<div class="stage-info"><h2>${stage.title}</h2><div class="desc">${stage.desc}</div></div>`;
  html += `</div>`;

  if (stage.timed) {
    document.getElementById('timerBar').style.display = 'block';
    startTimer(stage.timeLimit);
  } else {
    document.getElementById('timerBar').style.display = 'none';
    stopTimer();
  }

  stage.questions.forEach((q, i) => {
    const ans = state.answered[n] && state.answered[n][i];
    const cls = ans === true ? 'correct' : ans === false ? 'wrong' : '';
    const locked = ans !== undefined && ans !== null;

    html += `<div class="q-card ${cls}" id="q-${n}-${i}">`;
    html += `<div class="q-text"><span class="q-num">${i+1}</span>${q.text}</div>`;

    if (q.type === 'choice') {
      html += `<div class="options">`;
      q.options.forEach((opt, j) => {
        const optCls = locked ? (j === q.answer ? 'correct-opt' : (ans === false && j === getSelectedOpt(n, i) ? 'wrong-opt' : '')) : '';
        html += `<button class="opt-btn ${optCls}" onclick="answerChoice(${n},${i},${j})" ${locked ? 'disabled' : ''}>`;
        html += `<span class="opt-letter">${String.fromCharCode(65+j)}</span>${opt}`;
        html += `</button>`;
      });
      html += `</div>`;
    } else if (q.type === 'input') {
      const inputCls = locked ? (ans ? 'correct' : 'wrong') : '';
      const val = locked ? (state.answered[n] && state.answered[n][i + '_val'] || '') : '';
      html += `<div class="input-group">`;
      html += `<input type="text" id="in-${n}-${i}" placeholder="输入答案" class="${inputCls}" value="${val}" ${locked ? 'disabled' : ''} onkeydown="if(event.key==='Enter')answerInput(${n},${i})">`;
      html += `<span style="color:var(--text2);font-size:0.85rem;">${q.unit}</span>`;
      html += `<button class="submit-btn" onclick="answerInput(${n},${i})" ${locked ? 'disabled' : ''}>提交</button>`;
      html += `</div>`;
    }

    html += `<div class="feedback ${ans === true ? 'ok show' : ans === false ? 'err show' : ''}" id="fb-${n}-${i}">`;
    if (ans === true) {
      html += `✅ 正确！${q.explain}`;
    } else if (ans === false) {
      html += `❌ 错误。${q.explain}`;
    }
    html += `</div>`;

    html += `</div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
  main.scrollTop = 0;
}

let selectedOpts = {};
function getSelectedOpt(n, i) {
  return selectedOpts[`${n}-${i}`];
}

function answerChoice(n, i, j) {
  if (state.gameOver) return;
  if (state.answered[n] && state.answered[n][i] !== undefined && state.answered[n][i] !== null) return;

  selectedOpts[`${n}-${i}`] = j;
  const q = STAGES[n].questions[i];
  const isCorrect = j === q.answer;

  processAnswer(n, i, isCorrect, j);
}

function answerInput(n, i) {
  if (state.gameOver) return;
  if (state.answered[n] && state.answered[n][i] !== undefined && state.answered[n][i] !== null) return;

  const input = document.getElementById(`in-${n}-${i}`);
  const val = input.value.trim();
  if (!val) return;

  const q = STAGES[n].questions[i];
  let isCorrect = false;
  const userNum = parseFloat(val);
  const ansNum = parseFloat(q.answer);
  if (!isNaN(userNum) && !isNaN(ansNum)) {
    const tolerance = Math.abs(ansNum) > 100 ? 2 : 0.5;
    isCorrect = Math.abs(userNum - ansNum) <= tolerance;
  } else {
    isCorrect = val === q.answer;
  }

  processAnswer(n, i, isCorrect, val);
}

function processAnswer(n, i, isCorrect, detail) {
  if (!state.answered[n]) state.answered[n] = [];
  state.answered[n][i] = isCorrect;
  if (typeof detail === 'string') state.answered[n][i + '_val'] = detail;
  else selectedOpts[`${n}-${i}`] = detail;

  state.total++;
  if (isCorrect) {
    sndOk();
    state.correct++;
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    const base = 100;
    const comboBonus = Math.min(state.combo - 1, 10) * 20;
    state.score += base + comboBonus;
    showOverlay(`+${base + comboBonus} 连击x${state.combo}`, 'ok');
  } else {
    sndErr();
    state.combo = 0;
    state.lives--;
    const hearts = document.querySelectorAll('.heart');
    if (hearts[state.lives]) hearts[state.lives].classList.add('hit');
    showOverlay('❌ 错误，失去一条生命', 'err');
  }

  updateHUD();

  const card = document.getElementById(`q-${n}-${i}`);
  if (card) {
    card.classList.remove('correct', 'wrong');
    card.classList.add(isCorrect ? 'correct' : 'wrong');
    const fb = document.getElementById(`fb-${n}-${i}`);
    const q = STAGES[n].questions[i];
    fb.className = `feedback ${isCorrect ? 'ok' : 'err'} show`;
    fb.textContent = (isCorrect ? '✅ 正确！' : '❌ 错误。') + q.explain;

    if (q.type === 'choice') {
      card.querySelectorAll('.opt-btn').forEach((btn, j) => {
        btn.disabled = true;
        btn.classList.remove('correct-opt', 'wrong-opt');
        if (j === q.answer) btn.classList.add('correct-opt');
        else if (!isCorrect && j === detail) btn.classList.add('wrong-opt');
      });
    } else {
      const input = document.getElementById(`in-${n}-${i}`);
      const submit = card.querySelector('.submit-btn');
      if (input) { input.disabled = true; input.classList.add(isCorrect ? 'correct' : 'wrong'); }
      if (submit) submit.disabled = true;
    }
  }

  const answeredInStage = state.answered[n].filter(a => a !== undefined && a !== null).length;
  const fill = document.querySelector('.stage-progress-fill');
  if (fill) fill.style.width = (answeredInStage / STAGES[n].questions.length * 100) + '%';

  if (answeredInStage === STAGES[n].questions.length) {
    setTimeout(() => {
      if (n < STAGES.length - 1 && !state.gameOver) {
        goStage(n + 1);
      } else if (n === STAGES.length - 1) {
        endGame();
      }
    }, 1200);
  }

  if (state.lives <= 0) {
    state.gameOver = true;
    stopTimer();
    setTimeout(endGame, 1000);
  }
}

function startTimer(seconds) {
  stopTimer();
  state.timeLeft = seconds;
  const fill = document.getElementById('timerFill');
  fill.style.width = '100%';

  state.timer = setInterval(() => {
    state.timeLeft--;
    fill.style.width = (state.timeLeft / seconds * 100) + '%';
    if (state.timeLeft <= 0) {
      stopTimer();
      const stage = state.stage;
      STAGES[stage].questions.forEach((q, i) => {
        if (state.answered[stage][i] === undefined || state.answered[stage][i] === null) {
          processAnswer(stage, i, false, -1);
        }
      });
    }
  }, 1000);
}

function stopTimer() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
}

function endGame() {
  stopTimer();
  state.gameOver = true;

  const accuracy = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  let rank, title, desc, badge;

  if (state.lives > 0 && accuracy >= 90 && state.maxCombo >= 5) {
    rank = 'S'; title = 'S级特工 — 电力大师'; desc = '完美通关！所有电路知识已精通，获得电力大师徽章！'; badge = '⚡';
  } else if (state.lives > 0 && accuracy >= 80) {
    rank = 'A'; title = 'A级特工 — 高级电工'; desc = '表现优秀！电路分析能力相当扎实。'; badge = '🔌';
  } else if (state.lives > 0 && accuracy >= 60) {
    rank = 'B'; title = 'B级特工 — 合格学员'; desc = '基础尚可，部分知识点需要加强。'; badge = '💡';
  } else {
    rank = 'C'; title = 'C级学员 — 见习特工'; desc = '建议重新复习本章内容后再来挑战。'; badge = '🔋';
  }

  document.getElementById('rankDisplay').textContent = rank;
  document.getElementById('rankDisplay').className = 'rank-display ' + rank;
  document.getElementById('rankTitle').textContent = title;
  document.getElementById('rankDesc').textContent = desc;
  document.getElementById('badgeDisplay').textContent = badge;
  document.getElementById('badgeDisplay').style.display = 'flex';
  document.getElementById('statScore').textContent = state.score;
  document.getElementById('statCombo').textContent = state.maxCombo;
  document.getElementById('statAcc').textContent = accuracy + '%';

  sndWin();
  document.getElementById('resultScreen').classList.add('show');
}

window.addEventListener('DOMContentLoaded', () => {
  // stay on start screen
});
</script>
</body>
</html>
