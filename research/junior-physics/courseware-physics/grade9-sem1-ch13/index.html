<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电力实验室 · 第十三章 电功率</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  :root {
    --neon: #9d00ff;
    --hot: #ff00ff;
    --ink: #1a0a2e;
    --page: #faf8f5;
    --grid: #e8e4df;
    --warn: #ff4757;
    --ok: #00d2d3;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--ink);
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(157,0,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(157,0,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .spark {
    position: fixed; width: 3px; height: 3px;
    background: var(--hot);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--hot), 0 0 16px var(--neon);
    pointer-events: none; z-index: 1;
    animation: spark-float 4s ease-in-out infinite;
  }
  @keyframes spark-float {
    0%,100% { transform: translate(0,0) scale(1); opacity: 0.6; }
    50% { transform: translate(30px,-50px) scale(1.5); opacity: 1; }
  }

  .game-container {
    width: 100%; max-width: 720px;
    height: 100vh; max-height: 900px;
    background: var(--page);
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    box-shadow: 0 0 60px rgba(157,0,255,0.2);
    overflow: hidden;
  }

  /* 顶部信息栏 */
  .top-bar {
    background: linear-gradient(135deg, var(--ink) 0%, #2d1b4e 100%);
    color: #fff; padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid var(--neon);
    position: relative; overflow: hidden;
  }
  .top-bar::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: var(--hot);
    animation: pulse-line 2s ease-in-out infinite;
  }
  @keyframes pulse-line { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  .dept-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.75rem; opacity: 0.8;
  }
  .dept-badge .icon { font-size: 1.1rem; }
  .lives { display: flex; gap: 4px; font-size: 1.3rem; }
  .lives .heart { transition: all 0.3s; }
  .lives .heart.lost { opacity: 0.2; filter: grayscale(1); }
  .lives .heart.hit { animation: heart-beat 0.5s; }
  @keyframes heart-beat { 0%,100%{transform:scale(1)} 25%{transform:scale(1.4)} 50%{transform:scale(0.8)} }

  .score-board {
    display: flex; gap: 16px; align-items: center;
    font-size: 0.8rem;
  }
  .score-item { text-align: center; }
  .score-item .val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 1.1rem;
    color: var(--hot);
  }
  .score-item .label { font-size: 0.65rem; opacity: 0.6; }
  .combo-bar {
    position: relative; width: 80px; height: 6px;
    background: rgba(255,255,255,0.15); border-radius: 3px;
    overflow: hidden; margin-top: 2px;
  }
  .combo-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--neon), var(--hot));
    transition: width 0.3s; width: 0%;
  }

  /* 主内容区 */
  .main-area {
    flex: 1; overflow-y: auto;
    padding: 24px 20px;
    position: relative;
  }
  .main-area::-webkit-scrollbar { width: 6px; }
  .main-area::-webkit-scrollbar-track { background: transparent; }
  .main-area::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 3px; }

  /* 页面纸张纹理 */
  .paper {
    background: #fff;
    border: 1px solid var(--grid);
    border-radius: 8px;
    padding: 24px;
    position: relative;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .paper::before {
    content: ''; position: absolute; top: 0; left: 40px; right: 40px;
    height: 1px; background: var(--warn);
    opacity: 0.3;
  }

  /* 关卡标题 */
  .stage-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 2px dashed var(--grid);
  }
  .stage-num {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, var(--neon), var(--hot));
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.3rem;
    flex-shrink: 0; box-shadow: 0 4px 16px rgba(157,0,255,0.3);
  }
  .stage-info h2 {
    font-size: 1.15rem; color: var(--ink);
    font-weight: 700; margin-bottom: 2px;
  }
  .stage-info .desc {
    font-size: 0.75rem; color: #888;
    font-family: 'JetBrains Mono', monospace;
  }

  /* 题目卡片 */
  .q-card {
    background: #fff;
    border-left: 4px solid var(--neon);
    border-radius: 0 8px 8px 0;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    transition: all 0.3s;
  }
  .q-card:hover { box-shadow: 0 4px 16px rgba(157,0,255,0.1); }
  .q-card.correct { border-left-color: var(--ok); background: #f0fffe; }
  .q-card.wrong { border-left-color: var(--warn); background: #fff5f5; }
  .q-card.locked { opacity: 0.4; pointer-events: none; }

  .q-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--ink); color: #fff;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    margin-right: 10px; vertical-align: middle;
  }
  .q-card.correct .q-num { background: var(--ok); }
  .q-card.wrong .q-num { background: var(--warn); }

  .q-text {
    font-size: 0.95rem; line-height: 1.7;
    color: #333; margin-bottom: 14px;
  }
  .q-text .highlight {
    background: linear-gradient(180deg, transparent 60%, rgba(157,0,255,0.15) 60%);
    padding: 0 2px; font-weight: 500;
  }
  .q-formula {
    display: inline-block;
    background: var(--ink); color: var(--hot);
    padding: 4px 10px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; margin: 4px 0;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    text-align: left; padding: 12px 16px;
    border: 1.5px solid var(--grid);
    border-radius: 8px; background: #fff;
    cursor: pointer; font-size: 0.9rem;
    transition: all 0.2s; color: #333;
    display: flex; align-items: center; gap: 10px;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--neon);
    background: rgba(157,0,255,0.03);
    transform: translateX(4px);
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct-opt {
    border-color: var(--ok); background: #e8fffe;
    color: #006666; font-weight: 500;
  }
  .opt-btn.wrong-opt {
    border-color: var(--warn); background: #ffe8e8;
    color: #991f1f; font-weight: 500;
  }
  .opt-letter {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--grid); color: #666;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
    flex-shrink: 0;
  }
  .opt-btn.correct-opt .opt-letter { background: var(--ok); color: #fff; }
  .opt-btn.wrong-opt .opt-letter { background: var(--warn); color: #fff; }

  .feedback {
    margin-top: 12px; padding: 10px 14px;
    border-radius: 6px; font-size: 0.85rem;
    display: none; animation: fade-in 0.3s;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #e8fffe; color: #006666; border: 1px solid var(--ok); }
  .feedback.err { background: #ffe8e8; color: #991f1f; border: 1px solid var(--warn); }
  @keyframes fade-in { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* 输入题 */
  .input-group {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .input-group input {
    flex: 1; min-width: 120px;
    padding: 10px 14px; border: 2px solid var(--grid);
    border-radius: 8px; font-size: 1rem;
    font-family: 'JetBrains Mono', monospace;
    outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--neon); }
  .input-group input.correct { border-color: var(--ok); background: #e8fffe; }
  .input-group input.wrong { border-color: var(--warn); background: #ffe8e8; }
  .submit-btn {
    padding: 10px 24px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, var(--neon), var(--hot));
    color: #fff; font-weight: 700; cursor: pointer;
    transition: all 0.2s; font-size: 0.9rem;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(157,0,255,0.3); }
  .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* 导航 */
  .bottom-nav {
    background: #fff;
    border-top: 2px solid var(--grid);
    padding: 10px 16px;
    display: flex; justify-content: center; gap: 6px;
    z-index: 10;
  }
  .nav-dot {
    width: 36px; height: 36px; border-radius: 10px;
    border: 2px solid var(--grid); background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; font-weight: 700; color: #999;
    transition: all 0.2s;
  }
  .nav-dot:hover { border-color: var(--neon); color: var(--neon); }
  .nav-dot.active {
    border-color: var(--neon); background: linear-gradient(135deg, var(--neon), var(--hot));
    color: #fff; box-shadow: 0 2px 8px rgba(157,0,255,0.3);
  }
  .nav-dot.cleared { border-color: var(--ok); color: var(--ok); }
  .nav-dot.boss {
    width: auto; padding: 0 14px;
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    border-color: transparent; color: #fff;
  }
  .nav-dot.boss.active {
    background: linear-gradient(135deg, var(--neon), var(--hot));
  }

  /* 结算 */
  .result-screen {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(26,10,46,0.95);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; text-align: center;
  }
  .result-screen.show { display: flex; }
  .rank-display {
    font-size: 6rem; font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    animation: rank-pop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 20px;
  }
  .rank-display.S { color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.5); }
  .rank-display.A { color: #c0c0c0; text-shadow: 0 0 30px rgba(192,192,192,0.4); }
  .rank-display.B { color: #cd7f32; }
  .rank-display.C { color: #888; }
  @keyframes rank-pop { from { transform: scale(0) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }

  .badge-display {
    width: 120px; height: 120px; border-radius: 50%;
    background: linear-gradient(135deg, var(--neon), var(--hot));
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; margin: 20px 0;
    box-shadow: 0 0 40px rgba(157,0,255,0.4);
    animation: badge-spin 1s ease-out;
  }
  @keyframes badge-spin { from { transform: rotateY(360deg) scale(0); } to { transform: rotateY(0) scale(1); } }

  .result-stats {
    color: #fff; font-size: 0.9rem;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 20px; margin: 20px 0; max-width: 400px; width: 100%;
  }
  .stat-item { text-align: center; }
  .stat-item .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem; font-weight: 700;
    color: var(--hot);
  }
  .stat-item .lbl { font-size: 0.7rem; opacity: 0.6; margin-top: 4px; }

  .restart-btn {
    margin-top: 30px; padding: 14px 40px;
    border: 2px solid var(--hot); border-radius: 12px;
    background: transparent; color: var(--hot);
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover {
    background: var(--hot); color: var(--ink);
    box-shadow: 0 0 30px rgba(255,0,255,0.3);
  }

  /* 开始画面 */
  .start-screen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px;
  }
  .start-screen .dept-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; color: var(--neon);
    letter-spacing: 4px; margin-bottom: 20px;
  }
  .start-screen h1 {
    font-size: 2.4rem; font-weight: 900;
    color: #fff; margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(157,0,255,0.5);
  }
  .start-screen .subtitle {
    font-size: 1rem; color: var(--hot);
    margin-bottom: 40px; font-weight: 500;
  }
  .start-screen .decor {
    font-size: 4rem; margin-bottom: 30px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }

  .start-btn {
    padding: 16px 60px;
    background: linear-gradient(135deg, var(--neon), var(--hot));
    border: none; border-radius: 12px;
    color: #fff; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 24px rgba(157,0,255,0.4);
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(157,0,255,0.5); }

  .start-rules {
    margin-top: 30px; color: rgba(255,255,255,0.5);
    font-size: 0.75rem; max-width: 320px;
    line-height: 1.8;
  }
  .start-rules span { color: var(--hot); }

  /* 进度条 */
  .stage-progress {
    height: 3px; background: var(--grid);
    margin: -24px -20px 20px -20px;
    position: relative;
  }
  .stage-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--neon), var(--hot));
    transition: width 0.5s;
  }

  /* 装饰元素 */
  .decor-plug {
    position: absolute; top: 12px; right: 20px;
    font-size: 1.4rem; opacity: 0.15;
    transform: rotate(15deg);
  }
  .decor-meter {
    position: absolute; bottom: 12px; left: 20px;
    font-size: 1.2rem; opacity: 0.1;
  }
  .decor-bolt {
    position: absolute; top: 50%; right: 10px;
    font-size: 1.6rem; opacity: 0.08;
    transform: rotate(-10deg);
  }

  /* 计时器 */
  .timer-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--grid);
  }
  .timer-fill {
    height: 100%; background: linear-gradient(90deg, var(--ok), var(--neon), var(--warn));
    transition: width 1s linear;
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .game-container { max-height: 100vh; }
    .main-area { padding: 16px 12px; }
    .paper { padding: 16px; }
    .start-screen h1 { font-size: 1.8rem; }
    .rank-display { font-size: 4rem; }
    .bottom-nav { padding: 8px 10px; gap: 4px; }
    .nav-dot { width: 30px; height: 30px; font-size: 0.65rem; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="spark" style="top:10%;left:15%;animation-delay:0s;"></div>
<div class="spark" style="top:30%;left:80%;animation-delay:1s;"></div>
<div class="spark" style="top:70%;left:25%;animation-delay:2s;"></div>
<div class="spark" style="top:85%;left:70%;animation-delay:3s;"></div>

<!-- 开始画面 -->
<div class="start-screen" id="startScreen">
  <div class="dept-label">⚡ POWER DIVISION · 电力实验室</div>
  <div class="decor">🔌⚡</div>
  <h1>第十三章 电功率</h1>
  <div class="subtitle">代号：POWER · 九年级物理上学期</div>
  <button class="start-btn" onclick="startGame()">进入实验室</button>
  <div class="start-rules">
    ❤️❤️❤️ 三条生命 · 连击加分<br>
    5个Stage · 29道题目 · 60秒终极挑战<br>
    <span>S级</span>评级 = 电力大师徽章
  </div>
</div>

<!-- 结算画面 -->
<div class="result-screen" id="resultScreen">
  <div class="rank-display" id="rankDisplay">S</div>
  <div style="color:#fff;font-size:1.1rem;margin-bottom:8px;" id="rankTitle">电力大师</div>
  <div style="color:rgba(255,255,255,0.5);font-size:0.8rem;" id="rankDesc">完美通关！所有电路知识已掌握</div>
  <div class="badge-display" id="badgeDisplay">⚡</div>
  <div class="result-stats">
    <div class="stat-item">
      <div class="num" id="statScore">0</div>
      <div class="lbl">总分</div>
    </div>
    <div class="stat-item">
      <div class="num" id="statCombo">0</div>
      <div class="lbl">最高连击</div>
    </div>
    <div class="stat-item">
      <div class="num" id="statAcc">0%</div>
      <div class="lbl">正确率</div>
    </div>
  </div>
  <button class="restart-btn" onclick="restartGame()">再次挑战</button>
</div>

<!-- 游戏主体 -->
<div class="game-container" id="gameContainer" style="display:none;">
  <div class="timer-bar" id="timerBar" style="display:none;"><div class="timer-fill" id="timerFill"></div></div>
  <div class="top-bar">
    <div class="dept-badge"><span class="icon">🔌</span><span>POWER实验室</span></div>
    <div class="lives" id="livesDisplay">❤️❤️❤️</div>
    <div class="score-board">
      <div class="score-item">
        <div class="val" id="scoreDisplay">0</div>
        <div class="label">SCORE</div>
      </div>
      <div class="score-item">
        <div class="val" id="comboDisplay">x0</div>
        <div class="label">COMBO</div>
        <div class="combo-bar"><div class="combo-fill" id="comboFill"></div></div>
      </div>
    </div>
  </div>

  <div class="main-area" id="mainArea">
    <!-- 动态内容 -->
  </div>

  <div class="bottom-nav" id="bottomNav">
    <div class="nav-dot active" data-stage="0" onclick="goStage(0)">1</div>
    <div class="nav-dot" data-stage="1" onclick="goStage(1)">2</div>
    <div class="nav-dot" data-stage="2" onclick="goStage(2)">3</div>
    <div class="nav-dot" data-stage="3" onclick="goStage(3)">4</div>
    <div class="nav-dot boss" data-stage="4" onclick="goStage(4)">BOSS</div>
  </div>
</div>

<script>
// ==================== 游戏数据 ====================
const STAGES = [
  {
    title: "电功与电能",
    desc: "W=UIt 计算 · 电能表读数 · 电费计算",
    questions: [
      {
        type: "choice",
        text: "家庭电路电压为220V，某用电器工作电流为2A，通电时间为10s，求电流做的功W。",
        options: ["440J", "2200J", "4400J", "220J"],
        answer: 2,
        explain: "根据电功公式 W = UIt = 220V × 2A × 10s = 4400J"
      },
      {
        type: "input",
        text: "某电能表标有"3000r/kW·h"，当用电器工作时，电能表转盘在5分钟内转了150转，求这段时间消耗的电能（kW·h）。",
        answer: "0.05",
        unit: "kW·h",
        explain: "W = 150r ÷ 3000r/kW·h = 0.05 kW·h"
      },
      {
        type: "choice",
        text: "下列说法正确的是：",
        options: [
          "电功的国际单位是瓦特",
          "电能表测量的是电功率",
          "电流做功的过程就是电能转化为其他形式能的过程",
          "电功和电功率是同一个物理量"
        ],
        answer: 2,
        explain: "电功单位是焦耳(J)，电能表测电能，电功和电功率不同。"
      },
      {
        type: "input",
        text: "某家庭上月电能表示数为1234.5 kW·h，本月示数为1289.3 kW·h。电费单价为0.5元/kW·h，求本月电费（元）。",
        answer: "27.4",
        unit: "元",
        explain: "用电量 = 1289.3 - 1234.5 = 54.8 kW·h；电费 = 54.8 × 0.5 = 27.4元"
      },
      {

// ==================== 游戏状态 ====================
let state = {
  stage: 0,
  score: 0,
  lives: 3,
  combo: 0,
  maxCombo: 0,
  correct: 0,
  total: 0,
  answered: [],
  timer: null,
  timeLeft: 0,
  gameOver: false
};

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'flex';
  state = { stage: 0, score: 0, lives: 3, combo: 0, maxCombo: 0, correct: 0, total: 0, answered: new Array(STAGES.length).fill(null).map(() => []), timer: null, timeLeft: 0, gameOver: false };
  renderStage(0);
  updateHUD();
}

function restartGame() {
  document.getElementById('resultScreen').classList.remove('show');
  startGame();
}

function updateHUD() {
  const hearts = '❤️'.repeat(state.lives) + '🖤'.repeat(3 - state.lives);
  document.getElementById('livesDisplay').innerHTML = hearts.split('').map((h,i) =>
    `<span class="heart ${i >= state.lives ? 'lost' : ''}">${h}</span>`
  ).join('');
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('comboDisplay').textContent = 'x' + state.combo;
  document.getElementById('comboFill').style.width = Math.min(state.combo * 10, 100) + '%';

  // 导航状态
  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === state.stage);
    const cleared = state.answered[i] && state.answered[i].filter(a => a).length === STAGES[i].questions.length;
    dot.classList.toggle('cleared', cleared);
  });
}

function goStage(n) {
  if (n < 0 || n >= STAGES.length || state.gameOver) return;
  state.stage = n;
  renderStage(n);
  updateHUD();
}

function renderStage(n) {
  const stage = STAGES[n];
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  // 进度条
  const answeredInStage = state.answered[n] ? state.answered[n].filter(a => a !== undefined).length : 0;
  const totalInStage = stage.questions.length;
  const progressPct = (answeredInStage / totalInStage) * 100;

  let html = `<div class="stage-progress"><div class="stage-progress-fill" style="width:${progressPct}%"></div></div>`;

  html += `<div class="paper">`;
  html += `<div class="decor-plug">🔌</div>`;
  html += `<div class="decor-meter">⚡</div>`;
  html += `<div class="decor-bolt">⚡</div>`;

  html += `<div class="stage-header">`;
  html += `<div class="stage-num">${n+1}</div>`;
  html += `<div class="stage-info"><h2>${stage.title}</h2><div class="desc">${stage.desc}</div></div>`;
  html += `</div>`;

  if (stage.timed) {
    document.getElementById('timerBar').style.display = 'block';
    startTimer(stage.timeLimit);
  } else {
    document.getElementById('timerBar').style.display = 'none';
    stopTimer();
  }

  stage.questions.forEach((q, i) => {
    const ans = state.answered[n] && state.answered[n][i];
    const cls = ans === true ? 'correct' : ans === false ? 'wrong' : '';
    const locked = ans !== undefined && ans !== null;

    html += `<div class="q-card ${cls}" id="q-${n}-${i}">`;
    html += `<div class="q-text"><span class="q-num">${i+1}</span>${q.text}</div>`;

    if (q.type === 'choice') {
      html += `<div class="options">`;
      q.options.forEach((opt, j) => {
        const optCls = locked ? (j === q.answer ? 'correct-opt' : (ans === false && j === getSelectedOpt(n,i) ? 'wrong-opt' : '')) : '';
        html += `<button class="opt-btn ${optCls}" onclick="answerChoice(${n},${i},${j})" ${locked ? 'disabled' : ''}>`;
        html += `<span class="opt-letter">${String.fromCharCode(65+j)}</span>${opt}`;
        html += `</button>`;
      });
      html += `</div>`;
    } else if (q.type === 'input') {
      const inputCls = locked ? (ans ? 'correct' : 'wrong') : '';
      const val = locked ? (state.answered[n] && state.answered[n][i+'_val'] || '') : '';
      html += `<div class="input-group">`;
      html += `<input type="text" id="in-${n}-${i}" placeholder="输入答案" class="${inputCls}" value="${val}" ${locked ? 'disabled' : ''} onkeydown="if(event.key==='Enter')answerInput(${n},${i})">`;
      html += `<span style="color:#999;font-size:0.85rem;">${q.unit}</span>`;
      html += `<button class="submit-btn" onclick="answerInput(${n},${i})" ${locked ? 'disabled' : ''}>提交</button>`;
      html += `</div>`;
    }

    // 反馈区
    html += `<div class="feedback ${ans === true ? 'ok show' : ans === false ? 'err show' : ''}" id="fb-${n}-${i}">`;
    if (ans === true) {
      html += `✅ 正确！${q.explain}`;
    } else if (ans === false) {
      html += `❌ 错误。${q.explain}`;
    }
    html += `</div>`;

    html += `</div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
  main.scrollTop = 0;
}

let selectedOpts = {};
function getSelectedOpt(n, i) {
  return selectedOpts[`${n}-${i}`];
}

function answerChoice(n, i, j) {
  if (state.gameOver) return;
  if (state.answered[n] && state.answered[n][i] !== undefined && state.answered[n][i] !== null) return;

  selectedOpts[`${n}-${i}`] = j;
  const q = STAGES[n].questions[i];
  const isCorrect = j === q.answer;

  processAnswer(n, i, isCorrect, j);
}

function answerInput(n, i) {
  if (state.gameOver) return;
  if (state.answered[n] && state.answered[n][i] !== undefined && state.answered[n][i] !== null) return;

  const input = document.getElementById(`in-${n}-${i}`);
  const val = input.value.trim();
  if (!val) return;

  const q = STAGES[n].questions[i];
  // 支持数值近似匹配
  let isCorrect = false;
  const userNum = parseFloat(val);
  const ansNum = parseFloat(q.answer);
  if (!isNaN(userNum) && !isNaN(ansNum)) {
    const tolerance = Math.abs(ansNum) > 100 ? 2 : 0.5;
    isCorrect = Math.abs(userNum - ansNum) <= tolerance;
  } else {
    isCorrect = val === q.answer;
  }

  processAnswer(n, i, isCorrect, val);
}

function processAnswer(n, i, isCorrect, detail) {
  if (!state.answered[n]) state.answered[n] = [];
  state.answered[n][i] = isCorrect;
  if (typeof detail === 'string') state.answered[n][i+'_val'] = detail;
  else selectedOpts[`${n}-${i}`] = detail;

  state.total++;
  if (isCorrect) {
    state.correct++;
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    // 连击加分
    const base = 100;
    const comboBonus = Math.min(state.combo - 1, 10) * 20;
    state.score += base + comboBonus;
  } else {
    state.combo = 0;
    state.lives--;
    // 扣命动画
    const hearts = document.querySelectorAll('.heart');
    if (hearts[state.lives]) hearts[state.lives].classList.add('hit');
  }

  updateHUD();

  // 重渲染当前题目显示状态
  const card = document.getElementById(`q-${n}-${i}`);
  if (card) {
    card.classList.remove('correct', 'wrong');
    card.classList.add(isCorrect ? 'correct' : 'wrong');
    const fb = document.getElementById(`fb-${n}-${i}`);
    const q = STAGES[n].questions[i];
    fb.className = `feedback ${isCorrect ? 'ok' : 'err'} show`;
    fb.textContent = (isCorrect ? '✅ 正确！' : '❌ 错误。') + q.explain;

    // 禁用按钮
    if (q.type === 'choice') {
      card.querySelectorAll('.opt-btn').forEach((btn, j) => {
        btn.disabled = true;
        btn.classList.remove('correct-opt', 'wrong-opt');
        if (j === q.answer) btn.classList.add('correct-opt');
        else if (!isCorrect && j === detail) btn.classList.add('wrong-opt');
      });
    } else {
      const input = document.getElementById(`in-${n}-${i}`);
      const submit = card.querySelector('.submit-btn');
      if (input) { input.disabled = true; input.classList.add(isCorrect ? 'correct' : 'wrong'); }
      if (submit) submit.disabled = true;
    }
  }

  // 更新进度条
  const answeredInStage = state.answered[n].filter(a => a !== undefined && a !== null).length;
  const fill = document.querySelector('.stage-progress-fill');
  if (fill) fill.style.width = (answeredInStage / STAGES[n].questions.length * 100) + '%';

  // 检查是否Stage完成
  if (answeredInStage === STAGES[n].questions.length) {
    setTimeout(() => {
      if (n < STAGES.length - 1 && !state.gameOver) {
        goStage(n + 1);
      } else if (n === STAGES.length - 1) {
        endGame();
      }
    }, 1200);
  }

  // 检查生命值
  if (state.lives <= 0) {
    state.gameOver = true;
    stopTimer();
    setTimeout(endGame, 1000);
  }
}

function startTimer(seconds) {
  stopTimer();
  state.timeLeft = seconds;
  const fill = document.getElementById('timerFill');
  fill.style.width = '100%';

  state.timer = setInterval(() => {
    state.timeLeft--;
    fill.style.width = (state.timeLeft / seconds * 100) + '%';
    if (state.timeLeft <= 0) {
      stopTimer();
      // 时间到，剩余未答题判错
      const stage = state.stage;
      STAGES[stage].questions.forEach((q, i) => {
        if (state.answered[stage][i] === undefined || state.answered[stage][i] === null) {
          processAnswer(stage, i, false, -1);
        }
      });
    }
  }, 1000);
}

function stopTimer() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
}

function endGame() {
  stopTimer();
  state.gameOver = true;

  const accuracy = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  let rank, title, desc;

  if (state.lives > 0 && accuracy >= 90 && state.maxCombo >= 5) {
    rank = 'S'; title = '电力大师'; desc = '完美通关！所有电路知识已精通，获得电力大师徽章！';
  } else if (state.lives > 0 && accuracy >= 80) {
    rank = 'A'; title = '高级电工'; desc = '表现优秀！电路分析能力相当扎实。';
  } else if (state.lives > 0 && accuracy >= 60) {
    rank = 'B'; title = '合格学员'; desc = '基础尚可，部分知识点需要加强。';
  } else {
    rank = 'C'; title = '见习生'; desc = '建议重新复习本章内容后再来挑战。';
  }

  document.getElementById('rankDisplay').textContent = rank;
  document.getElementById('rankDisplay').className = 'rank-display ' + rank;
  document.getElementById('rankTitle').textContent = title;
  document.getElementById('rankDesc').textContent = desc;
  document.getElementById('badgeDisplay').textContent = rank === 'S' ? '⚡' : rank === 'A' ? '🔌' : rank === 'B' ? '💡' : '🔋';
  document.getElementById('badgeDisplay').style.display = rank === 'S' ? 'flex' : 'none';
  document.getElementById('statScore').textContent = state.score;
  document.getElementById('statCombo').textContent = state.maxCombo;
  document.getElementById('statAcc').textContent = accuracy + '%';

  document.getElementById('resultScreen').classList.add('show');
}
</script>
</body>
</html>
