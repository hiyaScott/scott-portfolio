
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第二章 机械运动 · 物理基础实验室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #06080f;
  --panel: rgba(10, 14, 26, 0.9);
  --accent: #00f5d4;
  --accent2: #00bbf9;
  --danger: #ef476f;
  --warning: #ffd166;
  --success: #06d6a0;
  --grid: rgba(0, 245, 212, 0.08);
  --text: #c0c8d8;
  --text-dim: #586070;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* HUD Grid */
#hud-grid {
  position: fixed; inset: 0;
  background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 1;
}

/* Corners */
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: fixed; width: 80px; height: 80px; z-index: 2; pointer-events: none;
}
.corner-tl { top: 10px; left: 10px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.corner-tr { top: 10px; right: 10px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
.corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

/* App container */
#app {
  position: relative; z-index: 10;
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* Title */
.title-bar {
  text-align: center;
  border-bottom: 1px solid var(--accent);
  padding-bottom: 16px;
  margin-bottom: 24px;
}
.title-bar h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px; letter-spacing: 4px;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
}
.title-bar .subtitle {
  font-size: 14px; color: var(--text-dim);
  margin-top: 8px; letter-spacing: 2px;
}

/* Progress bar */
.progress-bar {
  display: flex; gap: 8px;
  margin-bottom: 32px;
  justify-content: center;
}
.progress-seg {
  width: 60px; height: 4px;
  background: rgba(88,96,112,0.3);
  border-radius: 2px;
  transition: all 0.3s;
}
.progress-seg.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
.progress-seg.done { background: var(--success); }

/* Card */
.card {
  background: var(--panel);
  border: 1px solid rgba(0,245,212,0.2);
  border-radius: 8px;
  padding: 28px;
  margin-bottom: 24px;
  animation: fadeIn 0.5s ease;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(0,245,212,0.15);
  padding-bottom: 12px;
}
.card-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px; color: var(--accent);
}
.card-header .chapter-num {
  font-size: 12px; color: var(--text-dim);
  border: 1px solid var(--text-dim); padding: 2px 10px;
  border-radius: 3px;
}

/* Concept box */
.concept-box {
  background: rgba(0,245,212,0.05);
  border-left: 3px solid var(--accent);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 0 6px 6px 0;
}
.concept-box .label {
  font-size: 11px; color: var(--accent);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px;
}
.concept-box p { font-size: 16px; line-height: 1.7; }
.concept-box .formula {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px; color: var(--warning);
  margin: 8px 0;
}

/* Animation area */
.anim-area {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 8px;
  padding: 24px;
  margin: 20px 0;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

/* Example list */
.example-list { margin: 16px 0; }
.example-item {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(0,245,212,0.1);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.example-item:hover {
  border-color: rgba(0,245,212,0.3);
  background: rgba(0,245,212,0.03);
}
.example-item .q { font-size: 16px; margin-bottom: 8px; }
.example-item .a {
  font-size: 14px; color: var(--success);
  display: none;
  border-top: 1px dashed rgba(0,245,212,0.2);
  padding-top: 8px;
  margin-top: 8px;
}
.example-item.expanded .a { display: block; }
.example-item .a .step {
  color: var(--text-dim); font-size: 12px;
  margin-top: 4px;
}

/* Quiz */
.quiz-box {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 8px;
  padding: 20px;
  margin: 20px 0;
}
.quiz-box .quiz-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; color: var(--warning);
  margin-bottom: 16px;
}
.quiz-question { font-size: 16px; margin-bottom: 14px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-btn {
  background: rgba(0,187,249,0.08);
  border: 1px solid rgba(0,187,249,0.3);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit; font-size: 15px;
  text-align: left;
  transition: all 0.2s;
}
.quiz-btn:hover {
  background: rgba(0,187,249,0.15);
  border-color: var(--accent2);
}
.quiz-btn.correct {
  background: rgba(6,214,160,0.15);
  border-color: var(--success);
  color: var(--success);
  animation: flashGreen 0.5s ease;
}
.quiz-btn.wrong {
  background: rgba(239,71,111,0.15);
  border-color: var(--danger);
  color: var(--danger);
  animation: shake 0.4s ease;
}
.quiz-feedback { margin-top: 12px; font-size: 14px; min-height: 20px; }

/* Buttons */
.btn-row { display: flex; gap: 16px; justify-content: center; margin-top: 24px; }
.btn {
  background: rgba(0,245,212,0.1);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 14px 36px;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; letter-spacing: 2px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}
.btn:hover {
  background: rgba(0,245,212,0.2);
  box-shadow: 0 0 20px var(--accent);
}
.btn.btn-ghost {
  background: transparent;
  border-color: var(--text-dim);
  color: var(--text-dim);
}
.btn.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Hide/show */
.hidden { display: none !important; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes flashGreen {
  0% { box-shadow: 0 0 0 var(--success); }
  50% { box-shadow: 0 0 30px var(--success); }
  100% { box-shadow: 0 0 0 var(--success); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

/* Mobile */
@media (max-width: 600px) {
  .title-bar h1 { font-size: 22px; }
  #app { padding: 20px 12px; }
  .card { padding: 18px; }
}
@media (max-width: 480px) {
  .title-bar h1 { font-size: 18px; letter-spacing: 2px; }
  .title-bar .subtitle { font-size: 12px; }
  #app { padding: 16px 10px; }
  .card { padding: 14px; }
  .card-header h2 { font-size: 18px; }
  .concept-box { padding: 12px 14px; }
  .concept-box .formula { font-size: 16px; }
  .btn-row { flex-direction: column; gap: 10px; }
  .btn { padding: 12px 24px; font-size: 14px; width: 100%; text-align: center; }
  .quiz-btn { padding: 10px 14px; font-size: 14px; }
  .example-item { padding: 12px 14px; }
  .progress-seg { width: 40px; }
}
@media (max-width: 360px) {
  .title-bar h1 { font-size: 16px; }
  #app { padding: 12px 8px; }
  .card { padding: 12px; }
  .card-header h2 { font-size: 16px; }
  .concept-box { padding: 10px 12px; }
  .concept-box p { font-size: 14px; }
  .btn { padding: 10px 20px; font-size: 13px; }
  .quiz-options { gap: 8px; }
  .quiz-btn { padding: 8px 12px; font-size: 13px; }
  .example-item { padding: 10px 12px; }
  .example-item .q { font-size: 14px; }
  .anim-area { padding: 16px; min-height: 80px; }
}


<body>
<div id="hud-grid"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>

<div id="app">

<!-- ========== HEADER ========== -->
<div class="title-bar">
  <h1>📐 物理特工局</h1>
  <div class="subtitle">沪科版八年级第一学期 · 第二章 · 学习手册</div>
  <div style="margin-top:12px;">
    <a class="btn btn-warn" href="index.html" style="padding:10px 28px;font-size:14px;">🎮 去挑战模式</a>
  </div>
</div>

<div class="progress-bar" id="progress-bar">
  <div class="progress-seg active"></div>
  <div class="progress-seg"></div>
  <div class="progress-seg"></div>
  <div class="progress-seg"></div>
</div>

<div class="card" id="ch1">
    <div class="card-header">
      <h2>运动与静止的相对性</h2>
      <span class="chapter-num">第 2 / 5 节</span>
    </div>

    <div class="concept-box">
      <div class="label">核心概念</div>
      <p><strong>运动和静止的相对性</strong>：判断同一个物体的运动状态时，选取不同的参照物，结论一般不同。</p>
      <p>运动是<strong>绝对</strong>的（宇宙中一切物体都在运动），静止是<strong>相对</strong>的（相对于某个参照物）。</p>
    </div>

    <p style="margin: 16px 0; line-height: 1.8;">
      作为物理探索者，你必须掌握"换位思考"的能力。从不同的视角观察，同一个目标可能是运动的，也可能是静止的。
    </p>

    <table class="compare-table">
      <tr>
        <th>场景</th>
        <th>参照物</th>
        <th>判断结果</th>
      </tr>
      <tr>
        <td>坐在飞机里的乘客</td>
        <td>飞机座椅</td>
        <td>乘客是 <span style="color: var(--danger);">静止</span> 的</td>
      </tr>
      <tr>
        <td>坐在飞机里的乘客</td>
        <td>地面</td>
        <td>乘客是 <span style="color: var(--success);">运动</span> 的（速度900km/h）</td>
      </tr>
      <tr>
        <td>并排行驶的两辆车</td>
        <td>其中一辆车</td>
        <td>另一辆车可能是 <span style="color: var(--warn);">静止</span> 的（如果速度相同）</td>
      </tr>
      <tr>
        <td>并排行驶的两辆车</td>
        <td>地面</td>
        <td>两辆车都是 <span style="color: var(--success);">运动</span> 的</td>
      </tr>
      <tr>
        <td>同步卫星</td>
        <td>地球表面</td>
        <td>卫星是 <span style="color: var(--danger);">静止</span> 的（相对地面不动）</td>
      </tr>
      <tr>
        <td>同步卫星</td>
        <td>地心</td>
        <td>卫星是 <span style="color: var(--success);">运动</span> 的（绕地球转动）</td>
      </tr>
    </table>

    <div style="background: rgba(255,209,102,0.05); border-left: 3px solid var(--warn); padding: 14px 18px; border-radius: 0 8px 8px 0; margin: 16px 0; font-size: 13px; line-height: 1.8;">
      <strong style="color: var(--warn);">⚠️ 探索者注意</strong><br>
      不能选择<strong>被研究物体本身</strong>作为参照物！如果以自己为参照物，你永远是静止的，这没有意义。
    </div>
  
<h3>✏️ 例题 1</h3>
<div class="example-item" onclick="this.classList.toggle('expanded')">
      <div class="q">📌 例题 1：小明骑自行车上学，前 10 分钟以 5 m/s 匀速行驶，后 5 分钟以 4 m/s 匀速行驶，求全程平均速度。</div>
      <div class="a">
        <strong>解：</strong>前段路程 s₁ = 5 × 600 = 3000 m<br>
        后段路程 s₂ = 4 × 300 = 1200 m<br>
        总路程 s = 3000 + 1200 = 4200 m<br>
        总时间 t = 600 + 300 = 900 s<br>
        平均速度 v = s/t = 4200/900 = <strong style="color:var(--success)">4.67 m/s ✅</strong>
        <div class="step">平均速度 = 总路程 ÷ 总时间，不是速度的平均值</div>
      </div>
    <h3>✏️ 例题 2</h3>
<div class="example-item" onclick="this.classList.toggle('expanded')">
      <div class="q">📌 例题 2：一辆汽车从静止开始加速，5 秒后速度达到 20 m/s，求汽车的平均加速度。</div>
      <div class="a">
        <strong>解：</strong>初速度 v₀ = 0，末速度 v = 20 m/s，时间 t = 5 s<br>
        加速度 a = (v - v₀)/t = (20 - 0)/5 = <strong style="color:var(--success)">4 m/s² ✅</strong>
        <div class="step">加速度表示速度变化的快慢，单位是 m/s²</div>
      </div>
    <h3>✏️ 例题 3</h3>
<div class="example-item" onclick="this.classList.toggle('expanded')">
      <div class="q">📌 例题 3：甲乙两地相距 120 km，汽车从甲地开往乙地，前半程速度为 60 km/h，后半程速度为 40 km/h，求全程平均速度。</div>
      <div class="a">
        <strong>解：</strong>前半程时间 t₁ = 60/60 = 1 h<br>
        后半程时间 t₂ = 60/40 = 1.5 h<br>
        总时间 t = 1 + 1.5 = 2.5 h<br>
        平均速度 v = 120/2.5 = <strong style="color:var(--success)">48 km/h ✅</strong>
        <div class="step">注意：不是 (60+40)/2 = 50，平均速度要用总路程÷总时间</div>
      </div>
    </div>

    <div class="quiz-box" id="ch1-quiz">
      <div class="quiz-title">🎯 随堂测验 — 参照物</div>
      <div class="quiz-question"><strong>Q1.</strong> 坐在行驶的公交车里的乘客，相对于地面是？</div>
      <div class="quiz-options">
        <button class="quiz-btn" onclick="checkQuiz(this, true, '正确！乘客随公交车一起运动，相对于地面位置在变化。')">A. 运动的</button>
        <button class="quiz-btn" onclick="checkQuiz(this, false, '不对。公交车在行驶，乘客相对于地面位置在改变。')">B. 静止的</button>
        <button class="quiz-btn" onclick="checkQuiz(this, false, '不对。相对于地面，乘客的位置在变化，是运动的。')">C. 无法判断</button>
      </div>
      <div class="quiz-feedback" id="ch1-fb1"></div>

      <div class="quiz-question" style="margin-top:16px;"><strong>Q2.</strong> 两个并肩行走的同学，以其中一人为参照物，另一人是？</div>
      <div class="quiz-options">
        <button class="quiz-btn" onclick="checkQuiz(this, false, '不对。两人速度相同，相对位置不变，是静止的。')">A. 运动的</button>
        <button class="quiz-btn" onclick="checkQuiz(this, true, '正确！两人并肩走，速度相同，以对方为参照物位置不变。')">B. 静止的</button>
        <button class="quiz-btn" onclick="checkQuiz(this, false, '不对。只要速度相同，相对位置就不变。')">C. 有时运动有时静止</button>
      </div>
      <div class="quiz-feedback" id="ch1-fb2"></div>

      <div class="quiz-question" style="margin-top:16px;"><strong>Q3.</strong> "月亮在云中穿行"选择的参照物是？</div>
      <div class="quiz-options">
        <button class="quiz-btn" onclick="checkQuiz(this, false, '不对。不能选择被研究物体本身作为参照物。')">A. 月亮</button>
        <button class="quiz-btn" onclick="checkQuiz(this, true, '正确！月亮相对于云的位置在变化，所以参照物是云。')">B. 云</button>
        <button class="quiz-btn" onclick="checkQuiz(this, false, '不对。虽然地面也可以，但"穿行"描述的是月亮相对于云的动态。')">C. 地面</button>
      </div>
      <div class="quiz-feedback" id="ch1-fb3"></div>
    </div>
</div>

<div class="card hidden" id="ch2">
    <div class="card-header">
      <h2>速度 — 运动快慢的量度</h2>
      <span class="chapter-num">第 3 / 5 节</span>
    </div>

    <div class="concept-box">
      <div class="label">核心概念</div>
      <p><strong>速度</strong>：表示物体运动快慢的物理量，等于路程与时间的比值。</p>
      <p><strong>公式</strong>：v = s / t （速度 = 路程 ÷ 时间）</p>
      <p><strong>单位</strong>：米/秒（m/s）或 千米/时（km/h）；换算：1 m/s = 3.6 km/h</p>
    </div>

    <div class="formula-box">
      <div class="formula">v = s / t</div>
      <div class="explain">v = 速度（velocity）· s = 路程（distance）· t = 时间（time）</div>
    </div>

    <div class="speed-calc">
      <div style="font-size: 14px; color: var(--accent); margin-bottom: 12px;">🧮 速度计算器</div>
      <div class="speed-inputs">
        <div class="speed-input-group">
          <label>路程 s =</label>
          <input type="number" id="speed-s" value="100" oninput="calcSpeed()">
          <span style="font-size: 12px; color: var(--text-dim);">m</span>
        </div>
        <div class="speed-input-group">
          <label>时间 t =</label>
          <input type="number" id="speed-t" value="10" oninput="calcSpeed()">
          <span style="font-size: 12px; color: var(--text-dim);">s</span>
        </div>
      </div>
      <div class="speed-result" id="speed-result">v = 10.00 m/s = 36.0 km/h</div>
    </div>

    <div style="margin: 16px 0; font-size: 13px; line-height: 1.8;">
      <strong style="color: var(--accent);">常见速度参考：</strong><br>
      🚶 人步行：约 1.1 m/s（4 km/h）<br>
      🚴 自行车：约 5 m/s（18 km/h）<br>
      🚗 市区汽车：约 15 m/s（54 km/h）<br>
      🚄 高铁：约 80 m/s（288 km/h）<br>
      ✈️ 民航客机：约 250 m/s（900 km/h）<br>
      🚀 声音在空气中：约 340 m/s<br>
      ⚡ 光在真空中：3 × 10⁸ m/s
    </div>

    <div style="background: rgba(0,0,0,0.2); border-radius: 8px; padding: 14px 16px; margin: 12px 0; font-size: 13px; line-height: 1.8;">
      <strong style="color: var(--accent);">例题</strong>：小明骑车上学，家到学校距离 3.6 km，用时 12 分钟。求骑车的速度。<br><br>
      <strong>解</strong>：s = 3.6 km = 3600 m，t = 12 min = 720 s<br>
      v = s / t = 3600 / 720 = <strong style="color: var(--accent);">5 m/s</strong> = 18 km/h
    </div>
  
<h3>✏️ 例题 1</h3>
<div class="example-item" onclick="this.classList.toggle('expanded')">
      <div class="q">📌 例题 1：一列火车长 200 m，以 20 m/s 的速度通过一座长 800 m 的大桥，求火车完全通过大桥所需时间。</div>
      <div class="a">

<script>
let currentCh = 1;
const totalCh = 4;

function updateProgress() {
  const segs = document.querySelectorAll('.progress-seg');
  segs.forEach((seg, i) => {
    seg.className = 'progress-seg';
    if (i < currentCh - 1) seg.classList.add('done');
    if (i === currentCh - 1) seg.classList.add('active');
  });
}

function goTo(n) {
  document.getElementById('ch' + currentCh).classList.add('hidden');
  document.getElementById('ch' + n).classList.remove('hidden');
  currentCh = n;
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkQuiz(btn, isCorrect, msg) {
  const opts = btn.closest('.quiz-options');
  const fb = opts.nextElementSibling;
  const allBtns = opts.querySelectorAll('.quiz-btn');
  
  allBtns.forEach(b => b.style.pointerEvents = 'none');
  
  if (isCorrect) {
    btn.classList.add('correct');
    fb.innerHTML = '<span style="color:var(--success)">✅ ' + msg + '</span>';
  } else {
    btn.classList.add('wrong');
    fb.innerHTML = '<span style="color:var(--danger)">❌ ' + msg + '</span>';
  }
}

updateProgress();


/* === Chapter JS === */
(function(){
  const c = document.getElementById('motionCanvas'); if(!c) return;
  const ctx = c.getContext('2d');
  const sInput = document.getElementById('motionSpeed');
  const sVal = document.getElementById('motionSpeedVal');
  let x = 0, t = 0;
  function draw() {
    let v = sInput ? parseInt(sInput.value) : 50;
    if(sVal) sVal.textContent = v + ' m/s';
    t++;
    x = (v * t / 10) % 460;
    ctx.clearRect(0,0,500,150);
    ctx.fillStyle = 'var(--panel)'; ctx.fillRect(0,100,500,40);
    ctx.fillStyle = 'var(--accent)'; ctx.fillRect(x, 80, 40, 30);
    ctx.fillStyle = 'var(--text)'; ctx.font = '12px monospace';
    ctx.fillText('s=' + (v*t/10).toFixed(0) + 'm', x, 70);
    requestAnimationFrame(draw);
  }
  draw();
})();

(function(){
  const c = document.getElementById('relativeCanvas'); if(!c) return;
  const ctx = c.getContext('2d');
  let ref = 'ground';
  window.setRef = function(r) { ref = r; };
  let t = 0;
  function draw() {
    t++;
    ctx.clearRect(0,0,500,200);
    ctx.fillStyle = 'var(--panel)'; ctx.fillRect(0,150,500,40);
    let carX = (t * 2) % 440;
    let ballX = carX + 50 + Math.sin(t/20) * 30;
    if(ref === 'car') {
      ctx.fillStyle = 'var(--accent)'; ctx.fillRect(230, 100, 40, 30);
      ctx.fillStyle = 'var(--danger)'; ctx.beginPath(); ctx.arc(250 + Math.sin(t/20)*30, 90, 10, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = 'var(--accent)'; ctx.fillRect(carX, 120, 40, 30);
      ctx.fillStyle = 'var(--danger)'; ctx.beginPath(); ctx.arc(ballX, 90, 10, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();


</script>
