<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特工装备室 · 第十五章 电磁波及其应用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080f;
    --panel: #11111f;
    --panel2: #1a1a2e;
    --accent: #00f5d4;
    --accent2: #00bbf9;
    --danger: #ef476f;
    --warn: #ffd166;
    --text: #c0c8d8;
    --text2: #8b8b9a;
    --grid: rgba(0,245,212,0.06);
    --success: #06d6a0;
    --glass: rgba(17,17,31,0.92);
  }

  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  body {
    font-family: 'Share Tech Mono', 'Courier New', 'PingFang SC', 'Microsoft YaHei', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HUD grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 245, 212, 0.03) 2px,
      rgba(0, 245, 212, 0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Corner decorations */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    pointer-events: none;
    z-index: 9998;
    opacity: 0.6;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* Particles */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  .particle {
    position: absolute; width: 3px; height: 3px;
    background: var(--accent); border-radius: 50%;
    opacity: .4; animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: .4; }
    90% { opacity: .4; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Screen system */
  .screen {
    position: relative; z-index: 1;
    display: none;
    min-height: 100vh;
    padding: 16px;
  }
  .screen.active { display: flex; flex-direction: column; }

  /* HUD Header */
  .hud-header {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(0,245,212,0.25);
    padding: 12px 16px;
    background: var(--glass);
    backdrop-filter: blur(8px);
    border-radius: 8px;
    margin-bottom: 12px;
    position: relative;
  }
  .hud-header::after {
    content: '';
    position: absolute; bottom:-1px; left:0; width:120px; height:2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .hud-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; color: var(--accent); font-family: 'Orbitron', sans-serif; }
  .hud-score { font-size: 1rem; color: var(--warn); font-family: 'Share Tech Mono', 'Courier New', monospace; }
  .hud-score span { color: var(--accent); font-weight: bold; }

  .stage-badge {
    display: inline-block;
    padding: 4px 12px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
  }

  /* Intro screen */
  #intro-screen {
    align-items: center; justify-content: center; text-align: center;
  }
  .intro-box {
    max-width: 560px;
    padding: 40px 32px;
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.2);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,245,212,0.08);
    position: relative;
  }
  .intro-box::before {
    content: 'TOP SECRET';
    position: absolute; top:12px; right:16px;
    font-size: 0.65rem; color: var(--danger);
    border: 1px solid var(--danger);
    padding: 2px 6px;
    letter-spacing: 2px;
    transform: rotate(3deg);
    opacity: 0.8;
    font-family: 'Orbitron', sans-serif;
  }
  .intro-icon { font-size: 3rem; margin-bottom: 16px; }
  .intro-title { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; }
  .intro-sub { font-size: 1rem; color: var(--text2); margin-bottom: 24px; }
  .intro-text { font-size: 0.9rem; color: var(--text); line-height: 1.8; margin-bottom: 32px; text-align: left; }
  .btn {
    display: inline-block;
    padding: 14px 36px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,245,212,0.4); }
  .btn:active { transform: translateY(0); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn-ghost:hover { background: rgba(0,245,212,0.1); }

  /* Main content area */
  .main-area {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 80px;
    position: relative;
  }
  .main-area::-webkit-scrollbar { width: 4px; }
  .main-area::-webkit-scrollbar-thumb { background: rgba(0,245,212,0.3); border-radius: 2px; }

  /* Stage screen */
  .stage-screen { display: none; flex-direction: column; gap: 14px; }
  .stage-screen.active { display: flex; }

  .stage-header {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 8px;
    border-bottom: 1px dashed rgba(0,245,212,0.35);
  }
  .stage-num {
    font-size: 24px; font-weight: bold; color: var(--accent);
    text-shadow: 0 0 10px rgba(0,245,212,0.4);
    font-family: 'Orbitron', sans-serif;
  }
  .stage-name { font-size: 15px; color: var(--accent2); }
  .stage-desc { font-size: 11px; color: var(--text2); margin-left: auto; }

  .progress-wrap {
    width: 100%; height: 4px;
    background: rgba(0,245,212,0.15); border-radius: 2px;
    margin-bottom: 4px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px; transition: width .3s ease;
    box-shadow: 0 0 6px rgba(0,245,212,0.3);
  }

  /* Question card */
  .q-card {
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.15);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .q-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(to bottom, var(--accent2), var(--accent));
    border-radius: 10px 0 0 10px;
  }
  .q-card::after {
    content: '';
    position: absolute; top: 10px; right: 12px;
    font-size: 9px; color: rgba(0,245,212,0.25);
    transform: rotate(-12deg);
    border: 1px solid rgba(0,245,212,0.2);
    padding: 2px 6px; border-radius: 2px;
    letter-spacing: 1px;
  }
  .q-number {
    font-size: 0.75rem; color: var(--accent2);
    margin-bottom: 10px; opacity: 0.8;
    font-family: 'Orbitron', sans-serif;
  }
  .q-text {
    font-size: 15px; line-height: 1.7; color: var(--text);
    margin-bottom: 16px; white-space: pre-wrap;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: var(--panel2);
    border: 1px solid rgba(0,245,212,0.2);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all .2s;
    text-align: left;
    position: relative;
    overflow: hidden;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .opt-btn:hover {
    background: rgba(0,245,212,0.08);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px rgba(0,245,212,0.1);
  }
  .opt-btn.correct {
    background: rgba(6,214,160,0.12);
    border-color: var(--success);
    color: var(--success);
  }
  .opt-btn.wrong {
    background: rgba(239,71,111,0.12);
    border-color: var(--danger);
    color: var(--danger);
  }
  .opt-btn.disabled { pointer-events: none; opacity: .7; }
  .opt-label {
    display: inline-block;
    width: 24px; height: 24px;
    border: 1px solid rgba(0,245,212,0.4);
    border-radius: 4px;
    text-align: center;
    line-height: 22px;
    font-size: 12px;
    margin-right: 10px;
    vertical-align: middle;
    font-family: 'Orbitron', sans-serif;
  }
  .opt-btn:hover .opt-label { border-color: var(--accent); color: var(--accent); }
  .opt-btn.correct .opt-label { border-color: var(--success); color: var(--success); }
  .opt-btn.wrong .opt-label { border-color: var(--danger); color: var(--danger); }

  /* Sort */
  .sort-list {
    display: flex; flex-direction: column; gap: 6px;
    margin: 12px 0;
  }
  .sort-item {
    padding: 10px 14px;
    background: var(--panel2);
    border: 1px solid rgba(0,245,212,0.2);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center;
    gap: 10px;
    transition: all .2s;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .sort-item:hover { background: rgba(0,245,212,0.08); }
  .sort-item.selected {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,245,212,0.2);
  }
  .sort-item .sort-num {
    width: 22px; height: 22px;
    border: 1px solid rgba(0,245,212,0.4);
    border-radius: 4px;
    text-align: center; line-height: 20px;
    font-size: 11px; color: var(--accent);
    font-family: 'Orbitron', sans-serif;
  }

  /* Match */
  .match-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 10px 0;
  }
  .match-col-header {
    font-size: 11px; color: var(--accent);
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
  }
  .match-col {
    display: flex; flex-direction: column; gap: 6px;
  }
  .match-item {
    padding: 10px 14px;
    background: var(--panel2);
    border: 1px solid rgba(0,245,212,0.2);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .match-item:hover { border-color: var(--accent); }
  .match-item.selected { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,245,212,0.15); }

  /* Verify button */
  .verify-btn {
    margin-top: 12px;
    padding: 10px 24px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
    transition: all .2s;
  }
  .verify-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,245,212,0.3); }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
    animation: slideDown .3s ease;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .feedback.show { display: block; }
  .feedback.ok {
    background: rgba(6,214,160,0.1);
    border: 1px solid rgba(6,214,160,0.3);
    color: var(--success);
  }
  .feedback.err {
    background: rgba(239,71,111,0.1);
    border: 1px solid rgba(239,71,111,0.3);
    color: var(--danger);
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* Explain */
  .explain {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(0,245,212,0.04);
    border-left: 2px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    display: none;
  }
  .explain.show { display: block; }

  /* Shake */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }

  /* Glow flash */
  @keyframes flashGreen {
    0% { box-shadow: 0 0 0 rgba(6,214,160,0); }
    50% { box-shadow: 0 0 30px rgba(6,214,160,0.4); border-color: var(--success); }
    100% { box-shadow: 0 0 0 rgba(6,214,160,0); }
  }
  .flash-ok { animation: flashGreen 0.6s ease; }

  /* Timer */
  .timer-bar {
    position: fixed; top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    z-index: 100;
    transition: width 1s linear;
  }
  .timer-text {
    position: fixed; top: 6px; right: 16px;
    z-index: 100;
    font-size: 12px; color: var(--accent);
    background: var(--glass);
    padding: 2px 8px; border-radius: 3px;
    border: 1px solid rgba(0,245,212,0.3);
    font-family: 'Orbitron', sans-serif;
  }

  /* Combo pop */
  .combo-pop {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 28px; font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,245,212,0.8);
    z-index: 150; pointer-events: none;
    animation: comboAnim .8s ease forwards;
    display: none;
    font-family: 'Orbitron', sans-serif;
  }
  @keyframes comboAnim {
    0% { opacity:1; transform:translate(-50%,-50%) scale(.5); }
    50% { transform:translate(-50%,-50%) scale(1.2); }
    100% { opacity:0; transform:translate(-50%,-80%) scale(1); }
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--glass);
    border-top: 1px solid rgba(0,245,212,0.2);
    display: flex; align-items: center;
    justify-content: space-around;
    z-index: 50;
    backdrop-filter: blur(8px);
  }
  .nav-btn {
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 10px;
    position: relative;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active::after {
    content: '';
    position: absolute; bottom: -4px;
    width: 20px; height: 2px;
    background: var(--accent);
    border-radius: 1px;
    box-shadow: 0 0 6px var(--accent);
  }
  .nav-btn:hover { color: var(--accent2); }
  .nav-icon { font-size: 18px; }

  /* Result screen */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    text-align: center;
    animation: fadeIn .5s ease;
  }
  .result-screen.active { display: flex; }
  .result-title {
    font-size: 22px; font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0,245,212,0.5);
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 8px;
  }
  .result-grade {
    font-size: 56px; font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,245,212,0.6);
    font-family: 'Orbitron', sans-serif;
    margin: 8px 0;
  }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%; max-width: 320px;
  }
  .stat-box {
    padding: 12px;
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.15);
    border-radius: 6px;
  }
  .stat-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
  .stat-val { font-size: 18px; color: var(--accent); font-weight: bold; font-family: 'Orbitron', sans-serif; }
  .badge-area {
    margin-top: 12px;
    padding: 20px;
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.15);
    border-radius: 8px;
    max-width: 320px; width: 100%;
    position: relative;
  }
  .badge-area::before {
    content: 'CLASSIFIED';
    position: absolute; top: 8px; right: 10px;
    font-size: 0.6rem; color: var(--danger);
    border: 1px solid var(--danger);
    padding: 1px 4px;
    letter-spacing: 1px;
    transform: rotate(3deg);
    opacity: 0.5;
    font-family: 'Orbitron', sans-serif;
  }
  .badge-icon { font-size: 40px; margin-bottom: 8px; }
  .badge-name { font-size: 15px; color: var(--accent); font-weight: bold; margin-bottom: 4px; font-family: 'Orbitron', sans-serif; }
  .badge-desc { font-size: 12px; color: var(--text2); }
  .result-btn {
    padding: 12px 36px;
    background: var(--accent);
    border: none;
    color: var(--bg);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-top: 8px;
    transition: all .2s;
    font-family: 'Orbitron', sans-serif;
  }
  .result-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,245,212,0.4); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--panel);
    border: 1px solid rgba(0,245,212,0.3);
    border-radius: 10px;
    padding: 24px;
    max-width: 320px; width: 85%;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,245,212,0.1);
  }
  .modal-title {
    font-size: 16px; color: var(--accent);
    margin-bottom: 10px; font-weight: bold;
    font-family: 'Orbitron', sans-serif;
  }
  .modal-text { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 16px; }
  .modal-btn {
    padding: 8px 24px;
    background: var(--accent);
    border: none;
    color: var(--bg);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    font-family: 'Orbitron', sans-serif;
  }

  /* HP */
  .hp-row { display: flex; gap: 3px; align-items: center; }
  .hp-heart {
    color: var(--danger); font-size: 14px;
    text-shadow: 0 0 6px rgba(239,71,111,.5);
    transition: all .3s;
  }
  .hp-heart.lost {
    color: #3a1a22; text-shadow: none;
    opacity: 0.4;
  }
  .combo-badge {
    background: rgba(0,245,212,.1);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid rgba(0,245,212,.2);
    font-size: 11px;
    min-width: 56px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
  }
  .score-badge {
    background: rgba(0,187,249,.1);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid rgba(0,187,249,.2);
    font-size: 11px;
    min-width: 60px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
  }

  /* Match result */
  .match-result { margin-top: 8px; font-size: 13px; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* Responsive */
  @media (max-width: 480px) {
    .intro-title { font-size: 1.4rem; }
    .btn { padding: 12px 28px; }
    .result-grade { font-size: 42px; }
    .q-card { padding: 16px; }
    .q-text { font-size: 14px; }
  }
</style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner-tl"></div>
<div class="corner-tr"></div>

const game = {
  currentStage: 0,
  currentQ: 0,
  score: 0,
  hp: 3,
  combo: 0,
  maxCombo: 0,
  correctCount: 0,
  totalQ: 29,
  startTime: 0,
  stageProgress: [0,0,0,0,0],
  stageCompleted: [false,false,false,false,false],
  sortState: null,
  matchState: null,
  timerId: null,
  timeLeft: 0,

  start() {
    this.currentStage = 0;
    this.currentQ = 0;
    this.score = 0;
    this.hp = 3;
    this.combo = 0;
    this.maxCombo = 0;
    this.correctCount = 0;
    this.stageProgress = [0,0,0,0,0];
    this.stageCompleted = [false,false,false,false,false];
    this.startTime = Date.now();
    document.getElementById('intro-screen').classList.remove('active');
    document.getElementById('header').style.display = 'flex';
    document.getElementById('bottomNav').style.display = 'flex';
    this.updateHeader();
    this.renderStage(1);
  },

  updateHeader() {
    const hpRow = document.getElementById('hpRow');
    hpRow.innerHTML = '';
    for(let i=0;i<3;i++){
      const h = document.createElement('span');
      h.className = 'hp-heart' + (i>=this.hp?' lost':'');
      h.textContent = '❤️';
      hpRow.appendChild(h);
    }
    document.getElementById('comboBadge').textContent = '连击x'+this.combo;
    document.getElementById('scoreBadge').textContent = this.score+'分';
  },

  renderStage(n) {
    document.querySelectorAll('.stage-screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    const sid = 'stage'+n;
    const screen = document.getElementById(sid);
    screen.classList.add('active');
    document.querySelector('.nav-btn[data-stage="'+n+'"]').classList.add('active');
    this.currentStage = n;
    this.currentQ = this.stageProgress[n-1];
    const stage = STAGES[n-1];

    // Update header badge
    document.getElementById('stageBadge').textContent = 'STAGE 0'+n;

    // Progress
    const pct = (this.currentQ / stage.questions.length) * 100;

    let html = '<div class="stage-header">';
    html += '<span class="stage-num">0'+n+'</span>';
    html += '<span class="stage-name">'+stage.name+'</span>';
    html += '<span class="stage-desc">'+this.currentQ+'/'+stage.questions.length+'</span>';
    html += '</div>';
    html += '<div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>';

    const q = stage.questions[this.currentQ];
    html += this.renderQuestion(q, n, this.currentQ);

    screen.innerHTML = html;

    if(n===5 && this.currentQ===0) this.startTimer(60);
    this.bindEvents(q, n, this.currentQ);
  },

  renderQuestion(q, stageIdx, qIdx) {
    let html = '<div class="q-card" id="qCard">';
    html += '<div class="q-number">题目 '+(qIdx+1)+' / '+STAGES[stageIdx-1].questions.length+' · '+stageIdx+'-'+String.fromCharCode(65+qIdx)+'</div>';
    html += '<div class="q-text">'+q.text+'</div>';

    if(q.type==='choice'){
      html += '<div class="options">';
      q.options.forEach((opt,i)=>{
        html += '<button class="opt-btn" data-idx="'+i+'" onclick="game.answer('+stageIdx+','+qIdx+','+i+')">';
        html += '<span class="opt-label">'+String.fromCharCode(65+i)+'</span>'+opt;
        html += '</button>';
      });
      html += '</div>';
    }
    else if(q.type==='sort'){
      html += '<div class="sort-list" id="sortList">';
      const shuffled = [...q.items].sort(()=>Math.random()-.5);
      shuffled.forEach((item,i)=>{
        html += '<div class="sort-item" data-val="'+item+'" onclick="game.sortClick(this)">';
        html += '<span class="sort-num">'+(i+1)+'</span>'+item;
        html += '</div>';
      });
      html += '</div>';
      html += '<button class="verify-btn" onclick="game.sortCheck('+stageIdx+','+qIdx+')">提交排序</button>';
    }
    else if(q.type==='match'){
      html += '<div class="match-grid">';
      html += '<div class="match-col-header">应用</div>';
      html += '<div class="match-col-header">技术原理</div>';
      html += '</div>';
      html += '<div class="match-grid">';
      const lefts = q.pairs.map((p,i)=>({text:p.left,idx:i}));
      const rights = q.pairs.map((p,i)=>({text:p.right,idx:i})).sort(()=>Math.random()-.5);
      html += '<div class="match-col" id="matchLeft">';
      lefts.forEach((item)=>{
        html += '<div class="match-item" data-lidx="'+item.idx+'" onclick="game.matchClick(this,\'left\')">'+item.text+'</div>';
      });
      html += '</div>';
      html += '<div class="match-col" id="matchRight">';
      rights.forEach((item)=>{
        html += '<div class="match-item" data-ridx="'+item.idx+'" onclick="game.matchClick(this,\'right\')">'+item.text+'</div>';
      });
      html += '</div>';
      html += '</div>';
      html += '<div class="match-result" id="matchResult"></div>';
      html += '<button class="verify-btn" onclick="game.matchCheck('+stageIdx+','+qIdx+')">提交匹配</button>';
    }

    html += '<div class="feedback" id="fdb"></div>';
    html += '<div class="explain" id="exp"></div>';
    html += '</div>';
    return html;
  },

  bindEvents(q, stageIdx, qIdx) {
    // Events are inline in HTML
  },

  answer(stageIdx, qIdx, choice) {
    const q = STAGES[stageIdx-1].questions[qIdx];
    const btns = document.querySelectorAll('#qCard .opt-btn');
    btns.forEach(b=>b.classList.add('disabled'));
    const fdb = document.getElementById('fdb');
    const exp = document.getElementById('exp');
    const card = document.getElementById('qCard');

    if(choice === q.answer){
      btns[choice].classList.add('correct');
      fdb.textContent = '✓ 正确！';
      fdb.className = 'feedback ok show';
      this.combo++;
      this.correctCount++;
      if(this.combo>this.maxCombo) this.maxCombo=this.combo;
      const pts = 10 + Math.min(this.combo*2, 20);
      this.score += pts;
      if(this.combo>=3) this.showComboPop(this.combo);
      card.classList.add('flash-ok');
    } else {
      btns[choice].classList.add('wrong');
      btns[q.answer].classList.add('correct');
      fdb.textContent = '✗ 错误，正确答案是 '+String.fromCharCode(65+q.answer);
      fdb.className = 'feedback err show';
      this.combo = 0;
      this.hp--;
      card.classList.add('shake');
      if(this.hp<=0){
        this.updateHeader();
        setTimeout(()=>this.gameOver(), 800);
        return;
      }
    }

    exp.textContent = '💡 '+q.explain;
    exp.className = 'explain show';
    this.updateHeader();

    setTimeout(()=>{
      card.classList.remove('shake','flash-ok');
      this.nextQ(stageIdx);
    }, 1800);
  },

  sortClick(el) {
    const list = document.getElementById('sortList');
    if(!this.sortState){
      this.sortState = el;
      el.classList.add('selected');
    } else {
      if(this.sortState !== el){
        const a = this.sortState, b = el;
        const nextA = a.nextSibling, nextB = b.nextSibling;
        if(nextA === b) list.insertBefore(b, a);
        else if(nextB === a) list.insertBefore(a, b);
        else {
          list.insertBefore(b, nextA);
          list.insertBefore(a, nextB);
        }
      }
      this.sortState.classList.remove('selected');
      this.sortState = null;
    }
    // Re-number
    list.querySelectorAll('.sort-item').forEach((item,i)=>{
      item.querySelector('.sort-num').textContent = i+1;
    });
  },

  sortCheck(stageIdx, qIdx) {
    const q = STAGES[stageIdx-1].questions[qIdx];
    const list = document.getElementById('sortList');
    const items = Array.from(list.querySelectorAll('.sort-item')).map(el=>el.dataset.val);
    const fdb = document.getElementById('fdb');
    const exp = document.getElementById('exp');
    const card = document.getElementById('qCard');

    let correct = true;
    for(let i=0;i<items.length;i++){
      if(items[i]!==q.correct[i]) correct=false;
    }

    if(correct){
      fdb.textContent = '✓ 排序正确！';
      fdb.className = 'feedback ok show';
      this.combo++;
      this.correctCount++;
      if(this.combo>this.maxCombo) this.maxCombo=this.combo;
      this.score += 10 + Math.min(this.combo*2, 20);
      if(this.combo>=3) this.showComboPop(this.combo);
      card.classList.add('flash-ok');
    } else {
      fdb.textContent = '✗ 排序有误';
      fdb.className = 'feedback err show';
      this.combo = 0;
      this.hp--;
      card.classList.add('shake');
      if(this.hp<=0){this.updateHeader();setTimeout(()=>this.gameOver(),800);return;}
    }

    exp.textContent = '💡 '+q.explain;
    exp.className = 'explain show';
    this.updateHeader();
    setTimeout(()=>{
      card.classList.remove('shake','flash-ok');
      this.nextQ(stageIdx);
    }, 2000);
  },

  matchClick(el, side) {
    const container = side==='left'?document.getElementById('matchLeft'):document.getElementById('matchRight');
    const all = container.querySelectorAll('.match-item');
    all.forEach(e=>e.classList.remove('selected'));

    if(!this.matchState){
      this.matchState = {el, side};
      el.classList.add('selected');
    } else {
      if(this.matchState.side !== side){
        const temp = el.textContent;
        const tempIdx = el.dataset[side==='left'?'lidx':'ridx'];
        el.textContent = this.matchState.el.textContent;
        el.dataset[side==='left'?'lidx':'ridx'] = this.matchState.el.dataset[this.matchState.side==='left'?'lidx':'ridx'];
        this.matchState.el.textContent = temp;
        this.matchState.el.dataset[this.matchState.side==='left'?'lidx':'ridx'] = tempIdx;
      }
      this.matchState.el.classList.remove('selected');
      this.matchState = null;
    }
  },

  matchCheck(stageIdx, qIdx) {
    const q = STAGES[stageIdx-1].questions[qIdx];
    const lefts = Array.from(document.getElementById('matchLeft').querySelectorAll('.match-item'));
    const rights = Array.from(document.getElementById('matchRight').querySelectorAll('.match-item'));
    const fdb = document.getElementById('fdb');
    const exp = document.getElementById('exp');
    const card = document.getElementById('qCard');

    let correctCount = 0;
    lefts.forEach((l,i)=>{
      const li = parseInt(l.dataset.lidx);
      const ri = parseInt(rights[i].dataset.ridx);
      if(li===ri) correctCount++;
    });

    if(correctCount === q.pairs.length){
      fdb.textContent = '✓ 全部匹配正确！';
      fdb.className = 'feedback ok show';
      this.combo++;
      this.correctCount++;
      if(this.combo>this.maxCombo) this.maxCombo=this.combo;
      this.score += 10 + Math.min(this.combo*2, 20);
      if(this.combo>=3) this.showComboPop(this.combo);
      card.classList.add('flash-ok');
    } else {
      fdb.textContent = '✗ 正确 '+correctCount+'/'+q.pairs.length;
      fdb.className = 'feedback err show';
      this.combo = 0;
      this.hp--;
      card.classList.add('shake');
      if(this.hp<=0){this.updateHeader();setTimeout(()=>this.gameOver(),800);return;}
    }

    exp.textContent = '💡 '+q.explain;
    exp.className = 'explain show';
    this.updateHeader();
    setTimeout(()=>{
      card.classList.remove('shake','flash-ok');
      this.nextQ(stageIdx);
    }, 2000);
  },

  showComboPop(n) {
    const pop = document.getElementById('comboPop');
    const msgs = ['','','🔥 x'+n+' 连击！','⚡ x'+n+' 连击！','💥 x'+n+' 连击！','🌟 x'+n+' 连击！'];
    pop.textContent = msgs[Math.min(n,5)] || '🔥 x'+n+' 连击！';
    pop.style.display = 'block';
    pop.style.animation = 'none';
    pop.offsetHeight;
    pop.style.animation = 'comboAnim .8s ease forwards';
    setTimeout(()=>pop.style.display='none',800);
  },

  nextQ(stageIdx) {
    const stage = STAGES[stageIdx-1];
    this.stageProgress[stageIdx-1]++;
    this.currentQ = this.stageProgress[stageIdx-1];

    if(this.currentQ >= stage.questions.length){
      this.stageCompleted[stageIdx-1] = true;
      if(stageIdx===5) this.stopTimer();

      let next = 0;
      for(let i=0;i<5;i++){
        if(!this.stageCompleted[i]){next=i+1;break;}
      }
      if(next===0){
        this.showResult();
      } else {
        this.renderStage(next);
      }
    } else {
      this.renderStage(stageIdx);
    }
  },

  navTo(n) {
    if(this.stageCompleted[n-1] || this.stageProgress[n-1]>0 || n===this.currentStage){
      this.renderStage(n);
    } else if(n<this.currentStage || (n>1 && this.stageProgress[n-2]>=STAGES[n-2].questions.length)){
      this.renderStage(n);
    } else {
      this.showModal('提示','请先完成前面的任务阶段！');
    }
  },

  startTimer(seconds) {
    this.timeLeft = seconds;
    const bar = document.getElementById('timerBar');
    const txt = document.getElementById('timerText');
    bar.style.display = 'block'; txt.style.display = 'block';
    bar.style.width = '100%';
    const start = Date.now();
    this.timerId = setInterval(()=>{
      const elapsed = (Date.now()-start)/1000;
      const left = Math.max(0, seconds-elapsed);
      this.timeLeft = left;
      bar.style.width = (left/seconds*100)+'%';
      txt.textContent = '⏱ '+Math.ceil(left)+'s';
      if(left<=0){
        this.stopTimer();
        this.showModal('时间到！','60秒挑战结束，进入结算。');
        setTimeout(()=>this.showResult(),1500);
      }
    }, 100);
  },

  stopTimer() {
    if(this.timerId){clearInterval(this.timerId);this.timerId=null;}
    document.getElementById('timerBar').style.display='none';
    document.getElementById('timerText').style.display='none';
  },

  gameOver() {
    this.showModal('任务失败','生命值耗尽，电磁波任务被迫终止。');
    setTimeout(()=>{
      this.closeModal();
      this.showResult(true);
    }, 2000);
  },

  showResult(failed=false) {
    document.querySelectorAll('.stage-screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('header').style.display = 'none';
    document.getElementById('bottomNav').style.display = 'none';
    this.stopTimer();
    document.getElementById('result').classList.add('active');

    const rate = Math.round(this.correctCount/this.totalQ*100);
    const time = Math.round((Date.now()-this.startTime)/1000);
    let grade = 'C';
    if(this.hp>=3 && rate>=90) grade='S';
    else if(this.hp>=2 && rate>=80) grade='A';
    else if(this.hp>=1 && rate>=60) grade='B';
    else grade='C';
    if(failed) grade='D';

    document.getElementById('resultGrade').textContent = grade;
    document.getElementById('rsScore').textContent = this.score;
    document.getElementById('rsRate').textContent = rate+'%';
    document.getElementById('rsCombo').textContent = this.maxCombo;
    document.getElementById('rsTime').textContent = time+'s';

    const badges = {
      S:{icon:'🏆',name:'电磁波大师',desc:'完美通关！你是电磁波世界真正的掌控者'},
      A:{icon:'🥇',name:'电磁波专家',desc:'出色的表现，你对电磁波了如指掌'},
      B:{icon:'🥈',name:'通信工程师',desc:'良好的基础，继续精进会走得更远'},
      C:{icon:'🥉',name:'见习特工',desc:'完成任务，还有很多知识等你探索'},
      D:{icon:'📵',name:'信号丢失',desc:'任务中断，调整状态再来一次吧'}
    };
    const b = badges[grade];
    document.getElementById('badgeIcon').textContent = b.icon;
    document.getElementById('badgeName').textContent = b.name;
    document.getElementById('badgeDesc').textContent = b.desc;
  },

  restart() {
    document.getElementById('result').classList.remove('active');
    document.getElementById('intro-screen').classList.add('active');
    document.getElementById('header').style.display = 'none';
    document.getElementById('bottomNav').style.display = 'none';
  },

  showModal(title, text) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalText').textContent = text;
    document.getElementById('modal').classList.add('show');
  },

  closeModal() {
    document.getElementById('modal').classList.remove('show');
  }
};

// ===================== PARTICLES =====================
(function initParticles(){
  const container = document.getElementById('particles');
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100+'vw';
    p.style.animationDuration = (6+Math.random()*8)+'s';
    p.style.animationDelay = (Math.random()*8)+'s';
    p.style.opacity = .3+Math.random()*.4;
    container.appendChild(p);
  }
})();
</script>
