<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第六章 · 密度与压强 | 材料实验室</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --main: #9d00ff;
    --accent: #ff00ff;
    --bg: #0a0014;
    --panel: #140020;
    --panel2: #1a0028;
    --text: #e0ccff;
    --dim: #7a5c99;
    --good: #00ff88;
    --bad: #ff3366;
    --warn: #ffaa00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(157,0,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,0,255,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* --- START SCREEN --- */
  #startScreen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .lab-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border: 1px solid var(--main); border-radius: 20px;
    font-size: 12px; color: var(--main); text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .lab-badge svg { width: 16px; height: 16px; fill: var(--main); }
  .start-title {
    font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
    color: var(--main); text-shadow: 0 0 40px rgba(157,0,255,0.5);
    text-align: center; line-height: 1.2;
  }
  .start-sub {
    font-size: 16px; color: var(--dim); margin-top: 12px;
    text-transform: uppercase; letter-spacing: 4px;
  }
  .dept-line {
    margin-top: 32px; font-size: 13px; color: var(--dim);
    border-top: 1px solid rgba(157,0,255,0.2); padding-top: 16px;
    text-align: center; max-width: 400px;
  }
  .start-btn {
    margin-top: 40px; padding: 16px 48px;
    font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
    color: #fff; background: linear-gradient(135deg, var(--main), var(--accent));
    border: none; border-radius: 8px; cursor: pointer;
    box-shadow: 0 0 30px rgba(157,0,255,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    text-transform: uppercase; letter-spacing: 3px;
  }
  .start-btn:hover {
    transform: translateY(-2px); box-shadow: 0 0 50px rgba(157,0,255,0.6);
  }
  .start-deco {
    position: absolute; opacity: 0.06;
    font-family: 'Orbitron'; font-size: 200px; font-weight: 900; color: var(--main);
    pointer-events: none; user-select: none;
  }

  /* --- MAIN LAYOUT --- */
  #gameWrap {
    display: none;
    position: fixed; inset: 0;
    flex-direction: column;
    z-index: 1;
  }
  #topBar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid rgba(157,0,255,0.2);
    background: var(--panel);
    flex-shrink: 0;
  }
  .top-left { display: flex; align-items: center; gap: 16px; }
  .top-right { display: flex; align-items: center; gap: 20px; }
  .chapter-tag {
    font-family: 'Orbitron'; font-size: 13px; color: var(--main);
    border: 1px solid var(--main); padding: 4px 12px; border-radius: 4px;
  }
  .hp-bar { display: flex; gap: 4px; font-size: 18px; }
  .hp-heart { color: var(--bad); transition: opacity 0.3s; }
  .hp-heart.lost { opacity: 0.15; }
  .streak-box {
    font-size: 14px; color: var(--warn);
    display: flex; align-items: center; gap: 6px;
  }
  .timer-box {
    font-family: 'Orbitron'; font-size: 18px; color: var(--accent);
    min-width: 80px; text-align: right;
  }
  .timer-box.urgent { animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* --- STAGE HEADER --- */
  #stageHeader {
    padding: 16px 20px 8px;
    border-bottom: 1px solid rgba(157,0,255,0.15);
    flex-shrink: 0;
  }
  .stage-title {
    font-family: 'Orbitron'; font-size: 22px; font-weight: 700; color: var(--main);
    display: flex; align-items: center; gap: 10px;
  }
  .stage-title .stage-num {
    background: var(--main); color: #fff; width: 32px; height: 32px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .stage-desc { font-size: 13px; color: var(--dim); margin-top: 4px; margin-left: 42px; }
  .progress-track {
    margin-top: 10px; height: 4px; background: rgba(157,0,255,0.15); border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--main), var(--accent));
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* --- QUESTION AREA --- */
  #questionArea {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .q-card {
    background: var(--panel); border: 1px solid rgba(157,0,255,0.2);
    border-radius: 12px; padding: 24px;
    max-width: 720px; margin: 0 auto;
  }
  .q-number {
    font-family: 'Orbitron'; font-size: 12px; color: var(--dim);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
  }
  .q-text {
    font-size: 16px; line-height: 1.7; color: var(--text);
    margin-bottom: 16px;
  }
  .q-text .highlight {
    color: var(--accent); font-weight: bold;
  }
  .q-text .data-box {
    display: inline-block;
    background: rgba(157,0,255,0.1); border: 1px solid rgba(157,0,255,0.3);
    padding: 2px 8px; border-radius: 4px; margin: 0 2px;
  }

  /* Canvas for U-tube */
  .canvas-wrap {
    text-align: center; margin: 16px 0;
  }
  .canvas-wrap canvas {
    border: 1px solid rgba(157,0,255,0.3); border-radius: 8px;
    background: var(--panel2);
  }

  /* Density table reference */
  .density-table-ref {
    margin: 16px 0; padding: 12px 16px;
    background: rgba(157,0,255,0.05); border: 1px dashed rgba(157,0,255,0.3);
    border-radius: 8px;
    font-size: 13px;
  }
  .density-table-ref h4 {
    font-family: 'Orbitron'; font-size: 11px; color: var(--main);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px;
  }
  .density-table-ref table {
    width: 100%; border-collapse: collapse;
  }
  .density-table-ref td {
    padding: 3px 8px; color: var(--dim); font-size: 12px;
    border-bottom: 1px solid rgba(157,0,255,0.1);
  }
  .density-table-ref td:first-child { color: var(--text); }

  /* Options */
  .options-grid {
    display: grid; gap: 10px;
  }
  .opt-btn {
    text-align: left;
    padding: 14px 18px; border-radius: 8px;
    background: var(--panel2); border: 1px solid rgba(157,0,255,0.2);
    color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 15px;
    cursor: pointer; transition: all 0.2s;
  }
  .opt-btn:hover {
    border-color: var(--main); background: rgba(157,0,255,0.08);
  }
  .opt-btn.correct {
    border-color: var(--good); background: rgba(0,255,136,0.08);
    color: var(--good);
  }
  .opt-btn.wrong {
    border-color: var(--bad); background: rgba(255,51,102,0.08);
    color: var(--bad);
  }
  .opt-btn:disabled { cursor: default; }

  /* Input answer */
  .input-answer-wrap {
    display: flex; gap: 12px; align-items: stretch; margin-top: 16px;
  }
  .input-answer {
    flex: 1; padding: 14px 16px; border-radius: 8px;
    background: var(--panel2); border: 1px solid rgba(157,0,255,0.3);
    color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 15px;
  }
  .input-answer:focus { outline: none; border-color: var(--main); }
  .submit-btn {
    padding: 14px 24px; border-radius: 8px;
    background: var(--main); color: #fff;
    border: none; font-family: 'Orbitron'; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .submit-btn:hover { background: var(--accent); }

  /* Feedback */
  .feedback-bar {
    margin-top: 16px; padding: 14px 18px; border-radius: 8px;
    font-size: 14px; display: none;
  }
  .feedback-bar.ok { display: block; background: rgba(0,255,136,0.08); border: 1px solid var(--good); color: var(--good); }
  .feedback-bar.err { display: block; background: rgba(255,51,102,0.08); border: 1px solid var(--bad); color: var(--bad); }

  /* Principle button */
  .principle-btn {
    margin-top: 12px; padding: 8px 16px; border-radius: 6px;
    background: transparent; border: 1px solid var(--dim);
    color: var(--dim); font-family: 'Share Tech Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .principle-btn:hover { border-color: var(--main); color: var(--main); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--panel); border: 1px solid var(--main);
    border-radius: 12px; padding: 24px; max-width: 520px; width: 90%;
    max-height: 70vh; overflow-y: auto;
  }
  .modal-title {
    font-family: 'Orbitron'; font-size: 16px; color: var(--main); margin-bottom: 12px;
  }
  .modal-body { font-size: 14px; line-height: 1.8; color: var(--text); }
  .modal-body code {
    background: rgba(157,0,255,0.1); padding: 2px 6px; border-radius: 3px;
    color: var(--accent);
  }
  .modal-close {
    margin-top: 16px; padding: 10px 24px;
    background: var(--main); color: #fff; border: none; border-radius: 6px;
    font-family: 'Orbitron'; font-size: 13px; cursor: pointer;
  }

  /* Error tip box */
  .error-tip {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    z-index: 150;
    background: var(--panel); border: 1px solid var(--bad);
    border-radius: 8px; padding: 12px 20px;
    color: var(--bad); font-size: 14px;
    box-shadow: 0 4px 20px rgba(255,51,102,0.2);
    display: none;
  }
  .error-tip.active { display: block; animation: tipIn 0.3s ease; }
  @keyframes tipIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

  /* --- BOTTOM NAV --- */
  #bottomNav {
    display: flex; justify-content: space-around;
    padding: 12px 0; border-top: 1px solid rgba(157,0,255,0.2);
    background: var(--panel); flex-shrink: 0;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 11px; color: var(--dim); cursor: pointer;
    transition: color 0.2s; padding: 0 12px;
  }
  .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
  .nav-item.active { color: var(--main); }
  .nav-item.locked { opacity: 0.3; cursor: default; }

  /* --- STAGE COMPLETE --- */
  #stageComplete {
    display: none; position: fixed; inset: 0; z-index: 90;
    background: var(--bg);
    flex-direction: column; align-items: center; justify-content: center;
  }
  .grade-display {
    font-family: 'Orbitron'; font-size: 80px; font-weight: 900;
    margin-bottom: 8px;
  }
  .grade-S { color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.5); }
  .grade-A { color: var(--good); text-shadow: 0 0 30px rgba(0,255,136,0.4); }
  .grade-B { color: var(--warn); text-shadow: 0 0 30px rgba(255,170,0,0.4); }
  .grade-C { color: var(--dim); }
  .stage-stats { font-size: 14px; color: var(--dim); margin-bottom: 24px; }
  .badge-earned {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-radius: 8px;
    background: rgba(157,0,255,0.1); border: 1px solid var(--main);
    margin-bottom: 24px;
  }
  .badge-earned svg { width: 32px; height: 32px; fill: var(--accent); }
  .badge-text { font-family: 'Orbitron'; font-size: 14px; color: var(--accent); }

  /* --- GAME OVER / FINAL --- */
  #gameOver, #finalScreen {
    display: none; position: fixed; inset: 0; z-index: 95;
    background: var(--bg);
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .final-title {
    font-family: 'Orbitron'; font-size: 36px; font-weight: 900; color: var(--main);
    margin-bottom: 16px;
  }
  .final-grade {
    font-family: 'Orbitron'; font-size: 100px; font-weight: 900;
    margin: 16px 0;
  }
  .final-badges {
    display: flex; gap: 16px; margin: 20px 0;
  }
  .final-badge {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 16px; border-radius: 8px;
    background: rgba(157,0,255,0.05); border: 1px solid rgba(157,0,255,0.2);
  }
  .final-badge svg { width: 36px; height: 36px; fill: var(--dim); }
  .final-badge.earned svg { fill: var(--accent); }
  .final-badge.earned { border-color: var(--main); }
  .final-badge span { font-size: 11px; color: var(--dim); }
  .final-badge.earned span { color: var(--accent); }

  /* Data record notebook style */
  .notebook-lines {
    background-image: repeating-linear-gradient(
      transparent, transparent 31px,
      rgba(157,0,255,0.06) 31px, rgba(157,0,255,0.06) 32px
    );
    background-size: 100% 32px;
  }

  /* Scrollbar */
  #questionArea::-webkit-scrollbar { width: 6px; }
  #questionArea::-webkit-scrollbar-track { background: transparent; }
  #questionArea::-webkit-scrollbar-thumb { background: var(--main); border-radius: 3px; }

  /* Decorative beakers */
  .beaker-deco {
    position: absolute; opacity: 0.04; pointer-events: none;
  }
</style>
</head>
<body>

<!-- ========== START SCREEN ========== -->
<div id="startScreen">
  <div class="start-deco" style="top:10%;left:5%">D</div>
  <div class="start-deco" style="bottom:10%;right:5%">ρ</div>

  <div class="lab-badge">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z"/></svg>
    材料实验室 · MATERIALS LAB
  </div>
  <div class="start-title">密度与压强</div>
  <div class="start-sub">第六章 · DENSITY & PRESSURE</div>
  <div class="dept-line">
    5个实验阶段 · 29道题目 · 生命值系统 · 连击评级<br>
    密度测量 → 固体压强 → 液体压强 → 大气压强 → 终极实验
  </div>
  <button class="start-btn" onclick="startGame()">进入实验室</button>
</div>

<!-- ========== GAME WRAP ========== -->
<div id="gameWrap">

  <!-- TOP BAR -->
  <div id="topBar">
    <div class="top-left">
      <span class="chapter-tag">DENSITY</span>
      <div class="hp-bar" id="hpBar">❤️❤️❤️</div>
    </div>
    <div class="top-right">
      <div class="streak-box" id="streakBox">⚡ 连击 x0</div>
      <div class="timer-box" id="timerBox">--:--</div>
    </div>
  </div>

  <!-- STAGE HEADER -->
  <div id="stageHeader">
    <div class="stage-title" id="stageTitle">
      <span class="stage-num" id="stageNum">1</span>
      <span id="stageName">密度测量</span>
    </div>
    <div class="stage-desc" id="stageDesc">给出质量与体积数据，计算密度并查表鉴别物质</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- QUESTION AREA -->
  <div id="questionArea" class="notebook-lines">
    <div class="q-card" id="qCard"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <div class="nav-item active" data-stage="0" onclick="gotoStage(0)">
      <svg viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9L12 3zm0 2.2L18 9.5V19H6V9.5L12 5.2zM11 11h2v6h-2z"/></svg>
      <span>密度测量</span>
    </div>
    <div class="nav-item locked" data-stage="1" onclick="gotoStage(1)">
      <svg viewBox="0 0 24 24"><path d="M4 20h16v2H4zM4 4h16v2H4zM9 9h6v6H9z"/></svg>
      <span>压强计算</span>
    </div>
    <div class="nav-item locked" data-stage="2" onclick="gotoStage(2)">
      <svg viewBox="0 0 24 24"><path d="M6 20h12v-2H6v2zm6-18l-6 8h4v6h4v-6h4l-6-8z"/></svg>
      <span>液体压强</span>
    </div>
    <div class="nav-item locked" data-stage="3" onclick="gotoStage(3)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2"/></svg>
      <span>大气压强</span>
    </div>
    <div class="nav-item locked" data-stage="4" onclick="gotoStage(4)">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4l6.5 13h-13L12 6z"/></svg>
      <span>终极实验</span>
    </div>
  </div>
</div>

<!-- ========== MODALS ========== -->
<div class="modal-overlay" id="principleModal">
  <div class="modal-box">
    <div class="modal-title" id="principleTitle">实验原理</div>
    <div class="modal-body" id="principleBody"></div>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

<div class="error-tip" id="errorTip"></div>

<!-- ========== STAGE COMPLETE ========== -->
<div id="stageComplete">
  <div class="grade-display" id="stageGrade">S</div>
  <div class="stage-stats" id="stageStats"></div>
  <div class="badge-earned" id="badgeEarned" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z"/></svg>
    <span class="badge-text">获得徽章：密度大师</span>
  </div>
  <button class="start-btn" onclick="nextStage()" id="nextStageBtn">下一阶段</button>
</div>

<!-- ========== GAME OVER ========== -->
<div id="gameOver">
  <div class="final-title" style="color:var(--bad)">实验失败</div>
  <div style="font-size:16px;color:var(--dim);margin-bottom:24px;">生命值耗尽，请重新开始实验</div>
  <button class="start-btn" onclick="restartGame()">重新开始</button>
</div>

<!-- ========== FINAL SCREEN ========== -->
<div id="finalScreen">
  <div class="final-title">实验完成</div>
  <div class="final-grade" id="finalGrade">S</div>
  <div style="font-size:14px;color:var(--dim);margin-bottom:8px;" id="finalStats"></div>
  <div class="final-badges" id="finalBadges"></div>
  <button class="start-btn" onclick="restartGame()">再次挑战</button>
</div>

<script>
// ================== GAME STATE ==================
const state = {
  stage: 0,       // 0-4
  qIndex: 0,      // question within stage
  hp: 3,
  streak: 0,
  maxStreak: 0,
  correctCount: 0,
  totalCount: 0,
  stageScores: [0,0,0,0,0],
  unlockedStages: [true,false,false,false,false],
  badges: [],
  timer: null,
  timeLeft: 0,
  stageStartTime: 0,
  comboMultiplier: 1,
};

// ================== DENSITY TABLE ==================
const densityTable = [
  { name: '金', rho: 19.3, unit: 'g/cm³' },
  { name: '铅', rho: 11.3, unit: 'g/cm³' },
  { name: '银', rho: 10.5, unit: 'g/cm³' },
  { name: '铜', rho: 8.9, unit: 'g/cm³' },
  { name: '铁', rho: 7.9, unit: 'g/cm³' },
  { name: '铝', rho: 2.7, unit: 'g/cm³' },
  { name: '玻璃', rho: 2.5, unit: 'g/cm³' },
  { name: '水', rho: 1.0, unit: 'g/cm³' },
  { name: '酒精', rho: 0.8, unit: 'g/cm³' },
  { name: '冰', rho: 0.9, unit: 'g/cm³' },
  { name: '木块(松木)', rho: 0.5, unit: 'g/cm³' },
  { name: '空气', rho: 0.00129, unit: 'g/cm³' },
];

// ================== STAGE DATA ==================
const stages = [
  {
    name: '密度测量',
    desc: '给出质量与体积数据，计算密度并查表鉴别物质',
    timeLimit: 0,
    questions: [
      {
        type: 'choice',
        text: '某金属块质量 m = <span class="data-box">79 g</span>，体积 V = <span class="data-box">10 cm³</span>。计算其密度并判断该金属最可能是？',
        options: ['铁', '铜', '铝', '铅'],

}
function checkAnswer(user, correct, tolerance) {
  const u = parseFloat(user.replace(/,/g, ''));
  const c = parseFloat(correct);
  if (isNaN(u)) return false;
  if (tolerance === 0) return Math.abs(u - c) < 0.0001;
  return Math.abs(u - c) <= tolerance;
}
function getGrade(score) {
  if (score >= 95) return 'S';
  if (score >= 80) return 'A';
  if (score >= 60) return 'B';
  return 'C';
}
function getGradeClass(g) { return 'grade-' + g; }

// ================== U-TUBE CANVAS ==================
function drawUtube(canvas, heightDiff) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#1a0028';
  ctx.fillRect(0, 0, w, h);

  // U-tube shape
  const tubeX = w / 2;
  const tubeW = 40;
  const armH = 140;
  const baseY = h - 30;
  const topY = baseY - armH;

  // Draw tube outline
  ctx.strokeStyle = 'rgba(157,0,255,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  // Left arm
  ctx.moveTo(tubeX - tubeW/2, topY);
  ctx.lineTo(tubeX - tubeW/2, baseY);
  // Bottom curve
  ctx.arc(tubeX, baseY, tubeW/2, Math.PI, 0, true);
  // Right arm
  ctx.lineTo(tubeX + tubeW/2, topY);
  ctx.stroke();

  // Fill tube interior
  ctx.fillStyle = 'rgba(157,0,255,0.05)';
  ctx.beginPath();
  ctx.moveTo(tubeX - tubeW/2 + 3, topY);
  ctx.lineTo(tubeX - tubeW/2 + 3, baseY - tubeW/2);
  ctx.arc(tubeX, baseY - tubeW/2, tubeW/2 - 3, Math.PI, 0, true);
  ctx.lineTo(tubeX + tubeW/2 - 3, topY);
  ctx.fill();

  // Water levels
  const leftLevel = baseY - tubeW/2 - 40 + heightDiff * 3;
  const rightLevel = baseY - tubeW/2 - 40 - heightDiff * 3;

  // Left water
  ctx.fillStyle = 'rgba(0,255,136,0.4)';
  ctx.beginPath();
  ctx.moveTo(tubeX - tubeW/2 + 3, leftLevel);
  ctx.lineTo(tubeX - tubeW/2 + 3, baseY - tubeW/2);
  ctx.arc(tubeX, baseY - tubeW/2, tubeW/2 - 3, Math.PI, Math.PI * 0.55, true);
  ctx.lineTo(tubeX - 3, leftLevel);
  ctx.fill();

  // Right water
  ctx.fillStyle = 'rgba(0,255,136,0.4)';
  ctx.beginPath();
  ctx.moveTo(tubeX + 3, rightLevel);
  ctx.lineTo(tubeX + 3, baseY - tubeW/2);
  ctx.arc(tubeX, baseY - tubeW/2, tubeW/2 - 3, 0, Math.PI * 0.45, false);
  ctx.lineTo(tubeX + tubeW/2 - 3, rightLevel);
  ctx.fill();

  // Water surface lines
  ctx.strokeStyle = 'rgba(0,255,136,0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tubeX - tubeW/2 + 3, leftLevel);
  ctx.lineTo(tubeX - 3, leftLevel);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(tubeX + 3, rightLevel);
  ctx.lineTo(tubeX + tubeW/2 - 3, rightLevel);
  ctx.stroke();

  // Height difference annotation
  ctx.strokeStyle = '#ff00ff';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(tubeX - tubeW/2 - 20, leftLevel);
  ctx.lineTo(tubeX + tubeW/2 + 20, rightLevel);
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = '#ff00ff';
  ctx.font = '12px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('液面差 h=' + heightDiff + 'cm', tubeX, topY - 10);

  // Scale markers
  ctx.fillStyle = 'rgba(157,0,255,0.4)';
  ctx.font = '10px "Share Tech Mono"';
  for (let i = 0; i <= 5; i++) {
    const y = baseY - tubeW/2 - i * 20;
    ctx.fillText(i * 2 + 'cm', tubeX - tubeW/2 - 35, y + 3);
    ctx.beginPath();
    ctx.moveTo(tubeX - tubeW/2 - 8, y);
    ctx.lineTo(tubeX - tubeW/2 - 3, y);
    ctx.strokeStyle = 'rgba(157,0,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ================== RENDER QUESTION ==================
function renderQuestion() {
  const stage = stages[state.stage];
  const q = stage.questions[state.qIndex];
  const card = $('qCard');
  state.totalCount++;

  let html = `<div class="q-number">STAGE ${state.stage+1} · 题目 ${state.qIndex+1} / ${stage.questions.length}</div>`;
  html += `<div class="q-text">${q.text}</div>`;

  // Density table for Stage 1
  if (state.stage === 0 && q.type === 'choice') {
    html += `<div class="density-table-ref">
      <h4>密度参考表 (g/cm³)</h4>
      <table>`;
    for (let i = 0; i < densityTable.length; i += 3) {
      html += '<tr>';
      for (let j = 0; j < 3 && i+j < densityTable.length; j++) {
        const d = densityTable[i+j];
        html += `<td>${d.name}: ${d.rho}</td>`;
      }
      html += '</tr>';
    }
    html += `</table></div>`;
  }

  // U-tube canvas
  if (q.hasUtube) {
    html += `<div class="canvas-wrap"><canvas id="utubeCanvas" width="320" height="200"></canvas></div>`;
  }

  if (q.type === 'choice') {
    html += `<div class="options-grid">`;
    q.options.forEach((opt, i) => {
      html += `<button class="opt-btn" data-idx="${i}" onclick="handleChoice(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="input-answer-wrap">
      <input type="text" class="input-answer" id="ansInput" placeholder="输入答案（纯数字）" onkeydown="if(event.key==='Enter')handleInput()">
      <button class="submit-btn" onclick="handleInput()">提交</button>
    </div>`;
  }

  html += `<div class="feedback-bar" id="feedback"></div>`;
  html += `<button class="principle-btn" onclick="showPrinciple()">📖 查看实验原理</button>`;

  card.innerHTML = html;

  if (q.hasUtube) {
    setTimeout(() => {
      const cvs = $('utubeCanvas');
      if (cvs) drawUtube(cvs, q.utubeHeight || 8);
    }, 10);
  }

  // Update progress
  const progress = ((state.qIndex) / stage.questions.length) * 100;
  $('progressFill').style.width = progress + '%';

  // Update nav
  updateNav();
}

// ================== HANDLE ANSWER ==================
function handleChoice(idx) {
  const stage = stages[state.stage];
  const q = stage.questions[state.qIndex];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = idx === q.answer;
  processResult(isCorrect, btns[idx], q);
}

function handleInput() {
  const input = $('ansInput');
  const val = input.value.trim();
  if (!val) return;

  const stage = stages[state.stage];
  const q = stage.questions[state.qIndex];
  const isCorrect = checkAnswer(val, q.answer, q.tolerance || 0);
  processResult(isCorrect, input, q);
}

function processResult(isCorrect, el, q) {
  const fb = $('feedback');
  if (isCorrect) {
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    state.correctCount++;
    state.comboMultiplier = Math.min(1 + state.streak * 0.1, 2.0);

    if (el && el.classList) el.classList.add('correct');
    fb.className = 'feedback-bar ok';
    fb.textContent = `✅ 正确！连击 x${state.streak}`;
  } else {
    state.streak = 0;
    state.comboMultiplier = 1;
    state.hp--;
    updateHP();

    if (el && el.classList) el.classList.add('wrong');
    fb.className = 'feedback-bar err';
    let tip = '';
    if (q.type === 'choice') {
      const correctOpt = q.options[q.answer];
      tip = `❌ 错误！正确答案是 ${String.fromCharCode(65+q.answer)}. ${correctOpt}`;
    } else {
      tip = `❌ 错误！正确答案是 ${q.answer}`;
    }
    fb.textContent = tip;

    showErrorTip('思路有偏差，请查看实验原理加深理解');
  }

  updateStreak();

  // Delay then next
  setTimeout(() => {
    if (state.hp <= 0) {
      showGameOver();
      return;
    }
    nextQuestion();
  }, isCorrect ? 1200 : 2000);
}

function nextQuestion() {
  const stage = stages[state.stage];
  state.qIndex++;

  if (state.qIndex >= stage.questions.length) {
    // Stage complete
    finishStage();
  } else {
    renderQuestion();
  }
}

// ================== UI UPDATES ==================
function updateHP() {
  let hearts = '';
  for (let i = 0; i < 3; i++) {
    hearts += i < state.hp ? '❤️' : '<span class="hp-heart lost">❤️</span>';
  }
  $('hpBar').innerHTML = hearts;
}
function updateStreak() {
  $('streakBox').textContent = `⚡ 连击 x${state.streak}`;
}
function updateNav() {
  document.querySelectorAll('.nav-item').forEach((item, i) => {
    item.classList.remove('active', 'locked');
    if (i === state.stage) item.classList.add('active');
    else if (!state.unlockedStages[i]) item.classList.add('locked');
  });
}
function showErrorTip(msg) {
  const tip = $('errorTip');
  tip.textContent = msg;
  tip.classList.add('active');
  setTimeout(() => tip.classList.remove('active'), 3000);
}

// ================== STAGE / GAME FLOW ==================
function startGame() {
  $('startScreen').style.display = 'none';
  $('gameWrap').style.display = 'flex';
  $('gameOver').style.display = 'none';
  $('finalScreen').style.display = 'none';
  $('stageComplete').style.display = 'none';

  state.stage = 0;
  state.qIndex = 0;
  state.hp = 3;
  state.streak = 0;
  state.maxStreak = 0;
  state.correctCount = 0;
  state.totalCount = 0;
  state.stageScores = [0,0,0,0,0];
  state.unlockedStages = [true,false,false,false,false];
  state.badges = [];
  state.comboMultiplier = 1;

  updateHP();
  updateStreak();
  updateStageHeader();
  startStageTimer();
  renderQuestion();
}

function updateStageHeader() {
  const stage = stages[state.stage];
  $('stageNum').textContent = state.stage + 1;
  $('stageName').textContent = stage.name;
  $('stageDesc').textContent = stage.desc;
}

function startStageTimer() {
  const stage = stages[state.stage];
  if (stage.timeLimit > 0) {
    state.timeLeft = stage.timeLimit;
    $('timerBox').style.display = 'block';
    updateTimerDisplay();
    state.timer = setInterval(() => {
      state.timeLeft--;
      updateTimerDisplay();
      if (state.timeLeft <= 0) {
        clearInterval(state.timer);
        finishStage();
      }
    }, 1000);
  } else {
    $('timerBox').style.display = 'none';
  }
}
function updateTimerDisplay() {
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  $('timerBox').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if (state.timeLeft <= 10) $('timerBox').classList.add('urgent');
  else $('timerBox').classList.remove('urgent');
}

function finishStage() {
  if (state.timer) clearInterval(state.timer);
  const stage = stages[state.stage];
  const total = stage.questions.length;
  const answered = state.qIndex;
  const stageCorrect = state.correctCount - (state.stage > 0 ? state.stageScores.slice(0, state.stage).reduce((a,b)=>a+b,0) : 0);
  // Actually let's recalc properly
  // Simpler: score based on HP remaining and streak
  const baseScore = Math.round((answered / total) * 60);
  const hpBonus = state.hp * 10;
  const streakBonus = Math.min(state.maxStreak * 5, 20);
  const score = Math.min(baseScore + hpBonus + streakBonus, 100);
  state.stageScores[state.stage] = score;

  const grade = getGrade(score);
  $('stageGrade').textContent = grade;
  $('stageGrade').className = 'grade-display ' + getGradeClass(grade);
  $('stageStats').textContent = `正确 ${Math.max(stageCorrect,0)}/${total} · 剩余生命 ${state.hp} · 最高连击 ${state.maxStreak}`;

  // Badge check
  const badgeEl = $('badgeEarned');
  if (state.stage === 4 && grade === 'S' && !state.badges.includes('density-master')) {
    state.badges.push('density-master');
    badgeEl.style.display = 'flex';
  } else {
    badgeEl.style.display = 'none';
  }

  const nextBtn = $('nextStageBtn');
  if (state.stage < 4) {
    nextBtn.textContent = '下一阶段';
    nextBtn.onclick = nextStage;
  } else {
    nextBtn.textContent = '查看最终成绩';
    nextBtn.onclick = showFinal;
  }

  $('stageComplete').style.display = 'flex';
  $('gameWrap').style.display = 'none';
}

function nextStage() {
  state.stage++;
  state.qIndex = 0;
  state.streak = 0;
  state.maxStreak = 0;
  state.comboMultiplier = 1;
  state.unlockedStages[state.stage] = true;

  $('stageComplete').style.display = 'none';
  $('gameWrap').style.display = 'flex';
  updateStageHeader();
  startStageTimer();
  renderQuestion();
}

function gotoStage(n) {
  if (!state.unlockedStages[n]) return;
  if (state.timer) clearInterval(state.timer);
  state.stage = n;
  state.qIndex = 0;
  state.streak = 0;
  state.maxStreak = 0;
  state.comboMultiplier = 1;

  $('stageComplete').style.display = 'none';
  $('gameWrap').style.display = 'flex';
  $('gameOver').style.display = 'none';
  updateStageHeader();
  startStageTimer();
  renderQuestion();
}

function showGameOver() {
  if (state.timer) clearInterval(state.timer);
  $('gameWrap').style.display = 'none';
  $('stageComplete').style.display = 'none';
  $('gameOver').style.display = 'flex';
}

function showFinal() {
  $('stageComplete').style.display = 'none';
  const totalScore = state.stageScores.reduce((a,b)=>a+b,0) / 5;
  const grade = getGrade(totalScore);
  $('finalGrade').textContent = grade;
  $('finalGrade').className = 'final-grade ' + getGradeClass(grade);

  const stats = [];
  stages.forEach((s,i) => {
    stats.push(`${s.name}: ${state.stageScores[i]}分`);
  });
  $('finalStats').innerHTML = stats.join(' · ') + `<br>总分: ${Math.round(totalScore)}分`;

  // Badges
  let badgeHtml = '';
  const allBadges = [
    { id: 'density-master', name: '密度大师', desc: '完成终极实验并获得S评级' },
    { id: 'perfect-streak', name: '完美连击', desc: '单次连击达到10次' },
    { id: 'survivor', name: '生存专家', desc: '通关时剩余3条生命' },
  ];

  // Check badges
  if (state.maxStreak >= 10 && !state.badges.includes('perfect-streak')) state.badges.push('perfect-streak');
  if (state.hp >= 3 && !state.badges.includes('survivor')) state.badges.push('survivor');

  allBadges.forEach(b => {
    const earned = state.badges.includes(b.id);
    badgeHtml += `<div class="final-badge ${earned?'earned':''}">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z"/></svg>
      <span>${b.name}</span>
    </div>`;
  });
  $('finalBadges').innerHTML = badgeHtml;

  $('finalScreen').style.display = 'flex';
}

function restartGame() {
  $('gameOver').style.display = 'none';
  $('finalScreen').style.display = 'none';
  startGame();
}

// ================== PRINCIPLE MODAL ==================
function showPrinciple() {
  const stage = stages[state.stage];
  const q = stage.questions[state.qIndex];
  $('principleTitle').textContent = q.principleTitle || '实验原理';
  $('principleBody').innerHTML = q.principleBody || '暂无原理说明';
  $('principleModal').classList.add('active');
}
function closeModal() {
  $('principleModal').classList.remove('active');
}

// Close modal on overlay click
$('principleModal').addEventListener('click', (e) => {
  if (e.target === $('principleModal')) closeModal();
});

</script>
