<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第X章 XXX · 物理基础实验室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #06080f;
  --panel: rgba(10, 14, 26, 0.9);
  --accent: #00f5d4;
  --accent2: #00bbf9;
  --danger: #ef476f;
  --warning: #ffd166;
  --success: #06d6a0;
  --grid: rgba(0, 245, 212, 0.08);
  --text: #c0c8d8;
  --text-dim: #586070;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none;
  z-index: 5;
}

/* HUD Grid */
#hud-grid {
  position: fixed; inset: 0;
  background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 1;
}

/* Corners */
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: fixed; width: 80px; height: 80px; z-index: 2; pointer-events: none;
}
.corner-tl { top: 10px; left: 10px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.corner-tr { top: 10px; right: 10px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
.corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
.corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

/* App container */
#app {
  position: relative; z-index: 10;
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* Title */
.title-bar {
  text-align: center;
  border-bottom: 1px solid var(--accent);
  padding-bottom: 16px;
  margin-bottom: 24px;
}
.title-bar h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px; letter-spacing: 4px;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
}
.title-bar .subtitle {
  font-size: 14px; color: var(--text-dim);
  margin-top: 8px; letter-spacing: 2px;
}

/* Progress bar */
.progress-bar {
  display: flex; gap: 8px;
  margin-bottom: 32px;
  justify-content: center;
}
.progress-seg {
  width: 60px; height: 4px;
  background: rgba(88,96,112,0.3);
  border-radius: 2px;
  transition: all 0.3s;
}
.progress-seg.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
.progress-seg.done { background: var(--success); }

/* Card */
.card {
  background: var(--panel);
  border: 1px solid rgba(0,245,212,0.2);
  border-radius: 8px;
  padding: 28px;
  margin-bottom: 24px;
  animation: fadeIn 0.5s ease;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(0,245,212,0.15);
  padding-bottom: 12px;
}
.card-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px; color: var(--accent);
}
.card-header .chapter-num {
  font-size: 12px; color: var(--text-dim);
  border: 1px solid var(--text-dim); padding: 2px 10px;
  border-radius: 3px;
}

/* Concept box */
.concept-box {
  background: rgba(0,245,212,0.05);
  border-left: 3px solid var(--accent);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 0 6px 6px 0;
}
.concept-box .label {
  font-size: 11px; color: var(--accent);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px;
}
.concept-box p { font-size: 16px; line-height: 1.7; }
.concept-box .formula {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px; color: var(--warning);
  margin: 8px 0;
}

/* Animation area */
.anim-area {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 8px;
  padding: 24px;
  margin: 20px 0;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

/* Example list */
.example-list { margin: 16px 0; }
.example-item {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(0,245,212,0.1);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.example-item:hover {
  border-color: rgba(0,245,212,0.3);
  background: rgba(0,245,212,0.03);
}
.example-item .q { font-size: 16px; margin-bottom: 8px; }
.example-item .a {
  font-size: 14px; color: var(--success);
  display: none;
  border-top: 1px dashed rgba(0,245,212,0.2);
  padding-top: 8px;
  margin-top: 8px;
}
.example-item.expanded .a { display: block; }
.example-item .a .step {
  color: var(--text-dim); font-size: 12px;
  margin-top: 4px;
}

/* Quiz */
.quiz-box {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 8px;
  padding: 20px;
  margin: 20px 0;
}
.quiz-box .quiz-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; color: var(--warning);
  margin-bottom: 16px;
}
.quiz-question { font-size: 16px; margin-bottom: 14px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-btn {
  background: rgba(0,187,249,0.08);
  border: 1px solid rgba(0,187,249,0.3);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit; font-size: 15px;
  text-align: left;
  transition: all 0.2s;
}
.quiz-btn:hover {
  background: rgba(0,187,249,0.15);
  border-color: var(--accent2);
}
.quiz-btn.correct {
  background: rgba(6,214,160,0.15);
  border-color: var(--success);
  color: var(--success);
  animation: flashGreen 0.5s ease;
}
.quiz-btn.wrong {
  background: rgba(239,71,111,0.15);
  border-color: var(--danger);
  color: var(--danger);
  animation: shake 0.4s ease;
}
.quiz-feedback { margin-top: 12px; font-size: 14px; min-height: 20px; }

/* Buttons */
.btn-row { display: flex; gap: 16px; justify-content: center; margin-top: 24px; }
.btn {
  background: rgba(0,245,212,0.1);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 14px 36px;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; letter-spacing: 2px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}
.btn:hover {
  background: rgba(0,245,212,0.2);
  box-shadow: 0 0 20px var(--accent);
}
.btn.btn-ghost {
  background: transparent;
  border-color: var(--text-dim);
  color: var(--text-dim);
}
.btn.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.btn.btn-warn {
  background: rgba(255,209,102,0.1);
  border: 1px solid var(--warning);
  color: var(--warning);
}
.btn.btn-warn:hover {
  background: rgba(255,209,102,0.2);
  box-shadow: 0 0 20px var(--warning);
}

/* Table */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}
.compare-table th,
.compare-table td {
  border: 1px solid rgba(0,245,212,0.15);
  padding: 10px 14px;
  text-align: left;
}
.compare-table th {
  background: rgba(0,245,212,0.08);
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
}
.compare-table td {
  color: var(--text);
}

/* Graph / Viz */
.graph-viz {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 8px;
  padding: 20px;
  margin: 20px 0;
  text-align: center;
}

/* Formula box */
.formula-box {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(0,245,212,0.1);
  border-radius: 6px;
  padding: 14px 18px;
  margin: 12px 0;
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  color: var(--warning);
  text-align: center;
}

/* Explain / Note */
.explain {
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-dim);
}

/* Speed calc widget */
.speed-calc {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(0,245,212,0.15);
  border-radius: 8px;
  padding: 20px;
  margin: 20px 0;
}
.speed-inputs {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}
.speed-input-group {
  flex: 1;
}
.speed-input-group label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.speed-input-group input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,245,212,0.2);
  border-radius: 4px;
  padding: 10px 12px;
  color: var(--accent);
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
}
.speed-input-group input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(0,245,212,0.2);
}
.speed-result {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  color: var(--success);
  text-align: center;
  padding: 12px;
  background: rgba(6,214,160,0.05);
  border-radius: 4px;
  border: 1px solid rgba(6,214,160,0.2);
}

/* Hide/show */
.hidden { display: none !important; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes flashGreen {
  0% { box-shadow: 0 0 0 var(--success); }
  50% { box-shadow: 0 0 30px var(--success); }
  100% { box-shadow: 0 0 0 var(--success); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

/* Mobile */
@media (max-width: 600px) {
  .title-bar h1 { font-size: 22px; }
  #app { padding: 20px 12px; }
  .card { padding: 18px; }
  .btn-row { flex-direction: column; gap: 10px; }
  .btn { padding: 12px 24px; font-size: 14px; width: 100%; text-align: center; }
  .quiz-btn { padding: 10px 14px; font-size: 14px; }
  .example-item { padding: 12px 14px; }
  .progress-seg { width: 40px; }
}
@media (max-width: 480px) {
  .title-bar h1 { font-size: 18px; letter-spacing: 2px; }
  .title-bar .subtitle { font-size: 12px; }
  #app { padding: 16px 10px; }
  .card { padding: 14px; }
  .card-header h2 { font-size: 18px; }
  .concept-box { padding: 12px 14px; }
  .concept-box .formula { font-size: 16px; }
  .speed-inputs { flex-direction: column; }
}
@media (max-width: 360px) {
  .title-bar h1 { font-size: 16px; }
  #app { padding: 12px 8px; }
  .card { padding: 12px; }
  .card-header h2 { font-size: 16px; }
  .concept-box { padding: 10px 12px; }
  .concept-box p { font-size: 14px; }
  .btn { padding: 10px 20px; font-size: 13px; }
  .quiz-options { gap: 8px; }
  .quiz-btn { padding: 8px 12px; font-size: 13px; }
  .example-item { padding: 10px 12px; }
  .example-item .q { font-size: 14px; }
  .anim-area { padding: 16px; min-height: 80px; }
}
</style>
</head>

<body>
<div id="hud-grid"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>

<div id="app">

<!-- ========== HEADER ========== -->
<!-- 【修改点1】标题：替换为当前章节主题名 -->
<div class="title-bar">
  <h1>📐 物理特工局</h1>
  <div class="subtitle">沪科版八年级第一学期 · 第X章 · 学习手册</div>
  <div style="margin-top:12px;">
    <a class="btn btn-warn" href="index.html" style="padding:10px 28px;font-size:14px;">🎮 去挑战模式</a>
  </div>
</div>

<!-- ========== PROGRESS BAR ========== -->
<!-- 【修改点2】进度条段数 = 单元数量，默认第一段 active -->
<div class="progress-bar" id="progress-bar">
  <div class="progress-seg active"></div>
  <div class="progress-seg"></div>
  <div class="progress-seg"></div>
  <div class="progress-seg"></div>
</div>

<!-- ========== CHAPTER 1 ========== -->
<!-- 【修改点3】id="ch1" 第一个卡片不加 hidden，后续加 hidden -->
<div class="card" id="ch1">
  <div class="card-header">
    <!-- 【修改点4】章节标题 -->
    <h2>第一节标题</h2>
    <span class="chapter-num">第 1 / N 节</span>
  </div>

  <!-- 核心概念 -->
  <div class="concept-box">
    <div class="label">核心概念</div>
    <p><strong>概念名</strong>：概念定义。</p>
    <div class="formula">公式</div>
  </div>

  <!-- 正文内容（段落、表格、交互区等） -->
  <p style="margin: 16px 0; line-height: 1.8;">正文段落...</p>

  <!-- 例题区 -->
  <div class="example-list">
    <div class="example-item" onclick="this.classList.toggle('expanded')">
      <div class="q">📌 例题 1：题目...</div>
      <div class="a">
        解答过程... <strong style="color:var(--success)">答案 ✅</strong>
        <div class="step">关键提示</div>
      </div>
    </div>
  </div>

  <!-- 随堂测验 -->
  <div class="quiz-box">
    <div class="quiz-title">🎯 随堂测验 — 标题</div>
    <div class="quiz-question">Q1. 题目？</div>
    <div class="quiz-options">
      <button class="quiz-btn" onclick="checkQuiz(this, true, '✅ 正确！解释...')">A. 选项</button>
      <button class="quiz-btn" onclick="checkQuiz(this, false, '❌ 错误！解释...')">B. 选项</button>
      <button class="quiz-btn" onclick="checkQuiz(this, false, '❌ 错误！解释...')">C. 选项</button>
    </div>
    <div class="quiz-feedback" id="ch1-fb1"></div>
  </div>

  <!-- 导航：第一节只有下一单元 -->
  <div class="btn-row">
    <button class="btn" onclick="goTo(2)">下一单元 →</button>
  </div>
</div>

<!-- ========== CHAPTER 2 ========== -->
<div class="card hidden" id="ch2">
  <div class="card-header">
    <h2>第二节标题</h2>
    <span class="chapter-num">第 2 / N 节</span>
  </div>

  <!-- 内容区 -->
  <div class="concept-box">
    <div class="label">核心概念</div>
    <p>内容...</p>
  </div>

  <!-- 测验 -->
  <div class="quiz-box">
    <div class="quiz-title">🎯 随堂测验</div>
    <div class="quiz-question">Q1. ...</div>
    <div class="quiz-options">
      <button class="quiz-btn" onclick="checkQuiz(this, true, '✅ ...')">A. ...</button>
      <button class="quiz-btn" onclick="checkQuiz(this, false, '❌ ...')">B. ...</button>
      <button class="quiz-btn" onclick="checkQuiz(this, false, '❌ ...')">C. ...</button>
    </div>
    <div class="quiz-feedback" id="ch2-fb1"></div>
  </div>

  <!-- 导航：中间节有上一+下一 -->
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="goTo(1)">← 上一单元</button>
    <button class="btn" onclick="goTo(3)">下一单元 →</button>
  </div>
</div>

<!-- ========== CHAPTER 3 ========== -->
<div class="card hidden" id="ch3">
  <!-- 同 ch2 结构 -->
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="goTo(2)">← 上一单元</button>
    <button class="btn" onclick="goTo(4)">下一单元 →</button>
  </div>
</div>

<!-- ========== CHAPTER 4 (LAST) ========== -->
<div class="card hidden" id="ch4">
  <!-- 内容区 -->

  <!-- 最后一节只有上一单元 + 挑战模式 -->
  <div class="btn-row">
    <button class="btn btn-ghost" onclick="goTo(3)">← 上一单元</button>
    <a class="btn btn-warn" href="index.html">🎮 进入挑战模式</a>
  </div>
</div>

</div>

<script>
let currentCh = 1;
const totalCh = 4;

function goTo(n) {
  document.getElementById('ch' + currentCh).classList.add('hidden');
  document.getElementById('ch' + n).classList.remove('hidden');

  // Update progress bar
  const segments = document.querySelectorAll('.progress-seg');
  segments.forEach((seg, i) => {
    seg.classList.remove('active', 'done');
    if (i < n - 1) seg.classList.add('done');
    else if (i === n - 1) seg.classList.add('active');
  });

  currentCh = n;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkQuiz(btn, isCorrect, msg) {
  const opts = btn.closest('.quiz-options');
  opts.querySelectorAll('.quiz-btn').forEach(b => {
    b.disabled = true;
    b.style.cursor = 'default';
  });
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  opts.querySelectorAll('.quiz-btn').forEach(b => {
    if (b !== btn && b.dataset.ans === 'true') b.classList.add('correct');
  });
  const fb = btn.closest('.quiz-box').querySelector('.quiz-feedback');
  fb.innerHTML = msg;
  fb.style.color = isCorrect ? 'var(--success)' : 'var(--danger)';
}
</script>

</body>
</html>
