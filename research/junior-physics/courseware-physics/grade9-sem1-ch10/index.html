<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特工装备室 · 第十章 内能</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080f;
      --panel: #11111f;
      --panel2: #1a1a2e;
      --accent: #00f5d4;
      --accent2: #00bbf9;
      --danger: #ef476f;
      --warn: #ffd166;
      --text: #c0c8d8;
      --text2: #8b8b9a;
      --grid: rgba(0,245,212,0.06);
      --success: #06d6a0;
      --glass: rgba(17,17,31,0.92);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Share Tech Mono', 'Courier New', 'PingFang SC', 'Microsoft YaHei', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HUD grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 245, 212, 0.03) 2px,
        rgba(0, 245, 212, 0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Corner decorations */
    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: fixed;
      width: 20px; height: 20px;
      border-color: var(--accent);
      border-style: solid;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.6;
    }
    .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

    /* ===== 主容器 ===== */
    #app {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== 顶部标题区 ===== */
    header {
      padding: 16px 20px 8px;
      border-bottom: 1px solid rgba(0,245,212,0.25);
      background: var(--glass);
      backdrop-filter: blur(8px);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; width: 120px; height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .lab-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-family: 'Orbitron', sans-serif;
    }
    .lab-badge::before {
      content: '◈';
      color: var(--accent2);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }
    .chapter-info {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* ===== HUD状态栏 ===== */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: var(--glass);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,245,212,0.15);
      flex-wrap: wrap;
      gap: 8px;
    }
    .hud-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hp-bar {
      display: flex;
      gap: 3px;
      font-size: 18px;
    }
    .hp-heart { transition: all 0.3s; }
    .hp-heart.lost { opacity: 0.2; filter: grayscale(1); }
    .combo {
      font-size: 14px;
      color: var(--warn);
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
    }
    .combo.active { animation: comboPulse 0.5s ease; }
    @keyframes comboPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .score {
      font-size: 14px;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
    }
    .timer {
      font-size: 16px;
      color: var(--danger);
      font-family: 'Share Tech Mono', monospace;
      font-weight: bold;
    }
    .timer.warning { animation: timerBlink 0.5s ease infinite; }
    @keyframes timerBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== 主内容区 ===== */
    main {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ===== 关卡选择 ===== */
    .stage-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .stage-card {
      background: var(--panel);
      border: 1px solid rgba(0,245,212,0.2);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .stage-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,245,212,0.15);
    }
    .stage-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .stage-card.completed {
      border-color: var(--success);
    }
    .stage-card.completed::after {
      content: '✓';
      position: absolute;
      top: 8px; right: 12px;
      color: var(--success);
      font-size: 16px;
      font-weight: bold;
    }
    .stage-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-family: 'Orbitron', sans-serif;
    }
    .stage-name {
      font-size: 13px;
      font-weight: 600;
      margin-top: 6px;
      color: #fff;
    }
    .stage-desc {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }
    .stage-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    /* ===== 游戏面板 ===== */
    .game-panel {
      background: var(--panel);
      border: 1px solid rgba(0,245,212,0.15);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
    }
    .panel-title::before {
      content: '▸ ';
      color: var(--accent2);
    }
    .q-counter {
      font-size: 12px;
      color: var(--text2);
      font-family: 'Share Tech Mono', monospace;
      background: rgba(0,245,212,0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ===== 题目区域 ===== */
    .question-area {
      margin-bottom: 16px;
    }
    .question-text {
      font-size: 15px;
      line-height: 1.8;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
    }
    .question-canvas {
      display: block;
      margin: 0 auto 16px;
      max-width: 100%;
      border-radius: 8px;
      background: #0d0f1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ===== 选项 ===== */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option-btn {
      background: var(--panel2);
      border: 1px solid rgba(0,245,212,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', 'PingFang SC', 'Microsoft YaHei', monospace;
    }
    .option-btn:hover {
      border-color: var(--accent);
      background: rgba(0,245,212,0.08);
    }
    .option-btn.correct {
      border-color: var(--success);
      background: rgba(6,214,160,0.12);
      color: var(--success);
    }
    .option-btn.wrong {
      border-color: var(--danger);
      background: rgba(239,71,111,0.12);
      color: var(--danger);
    }
    .option-btn:disabled { cursor: default; }

    /* ===== 计算输入 ===== */
    .calc-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .calc-input {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .calc-input input {
      background: var(--panel2);
      border: 1px solid rgba(0,245,212,0.3);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      width: 120px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
    }
    .calc-input input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(0,245,212,0.2);
    }
    .calc-input .unit {
      font-size: 13px;
      color: var(--text2);
    }
    .calc-hint {
      font-size: 12px;
      color: var(--text2);
      background: rgba(0,245,212,0.06);
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      font-family: 'Share Tech Mono', monospace;
    }

    /* ===== 反馈区 ===== */
    .feedback {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct {
      background: rgba(6,214,160,0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }
    .feedback.wrong {
      background: rgba(239,71,111,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .feedback .fb-title {
      font-weight: 700;
      margin-bottom: 4px;
      font-family: 'Orbitron', sans-serif;
    }
    .feedback .fb-detail {
      font-size: 13px;
      line-height: 1.6;
    }

    /* ===== 实验原理按钮 ===== */
    .principle-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,245,212,0.08);
      border: 1px solid rgba(0,245,212,0.25);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
      font-family: 'Share Tech Mono', monospace;
      transition: all 0.2s;
    }
    .principle-btn:hover {
      background: rgba(0,245,212,0.15);
    }
    .principle-box {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: rgba(0,245,212,0.05);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
    }
    .principle-box.show { display: block; }

    /* ===== 误差提示框 ===== */
    .error-tip {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(255,209,102,0.08);
      border: 1px solid var(--warn);
      border-radius: 6px;
      font-size: 12px;
      color: var(--warn);
    }
    .error-tip.show { display: block; }

    /* ===== 导航按钮 ===== */
    .nav-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }
    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,245,212,0.3);
    }
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(0,245,212,0.3);
    }
    .btn-secondary:hover {
      background: rgba(0,245,212,0.1);
    }

    /* ===== 实例卡片（Stage 2用） ===== */
    .instance-card {
      background: var(--panel2);
      border: 1px solid rgba(0,245,212,0.15);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      max-width: 400px;
    }
    .instance-card:hover {
      border-color: var(--accent);
    }
    .instance-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .instance-body {
      flex: 1;
    }
    .instance-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .instance-desc {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* ===== 阶段结果 ===== */
    .stage-result {
      text-align: center;
      padding: 30px 20px;
    }
    .grade-display {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      font-family: 'Orbitron', sans-serif;
    }
    .grade-S { color: var(--warn); text-shadow: 0 0 20px rgba(255,209,102,0.3); }
    .grade-A { color: var(--success); }
    .grade-B { color: var(--accent2); }
    .grade-C { color: #ffaa66; }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 16px 0;
      font-size: 14px;
    }
    .result-stat {
      text-align: center;
    }
    .result-stat .val {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
    }
    .result-stat .lab {
      font-size: 11px;
      color: var(--text2);
    }

    /* ===== 徽章 ===== */
    .badge-box {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(255,209,102,0.08), rgba(0,245,212,0.08));
      border: 1px solid var(--warn);
      border-radius: 12px;
      animation: badgeGlow 2s ease infinite;
    }
    .badge-box.show { display: block; }
    @keyframes badgeGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(255,209,102,0.1); }
      50% { box-shadow: 0 0 25px rgba(255,209,102,0.25); }
    }
    .badge-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--warn);
      font-family: 'Orbitron', sans-serif;
    }
    .badge-desc {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* ===== 底部导航 ===== */
    footer {
      padding: 12px 20px;
      background: var(--glass);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(0,245,212,0.15);
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-link {
      font-size: 12px;
      color: var(--text2);
      text-decoration: none;
      transition: color 0.2s;
      font-family: 'Share Tech Mono', monospace;
    }
    .footer-link:hover { color: var(--accent); }

    /* ===== 总结果面板 ===== */
    .final-result {
      text-align: center;
      padding: 24px;
    }
    .final-grade {
      font-size: 96px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
    }
    .badge-collection {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .mini-badge {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: var(--panel2);
      border: 2px solid rgba(0,245,212,0.15);
    }
    .mini-badge.earned {
      border-color: var(--warn);
      background: rgba(255,209,102,0.1);
    }

    /* ===== 隐藏类 ===== */
    .hidden { display: none !important; }

    /* ===== 响应式 ===== */
    @media (max-width: 600px) {
      h1 { font-size: 18px; }
      .stage-selector { grid-template-columns: repeat(2, 1fr); }
      .game-panel { padding: 14px; }
      .question-canvas { max-width: 100%; }
    }

    /* ===== 启动画面 ===== */
    .splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.8s, visibility 0.8s;
    }
    .splash.done { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-icon { font-size: 64px; }
    .splash h2 {
      font-size: 28px;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
    }
    .splash p {
      color: var(--text2);
      font-size: 14px;
      font-family: 'Share Tech Mono', monospace;
    }
    .splash-start {
      margin-top: 20px;
      padding: 14px 40px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .splash-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0,245,212,0.4);
    }

    /* Shake animation */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* Glow flash */
    @keyframes flashGreen {
      0% { box-shadow: 0 0 0 rgba(6,214,160,0); }
      50% { box-shadow: 0 0 30px rgba(6,214,160,0.4); border-color: var(--success); }
      100% { box-shadow: 0 0 0 rgba(6,214,160,0); }
    }
    .flash-ok { animation: flashGreen 0.6s ease; }
  </style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <div class="bg-deco" id="bgDeco"></div>

  <!-- 启动画面 -->
  <div class="splash" id="splash">
    <div class="splash-icon">🔥</div>
    <h2>特工装备室 · 第十章</h2>
    <p>代号 THERMAL · 部门：热力学实验室</p>
    <p style="font-size:12px">初中物理 · 九年级全一册 · 内能</p>
    <button class="splash-start" onclick="enterGame()">进入装备室</button>
  </div>

  <div id="app">
    <header>
      <div class="lab-badge">THERMAL LAB · THERMAL</div>
      <h1>特工装备室 · 第十章 内能</h1>
      <div class="chapter-info">初中物理 · 九年级全一册 · 热力学实验室</div>
    </header>

    <div class="hud" id="hud">
      <div class="hud-group">
        <div class="hp-bar" id="hpBar">
          <span class="hp-heart" id="hp1">❤️</span>
          <span class="hp-heart" id="hp2">❤️</span>
          <span class="hp-heart" id="hp3">❤️</span>
        </div>
        <span class="combo" id="comboDisplay"></span>
      </div>
      <div class="hud-group">
        <span class="score" id="scoreDisplay">得分: 0</span>
        <span class="timer hidden" id="timerDisplay">⏱ 60</span>
      </div>
    </div>

    <main id="mainContent">
      <!-- 动态内容 -->
    </main>

    <footer>
      <a class="footer-link" href="#" onclick="showMenu()">◈ 任务目录</a>
      <a class="footer-link" href="#" onclick="showHelp()">◈ 操作手册</a>
      <a class="footer-link" href="#" onclick="resetGame()">◈ 重置任务</a>
    </footer>
  </div>

<script>
// ==================== 游戏状态 ====================
const STATE = {
  hp: 3,
  score: 0,
  combo: 0,
  maxCombo: 0,
  currentStage: 0,
  currentQ: 0,
  stagesCompleted: [false, false, false, false, false],
  stageGrades: ['', '', '', '', ''],
  badges: [],
  timer: null,
  timeLeft: 60,
};

// ==================== 题目数据 ====================
const QUESTIONS = {
  // Stage 1: 扩散与分子运动 (6题)

// ==================== 初始化 ====================
function initBg() {
  const bg = document.getElementById('bgDeco');
  const mols = ['⚛️','🔬','🧪','🔥','🌡️','💧'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'molecule';
    el.textContent = mols[Math.floor(Math.random()*mols.length)];
    el.style.position = 'absolute';
    el.style.left = Math.random()*100 + '%';
    el.style.top = Math.random()*100 + '%';
    el.style.animationDelay = Math.random()*6 + 's';
    el.style.animationDuration = (5+Math.random()*4) + 's';
    el.style.fontSize = (12+Math.random()*14) + 'px';
    el.style.opacity = '0.08';
    bg.appendChild(el);
  }
  const flames = [{t:'🔥',x:'85%',y:'15%'}, {t:'🌡️',x:'10%',y:'80%'}, {t:'🔥',x:'5%',y:'20%'}];
  flames.forEach(f => {
    const el = document.createElement('div');
    el.style.position = 'absolute';
    el.textContent = f.t;
    el.style.left = f.x;
    el.style.top = f.y;
    el.style.fontSize = '20px';
    el.style.opacity = '0.1';
    bg.appendChild(el);
  });
}

function enterGame() {
  document.getElementById('splash').classList.add('done');
  showMenu();
}

// ==================== 菜单 ====================
function showMenu() {
  clearTimer();
  STATE.currentStage = 0;
  const timerEl = document.getElementById('timerDisplay');
  timerEl.classList.add('hidden');

  let html = '<div style="margin-bottom:12px;font-size:13px;color:var(--text2)">选择任务项目：</div>';
  html += '<div class="stage-selector">';
  for (let i = 0; i < 5; i++) {
    const locked = i > 0 && !STATE.stagesCompleted[i-1];
    const cls = locked ? 'locked' : (STATE.stagesCompleted[i] ? 'completed' : '');
    const grade = STATE.stageGrades[i] ? `<span style="color:${gradeColor(STATE.stageGrades[i])};font-size:11px;margin-left:4px">${STATE.stageGrades[i]}</span>` : '';
    html += `
      <div class="stage-card ${cls}" onclick="${locked ? '' : `startStage(${i+1})`}">
        <div class="stage-icon">${STAGE_ICONS[i]}</div>
        <div class="stage-num">${i+1}</div>
        <div class="stage-name">${STAGE_NAMES[i]}${grade}</div>
        <div class="stage-desc">${STAGE_DESCS[i]}</div>
      </div>
    `;
  }
  html += '</div>';

  // 总评区域
  const allDone = STATE.stagesCompleted.every(x=>x);
  if (allDone || STATE.score > 0) {
    html += '<div style="margin-top:24px;text-align:center;">';
    html += `<div style="font-size:14px;color:var(--text2);margin-bottom:8px">当前总得分</div>`;
    html += `<div style="font-size:36px;font-weight:800;color:var(--accent);font-family:Orbitron,sans-serif">${STATE.score}</div>`;
    if (allDone) {
      const overall = overallGrade();
      html += `<div style="margin-top:12px;font-size:18px;color:var(--accent)">综合评价: <span style="font-weight:800;font-size:28px;color:${gradeColor(overall)};font-family:Orbitron,sans-serif">${overall}</span></div>`;
      if (overall === 'S' && !STATE.badges.includes('热力学大师')) {
        STATE.badges.push('热力学大师');
      }
      if (STATE.badges.includes('热力学大师')) {
        html += `<div style="margin-top:16px;padding:12px;border:2px solid var(--warn);border-radius:12px;display:inline-block;">`;
        html += `<div style="font-size:24px">🏅 热力学大师</div>`;
        html += `<div style="font-size:12px;color:var(--text2)">已获得全部阶段S评价</div></div>`;
      }
    }
    html += '</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
}

function gradeColor(g) {
  const map = {S:'var(--warn)',A:'var(--success)',B:'var(--accent2)',C:'#ffaa66'};
  return map[g] || '#fff';
}

function overallGrade() {
  const counts = {S:0,A:0,B:0,C:0};
  STATE.stageGrades.forEach(g => { if(counts[g]!==undefined) counts[g]++; });
  if (counts.S >= 4) return 'S';
  if (counts.S + counts.A >= 4) return 'A';
  if (counts.S + counts.A + counts.B >= 4) return 'B';
  return 'C';
}

// ==================== 关卡开始 ====================
function startStage(n) {
  STATE.currentStage = n;
  STATE.currentQ = 0;
  STATE.combo = 0;
  updateHUD();
  showQuestion();
}

function showQuestion() {
  const stage = STATE.currentStage;
  const qIdx = STATE.currentQ;
  const questions = QUESTIONS[stage];

  if (qIdx >= questions.length) {
    showStageResult();
    return;
  }

  const q = questions[qIdx];
  let html = '';

  // 面板头部
  html += `<div class="game-panel">`;
  html += `<div class="panel-header">`;
  html += `<div class="panel-title">Stage ${stage} · ${STAGE_NAMES[stage-1]}</div>`;
  html += `<div class="q-counter">${qIdx+1} / ${questions.length}</div>`;
  html += `</div>`;

  // 题目内容
  html += `<div class="question-area">`;
  html += `<div class="question-text">${q.text}</div>`;
  html += `</div>`;

  // Stage特定Canvas或实例卡片
  if (stage === 1 && q.canvas && q.canvas !== 'none') {
    html += `<canvas id="stageCanvas" class="question-canvas" width="400" height="220"></canvas>`;
  } else if (stage === 2 && q.instance) {
    html += `<div class="instance-card" style="margin-bottom:12px;max-width:360px">`;
    html += `<div class="instance-icon">${q.instance.icon}</div>`;
    html += `<div class="instance-body">`;
    html += `<div class="instance-title">${q.instance.title}</div>`;
    html += `<div class="instance-desc">${q.instance.desc}</div>`;
    html += `</div></div>`;
    if (q.canvas && q.canvas !== 'none') {
      html += `<canvas id="stageCanvas" class="question-canvas" width="400" height="180"></canvas>`;
    }
  } else if (stage === 4 && q.canvas && q.canvas !== 'none') {
    html += `<canvas id="stageCanvas" class="question-canvas" width="400" height="240"></canvas>`;
  }

  // 选项或输入
  if (stage === 3) {
    html += `<div class="calc-area">`;
    html += `<div class="calc-hint">${q.formula}</div>`;
    html += `<div class="calc-input">`;
    html += `<input type="text" id="calcAnswer" placeholder="输入数值" onkeydown="if(event.key==='Enter')submitCalc()">`;
    html += `<span class="unit">${q.unit}</span>`;
    html += `<button class="btn btn-primary" onclick="submitCalc()">提交</button>`;
    html += `</div></div>`;
  } else {
    html += `<div class="options">`;
    q.opts.forEach((opt, i) => {
      html += `<button class="option-btn" id="opt${i}" onclick="selectOption(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
    });
    html += `</div>`;
  }

  // 反馈区
  html += `<div class="feedback" id="feedback"><div class="fb-title"></div><div class="fb-detail"></div></div>`;

  // 误差提示
  html += `<div class="error-tip" id="errorTip"></div>`;

  // 实验原理
  html += `<button class="principle-btn" id="prinBtn" style="display:none" onclick="togglePrinciple()">◈ 查看实验原理</button>`;
  html += `<div class="principle-box" id="principleBox"><b>实验原理：</b>${q.explain}</div>`;

  // 导航
  html += `<div class="nav-btns" id="navBtns" style="display:none">`;
  html += `<button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>`;
  if (stage === 1 && qIdx < questions.length-1) {
    html += `<button class="btn btn-secondary" onclick="showMenu()">返回目录</button>`;
  }
  html += `</div>`;

  html += `</div>`;

  document.getElementById('mainContent').innerHTML = html;

  // 绘制Canvas
  if (stage === 1) {
    if (q.canvas === 'diffusion') drawDiffusion();
    else if (q.canvas === 'diffusion-compare') drawDiffusionCompare();
    else if (q.canvas === 'molecule-attract') drawMoleculeAttract();
    else if (q.canvas === 'molecule-repel') drawMoleculeRepel();
  } else if (stage === 2) {
    if (q.canvas === 'compress') drawCompressPiston();
  } else if (stage === 4) {
    if (q.canvas === 'engine') drawEngineCycle(2); // 做功冲程
    else if (q.canvas === 'engine-compress') drawEngineCycle(1); // 压缩冲程
    else if (q.canvas === 'engine-intake') drawEngineCycle(0); // 吸气冲程
    else if (q.canvas === 'engine-compress2') drawEngineCycle(1); // 压缩冲程
  }

  // Stage 5启动计时器
  if (stage === 5 && qIdx === 0) {
    STATE.timeLeft = 60;
    const timerEl = document.getElementById('timerDisplay');
    timerEl.classList.remove('hidden');
    startTimer();
  }
}

// ==================== Canvas: 扩散动画 ====================
function drawDiffusion() {
  const canvas = document.getElementById('stageCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#0d0f1a';
  ctx.fillRect(0,0,w,h);

  // 烧杯
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(80, 40);
  ctx.lineTo(80, 160);
  ctx.lineTo(320, 160);
  ctx.lineTo(320, 40);
  ctx.stroke();

  // 水面
  ctx.strokeStyle = '#00bbf9';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 50);
  ctx.quadraticCurveTo(200, 55, 320, 50);
  ctx.stroke();

  // 扩散的墨水粒子
  const particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: 90 + Math.random() * 220,
      y: 60 + Math.random() * 95,
      r: 2 + Math.random() * 3,
      alpha: 0.3 + Math.random() * 0.5
    });
  }
  // 浓度梯度：左侧浓右侧淡
  particles.forEach(p => {
    const intensity = Math.max(0, 1 - (p.x - 90) / 200);
    ctx.fillStyle = `rgba(0,245,212,${p.alpha * intensity})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });

  // 标签
  ctx.fillStyle = '#c0c8d8';
  ctx.font = 'bold 12px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('墨水在水中扩散', w/2, 185);
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.fillStyle = '#8b8b9a';
  ctx.fillText('分子自发运动，从高浓度区域向低浓度区域扩散', w/2, 205);
}

function drawDiffusionCompare() {
  const canvas = document.getElementById('stageCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#0d0f1a';
  ctx.fillRect(0,0,w,h);

  // 左杯：冷水
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(40, 40); ctx.lineTo(40, 140);
  ctx.lineTo(170, 140); ctx.lineTo(170, 40);
  ctx.stroke();

  // 右杯：热水
  ctx.beginPath();
  ctx.moveTo(230, 40); ctx.lineTo(230, 140);
  ctx.lineTo(360, 140); ctx.lineTo(360, 40);
  ctx.stroke();

  // 冷水中的墨水（扩散慢，较集中）
  for (let i = 0; i < 25; i++) {
    ctx.fillStyle = `rgba(0,245,212,${0.2 + Math.random()*0.4})`;
    ctx.beginPath();
    ctx.arc(50 + Math.random()*60, 55 + Math.random()*80, 2+Math.random()*3, 0, Math.PI*2);
    ctx.fill();
  }

  // 热水中的墨水（扩散快，较均匀）
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = `rgba(0,187,249,${0.15 + Math.random()*0.35})`;
    ctx.beginPath();
    ctx.arc(240 + Math.random()*110, 55 + Math.random()*80, 2+Math.random()*3, 0, Math.PI*2);
    ctx.fill();
  }

  // 标签
  ctx.fillStyle = '#c0c8d8';
  ctx.font = 'bold 12px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('❄️ 冷水', 105, 160);
  ctx.fillText('🔥 热水', 295, 160);
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.fillStyle = '#8b8b9a';
  ctx.fillText('温度越高，分子运动越剧烈，扩散越快', w/2, 195);
}

// ==================== Canvas: 四冲程汽油机 ====================
function drawEngineCycle(strokeIndex) {
  const canvas = document.getElementById('stageCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#0d0f1a';
  ctx.fillRect(0,0,w,h);

  const cx = w/2, cy = h/2 + 10;
  const cw = 140, ch = 100; // cylinder

  const strokeNames = ['吸气冲程', '压缩冲程', '做功冲程', '排气冲程'];
  const valveStates = [
    {intake:true, exhaust:false},  // 吸气：进气开，排气关
    {intake:false, exhaust:false}, // 压缩：都关
    {intake:false, exhaust:false}, // 做功：都关
    {intake:false, exhaust:true}   // 排气：进气关，排气开
  ];
  const pistonY = [cy + ch/2 - 10, cy - 5, cy + ch/2 - 10, cy - 5]; // 活塞位置
  const arrowDir = ['down', 'up', 'down', 'up']; // 运动方向

  const vs = valveStates[strokeIndex];
  const py = pistonY[strokeIndex];

  // 气缸
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - cw/2, cy - ch/2);
  ctx.lineTo(cx - cw/2, cy + ch/2);
  ctx.lineTo(cx + cw/2, cy + ch/2);
  ctx.lineTo(cx + cw/2, cy - ch/2);
  ctx.stroke();

  // 进气门
  const intakeX = cx - cw/4;
  ctx.strokeStyle = vs.intake ? '#06d6a0' : '#777';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(intakeX - 12, cy - ch/2 - 10);
  if (vs.intake) {
    ctx.lineTo(intakeX, cy - ch/2 - 2);
  } else {
    ctx.lineTo(intakeX, cy - ch/2 + 4);
  }
  ctx.lineTo(intakeX + 12, cy - ch/2 - 10);
  ctx.stroke();
  ctx.fillStyle = vs.intake ? '#06d6a0' : '#777';
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(vs.intake ? '进气门·开' : '进气门·关', intakeX, cy - ch/2 - 18);

  // 排气门
  const exhaustX = cx + cw/4;
  ctx.strokeStyle = vs.exhaust ? '#06d6a0' : '#777';
  ctx.beginPath();
  ctx.moveTo(exhaustX - 12, cy - ch/2 - 10);
  if (vs.exhaust) {
    ctx.lineTo(exhaustX, cy - ch/2 - 2);
  } else {
    ctx.lineTo(exhaustX, cy - ch/2 + 4);
  }
  ctx.lineTo(exhaustX + 12, cy - ch/2 - 10);
  ctx.stroke();
  ctx.fillStyle = vs.exhaust ? '#06d6a0' : '#777';
  ctx.fillText(vs.exhaust ? '排气门·开' : '排气门·关', exhaustX, cy - ch/2 - 18);

  // 活塞
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - cw/2 + 4, py - 6, cw - 8, 12);

  // 连杆
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, py);
  ctx.lineTo(cx + 30, cy + ch/2 + 20);
  ctx.stroke();

  // 曲轴
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(cx + 30, cy + ch/2 + 20, 8, 0, Math.PI*2);
  ctx.fill();

  // 运动方向箭头
  ctx.strokeStyle = '#00f5d4';
  ctx.lineWidth = 2;
  const dir = arrowDir[strokeIndex];
  const arrowY = py + (dir === 'down' ? 25 : -25);
  ctx.beginPath();
  ctx.moveTo(cx + cw/2 + 15, py);
  ctx.lineTo(cx + cw/2 + 15, arrowY);
  if (dir === 'down') {
    ctx.lineTo(cx + cw/2 + 10, arrowY - 5);
    ctx.moveTo(cx + cw/2 + 15, arrowY); ctx.lineTo(cx + cw/2 + 20, arrowY - 5);
  } else {
    ctx.lineTo(cx + cw/2 + 10, arrowY + 5);
    ctx.moveTo(cx + cw/2 + 15, arrowY); ctx.lineTo(cx + cw/2 + 20, arrowY + 5);
  }
  ctx.stroke();
  ctx.fillStyle = '#00f5d4';
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.fillText(dir === 'down' ? '活塞↓' : '活塞↑', cx + cw/2 + 35, arrowY + 4);

  // 标题
  ctx.fillStyle = '#00f5d4';
  ctx.font = 'bold 13px "Orbitron", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(strokeNames[strokeIndex], w/2, 22);

  // 能量转化标注
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.fillStyle = '#8b8b9a';
  if (strokeIndex === 1) {
    ctx.fillText('能量转化：机械能 → 内能', w/2, h - 15);
  } else if (strokeIndex === 2) {
    ctx.fillText('能量转化：内能 → 机械能', w/2, h - 15);
  } else {
    ctx.fillText('无明显能量转化', w/2, h - 15);
  }
}

// ==================== 答题逻辑 ====================
function selectOption(idx) {
  const stage = STATE.currentStage;
  const qIdx = STATE.currentQ;
  const q = QUESTIONS[stage][qIdx];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === idx && i !== q.ans) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  const isCorrect = idx === q.ans;

  if (isCorrect) {
    STATE.combo++;
    if (STATE.combo > STATE.maxCombo) STATE.maxCombo = STATE.combo;
    const pts = stage === 5 ? 30 : (20 + STATE.combo * 2);
    STATE.score += pts;
    fb.className = 'feedback show correct';
    fb.querySelector('.fb-title').textContent = '◈ 正确！';
    fb.querySelector('.fb-detail').textContent = `+${pts}分 · 连击x${STATE.combo}`;
  } else {
    STATE.combo = 0;
    STATE.hp--;
    fb.className = 'feedback show wrong';
    fb.querySelector('.fb-title').textContent = '◈ 错误';
    fb.querySelector('.fb-detail').textContent = `正确答案是：${String.fromCharCode(65+q.ans)}. ${q.opts[q.ans]}`;

    // 误差提示
    if (stage === 1) {
      showErrorTip('误差提示：扩散是分子级别的自发运动，肉眼可见的灰尘、雪花等机械运动不是扩散。分子间同时存在引力和斥力。');
    } else if (stage === 2) {
      showErrorTip('误差提示：做功是能量转化（如机械能→内能），热传递是能量转移（高温→低温）。摩擦、压缩都是做功；加热、冷却、晒太阳都是热传递。');
    } else if (stage === 4) {
      showErrorTip('误差提示：四冲程口诀——吸气（进开排关活塞下）、压缩（都关活塞上）、做功（都关活塞下）、排气（进关排开活塞上）。压缩：机械能→内能；做功：内能→机械能。');
    }
  }

  updateHUD();
  document.getElementById('prinBtn').style.display = 'inline-flex';
  document.getElementById('navBtns').style.display = 'flex';

  if (STATE.hp <= 0) {
    setTimeout(() => gameOver(), 800);
  }
}

function submitCalc() {
  const stage = STATE.currentStage;
  const qIdx = STATE.currentQ;
  const q = QUESTIONS[stage][qIdx];
  const input = document.getElementById('calcAnswer');
  const val = parseFloat(input.value);

  if (isNaN(val)) {
    input.style.borderColor = '#ef476f';
    return;
  }

  const isCorrect = Math.abs(val - q.answer) <= q.tolerance;
  const fb = document.getElementById('feedback');

  if (isCorrect) {
    STATE.combo++;
    if (STATE.combo > STATE.maxCombo) STATE.maxCombo = STATE.combo;
    const pts = 25 + STATE.combo * 2;
    STATE.score += pts;
    fb.className = 'feedback show correct';
    fb.querySelector('.fb-title').textContent = '◈ 计算正确！';
    fb.querySelector('.fb-detail').textContent = `+${pts}分 · 连击x${STATE.combo}`;
    input.style.borderColor = '#06d6a0';
    input.style.background = 'rgba(6,214,160,0.1)';
  } else {
    STATE.combo = 0;
    STATE.hp--;
    fb.className = 'feedback show wrong';
    fb.querySelector('.fb-title').textContent = '◈ 计算错误';
    fb.querySelector('.fb-detail').textContent = `正确答案是 ${q.answer}${q.unit}。${q.explain}`;
    input.style.borderColor = '#ef476f';
    showErrorTip('误差提示：Q吸=cm(t-t₀)，Q放=cm(t₀-t)。注意ΔT是温度变化量，不是最终温度。单位统一为kg和℃。');
  }

  input.disabled = true;
  updateHUD();
  document.getElementById('prinBtn').style.display = 'inline-flex';
  document.getElementById('navBtns').style.display = 'flex';

  if (STATE.hp <= 0) {
    setTimeout(() => gameOver(), 800);
  }
}

function showErrorTip(msg) {
  const tip = document.getElementById('errorTip');
  tip.textContent = msg;
  tip.classList.add('show');
}

function togglePrinciple() {
  document.getElementById('principleBox').classList.toggle('show');
}

function nextQuestion() {
  STATE.currentQ++;
  showQuestion();
}

// ==================== 计时器 ====================
function startTimer() {
  clearTimer();
  const timerEl = document.getElementById('timerDisplay');
  timerEl.classList.remove('hidden');
  timerEl.classList.remove('warning');

  STATE.timer = setInterval(() => {
    STATE.timeLeft--;
    timerEl.textContent = `⏱ ${STATE.timeLeft}`;
    if (STATE.timeLeft <= 10) timerEl.classList.add('warning');
    if (STATE.timeLeft <= 0) {
      clearTimer();
      timerEl.textContent = '⏱ 0';
      showStageResult();
    }
  }, 1000);
}

function clearTimer() {
  if (STATE.timer) { clearInterval(STATE.timer); STATE.timer = null; }
}

// ==================== 关卡结果 ====================
function showStageResult() {
  clearTimer();
  const stage = STATE.currentStage;
  const questions = QUESTIONS[stage];
  const totalQ = questions.length;
  const attempted = STATE.currentQ >= totalQ ? totalQ : STATE.currentQ;

  // 估算正确数 (简化)
  let correct = attempted;
  const lostHP = 3 - STATE.hp;
  correct = Math.max(0, attempted - lostHP);
  if (stage === 5 && STATE.timeLeft <= 0) {
    correct = Math.max(0, STATE.currentQ - lostHP);
  }

  const ratio = correct / totalQ;
  let grade = 'C';
  if (ratio >= 0.95 && lostHP === 0) grade = 'S';
  else if (ratio >= 0.8) grade = 'A';
  else if (ratio >= 0.6) grade = 'B';

  STATE.stagesCompleted[stage-1] = true;
  STATE.stageGrades[stage-1] = grade;

  let html = `<div class="game-panel"><div class="stage-result">`;
  html += `<div style="font-size:14px;color:var(--text2);margin-bottom:8px">Stage ${stage} 完成</div>`;
  html += `<div class="grade-display grade-${grade}">${grade}</div>`;
  html += `<div style="font-size:13px;color:var(--text2)">${gradeText(grade)}</div>`;

  html += `<div class="result-stats">`;
  html += `<div class="result-stat"><div class="val">${correct}</div><div class="lab">正确</div></div>`;
  html += `<div class="result-stat"><div class="val">${totalQ}</div><div class="lab">总题</div></div>`;
  html += `<div class="result-stat"><div class="val">${STATE.maxCombo}</div><div class="lab">最高连击</div></div>`;
  html += `<div class="result-stat"><div class="val">${STATE.score}</div><div class="lab">总分</div></div>`;
  html += `</div>`;

  if (grade === 'S') {
    html += `<div class="badge-box show">`;
    html += `<div class="badge-title">🏅 ${STAGE_NAMES[stage-1]} 专家</div>`;
    html += `<div class="badge-desc">在${STAGE_NAMES[stage-1]}中获得S评价</div>`;
    html += `</div>`;
  }

  html += `<div class="nav-btns" style="display:flex">`;
  if (stage < 5) {
    html += `<button class="btn btn-primary" onclick="startStage(${stage+1})">进入 Stage ${stage+1} →</button>`;
  }
  html += `<button class="btn btn-secondary" onclick="showMenu()">返回目录</button>`;
  html += `</div>`;

  html += `</div></div>`;
  document.getElementById('mainContent').innerHTML = html;

  const timerEl = document.getElementById('timerDisplay');
  timerEl.classList.add('hidden');
  timerEl.classList.remove('warning');
}

function gradeText(g) {
  const map = {S:'完美实验！数据精准无误',A:'优秀！实验操作规范',B:'良好，注意细节',C:'继续练习，掌握原理'};
  return map[g] || '';
}

// ==================== 游戏结束 ====================
function gameOver() {
  clearTimer();
  let html = `<div class="game-panel"><div class="stage-result">`;
  html += `<div style="font-size:48px;margin-bottom:12px">💔</div>`;
  html += `<div style="font-size:20px;font-weight:700;color:var(--danger);margin-bottom:8px">实验中断</div>`;
  html += `<div style="font-size:13px;color:var(--text2)">生命值耗尽，实验数据丢失</div>`;
  html += `<div style="margin-top:16px;font-size:14px">最终得分: <b style="color:var(--accent)">${STATE.score}</b></div>`;
  html += `<div class="nav-btns" style="display:flex;margin-top:20px">`;
  html += `<button class="btn btn-primary" onclick="resetGame()">重新开始</button>`;
  html += `<button class="btn btn-secondary" onclick="showMenu()">返回目录</button>`;
  html += `</div></div></div>`;
  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('timerDisplay').classList.add('hidden');
}

// ==================== 重置 ====================
function resetGame() {
  clearTimer();
  STATE.hp = 3;
  STATE.score = 0;
  STATE.combo = 0;
  STATE.maxCombo = 0;
  STATE.currentStage = 0;
  STATE.currentQ = 0;
  STATE.stagesCompleted = [false,false,false,false,false];
  STATE.stageGrades = ['','','','',''];
  STATE.badges = [];
  STATE.timeLeft = 60;
  updateHUD();
  showMenu();
}

function updateHUD() {
  for (let i=1; i<=3; i++) {
    const el = document.getElementById('hp'+i);
    if (el) el.classList.toggle('lost', i > STATE.hp);
  }
  const comboEl = document.getElementById('comboDisplay');
  if (STATE.combo > 1) {
    comboEl.textContent = `◈ x${STATE.combo}`;
    comboEl.classList.add('active');
    setTimeout(() => comboEl.classList.remove('active'), 500);
  } else {
    comboEl.textContent = '';
  }
  document.getElementById('scoreDisplay').textContent = `得分: ${STATE.score}`;
}
