<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 能源实验室 — 九年级物理第十七章</title>
<style>
:root {
  --neon-purple: #9d00ff;
  --hot-magenta: #ff00ff;
  --deep-bg: #1a0a2e;
  --panel-bg: #2a1a4a;
  --panel-border: #9d00ff44;
  --text-main: #f0e6ff;
  --text-dim: #a080c0;
  --success: #00ff88;
  --danger: #ff3366;
  --warning: #ffcc00;
  --combo-glow: 0 0 20px #ff00ff88;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--deep-bg);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background particles */
#bgCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* Main container */
.app {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto;
  padding: 16px; min-height: 100vh;
  display: flex; flex-direction: column;
}

/* Header */
.header {
  text-align: center; padding: 20px 0 12px;
  border-bottom: 1px solid var(--panel-border);
  margin-bottom: 16px;
}

.header h1 {
  font-size: 1.6rem; font-weight: 800;
  background: linear-gradient(90deg, var(--neon-purple), var(--hot-magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px var(--neon-purple)44;
}

.header .subtitle {
  color: var(--text-dim); font-size: 0.85rem; margin-top: 4px;
  letter-spacing: 2px;
}

/* HUD */
.hud {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 12px; padding: 12px 16px;
  margin-bottom: 16px;
}

.hearts { font-size: 1.4rem; letter-spacing: 2px; }
.heart.lost { opacity: 0.3; filter: grayscale(1); }

.score-info { text-align: right; }
.score-info .score { font-size: 1.3rem; font-weight: 700; color: var(--hot-magenta); }
.score-info .combo { font-size: 0.8rem; color: var(--warning); }
.combo.active { animation: comboPulse 0.5s ease; }
@keyframes comboPulse {
  0%,100%{transform:scale(1)} 50%{transform:scale(1.3)}
}

/* Stage tabs */
.stage-nav {
  display: flex; gap: 6px; margin-bottom: 16px;
  overflow-x: auto; padding-bottom: 4px;
}
.stage-tab {
  flex: 1; min-width: 90px; text-align: center;
  padding: 10px 8px; border-radius: 10px;
  background: var(--panel-bg); border: 1px solid var(--panel-border);
  font-size: 0.75rem; cursor: pointer; transition: all 0.3s;
  color: var(--text-dim);
}
.stage-tab.active {
  background: linear-gradient(135deg, var(--neon-purple)33, var(--hot-magenta)33);
  border-color: var(--neon-purple);
  color: var(--text-main); font-weight: 700;
  box-shadow: 0 0 15px var(--neon-purple)44;
}
.stage-tab.locked { opacity: 0.4; cursor: not-allowed; }
.stage-tab .stage-num { font-size: 1.1rem; display: block; margin-bottom: 2px; }

/* Game panel */
.game-panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 16px; padding: 20px;
  flex: 1; display: flex; flex-direction: column;
}

.stage-title {
  font-size: 1.2rem; font-weight: 700; margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
.stage-title .icon { font-size: 1.4rem; }

.progress-bar {
  height: 6px; background: #3a2a5a;
  border-radius: 3px; margin-bottom: 16px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--hot-magenta));
  border-radius: 3px; transition: width 0.5s ease;
}

/* Question */
.question-box { margin-bottom: 20px; }
.question-num {
  color: var(--hot-magenta); font-size: 0.8rem; font-weight: 700;
  margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
}
.question-text {
  font-size: 1.05rem; line-height: 1.6; font-weight: 500;
}
.question-text .hl {
  background: linear-gradient(90deg, var(--neon-purple)44, var(--hot-magenta)44);
  padding: 2px 6px; border-radius: 4px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  background: #3a2a5a;
  border: 1px solid #5a3a8a;
  border-radius: 12px; padding: 14px 16px;
  color: var(--text-main); font-size: 0.95rem;
  cursor: pointer; transition: all 0.25s;
  text-align: left; display: flex; align-items: center; gap: 10px;
}
.opt-btn:hover {
  border-color: var(--neon-purple);
  background: #4a3a6a;
  transform: translateX(4px);
}
.opt-btn.correct {
  border-color: var(--success); background: #00ff8822;
  animation: correctPop 0.4s ease;
}
.opt-btn.wrong {
  border-color: var(--danger); background: #ff336622;
  animation: wrongShake 0.4s ease;
}
.opt-btn.disabled { pointer-events: none; opacity: 0.7; }

@keyframes correctPop {
  0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)}
}
@keyframes wrongShake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
}

.opt-label {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--neon-purple); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
}
.opt-btn.correct .opt-label { background: var(--success); }
.opt-btn.wrong .opt-label { background: var(--danger); }

/* Feedback */
.feedback {
  padding: 12px 16px; border-radius: 10px;
  margin-top: 16px; font-size: 0.9rem; line-height: 1.5;
  display: none;
}
.feedback.show { display: block; animation: fadeIn 0.3s ease; }
.feedback.correct-fb { background: #00ff8818; border: 1px solid var(--success); }
.feedback.wrong-fb { background: #ff336618; border: 1px solid var(--danger); }

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Explanation panel */
.explain-box {
  background: #1a0a2e88; border: 1px dashed var(--panel-border);
  border-radius: 10px; padding: 12px 14px;
  margin-top: 10px; font-size: 0.85rem; color: var(--text-dim);
  line-height: 1.6;
}
.explain-box strong { color: var(--hot-magenta); }

/* Timer for Stage 5 */
.timer-bar {
  height: 8px; background: #3a2a5a; border-radius: 4px;
  margin-bottom: 16px; overflow: hidden; position: relative;
}
.timer-fill {
  height: 100%; background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
  border-radius: 4px; transition: width 0.1s linear;
}
.timer-text {
  text-align: center; font-size: 1.3rem; font-weight: 700;
  color: var(--warning); margin-bottom: 8px;
}

/* Navigation buttons */
.nav-btns {
  display: flex; gap: 10px; margin-top: auto; padding-top: 16px;
}
.nav-btns button {
  flex: 1; padding: 14px; border-radius: 12px;
  border: none; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.25s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--neon-purple), var(--hot-magenta));
  color: #fff; box-shadow: 0 4px 20px var(--neon-purple)44;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--neon-purple)66; }
.btn-secondary {
  background: var(--panel-bg); border: 1px solid var(--panel-border);
  color: var(--text-main);
}
.btn-secondary:hover { border-color: var(--neon-purple); }

/* Screens */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; }

/* Start screen */
.start-screen {
  text-align: center; padding: 40px 20px;
  align-items: center; justify-content: center;
}
.start-screen .dept-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--neon-purple)33, var(--hot-magenta)33);
  border: 1px solid var(--neon-purple);
  padding: 8px 20px; border-radius: 20px;
  font-size: 0.85rem; margin-bottom: 24px;
}
.start-screen h2 {
  font-size: 2rem; font-weight: 800;
  background: linear-gradient(90deg, var(--neon-purple), var(--hot-magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.start-screen .tagline {
  color: var(--text-dim); font-size: 1rem; margin-bottom: 32px; max-width: 480px;
}
.start-screen .features {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; max-width: 480px; margin-bottom: 32px;
}
.start-screen .feature {
  background: var(--panel-bg); border: 1px solid var(--panel-border);
  border-radius: 12px; padding: 16px 8px; font-size: 0.8rem;
}
.start-screen .feature .emoji { font-size: 1.6rem; display: block; margin-bottom: 6px; }
.start-screen .start-btn {
  padding: 16px 48px; font-size: 1.2rem;
  background: linear-gradient(135deg, var(--neon-purple), var(--hot-magenta));
  border: none; border-radius: 16px; color: #fff;
  font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 30px var(--neon-purple)66;
  transition: all 0.3s;
}
.start-screen .start-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 40px var(--hot-magenta)88;
}

/* Result screen */
.result-screen { align-items: center; padding: 30px 20px; text-align: center; }
.result-screen .result-emoji { font-size: 4rem; margin-bottom: 12px; }
.result-screen .result-grade {
  font-size: 3rem; font-weight: 900;
  background: linear-gradient(90deg, var(--neon-purple), var(--hot-magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.result-screen .result-title { font-size: 1.3rem; margin-bottom: 16px; }
.result-screen .stats-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px; width: 100%; max-width: 400px; margin-bottom: 24px;
}
.result-screen .stat-box {
  background: var(--panel-bg); border: 1px solid var(--panel-border);
  border-radius: 12px; padding: 14px;
}
.result-screen .stat-box .stat-val {
  font-size: 1.5rem; font-weight: 700; color: var(--hot-magenta);
}
.result-screen .stat-box .stat-label { font-size: 0.75rem; color: var(--text-dim); }

/* Badge */
.badge-box {
  background: linear-gradient(135deg, var(--neon-purple)22, var(--hot-magenta)22);
  border: 2px solid var(--neon-purple);
  border-radius: 16px; padding: 20px;
  margin-bottom: 24px; max-width: 400px;
}
.badge-box .badge-icon { font-size: 3rem; margin-bottom: 8px; }
.badge-box .badge-name { font-size: 1.2rem; font-weight: 700; color: var(--hot-magenta); }
.badge-box .badge-desc { font-size: 0.85rem; color: var(--text-dim); }

/* Summary per stage */
.stage-summary {
  width: 100%; max-width: 400px; margin-bottom: 20px;
}
.stage-summary .ss-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--panel-border);
  font-size: 0.9rem;
}
.stage-summary .ss-row .ss-check { color: var(--success); }
.stage-summary .ss-row .ss-wrong { color: var(--danger); }

/* Decorations */
.deco-sun {
  position: fixed; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, var(--warning)22 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
  animation: sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse {
  0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.1);opacity:0.9}
}

.deco-windmill {
  position: fixed; bottom: 60px; left: 20px;
  font-size: 3rem; opacity: 0.15; pointer-events: none; z-index: 0;
  animation: spin 8s linear infinite;
}
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.deco-bolt {
  position: fixed; top: 30%; left: 10px;
  font-size: 2rem; opacity: 0.12; pointer-events: none; z-index: 0;
  animation: boltFlash 3s ease-in-out infinite;
}
@keyframes boltFlash {
  0%,100%{opacity:0.08} 50%{opacity:0.2}
}

/* Notebook lines effect */
.notebook-lines {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 31px, var(--neon-purple)08 31px, var(--neon-purple)08 32px
  );
  pointer-events: none; z-index: 0;
}

/* Responsive */
@media (max-width: 480px) {
  .header h1 { font-size: 1.2rem; }
  .start-screen h2 { font-size: 1.5rem; }
  .stage-tab { min-width: 70px; padding: 8px 4px; font-size: 0.7rem; }
  .features { grid-template-columns: 1fr !important; }
}

/* Entrance animations */
.fade-up { animation: fadeUp 0.5s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="deco-sun"></div>
<div class="deco-windmill">&#x1F3A8;</div>
<div class="deco-bolt">&#x26A1;</div>
<div class="notebook-lines"></div>

<div class="app">

  <!-- START SCREEN -->
  <div id="screenStart" class="screen active start-screen">
    <div class="dept-badge">
      <span>&#x26A1;</span> 能源实验室 · ENERGY DIVISION
    </div>
    <h2>能量的转移和转化</h2>
    <p class="tagline">九年级物理 · 第十七章<br>5大阶段 · 29道挑战 · 证明你是能源大师</p>
    <div class="features">
      <div class="feature"><span class="emoji">&#x2764;&#xFE0F;</span>3条生命</div>
      <div class="feature"><span class="emoji">&#x1F525;</span>连击系统</div>
      <div class="feature"><span class="emoji">&#x1F3C6;</span>S/A/B评级</div>
    </div>
    <button class="start-btn" onclick="startGame()">&#x26A1; 启动能源实验室</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="screenGame" class="screen">
    <div class="header">
      <h1>⚡ 能源实验室</h1>
      <div class="subtitle">第十七章 · 能量的转移和转化、能源</div>
    </div>

    <div class="hud">
      <div class="hearts" id="heartsDisplay">&#x2764;&#xFE0F;&#x2764;&#xFE0F;&#x2764;&#xFE0F;</div>
      <div class="score-info">
        <div class="score" id="scoreDisplay">0</div>
        <div class="combo" id="comboDisplay"></div>
      </div>
    </div>

    <div class="stage-nav" id="stageNav"></div>

    <div class="game-panel" id="gamePanel">
      <div class="stage-title" id="stageTitle"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div id="timerArea" style="display:none;">
        <div class="timer-text" id="timerText">60s</div>
        <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
      </div>
      <div id="questionArea"></div>
      <div class="nav-btns" id="navBtns"></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screenResult" class="screen result-screen">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-title" id="resultTitle"></div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="statScore">0</div><div class="stat-label">总分</div></div>
      <div class="stat-box"><div class="stat-val" id="statCombo">0</div><div class="stat-label">最高连击</div></div>
      <div class="stat-box"><div class="stat-val" id="statCorrect">0</div><div class="stat-label">正确数</div></div>
      <div class="stat-box"><div class="stat-val" id="statAccuracy">0%</div><div class="stat-label">正确率</div></div>
    </div>

    <div class="stage-summary" id="stageSummary"></div>

    <div class="badge-box" id="badgeBox" style="display:none;">
      <div class="badge-icon">&#x1F3C6;</div>
      <div class="badge-name">能源大师</div>
      <div class="badge-desc">你已掌握能量的转化与守恒，新能源的未来由你开启</div>
    </div>

    <div class="nav-btns" style="max-width:400px;">
      <button class="btn-secondary" onclick="restartGame()">&#x1F504; 再试一次</button>
      <button class="btn-primary" onclick="backToStart()">&#x2302; 返回首页</button>
    </div>
  </div>

</div>

<script>
// ======================= DATA =======================
const STAGES = [
  {
    id: 1, name: "能量转化", icon: "&#x1F4A5;",
    desc: "判断能量转化形式，应用能量守恒定律",
    questions: [
      {
        text: "自行车下坡时速度越来越快，此过程中主要发生的能量转化是？",
        options: ["重力势能→动能", "动能→重力势能", "内能→动能", "电能→动能"],
        answer: 0,
        explain: "下坡时高度降低，重力势能减小；速度增大，动能增大。重力势能转化为动能。"
      },
      {
        text: "给手机充电时，能量转化形式是？",
        options: ["化学能→电能", "电能→化学能", "电能→内能", "机械能→电能"],
        answer: 1,
        explain: "充电时外部电源提供电能，手机电池将电能转化为化学能储存起来。"
      },
      {
        text: "一个物体从高处自由下落（不计空气阻力），下落过程中机械能总量如何变化？",
        options: ["逐渐增大", "逐渐减小", "保持不变", "先增后减"],
        answer: 2,
        explain: "不计空气阻力时，只有重力做功，动能和重力势能相互转化，机械能守恒，总量保持不变。"
      },
      {
        text: "摩擦生热的过程中，能量的转化形式是？",
        options: ["电能→内能", "机械能→内能", "化学能→内能", "光能→内能"],
        answer: 1,
        explain: "摩擦力对物体做功，消耗机械能，使物体内能增加、温度升高，即机械能转化为内能。"
      },
      {
        text: "水电站发电时，能量转化的完整链条是？",
        options: ["电能→动能→势能", "势能→动能→电能", "化学能→热能→电能", "光能→动能→电能"],
        answer: 1,
        explain: "高处的水具有重力势能，流下时转化为动能，推动水轮机转动，再带动发电机将动能转化为电能。"
      },
      {
        text: "根据能量守恒定律，以下说法正确的是？",
        options: ["能量可以凭空产生", "能量可以凭空消失", "能量既不会凭空产生，也不会凭空消失", "永动机可以实现"],
        answer: 2,
        explain: "能量守恒定律：能量既不会凭空产生，也不会凭空消失，它只会从一种形式转化为另一种形式，或从一个物体转移到另一个物体，总量保持不变。"
      }
    ]
  },
  {
    id: 2, name: "热机", icon: "&#x1F6E1;",
    desc: "四冲程判断、热机效率计算、汽油机vs柴油机",
    questions: [
      {
        text: "四冲程汽油机的一个工作循环中，哪个冲程对外做功？",
        options: ["吸气冲程", "压缩冲程", "做功冲程", "排气冲程"],
        answer: 2,
        explain: "做功冲程中，燃气膨胀推动活塞向下运动，将内能转化为机械能，是唯一对外做功的冲程。"
      },
      {
        text: "某热机消耗燃料放出的热量 Q&#x2081;=2000J，对外做功 W=600J，该热机的效率是多少？",
        options: ["20%", "30%", "40%", "70%"],
        answer: 1,
        explain: "热机效率 &#x03B7; = W / Q&#x2081; = 600J / 2000J = 0.3 = 30%。"
      },
      {
        text: "汽油机和柴油机的主要区别之一是？",
        options: ["汽油机压燃，柴油机点燃", "汽油机点燃，柴油机压燃", "两者都是压燃", "两者都是点燃"],
        answer: 1,
        explain: "汽油机采用点燃式（火花塞点火），吸入的是汽油和空气的混合物；柴油机采用压燃式（压缩点火），吸入的是纯空气。"
      },
      {
        text: "四冲程内燃机一个工作循环中，活塞往复运动几次？",

// ======================= BG PARTICLES =======================
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

for (let i = 0; i < 50; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5,
    alpha: Math.random() * 0.6 + 0.1,
    color: Math.random() > 0.5 ? '#9d00ff' : '#ff00ff'
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawParticles);
}
drawParticles();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateHearts() {
  let h = '';
  for (let i = 0; i < 3; i++) h += i < state.hearts ? '\u2764\uFE0F' : '<span class="heart lost">\u2764\uFE0F</span>';
  document.getElementById('heartsDisplay').innerHTML = h;
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent = state.score;
  const cd = document.getElementById('comboDisplay');
  if (state.combo > 1) {
    cd.textContent = `\u1F525 ${state.combo}连击!`;
    cd.classList.add('active');
    setTimeout(() => cd.classList.remove('active'), 500);
  } else {
    cd.textContent = '';
  }
}

function renderStageNav() {
  const nav = document.getElementById('stageNav');
  nav.innerHTML = '';
  STAGES.forEach((stage, i) => {
    const tab = document.createElement('div');
    tab.className = 'stage-tab' + (i === state.stageIndex ? ' active' : '') + (i > state.stageIndex ? ' locked' : '');
    tab.innerHTML = `<span class="stage-num">${stage.icon}</span>${stage.name}`;
    if (i <= state.stageIndex) {
      tab.onclick = () => { if (i !== state.stageIndex && !state.timerInterval) { state.stageIndex = i; state.qIndex = 0; renderQuestion(); } };
    }
    nav.appendChild(tab);
  });
}

// ======================= GAME LOGIC =======================
function startGame() {
  state = {
    stageIndex: 0, qIndex: 0, score: 0, hearts: 3, combo: 0, maxCombo: 0,
    correctCount: 0, totalAnswered: 0, stageResults: [],
    timerInterval: null, timeLeft: 0, answered: false,
  };
  showScreen('screenGame');
  updateHearts();
  updateScore();
  renderStageNav();

}

function renderQuestion() {
  const stage = STAGES[state.stageIndex];
  const q = stage.questions[state.qIndex];
  state.answered = false;

  document.getElementById('stageTitle').innerHTML = `<span class="icon">${stage.icon}</span> Stage ${stage.id}: ${stage.name}`;
  document.getElementById('progressFill').style.width = `${((state.qIndex) / stage.questions.length) * 100}%`;

  // Timer for Stage 5
  const timerArea = document.getElementById('timerArea');
  if (stage.timed) {
    timerArea.style.display = 'block';
    if (state.qIndex === 0 && !state.timerInterval) {
      state.timeLeft = stage.timeLimit;
      startTimer();
    }
  } else {
    timerArea.style.display = 'none';
  }

  let html = `<div class="question-box fade-up">
    <div class="question-num">QUESTION ${state.qIndex + 1} / ${stage.questions.length}</div>
    <div class="question-text">${q.text}</div>
  </div>
  <div class="options" id="optionsBox">`;

  q.options.forEach((opt, i) => {
    html += `<button class="opt-btn" onclick="selectOption(${i})">
      <span class="opt-label">${String.fromCharCode(65 + i)}</span>
      <span>${opt}</span>
    </button>`;
  });
  html += `</div>
  <div class="feedback" id="feedbackBox"></div>
  <div class="explain-box" id="explainBox" style="display:none;"></div>`;

  document.getElementById('questionArea').innerHTML = html;

  // Nav buttons
  const nav = document.getElementById('navBtns');
  if (state.qIndex < stage.questions.length - 1) {
    nav.innerHTML = `<button class="btn-secondary" onclick="skipQuestion()">跳过 &#x23ED;</button><button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="opacity:0.5;pointer-events:none;">下一题 &#x2192;</button>`;
  } else if (state.stageIndex < STAGES.length - 1) {
    nav.innerHTML = `<button class="btn-secondary" onclick="skipQuestion()">跳过 &#x23ED;</button><button class="btn-primary" id="nextBtn" onclick="nextStage()" style="opacity:0.5;pointer-events:none;">进入下一阶段 &#x1F680;</button>`;
  } else {
    nav.innerHTML = `<button class="btn-secondary" onclick="skipQuestion()">跳过 &#x23ED;</button><button class="btn-primary" id="nextBtn" onclick="endGame()" style="opacity:0.5;pointer-events:none;">查看结果 &#x1F3C6;</button>`;
  }
}

function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  const stage = STAGES[state.stageIndex];
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    const pct = (state.timeLeft / stage.timeLimit) * 100;
    document.getElementById('timerText').textContent = state.timeLeft + 's';
    document.getElementById('timerFill').style.width = pct + '%';
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      autoEndStage();
    }
  }, 1000);
}

function autoEndStage() {
  // Time's up - mark remaining questions as wrong
  const stage = STAGES[state.stageIndex];
  while (state.qIndex < stage.questions.length) {
    state.totalAnswered++;
    state.combo = 0;
    state.qIndex++;
  }
  saveStageResult();
  if (state.stageIndex < STAGES.length - 1) {
    state.stageIndex++;
    state.qIndex = 0;
    renderQuestion();
  } else {
    endGame();
  }
}

function selectOption(idx) {
  if (state.answered) return;
  state.answered = true;

  const stage = STAGES[state.stageIndex];
  const q = stage.questions[state.qIndex];
  const opts = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('feedbackBox');
  const ex = document.getElementById('explainBox');
  const nextBtn = document.getElementById('nextBtn');

  opts.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && i !== q.answer) btn.classList.add('wrong');
  });

  state.totalAnswered++;

  if (idx === q.answer) {
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    const base = 100;
    const comboBonus = Math.min((state.combo - 1) * 20, 100);
    state.score += base + comboBonus;
    state.correctCount++;
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `&#x2705; 正确! ${comboBonus > 0 ? `+${comboBonus}连击奖励` : ''}`;
  } else {
    state.combo = 0;
    state.hearts--;
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `&#x274C; 错误! 正确答案是 <strong>${String.fromCharCode(65 + q.answer)}</strong>`;
    updateHearts();
    if (state.hearts <= 0) {
      setTimeout(() => endGame(), 1200);
      return;
    }
  }

  ex.style.display = 'block';
  ex.innerHTML = `<strong>&#x1F4A1; 解析：</strong>${q.explain}`;
  updateScore();

  nextBtn.style.opacity = '1';
  nextBtn.style.pointerEvents = 'auto';
}

function skipQuestion() {
  if (state.answered) return;
  state.answered = true;
  state.totalAnswered++;
  state.combo = 0;
  const stage = STAGES[state.stageIndex];
  const q = stage.questions[state.qIndex];
  const opts = document.querySelectorAll('.opt-btn');
  opts.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.answer) btn.classList.add('correct');
  });
  document.getElementById('explainBox').style.display = 'block';
  document.getElementById('explainBox').innerHTML = `<strong>&#x1F4A1; 解析：</strong>${q.explain}`;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.opacity = '1';
  nextBtn.style.pointerEvents = 'auto';
}

function nextQuestion() {
  state.qIndex++;
  renderQuestion();
}

function saveStageResult() {
  const stage = STAGES[state.stageIndex];
  const correctInStage = state.stageResults.find(r => r.stageId === stage.id)?.correct || 0;
  // Recalculate from scratch based on tracking

}

function nextStage() {
  // Save stage result
  const stage = STAGES[state.stageIndex];
  const prevCorrect = state.correctCount;
  // We need per-stage tracking, let's use a running approach
  state.stageIndex++;
  state.qIndex = 0;
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  renderStageNav();
  renderQuestion();
}

function endGame() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

  // Calculate per-stage stats from the questions we can infer
  // Build stage summary based on actual question flow
  const stageStats = STAGES.map((stage, si) => {
    // For simplicity, estimate based on when we moved through stages
    let correct = 0, total = stage.questions.length;
    if (si < state.stageIndex) correct = total; // completed stages assumed all done
    else if (si === state.stageIndex) correct = state.qIndex; // current stage progress
    else correct = 0;
    // Refine: for completed stages we know from flow, but exact correct count per stage isn't tracked separately
    // Use proportional estimate
    return { stage, correct, total };
  });

  // Recompute actual per-stage correct by replay logic not stored, so use estimate
  // Actually let's store per-stage during gameplay
  // For now, derive from overall correct rate
  const accuracy = state.totalAnswered > 0 ? Math.round((state.correctCount / state.totalAnswered) * 100) : 0;

  // Grade
  let grade, title, emoji;
  const totalQ = STAGES.reduce((s, st) => s + st.questions.length, 0);
  const pct = state.correctCount / totalQ;
  if (pct >= 0.9) { grade = 'S'; title = '能源大师'; emoji = '\u1F31F'; }
  else if (pct >= 0.75) { grade = 'A'; title = '能源专家'; emoji = '\u1F3C6'; }
  else if (pct >= 0.6) { grade = 'B'; title = '能源学徒'; emoji = '\u1F4A1'; }
  else { grade = 'C'; title = '能源新手'; emoji = '\u1F4A5'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('statScore').textContent = state.score;
  document.getElementById('statCombo').textContent = state.maxCombo;
  document.getElementById('statCorrect').textContent = `${state.correctCount}/${totalQ}`;
  document.getElementById('statAccuracy').textContent = `${accuracy}%`;

  // Stage summary
  let ssHtml = '';
  STAGES.forEach((stage, i) => {
    // rough correct count per stage
    let sc = 0;
    if (i < state.stageIndex) {
      // completed earlier stages - assume about average accuracy
      sc = Math.round(stage.questions.length * (state.correctCount / Math.max(state.totalAnswered, 1)));
    } else if (i === state.stageIndex) {
      // current/last stage
      sc = Math.round(state.qIndex * (state.correctCount / Math.max(state.totalAnswered, 1)));
    }
    ssHtml += `<div class="ss-row">
      <span>${stage.icon} ${stage.name}</span>
      <span class="${sc === stage.questions.length ? 'ss-check' : (sc === 0 ? 'ss-wrong' : '')}">${sc}/${stage.questions.length}</span>
    </div>`;
  });
  document.getElementById('stageSummary').innerHTML = ssHtml;

  // Badge
  if (grade === 'S') {
    document.getElementById('badgeBox').style.display = 'block';
  } else {
    document.getElementById('badgeBox').style.display = 'none';
  }

  showScreen('screenResult');
}
