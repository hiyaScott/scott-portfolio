<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中物理 | 虾折腾研究</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-pink: #ff00ff; --neon-cyan: #00ffff; --neon-green: #39ff14;
            --neon-yellow: #ffff00; --neon-amber: #f59e0b; --neon-purple: #9d00ff; --dark: #0a0a0a;
        }
        body {
            background: var(--dark); color: #fff;
            font-family: 'Noto Sans SC', 'Share Tech Mono', monospace;
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 9999;
        }
        .glitch-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent 48%, rgba(255,0,255,0.03) 50%, transparent 52%),
                        linear-gradient(-45deg, transparent 48%, rgba(0,255,255,0.03) 50%, transparent 52%);
            background-size: 60px 60px; animation: bgShift 10s linear infinite;
            pointer-events: none; z-index: -1;
        }
        @keyframes bgShift { 0% { transform: translate(0,0); } 100% { transform: translate(60px,60px); } }
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon-purple);
            padding: 15px 30px; display: flex; align-items: center; justify-content: space-between;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .nav-brand { font-size: 1.3rem; font-weight: 900; color: var(--neon-purple); text-shadow: 0 0 20px var(--neon-purple); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.7; transition: all 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .main { padding-top: 100px; max-width: 1200px; margin: 0 auto; padding-left: 30px; padding-right: 30px; padding-bottom: 60px; }
        .hero { text-align: center; padding: 60px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .hero .icon { font-size: 5rem; margin-bottom: 20px; }
        .hero h1 { font-size: 3rem; font-weight: 900; margin-bottom: 15px; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero .subtitle { font-size: 1.2rem; color: var(--neon-purple); opacity: 0.8; margin-bottom: 20px; }
        .section-title { font-size: 2rem; font-weight: 700; margin: 50px 0 30px; display: flex; align-items: center; gap: 15px; }
        .section-title::before { content: ''; width: 4px; height: 30px; background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }
        .grade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
        .grade-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 25px; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .grade-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); opacity: 0; transition: opacity 0.3s; }
        .grade-card:hover::before { opacity: 1; }
        .grade-card:hover { transform: translateY(-5px); border-color: var(--neon-purple); box-shadow: 0 10px 40px rgba(157,0,255,0.1); }
        .grade-card h3 { font-size: 1.3rem; color: var(--neon-yellow); margin-bottom: 15px; }
        .chapter-list { display: flex; flex-direction: column; gap: 8px; }
        .chapter-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s;
        }
        .chapter-item:hover { border-color: var(--neon-purple); background: rgba(157,0,255,0.05); }
        .chapter-item .name { font-size: 0.95rem; }
        .chapter-item .status { font-size: 0.75rem; padding: 3px 10px; border-radius: 10px; }
        .status.ready { background: rgba(0,255,0,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .status.pending { background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); }
        .chapter-item a { color: var(--neon-purple); text-decoration: none; font-size: 0.8rem; }
        .footer { text-align: center; padding: 40px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 60px; opacity: 0.6; font-size: 0.9rem; }
        @media (max-width: 768px) { .grade-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <div class="glitch-bg"></div>
    <nav class="nav">
        <div class="nav-brand">❤️‍🔥 SHRIMP JETTON</div>
        <div class="nav-links">
            <a href="../">← 返回研究</a>
            <a href="../index.html">返回主页</a>
        </div>
    </nav>
    <main class="main">
        <section class="hero">
            <div class="icon">⚛️</div>
            <h1>初中物理</h1>
            <p class="subtitle">沪教版 2024 · 五四制 · 六年级 → 九年级 · 虚拟实验室</p>
        </section>
        <h2 class="section-title">虚拟实验室目录</h2>
        <div class="grade-grid">
            <div class="grade-card">
                <h3>🌱 六年级 第一学期</h3>
                <div class="chapter-list">
                    <div class="chapter-item">
                        <span class="name">01 测量的初步</span>
                        <span class="status ready">🔬 特工装备室</span>
                        <a href="courseware-physics/grade6-sem1-ch01/index.html">进入实验室 →</a>
                    </div>
                    <div class="chapter-item">
                        <span class="name">02 声</span>
                        <span class="status pending">待制作</span>
                    </div>
                </div>
            </div>
            <div class="grade-card">
                <h3>🌿 六年级 第二学期</h3>
                <div class="chapter-list">
                    <div class="chapter-item"><span class="name">03 光</span><span class="status pending">待制作</span></div>
                    <div class="chapter-item"><span class="name">04 运动和力（初步）</span><span class="status pending">待制作</span></div>
                </div>
            </div>
            <div class="grade-card" style="opacity:0.5;">
                <h3>🌳 七年级 第一学期</h3>
                <div class="chapter-list">
                    <div class="chapter-item"><span class="name">05 热现象</span><span class="status pending">待制作</span></div>
                    <div class="chapter-item"><span class="name">06 密度与浮力</span><span class="status pending">待制作</span></div>
                </div>
            </div>
            <div class="grade-card" style="opacity:0.5;">
                <h3>🌲 七年级 第二学期</h3>
                <div class="chapter-list">
                    <div class="chapter-item"><span class="name">07 压强</span><span class="status pending">待制作</span></div>
                    <div class="chapter-item"><span class="name">08 简单机械</span><span class="status pending">待制作</span></div>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>❤️‍🔥 Shrimp Jetton × Scott | 让物理变成一场实验</p>
    </footer>
</body>
</html>
