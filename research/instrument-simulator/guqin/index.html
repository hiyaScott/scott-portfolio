<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="古琴模拟器">
    <title>古琴模拟器</title>
    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            background: linear-gradient(180deg, #1a1814 0%, #2d2924 50%, #1a1814 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 竖屏提示 */
        .orientation-tip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1814;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #d4c5a8;
            text-align: center;
            padding: 20px;
        }

        .orientation-tip .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: rotate 2s ease-in-out infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media screen and (orientation: portrait) {
            .orientation-tip {
                display: flex;
            }
            .app-container {
                display: none !important;
            }
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部工具栏 */
        .toolbar {
            height: 50px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid rgba(212,197,168,0.2);
        }

        .toolbar-title {
            font-size: 1.1rem;
            color: #d4c5a8;
            font-weight: bold;
            font-family: 'STKaiti', 'KaiTi', 'SimKaiti', serif;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        @media (max-width: 768px) {
            .toolbar {
                padding: 0 8px;
                height: 45px;
            }
            .toolbar-title {
                font-size: 0.9rem;
            }
            .toolbar-actions {
                gap: 5px;
            }
            .toolbar-actions .btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #d4c5a8;
            border: 1px solid #d4c5a8;
        }

        .btn-secondary {
            background: rgba(212,197,168,0.1);
            color: #d4c5a8;
            border: 1px solid rgba(212,197,168,0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.recording {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 主琴区域 */
        .qin-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* 古琴本体 */
        .guqin {
            width: 90%;
            max-width: 1000px;
            height: 220px;
            background: linear-gradient(90deg, 
                #3d2817 0%, 
                #5c3a21 5%, 
                #4a2f1a 10%,
                #5c3a21 20%,
                #4a2f1a 30%,
                #5c3a21 40%,
                #4a2f1a 50%,
                #5c3a21 60%,
                #4a2f1a 70%,
                #5c3a21 80%,
                #4a2f1a 90%,
                #3d2817 100%
            );
            border-radius: 8px 100px 100px 8px;
            position: relative;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.5),
                inset 0 0 60px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            padding: 0 60px 0 80px;
        }

        /* 琴尾装饰 */
        .guqin::before {
            content: '';
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 140px;
            background: linear-gradient(90deg, #4a2f1a, #3d2817);
            border-radius: 0 50% 50% 0;
            box-shadow: 5px 0 20px rgba(0,0,0,0.4);
        }

        /* 琴首 */
        .guqin::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 100px;
            background: linear-gradient(90deg, #3d2817, #4a2f1a);
            border-radius: 50% 0 0 50%;
        }

        /* 琴弦区域 */
        .strings-container {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: space-evenly;
            position: relative;
            z-index: 10;
        }

        /* 单根弦 */
        .string-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 弦线 */
        .string {
            width: 2px;
            height: 100%;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.3),
                rgba(212,197,168,0.8) 20%,
                rgba(212,197,168,0.9) 50%,
                rgba(212,197,168,0.8) 80%,
                rgba(255,255,255,0.3)
            );
            position: relative;
            box-shadow: 0 0 3px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .string.vibrating {
            animation: stringVibrate 0.3s ease-out;
        }

        @keyframes stringVibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        /* 十三徽标记 */
        .hui-marks {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 100%;
            pointer-events: none;
        }

        .hui-mark {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #d4c5a8 30%, transparent 70%);
            border-radius: 50%;
            opacity: 0.6;
        }

        /* 徽位位置（从上到下，音高从低到高） */
        .hui-mark:nth-child(1) { top: 85%; }   /* 十三徽 */
        .hui-mark:nth-child(2) { top: 75%; }   /* 十二徽 */
        .hui-mark:nth-child(3) { top: 67%; }   /* 十一徽 */
        .hui-mark:nth-child(4) { top: 60%; }   /* 十徽 */
        .hui-mark:nth-child(5) { top: 54%; }   /* 九徽 */
        .hui-mark:nth-child(6) { top: 49%; }   /* 八徽 */
        .hui-mark:nth-child(7) { top: 44%; }   /* 七徽 */
        .hui-mark:nth-child(8) { top: 39%; }   /* 六徽 */
        .hui-mark:nth-child(9) { top: 34%; }   /* 五徽 */
        .hui-mark:nth-child(10) { top: 29%; }  /* 四徽 */
        .hui-mark:nth-child(11) { top: 23%; }  /* 三徽 */
        .hui-mark:nth-child(12) { top: 15%; }  /* 二徽 */
        .hui-mark:nth-child(13) { top: 5%; }   /* 一徽 */

        /* 弦号 */
        .string-number {
            position: absolute;
            bottom: -25px;
            font-size: 0.75rem;
            color: #d4c5a8;
            opacity: 0.7;
            font-family: 'STKaiti', serif;
        }

        /* 音名提示 */
        .note-hint {
            position: absolute;
            top: -25px;
            font-size: 0.7rem;
            color: #d4c5a8;
            opacity: 0.5;
            font-family: 'STKaiti', serif;
        }

        /* 播放状态栏 */
        .playback-status {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 25px;
            color: #d4c5a8;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid rgba(212,197,168,0.3);
        }

        .playback-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playback-icon {
            animation: rotateIcon 2s linear infinite;
        }

        @keyframes rotateIcon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 底部控制栏 */
        .bottom-bar {
            height: 60px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            border-top: 1px solid rgba(212,197,168,0.2);
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(180deg, #2d2924, #1a1814);
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            border: 1px solid rgba(212,197,168,0.3);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(212,197,168,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            color: #d4c5a8;
            font-size: 1.1rem;
            font-family: 'STKaiti', serif;
        }

        .modal-close {
            background: none;
            border: none;
            color: #d4c5a8;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }

        /* 经典曲目列表 */
        .classic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .classic-item {
            background: rgba(212,197,168,0.1);
            border: 1px solid rgba(212,197,168,0.2);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .classic-item:hover {
            background: rgba(212,197,168,0.15);
            border-color: rgba(212,197,168,0.4);
        }

        .classic-item.playing {
            background: rgba(139,69,19,0.3);
            border-color: #d4c5a8;
            animation: classicPulse 2s infinite;
        }

        @keyframes classicPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(212,197,168,0.3); }
            50% { box-shadow: 0 0 15px rgba(212,197,168,0.5); }
        }

        .classic-icon {
            font-size: 2rem;
        }

        .classic-info {
            flex: 1;
        }

        .classic-name {
            color: #d4c5a8;
            font-size: 1rem;
            margin-bottom: 5px;
            font-family: 'STKaiti', serif;
        }

        .classic-desc {
            color: rgba(212,197,168,0.6);
            font-size: 0.8rem;
        }

        /* 录音列表 */
        .recording-list {
            list-style: none;
        }

        .recording-item {
            background: rgba(212,197,168,0.1);
            border: 1px solid rgba(212,197,168,0.2);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recording-name {
            color: #d4c5a8;
            font-size: 0.95rem;
            margin-bottom: 3px;
        }

        .recording-time {
            color: rgba(212,197,168,0.5);
            font-size: 0.75rem;
        }

        .recording-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(212,197,168,0.2);
            color: #d4c5a8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .btn-icon:hover {
            background: rgba(212,197,168,0.3);
        }

        .btn-icon.delete {
            background: rgba(220,50,50,0.3);
        }

        .btn-icon.delete:hover {
            background: rgba(220,50,50,0.5);
        }

        /* 提示 */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #d4c5a8;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(212,197,168,0.3);
        }

        .toast.show {
            opacity: 1;
        }

        /* 帮助说明 */
        .help-text {
            color: rgba(212,197,168,0.7);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .help-text strong {
            color: #d4c5a8;
        }

        /* 触摸效果 */
        .touch-hint {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,197,168,0.4), transparent);
            pointer-events: none;
            animation: touchRipple 0.5s ease-out forwards;
            z-index: 20;
        }

        @keyframes touchRipple {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
    <link rel="stylesheet" href="../../../css/deepspace-daylight.css">


</head>
<body>
    <!-- 竖屏提示 -->
    <div class="orientation-tip">
        <div class="icon">📱</div>
        <h3>请横屏使用</h3>
        <p>古琴模拟器需要横屏体验</p>
        <p style="margin-top: 10px; opacity: 0.7;">请将设备旋转至横向</p>
    </div>

    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-title">🎵 古琴模拟器</div>
            <div class="toolbar-actions">
                <button class="btn btn-secondary" id="btnClassic">📚 经典</button>
                <button class="btn btn-secondary" id="btnRecordings">🎵 录音</button>
                <button class="btn btn-secondary" id="btnHelp">❓ 帮助</button>
            </div>
        </div>

        <!-- 主琴区域 -->
        <div class="qin-container">
            <div class="guqin">
                <div class="strings-container" id="stringsContainer">
                    <!-- 七根弦将由 JS 生成 -->
                </div>
            </div>
        </div>

        <!-- 底部控制栏 -->
        <div class="bottom-bar">
            <button class="btn btn-primary" id="btnRecord">🔴 录制</button>
            <button class="btn btn-secondary" id="btnStop" disabled>⏹ 停止</button>
            <button class="btn btn-secondary" id="btnPlayback" disabled>▶️ 回放</button>
            <button class="btn btn-secondary" id="btnClear">🗑 清除</button>
        </div>
    </div>

    <!-- 播放状态 -->
    <div class="playback-status" id="playbackStatus" style="display: none;">
        <div class="playback-info">
            <span class="playback-icon">🎵</span>
            <span id="playbackText">正在播放...</span>
        </div>
    </div>

    <!-- 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 经典曲目弹窗 -->
    <div class="modal" id="classicModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📚 经典曲目</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="classic-list" id="classicList">
                    <!-- 经典曲目列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 录音列表弹窗 -->
    <div class="modal" id="recordingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🎵 我的录音</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <ul class="recording-list" id="recordingList">
                    <!-- 录音列表 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- 帮助弹窗 -->
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">❓ 使用帮助</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="help-text">
                    <p><strong>🎸 古琴演奏</strong></p>
                    <p>• 古琴有七根弦，从右到左为一弦到七弦</p>
                    <p>• 每根弦有十三个徽位，音高随按弦位置变化</p>
                    <p>• 点击琴弦不同位置可发出不同音高</p>
                    <br>
                    <p><strong>📝 录制功能</strong></p>
                    <p>• 点击「录制」开始记录演奏</p>
                    <p>• 点击「停止」结束录制并保存</p>
                    <p>• 在「录音」列表中可以回放和分享</p>
                    <br>
                    <p><strong>📚 经典曲目</strong></p>
                    <p>• 收录《流水》《广陵散》等经典古琴名曲</p>
                    <p>• 点击即可欣赏完整演奏</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 音频系统 ====================
        let audioContext = null;
        
        // 古琴标准定弦（正调 C 调）
        // 一弦（最粗）到七弦（最细）
        const stringTuning = [
            { name: 'C2', freq: 65.41 },   // 一弦 - 下徵
            { name: 'D2', freq: 73.42 },   // 二弦 - 下羽
            { name: 'F2', freq: 87.31 },   // 三弦 - 宫
            { name: 'G2', freq: 98.00 },   // 四弦 - 商
            { name: 'A2', freq: 110.00 },  // 五弦 - 角
            { name: 'C3', freq: 130.81 },  // 六弦 - 少徵
            { name: 'D3', freq: 146.83 }   // 七弦 - 少羽
        ];

        // 徽位音程比（相对于空弦）
        // 从一徽到十三徽的音程（高音到低音）
        const huiRatios = [
            0.5,   // 一徽 - 高八度
            0.526, // 二徽
            0.5625,// 三徽
            0.6,   // 四徽
            0.625, // 五徽
            0.6667,// 六徽
            0.7,   // 七徽
            0.75,  // 八徽
            0.8,   // 九徽
            0.8333,// 十徽
            0.875, // 十一徽
            0.9,   // 十二徽
            0.9375 // 十三徽
        ];

        // 徽位名称
        const huiNames = ['一徽', '二徽', '三徽', '四徽', '五徽', '六徽', '七徽', '八徽', '九徽', '十徽', '十一徽', '十二徽', '十三徽'];

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // 播放古琴音
        function playGuqinSound(freq, stringIndex, huiIndex = -1) {
            initAudio();
            
            const now = audioContext.currentTime;
            
            // 主音 - 使用正弦波模拟弦音
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = freq;
            
            // 古琴音色包络
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.4, now + 0.02);  // 快速起音
            gainNode.gain.exponentialRampToValueAtTime(0.3, now + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 4); // 长延音
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start(now);
            oscillator.stop(now + 4);
            
            // 添加泛音使音色更丰富
            const harmonic = audioContext.createOscillator();
            const harmonicGain = audioContext.createGain();
            
            harmonic.type = 'sine';
            harmonic.frequency.value = freq * 2; // 八度泛音
            
            harmonicGain.gain.setValueAtTime(0, now);
            harmonicGain.gain.linearRampToValueAtTime(0.15, now + 0.01);
            harmonicGain.gain.exponentialRampToValueAtTime(0.001, now + 2);
            
            harmonic.connect(harmonicGain);
            harmonicGain.connect(audioContext.destination);
            
            harmonic.start(now);
            harmonic.stop(now + 2);
            
            // 添加一点噪声模拟擦弦感
            const bufferSize = audioContext.sampleRate * 0.05;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.1;
            }
            
            const noise = audioContext.createBufferSource();
            const noiseGain = audioContext.createGain();
            noise.buffer = buffer;
            
            noiseGain.gain.setValueAtTime(0.05, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            
            noise.connect(noiseGain);
            noiseGain.connect(audioContext.destination);
            noise.start(now);
        }

        // 根据弦和按弦位置计算频率
        function getFrequency(stringIndex, huiIndex) {
            const baseFreq = stringTuning[stringIndex].freq;
            if (huiIndex === -1 || huiIndex === undefined) {
                return baseFreq; // 散音
            }
            return baseFreq / huiRatios[huiIndex]; // 按音（越高音程比越小，频率越高）
        }

        // ==================== 古琴界面 ====================
        function initStrings() {
            const container = document.getElementById('stringsContainer');
            
            for (let i = 0; i < 7; i++) {
                const stringWrapper = document.createElement('div');
                stringWrapper.className = 'string-wrapper';
                stringWrapper.dataset.stringIndex = i;
                
                // 音名提示
                const noteHint = document.createElement('div');
                noteHint.className = 'note-hint';
                noteHint.textContent = stringTuning[i].name;
                stringWrapper.appendChild(noteHint);
                
                // 十三徽标记
                const huiMarks = document.createElement('div');
                huiMarks.className = 'hui-marks';
                for (let h = 0; h < 13; h++) {
                    const mark = document.createElement('div');
                    mark.className = 'hui-mark';
                    mark.dataset.huiIndex = h;
                    mark.title = huiNames[h];
                    huiMarks.appendChild(mark);
                }
                stringWrapper.appendChild(huiMarks);
                
                // 弦
                const string = document.createElement('div');
                string.className = 'string';
                string.id = `string-${i}`;
                stringWrapper.appendChild(string);
                
                // 弦号
                const stringNum = document.createElement('div');
                stringNum.className = 'string-number';
                stringNum.textContent = `${i + 1}弦`;
                stringWrapper.appendChild(stringNum);
                
                // 点击事件
                stringWrapper.addEventListener('click', (e) => handleStringClick(e, i));
                stringWrapper.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleStringClick(e.touches[0], i);
                });
                
                container.appendChild(stringWrapper);
            }
        }

        function handleStringClick(e, stringIndex) {
            const rect = e.target.closest('.string-wrapper').getBoundingClientRect();
            const y = e.clientY - rect.top;
            const height = rect.height;
            
            // 计算按弦位置（从上到下对应一徽到十三徽）
            // 将点击位置映射到最近的徽位
            let huiIndex = -1; // -1 表示散音（在徽位之间）
            
            // 徽位的Y坐标位置（百分比）
            const huiPositions = [5, 15, 23, 29, 34, 39, 44, 49, 54, 60, 67, 75, 85];
            
            // 找到最近的徽位
            let minDistance = Infinity;
            for (let i = 0; i < huiPositions.length; i++) {
                const huiY = (huiPositions[i] / 100) * height;
                const distance = Math.abs(y - huiY);
                if (distance < minDistance && distance < height * 0.08) { // 在徽位附近8%范围内
                    minDistance = distance;
                    huiIndex = i;
                }
            }
            
            // 播放音
            const freq = getFrequency(stringIndex, huiIndex);
            playGuqinSound(freq, stringIndex, huiIndex);
            
            // 视觉反馈
            animateString(stringIndex);
            showTouchHint(e.clientX, e.clientY);
            
            // 录制
            if (isRecording) {
                recordNote(stringIndex, huiIndex, freq);
            }
            
            // 显示徽位信息
            const huiName = huiIndex >= 0 ? huiNames[huiIndex] : '散音';
            showToast(`${stringIndex + 1}弦 · ${huiName}`);
        }

        function animateString(stringIndex) {
            const string = document.getElementById(`string-${stringIndex}`);
            string.classList.remove('vibrating');
            void string.offsetWidth; // 触发重绘
            string.classList.add('vibrating');
            
            setTimeout(() => {
                string.classList.remove('vibrating');
            }, 300);
        }

        function showTouchHint(x, y) {
            const hint = document.createElement('div');
            hint.className = 'touch-hint';
            hint.style.left = (x - 20) + 'px';
            hint.style.top = (y - 20) + 'px';
            document.body.appendChild(hint);
            
            setTimeout(() => hint.remove(), 500);
        }

        // ==================== 录制系统 ====================
        let isRecording = false;
        let isPlaying = false;
        let isPlayingClassic = false;
        let recordingStartTime = 0;
        let currentRecording = [];
        let recordings = [];
        let playbackTimeouts = [];
        let classicTimeouts = [];
        let currentPlaybackType = null;

        function startRecording() {
            initAudio();
            isRecording = true;
            recordingStartTime = Date.now();
            currentRecording = [];
            
            document.getElementById('btnRecord').classList.add('recording');
            document.getElementById('btnRecord').textContent = '⏹ 停止';
            document.getElementById('btnStop').disabled = false;
            
            showToast('🔴 开始录制');
        }

        function stopRecording() {
            if (!isRecording) return;
            
            isRecording = false;
            document.getElementById('btnRecord').classList.remove('recording');
            document.getElementById('btnRecord').textContent = '🔴 录制';
            document.getElementById('btnStop').disabled = true;
            
            if (currentRecording.length > 0) {
                const name = `录制 ${recordings.length + 1}`;
                const duration = Math.ceil((currentRecording[currentRecording.length - 1].time + 1000) / 1000);
                
                const recording = {
                    id: Date.now(),
                    name: name,
                    date: new Date().toLocaleString(),
                    duration: duration,
                    notes: [...currentRecording]
                };
                
                recordings.push(recording);
                saveRecordings();
                updateRecordingList();
                
                document.getElementById('btnPlayback').disabled = false;
                showToast(`✅ 已保存: ${name} (${duration}秒)`);
            } else {
                showToast('⚠️ 没有录制到音符');
            }
        }

        function recordNote(stringIndex, huiIndex, freq) {
            const time = Date.now() - recordingStartTime;
            currentRecording.push({
                stringIndex,
                huiIndex,
                freq,
                time
            });
        }

        function saveRecordings() {
            localStorage.setItem('guqin_recordings', JSON.stringify(recordings));
        }

        function loadRecordings() {
            const saved = localStorage.getItem('guqin_recordings');
            if (saved) {
                recordings = JSON.parse(saved);
            }
        }

        // ==================== 回放系统 ====================
        function playRecording(recording) {
            if (isPlaying || !recording.notes.length) return;
            
            // 停止经典曲目播放
            if (isPlayingClassic) {
                stopClassicPiece();
            }
            
            isPlaying = true;
            currentPlaybackType = 'recording';
            showPlaybackStatus(recording.name, 'recording');
            showToast('开始回放...');
            
            playbackTimeouts.forEach(id => clearTimeout(id));
            playbackTimeouts = [];
            
            recording.notes.forEach((noteData) => {
                const timeout = setTimeout(() => {
                    if (!isPlaying) return;
                    
                    playGuqinSound(noteData.freq, noteData.stringIndex, noteData.huiIndex);
                    animateString(noteData.stringIndex);
                    
                }, noteData.time);
                playbackTimeouts.push(timeout);
            });
            
            const endTimeout = setTimeout(() => {
                if (isPlaying) {
                    isPlaying = false;
                    currentPlaybackType = null;
                    hidePlaybackStatus();
                }
            }, recording.notes[recording.notes.length - 1].time + 1000);
            playbackTimeouts.push(endTimeout);
        }

        function stopPlayback() {
            isPlaying = false;
            currentPlaybackType = null;
            playbackTimeouts.forEach(id => clearTimeout(id));
            playbackTimeouts = [];
            hidePlaybackStatus();
        }

        function showPlaybackStatus(name, type) {
            const statusEl = document.getElementById('playbackStatus');
            const textEl = document.getElementById('playbackText');
            textEl.textContent = type === 'recording' ? `回放: ${name}` : `经典: ${name}`;
            statusEl.style.display = 'block';
        }

        function hidePlaybackStatus() {
            document.getElementById('playbackStatus').style.display = 'none';
        }

            },

                description: '古琴名曲 · 梅花主题三次出现',
                notes: [
                    // 第一弄
                    { stringIndex: 3, huiIndex: 7, freq: getFrequency(3, 7), time: 0 },
                    { stringIndex: 4, huiIndex: 7, freq: getFrequency(4, 7), time: 600 },
                    { stringIndex: 2, huiIndex: 7, freq: getFrequency(2, 7), time: 1200 },
                    { stringIndex: 3, huiIndex: 7, freq: getFrequency(3, 7), time: 1800 },
                    // 第二弄
                    { stringIndex: 3, huiIndex: 4, freq: getFrequency(3, 4), time: 3000 },
                    { stringIndex: 4, huiIndex: 4, freq: getFrequency(4, 4), time: 3600 },
                    { stringIndex: 2, huiIndex: 4, freq: getFrequency(2, 4), time: 4200 },
                    { stringIndex: 3, huiIndex: 4, freq: getFrequency(3, 4), time: 4800 },
                    // 第三弄
                    { stringIndex: 3, huiIndex: 9, freq: getFrequency(3, 9), time: 6000 },

        function initClassicList() {
            const list = document.getElementById('classicList');
            list.innerHTML = Object.values(classicPieces).map(piece => `
                <div class="classic-item ${isPlayingClassic ? 'playing' : ''}" 
                     data-piece-id="${piece.id}"
                     onclick="playClassicPiece('${piece.id}')">
                    <div class="classic-icon">🎵</div>
                    <div class="classic-info">
                        <div class="classic-name">${piece.name}</div>
                        <div class="classic-desc">${piece.description}</div>
                    </div>
                </div>
            `).join('');
        }

        function playClassicPiece(pieceId) {
            initAudio();
            
            // 停止录音回放
            if (isPlaying) {
                stopPlayback();
            }
            
            // 如果正在播放经典曲目
            if (isPlayingClassic) {
                stopClassicPiece();
                // 如果点击的是当前播放的，只停止
                const clickedItem = document.querySelector(`[data-piece-id="${pieceId}"]`);
                if (clickedItem && clickedItem.classList.contains('playing')) {
                    return;
                }
            }
            
            const piece = classicPieces[pieceId];
            if (!piece) return;
            
            isPlayingClassic = true;
            currentPlaybackType = 'classic';
            showPlaybackStatus(piece.name, 'classic');
            showToast(`正在播放：${piece.name}`);
            
            // 更新UI
            document.querySelectorAll('.classic-item').forEach(item => {
                item.classList.remove('playing');
            });
            document.querySelector(`[data-piece-id="${pieceId}"]`)?.classList.add('playing');
            
            // 播放
            piece.notes.forEach((noteData, index) => {
                const timeout = setTimeout(() => {
                    if (!isPlayingClassic) return;
                    
                    playGuqinSound(noteData.freq, noteData.stringIndex, noteData.huiIndex);
                    animateString(noteData.stringIndex);
                    
                    if (index === piece.notes.length - 1) {
                        const resetTimeout = setTimeout(() => {
                            stopClassicPiece();
                        }, 1000);
                        classicTimeouts.push(resetTimeout);
                    }
                }, noteData.time);
                classicTimeouts.push(timeout);
            });
        }

        function stopClassicPiece() {
            isPlayingClassic = false;
            currentPlaybackType = null;
            classicTimeouts.forEach(id => clearTimeout(id));
            classicTimeouts = [];
            hidePlaybackStatus();
            
            document.querySelectorAll('.classic-item').forEach(item => {
                item.classList.remove('playing');
            });
        }

        // ==================== 录音列表 ====================
        function updateRecordingList() {
            const list = document.getElementById('recordingList');
            
            if (recordings.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: rgba(212,197,168,0.5);">
                        <div style="font-size: 3rem; margin-bottom: 15px;">🎵</div>
                        <p>还没有录制</p>
                        <p style="font-size: 0.85rem; margin-top: 5px;">点击录制按钮开始创作</p>
                    </div>
                `;
                document.getElementById('btnPlayback').disabled = true;
            } else {
                list.innerHTML = recordings.map(rec => `
                    <li class="recording-item">
                        <div>
                            <div class="recording-name">${rec.name}</div>
                            <div class="recording-time">${rec.date} · ${rec.duration}秒 · ${rec.notes.length}音</div>
                        </div>
                        <div class="recording-actions">
                            <button class="btn-icon play" onclick="playRecordingById(${rec.id}); closeModal();">▶</button>
                            <button class="btn-icon delete" onclick="deleteRecording(${rec.id})">🗑</button>
                        </div>
                    </li>
                `).join('');
                document.getElementById('btnPlayback').disabled = false;
            }
        }

        function playRecordingById(id) {
            const recording = recordings.find(r => r.id === id);
            if (recording) {
                playRecording(recording);
            }
        }

        function deleteRecording(id) {
            if (!confirm('确定要删除这条录音吗？')) return;
            
            recordings = recordings.filter(r => r.id !== id);
            saveRecordings();
            updateRecordingList();
            
            if (recordings.length === 0) {
                document.getElementById('btnPlayback').disabled = true;
            }
            
            showToast('已删除');
        }

        // ==================== 工具函数 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(modal => {
                modal.classList.remove('show');
            });
        }

        function clearRecordings() {
            if (recordings.length === 0) {
                showToast('没有录音可清除');
                return;
            }
            if (!confirm('确定要清除所有录音吗？')) return;
            
            recordings = [];
            saveRecordings();
            updateRecordingList();
            document.getElementById('btnPlayback').disabled = true;
            showToast('已清除所有录音');
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initStrings();
            loadRecordings();
            updateRecordingList();
            initClassicList();
            
            if (recordings.length > 0) {
                document.getElementById('btnPlayback').disabled = false;
            }
            
            // 事件绑定
            document.getElementById('btnRecord').addEventListener('click', () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
            
            document.getElementById('btnStop').addEventListener('click', stopRecording);
            
            document.getElementById('btnPlayback').addEventListener('click', () => {
                if (recordings.length > 0) {
                    playRecording(recordings[recordings.length - 1]);
                }
            });
            
            document.getElementById('btnClear').addEventListener('click', clearRecordings);
            
            document.getElementById('btnClassic').addEventListener('click', () => {
                document.getElementById('classicModal').classList.add('show');
            });
            
            document.getElementById('btnRecordings').addEventListener('click', () => {
                updateRecordingList();
                document.getElementById('recordingsModal').classList.add('show');
            });
            
            document.getElementById('btnHelp').addEventListener('click', () => {
                document.getElementById('helpModal').classList.add('show');
            });
            
            // 点击空白关闭弹窗
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeModal();
                    }
                });
            });
            
            // 首次交互初始化音频
            const firstInteractionHandler = () => {
                initAudio();
                document.removeEventListener('click', firstInteractionHandler);
                document.removeEventListener('touchstart', firstInteractionHandler);
            };
            document.addEventListener('click', firstInteractionHandler);
            document.addEventListener('touchstart', firstInteractionHandler);
        });
    </script>
