<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编钟模拟器 - 最新版本入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f5af19, #f12711);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }
        .version-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .entry-btn {
            display: inline-block;
            background: linear-gradient(45deg, #f5af19, #f12711);
            color: white;
            text-decoration: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            border-radius: 50px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(245, 175, 25, 0.3);
        }
        .entry-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 175, 25, 0.4);
        }
        .features {
            margin-top: 50px;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
        }
        .features h3 {
            color: #f5af19;
            margin-bottom: 15px;
        }
        .features ul {
            list-style: none;
        }
        .features li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
        }
        .features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #4CAF50;
            font-weight: bold;
        }
        .update-time {
            margin-top: 40px;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 编钟模拟器</h1>
        <p class="subtitle">曾侯乙编钟 · 数字复原</p>
        
        <div class="version-badge">v2.3.5 最新版</div>
        
        <a href="bianzhong-v2.html" class="entry-btn">进入模拟器</a>
        
        <div class="features">
            <h3>本次更新</h3>
            <ul>
                <li>专业模式面板支持边演奏边操作（点击编钟不再自动关闭）</li>
                <li>和弦琶音播放实例限制为1（声音不重叠）</li>
                <li>优化和弦音高配置（C2-G2-C3-E3等）</li>
                <li>修复点击外部自动关闭的误触问题</li>
            </ul>
        </div>
        
        <p class="update-time">更新时间：2026-03-12 22:50</p>
    </div>
</body>
</html>
