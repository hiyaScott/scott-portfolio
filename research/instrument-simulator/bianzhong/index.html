<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编钟模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 竖屏提示 */
        .orientation-tip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .orientation-tip .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: rotate 2s ease-in-out infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media screen and (orientation: portrait) {
            .orientation-tip {
                display: flex;
            }
            .app-container {
                display: none !important;
            }
        }

        /* 主容器 */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部工具栏 */
        .toolbar {
            height: 50px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .toolbar-title {
            font-size: 1.1rem;
            color: #f5af19;
            font-weight: bold;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.recording {
            background: #ff0000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 状态显示 */
        .status-bar {
            height: 30px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recording-indicator {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            display: none;
        }

        .recording-indicator.active {
            display: block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 编钟区域 */
        .bells-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        /* 钟架 */
        .frame {
            width: 95%;
            max-width: 800px;
            background: linear-gradient(180deg, #8B4513 0%, #654321 100%);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 8px;
            background: linear-gradient(90deg, #DAA520, #FFD700, #DAA520);
            border-radius: 4px;
        }

        /* 钟的行 */
        .bell-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        /* 钟的样式 */
        .bell {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .bell:active {
            transform: scale(0.95);
        }

        .bell-swing {
            animation: swing 0.3s ease-out;
        }

        @keyframes swing {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }

        /* 钟形 - 小编钟（上层） */
        .bell-small {
            width: 45px;
            height: 55px;
        }

        .bell-small .bell-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 50%, #B8860B 100%);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 
                inset -3px -3px 8px rgba(0,0,0,0.3),
                inset 3px 3px 8px rgba(255,255,255,0.3),
                0 3px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        .bell-small .bell-body::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #8B4513;
            border-radius: 50%;
        }

        /* 钟形 - 中编钟（中层） */
        .bell-medium {
            width: 60px;
            height: 70px;
        }

        .bell-medium .bell-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 50%, #B8860B 100%);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 
                inset -4px -4px 10px rgba(0,0,0,0.3),
                inset 4px 4px 10px rgba(255,255,255,0.3),
                0 4px 8px rgba(0,0,0,0.3);
            position: relative;
        }

        .bell-medium .bell-body::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #8B4513;
            border-radius: 50%;
        }

        /* 钟形 - 大编钟（下层） */
        .bell-large {
            width: 80px;
            height: 90px;
        }

        .bell-large .bell-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 50%, #B8860B 100%);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 
                inset -5px -5px 12px rgba(0,0,0,0.3),
                inset 5px 5px 12px rgba(255,255,255,0.3),
                0 5px 10px rgba(0,0,0,0.3);
            position: relative;
        }

        .bell-large .bell-body::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #8B4513;
            border-radius: 50%;
        }

        /* 钟形样式增强 */
        .bell-body {
            position: relative;
            overflow: hidden;
        }

        /* 正敲/侧敲区域提示 */
        .bell-zheng, .bell-ce {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: rgba(0,0,0,0.4);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bell-zheng {
            right: 8px;
        }

        .bell-ce {
            left: 8px;
        }

        .bell:hover .bell-zheng, .bell:hover .bell-ce {
            opacity: 1;
        }

        /* 双音标记 */
        .bell-notes {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: rgba(0,0,0,0.5);
            font-weight: bold;
            pointer-events: none;
        }

        .bell-small .bell-notes {
            font-size: 0.5rem;
        }

        .bell-large .bell-notes {
            font-size: 0.65rem;
        }
        .bell-label {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(0,0,0,0.6);
            font-weight: bold;
            pointer-events: none;
        }

        .bell-large .bell-label {
            font-size: 0.8rem;
            bottom: 8px;
        }

        /* 击槌效果 */
        .mallet-hit {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            opacity: 0;
            pointer-events: none;
        }

        .mallet-hit.show {
            animation: hit 0.2s ease-out;
        }

        @keyframes hit {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* 控制面板 */
        .control-panel {
            height: 60px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 0 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-large {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        /* 专业模式面板 */
        .pro-mode-panel {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(26,26,46,0.98), rgba(15,52,96,0.98));
            border-top: 2px solid var(--neon-cyan, #00ffff);
            padding: 15px 20px;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .pro-mode-panel.active {
            display: flex;
        }

        .pro-mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--neon-cyan, #00ffff);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .bpm-display {
            background: rgba(0,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-cyan, #00ffff);
        }

        .chord-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chord-btn {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .chord-btn:hover {
            border-color: var(--neon-gold, #f5af19);
            background: rgba(245,175,25,0.1);
        }

        .chord-btn.active {
            border-color: var(--neon-cyan, #00ffff);
            background: rgba(0,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        .chord-btn .chord-type {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
            font-weight: normal;
        }

        .chord-btn.playing {
            animation: chordPulse 0.3s ease-out;
        }

        @keyframes chordPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: rgba(0,255,255,0.4); }
            100% { transform: scale(1); }
        }

        .mode-toggle {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
        }

        .mode-toggle.active {
            background: linear-gradient(135deg, #00d2d3, #01a3a4);
        }

        /* 录制列表弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            max-height: 80%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #f5af19;
            font-size: 1.1rem;
        }

        .modal-close {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            background: none;
            border: none;
        }

        .modal-body {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .recording-list {
            list-style: none;
        }

        .recording-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recording-info {
            flex: 1;
        }

        .recording-name {
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 3px;
        }

        .recording-time {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
        }

        .recording-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-icon.play {
            background: #00d2d3;
        }

        .btn-icon.delete {
            background: #e94560;
        }

        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 40px 20px;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* 分享弹窗 */
        .share-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .share-btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .share-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 竖屏提示 -->
    <div class="orientation-tip">
        <div class="icon">📱</div>
        <p>请横屏使用编钟模拟器</p>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.7;">将手机旋转90度以获得最佳体验</p>
    </div>

    <!-- 主应用 -->
    <div class="app-container">
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-title">🔔 编钟模拟器</div>
            <div class="toolbar-actions">
                <button class="btn btn-secondary" id="btnDesignDoc" onclick="window.open('design-doc.html', '_blank')">
                    📋 设计案
                </button>
                <button class="btn btn-secondary" id="btnRecordings">
                    🎵 我的演奏
                </button>
                <button class="btn btn-primary" id="btnRecord">
                    🔴 录制
                </button>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <span class="recording-indicator" id="recordingIndicator"></span>
                <span id="statusText">准备就绪</span>
            </div>
            <div class="status-item" id="recordTime" style="display: none;">
                ⏱️ <span id="timeDisplay">00:00</span>
            </div>
        </div>

        <!-- 编钟区域 -->
        <div class="bells-container">
            <div class="frame">
                <!-- 上层：小编钟 -->
                <div class="bell-row" id="row1">
                    <!-- 动态生成 -->
                </div>
                <!-- 中层：中编钟 -->
                <div class="bell-row" id="row2">
                    <!-- 动态生成 -->
                </div>
                <!-- 下层：大编钟 -->
                <div class="bell-row" id="row3">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <button class="btn btn-secondary mode-toggle" id="btnProMode">🎹 专业模式</button>
            <button class="btn btn-secondary" id="btnDemo">▶️ 试听</button>
            <button class="btn btn-secondary" id="btnClear">🗑️ 清空</button>
            <button class="btn btn-primary btn-large" id="btnPlayback" disabled>▶️ 回放</button>
        </div>
    </div>

    <!-- 专业模式面板 -->
    <div class="pro-mode-panel" id="proModePanel">
        <div class="pro-mode-header">
            <span>🎹 琶音器模式 | 和弦分解</span>
            <span class="bpm-display">BPM 50</span>
        </div>
        <div class="chord-grid" id="chordGrid">
            <!-- 和弦按钮将动态生成 -->
        </div>
    </div>

    <!-- 录制列表弹窗 -->
    <div class="modal" id="recordingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎵 我的演奏</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <ul class="recording-list" id="recordingList">
                    <!-- 动态生成 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📤 分享演奏</h3>
                <button class="modal-close" onclick="closeShareModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <button class="share-btn" onclick="shareToWeChat()">
                        💬 生成分享卡片
                    </button>
                    <button class="share-btn" onclick="copyLink()">
                        🔗 复制分享链接
                    </button>
                    <button class="share-btn" onclick="downloadRecording()">
                        💾 导出演奏数据
                    </button>
                </div>
                <div id="shareCardContainer"></div>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== 专业模式配置 ====================
        const BPM = 50; // BPM 50
        const BEAT_MS = 60000 / BPM; // 每拍时长 (1200ms @ BPM 50)
        const EIGHTH_NOTE_MS = BEAT_MS / 2; // 8分音符 (600ms)
        const FINAL_NOTE_BEATS = 2; // 最后一个音停两拍
        
        // 音程倍数 (十二平均律)
        const INTERVAL_RATIOS = {
            1: 1,           // 根音
            2: 1.122462,    // 大二度
            3: 1.189207,    // 小三度 (降3度)
            4: 1.334840,    // 纯四度
            5: 1.498307,    // 纯五度
            6: 1.681793,    // 大六度
            7: 1.887748,    // 大七度
            b3: 1.189207,   // 小三度
            b7: 1.781797,   // 小七度
            octave: 2       // 八度
        };
        
        // 和弦库 - 4/4拍 15135琶音结构
        // 1级(C)和2级(D)根音在C2音区 (65.41Hz)
        // 其他级数根音在C1音区 (32.70Hz)
        const chordLibrary = {
            '1': { // C 和弦 - 根音C2 (65.41Hz)
                rootFreq: 65.41,
                chords: [
                    { name: 'C', type: '大三', pattern: [1, 5, 'octave', 3, 5] },
                    { name: 'Csus2', type: 'sus2', pattern: [1, 5, 'octave', 2, 5] },
                    { name: 'Csus4', type: 'sus4', pattern: [1, 5, 'octave', 4, 5] },
                    { name: 'Cadd9', type: 'add9', pattern: [1, 5, 'octave', 3, 5] },
                    { name: 'C6', type: '6', pattern: [1, 5, 'octave', 3, 6] }
                ]
            },
            '2': { // Dm 和弦 - 根音D2 (73.42Hz)
                rootFreq: 73.42,
                chords: [
                    { name: 'Dm', type: '小三', pattern: [1, 5, 'octave', 'b3', 5] },
                    { name: 'Dsus2', type: 'sus2', pattern: [1, 5, 'octave', 2, 5] },
                    { name: 'Dsus4', type: 'sus4', pattern: [1, 5, 'octave', 4, 5] },

        // 专业模式状态
        let isProMode = false;

        // ==================== 音频上下文 ====================
        let audioContext = null;
        let masterGain = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.gain.value = 0.8;
                masterGain.connect(audioContext.destination);
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // ==================== 编钟音阶配置 ====================
        // 基于曾侯乙编钟的音阶结构 - 一钟双音特性
        // 每口钟有正鼓音（敲击正鼓部）和侧鼓音（敲击侧鼓部），通常相隔三度
        const bellConfig = {
            row1: [  // 上层 - 小编钟（高音区 C5-A5）
                { note: 'C5',  sideNote: 'E5',  freq: 523.25,  sideFreq: 659.25,  label: 'C' },
                { note: 'D5',  sideNote: 'F5',  freq: 587.33,  sideFreq: 698.46,  label: 'D' },
                { note: 'E5',  sideNote: 'G5',  freq: 659.25,  sideFreq: 783.99,  label: 'E' },
                { note: 'G5',  sideNote: 'B5',  freq: 783.99,  sideFreq: 987.77,  label: 'G' },
                { note: 'A5',  sideNote: 'C6',  freq: 880.00,  sideFreq: 1046.50, label: 'A' }
            ],
            row2: [  // 中层 - 中编钟（中音区 C4-A4）
                { note: 'C4',  sideNote: 'E4',  freq: 261.63,  sideFreq: 329.63,  label: 'C' },
                { note: 'D4',  sideNote: 'F4',  freq: 293.66,  sideFreq: 349.23,  label: 'D' },
                { note: 'E4',  sideNote: 'G4',  freq: 329.63,  sideFreq: 392.00,  label: 'E' },
                { note: 'G4',  sideNote: 'B4',  freq: 392.00,  sideFreq: 493.88,  label: 'G' },
                { note: 'A4',  sideNote: 'C5',  freq: 440.00,  sideFreq: 523.25,  label: 'A' }
            ],
            row3: [  // 下层 - 大编钟（低音区 C3-A3）
                { note: 'C3',  sideNote: 'E3',  freq: 130.81,  sideFreq: 164.81,  label: 'C' },
                { note: 'D3',  sideNote: 'F3',  freq: 146.83,  sideFreq: 174.61,  label: 'D' },
                { note: 'E3',  sideNote: 'G3',  freq: 164.81,  sideFreq: 196.00,  label: 'E' },
                { note: 'G3',  sideNote: 'B3',  freq: 196.00,  sideFreq: 246.94,  label: 'G' },
                { note: 'A3',  sideNote: 'C4',  freq: 220.00,  sideFreq: 261.63,  label: 'A' }
            ]
        };

        // ==================== 编钟音色合成 ====================
        // 音频缓存 - 预生成所有音色的 AudioBuffer
        const audioBufferCache = {};
        const BUFFER_DURATION = 3.0; // 3秒音频缓冲
        const SAMPLE_RATE = 44100;
        
        // 生成编钟音色的 AudioBuffer
        function generateBellBuffer(freq) {
            const length = BUFFER_DURATION * SAMPLE_RATE;
            const buffer = audioContext.createBuffer(1, length, SAMPLE_RATE);
            const data = buffer.getChannelData(0);
            
            // 基频 + 二次谐波 + 三次谐波合成
            const fundamental = freq;
            const harmonic2 = freq * 2;
            const harmonic3 = freq * 3;
            
            for (let i = 0; i < length; i++) {
                const t = i / SAMPLE_RATE;
                
                // 基频 (正弦波) - 音量 0.6，3秒衰减
                const env1 = Math.exp(-t / 0.5); // 衰减时间常数
                const wave1 = Math.sin(2 * Math.PI * fundamental * t) * 0.6 * env1;
                
                // 二次谐波 (正弦波) - 音量 0.3，2.4秒衰减
                const env2 = Math.exp(-t / 0.4);
                const wave2 = Math.sin(2 * Math.PI * harmonic2 * t) * 0.3 * env2;
                
                // 三次谐波 (三角波近似) - 音量 0.15，1.5秒衰减
                const env3 = Math.exp(-t / 0.25);
                // 三角波：用锯齿波的奇次谐波近似
                let triWave = 0;
                for (let h = 1; h <= 5; h += 2) {
                    triWave += Math.sin(2 * Math.PI * harmonic3 * h * t) / (h * h);
                }
                triWave *= 0.15 * env3;
                
                // 快速起音 (Attack 20ms)
                let attack = 1;
                if (t < 0.02) {
                    attack = t / 0.02;
                }
                
                data[i] = (wave1 + wave2 + triWave) * attack;
            }
            
            return buffer;
        }
        
        // 预生成所有需要的频率的 AudioBuffer
        function preloadAllSounds() {
            const allFreqs = [];
            
            // 收集所有编钟频率
            Object.values(bellConfig).forEach(row => {
                row.forEach(bell => {
                    allFreqs.push(bell.freq);
                    allFreqs.push(bell.sideFreq);
                });
            });
            
            // 收集和弦库中的所有频率
            Object.values(chordLibrary).forEach(chords => {
                chords.forEach(chord => {
                    chord.notes.forEach(freq => {
                        if (!allFreqs.includes(freq)) {
                            allFreqs.push(freq);
                        }
                    });
                });
            });
            
            // 预生成所有 AudioBuffer
            allFreqs.forEach(freq => {
                if (!audioBufferCache[freq]) {
                    audioBufferCache[freq] = generateBellBuffer(freq);
                }
            });
            
            console.log(`预加载完成: ${Object.keys(audioBufferCache).length} 个音色`);
        }
        
        // 播放缓存的音频（低延迟）
        function playBellSound(freq, duration = 3) {
            initAudio();
            
            // 如果缓存中不存在，实时生成
            if (!audioBufferCache[freq]) {
                audioBufferCache[freq] = generateBellBuffer(freq);
            }
            
            const source = audioContext.createBufferSource();
            source.buffer = audioBufferCache[freq];
            source.connect(masterGain);
            source.start();
        }

        // ==================== 初始化编钟界面 ====================
        function initBells() {
            // 上层
            const row1 = document.getElementById('row1');
            bellConfig.row1.forEach((bell, index) => {
                row1.appendChild(createBellElement(bell, 'small', index));
            });

            // 中层
            const row2 = document.getElementById('row2');
            bellConfig.row2.forEach((bell, index) => {
                row2.appendChild(createBellElement(bell, 'medium', index));
            });

            // 下层
            const row3 = document.getElementById('row3');
            bellConfig.row3.forEach((bell, index) => {
                row3.appendChild(createBellElement(bell, 'large', index));
            });
        }

        function createBellElement(config, size, index) {
            const bell = document.createElement('div');
            bell.className = `bell bell-${size}`;
            bell.dataset.note = config.note;
            bell.dataset.freq = config.freq;
            bell.dataset.sideNote = config.sideNote;
            bell.dataset.sideFreq = config.sideFreq;
            
            bell.innerHTML = `
                <div class="bell-body">
                    <div class="bell-zheng">正</div>
                    <div class="bell-ce">侧</div>
                    <span class="bell-label">${config.label}</span>
                    <span class="bell-notes">${config.note}/${config.sideNote}</span>
                </div>
                <span class="mallet-hit">🔨</span>
            `;

            // 点击事件 - 根据点击位置判断正敲或侧敲
            bell.addEventListener('click', (e) => {
                const rect = bell.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const isSide = x < rect.width / 2; // 左半边为侧敲，右半边为正敲
                hitBell(bell, config, isSide);
            });
            
            bell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = bell.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const isSide = x < rect.width / 2;
                hitBell(bell, config, isSide);
            });

            return bell;
        }

        function hitBell(element, config, isSide = false) {
            initAudio();

            // 根据敲击位置选择音高
            const freq = isSide ? config.sideFreq : config.freq;
            const note = isSide ? config.sideNote : config.note;
            const hitType = isSide ? '侧敲' : '正敲';

            // 播放声音
            playBellSound(freq);

            // 视觉反馈
            element.classList.add('bell-swing');
            setTimeout(() => element.classList.remove('bell-swing'), 300);

            // 击槌动画 - 根据敲击位置显示
            const mallet = element.querySelector('.mallet-hit');
            mallet.textContent = isSide ? '🔨·' : '·🔨';
            mallet.classList.add('show');
            setTimeout(() => mallet.classList.remove('show'), 200);

            // 显示提示
            showToast(`${config.label} · ${hitType} · ${note}`);

            // 录制
            if (isRecording) {
                recordNote(note, freq, isSide);
            }
        }

        // ==================== 录制功能 ====================
        let isRecording = false;
        let recordingStartTime = 0;
        let currentRecording = [];
        let recordings = JSON.parse(localStorage.getItem('bianzhong_recordings') || '[]');
        let recordTimer = null;

        document.getElementById('btnRecord').addEventListener('click', toggleRecording);

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            initAudio();
            isRecording = true;
            recordingStartTime = Date.now();
            currentRecording = [];

            const btn = document.getElementById('btnRecord');
            btn.classList.add('recording');
            btn.innerHTML = '⏹️ 停止';

            document.getElementById('recordingIndicator').classList.add('active');
            document.getElementById('statusText').textContent = '正在录制...';
            document.getElementById('recordTime').style.display = 'block';

            // 开始计时
            recordTimer = setInterval(updateRecordTime, 1000);

            showToast('开始录制，敲击编钟吧！');
        }

        function stopRecording() {
            isRecording = false;
            clearInterval(recordTimer);

            const btn = document.getElementById('btnRecord');
            btn.classList.remove('recording');
            btn.innerHTML = '🔴 录制';

            document.getElementById('recordingIndicator').classList.remove('active');
            document.getElementById('statusText').textContent = '录制完成';
            document.getElementById('recordTime').style.display = 'none';
            document.getElementById('timeDisplay').textContent = '00:00';

            // 保存录制
            if (currentRecording.length > 0) {
                const recording = {
                    id: Date.now(),
                    name: `演奏 ${recordings.length + 1}`,
                    date: new Date().toLocaleString(),
                    duration: ((Date.now() - recordingStartTime) / 1000).toFixed(1),
                    notes: currentRecording
                };
                recordings.push(recording);
                localStorage.setItem('bianzhong_recordings', JSON.stringify(recordings));

                showToast('录制已保存！');
                updateRecordingList();
            }
        }

        function updateRecordTime() {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${minutes}:${seconds}`;
        }

        function recordNote(note, freq, isSide = false) {
            currentRecording.push({
                note: note,
                freq: freq,
                isSide: isSide,
                time: Date.now() - recordingStartTime
            });
        }

        // ==================== 回放功能 ====================
        let isPlaying = false;

        document.getElementById('btnPlayback').addEventListener('click', () => {
            if (recordings.length > 0) {
                playRecording(recordings[recordings.length - 1]);
            }
        });

        function playRecording(recording) {
            if (isPlaying || !recording.notes.length) return;

            isPlaying = true;
            showToast('开始回放...');

            recording.notes.forEach((noteData) => {
                setTimeout(() => {
                    playBellSound(noteData.freq);
                }, noteData.time);
            });

            setTimeout(() => {
                isPlaying = false;
            }, recording.notes[recording.notes.length - 1].time + 1000);
        }

        // ==================== 录制列表 ====================
        document.getElementById('btnRecordings').addEventListener('click', () => {
            updateRecordingList();
            document.getElementById('recordingsModal').classList.add('show');

        function updateRecordingList() {
            const list = document.getElementById('recordingList');

            if (recordings.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎵</div>
                        <p>还没有录制任何演奏</p>

                document.getElementById('btnPlayback').disabled = true;
            } else {
                list.innerHTML = recordings.map(rec => {
                    const sideCount = rec.notes.filter(n => n.isSide).length;
                    const zhengCount = rec.notes.length - sideCount;
                    return `
                    <li class="recording-item">
                        <div class="recording-info">
                            <div class="recording-name">${rec.name}</div>
                            <div class="recording-time">${rec.date} · ${rec.duration}秒 · ${rec.notes.length}音(正${zhengCount}/侧${sideCount})</div>

                    </li>
                `}).join('');
                document.getElementById('btnPlayback').disabled = false;
            }
        }

        function playRecordingById(id) {
            const recording = recordings.find(r => r.id === id);

                playRecording(recording);

        function deleteRecording(id) {
            if (confirm('确定要删除这个演奏吗？')) {

                updateRecordingList();
                showToast('已删除');

            document.getElementById('recordingsModal').classList.remove('show');

        // ==================== 分享功能 ====================
        let shareTargetId = null;

        function shareRecording(id) {
            shareTargetId = id;
            document.getElementById('shareModal').classList.add('show');
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('show');
            document.getElementById('shareCardContainer').innerHTML = '';
            shareTargetId = null;
        }

        // 生成分享链接
        function generateShareLink() {
            if (!shareTargetId) return;
            
            const recording = recordings.find(r => r.id === shareTargetId);
            if (!recording) return;
            
            // 将录制数据编码为Base64
            const data = JSON.stringify({
                name: recording.name,
                notes: recording.notes,
                duration: recording.duration
            });
            const encoded = btoa(encodeURIComponent(data));
            
            // 生成链接
            const link = `${window.location.origin}${window.location.pathname}?share=${encoded}`;
            return link;
        }

        function copyLink() {
            const link = generateShareLink();
            if (link) {
                // 复制到剪贴板
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(link).then(() => {
                        showToast('链接已复制到剪贴板！');
                    }).catch(() => {
                        fallbackCopy(link);
                    });
                } else {
                    fallbackCopy(link);
                }
            }
            closeShareModal();
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('链接已复制到剪贴板！');
            } catch (err) {
                showToast('复制失败，请手动复制');
                alert('分享链接：' + text);
            }
            
            document.body.removeChild(textarea);
        }

        // 生成分享卡片
        function generateShareCard() {
            if (!shareTargetId) return;
            
            const recording = recordings.find(r => r.id === shareTargetId);
            if (!recording) return;
            
            const container = document.getElementById('shareCardContainer');
            container.innerHTML = '';
            
            // 创建canvas
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            // 背景渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 600, 400);
            
            // 边框
            ctx.strokeStyle = '#f5af19';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, 580, 380);
            
            // 标题
            ctx.fillStyle = '#f5af19';
            ctx.font = 'bold 36px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🔔 编钟模拟器', 300, 70);
            
            // 分隔线
            ctx.strokeStyle = 'rgba(245, 175, 25, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(100, 90);
            ctx.lineTo(500, 90);
            ctx.stroke();
            
            // 演奏信息
            ctx.fillStyle = '#fff';
            ctx.font = '24px "Microsoft YaHei", sans-serif';
            ctx.fillText(recording.name, 300, 140);
            
            const sideCount = recording.notes.filter(n => n.isSide).length;
            const zhengCount = recording.notes.length - sideCount;
            
            ctx.font = '18px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillText(`⏱️ ${recording.duration}秒 · 🎵 ${recording.notes.length}音(正${zhengCount}/侧${sideCount})`, 300, 175);
            ctx.fillText(`📅 ${recording.date}`, 300, 205);
            
            // 提示文字
            ctx.fillStyle = '#00d2d3';
            ctx.font = '20px "Microsoft YaHei", sans-serif';
            ctx.fillText('扫码收听我的编钟演奏', 300, 260);
            
            // 生成二维码（简化版）
            drawSimpleQR(ctx, 250, 280, 100);
            
            // 底部文字
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '14px "Microsoft YaHei", sans-serif';
            ctx.fillText('hiyascott.github.io/scott-portfolio', 300, 370);
            
            // 显示卡片
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.style.width = '100%';
            img.style.borderRadius = '10px';
            img.style.marginTop = '15px';
            container.appendChild(img);
            
            // 添加保存按钮
            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn btn-primary';
            saveBtn.style.width = '100%';
            saveBtn.style.marginTop = '10px';
            saveBtn.textContent = '💾 保存图片';
            saveBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = `编钟演奏-${recording.name}.png`;
                a.click();
                showToast('图片已保存！');
            };
            container.appendChild(saveBtn);
            
            showToast('分享卡片已生成！');
        }

        // 简化版二维码绘制
        function drawSimpleQR(ctx, x, y, size) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, y, size, size);
            ctx.fillStyle = '#000';
            
            const cellSize = size / 25;
            for (let i = 0; i < 25; i++) {
                for (let j = 0; j < 25; j++) {
                    if (Math.random() > 0.5) {
                        ctx.fillRect(x + i * cellSize, y + j * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // 定位点
            ctx.fillStyle = '#000';
            // 左上
            ctx.fillRect(x + 2 * cellSize, y + 2 * cellSize, 5 * cellSize, 5 * cellSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3 * cellSize, y + 3 * cellSize, 3 * cellSize, 3 * cellSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 4 * cellSize, y + 4 * cellSize, cellSize, cellSize);
            
            // 右上
            ctx.fillRect(x + 18 * cellSize, y + 2 * cellSize, 5 * cellSize, 5 * cellSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 19 * cellSize, y + 3 * cellSize, 3 * cellSize, 3 * cellSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 20 * cellSize, y + 4 * cellSize, cellSize, cellSize);
            
            // 左下
            ctx.fillRect(x + 2 * cellSize, y + 18 * cellSize, 5 * cellSize, 5 * cellSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3 * cellSize, y + 19 * cellSize, 3 * cellSize, 3 * cellSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 4 * cellSize, y + 20 * cellSize, cellSize, cellSize);
        }

        function shareToWeChat() {
            generateShareCard();
            showToast('分享卡片已生成，请截图发送给Hugo！');
        }

        function downloadRecording() {
            const recording = recordings.find(r => r.id === shareTargetId);
            if (!recording) return;
            
            // 导出为JSON
            const data = JSON.stringify(recording, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `编钟演奏-${recording.name}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
            showToast('演奏数据已导出！');
            closeShareModal();
        }

        // 检查URL参数，加载分享的演奏
        function checkSharedRecording() {
            const params = new URLSearchParams(window.location.search);
            const shareData = params.get('share');
            
            if (shareData) {
                try {
                    const decoded = decodeURIComponent(atob(shareData));
                    const recording = JSON.parse(decoded);
                    
                    // 添加到录制列表
                    recording.id = Date.now();
                    recording.date = '来自分享';
                    recordings.push(recording);
                    localStorage.setItem('bianzhong_recordings', JSON.stringify(recordings));
                    updateRecordingList();
                    
                    showToast('已加载分享的演奏！');
                    
                    // 播放
                    setTimeout(() => {
                        playRecording(recording);
                    }, 1000);
                } catch (e) {
                    console.error('加载分享失败:', e);
                    showToast('分享链接无效');
                }
            }
        }

        document.getElementById('btnDemo').addEventListener('click', () => {
            playDemo();

        // ==================== 清空功能 ====================
        document.getElementById('btnClear').addEventListener('click', () => {
            if (confirm('确定要清空所有录制数据吗？')) {
                recordings = [];
                localStorage.removeItem('bianzhong_recordings');
                updateRecordingList();
                showToast('已清空所有数据');
            }
        });

        // ==================== 工具函数 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 专业模式功能 ====================
        function initProMode() {
            const chordGrid = document.getElementById('chordGrid');
            const degrees = ['1', '2', '3', '4', '5', '6', 'b7'];
            
            degrees.forEach(degree => {
                const chordData = chordLibrary[degree];
                const chords = chordData.chords;
                // 为每个级数选择一个默认和弦（优先选择包含sus或add的丰富和弦）
                const defaultChordIndex = chords.findIndex(c => c.type.includes('sus') || c.type.includes('add')) || 0;
                const chord = chords[defaultChordIndex];
                
                const btn = document.createElement('button');
                btn.className = 'chord-btn';
                btn.dataset.degree = degree;
                btn.dataset.chordIndex = defaultChordIndex;
                btn.innerHTML = `
                    <span>${degree}</span>
                    <span class="chord-type">${chord.name}</span>
                `;
                
                // 长按切换和弦类型
                let longPressTimer;
                btn.addEventListener('mousedown', () => {
                    longPressTimer = setTimeout(() => {
                        cycleChordType(btn, degree);
                    }, 500);
                });
                btn.addEventListener('mouseup', () => clearTimeout(longPressTimer));
                btn.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
                
                // 触摸设备支持
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    longPressTimer = setTimeout(() => {
                        cycleChordType(btn, degree);
                    }, 500);
                });
                btn.addEventListener('touchend', () => clearTimeout(longPressTimer));
                
                // 点击触发琶音器
                btn.addEventListener('click', () => {
                    if (!isProMode) return;
                    triggerChordArpeggio(btn, degree, parseInt(btn.dataset.chordIndex));
                });
                
                chordGrid.appendChild(btn);
            });
        }

        function cycleChordType(btn, degree) {
            const chordData = chordLibrary[degree];
            const chords = chordData.chords;
            let currentIndex = parseInt(btn.dataset.chordIndex);
            let nextIndex = (currentIndex + 1) % chords.length;
            
            // 切换到下一个和弦类型
            btn.dataset.chordIndex = nextIndex;
            const chord = chords[nextIndex];
            btn.innerHTML = `
                <span>${degree}</span>
                <span class="chord-type">${chord.name}</span>
            `;
            
            showToast(`${degree}级: ${chord.name} ${chord.type}`);
        }

        // 根据pattern生成音符频率数组
        function generateChordNotes(rootFreq, pattern) {
            const notes = [];
            for (const interval of pattern) {
                const ratio = INTERVAL_RATIOS[interval];
                notes.push(rootFreq * ratio);
            }
            return notes;
        }

        function triggerChordArpeggio(btn, degree, chordIndex) {
            initAudio();
            
            // 触发限制：如果正在播放，先停止当前琶音
            if (isArpeggiatorPlaying) {
                stopArpeggio();
            }
            
            const chordData = chordLibrary[degree];
            const chord = chordData.chords[chordIndex];
            const rootFreq = chordData.rootFreq;
            
            // 生成音符频率
            const notes = generateChordNotes(rootFreq, chord.pattern);
            
            // 视觉反馈
            document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeChordBtn = btn;
            
            // 显示当前和弦
            showToast(`${chord.name} ${chord.type}`);
            
            // 播放琶音（和弦分解）
            isArpeggiatorPlaying = true;
            currentChord = chord;
            
            // 琶音模式：4/4拍 15135结构
            playArpeggioPattern(notes);
        }
        
        function playArpeggioPattern(notes, pattern = '15135') {
            const now = audioContext.currentTime;
            
            // 清理之前的定时器
            arpeggiatorTimeouts.forEach(id => clearTimeout(id));
            arpeggiatorTimeouts = [];
            
            // 5个音的 15135 结构
            // 0ms: 音1, 600ms: 音5, 1200ms: 音1, 1800ms: 音3, 2400ms: 音5(延长)
            const noteCount = notes.length;
            const regularNoteDuration = EIGHTH_NOTE_MS / 1000; // 8分音符秒数
            const finalNoteDuration = (BEAT_MS * FINAL_NOTE_BEATS) / 1000; // 最后音延长两拍
            
            // 前4个音按时序播放（每个8分音符）
            for (let i = 0; i < noteCount - 1; i++) {
                const playTime = now + (i * regularNoteDuration);
                const freq = notes[i];
                
                // 确保音频缓冲已生成
                if (!audioBufferCache[freq]) {
                    audioBufferCache[freq] = generateBellBuffer(freq);
                }
                
                const source = audioContext.createBufferSource();
                source.buffer = audioBufferCache[freq];
                source.connect(masterGain);
                source.start(playTime);
            }
            
            // 最后一个音：延长两拍
            const lastIndex = noteCount - 1;
            const lastPlayTime = now + (lastIndex * regularNoteDuration);
            const lastFreq = notes[lastIndex];
            
            if (!audioBufferCache[lastFreq]) {
                audioBufferCache[lastFreq] = generateBellBuffer(lastFreq);
            }
            
            const lastSource = audioContext.createBufferSource();
            lastSource.buffer = audioBufferCache[lastFreq];
            lastSource.connect(masterGain);
            lastSource.start(lastPlayTime);
            
            // 视觉反馈和状态重置定时器
            const visualTimeouts = [
                // 每个音的视觉反馈
                setTimeout(() => {}, 0),
                setTimeout(() => {}, EIGHTH_NOTE_MS),
                setTimeout(() => {}, EIGHTH_NOTE_MS * 2),
                setTimeout(() => {}, EIGHTH_NOTE_MS * 3),
                setTimeout(() => {}, EIGHTH_NOTE_MS * 4)
            ];
            
            // 4拍后重置状态（最后一个音持续两拍，所以总时长是 4拍）
            const resetTimeout = setTimeout(() => {
                isArpeggiatorPlaying = false;
                if (activeChordBtn) {
                    activeChordBtn.classList.remove('active');
                }
            }, BEAT_MS * 4); // 4拍 = 4800ms @ BPM 50
            
            arpeggiatorTimeouts = [...visualTimeouts, resetTimeout];
        }

        function stopArpeggio() {
            isArpeggiatorPlaying = false;
            // 清理所有定时器
            arpeggiatorTimeouts.forEach(id => clearTimeout(id));
            arpeggiatorTimeouts = [];
            if (activeChordBtn) {
                activeChordBtn.classList.remove('active');
                activeChordBtn = null;
            }
        }

        function toggleProMode() {
            isProMode = !isProMode;
            const panel = document.getElementById('proModePanel');
            const btn = document.getElementById('btnProMode');
            
            if (isProMode) {
                panel.classList.add('active');
                btn.classList.add('active');
                btn.innerHTML = '🎹 退出专业';
                showToast('专业模式开启 - BPM 50');
            } else {
                panel.classList.remove('active');
                btn.classList.remove('active');
                btn.innerHTML = '🎹 专业模式';
                stopArpeggio();
            }
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initBells();
            updateRecordingList();
            checkSharedRecording();
            initProMode(); // 初始化专业模式

            // 专业模式切换按钮
            document.getElementById('btnProMode').addEventListener('click', toggleProMode);

            // 点击空白关闭弹窗
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('show');
                    }
                });
            });

            // 首次用户交互时初始化音频并预加载所有声音
            const firstInteractionHandler = () => {
                initAudio();
                // 延迟一点时间让音频上下文准备好
                setTimeout(() => {
                    preloadAllSounds();
                    showToast('🎵 音频缓存完成 - 点击即可播放');
                }, 100);
                document.removeEventListener('click', firstInteractionHandler);
                document.removeEventListener('touchstart', firstInteractionHandler);
            };
            document.addEventListener('click', firstInteractionHandler);
            document.addEventListener('touchstart', firstInteractionHandler);
        });
    </script>
