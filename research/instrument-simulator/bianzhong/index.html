<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- v1.6.0: PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="编钟模拟器">
    <link rel="manifest" href="manifest.json">
    <title>编钟模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            min-height: -webkit-fill-available; /* iOS 适配 */
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            /* v1.6.3: 扩展到安全区域 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 竖屏提示 */
        .orientation-tip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .orientation-tip .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: rotate 2s ease-in-out infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media screen and (orientation: portrait) {
            .orientation-tip {
                display: flex;
            }
            .app-container {
                display: none !important;
            }
        }

        /* 主容器 */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* v1.6.3: 全屏模式适配，确保背景铺满 */
        @media all and (display-mode: standalone) {
            html, body {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: 100% !important;
            }
            body {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
        }

        /* 顶部工具栏 */
        .toolbar {
            height: 50px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .toolbar-title {
            font-size: 1.1rem;
            color: #f5af19;
            font-weight: bold;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        /* v1.7.3: 小屏幕适配 */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0 8px;
                height: 45px;
            }
            .toolbar-title {
                font-size: 0.9rem;
            }
            .toolbar-title span {
                display: none;
            }
            .toolbar-actions {
                gap: 5px;
            }
            .toolbar-actions .btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            .toolbar-status {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .toolbar-actions .btn {
                padding: 5px 8px;
                font-size: 0.7rem;
            }
        }

        /* v1.6.4: 工具栏状态显示 */
        .toolbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
        }

        .toolbar-status .recording-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            display: inline-block;
        }

        .toolbar-status .recording-indicator.recording {
            background: #f44336;
            animation: blink 1s infinite;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.recording {
            background: #ff0000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 状态显示 */
        .status-bar {
            height: 30px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recording-indicator {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            display: none;
        }

        .recording-indicator.active {
            display: block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 播放状态栏 */
        .playback-status {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(90deg, rgba(0, 210, 211, 0.9), rgba(0, 150, 150, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
            padding: 0 15px;
            box-shadow: 0 2px 10px rgba(0, 210, 211, 0.3);
        }

        .playback-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .playback-icon {
            font-size: 1.2rem;
            animation: pulse 1s infinite;
        }

        .btn-stop {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 15px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-stop:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* 编钟区域 */
        .bells-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        /* 钟架 */
        .frame {
            width: 95%;
            max-width: 800px;
            background: linear-gradient(180deg, #8B4513 0%, #654321 100%);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 8px;
            background: linear-gradient(90deg, #DAA520, #FFD700, #DAA520);
            border-radius: 4px;
        }

        /* 钟的行 */
        .bell-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        /* 钟的样式 */
        .bell {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .bell:active {
            transform: scale(0.95);
        }

        .bell-swing {
            animation: swing 0.5s cubic-bezier(0.36, 0, 0.66, -0.56);
        }

        .bell-swing-strong {
            animation: swingStrong 0.6s cubic-bezier(0.36, 0, 0.66, -0.56);
        }

        @keyframes swing {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes swingStrong {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-8deg) scale(1.02); }
            40% { transform: rotate(6deg) scale(1.02); }
            60% { transform: rotate(-4deg) scale(1.01); }
            80% { transform: rotate(2deg) scale(1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* 编钟发光效果 */
        .bell-glow {
            animation: bellGlow 0.6s ease-out;
        }

        @keyframes bellGlow {
            0% { 
                filter: brightness(1) drop-shadow(0 0 0 rgba(255, 215, 0, 0));
            }
            30% { 
                filter: brightness(1.5) drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            }
            60% { 
                filter: brightness(1.3) drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
            }
            100% { 
                filter: brightness(1) drop-shadow(0 0 0 rgba(255, 215, 0, 0));
            }
        }

        .bell-playing {
            position: relative;
        }

        .bell-playing::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.8);
            animation: ripple 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple {
            0% {
                width: 100%;
                height: 100%;
                opacity: 1;
            }
            100% {
                width: 200%;
                height: 200%;
                opacity: 0;
            }
        }

        /* 钟形 - 小编钟（上层） */
        .bell-small {
            width: 45px;
            height: 55px;
        }

        .bell-small .bell-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 50%, #B8860B 100%);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 
                inset -3px -3px 8px rgba(0,0,0,0.3),
                inset 3px 3px 8px rgba(255,255,255,0.3),
                0 3px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        .bell-small .bell-body::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #8B4513;
            border-radius: 50%;
        }

        /* 钟形 - 中编钟（中层） */
        .bell-medium {
            width: 60px;
            height: 70px;
        }

        .bell-medium .bell-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 50%, #B8860B 100%);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 
                inset -4px -4px 10px rgba(0,0,0,0.3),
                inset 4px 4px 10px rgba(255,255,255,0.3),
                0 4px 8px rgba(0,0,0,0.3);
            position: relative;
        }

        .bell-medium .bell-body::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #8B4513;
            border-radius: 50%;
        }

        /* 钟形 - 大编钟（下层） */
        .bell-large {
            width: 80px;
            height: 90px;
        }

        .bell-large .bell-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 50%, #B8860B 100%);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            box-shadow: 
                inset -5px -5px 12px rgba(0,0,0,0.3),
                inset 5px 5px 12px rgba(255,255,255,0.3),
                0 5px 10px rgba(0,0,0,0.3);
            position: relative;
        }

        .bell-large .bell-body::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #8B4513;
            border-radius: 50%;
        }

        /* 钟形样式增强 */
        .bell-body {
            position: relative;
            overflow: hidden;
        }

        /* 正敲/侧敲区域提示 */
        .bell-zheng, .bell-ce {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: rgba(0,0,0,0.4);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bell-zheng {
            right: 8px;
        }

        .bell-ce {
            left: 8px;
        }

        .bell:hover .bell-zheng, .bell:hover .bell-ce {
            opacity: 1;
        }

        /* 双音标记 */
        .bell-notes {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: rgba(0,0,0,0.5);
            font-weight: bold;
            pointer-events: none;
        }

        .bell-small .bell-notes {
            font-size: 0.5rem;
        }

        .bell-large .bell-notes {
            font-size: 0.65rem;
        }
        .bell-label {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(0,0,0,0.6);
            font-weight: bold;
            pointer-events: none;
        }

        .bell-large .bell-label {
            font-size: 0.8rem;
            bottom: 8px;
        }

        /* 击槌效果 */
        .mallet-hit {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            opacity: 0;
            pointer-events: none;
        }

        .mallet-hit.show {
            animation: hit 0.2s ease-out;
        }

        @keyframes hit {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* 控制面板 */
        .control-panel {
            height: 60px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 0 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-large {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        /* 专业模式面板 */
        /* v1.5.8: 优化专业模式面板布局 */
        .pro-mode-panel {
            position: fixed;
            bottom: 0; /* 底对齐 */
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(26,26,46,0.98), rgba(15,52,96,0.98));
            border-top: 2px solid var(--neon-cyan, #00ffff);
            padding: 12px 20px;
            z-index: 100;
            display: none;
            flex-direction: row; /* 水平排列 */
            align-items: center; /* 垂直居中 */
            justify-content: center; /* 水平居中 */
            gap: 20px;
            height: 90px; /* 固定高度 */
            overflow: hidden;
        }

        /* v1.5.8: 遮罩层，防止点击下方按钮 */
        .pro-mode-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: transparent;
            z-index: 99;
            display: none;
        }
        
        .pro-mode-overlay.active {
            display: block;
        }

        .pro-mode-panel.active {
            display: flex;
        }

        .pro-mode-header {
            display: flex;
            flex-direction: column; /* 垂直排列 */
            align-items: flex-start;
            gap: 5px;
            color: var(--neon-cyan, #00ffff);
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* v1.5.8: 退出按钮 */
        .pro-mode-exit-btn {
            background: rgba(255,0,0,0.2);
            border: 1px solid rgba(255,0,0,0.5);
            color: #ff6666;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .pro-mode-exit-btn:hover {
            background: rgba(255,0,0,0.4);
        }

        .bpm-display {
            background: rgba(0,255,255,0.1);
            padding: 4px 12px;
            border-radius: 15px;
            border: 1px solid var(--neon-cyan, #00ffff);
            font-size: 0.75rem;
            color: #00ffff; /* v1.6.4: BPM 字色改为浅色 */
        }

        .chord-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: nowrap; /* 不换行 */
        }

        .chord-btn {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            position: relative; /* v1.6.4: 用于倒计时定位 */
        }

        .chord-btn:hover {
            border-color: var(--neon-gold, #f5af19);
            background: rgba(245,175,25,0.1);
        }

        .chord-btn.active {
            border-color: var(--neon-cyan, #00ffff);
            background: rgba(0,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        .chord-btn .chord-type {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
            font-weight: normal;
        }

        .chord-btn.playing {
            animation: chordPulse 0.3s ease-out;
        }

        /* v1.6.7: 边框燃尽动画 - 连续流畅的顺时针消失 */
        .chord-btn {
            position: relative;
        }
        
        .chord-btn .burn-ring {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            pointer-events: none;
            opacity: 0;
        }
        
        .chord-btn.active .burn-ring {
            opacity: 1;
        }
        
        .chord-btn .burn-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg); /* 从12点开始 */
        }
        
        .chord-btn .burn-ring circle {
            fill: none;
            stroke: rgba(0, 255, 255, 0.8);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 200; /* 周长 */
            stroke-dashoffset: 0;
        }
        
        .chord-btn.active .burn-ring circle {
            animation: burnRing 4.8s linear forwards;
        }
        
        @keyframes burnRing {
            0% {
                stroke-dashoffset: 0; /* 完整边框 */
            }
            100% {
                stroke-dashoffset: 200; /* 完全消失 */
            }
        }

        @keyframes chordPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: rgba(0,255,255,0.4); }
            100% { transform: scale(1); }
        }

        .mode-toggle {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
        }

        .mode-toggle.active {
            background: linear-gradient(135deg, #00d2d3, #01a3a4);
        }

        /* v1.6.0: 全屏按钮样式 */
        .fullscreen-btn {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: #fff;
            font-size: 1.2rem;
            padding: 8px 12px;
            min-width: 40px;
        }
        
        .fullscreen-btn:hover {
            background: linear-gradient(135deg, #34495e, #2c3e50);
        }

        /* v1.6.0: 引导提示样式 */
        .pwa-prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid #f5af19;
            border-radius: 15px;
            padding: 20px 30px;
            z-index: 2000;
            text-align: center;
            max-width: 320px;
            display: none;
        }
        
        .pwa-prompt.show {
            display: block;
        }
        
        .pwa-prompt h3 {
            color: #f5af19;
            margin-bottom: 15px;
        }
        
        .pwa-prompt p {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .pwa-prompt .btn {
            margin: 5px;
        }

        /* 录制列表弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            max-height: 80%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #f5af19;
            font-size: 1.1rem;
        }

        .modal-close {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;

                });
            });
            
            // 收集和弦库中的所有频率
            Object.values(chordLibrary).forEach(chordData => {
                if (chordData && chordData.notes) {
                    chordData.notes.forEach(freq => {
                        if (!allFreqs.includes(freq)) {
                            allFreqs.push(freq);
                        }
                    });
                }
            });
            
            // 预生成所有 AudioBuffer
            allFreqs.forEach(freq => {
                if (!audioBufferCache[freq]) {
                    audioBufferCache[freq] = generateBellBuffer(freq);
                }
            });
            
            console.log(`预加载完成: ${Object.keys(audioBufferCache).length} 个音色`);
        }
        
        // 播放缓存的音频（低延迟）
        function playBellSound(freq, duration = 3) {
            initAudio();
            
            // 如果缓存中不存在，实时生成
            if (!audioBufferCache[freq]) {
                audioBufferCache[freq] = generateBellBuffer(freq);
            }
            
            const source = audioContext.createBufferSource();
            source.buffer = audioBufferCache[freq];
            source.connect(masterGain);
            source.start();
        }

        function createBellElement(config, size, index) {
            const bell = document.createElement('div');
            bell.className = `bell bell-${size}`;
            bell.dataset.note = config.note;
            bell.dataset.freq = config.freq;
            bell.dataset.sideNote = config.sideNote;
            bell.dataset.sideFreq = config.sideFreq;
            
            bell.innerHTML = `
                <div class="bell-body">
                    <div class="bell-zheng">正</div>
                    <div class="bell-ce">侧</div>
                    <span class="bell-label">${config.label}</span>
                    <span class="bell-notes">${config.note}/${config.sideNote}</span>
                </div>
                <span class="mallet-hit">🔨</span>
            `;

            // 点击事件 - 根据点击位置判断正敲或侧敲
            bell.addEventListener('click', (e) => {
                const rect = bell.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const isSide = x < rect.width / 2; // 左半边为侧敲，右半边为正敲
                hitBell(bell, config, isSide);
            });
            
            bell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = bell.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const isSide = x < rect.width / 2;
                hitBell(bell, config, isSide);
            });

            return bell;
        }

        function hitBell(element, config, isSide = false) {
            initAudio();

            // 根据敲击位置选择音高
            const freq = isSide ? config.sideFreq : config.freq;
            const note = isSide ? config.sideNote : config.note;
            const hitType = isSide ? '侧敲' : '正敲';

            // 播放声音
            playBellSound(freq);

            // 强化视觉反馈
            playBellAnimation(element, isSide);

            // 显示提示
            showToast(`${config.label} · ${hitType} · ${note}`);

            // 录制
            if (isRecording) {
                recordNote(note, freq, isSide);
            }
        }

            if (isPlaying || !recording.notes.length) return;

            isPlaying = true;
            showPlaybackStatus(recording.name, 'recording');
            showToast('开始回放...');

            // 清理之前的定时器
            playbackTimeouts.forEach(id => clearTimeout(id));
            playbackTimeouts = [];

            recording.notes.forEach((noteData) => {
                const timeout = setTimeout(() => {
                    if (!isPlaying) return;
                    // 播放音频
                    playBellSound(noteData.freq);
                    // 触发强化动画
                    animateBellByNote(noteData.note, noteData.isSide);
                }, noteData.time);
                playbackTimeouts.push(timeout);
            });

            // 播放结束后隐藏状态栏
            const endTimeout = setTimeout(() => {
                if (isPlaying) {
                    isPlaying = false;
                    hidePlaybackStatus();
                }
            }, recording.notes[recording.notes.length - 1].time + 1000);
            playbackTimeouts.push(endTimeout);
        }

        // 简化版二维码绘制
        function drawSimpleQR(ctx, x, y, size) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, y, size, size);
            ctx.fillStyle = '#000';
            
            const cellSize = size / 25;
            for (let i = 0; i < 25; i++) {
                for (let j = 0; j < 25; j++) {
                    if (Math.random() > 0.5) {
                        ctx.fillRect(x + i * cellSize, y + j * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // 定位点
            ctx.fillStyle = '#000';
            // 左上
            ctx.fillRect(x + 2 * cellSize, y + 2 * cellSize, 5 * cellSize, 5 * cellSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3 * cellSize, y + 3 * cellSize, 3 * cellSize, 3 * cellSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 4 * cellSize, y + 4 * cellSize, cellSize, cellSize);
            
            // 右上
            ctx.fillRect(x + 18 * cellSize, y + 2 * cellSize, 5 * cellSize, 5 * cellSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 19 * cellSize, y + 3 * cellSize, 3 * cellSize, 3 * cellSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 20 * cellSize, y + 4 * cellSize, cellSize, cellSize);
            
            // 左下
            ctx.fillRect(x + 2 * cellSize, y + 18 * cellSize, 5 * cellSize, 5 * cellSize);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3 * cellSize, y + 19 * cellSize, 3 * cellSize, 3 * cellSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 4 * cellSize, y + 20 * cellSize, cellSize, cellSize);
        }

        function triggerChordArpeggio(btn, degree) {
            initAudio();
            
            // 触发限制：如果正在播放，先停止当前琶音
            if (isArpeggiatorPlaying) {
                stopArpeggio();
            }
            
            const chordData = chordLibrary[degree];
            if (!chordData) return;
            
            // 直接获取预定义的4个音
            const notes = getChordNotes(chordData);
            
            // 视觉反馈
            document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeChordBtn = btn;
            
            // 显示当前和弦
            showToast(`${chordData.name} ${chordData.type}`);
            
            // 播放琶音（和弦分解）
            isArpeggiatorPlaying = true;
            currentChord = chordData;
            
            // 播放预定义的4个音
            playArpeggioPattern(notes);
        }
        
        // v1.5.7: 维护正在播放的音频源数组（用于单实例限制）
        let activeSources = [];
        
        function playArpeggioPattern(notes) {
            const now = audioContext.currentTime;
            
            // v1.5.7: 单实例锁 - 停止之前所有正在播放的音频源
            activeSources.forEach(source => {
                try {
                    source.stop();
                } catch (e) {
                    // 忽略已经停止的源
                }
            });
            activeSources = [];
            
            // 清理之前的定时器
            arpeggiatorTimeouts.forEach(id => clearTimeout(id));
            arpeggiatorTimeouts = [];
            
            // v1.6.4: 清理之前的倒计时显示
            document.querySelectorAll('.chord-btn .countdown').forEach(el => el.remove());
            
            // v1.5.5 修复：4个音都使用传入的 notes，不再固定最后一个音为 C3
            const eighthNoteDuration = EIGHTH_NOTE_MS / 1000; // 8分音符秒数 (0.6s)
            
            // v1.6.7: 创建 SVG 燃尽环
            if (activeChordBtn) {
                // 移除旧的燃尽环
                const oldRing = activeChordBtn.querySelector('.burn-ring');
                if (oldRing) oldRing.remove();
                
                // 创建新的燃尽环
                const ring = document.createElement('div');
                ring.className = 'burn-ring';
                ring.innerHTML = `
                    <svg viewBox="0 0 60 60">
                        <rect x="2" y="2" width="56" height="56" rx="8" ry="8" />
                    </svg>
                `;
                activeChordBtn.appendChild(ring);
                
                // 触发动画
                requestAnimationFrame(() => {
                    activeChordBtn.classList.add('active');
                });
            }
            
            // 播放4个音（每个8分音符）
            for (let i = 0; i < 4; i++) {
                const playTime = now + (i * eighthNoteDuration);
                const freq = notes[i];
                
                // 确保音频缓冲已生成
                if (!audioBufferCache[freq]) {
                    audioBufferCache[freq] = generateBellBuffer(freq);
                }
                
                const source = audioContext.createBufferSource();
                source.buffer = audioBufferCache[freq];
                source.connect(masterGain);
                source.start(playTime);
                
                // v1.5.7: 跟踪这个音频源
                activeSources.push(source);
            }
            
            // 4拍后重置状态（4个8分音符占2拍 + 延音踏板2拍 = 总4拍）
            const resetTimeout = setTimeout(() => {
                isArpeggiatorPlaying = false;
                if (activeChordBtn) {
                    activeChordBtn.classList.remove('active');
                    // v1.6.7: 移除燃尽环
                    const ring = activeChordBtn.querySelector('.burn-ring');
                    if (ring) ring.remove();
                }
            }, BEAT_MS * 4); // 4拍 = 4800ms @ BPM 50
            
            arpeggiatorTimeouts.push(resetTimeout);
        }

        // ==================== MIDI 文件导入功能 ====================
        // MIDI音符编号到频率的映射表（基于A4=440Hz）
        const midiToFreq = {};
        for (let i = 0; i < 128; i++) {
            midiToFreq[i] = 440 * Math.pow(2, (i - 69) / 12);
        }

        // MIDI音符编号到音符名称的映射
        const midiToNote = {};
        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        for (let i = 0; i < 128; i++) {
            const octave = Math.floor(i / 12) - 1;
            const noteName = noteNames[i % 12];
            midiToNote[i] = `${noteName}${octave}`;
        }

        // 解析MIDI文件
        function parseMidiFile(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            let pos = 0;

            // 读取Uint8
            function readUint8() {
                return data[pos++];
            }

            // 读取Uint16（大端）
            function readUint16() {
                return (readUint8() << 8) | readUint8();
            }

            // 读取Uint32（大端）
            function readUint32() {
                return (readUint16() << 16) | readUint16();
            }

            // 读取可变长度值
            function readVariableLength() {
                let value = 0;
                let byte;
                do {
                    byte = readUint8();
                    value = (value << 7) | (byte & 0x7F);
                } while (byte & 0x80);
                return value;
            }

            // 检查MIDI文件头
            const header = String.fromCharCode(...data.slice(0, 4));
            if (header !== 'MThd') {
                throw new Error('不是有效的MIDI文件');
            }

            pos = 4;
            const headerLength = readUint32();
            const format = readUint16();
            const trackCount = readUint16();
            const timeDivision = readUint16();

            // 计算每个tick的毫秒数（基于120 BPM默认速度）
            let ticksPerBeat = timeDivision & 0x7FFF;
            let microsecondsPerBeat = 500000; // 120 BPM默认

            const tracks = [];

            // 解析每个音轨
            for (let trackIndex = 0; trackIndex < trackCount; trackIndex++) {
                const trackHeader = String.fromCharCode(...data.slice(pos, pos + 4));
                if (trackHeader !== 'MTrk') {
                    throw new Error(`音轨 ${trackIndex} 格式错误`);
                }
                pos += 4;

                const trackLength = readUint32();
                const trackEnd = pos + trackLength;

                const events = [];
                let runningStatus = 0;
                let currentTime = 0;

                while (pos < trackEnd) {
                    const deltaTime = readVariableLength();
                    currentTime += deltaTime;

                    let status = readUint8();

                    // 运行状态
                    if (status < 0x80) {
                        status = runningStatus;
                        pos--;
                    } else {
                        runningStatus = status;
                    }

                    const type = status & 0xF0;
                    const channel = status & 0x0F;

                    if (type === 0x90) { // Note On
                        const note = readUint8();
                        const velocity = readUint8();
                        if (velocity > 0) {
                            events.push({
                                time: currentTime,
                                type: 'noteOn',
                                note: note,
                                velocity: velocity,
                                channel: channel
                            });
                        } else {
                            // 速度为0视为Note Off
                            events.push({
                                time: currentTime,
                                type: 'noteOff',
                                note: note,
                                channel: channel
                            });
                        }
                    } else if (type === 0x80) { // Note Off
                        const note = readUint8();
                        readUint8(); // velocity，忽略
                        events.push({
                            time: currentTime,
                            type: 'noteOff',
                            note: note,
                            channel: channel
                        });
                    } else if (type === 0xB0) { // Control Change
                        readUint8(); // controller
                        readUint8(); // value
                    } else if (type === 0xC0) { // Program Change
                        readUint8(); // program
                    } else if (type === 0xD0) { // Channel Pressure
                        readUint8(); // pressure
                    } else if (type === 0xE0) { // Pitch Bend
                        readUint8();
                        readUint8();
                    } else if (status === 0xFF) { // Meta Event
                        const metaType = readUint8();
                        const metaLength = readVariableLength();

                        if (metaType === 0x51) { // Tempo
                            microsecondsPerBeat = (readUint8() << 16) | (readUint8() << 8) | readUint8();
                        } else if (metaType === 0x2F) { // End of Track
                            break;
                        } else {
                            pos += metaLength; // 跳过其他元事件
                        }
                    } else if (status === 0xF0 || status === 0xF7) { // SysEx
                        const length = readVariableLength();
                        pos += length;
                    }
                }

                tracks.push({
                    events: events,
                    microsecondsPerBeat: microsecondsPerBeat
                });
            }

            return {
                format,
                trackCount,
                ticksPerBeat,
                tracks
            };
        }

        // 将MIDI转换为编钟演奏数据
        function convertMidiToBells(midiData) {
            const bpm = Math.round(60000000 / midiData.tracks[0].microsecondsPerBeat);
            const msPerTick = (60000 / bpm) / midiData.ticksPerBeat;

            const allNotes = [];

            // 合并所有音轨的音符
            midiData.tracks.forEach(track => {
                track.events.forEach(event => {
                    if (event.type === 'noteOn') {
                        // 只处理在编钟音域内的音符 (C3-C6, MIDI 48-84)
                        if (event.note >= 48 && event.note <= 84) {
                            const timeMs = Math.round(event.time * msPerTick);
                            const freq = midiToFreq[event.note];
                            const noteName = midiToNote[event.note];

                            allNotes.push({
                                note: noteName,
                                freq: freq,
                                isSide: false,
                                time: timeMs,
                                originalMidiNote: event.note
                            });
                        }
                    }
                });
            });

            // 按时间排序
            allNotes.sort((a, b) => a.time - b.time);

            // 重新调整时间，从0开始
            if (allNotes.length > 0) {
                const firstTime = allNotes[0].time;
                allNotes.forEach(n => n.time -= firstTime);
            }

            // 编钟音阶映射（C大调五声音阶：C, D, E, G, A）
            const bellNotes = ['C3', 'D3', 'E3', 'G3', 'A3', 'C4', 'D4', 'E4', 'G4', 'A4', 'C5', 'D5', 'E5', 'G5', 'A5'];
            const bellFreqs = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];
            
            // 侧敲频率映射表（B和F需要使用侧敲）
            const sideFreqs = {
                'G3': 246.94,  // 侧敲 B3
                'G4': 493.88,  // 侧敲 B4
                'G5': 987.77,  // 侧敲 B5
                'D3': 174.61,  // 侧敲 F3
                'D4': 349.23,  // 侧敲 F4
                'D5': 698.46   // 侧敲 F5
            };

            // 半音到最近编钟音的映射表
            const chromaticToBell = {
                'C': 'C', 'C#': 'C', 'Db': 'C',
                'D': 'D', 'D#': 'E', 'Eb': 'E',
                'E': 'E', 'E#': 'E', 'Fb': 'E',
                'F': 'E', 'F#': 'G', 'Gb': 'G',
                'G': 'G', 'G#': 'A', 'Ab': 'A',
                'A': 'A', 'A#': 'C', 'Bb': 'A',
                'B': 'C', 'B#': 'C', 'Cb': 'A'
            };

            // 特殊映射：使用侧敲来实现特定音符
            // B -> G的侧敲, F -> D的侧敲
            const sideHitMapping = {
                'B': { baseNote: 'G', sideNote: 'B' },
                'F': { baseNote: 'D', sideNote: 'F' }
            };

            allNotes.forEach(note => {
                // 解析原始音符名称（如 "C#4" -> noteName="C#", octave=4）
                const match = note.note.match(/^([A-G][#b]?)(\d+)$/);
                if (!match) return;

                const originalNoteName = match[1];
                const originalOctave = parseInt(match[2]);

                // 检查是否使用侧敲映射
                const sideMapping = sideHitMapping[originalNoteName];
                if (sideMapping) {
                    // 使用侧敲：B->G侧敲, F->D侧敲
                    const targetBellNote = `${sideMapping.baseNote}${originalOctave}`;
                    const bellIndex = bellNotes.indexOf(targetBellNote);

                    if (bellIndex !== -1) {
                        note.note = targetBellNote;  // 存储基础音名（如 G4）
                        note.freq = sideFreqs[targetBellNote];  // 使用侧敲频率！
                        note.isSide = true;  // 标记为侧敲
                        note.mapped = true;
                        note.displayNote = sideMapping.sideNote + originalOctave;  // 用于显示的音符名
                    }
                    return;
                }

                // 映射到编钟音名
                const bellNoteName = chromaticToBell[originalNoteName] || originalNoteName;

                // 处理八度（B->C 和 A#->C 需要升八度）- 注意：B现在由侧敲处理了
                let finalOctave = originalOctave;
                if ((originalNoteName === 'A#' || originalNoteName === 'Bb') && bellNoteName === 'C') {
                    finalOctave = originalOctave + 1;
                }

                // 构建编钟音符名称
                const targetBellNote = `${bellNoteName}${finalOctave}`;

                // 在编钟列表中查找
                const bellIndex = bellNotes.indexOf(targetBellNote);

                if (bellIndex !== -1) {
                    // 找到匹配的编钟音
                    note.note = targetBellNote;
                    note.freq = bellFreqs[bellIndex];
                    note.isSide = false;  // 正敲
                    note.mapped = true;
                } else {
                    // 未找到，使用频率最近匹配
                    let closestIndex = 0;
                    let closestDiff = Infinity;

                    bellFreqs.forEach((freq, index) => {
                        const diff = Math.abs(note.freq - freq);
                        if (diff < closestDiff) {
                            closestDiff = diff;
                            closestIndex = index;
                        }
                    });

                    note.note = bellNotes[closestIndex];
                    note.freq = bellFreqs[closestIndex];
                    note.isSide = false;
                    note.mapped = true;
                }
            });

            // 过滤掉未成功映射的音符
            const validNotes = allNotes.filter(n => n.mapped);

            return {
                name: `MIDI导入 ${new Date().toLocaleTimeString()}`,
                bpm: bpm,
                notes: validNotes
            };
        }

        // MIDI文件导入处理
        document.getElementById('btnImportMidi').addEventListener('click', () => {
            document.getElementById('midiFileInput').click();
        });

        document.getElementById('midiFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showToast(`正在解析 ${file.name}...`);

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const midiData = parseMidiFile(event.target.result);
                    const bellRecording = convertMidiToBells(midiData);

                    if (bellRecording.notes.length === 0) {
                        showToast('未找到可播放的音符（编钟音域：C3-C6）');
                        return;
                    }

                    // 保存到录制列表
                    const recording = {
                        id: Date.now(),
                        name: bellRecording.name,
                        date: new Date().toLocaleString(),
                        duration: (bellRecording.notes[bellRecording.notes.length - 1].time / 1000 + 1).toFixed(1),
                        notes: bellRecording.notes
                    };

                    recordings.push(recording);
                    localStorage.setItem('bianzhong_recordings', JSON.stringify(recordings));
                    updateRecordingList();

                    showToast(`✅ MIDI导入成功！${bellRecording.notes.length}个音符，${bellRecording.bpm} BPM`);

                    // 自动播放
                    setTimeout(() => playRecording(recording), 500);

                } catch (error) {
                    console.error('MIDI解析错误:', error);
                    showToast('❌ MIDI解析失败: ' + error.message);
                }
            };

            reader.onerror = () => {
                showToast('❌ 文件读取失败');
            };

            reader.readAsArrayBuffer(file);

            // 清空input，允许重复选择同一文件
            e.target.value = '';
        });
    </script>
</body>
</html>
