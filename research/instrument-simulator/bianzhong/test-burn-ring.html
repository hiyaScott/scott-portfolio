<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>烧绳子动画测试 - v1.9.5</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
        }
        .test-box {
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255,255,255,0.2);
            margin: 20px;
            position: relative;
        }
        .burn-ring {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            pointer-events: none;
        }
        .burn-ring svg {
            width: 100%;
            height: 100%;
        }
        .burn-ring rect {
            fill: none;
            stroke: #00ffff;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 224;
            stroke-dashoffset: 0;
            animation: burnRing 4.8s linear infinite;
        }
        /* v1.9.5: rect默认绘制方向是顺时针(左上→右上→右下→左下) */
        @keyframes burnRing {
            0% { stroke-dashoffset: 0; }      /* 完整显示 */
            100% { stroke-dashoffset: 224; }  /* 顺时针消失 */
        }
        .label {
            margin: 10px 0;
            color: #f5af19;
        }
        .arrow {
            position: absolute;
            top: -15px;
            left: -15px;
            font-size: 20px;
            color: #f5af19;
        }
    </style>
</head>
<body>
    <h2>烧绳子动画测试 - v1.9.5</h2>
    <p class="label">预期效果：从左上角开始，顺时针方向燃尽</p>
    <div class="test-box">
        <div class="burn-ring">
            <svg viewBox="0 0 60 60">
                <rect x="2" y="2" width="56" height="56" rx="8" ry="8" />
            </svg>
        </div>
        <div class="arrow">↻</div>
    </div>
    <p>stroke-dashoffset: 0 → 224 (rect默认顺时针绘制)</p>
</body>
</html>
