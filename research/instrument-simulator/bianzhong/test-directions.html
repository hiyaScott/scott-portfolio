<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>烧绳子方向测试 - 4种方案对比</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
        }
        .test-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .test-item {
            text-align: center;
        }
        .test-box {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.2);
            margin: 10px auto;
            position: relative;
        }
        .burn-ring {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
        }
        .burn-ring svg {
            width: 100%;
            height: 100%;
        }
        .burn-ring rect {
            fill: none;
            stroke: #00ffff;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 184;
            animation: burnRing 3s linear infinite;
        }
        
        /* 方案A: 0→224 */
        .test-a rect { stroke-dashoffset: 0; }
        @keyframes burnRingA {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 184; }
        }
        .test-a rect { animation: burnRingA 3s linear infinite; }
        
        /* 方案B: -224→0 */
        .test-b rect { stroke-dashoffset: -184; }
        @keyframes burnRingB {
            0% { stroke-dashoffset: -184; }
            100% { stroke-dashoffset: 0; }
        }
        .test-b rect { animation: burnRingB 3s linear infinite; }
        
        /* 方案C: 224→0 */
        .test-c rect { stroke-dashoffset: 184; }
        @keyframes burnRingC {
            0% { stroke-dashoffset: 184; }
            100% { stroke-dashoffset: 0; }
        }
        .test-c rect { animation: burnRingC 3s linear infinite; }
        
        /* 方案D: -224→-448 */
        .test-d rect { stroke-dashoffset: -184; }
        @keyframes burnRingD {
            0% { stroke-dashoffset: -184; }
            100% { stroke-dashoffset: -368; }
        }
        .test-d rect { animation: burnRingD 3s linear infinite; }
        
        .label {
            font-size: 12px;
            color: #f5af19;
            margin-top: 5px;
        }
        .arrow {
            position: absolute;
            top: -12px;
            left: -12px;
            font-size: 16px;
            color: #f5af19;
        }
    </style>
</head>
<body>
    <h2>烧绳子方向测试 - 请告诉我哪个是顺时针</h2>
    <p>观察4个方框的边框消失方向，告诉我哪个是顺时针（左上→右上→右下→左下）</p>
    
    <div class="test-container">
        <div class="test-item">
            <div class="test-box test-a">
                <div class="burn-ring">
                    <svg viewBox="0 0 50 50"><rect x="2" y="2" width="46" height="46" rx="6"/></svg>
                </div>
                <div class="arrow">↻</div>
            </div>
            <div class="label">方案A<br>0 → 184</div>
        </div>
        
        <div class="test-item">
            <div class="test-box test-b">
                <div class="burn-ring">
                    <svg viewBox="0 0 50 50"><rect x="2" y="2" width="46" height="46" rx="6"/></svg>
                </div>
                <div class="arrow">↻</div>
            </div>
            <div class="label">方案B<br>-184 → 0</div>
        </div>
        
        <div class="test-item">
            <div class="test-box test-c">
                <div class="burn-ring">
                    <svg viewBox="0 0 50 50"><rect x="2" y="2" width="46" height="46" rx="6"/></svg>
                </div>
                <div class="arrow">↻</div>
            </div>
            <div class="label">方案C<br>184 → 0</div>
        </div>
        
        <div class="test-item">
            <div class="test-box test-d">
                <div class="burn-ring">
                    <svg viewBox="0 0 50 50"><rect x="2" y="2" width="46" height="46" rx="6"/></svg>
                </div>
                <div class="arrow">↻</div>
            </div>
            <div class="label">方案D<br>-184 → -368</div>
        </div>
    </div>
</body>
</html>
