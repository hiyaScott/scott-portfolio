<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝牙语音输入器 - Web模拟器 | 虾折腾</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-cyan: #00ffff;
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-orange: #ff6600;
            --dark-bg: #0a0a0a;
            --device-bg: #1a1a1a;
        }
        
        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Noto+Sans+SC', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        /* CRT扫描线效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 9999;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-family: 'Share Tech Mono', monospace;
        }
        
        /* 主布局 */
        .main-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }
        
        /* 设备模拟区 */
        .device-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        /* 设备外壳 */
        .device {
            width: 160px;
            height: 280px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.5),
                inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            border: 2px solid #333;
        }
        
        .device::before {
            content: '虾折腾';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            font-family: 'Share Tech Mono', monospace;
        }
        
        /* OLED屏幕 */
        .screen {
            width: 128px;
            height: 64px;
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            margin: 0 auto 15px;
            position: relative;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .screen-content {
            width: 100%;
            height: 100%;
            padding: 4px;
            display: flex;
            flex-direction: column;
        }
        
        .screen-header {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: #0f0;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
            margin-bottom: 4px;
        }
        
        .screen-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }
        
        .screen-status {
            font-size: 14px;
            color: #0f0;
            margin-bottom: 4px;
        }
        
        .screen-hint {
            font-size: 8px;
            color: #888;
        }
        
        /* 波形动画 */
        .waveform {
            display: none;
            height: 20px;
            align-items: center;
            gap: 2px;
        }
        
        .waveform.active {
            display: flex;
        }
        
        .wave-bar {
            width: 3px;
            background: #0f0;
            border-radius: 1px;
            animation: wave 0.5s ease-in-out infinite;
        }
        
        .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 15px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 18px; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 12px; animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { height: 16px; animation-delay: 0.15s; }
        .wave-bar:nth-child(7) { height: 9px; animation-delay: 0.25s; }
        .wave-bar:nth-child(8) { height: 14px; animation-delay: 0.35s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        
        /* 大按键 */
        .record-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #333, #222);
            border: 3px solid #444;
            margin: 0 auto 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            position: relative;
            user-select: none;
        }
        
        .record-btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        
        .record-btn:active, .record-btn.recording {
            background: linear-gradient(145deg, #1a3a1a, #0a2a0a);
            border-color: var(--neon-green);
            box-shadow: 0 0 30px rgba(57,255,20,0.4);
            transform: scale(0.95);
        }
        
        .record-btn.recording .btn-icon {
            color: var(--neon-green);
        }
        
        .btn-icon {
            font-size: 32px;
            margin-bottom: 5px;
            color: #666;
            transition: color 0.2s;
        }
        
        .btn-label {
            font-size: 10px;
            color: #888;
            font-family: 'Share Tech Mono', monospace;
        }
        
        /* LED指示灯 */
        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            margin: 0 auto;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        
        .led.on {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }
        
        .led.blink {
            animation: blink 0.5s infinite;
        }
        
        .led.blink-blue {
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: blink 0.25s infinite;
        }
        
        .led.error {
            background: #f00;
            box-shadow: 0 0 10px #f00;
            animation: blink 0.2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* 功能键 */
        .func-btn {
            position: absolute;
            bottom: 35px;
            right: 15px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #333;
            border: 1px solid #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #888;
            transition: all 0.2s;
        }
        
        .func-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        
        /* PC模拟区 */
        .pc-section {
            flex: 1;
            min-width: 400px;
            max-width: 600px;
        }
        
        .pc-monitor {
            background: #111;
            border: 3px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .pc-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }
        
        .pc-dots {
            display: flex;
            gap: 6px;
        }
        
        .pc-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .pc-dot.red { background: #ff5f56; }
        .pc-dot.yellow { background: #ffbd2e; }
        .pc-dot.green { background: #27c93f; }
        
        .pc-title {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: #888;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .text-editor {
            background: #1a1a1a;
            border-radius: 4px;
            padding: 15px;
            min-height: 320px;
            font-family: 'Noto Sans SC', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #ddd;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .text-editor:empty::before {
            content: '等待语音输入...';
            color: #555;
            font-style: italic;
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--neon-cyan);
            animation: cursor-blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        
        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .typing-text {
            color: var(--neon-green);
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .control-title {
            font-size: 14px;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .control-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .control-btn:hover {
            background: rgba(0,255,255,0.1);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        
        .control-btn.active {
            background: rgba(0,255,255,0.2);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        
        /* 状态面板 */
        .status-panel {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .status-row:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            color: #888;
        }
        
        .status-value {
            color: var(--neon-cyan);
        }
        
        /* 快捷键提示 */
        .shortcuts {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
        
        .shortcuts kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Share Tech Mono', monospace;
            color: #aaa;
        }
        
        /* 键盘动画 */
        .keyboard-anim {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 10px;
            display: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--neon-cyan);
        }
        
        .keyboard-anim.active {
            display: block;
            animation: slide-in 0.3s ease;
        }
        
        @keyframes slide-in {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }
            
            .pc-section {
                min-width: auto;
                max-width: 100%;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎤 蓝牙语音输入器</h1>
        <p class="subtitle">Web Simulator v1.0 | 虾折腾实验室</p>
    </header>
    
    <div class="main-container">
        <!-- 设备模拟区 -->
        <div class="device-section">
            <div class="device">
                <!-- OLED屏幕 -->
                <div class="screen">
                    <div class="screen-content">
                        <div class="screen-header">
                            <span id="ble-status">[BLE○]</span>
                            <span id="battery">85%</span>
                        </div>
                        <div class="screen-main" id="screen-main">
                            <div class="screen-status" id="status-text">等待连接</div>
                            <div class="screen-hint" id="status-hint">请打开蓝牙设置</div>
                            <div class="waveform" id="waveform">
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 录音按键 -->
                <div class="record-btn" id="record-btn">
                    <div class="btn-icon">🎙️</div>
                    <div class="btn-label">按住说话</div>
                </div>
                
                <!-- LED指示灯 -->
                <div class="led" id="led"></div>
                
                <!-- 功能键 -->
                <div class="func-btn" id="func-btn" title="切换模式">⚙</div>
            </div>
            
            <!-- 控制面板 -->
            <div class="control-panel">
                <div class="control-title">[ 输入模式 ]</div>
                <div class="control-grid">
                    <button class="control-btn active" data-mode="zh">中文连续</button>
                    <button class="control-btn" data-mode="en">English</button>
                    <button class="control-btn" data-mode="cmd">命令模式</button>
                    <button class="control-btn" data-mode="mute">静音模式</button>
                </div>
            </div>
            
            <div class="shortcuts">
                快捷键: <kbd>Space</kbd> 录音 | <kbd>M</kbd> 切换模式 | <kbd>C</kbd> 清空文本
            </div>
        </div>
        
        <!-- PC模拟区 -->
        <div class="pc-section">
            <div class="pc-monitor">
                <div class="pc-header">
                    <div class="pc-dots">
                        <div class="pc-dot red"></div>
                        <div class="pc-dot yellow"></div>
                        <div class="pc-dot green"></div>
                    </div>
                    <div class="pc-title">文本编辑器 - 语音输入演示</div>
                </div>
                <div class="text-editor" id="text-editor"><span class="cursor"></span></div>
            </div>
            
            <div class="status-panel">
                <div class="status-row">
                    <span class="status-label">设备状态:</span>
                    <span class="status-value" id="device-state">配对中...</span>
                </div>
                <div class="status-row">
                    <span class="status-label">蓝牙连接:</span>
                    <span class="status-value" id="bt-state">未连接</span>
                </div>
                <div class="status-row">
                    <span class="status-label">当前模式:</span>
                    <span class="status-value" id="current-mode">中文连续</span>
                </div>
                <div class="status-row">
                    <span class="status-label">已输入字数:</span>
                    <span class="status-value" id="char-count">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 键盘输入动画提示 -->
    <div class="keyboard-anim" id="keyboard-anim">
        ⌨️ 正在输入...
    </div>

    <script>
        // ============ 状态管理 ============
        const State = {
            INIT: 'init',
            PAIRING: 'pairing',
            STANDBY: 'standby',
            RECORDING: 'recording',
            PROCESSING: 'processing'
        };
        
        let currentState = State.PAIRING;
        let currentMode = 'zh';
        let isConnected = false;
        let charCount = 0;
        
        // ============ DOM元素 ============
        const recordBtn = document.getElementById('record-btn');
        const funcBtn = document.getElementById('func-btn');
        const led = document.getElementById('led');
        const bleStatus = document.getElementById('ble-status');
        const statusText = document.getElementById('status-text');
        const statusHint = document.getElementById('status-hint');
        const waveform = document.getElementById('waveform');
        const textEditor = document.getElementById('text-editor');
        const keyboardAnim = document.getElementById('keyboard-anim');
        const deviceState = document.getElementById('device-state');
        const btState = document.getElementById('bt-state');
        const currentModeEl = document.getElementById('current-mode');
        const charCountEl = document.getElementById('char-count');
        
        // ============ 测试语音数据 ============
        const voiceData = {
            zh: [
                "你好，这是蓝牙语音输入器的测试。",
                "今天天气真不错，适合出去走走。",
                "语音识别技术越来越成熟，输入效率大大提高。",
                "这个设备可以解放双手，让输入变得更轻松。",
                "按住按键开始录音，松开按键自动发送文字。"
            ],
            en: [
                "Hello, this is a Bluetooth voice input device test.",
                "The weather is nice today, perfect for a walk.",
                "Voice recognition technology is becoming more mature.",
                "This device frees your hands and makes input easier.",
                "Hold the button to record, release to send text."
            ],
            cmd: [
                "换行",
                "删除",
                "全选",
                "复制",
                "粘贴",
                "撤销"
            ]
        };
        
        // ============ 初始化 ============
        function init() {
            // 模拟蓝牙连接过程
            setTimeout(() => {
                connectBluetooth();
            }, 2000);
            
            // 电池电量缓慢下降
            setInterval(() => {
                const battery = document.getElementById('battery');
                let level = parseInt(battery.textContent);
                if (level > 10) {
                    battery.textContent = (level - 1) + '%';
                }
            }, 60000);
        }
        
        // ============ 蓝牙连接 ============
        function connectBluetooth() {
            isConnected = true;
            bleStatus.textContent = '[BLE✓]';
            btState.textContent = '已连接';
            changeState(State.STANDBY);
        }
        
        // ============ 状态切换 ============
        function changeState(newState) {
            currentState = newState;
            
            switch (newState) {
                case State.PAIRING:
                    statusText.textContent = '等待连接';
                    statusHint.textContent = '请打开蓝牙设置';
                    led.className = 'led blink-blue';
                    deviceState.textContent = '配对中...';
                    waveform.classList.remove('active');
                    break;
                    
                case State.STANDBY:
                    statusText.textContent = '准备就绪';
                    statusHint.textContent = '按住按键开始录音';
                    led.className = 'led';
                    deviceState.textContent = '待机';
                    recordBtn.classList.remove('recording');
                    waveform.classList.remove('active');
                    keyboardAnim.classList.remove('active');
                    break;
                    
                case State.RECORDING:
                    statusText.textContent = '● 录音中';
                    statusHint.textContent = '松开结束录音';
                    led.className = 'led on';
                    deviceState.textContent = '录音中';
                    recordBtn.classList.add('recording');
                    waveform.classList.add('active');
                    break;
                    
                case State.PROCESSING:
                    statusText.textContent = '处理中...';
                    statusHint.textContent = '请稍候';
                    led.className = 'led blink';
                    deviceState.textContent = '识别中...';
                    recordBtn.classList.remove('recording');
                    waveform.classList.remove('active');
                    break;
            }
        }
        
        // ============ 录音按键事件 ============
        let recordingStartTime = 0;
        
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        recordBtn.addEventListener('mouseleave', stopRecording);
        
        function startRecording() {
            if (currentState !== State.STANDBY) return;
            
            recordingStartTime = Date.now();
            changeState(State.RECORDING);
        }
        
        function stopRecording() {
            if (currentState !== State.RECORDING) return;
            
            const recordingTime = Date.now() - recordingStartTime;
            if (recordingTime < 500) {
                // 录音时间太短
                changeState(State.STANDBY);
                statusText.textContent = '录音太短';
                setTimeout(() => {
                    if (currentState === State.STANDBY) {
                        statusText.textContent = '准备就绪';
                    }
                }, 1000);
                return;
            }
            
            changeState(State.PROCESSING);
            
            // 模拟识别延迟
            setTimeout(() => {
                const text = getRandomText();
                if (currentMode === 'mute') {
                    // 静音模式不发送
                    statusText.textContent = '静音模式';
                    setTimeout(() => changeState(State.STANDBY), 1000);
                } else if (currentMode === 'cmd') {
                    executeCommand(text);
                    changeState(State.STANDBY);
                } else {
                    typeText(text);
                }
            }, 800 + Math.random() * 500);
        }
        
        // ============ 获取随机文本 ============
        function getRandomText() {
            const texts = voiceData[currentMode] || voiceData.zh;
            return texts[Math.floor(Math.random() * texts.length)];
        }
        
        // ============ 打字效果 ============
        function typeText(text) {
            keyboardAnim.classList.add('active');
            
            // 移除光标
            const cursor = textEditor.querySelector('.cursor');
            if (cursor) cursor.remove();
            
            // 添加换行（如果不是第一行）
            if (textEditor.textContent.trim().length > 0) {
                textEditor.appendChild(document.createTextNode('\n'));
            }
            
            // 逐字显示
            const span = document.createElement('span');
            span.className = 'typing-text';
            textEditor.appendChild(span);
            
            let i = 0;
            const typeInterval = setInterval(() => {
                if (i < text.length) {
                    span.textContent += text[i];
                    i++;
                    charCount++;
                    charCountEl.textContent = charCount;
                    textEditor.scrollTop = textEditor.scrollHeight;
                } else {
                    clearInterval(typeInterval);
                    span.classList.remove('typing-text');
                    
                    // 添加光标
                    textEditor.appendChild(document.createElement('span')).className = 'cursor';
                    
                    keyboardAnim.classList.remove('active');
                    changeState(State.STANDBY);
                }
            }, 50);
        }
        
        // ============ 执行命令 ============
        function executeCommand(cmd) {
            const cursor = textEditor.querySelector('.cursor');
            if (cursor) cursor.remove();
            
            switch (cmd) {
                case '换行':
                    textEditor.appendChild(document.createTextNode('\n'));
                    break;
                case '删除':
                    const content = textEditor.textContent;
                    if (content.length > 0) {
                        textEditor.textContent = content.slice(0, -1);
                    }
                    break;
                case '全选':
                    // 视觉反馈
                    textEditor.style.background = 'rgba(0,255,255,0.1)';
                    setTimeout(() => {
                        textEditor.style.background = '';
                    }, 300);
                    break;
                case '清空':
                case '清除':
                    textEditor.innerHTML = '<span class="cursor"></span>';
                    charCount = 0;
                    charCountEl.textContent = 0;
                    break;
            }
            
            textEditor.appendChild(document.createElement('span')).className = 'cursor');
            
            // 显示命令反馈
            statusText.textContent = '已执行: ' + cmd;
            setTimeout(() => {
                if (currentState === State.STANDBY) {
                    statusText.textContent = '准备就绪';
                }
            }, 1500);
        }
        
        // ============ 功能键 ============
        funcBtn.addEventListener('click', switchMode);
        
        // ============ 模式切换 ============
        const modeButtons = document.querySelectorAll('.control-btn');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                setMode(mode);
            });
        });
        
        function switchMode() {
            const modes = ['zh', 'en', 'cmd', 'mute'];
            const currentIndex = modes.indexOf(currentMode);
            const nextIndex = (currentIndex + 1) % modes.length;
            setMode(modes[nextIndex]);
        }
        
        function setMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            modeButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            // 更新显示
            const modeNames = {
                zh: '中文连续',
                en: 'English',
                cmd: '命令模式',
                mute: '静音模式'
            };
            currentModeEl.textContent = modeNames[mode];
            
            // 显示模式切换提示
            statusText.textContent = modeNames[mode];
            statusHint.textContent = '模式已切换';
            setTimeout(() => {
                if (currentState === State.STANDBY) {
                    statusText.textContent = '准备就绪';
                    statusHint.textContent = '按住按键开始录音';
                }
            }, 1500);
        }
        
        // ============ 键盘快捷键 ============
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    if (currentState === State.STANDBY) {
                        startRecording();
                    }
                    break;
                case 'KeyM':
                    switchMode();
                    break;
                case 'KeyC':
                    textEditor.innerHTML = '<span class="cursor"></span>';
                    charCount = 0;
                    charCountEl.textContent = 0;
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && currentState === State.RECORDING) {
                stopRecording();
            }
        });
        
        // ============ 初始化 ============
        init();
    </script>
</body>
</html>
