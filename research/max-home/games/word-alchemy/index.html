<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../../../favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词语炼金术 - Word Alchemy | 虾折腾</title>
    <meta name="description" content="词语炼金术 - 文字合成与创意游戏">
    <meta property="og:title" content="词语炼金术 - Word Alchemy | 虾折腾">
    <meta property="og:description" content="词语炼金术 - 文字合成游戏">
    <meta property="og:type" content="website">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 色彩系统 ========== */
        :root {
            --bg-primary: #0f172a;      /* 深蓝灰背景 */
            --bg-secondary: #1e293b;    /* 次级背景 */
            --bg-tertiary: #334155;     /* 第三层背景 */
            --accent-gold: #f59e0b;     /* 琥珀金 - 成功/高亮 */
            --accent-cyan: #06b6d4;     /* 青色 - 交互反馈 */
            --accent-purple: #8b5cf6;   /* 紫罗兰 - 次要强调 */
            --text-primary: #f8fafc;    /* 纯白 - 主要文字 */
            --text-secondary: #94a3b8;  /* 灰蓝 - 次要文字 */
            --text-muted: #64748b;      /* 深灰 - 弱化文字 */
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Sans SC', 'Microsoft YaHei', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            line-height: 1.6;
        }

        /* ========== 顶部导航 ========== */
        .nav-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .game-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stats-mini {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stats-mini span {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* ========== 主游戏区域 ========== */
        .game-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* ========== 目标区域（视觉中心） - 左右分栏版 ========== */
        .target-section {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(245, 158, 11, 0.05) 100%);
            border-bottom: 2px solid var(--accent-gold);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 100px;
        }

        .target-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .target-level-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-code {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .target-stat {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .target-stat-value {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 14px;
        }

        .target-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px 0 4px 20px;
            border-left: 1px solid rgba(245, 158, 11, 0.3);
            margin-left: 20px;
            min-width: 120px;
            min-height: 90px;
            gap: 8px;
        }

        .target-label-badge {
            font-size: 10px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            background: rgba(245, 158, 11, 0.25);
            padding: 3px 10px;
            border-radius: 10px;
            border: 1px solid rgba(245, 158, 11, 0.4);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .target-word {
            font-size: 56px;
            font-weight: 800;
            color: var(--text-primary);
            text-shadow: 0 0 40px rgba(245, 158, 11, 0.5);
            letter-spacing: 6px;
            line-height: 1;
            flex-shrink: 0;
        }

        /* ========== 炼金台（操作核心） ========== */
        .alchemy-section {
            padding: 32px 24px;
            background: var(--bg-secondary);
        }

        .alchemy-table {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        /* 槽位设计 */
        .slot {
            width: 88px;
            height: 88px;
            background: var(--bg-tertiary);
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .slot:hover {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .slot.filled {
            border-style: solid;
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.15);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .slot.selected {
            border-color: var(--accent-gold);
            background: rgba(245, 158, 11, 0.15);
        }

        .slot::after {
            content: attr(data-slot);
            position: absolute;
            bottom: 6px;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .plus-icon {
            font-size: 24px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .equals-icon {
            font-size: 20px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .result-slot {
            width: 88px;
            height: 88px;
            background: var(--bg-primary);
            border: 2px solid var(--accent-gold);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
        }

        .btn-combine {
            display: block;
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #d97706 100%);
            border: none;
            border-radius: 12px;
            color: var(--bg-primary);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-combine:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(245, 158, 11, 0.4);
        }

        .btn-combine:active {
            transform: translateY(0);
        }

        /* ========== 元素库（大按钮网格） ========== */
        .elements-section {
            padding: 20px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .elements-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .element-btn {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 2px;
            position: relative;
            overflow: hidden;
        }

        .element-btn:hover {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
            transform: translateY(-2px);
        }

        .element-btn.selected {
            border-color: var(--accent-gold);
            background: rgba(245, 158, 11, 0.15);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }

        .element-btn.in-slot-1 {
            border-top: 3px solid var(--accent-cyan);
        }

        .element-btn.in-slot-2 {
            border-top: 3px solid var(--accent-purple);
        }

        .element-icon {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .element-name {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ========== 配方书 ========== */
        .recipes-section {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .recipes-toggle {
            width: 100%;
            padding: 16px 24px;
            background: transparent;
            border: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .recipes-toggle:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .recipes-toggle.expanded {
            color: var(--accent-gold);
        }

        .recipes-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .recipes-content.expanded {
            max-height: 400px;
            overflow-y: auto;
        }

        .recipes-inner {
            padding: 16px 24px;
        }

        .recipe-category {
            margin-bottom: 16px;
        }

        .recipe-category-title {
            font-size: 12px;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .recipe-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .recipe-item {
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 8px;
        }

        /* ========== 提示按钮 ========== */
        .hint-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--accent-cyan);
            border: none;
            border-radius: 50%;
            color: var(--bg-primary);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(6, 182, 212, 0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hint-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(6, 182, 212, 0.5);
        }

        /* ========== 版本号 ========== */
        .version-badge {
            position: fixed;
            bottom: 8px;
            left: 8px;
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(148, 163, 184, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            opacity: 0.7;
        }

        /* ========== 弹窗 ========== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .overlay.show {
            display: flex;
        }

        .popup {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 40px;
            text-align: center;
            max-width: 320px;
            animation: popupIn 0.3s ease;
        }

        @keyframes popupIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .popup-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .popup-highlight {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 12px;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
        }

        .popup-formula {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .popup-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .target-section {
                padding: 10px 16px;
                min-height: 70px;
            }

            .target-word {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .target-right {
                min-height: 60px;
                padding: 3px 0 3px 12px;
                margin-left: 12px;
                min-width: 80px;
                gap: 6px;
            }

            .target-label-badge {
                font-size: 8px;
                padding: 2px 6px;
                border-radius: 8px;
            }

            .slot, .result-slot {
                width: 68px;
                height: 68px;
                font-size: 26px;
            }

            .alchemy-table {
                gap: 8px;
            }

            .btn-combine {
                padding: 14px 32px;
                font-size: 16px;
            }

            /* 移动端也显示7个元素 */
            .elements-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 6px;
            }

            .elements-section {
                padding: 16px 12px;
            }

            .element-btn {
                border-radius: 6px;
                padding: 2px 1px;
                border-width: 1px;
            }

            .element-icon {
                font-size: 16px;
                margin-bottom: 1px;
            }

            .element-name {
                font-size: 9px;
            }

            .section-title {
                font-size: 12px;
            }

            .section-count {
                font-size: 10px;
                padding: 2px 8px;
            }
        }

        @media (max-width: 360px) {
            .elements-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
            }

            .element-btn {
                border-radius: 4px;
                padding: 1px;
            }

            .element-icon {
                font-size: 14px;
            }

            .element-name {
                font-size: 8px;
            }
        }

        /* 横屏模式 - 增加右侧高度避免遮挡 */
        @media (max-width: 480px) and (orientation: landscape) {
            .target-section {
                min-height: 90px;
            }

            .target-right {
                min-height: 80px;
                min-width: 100px;
                gap: 10px;
            }

            .target-word {
                font-size: 42px;
            }

            .target-label-badge {
                padding: 3px 8px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="nav-left">
            <a href="../index.html" class="back-btn">← 返回</a>
            <span class="game-title">词语炼金术</span>
        </div>
        <div class="stats-mini">
            <div>关卡 <span id="navLevel">1</span></div>
            <div>得分 <span id="navScore">0</span></div>
        </div>
    </nav>

    <!-- 主游戏区 -->
    <div class="game-container">
        <!-- 目标区域（视觉中心） - 左右分栏版 -->
        <div class="target-section">
            <div class="target-left">
                <div class="target-level-row">
                    <span class="level-code">LEVEL <span id="levelDisplay">02</span></span>
                </div>
                <div class="target-stat">
                    合成 <span class="target-stat-value" id="targetCombine">0</span> 次
                </div>
                <div class="target-stat">
                    总分 <span class="target-stat-value" id="targetScore">0</span>
                </div>
            </div>
            <div class="target-right">
                <span class="target-label-badge">当前目标</span>
                <div class="target-word" id="targetWord">云</div>
            </div>
        </div>

        <!-- 炼金台（操作核心） -->
        <div class="alchemy-section">
            <div class="alchemy-table">
                <div class="slot" id="slot1" onclick="clearSlot(1)" data-slot="槽位1">?</div>
                <span class="plus-icon">+</span>
                <div class="slot" id="slot2" onclick="clearSlot(2)" data-slot="槽位2">?</div>
                <span class="equals-icon">=</span>
                <div class="result-slot" id="result">?</div>
            </div>
            <button class="btn-combine" onclick="combine()">✨ 炼成</button>
        </div>

        <!-- 元素库 -->
        <div class="elements-section">
            <div class="section-header">
                <div class="section-title">🔮 元素库 <span class="section-count" id="elementCount">4/50</span></div>
            </div>
            <div class="elements-grid" id="elementsGrid">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 配方书 -->
        <div class="recipes-section">
            <button class="recipes-toggle" id="recipesToggle" onclick="toggleRecipes()">
                <span>📖 已解锁配方 <span id="recipeCountBadge">0</span></span>
                <span id="toggleArrow">▼</span>
            </button>
            <div class="recipes-content" id="recipesContent">
                <div class="recipes-inner" id="recipes">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 提示按钮 -->
    <button class="hint-btn" onclick="showHint()" title="提示">💡</button>

    <!-- 弹窗 -->
    <div class="overlay" id="overlay">
        <div class="popup" id="popup">
            <div class="popup-icon" id="popupIcon">✨</div>
            <div class="popup-title" id="popupTitle">炼成成功</div>
            <div class="popup-highlight" id="popupHighlight"></div>
            <div class="popup-formula" id="popupFormula"></div>
            <div class="popup-subtitle" id="popupSubtitle"></div>
        </div>
    </div>

    <script>
        // 游戏数据（保持不变）
        const recipes = {

            '人+鱼': '人鱼', '火+鱼': '烤鱼', '机器+人': '人造人15号',
            '石头+生命': '孙悟空', '猫+互联网': '网红猫', '狗+工作': '社畜',
            '手机+床': '熬夜', '周一+工作': '痛苦', '周五+下班': '自由',
            '梦想+现实': '幻灭', '面包+火': '吐司', '番茄+蛋': '番茄炒蛋',
            '土豆+火': '薯条', '牛奶+时间': '奶酪', '葡萄+时间': '葡萄酒',
            '肉+时间': '腊肉', '人+鸟': '天使', '人+狼': '狼人',
            '咖啡+工作': '加班', '纸+笔': '作业', '书+枕头': '失眠',
        };

        const elementCategories = {
            '基础': ['火', '水', '土', '风'],
            '自然': ['蒸汽', '云', '雨', '雾', '风暴', '海啸', '沙尘', '烟'],
            '物质': ['岩浆', '石头', '金属', '工具', '木材', '炭', '城堡'],
            '生命': ['植物', '生命', '鱼', '人', '家庭'],
            '食物': ['食物', '烤鱼', '吐司', '番茄炒蛋', '薯条', '奶酪', '葡萄酒', '腊肉'],
            '概念': ['知识', '科学', '机器', '机器人', '爱', '幸福', '痛苦', '自由', '幻灭'],
            '彩蛋': ['人鱼', '人造人15号', '网红猫', '社畜', '熬夜', '加班', '作业', '失眠', '天使', '狼人', '孙悟空']
        };

        const levels = [
            { target: '蒸汽', hint: '火 + 水' },
            { target: '云', hint: '水 + 风' },
            { target: '植物', hint: '雨 + 土' },
            { target: '石头', hint: '岩浆 + 水' },
            { target: '金属', hint: '石头 + 火' },
            { target: '工具', hint: '金属 + 火' },
            { target: '木材', hint: '植物 + 工具' },
            { target: '生命', hint: '植物 + 云' },
            { target: '人', hint: '生命 + 土' },
            { target: '知识', hint: '人 + 火' },
        ];

        // 游戏状态
        let level = 1;
        let score = 0;
        let slots = [null, null];
        let selectedSlot = 1;
        let combineCount = 0;
        let newRecipeCount = 0;
        let recipesExpanded = false;
        let unlockedRecipes = [];
        let unlockedElements = ['火', '水', '土', '风'];

        // 元素图标
        function getElementIcon(element) {
            const icons = {
                '火': '🔥', '水': '💧', '土': '🌍', '风': '💨',
                '蒸汽': '♨️', '云': '☁️', '雨': '🌧️', '雾': '🌫️',
                '风暴': '⛈️', '海啸': '🌊', '沙尘': '🌪️', '烟': '💨',
                '岩浆': '🌋', '石头': '🪨', '金属': '⚙️', '工具': '🔧',
                '木材': '🪵', '炭': '🖤', '城堡': '🏰',
                '植物': '🌱', '生命': '🌿', '鱼': '🐟', '人': '👤',
                '房子': '🏠', '家庭': '👨‍👩‍👧‍👦', '食物': '🍖',
                '知识': '📚', '科学': '🔬', '机器': '⚙️', '机器人': '🤖',
                '爱': '❤️', '幸福': '😊', '痛苦': '😣', '自由': '🕊️',
                '人鱼': '🧜', '天使': '👼', '狼人': '🐺', '孙悟空': '🐵',
                '网红猫': '😺', '社畜': '🐕‍🦺', '熬夜': '📱', '加班': '☕',
                '作业': '📝', '失眠': '🛏️', '幻灭': '💔',
                '烤鱼': '🐠', '人造人15号': '🤖',
                '吐司': '🍞', '番茄炒蛋': '🍳', '薯条': '🍟',
                '奶酪': '🧀', '葡萄酒': '🍷', '腊肉': '🥓'
            };
            return icons[element] || '✨';
        }

        // 获取元素分类
        function getElementCategory(element) {
            for (const [cat, elements] of Object.entries(elementCategories)) {
                if (elements.includes(element)) return cat;
            }
            return '其他';
        }

        // 初始化
        function init() {
            loadLevel();
            renderElements();
            renderRecipes();
        }

        function loadLevel() {
            const lvl = levels[(level - 1) % levels.length];
            document.getElementById('targetWord').textContent = lvl.target;
            document.getElementById('levelDisplay').textContent = String(level).padStart(2, '0');
            document.getElementById('navLevel').textContent = level;
            document.getElementById('navScore').textContent = score;
            document.getElementById('targetScore').textContent = score;
            document.getElementById('targetCombine').textContent = combineCount;
            clearSlots();
        }

        function renderElements() {
            const grid = document.getElementById('elementsGrid');
            const categorized = {};
            unlockedElements.forEach(el => {
                const cat = getElementCategory(el);
                if (!categorized[cat]) categorized[cat] = [];
                categorized[cat].push(el);
            });

            const order = ['基础', '自然', '物质', '生命', '食物', '概念', '彩蛋'];
            let html = '';

            order.forEach(cat => {
                if (categorized[cat]) {
                    categorized[cat].forEach(el => {
                        const inSlot1 = slots[0] === el ? 'in-slot-1' : '';
                        const inSlot2 = slots[1] === el ? 'in-slot-2' : '';
                        const selected = (slots[0] === el || slots[1] === el) ? 'selected' : '';
                        html += `
                            <div class="element-btn ${selected} ${inSlot1} ${inSlot2}" 
                                 onclick="selectElement('${el}')" 
                                 data-element="${el}">
                                <span class="element-icon">${getElementIcon(el)}</span>
                                <span class="element-name">${el}</span>
                            </div>
                        `;
                    });
                }
            });

            grid.innerHTML = html;
            document.getElementById('elementCount').textContent = `${unlockedElements.length}/50`;
        }

        function renderRecipes() {
            const container = document.getElementById('recipes');
            if (unlockedRecipes.length === 0) {
                container.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">暂无已解锁配方</span>';
                document.getElementById('recipeCountBadge').textContent = '0';
                return;
            }

            const categorized = {};
            unlockedRecipes.forEach(r => {
                const cat = getElementCategory(r.output);
                if (!categorized[cat]) categorized[cat] = [];
                categorized[cat].push(r);
            });

            const order = ['基础', '自然', '物质', '生命', '食物', '概念', '彩蛋'];
            let html = '';

            order.forEach(cat => {
                if (categorized[cat]) {
                    html += `<div class="recipe-category">`;
                    html += `<div class="recipe-category-title">${cat}</div>`;
                    html += `<div class="recipe-list">`;
                    categorized[cat].forEach(r => {
                        html += `<div class="recipe-item">${r.input.join('+')}=${r.output}</div>`;
                    });
                    html += `</div></div>`;
                }
            });

            container.innerHTML = html;
            document.getElementById('recipeCountBadge').textContent = unlockedRecipes.length;
        }

        function selectElement(element) {
            // 如果已在某个槽位，从该槽位移除
            if (slots[0] === element) {
                slots[0] = null;
                selectedSlot = 1;
                updateSlots();
                renderElements();
                return;
            }
            if (slots[1] === element) {
                slots[1] = null;
                selectedSlot = 2;
                updateSlots();
                renderElements();
                return;
            }

            // 填入当前选中槽位
            slots[selectedSlot - 1] = element;
            selectedSlot = selectedSlot === 1 ? 2 : 1;

            updateSlots();
            renderElements();
        }

        function updateSlots() {
            const slot1 = document.getElementById('slot1');
            const slot2 = document.getElementById('slot2');
            const resultSlot = document.getElementById('result');

            slot1.textContent = slots[0] ? getElementIcon(slots[0]) : '?';
            slot1.className = 'slot' + (slots[0] ? ' filled' : '');

            slot2.textContent = slots[1] ? getElementIcon(slots[1]) : '?';
            slot2.className = 'slot' + (slots[1] ? ' filled' : '');

            if (slots[0] && slots[1]) {
                const key1 = `${slots[0]}+${slots[1]}`;
                const key2 = `${slots[1]}+${slots[0]}`;
                const result = recipes[key1] || recipes[key2];
                resultSlot.textContent = result ? getElementIcon(result) : '✗';
            } else {
                resultSlot.textContent = '?';
            }
        }

        function clearSlots() {
            slots = [null, null];
            selectedSlot = 1;
            updateSlots();
            renderElements();
        }

        function clearSlot(slotNum) {
            slots[slotNum - 1] = null;
            selectedSlot = slotNum;
            updateSlots();
            renderElements();
        }

        function combine() {
            if (!slots[0] || !slots[1]) {
                showPopup('⚠️', '请先选择两个元素', '', '点击元素库中的元素');
                return;
            }

            combineCount++;
            const key1 = `${slots[0]}+${slots[1]}`;
            const key2 = `${slots[1]}+${slots[0]}`;
            const result = recipes[key1] || recipes[key2];

            if (result) {
                const isTarget = result === document.getElementById('targetWord').textContent;
                const isNewRecipe = !unlockedRecipes.find(r => r.output === result);
                const isNewElement = !unlockedElements.includes(result);

                if (isNewElement) {
                    unlockedElements.push(result);
                    renderElements();
                }

                if (isNewRecipe) {
                    unlockedRecipes.push({ input: [slots[0], slots[1]].sort(), output: result });
                    renderRecipes();
                    newRecipeCount++;
                    score += 50;
                } else {
                    score += 10;
                }

                document.getElementById('navScore').textContent = score;
                document.getElementById('targetScore').textContent = score;
                document.getElementById('targetCombine').textContent = combineCount;

                if (isTarget) {
                    score += 100;
                    document.getElementById('navScore').textContent = score;
                    document.getElementById('targetScore').textContent = score;
                    showPopup('🎉', '关卡完成！', result, `${slots[0]} + ${slots[1]}`);
                    setTimeout(() => {
                        level++;
                        combineCount = 0;
                        newRecipeCount = 0;
                        loadLevel();
                    }, 2000);
                } else {
                    if (isNewRecipe) {
                        showPopup('✨', '新配方解锁', result, `${slots[0]} + ${slots[1]}`);
                    } else {
                        showPopup('📝', '已有配方', result, '已收录至配方书');
                    }
                }

                clearSlots();
            } else {
                showPopup('❌', '无法组合', '', '试试其他组合方式');
            }
        }

        function showPopup(icon, title, highlight, subtitle) {
            document.getElementById('popupIcon').textContent = icon;
            document.getElementById('popupTitle').textContent = title;
            document.getElementById('popupHighlight').textContent = highlight;
            document.getElementById('popupFormula').textContent = subtitle;
            document.getElementById('popupSubtitle').textContent = highlight ? '已收录至配方书' : '';
            document.getElementById('overlay').classList.add('show');

            setTimeout(() => {
                document.getElementById('overlay').classList.remove('show');
            }, 2000);
        }

        function toggleRecipes() {
            recipesExpanded = !recipesExpanded;
            document.getElementById('recipesToggle').classList.toggle('expanded', recipesExpanded);
            document.getElementById('recipesContent').classList.toggle('expanded', recipesExpanded);
        }

        function showHint() {
            const lvl = levels[(level - 1) % levels.length];
            showPopup('💡', '提示', '', lvl.hint);
        }

        // 启动
        init();

        // 点击遮罩关闭弹窗
        document.getElementById('overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        });
    </script>
    <div class="version-badge">v1.2.1</div>
</body>
</html>
