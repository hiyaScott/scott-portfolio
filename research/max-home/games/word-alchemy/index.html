<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词炼金术 | HiyaMax Games</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-header: #1a1a1a;
            --color-text: #333;
            --color-text-light: #666;
            --color-bg: #f8f8f8;
            --color-card: #fff;
            --header-height: 70px;
            --max-content-width: 1200px;
            --accent-primary: #ff6b9d;
            --accent-secondary: #c44569;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            padding-top: var(--header-height);
        }
        
        /* Header - 统一主页风格 */
        .header {
            background: var(--color-header);
            height: var(--header-height);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .header-inner {
            max-width: var(--max-content-width);
            margin: 0 auto;
            height: 100%;
            padding: 0 40px;
            display: flex;
            align-items: center;
        }
        
        .logo {
            height: 44px;
            width: 150px;
            flex-shrink: 0;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }
        
        .nav-desktop {
            flex: 1;
            display: flex;
            gap: clamp(8px, 3vw, 40px);
            justify-content: center;
            align-items: center;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: clamp(10px, 1.4vw, 13px);
            font-weight: 200;
            letter-spacing: 0.5px;
            text-transform: lowercase;
            transition: color 0.2s;
            white-space: nowrap;
        }
        
        .nav-link:hover, .nav-link.active { color: #fff; }
        
        .back-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
            margin-left: auto;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.2s;
        }
        
        .back-link:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }
        
        /* 汉堡菜单 */
        .menu-btn {
            display: none;
            width: 44px; 
            height: 44px;
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin-left: auto;
        }
        
        /* 主要内容 */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: var(--color-text-light);
            font-weight: 300;
        }
        
        /* 游戏区域 */
        .game-card {
            background: var(--color-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        /* 关卡信息 */
        .level-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 目标区域 */
        .target-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255,107,157,0.08), rgba(196,69,105,0.08));
            border-radius: 12px;
            border: 2px solid rgba(255,107,157,0.2);
        }
        
        .target-label {
            font-size: 11px;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .target-word {
            font-size: 42px;
            font-weight: 700;
            color: #000;
        }
        
        /* 炼金台 */
        .alchemy-table {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .slot {
            width: 90px;
            height: 90px;
            background: #f5f5f5;
            border: 2px dashed #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .slot:hover {
            border-color: #bbb;
            background: #f0f0f0;
        }
        
        .slot.filled {
            border-style: solid;
            border-color: var(--accent-primary);
            background: rgba(255,107,157,0.08);
        }
        
        .operator {
            font-size: 24px;
            color: #999;
            font-weight: 300;
        }
        
        .result-slot {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(196,69,105,0.1));
            border: 2px solid var(--accent-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        
        /* 操作按钮 */
        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,107,157,0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: var(--color-text);
            border: 1px solid #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        /* 元素库 */
        .inventory {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }
        
        .inventory-title {
            font-size: 13px;
            color: var(--color-text-light);
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .elements-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        
        .element {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #e8e8e8;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .element:hover {
            background: #eee;
            transform: translateY(-1px);
        }
        
        .element.selected {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-color: var(--accent-primary);
            color: #fff;
        }
        
        /* Breadcrumb Navigation */
        .breadcrumb {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 12px 0;
        }
        
        .breadcrumb-inner {
            max-width: var(--max-content-width);
            margin: 0 auto;
            padding: 0 40px;
            font-size: 13px;
        }
        
        .breadcrumb-link {
            color: var(--color-text-light);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .breadcrumb-link:hover {
            color: var(--color-text);
        }
        
        .breadcrumb-separator {
            color: #ccc;
            margin: 0 8px;
        }
        
        .breadcrumb-current {
            color: var(--color-text);
            font-weight: 500;
        }
        
        /* Bottom Return Section */
        .return-section {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        
        .return-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 30px;
            color: var(--color-text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .return-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,107,157,0.15);
        }
        
        /* Footer - Match Homepage */
        .footer {
            background: #fff;
            padding: 30px 40px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid #eee;
            margin-top: 60px;
        }
        
        .footer-inner {
            max-width: var(--max-content-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-copyright {
            font-size: 13px;
            color: var(--color-text-light);
        }
        
        .footer-nav {
            display: flex;
            gap: 24px;
        }
        
        .footer-nav a {
            color: var(--color-text-light);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }
        
        .footer-nav a:hover { color: #000; }
        
        .footer-social {
            display: flex;
            gap: 16px;
        }
        
        .footer-social-link {
            color: var(--color-text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .footer-social-link:hover { color: #000; }
        
        .footer-version {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .breadcrumb-inner { padding: 0 20px; }
            .footer { padding: 20px; padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)); }
            .footer-inner {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            .footer-nav { gap: 16px; }
        }
        
        /* 配方书 */
        .recipe-book {
            margin-top: 25px;
            padding: 20px;
            background: #fafafa;
            border-radius: 12px;
        }
        
        .recipe-title {
            font-size: 13px;
            color: var(--accent-secondary);
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
        
        .recipes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        
        .recipe {
            padding: 6px 12px;
            background: #fff;
            border-radius: 15px;
            font-size: 12px;
            color: #999;
            border: 1px solid #eee;
        }
        
        .recipe.unlocked {
            background: rgba(255,107,157,0.1);
            border-color: rgba(255,107,157,0.3);
            color: var(--accent-secondary);
        }
        
        /* 消息提示 */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            display: none;
            z-index: 2000;
            border: 2px solid var(--accent-primary);
        }
        
        .message.show {
            display: block;
            animation: popIn 0.3s;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .message-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .message-text {
            font-size: 16px;
            color: var(--color-text);
            font-weight: 500;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1999;
        }
        
        .overlay.show { display: block; }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header-inner { padding: 0 20px; }
            .nav-desktop { display: none; }
            .back-link { display: none; }
            .menu-btn { display: flex; align-items: center; justify-content: center; }
            
            .main { padding: 20px 15px; }
            .page-title { font-size: 24px; }
            .game-card { padding: 20px; }
            
            .slot, .result-slot {
                width: 70px;
                height: 70px;
                font-size: 24px;
            }
            
            .target-word { font-size: 32px; }
            .level-info { gap: 20px; }
            .stat-value { font-size: 20px; }
            
            .btn { padding: 10px 20px; font-size: 13px; }
        }
        
        @media (max-width: 480px) {
            .slot, .result-slot {
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
            .alchemy-table { gap: 8px; }
            .operator { font-size: 18px; }
            .element { padding: 6px 12px; font-size: 13px; }
        }
    </style>
</head>

                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>

    <div class="overlay" id="overlay"></div>
    <div class="message" id="message">
        <div class="message-icon" id="messageIcon">✨</div>
        <div class="message-text" id="messageText">炼成成功！</div>
    </div>
    
    <script>
        // 游戏数据
        const recipes = {
            '火+水': '蒸汽', '火+土': '岩浆', '水+土': '泥浆',
            '火+风': '烟', '水+风': '云', '土+风': '沙尘',
            '蒸汽+水': '雾', '云+水': '雨', '雨+土': '植物',
            '植物+火': '灰烬', '岩浆+水': '石头', '石头+火': '金属',
            '金属+火': '工具', '植物+工具': '木材', '木材+火': '炭',
            '植物+云': '生命', '生命+水': '鱼', '鱼+工具': '食物',
            '生命+土': '人', '人+工具': '房子', '房子+生命': '家庭',
            '金属+石头': '城堡', '云+风': '风暴', '风暴+水': '海啸',
            '人+火': '知识', '知识+人': '科学', '科学+金属': '机器',
            '机器+生命': '机器人', '家庭+爱': '幸福', '人+人': '爱',
            '人+鱼': '人鱼', '火+鱼': '烤鱼', '机器+人': '人造人15号',
            '石头+生命': '孙悟空', '猫+互联网': '网红猫', '狗+工作': '社畜',
            '手机+床': '熬夜', '周一+工作': '痛苦', '周五+下班': '自由',
            '梦想+现实': '幻灭', '面包+火': '吐司', '番茄+蛋': '番茄炒蛋',
            '土豆+火': '薯条', '牛奶+时间': '奶酪', '葡萄+时间': '葡萄酒',
            '肉+时间': '腊肉', '人+鸟': '天使', '人+狼': '狼人',
            '咖啡+工作': '加班', '纸+笔': '作业', '书+枕头': '失眠',
        };
        
        const levels = [
            { target: '蒸汽', hint: '火 + 水' },
            { target: '云', hint: '水 + 风' },
            { target: '植物', hint: '需要先制造雨' },
            { target: '石头', hint: '岩浆遇水变成石头' },
            { target: '金属', hint: '石头经过火炼' },
            { target: '生命', hint: '植物与云的结合' },
            { target: '人', hint: '生命诞生于土' },
            { target: '知识', hint: '人通过火获得智慧' },
            { target: '幸福', hint: '家庭需要什么？' },
        ];
        
        let level = 1, score = 0, combineCount = 0, newRecipeCount = 0;
        let unlockedElements = ['火', '水', '土', '风'];
        let unlockedRecipes = [], selectedSlot = null, slots = [null, null];
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.1);
                osc.frequency.exponentialRampToValueAtTime(2093.0, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'newRecipe') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'knownRecipe') {
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'fail') {
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }
        
        function renderElements() {
            const grid = document.getElementById('elementsGrid');
            grid.innerHTML = unlockedElements.map(el => 
                `<div class="element" onclick="selectElement('${el}')" data-element="${el}">${el}</div>`
            ).join('');
        }
        
        function renderRecipes() {
            const container = document.getElementById('recipes');
            if (unlockedRecipes.length === 0) {
                container.innerHTML = '<span style="color:#999;font-size:12px;">暂无已解锁配方</span>';
                return;
            }
            container.innerHTML = unlockedRecipes.map(r => 
                `<div class="recipe unlocked">${r.input.join('+')} = ${r.output}</div>`
            ).join('');
        }
        
        function loadLevel() {
            const lvl = levels[(level - 1) % levels.length];
            document.getElementById('targetWord').textContent = lvl.target;
            document.getElementById('targetLabel').textContent = `关卡 ${String(level).padStart(2, '0')} —— 目标词汇`;
            document.getElementById('level').textContent = level;
            document.getElementById('combineCount').textContent = combineCount;
            document.getElementById('recipeCount').textContent = newRecipeCount;
            clearSlots();
        }
        
        function selectElement(element) {
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
            if (selectedSlot === null) {
                if (slots[0] === null) selectedSlot = 1;
                else if (slots[1] === null) selectedSlot = 2;
                else selectedSlot = 1;
            }
            slots[selectedSlot - 1] = element;
            updateSlots();
            selectedSlot = selectedSlot === 1 ? 2 : 1;
            document.querySelector(`[data-element="${element}"]`).classList.add('selected');
        }
        
        function selectSlot(num) {
            selectedSlot = num;
            updateSlots();
        }
        
        function updateSlots() {
            slots.forEach((content, i) => {
                const slot = document.getElementById(`slot${i + 1}`);
                slot.textContent = content || '';
                slot.classList.toggle('filled', content !== null);
            });
            const resultSlot = document.getElementById('resultSlot');
            if (slots[0] && slots[1]) {
                const key1 = `${slots[0]}+${slots[1]}`;
                const key2 = `${slots[1]}+${slots[0]}`;
                const result = recipes[key1] || recipes[key2];
                resultSlot.textContent = result || '?';
            } else {
                resultSlot.textContent = '?';
            }
        }
        
        function clearSlots() {
            slots = [null, null];
            selectedSlot = null;
            updateSlots();
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
        }
        
        function combine() {
            const currentSlots = [slots[0], slots[1]];
            if (!currentSlots[0] || !currentSlots[1]) {
                showMessage('⚠️', '请先选择两个元素');
                return;
            }
            combineCount++;
            const key1 = `${currentSlots[0]}+${currentSlots[1]}`;
            const key2 = `${currentSlots[1]}+${currentSlots[0]}`;
            const result = recipes[key1] || recipes[key2];
            
            if (result) {
                const target = document.getElementById('targetWord').textContent.trim();
                const isTarget = (result === target);
                const isNewRecipe = !unlockedRecipes.find(r => r.output === result);
                const isNewElement = !unlockedElements.includes(result);
                
                if (isNewElement) {
                    unlockedElements.push(result);
                    renderElements();
                }
                
                if (isNewRecipe) {
                    unlockedRecipes.push({ input: [currentSlots[0], currentSlots[1]].sort(), output: result });
                    renderRecipes();
                    newRecipeCount++;
                    score += 50;
                } else {
                    score += 10;
                }
                
                document.getElementById('score').textContent = score;
                document.getElementById('combineCount').textContent = combineCount;
                document.getElementById('recipeCount').textContent = newRecipeCount;
                
                if (isTarget) {
                    score += 100;
                    document.getElementById('score').textContent = score;
                    showMessage('🎉', `成功合成目标：${result}！解锁下一关！`);
                    playSound('success');
                    setTimeout(() => {
                        level++;
                        combineCount = 0;
                        newRecipeCount = 0;
                        loadLevel();
                    }, 2000);
                } else {
                    if (isNewRecipe) {
                        showMessage('💡', `发现了新元素：${result}！`);
                        playSound('newRecipe');
                    } else {
                        showMessage('📝', `${result}（配方已收录）`);
                        playSound('knownRecipe');
                    }
                }
                clearSlots();
            } else {
                showMessage('✗', '这两个元素无法组合');
                playSound('fail');
            }
        }
        
        function showHint() {
            const lvl = levels[(level - 1) % levels.length];
            showMessage('💡', lvl.hint);
        }
        
        function showMessage(icon, text) {
            document.getElementById('messageIcon').textContent = icon;
            document.getElementById('messageText').textContent = text;
            document.getElementById('message').classList.add('show');
            document.getElementById('overlay').classList.add('show');
            setTimeout(() => {
                document.getElementById('message').classList.remove('show');
                document.getElementById('overlay').classList.remove('show');
            }, 2000);
        }
        
        function toggleMenu() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
            overlay.classList.toggle('active');
        }
        
        function init() {
            renderElements();
            renderRecipes();
            loadLevel();
        }
        
        init();
    </script>
</body>
