<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Player & Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --player-color: #6366f1;
            --player-glow: rgba(99, 102, 241, 0.5);
            --creator-color: #10b981;
            --creator-glow: rgba(16, 185, 129, 0.5);
            --bg-dark: #0a0a0f;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 主容器 */
        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }
        
        /* 左右分屏 */
        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            transition: opacity 0.6s;
        }
        
        /* PLAYER 左侧 */
        .player-side {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            border-right: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .player-side::before {
            background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
        }
        
        .player-side:hover {
            flex: 1.3;
        }
        
        .player-side:hover::before {
            opacity: 1;
        }
        
        /* CREATOR 右侧 */
        .creator-side {
            background: linear-gradient(225deg, #0f1a0f 0%, #1a2e1a 50%, #0d3328 100%);
            border-left: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .creator-side::before {
            background: radial-gradient(ellipse at center, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
        }
        
        .creator-side:hover {
            flex: 1.3;
        }
        
        .creator-side:hover::before {
            opacity: 1;
        }
        
        /* 像素装饰背景 */
        .pixel-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.1;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
        }
        
        /* 浮动像素块 */
        .floating-pixel {
            position: absolute;
            width: 20px;
            height: 20px;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
        }
        
        .player-side .floating-pixel {
            background: var(--player-color);
            box-shadow: 0 0 20px var(--player-glow);
        }
        
        .creator-side .floating-pixel {
            background: var(--creator-color);
            box-shadow: 0 0 20px var(--creator-glow);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
        
        /* 内容区域 */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 400px;
        }
        
        /* 角色图标 */
        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            transition: all 0.4s;
        }
        
        .player-side .avatar {
            background: linear-gradient(135deg, #4338ca, #6366f1);
            box-shadow: 0 0 40px var(--player-glow);
            border: 3px solid rgba(99, 102, 241, 0.5);
        }
        
        .creator-side .avatar {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 0 40px var(--creator-glow);
            border: 3px solid rgba(16, 185, 129, 0.5);
        }
        
        .side:hover .avatar {
            transform: scale(1.1);
        }
        
        /* 标签 */
        .label {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .player-side .label {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .creator-side .label {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        /* 标题 */
        .title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }
        
        .player-side .title {
            color: #818cf8;
            text-shadow: 0 0 30px var(--player-glow);
        }
        
        .creator-side .title {
            color: #34d399;
            text-shadow: 0 0 30px var(--creator-glow);
        }
        
        /* 副标题 */
        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        /* 技能标签 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .skill-tag {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
        }
        
        .player-side .skill-tag:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
            color: #818cf8;
        }
        
        .creator-side .skill-tag:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            color: #34d399;
        }
        
        /* 按钮 */
        .btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
        }
        
        .player-side .btn {
            background: transparent;
            color: #818cf8;
            border: 2px solid #818cf8;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
        
        .player-side .btn:hover {
            background: #818cf8;
            color: #0a0a0f;
            box-shadow: 0 0 40px var(--player-glow);
        }
        
        .creator-side .btn {
            background: transparent;
            color: #34d399;
            border: 2px solid #34d399;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        
        .creator-side .btn:hover {
            background: #34d399;
            color: #0a0a0f;
            box-shadow: 0 0 40px var(--creator-glow);
        }
        
        /* 中间分界线 */
        .divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.2) 80%, transparent 100%);
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
        }
        
        /* 中间LOGO区域 */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
        }
        
        .logo-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1 0%, #10b981 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 36px;
            color: #fff;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.4), 0 0 60px rgba(16, 185, 129, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .logo-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .logo-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        /* 顶部导航 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
        }
        
        .nav-logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            background: linear-gradient(90deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .nav-link:hover {
            color: #fff;
        }
        
        /* 底部信息 */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .side {
                padding: 40px 20px;
                min-height: 50vh;
            }
            
            .player-side {
                border-right: none;
                border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            }
            
            .creator-side {
                border-left: none;
                border-top: 1px solid rgba(16, 185, 129, 0.2);
            }
            
            .divider {
                display: none;
            }
            
            .center-logo {
                top: 50%;
                transform: translate(-50%, -50%);
            }
            
            .logo-box {
                width: 80px;
                height: 80px;
                font-size: 28px;
            }
            
            .title {
                font-size: 32px;
            }
            
            .avatar {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            
            .nav {
                padding: 15px 20px;
            }
            
            .nav-links {
                gap: 15px;
            }
            
            .nav-link {
                font-size: 12px;
            }
        }
        
        /* 隐藏内容（点击后展开） */
        .hidden-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s, opacity 0.6s;
            opacity: 0;
            margin-top: 20px;
        }
        
        .side:hover .hidden-content,
        .side.active .hidden-content {
            max-height: 300px;
            opacity: 1;
        }
        
        /* 统计数据 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            display: block;
        }
        
        .player-side .stat-value {
            color: #818cf8;
        }
        
        .creator-side .stat-value {
            color: #34d399;
        }
        
        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav class="nav">
        <div class="nav-logo">MAX.Q</div>
        <div class="nav-links">
            <a href="#about" class="nav-link">关于</a>
            <a href="#works" class="nav-link">作品</a>
            <a href="#books" class="nav-link">阅读</a>
            <a href="#contact" class="nav-link">联系</a>
        </div>
    </nav>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 左侧 PLAYER -->
        <div class="side player-side" onclick="enterMode('player')">
            <div class="pixel-bg"></div>
            
            <!-- 浮动像素 -->
            <div class="floating-pixel" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
            <div class="floating-pixel" style="top: 30%; right: 20%; width: 15px; height: 15px; animation-delay: 1s;"></div>
            <div class="floating-pixel" style="bottom: 25%; left: 25%; width: 25px; height: 25px; animation-delay: 2s;"></div>
            <div class="floating-pixel" style="bottom: 15%; right: 15%; width: 12px; height: 12px; animation-delay: 3s;"></div>
            
            <div class="content">
                <div class="label">MODE: PLAYER</div>
                
                <div class="avatar">🎮</div>
                
                <h1 class="title">PLAYER</h1>
                
                <p class="subtitle">
                    游戏爱好者<br>
                    关卡猎人 · 成就收藏家
                </p>
                
                <div class="skills">
                    <span class="skill-tag">🎯 FPS</span>
                    <span class="skill-tag">🏗️ 沙盒</span>
                    <span class="skill-tag">🎲 独立游戏</span>
                    <span class="skill-tag">🎮 主机</span>
                </div>
                
                <button class="btn">进入玩家模式</button>
                
                <!-- 悬停展开内容 -->
                <div class="hidden-content">
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-value">99+</span>
                            <span class="stat-label">游戏库</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">Lv.42</span>
                            <span class="stat-label">玩家等级</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">∞</span>
                            <span class="stat-label">快乐值</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧 CREATOR -->
        <div class="side creator-side" onclick="enterMode('creator')">
            <div class="pixel-bg"></div>
            
            <!-- 浮动像素 -->
            <div class="floating-pixel" style="top: 15%; right: 15%; animation-delay: 0.5s;"></div>
            <div class="floating-pixel" style="top: 35%; left: 20%; width: 15px; height: 15px; animation-delay: 1.5s;"></div>
            <div class="floating-pixel" style="bottom: 30%; right: 25%; width: 25px; height: 25px; animation-delay: 2.5s;"></div>
            <div class="floating-pixel" style="bottom: 20%; left: 15%; width: 12px; height: 12px; animation-delay: 3.5s;"></div>
            
            <div class="content">
                <div class="label">MODE: CREATOR</div>
                
                <div class="avatar">👨‍💻</div>
                
                <h1 class="title">CREATOR</h1>
                
                <p class="subtitle">
                    游戏开发者<br>
                    代码巫师 · 创造者
                </p>
                
                <div class="skills">
                    <span class="skill-tag">🐍 Python</span>
                    <span class="skill-tag">🎨 Scratch</span>
                    <span class="skill-tag">⚡ Arduino</span>
                    <span class="skill-tag">🎮 GameDev</span>
                </div>
                
                <button class="btn">进入创造模式</button>
                
                <!-- 悬停展开内容 -->
                <div class="hidden-content">
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-value">12+</span>
                            <span class="stat-label">项目</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">3年</span>
                            <span class="stat-label">编程经验</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">∞</span>
                            <span class="stat-label">创造力</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 中间分界线 -->
        <div class="divider"></div>
        
        <!-- 中间LOGO -->
        <div class="center-logo">
            <div class="logo-box">M</div>
            <div class="logo-text">MAX QIAN</div>
        </div>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        11岁 · 游戏开发者 · 阅读狂魔 · Arduino创客
    </div>
    
    <script>
        // 进入模式
        function enterMode(mode) {
            if (mode === 'player') {
                // 玩家模式 - 跳转到3D世界或游戏展示
                window.location.href = './max-world/';
            } else {
                // 创造者模式 - 跳转到作品展示
                alert('创造者模式正在开发中...');
            }
        }
        
        // 鼠标移动视差效果
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const pixels = document.querySelectorAll('.floating-pixel');
            pixels.forEach((pixel, index) => {
                const speed = (index + 1) * 5;
                const xOffset = (x - 0.5) * speed;
                const yOffset = (y - 0.5) * speed;
                pixel.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });
        
        // 移动端触摸支持
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const deltaY = touchStartY - touchY;
            
            // 可以根据滑动方向切换高亮
            const playerSide = document.querySelector('.player-side');
            const creatorSide = document.querySelector('.creator-side');
            
            if (deltaY > 50) {
                // 向上滑动
                creatorSide.classList.add('active');
                playerSide.classList.remove('active');
            } else if (deltaY < -50) {
                // 向下滑动
                playerSide.classList.add('active');
                creatorSide.classList.remove('active');
            }
        });
    </script>
</body>
</html>
