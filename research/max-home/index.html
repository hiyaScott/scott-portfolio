<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Player & Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-header: #1a1a1a;
            --color-text: #333;
            --color-text-light: #666;
            --header-height: 70px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: var(--color-text);
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: var(--color-header);
            height: var(--header-height);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .logo-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #333;
        }
        
        .nav-desktop {
            display: flex;
            gap: 50px;
            align-items: center;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            text-transform: lowercase;
        }
        
        .nav-link:hover { color: #fff; }
        
        .nav-social {
            display: flex;
            gap: 12px;
        }
        
        .social-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Hero - 核心布局 */
        .hero {
            padding-top: var(--header-height);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        
        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1400px;
            padding: 0 60px;
            position: relative;
        }
        
        /* 左右文字区域 */
        .side {
            flex: 0 0 320px;
            z-index: 10;
        }
        
        .side-left {
            text-align: left;
            padding-right: 40px;
        }
        
        .side-right {
            text-align: left;
            padding-left: 40px;
        }
        
        .side-title {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 16px;
            color: var(--color-text);
        }
        
        .side-title small {
            font-size: 72px;
            color: var(--color-text-light);
            font-weight: 300;
        }
        
        .side-desc {
            font-size: 16px;
            color: var(--color-text-light);
            line-height: 1.6;
            max-width: 280px;
        }
        
        /* 中间头像区域 - Adham Dannaway 效果 */
        .avatar-container {
            position: relative;
            width: 500px;
            height: 500px;
            flex-shrink: 0;
        }
        
        .avatar-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: clip-path 0.4s ease, transform 0.4s ease, opacity 0.4s ease;
        }
        
        /* Player 艺术风格 - 默认显示左半边 */
        .avatar-player {
            clip-path: inset(0 50% 0 0);  /* 显示左边 */
            z-index: 2;
        }
        
        /* Creator 真实风格 - 默认显示右半边 */
        .avatar-creator {
            clip-path: inset(0 0 0 50%);  /* 显示右边 */
            z-index: 1;
        }
        
        /* Mobile Menu */
        .menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0; right: 0; bottom: 0;
            background: var(--color-header);
            z-index: 999;
            padding: 40px 24px;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .mobile-nav.active { display: flex; }
        .mobile-nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            font-weight: 500;
        }
        
        /* Mobile */
        @media (max-width: 1024px) {
            .nav-desktop { display: none; }
            .menu-btn { display: flex; align-items: center; justify-content: center; }
            
            .hero-container {
                padding: 0 20px;
                flex-direction: row;
                gap: 10px;
            }
            
            .side {
                flex: 0 0 auto;
                min-width: 80px;
            }
            
            .side-left { padding-right: 10px; }
            .side-right { padding-left: 10px; }
            
            .side-title { font-size: 28px; }
            .side-title small { font-size: 28px; }
            .side-desc { font-size: 11px; display: none; }
            
            .avatar-container {
                width: 200px;
                height: 200px;
            }
        }
        
        @media (max-width: 480px) {
            .side-title { font-size: 22px; }
            .side-title small { font-size: 22px; }
            .avatar-container {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-img"></div>
        <nav class="nav-desktop">
            <a href="#" class="nav-link">about</a>
            <a href="#" class="nav-link">game</a>
            <a href="#" class="nav-link">book</a>
            <a href="#" class="nav-link">artwork</a>
            <div class="nav-social">
                <a href="#" class="social-link">𝕏</a>
                <a href="#" class="social-link">in</a>
            </div>
        </nav>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>
    
    <nav class="mobile-nav" id="mobileNav">
        <a href="#" class="mobile-nav-link">about</a>
        <a href="#" class="mobile-nav-link">game</a>
        <a href="#" class="mobile-nav-link">book</a>
        <a href="#" class="mobile-nav-link">artwork</a>
    </nav>

    <section class="hero">
        <div class="hero-container">
            <div class="side side-left" id="sideLeft">
                <h1 class="side-title">Player</h1>
                <p class="side-desc">Game Player who loves exploring virtual worlds and discovering new adventures.</p>
            </div>
            
            <div class="avatar-container" id="avatarContainer">
                <img src="max-player.jpg" alt="Player" class="avatar-image avatar-player" id="avatarPlayer">
                <img src="max-creator.jpg" alt="Creator" class="avatar-image avatar-creator" id="avatarCreator">
            </div>
            
            <div class="side side-right" id="sideRight">
                <h1 class="side-title"><small>&lt;</small>Creator<small>&gt;</small></h1>
                <p class="side-desc">Game Creator who builds worlds with code and brings ideas to life.</p>
            </div>
        </div>
    </section>

    <!-- Gyro Button -->
    <button id="gyroBtn" style="position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; z-index: 1001; cursor: pointer; display: none;" onclick="requestGyroPermission()">
        📱 启用陀螺仪
    </button>

    <script>
        const avatarPlayer = document.getElementById('avatarPlayer');
        const avatarCreator = document.getElementById('avatarCreator');
        const sideLeft = document.getElementById('sideLeft');
        const sideRight = document.getElementById('sideRight');
        const gyroBtn = document.getElementById('gyroBtn');
        
        let currentPercent = 0;
        let targetPercent = 0;
        
        function updateLayout(percent) {
            // percent: -1 (左) 到 1 (右)
            // -1 = 完全显示 Player, 1 = 完全显示 Creator
            
            if (percent < 0) {
                // 向左滑：Player 展开，Creator 收缩
                const showAmount = Math.abs(percent); // 0 ~ 1
                
                // Player: 从显示左半边(50%) 到显示完整(100%)
                avatarPlayer.style.clipPath = `inset(0 ${50 - showAmount * 50}% 0 0)`;
                avatarPlayer.style.opacity = '1';
                
                // Creator: 从显示右半边 到完全隐藏
                avatarCreator.style.clipPath = `inset(0 0 0 ${50 + showAmount * 50}%)`;
                avatarCreator.style.opacity = 1 - showAmount;
                
                // 文字
                sideLeft.style.opacity = 1;
                sideRight.style.opacity = 0.3;
                
            } else if (percent > 0) {
                // 向右滑：Creator 展开，Player 收缩
                
                // Player: 从显示左半边 到完全隐藏
                avatarPlayer.style.clipPath = `inset(0 ${50 + percent * 50}% 0 0)`;
                avatarPlayer.style.opacity = 1 - percent;
                
                // Creator: 从显示右半边(50%) 到显示完整(100%)
                avatarCreator.style.clipPath = `inset(0 0 0 ${50 - percent * 50}%)`;
                avatarCreator.style.opacity = '1';
                
                // 文字
                sideLeft.style.opacity = 0.3;
                sideRight.style.opacity = 1;
                
            } else {
                // 中间：各显示一半
                avatarPlayer.style.clipPath = 'inset(0 50% 0 0)';
                avatarPlayer.style.opacity = '1';
                avatarCreator.style.clipPath = 'inset(0 0 0 50%)';
                avatarCreator.style.opacity = '1';
                sideLeft.style.opacity = 1;
                sideRight.style.opacity = 1;
            }
        }
        
        // 鼠标追踪
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 1024) return;
            const centerX = window.innerWidth / 2;
            const percent = Math.max(-1, Math.min(1, (e.clientX - centerX) / (centerX * 0.6)));
            targetPercent = percent;
        });
        
        // 陀螺仪
        function handleOrientation(e) {
            const gamma = e.gamma || 0;
            const percent = Math.max(-1, Math.min(1, gamma / 45));
            targetPercent = percent;
        }
        
        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => { if (state === 'granted') enableGyro(); })
                    .catch(console.error);
            }
        }
        
        function enableGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroBtn.style.display = 'none';
        }
        
        if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
            if (window.innerWidth <= 1024) gyroBtn.style.display = 'block';
        } else if (window.DeviceOrientationEvent) {
            enableGyro();
        }
        
        // 动画循环
        function animate() {
            currentPercent += (targetPercent - currentPercent) * 0.1;
            updateLayout(currentPercent);
            requestAnimationFrame(animate);
        }
        animate();
        
        function toggleMenu() {
            document.getElementById('mobileNav').classList.toggle('active');
        }
    </script>
</body>
</html>
