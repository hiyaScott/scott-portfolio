<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Player & Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-header: #1a1a1a;
            --color-text: #333;
            --color-text-light: #666;
            --header-height: 70px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: var(--color-text);
            line-height: 1.6;
        }
        
        .header {
            background: var(--color-header);
            height: var(--header-height);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .logo-img {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #333;
        }
        
        .nav-desktop {
            display: flex;
            gap: 50px;
            align-items: center;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            text-transform: lowercase;
        }
        
        .nav-link:hover { color: #fff; }
        
        .nav-social {
            display: flex;
            gap: 12px;
        }
        
        .social-link {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Hero - 参考 Adham Dannaway 布局 */
        .hero {
            padding-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        
        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            padding: 0 40px;
            gap: 0;
            position: relative;
        }
        
        /* 背景文字 - 在人物后面 */
        .bg-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 120px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.08);
            letter-spacing: -4px;
            z-index: 1;
            pointer-events: none;
            white-space: nowrap;
        }
        
        .bg-text-left {
            left: 5%;
            text-align: left;
        }
        
        .bg-text-right {
            right: 5%;
            text-align: right;
        }
        
        .bg-text small {
            font-size: 120px;
            font-weight: 300;
            color: rgba(0, 0, 0, 0.06);
        }
        
        /* 前景文字 */
        .side {
            flex: 1;
            z-index: 10;
            max-width: 280px;
            position: relative;
        }
        
        .side-left { text-align: left; padding-right: 20px; }
        .side-right { text-align: left; padding-left: 20px; }
        
        .side-title {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 12px;
            color: var(--color-text);
            letter-spacing: -1px;
        }
        
        .side-title small {
            font-size: 48px;
            color: var(--color-text-light);
            font-weight: 300;
        }
        
        .side-desc {
            font-size: 14px;
            color: var(--color-text-light);
            line-height: 1.5;
        }
        
        /* 头像区域 - 更大尺寸 */
        .avatar-wrapper {
            position: relative;
            width: 600px;
            height: 450px;
            flex-shrink: 0;
            z-index: 5;
        }
        
        .avatar-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .avatar-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: clip-path 0.1s linear, opacity 0.2s ease;
        }
        
        /* Player */
        .avatar-player {
            z-index: 2;
        }
        
        /* Creator */
        .avatar-creator {
            z-index: 1;
        }
        
        /* Mobile */
        .menu-btn {
            display: none;
            width: 40px; height: 40px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0; right: 0; bottom: 0;
            background: var(--color-header);
            z-index: 999;
            padding: 40px 24px;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .mobile-nav.active { display: flex; }
        
        .mobile-nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            font-weight: 500;
        }
        
        @media (max-width: 1024px) {
            .nav-desktop { display: none; }
            .menu-btn { display: flex; align-items: center; justify-content: center; }
            
            .hero-container {
                padding: 0 16px;
                flex-direction: row;
                gap: 8px;
            }
            
            .bg-text {
                font-size: 60px;
                display: none; /* 移动端隐藏背景文字 */
            }
            
            .side {
                flex: 0 0 auto;
                min-width: 70px;
            }
            
            .side-left { padding-right: 8px; }
            .side-right { padding-left: 8px; }
            
            .side-title { font-size: 20px; letter-spacing: -1px; }
            .side-title small { font-size: 20px; }
            .side-desc { display: none; }
            
            .avatar-wrapper {
                width: 280px;
                height: 210px;
            }
        }
        
        @media (max-width: 480px) {
            .side-title { font-size: 16px; }
            .side-title small { font-size: 16px; }
            .avatar-wrapper {
                width: 220px;
                height: 165px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-img"></div>
        <nav class="nav-desktop">
            <a href="#" class="nav-link">about</a>
            <a href="#" class="nav-link">game</a>
            <a href="#" class="nav-link">book</a>
            <a href="#" class="nav-link">artwork</a>
            <div class="nav-social">
                <a href="#" class="social-link">𝕏</a>
                <a href="#" class="social-link">in</a>
            </div>
        </nav>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>
    
    <nav class="mobile-nav" id="mobileNav">
        <a href="#" class="mobile-nav-link">about</a>
        <a href="#" class="mobile-nav-link">game</a>
        <a href="#" class="mobile-nav-link">book</a>
        <a href="#" class="mobile-nav-link">artwork</a>
    </nav>

    <section class="hero">
        <div class="hero-container">
            <!-- 背景大字 -->
            <div class="bg-text bg-text-left" id="bgTextLeft">Player</div>
            <div class="bg-text bg-text-right" id="bgTextRight"><small>&lt;</small>Creator<small>&gt;</small></div>
            
            <div class="side side-left" id="sideLeft">
                <h1 class="side-title">Player</h1>
                <p class="side-desc">Game Player who loves exploring virtual worlds.</p>
            </div>
            
            <div class="avatar-wrapper">
                <div class="avatar-container" id="avatarContainer">
                    <!-- Player: 阳光少年风格 -->
                    <img src="max-player.webp" alt="Player" class="avatar-image avatar-player" id="avatarPlayer">
                    <!-- Creator: 绿色代码雨风格 -->
                    <img src="max-creator.webp" alt="Creator" class="avatar-image avatar-creator" id="avatarCreator">
                </div>
            </div>
            
            <div class="side side-right" id="sideRight">
                <h1 class="side-title"><small>&lt;</small>Creator<small>&gt;</small></h1>
                <p class="side-desc">Game Creator who builds worlds with code.</p>
            </div>
        </div>
    </section>

    <button id="gyroBtn" style="position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; z-index: 1001; cursor: pointer; display: none;" onclick="requestGyroPermission()">📱 启用陀螺仪</button>

    <script>
        const avatarPlayer = document.getElementById('avatarPlayer');
        const avatarCreator = document.getElementById('avatarCreator');
        const sideLeft = document.getElementById('sideLeft');
        const sideRight = document.getElementById('sideRight');
        const bgTextLeft = document.getElementById('bgTextLeft');
        const bgTextRight = document.getElementById('bgTextRight');
        const gyroBtn = document.getElementById('gyroBtn');
        
        let currentPercent = 0;
        let targetPercent = 0;
        
        function updateLayout(percent) {
            // percent: -1 (左) 到 1 (右)
            const playerShow = 50 - percent * 50;
            const creatorShow = 50 + percent * 50;
            
            // Player 显示左边
            avatarPlayer.style.clipPath = `inset(0 ${100 - playerShow}% 0 0)`;
            
            // Creator 显示右边
            avatarCreator.style.clipPath = `inset(0 0 0 ${100 - creatorShow}%)`;
            
            // 文字透明度
            if (playerShow > 60) {
                sideLeft.style.opacity = '1';
                sideRight.style.opacity = '0.2';
                bgTextLeft.style.opacity = '1';
                bgTextRight.style.opacity = '0.1';
            } else if (creatorShow > 60) {
                sideLeft.style.opacity = '0.2';
                sideRight.style.opacity = '1';
                bgTextLeft.style.opacity = '0.1';
                bgTextRight.style.opacity = '1';
            } else {
                sideLeft.style.opacity = '1';
                sideRight.style.opacity = '1';
                bgTextLeft.style.opacity = '0.4';
                bgTextRight.style.opacity = '0.4';
            }
        }
        
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 1024) return;
            const centerX = window.innerWidth / 2;
            const percent = Math.max(-1, Math.min(1, (e.clientX - centerX) / (centerX * 0.6)));
            targetPercent = percent;
        });
        
        function handleOrientation(e) {
            const gamma = e.gamma || 0;
            const percent = Math.max(-1, Math.min(1, gamma / 45));
            targetPercent = percent;
        }
        
        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => { if (state === 'granted') enableGyro(); })
                    .catch(console.error);
            }
        }
        
        function enableGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroBtn.style.display = 'none';
        }
        
        if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
            if (window.innerWidth <= 1024) gyroBtn.style.display = 'block';
        } else if (window.DeviceOrientationEvent) {
            enableGyro();
        }
        
        function animate() {
            currentPercent += (targetPercent - currentPercent) * 0.15;
            updateLayout(currentPercent);
            requestAnimationFrame(animate);
        }
        animate();
        
        function toggleMenu() {
            document.getElementById('mobileNav').classList.toggle('active');
        }
    </script>
</body>
</html>
