<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Player & Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-header: #1a1a1a;
            --color-text: #333;
            --color-text-light: #666;
            --header-height: 70px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: var(--color-text);
            line-height: 1.6;
        }
        
        .header {
            background: var(--color-header);
            height: var(--header-height);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .logo-img {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #333;
        }
        
        .nav-desktop {
            display: flex;
            gap: 50px;
            align-items: center;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            text-transform: lowercase;
        }
        
        .nav-link:hover { color: #fff; }
        
        .nav-social {
            display: flex;
            gap: 12px;
        }
        
        .social-link {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Hero - 参考 Adham Dannaway 布局 */
        .hero {
            padding-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        
        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 40px;
            gap: 0;
        }
        
        .side {
            flex: 1;
            z-index: 10;
            max-width: 300px;
        }
        
        .side-left { text-align: left; padding-right: 20px; }
        .side-right { text-align: left; padding-left: 20px; }
        
        .side-title {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 12px;
            color: var(--color-text);
            letter-spacing: -2px;
        }
        
        .side-title small {
            font-size: 64px;
            color: var(--color-text-light);
            font-weight: 300;
        }
        
        .side-desc {
            font-size: 15px;
            color: var(--color-text-light);
            line-height: 1.5;
        }
        
        /* 头像 - 参考 Adham Dannaway 1040x600 比例 (1.73:1) */
        .avatar-container {
            position: relative;
            width: 520px;
            height: 300px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .avatar-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: clip-path 0.1s linear;
        }
        
        /* Player 艺术风格 */
        .avatar-player {
            z-index: 2;
            /* clip-path 由 JS 动态控制: inset(0 X% 0 0) 显示左边 X% */
        }
        
        /* Creator 真实风格 */
        .avatar-creator {
            z-index: 1;
            /* clip-path 由 JS 动态控制: inset(0 0 0 X%) 显示右边 X% */
        }
        
        /* Mobile */
        .menu-btn {
            display: none;
            width: 40px; height: 40px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0; right: 0; bottom: 0;
            background: var(--color-header);
            z-index: 999;
            padding: 40px 24px;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .mobile-nav.active { display: flex; }
        
        .mobile-nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            font-weight: 500;
        }
        
        @media (max-width: 1024px) {
            .nav-desktop { display: none; }
            .menu-btn { display: flex; align-items: center; justify-content: center; }
            
            .hero-container {
                padding: 0 16px;
                flex-direction: row;
                gap: 8px;
            }
            
            .side {
                flex: 0 0 auto;
                min-width: 70px;
            }
            
            .side-left { padding-right: 8px; }
            .side-right { padding-left: 8px; }
            
            .side-title { font-size: 22px; letter-spacing: -1px; }
            .side-title small { font-size: 22px; }
            .side-desc { display: none; }
            
            .avatar-container {
                width: 260px;
                height: 150px;
            }
        }
        
        @media (max-width: 480px) {
            .side-title { font-size: 18px; }
            .side-title small { font-size: 18px; }
            .avatar-container {
                width: 200px;
                height: 115px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-img"></div>
        <nav class="nav-desktop">
            <a href="#" class="nav-link">about</a>
            <a href="#" class="nav-link">game</a>
            <a href="#" class="nav-link">book</a>
            <a href="#" class="nav-link">artwork</a>
            <div class="nav-social">
                <a href="#" class="social-link">𝕏</a>
                <a href="#" class="social-link">in</a>
            </div>
        </nav>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>
    
    <nav class="mobile-nav" id="mobileNav">
        <a href="#" class="mobile-nav-link">about</a>
        <a href="#" class="mobile-nav-link">game</a>
        <a href="#" class="mobile-nav-link">book</a>
        <a href="#" class="mobile-nav-link">artwork</a>
    </nav>

    <section class="hero">
        <div class="hero-container">
            <div class="side side-left" id="sideLeft">
                <h1 class="side-title">Player</h1>
                <p class="side-desc">Game Player who loves exploring virtual worlds.</p>
            </div>
            
            <div class="avatar-container" id="avatarContainer">
                <!-- Player: 阳光少年风格，显示左边 -->
                <img src="max-player.webp" alt="Player" class="avatar-image avatar-player" id="avatarPlayer">
                <!-- Creator: 绿色代码雨风格，显示右边 -->
                <img src="max-creator.webp" alt="Creator" class="avatar-image avatar-creator" id="avatarCreator">
            </div>
            
            <div class="side side-right" id="sideRight">
                <h1 class="side-title"><small>&lt;</small>Creator<small>&gt;</small></h1>
                <p class="side-desc">Game Creator who builds worlds with code.</p>
            </div>
        </div>
    </section>

    <button id="gyroBtn" style="position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; z-index: 1001; cursor: pointer; display: none;" onclick="requestGyroPermission()">📱 启用陀螺仪</button>

    <script>
        const avatarPlayer = document.getElementById('avatarPlayer');
        const avatarCreator = document.getElementById('avatarCreator');
        const sideLeft = document.getElementById('sideLeft');
        const sideRight = document.getElementById('sideRight');
        const gyroBtn = document.getElementById('gyroBtn');
        
        let currentPercent = 0;
        let targetPercent = 0;
        
        /**
         * 核心逻辑：两张图片显示面积比例变化
         * 
         * 默认 (0):    Player 显示左边 50%, Creator 显示右边 50%
         * 左倾 (-1):   Player 显示左边 100%, Creator 显示右边 0%
         * 右倾 (+1):   Player 显示左边 0%,   Creator 显示右边 100%
         * 
         * clip-path: inset(top right bottom left)
         * Player:  inset(0 X% 0 0)  - 从右边裁剪 X%，显示左边 (100-X)%
         * Creator: inset(0 0 0 X%)  - 从左边裁剪 X%，显示右边 (100-X)%
         */
        function updateLayout(percent) {
            // percent: -1 (左) 到 1 (右)
            // 转换为 0~100 的显示比例
            
            // 左倾(-1): playerShow=100, creatorShow=0
            // 右倾(+1): playerShow=0, creatorShow=100
            // 中间(0):  playerShow=50, creatorShow=50
            
            const playerShow = 50 - percent * 50;  // 0~100
            const creatorShow = 50 + percent * 50; // 100~0
            
            // Player 显示左边 playerShow%
            // clip-path: inset(0 (100-playerShow)% 0 0)
            avatarPlayer.style.clipPath = `inset(0 ${100 - playerShow}% 0 0)`;
            
            // Creator 显示右边 creatorShow%
            // clip-path: inset(0 0 0 (100-creatorShow)%)
            avatarCreator.style.clipPath = `inset(0 0 0 ${100 - creatorShow}%)`;
            
            // 文字高亮：哪边显示更多，哪边文字高亮
            if (playerShow > 60) {
                sideLeft.style.opacity = '1';
                sideRight.style.opacity = '0.3';
            } else if (creatorShow > 60) {
                sideLeft.style.opacity = '0.3';
                sideRight.style.opacity = '1';
            } else {
                sideLeft.style.opacity = '1';
                sideRight.style.opacity = '1';
            }
        }
        
        // 鼠标追踪
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 1024) return;
            const centerX = window.innerWidth / 2;
            const percent = Math.max(-1, Math.min(1, (e.clientX - centerX) / (centerX * 0.6)));
            targetPercent = percent;
        });
        
        // 陀螺仪
        function handleOrientation(e) {
            const gamma = e.gamma || 0;
            const percent = Math.max(-1, Math.min(1, gamma / 45));
            targetPercent = percent;
        }
        
        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => { if (state === 'granted') enableGyro(); })
                    .catch(console.error);
            }
        }
        
        function enableGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroBtn.style.display = 'none';
        }
        
        if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
            if (window.innerWidth <= 1024) gyroBtn.style.display = 'block';
        } else if (window.DeviceOrientationEvent) {
            enableGyro();
        }
        
        // 动画循环
        function animate() {
            currentPercent += (targetPercent - currentPercent) * 0.15;
            updateLayout(currentPercent);
            requestAnimationFrame(animate);
        }
        animate();
        
        function toggleMenu() {
            document.getElementById('mobileNav').classList.toggle('active');
        }
    </script>
</body>
</html>
