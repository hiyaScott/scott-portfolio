<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Player & Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-header: #1a1a1a;
            --header-height: 70px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            line-height: 1.6;
        }
        
        .header {
            background: var(--color-header);
            height: var(--header-height);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .logo-img {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #333;
        }
        
        .nav-desktop {
            display: flex;
            gap: 50px;
            align-items: center;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            text-transform: lowercase;
        }
        
        .nav-link:hover { color: #fff; }
        
        .nav-social {
            display: flex;
            gap: 12px;
        }
        
        .social-link {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Hero */
        .hero {
            padding-top: var(--header-height);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        
        /* 主体结构 - 固定比例 */
        .hero-content {
            position: relative;
            width: 1100px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 背景大字 */
        .bg-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 110px;
            font-weight: 700;
            color: #000;
            letter-spacing: -4px;
            pointer-events: none;
            white-space: nowrap;
            line-height: 1;
            z-index: 1;
        }
        
        .bg-text-left {
            left: 0;
        }
        
        .bg-text-right {
            right: 0;
        }
        
        .bg-text small {
            font-size: inherit;
            font-weight: 400;
        }
        
        /* 头像 */
        .avatar-wrapper {
            position: relative;
            width: 520px;
            height: 520px;
            z-index: 5;
        }
        
        .avatar-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .avatar-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-height: 100%;
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: clip-path 0.15s ease-out;
        }
        
        .avatar-player {
            z-index: 2;
            clip-path: inset(0 50% 0 0);
        }
        
        .avatar-creator {
            z-index: 1;
            clip-path: inset(0 0 0 50%);
        }
        
        /* Mobile */
        .menu-btn {
            display: none;
            width: 40px; height: 40px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0; right: 0; bottom: 0;
            background: var(--color-header);
            z-index: 999;
            padding: 40px 24px;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .mobile-nav.active { display: flex; }
        
        .mobile-nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            font-weight: 500;
        }
        
        /* 响应式缩放 */
        @media (max-width: 1150px) {
            .hero-content {
                transform: scale(0.9);
            }
        }
        
        @media (max-width: 1000px) {
            .hero-content {
                transform: scale(0.8);
            }
        }
        
        @media (max-width: 900px) {
            .hero-content {
                transform: scale(0.7);
            }
        }
        
        @media (max-width: 800px) {
            .hero-content {
                transform: scale(0.6);
            }
        }
        
        @media (max-width: 700px) {
            .nav-desktop { display: none; }
            .menu-btn { display: flex; align-items: center; justify-content: center; }
            
            .hero-content {
                transform: scale(0.5);
            }
        }
        
        @media (max-width: 580px) {
            .hero-content {
                transform: scale(0.42);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-img"></div>
        <nav class="nav-desktop">
            <a href="#" class="nav-link">about</a>
            <a href="#" class="nav-link">game</a>
            <a href="#" class="nav-link">book</a>
            <a href="#" class="nav-link">artwork</a>
            <div class="nav-social">
                <a href="#" class="social-link">𝕏</a>
                <a href="#" class="social-link">in</a>
            </div>
        </nav>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>
    
    <nav class="mobile-nav" id="mobileNav">
        <a href="#" class="mobile-nav-link">about</a>
        <a href="#" class="mobile-nav-link">game</a>
        <a href="#" class="mobile-nav-link">book</a>
        <a href="#" class="mobile-nav-link">artwork</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div class="bg-text bg-text-left">Player</div>
            <div class="bg-text bg-text-right"><small>&lt;</small>Creator<small>&gt;</small></div>
            
            <div class="avatar-wrapper">
                <div class="avatar-container" id="avatarContainer">
                    <img src="max-player.webp" alt="Player" class="avatar-image avatar-player" id="avatarPlayer">
                    <img src="max-creator.webp" alt="Creator" class="avatar-image avatar-creator" id="avatarCreator">
                </div>
            </div>
        </div>
    </section>

    <script>
        const avatarPlayer = document.getElementById('avatarPlayer');
        const avatarCreator = document.getElementById('avatarCreator');
        
        let currentPercent = 0;
        let targetPercent = 0;
        
        function updateLayout(percent) {
            const playerClip = 50 - percent * 50;
            const creatorClip = 50 + percent * 50;
            
            avatarPlayer.style.clipPath = `inset(0 ${100 - playerClip}% 0 0)`;
            avatarCreator.style.clipPath = `inset(0 0 0 ${100 - creatorClip}%)`;
        }
        
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 700) return;
            const centerX = window.innerWidth / 2;
            const percent = Math.max(-1, Math.min(1, (e.clientX - centerX) / (centerX * 0.5)));
            targetPercent = percent;
        });
        
        function handleOrientation(e) {
            const gamma = e.gamma || 0;
            const percent = Math.max(-1, Math.min(1, gamma / 35));
            targetPercent = percent;
        }
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation);
        }
        
        function animate() {
            currentPercent += (targetPercent - currentPercent) * 0.1;
            updateLayout(currentPercent);
            requestAnimationFrame(animate);
        }
        animate();
        
        function toggleMenu() {
            document.getElementById('mobileNav').classList.toggle('active');
        }
    </script>
</body>
</html>
