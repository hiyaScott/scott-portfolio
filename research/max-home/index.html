<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Player & Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-header: #1a1a1a;
            --color-text: #333;
            --color-text-light: #666;
            --header-height: 70px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .header {
            background: var(--color-header);
            height: var(--header-height);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .logo-img {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #333;
        }
        
        .nav-desktop {
            display: flex;
            gap: 50px;
            align-items: center;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            text-transform: lowercase;
        }
        
        .nav-link:hover { color: #fff; }
        
        .nav-social {
            display: flex;
            gap: 12px;
        }
        
        .social-link {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Hero - 全屏布局 */
        .hero {
            padding-top: var(--header-height);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            position: relative;
        }
        
        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: calc(100vh - var(--header-height));
            max-width: 1400px;
            padding: 0 60px;
            position: relative;
        }
        
        /* 背景大字 - 在人物后面 */
        .bg-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: clamp(60px, 10vw, 140px);
            font-weight: 700;
            color: rgba(0, 0, 0, 0.08);
            letter-spacing: -4px;
            z-index: 1;
            pointer-events: none;
            white-space: nowrap;
            line-height: 1;
        }
        
        .bg-text-left {
            left: 5%;
        }
        
        .bg-text-right {
            right: 5%;
        }
        
        .bg-text small {
            font-size: inherit;
            font-weight: 300;
            color: rgba(0, 0, 0, 0.06);
        }
        
        /* 前景文字 - 在人物两侧 */
        .side {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            max-width: 280px;
        }
        
        .side-left { 
            left: 8%;
            text-align: left;
        }
        
        .side-right { 
            right: 8%;
            text-align: left;
        }
        
        .side-title {
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 16px;
            color: var(--color-text);
            letter-spacing: -2px;
        }
        
        .side-title small {
            font-size: inherit;
            color: var(--color-text-light);
            font-weight: 300;
        }
        
        .side-desc {
            font-size: 15px;
            color: var(--color-text-light);
            line-height: 1.6;
            max-width: 240px;
        }
        
        /* 头像区域 - 占据中央主体 */
        .avatar-wrapper {
            position: relative;
            width: 50vw;
            height: 70vh;
            max-width: 700px;
            max-height: 800px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .avatar-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .avatar-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-height: 100%;
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: clip-path 0.15s ease-out;
        }

        /* Player - 显示左半边 */
        .avatar-player {
            z-index: 2;
            clip-path: inset(0 50% 0 0);
        }

        /* Creator - 显示右半边 */
        .avatar-creator {
            z-index: 1;
            clip-path: inset(0 0 0 50%);
        }
        
        /* Mobile */
        .menu-btn {
            display: none;
            width: 40px; height: 40px;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0; right: 0; bottom: 0;
            background: var(--color-header);
            z-index: 999;
            padding: 40px 24px;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .mobile-nav.active { display: flex; }
        
        .mobile-nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            font-weight: 500;
        }
        
        @media (max-width: 1024px) {
            .nav-desktop { display: none; }
            .menu-btn { display: flex; align-items: center; justify-content: center; }
            
            .hero-container {
                padding: 0 20px;
                flex-direction: column;
                gap: 20px;
            }
            
            .bg-text { display: none; }
            
            .side {
                position: relative;
                top: auto;
                transform: none;
                left: auto;
                right: auto;
                text-align: center;
                max-width: 100%;
            }
            
            .side-left, .side-right {
                left: auto;
                right: auto;
            }
            
            .side-title { font-size: 28px; }
            .side-desc { display: none; }
            
            .avatar-wrapper {
                width: 80vw;
                height: 50vh;
                order: -1;
            }
        }
        
        @media (max-width: 480px) {
            .side-title { font-size: 22px; }
            .avatar-wrapper {
                width: 90vw;
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-img"></div>
        <nav class="nav-desktop">
            <a href="#" class="nav-link">about</a>
            <a href="#" class="nav-link">game</a>
            <a href="#" class="nav-link">book</a>
            <a href="#" class="nav-link">artwork</a>
            <div class="nav-social">
                <a href="#" class="social-link">𝕏</a>
                <a href="#" class="social-link">in</a>
            </div>
        </nav>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </header>
    
    <nav class="mobile-nav" id="mobileNav">
        <a href="#" class="mobile-nav-link">about</a>
        <a href="#" class="mobile-nav-link">game</a>
        <a href="#" class="mobile-nav-link">book</a>
        <a href="#" class="mobile-nav-link">artwork</a>
    </nav>

    <section class="hero">
        <div class="hero-container">
            <!-- 背景大字 -->
            <div class="bg-text bg-text-left" id="bgTextLeft">Player</div>
            <div class="bg-text bg-text-right" id="bgTextRight"><small>&lt;</small>Creator<small>&gt;</small></div>
            
            <!-- 左侧文字 -->
            <div class="side side-left" id="sideLeft">
                <h1 class="side-title">Player</h1>
                <p class="side-desc">Game Player who loves exploring virtual worlds.</p>
            </div>
            
            <!-- 中央头像 -->
            <div class="avatar-wrapper">
                <div class="avatar-container" id="avatarContainer">
                    <img src="max-player.webp" alt="Player" class="avatar-image avatar-player" id="avatarPlayer">
                    <img src="max-creator.webp" alt="Creator" class="avatar-image avatar-creator" id="avatarCreator">
                </div>
            </div>
            
            <!-- 右侧文字 -->
            <div class="side side-right" id="sideRight">
                <h1 class="side-title"><small>&lt;</small>Creator<small>&gt;</small></h1>
                <p class="side-desc">Game Creator who builds worlds with code.</p>
            </div>
        </div>
    </section>

    <script>
        const avatarPlayer = document.getElementById('avatarPlayer');
        const avatarCreator = document.getElementById('avatarCreator');
        const sideLeft = document.getElementById('sideLeft');
        const sideRight = document.getElementById('sideRight');
        const bgTextLeft = document.getElementById('bgTextLeft');
        const bgTextRight = document.getElementById('bgTextRight');
        
        let currentPercent = 0;
        let targetPercent = 0;
        
        function updateLayout(percent) {
            // percent: -1 (左) 到 1 (右)
            // 左倾(-1): Player 100%, Creator 0%
            // 右倾(+1): Player 0%, Creator 100%
            // 中间(0): 各 50%
            
            const playerClip = 50 - percent * 50;
            const creatorClip = 50 + percent * 50;
            
            // Player 从左边缘显示 playerClip%
            avatarPlayer.style.clipPath = `inset(0 ${100 - playerClip}% 0 0)`;
            
            // Creator 从右边缘显示 creatorClip%
            avatarCreator.style.clipPath = `inset(0 0 0 ${100 - creatorClip}%)`;
            
            // 文字高亮
            if (playerClip > 70) {
                sideLeft.style.opacity = '1';
                sideRight.style.opacity = '0.3';
                bgTextLeft.style.opacity = '0.15';
                bgTextRight.style.opacity = '0.05';
            } else if (creatorClip > 70) {
                sideLeft.style.opacity = '0.3';
                sideRight.style.opacity = '1';
                bgTextLeft.style.opacity = '0.05';
                bgTextRight.style.opacity = '0.15';
            } else {
                sideLeft.style.opacity = '1';
                sideRight.style.opacity = '1';
                bgTextLeft.style.opacity = '0.08';
                bgTextRight.style.opacity = '0.08';
            }
        }
        
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth <= 1024) return;
            const centerX = window.innerWidth / 2;
            const percent = Math.max(-1, Math.min(1, (e.clientX - centerX) / (centerX * 0.5)));
            targetPercent = percent;
        });
        
        function handleOrientation(e) {
            const gamma = e.gamma || 0;
            const percent = Math.max(-1, Math.min(1, gamma / 35));
            targetPercent = percent;
        }
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation);
        }
        
        function animate() {
            currentPercent += (targetPercent - currentPercent) * 0.1;
            updateLayout(currentPercent);
            requestAnimationFrame(animate);
        }
        animate();
        
        function toggleMenu() {
            document.getElementById('mobileNav').classList.toggle('active');
        }
    </script>
</body>
</html>
