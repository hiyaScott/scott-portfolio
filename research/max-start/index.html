<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Qian - Enter The Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        
        /* ===== 启动页面 ===== */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #0d1f1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s, transform 1s;
        }
        
        #start-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }
        
        /* 背景动画网格 */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        /* 浮动粒子 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            opacity: 0.6;
            animation: particleFloat 8s infinite;
            box-shadow: 0 0 10px #00ff88;
        }
        
        @keyframes particleFloat {
            0%, 100% { 
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { 
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        /* 主Logo */
        .start-logo {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-bottom: 60px;
        }
        
        .logo-glitch {
            font-family: 'Press Start 2P', cursive;
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 50%, #ff00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(0, 255, 136, 0.5);
            position: relative;
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { 
                transform: translate(0);
                text-shadow: 0 0 60px rgba(0, 255, 136, 0.5);
            }
            92% { 
                transform: translate(-2px, 2px);
                text-shadow: -2px 2px #ff00ff, 2px -2px #00ff88;
            }
            94% { 
                transform: translate(2px, -2px);
                text-shadow: 2px -2px #ff00ff, -2px 2px #00ff88;
            }
            96% { 
                transform: translate(0);
                text-shadow: 0 0 60px rgba(0, 255, 136, 0.5);
            }
        }
        
        .logo-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        
        /* 角色展示 */
        .characters {
            display: flex;
            gap: 60px;
            margin-bottom: 60px;
            z-index: 10;
        }
        
        .char-box {
            text-align: center;
            opacity: 0.6;
            transition: all 0.4s;
            cursor: pointer;
        }
        
        .char-box:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .char-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 15px;
            border: 2px solid;
            transition: all 0.4s;
        }
        
        .char-player .char-icon {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }
        
        .char-creator .char-icon {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }
        
        .char-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* START 按钮 */
        .start-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            padding: 25px 60px;
            background: transparent;
            border: 3px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            position: relative;
            z-index: 10;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 4px;
            overflow: hidden;
        }
        
        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.4), transparent);
            transition: left 0.5s;
        }
        
        .start-btn:hover::before {
            left: 100%;
        }
        
        .start-btn:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.5), inset 0 0 20px rgba(0, 255, 136, 0.1);
            transform: scale(1.05);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        /* 提示文字 */
        .hint {
            position: absolute;
            bottom: 60px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        /* ===== 3D 世界容器 ===== */
        #world-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s;
            z-index: 100;
        }
        
        #world-container.active {
            opacity: 1;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        
        /* UI 覆盖层 */
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
        
        .ui-element {
            pointer-events: auto;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 300;
        }
        
        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .status-logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .status-info {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Press Start 2P', cursive;
        }
        
        .back-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        
        /* 底部控制提示 */
        .controls-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 300;
        }
        
        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .control-key {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        /* 信息面板 */
        #info-panel {
            position: fixed;
            right: -400px;
            top: 50%;
            transform: translateY(-50%);
            width: 350px;
            background: rgba(10, 10, 15, 0.95);
            border: 2px solid #00ff88;
            padding: 30px;
            transition: right 0.4s ease;
            z-index: 400;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        
        #info-panel.active {
            right: 30px;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        .panel-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #00ff88;
        }
        
        .panel-close {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.6);
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .panel-close:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .panel-content {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            font-size: 14px;
        }
        
        .skill-tag {
            display: inline-block;
            padding: 5px 12px;
            margin: 5px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 4px;
            font-size: 11px;
            color: #00ff88;
        }
        
        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }
        
        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 30px;
        }
        
        .loader-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loader-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            transition: width 0.3s;
            box-shadow: 0 0 10px #00ff88;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .logo-glitch {
                font-size: 42px;
            }
            
            .characters {
                gap: 30px;
            }
            
            .char-icon {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
            
            .start-btn {
                font-size: 14px;
                padding: 20px 40px;
            }
            
            .controls-hint {
                flex-direction: column;
                gap: 10px;
            }
            
            #info-panel {
                width: calc(100% - 40px);
                right: -100%;
            }
            
            #info-panel.active {
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载画面 -->
    <div class="loader" id="loader">
        <div class="loader-text">LOADING WORLD...</div>
        <div class="loader-bar">
            <div class="loader-progress" id="loader-progress"></div>
        </div>
    </div>
    
    <!-- 启动页面 -->
    <div id="start-screen">
        <div class="bg-grid"></div>
        <div class="particles" id="particles"></div>
        
        <div class="start-logo">
            <div class="logo-glitch">MAX</div>
            <div class="logo-subtitle">Qian · Player & Creator</div>
        </div>
        
        <div class="characters">
            <div class="char-box char-player">
                <div class="char-icon">🎮</div>
                <div class="char-label">PLAYER</div>
            </div>
            <div class="char-box char-creator">
                <div class="char-icon">👨‍💻</div>
                <div class="char-label">CREATOR</div>
            </div>
        </div>
        
        <button class="start-btn" onclick="startGame()">PRESS START</button>
        
        <div class="hint">点击开始 · 进入 3D 世界</div>
    </div>
    
    <!-- 3D 世界 -->
    <div id="world-container">
        <div id="canvas-container"></div>
        
        <!-- UI 层 -->
        <div id="ui-overlay">
            <div class="status-bar">
                <div class="status-left">
                    <span class="status-logo">MAX WORLD</span>
                    <span class="status-info">11岁 · 游戏开发者</span>
                </div>
                <button class="back-btn ui-element" onclick="backToStart()">← EXIT</button>
            </div>
            
            <div class="controls-hint">
                <div class="control-item">
                    <span class="control-key">🖱️</span>
                    <span>拖动旋转</span>
                </div>
                <div class="control-item">
                    <span class="control-key">⚡</span>
                    <span>点击探索</span>
                </div>
                <div class="control-item">
                    <span class="control-key">🔍</span>
                    <span>滚轮缩放</span>
                </div>
            </div>
        </div>
        
        <!-- 信息面板 -->
        <div id="info-panel">
            <div class="panel-header">
                <span class="panel-title" id="panel-title">标题</span>
                <button class="panel-close" onclick="closePanel()">✕</button>
            </div>
            <div class="panel-content" id="panel-content">内容</div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (5 + Math.random() * 5) + 's';
            particlesContainer.appendChild(particle);
        }
        
        // 全局变量
        let scene, camera, renderer;
        let raycaster, mouse;
        let interactables = [];
        let animationId;
        
        // 世界数据
        const worldData = {
            player: {
                title: "🎮 PLAYER MODE",
                content: `
                    <p style="margin-bottom: 15px;"><strong>游戏爱好者</strong> · 关卡猎人 · 成就收藏家</p>
                    <div style="margin: 20px 0;">
                        <span class="skill-tag">🎯 FPS</span>
                        <span class="skill-tag">🏗️ 沙盒</span>
                        <span class="skill-tag">🎲 独立游戏</span>
                        <span class="skill-tag">🎮 主机玩家</span>
                    </div>
                    <p style="color: rgba(255,255,255,0.6); font-size: 13px;">
                        从《我的世界》开始，爱上了探索虚拟世界。
                        每一款游戏都是一个新的冒险，
                        每一个关卡都是一次新的挑战。
                    </p>
                `
            },
            creator: {
                title: "👨‍💻 CREATOR MODE",
                content: `
                    <p style="margin-bottom: 15px;"><strong>游戏开发者</strong> · 代码巫师 · 创造者</p>
                    <div style="margin: 20px 0;">
                        <span class="skill-tag">🐍 Python</span>
                        <span class="skill-tag">🎨 Scratch</span>
                        <span class="skill-tag">⚡ Arduino</span>
                        <span class="skill-tag">🎮 GameDev</span>
                    </div>
                    <p style="color: rgba(255,255,255,0.6); font-size: 13px;">
                        不只是玩游戏，更要创造游戏。
                        从 Scratch 到 Python，从想法到现实，
                        用代码把想象变成可玩的作品。
                    </p>
                `
            },
            projects: {
                title: "🚀 PROJECTS",
                content: `
                    <div style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                        <strong style="color: #00ff88;">谁是卧底</strong>
                        <p style="font-size: 12px; margin-top: 8px; color: rgba(255,255,255,0.6);">和AI一起开发的派对游戏，支持多人在线</p>
                    </div>
                    <div style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                        <strong style="color: #00ff88;">像素冒险</strong>
                        <p style="font-size: 12px; margin-top: 8px; color: rgba(255,255,255,0.6);">Scratch平台跳跃游戏，5个关卡</p>
                    </div>
                    <div style="padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                        <strong style="color: #00ff88;">智能小灯</strong>
                        <p style="font-size: 12px; margin-top: 8px; color: rgba(255,255,255,0.6);">Arduino声控LED，支持音乐律动</p>
                    </div>
                `
            },
            books: {
                title: "📚 READING LIST",
                content: `
                    <div style="margin-bottom: 12px;">
                        📖 <strong>哈利·波特系列</strong>
                        <span style="color: rgba(255,255,255,0.5); font-size: 12px;">J.K.罗琳</span>
                    </div>
                    <div style="margin-bottom: 12px;">
                        📖 <strong>神奇校车</strong>
                        <span style="color: rgba(255,255,255,0.5); font-size: 12px;">科学冒险</span>
                    </div>
                    <div style="margin-bottom: 12px;">
                        📖 <strong>编程真好玩</strong>
                        <span style="color: rgba(255,255,255,0.5); font-size: 12px;">从Scratch到Python</span>
                    </div>
                    <div>
                        📖 <strong>数学真好玩</strong>
                        <span style="color: rgba(255,255,255,0.5); font-size: 12px;">趣味数学启蒙</span>
                    </div>
                `
            }
        };
        
        // 开始游戏
        function startGame() {
            const loader = document.getElementById('loader');
            const progress = document.getElementById('loader-progress');
            const startScreen = document.getElementById('start-screen');
            const worldContainer = document.getElementById('world-container');
            
            // 显示加载画面
            loader.classList.remove('hidden');
            
            // 模拟加载进度
            let loadProgress = 0;
            const loadInterval = setInterval(() => {
                loadProgress += Math.random() * 15;
                if (loadProgress >= 100) {
                    loadProgress = 100;
                    clearInterval(loadInterval);
                    
                    setTimeout(() => {
                        loader.classList.add('hidden');
                        startScreen.classList.add('hidden');
                        worldContainer.classList.add('active');
                        
                        // 初始化 3D 世界
                        init3DWorld();
                    }, 500);
                }
                progress.style.width = loadProgress + '%';
            }, 100);
        }
        
        // 返回启动页
        function backToStart() {
            const startScreen = document.getElementById('start-screen');
            const worldContainer = document.getElementById('world-container');
            
            worldContainer.classList.remove('active');
            startScreen.classList.remove('hidden');
            
            // 停止 3D 渲染
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            if (renderer) {
                renderer.dispose();
                document.getElementById('canvas-container').innerHTML = '';
            }
        }
        
        // 初始化 3D 世界
        function init3DWorld() {
            // 检查 WebGL
            if (!window.WebGLRenderingContext) {
                alert('您的浏览器不支持 WebGL，请使用现代浏览器访问');
                return;
            }
            
            try {
                // 场景
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a0f);
                scene.fog = new THREE.Fog(0x0a0a0f, 10, 60);
                
                // 相机
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 12, 30);
                camera.lookAt(0, 0, 0);
                
                // 渲染器
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById('canvas-container').appendChild(renderer.domElement);
                
                // 灯光系统
                setupLights();
                
                // 创建世界
                createWorld();
                
                // 射线检测
                raycaster = new THREE.Raycaster();
                mouse = new THREE.Vector2();
                
                // 事件绑定
                bindEvents();
                
                // 开始动画
                animate();
                
            } catch (e) {
                console.error('3D 初始化失败:', e);
                alert('3D 世界加载失败，请刷新重试');
            }
        }
        
        // 设置灯光
        function setupLights() {
            // 环境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            // 主光源
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(10, 20, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);
            
            // 彩色点光源 - PLAYER 区域 (紫色)
            const playerLight = new THREE.PointLight(0x6366f1, 0.6, 25);
            playerLight.position.set(-15, 8, 0);
            scene.add(playerLight);
            
            // 彩色点光源 - CREATOR 区域 (青色)
            const creatorLight = new THREE.PointLight(0x10b981, 0.6, 25);
            creatorLight.position.set(15, 8, 0);
            scene.add(creatorLight);
            
            // 中央光源 (绿色)
            const centerLight = new THREE.PointLight(0x00ff88, 0.4, 20);
            centerLight.position.set(0, 10, 5);
            scene.add(centerLight);
        }
        
        // 创建世界
        function createWorld() {
            // 地面网格
            const gridHelper = new THREE.GridHelper(80, 40, 0x00ff88, 0x1a1a2e);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            
            // 地面
            const groundGeo = new THREE.PlaneGeometry(80, 60);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x0f0f1a,
                roughness: 0.8,
                metalness: 0.2
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // 创建岛屿
            createIsland(-18, 0, 'player', 0x6366f1, '🎮');
            createIsland(0, -5, 'projects', 0xff6b6b, '🚀');
            createIsland(18, 0, 'creator', 0x10b981, '👨‍💻');
            createIsland(0, 8, 'books', 0xf59e0b, '📚');
            
            // 浮动装饰
            for (let i = 0; i < 40; i++) {
                createFloatingElement();
            }
            
            // 粒子星星
            for (let i = 0; i < 150; i++) {
                createStar();
            }
        }
        
        // 创建岛屿
        function createIsland(x, z, type, color, emoji) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);
            
            // 岛屿底座
            const baseGeo = new THREE.CylinderGeometry(7, 8, 3, 8);
            const baseMat = new THREE.MeshStandardMaterial({ 
                color: color,
                emissive: color,
                emissiveIntensity: 0.2
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 1.5;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);
            
            // 平台
            const platformGeo = new THREE.CylinderGeometry(6, 6, 1, 8);
            const platformMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = 3.5;
            platform.castShadow = true;
            group.add(platform);
            
            // 中心物体
            let centerObj;
            switch(type) {
                case 'player':
                    centerObj = createGameConsole();
                    break;
                case 'creator':
                    centerObj = createComputer();
                    break;
                case 'projects':
                    centerObj = createRocket();
                    break;
                case 'books':
                    centerObj = createBookStack();
                    break;
            }
            centerObj.position.y = 4.5;
            group.add(centerObj);
            
            // 标签文字（用简单的几何体代替）
            const labelGeo = new THREE.BoxGeometry(4, 0.5, 0.2);
            const labelMat = new THREE.MeshBasicMaterial({ 
                color: color,
                transparent: true,
                opacity: 0.8
            });
            const label = new THREE.Mesh(labelGeo, labelMat);
            label.position.y = 8;
            group.add(label);
            
            // 添加交互数据
            const interactablesList = [base, platform, centerObj, label];
            interactablesList.forEach(obj => {
                obj.userData = { type: type, isInteractable: true };
                interactables.push(obj);
            });
            
            // 光环效果
            const ringGeo = new THREE.RingGeometry(8, 8.5, 32);
            const ringMat = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.1;
            
            // 动画数据
            ring.userData = {
                animate: (time) => {
                    ring.scale.setScalar(1 + Math.sin(time * 2) * 0.1);
                    ring.material.opacity = 0.2 + Math.sin(time * 3) * 0.1;
                }
            };
            
            group.add(ring);
            scene.add(group);
        }
        
        // 创建游戏手柄
        function createGameConsole() {
            const group = new THREE.Group();
            
            // 机身
            const bodyGeo = new THREE.BoxGeometry(3, 1.5, 2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4338ca });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            group.add(body);
            
            // 屏幕
            const screenGeo = new THREE.PlaneGeometry(2.5, 1.2);
            const screenMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.position.set(0, 0, 1.01);
            group.add(screen);
            
            // 按钮
            const btnGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16);
            const btnMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
            const btn1 = new THREE.Mesh(btnGeo, btnMat);
            btn1.rotation.x = Math.PI / 2;
            btn1.position.set(0.8, 0.3, 1.1);
            group.add(btn1);
            
            const btn2 = new THREE.Mesh(btnGeo, btnMat);
            btn2.rotation.x = Math.PI / 2;
            btn2.position.set(1.1, 0, 1.1);
            group.add(btn2);
            
            return group;
        }
        
        // 创建电脑
        function createComputer() {
            const group = new THREE.Group();
            
            // 显示器
            const monitorGeo = new THREE.BoxGeometry(2.5, 2, 0.2);
            const monitorMat = new THREE.MeshStandardMaterial({ color: 0x1f2937 });
            const monitor = new THREE.Mesh(monitorGeo, monitorMat);
            monitor.position.y = 1;
            group.add(monitor);
            
            // 屏幕
            const screenGeo = new THREE.PlaneGeometry(2.2, 1.7);
            const screenMat = new THREE.MeshBasicMaterial({ color: 0x10b981 });
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.position.set(0, 1, 0.11);
            group.add(screen);
            
            // 底座
            const standGeo = new THREE.CylinderGeometry(0.3, 0.5, 1, 16);
            const standMat = new THREE.MeshStandardMaterial({ color: 0x374151 });
            const stand = new THREE.Mesh(standGeo, standMat);
            stand.position.y = 0;
            group.add(stand);
            
            // 键盘
            const kbGeo = new THREE.BoxGeometry(2, 0.1, 0.8);
            const kbMat = new THREE.MeshStandardMaterial({ color: 0x374151 });
            const kb = new THREE.Mesh(kbGeo, kbMat);
            kb.position.set(0, 0, 1.5);
            group.add(kb);
            
            return group;
        }
        
        // 创建火箭
        function createRocket() {
            const group = new THREE.Group();
            
            // 主体
            const bodyGeo = new THREE.ConeGeometry(0.8, 2.5, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.25;
            group.add(body);
            
            // 尾翼
            const finGeo = new THREE.BoxGeometry(0.1, 0.8, 0.5);
            const finMat = new THREE.MeshStandardMaterial({ color: 0xef4444 });
            for (let i = 0; i < 4; i++) {
                const fin = new THREE.Mesh(finGeo, finMat);
                fin.position.y = 0.3;
                fin.rotation.y = (i / 4) * Math.PI * 2;
                fin.translateZ(0.6);
                group.add(fin);
            }
            
            // 火焰
            const flameGeo = new THREE.ConeGeometry(0.4, 1, 8);
            const flameMat = new THREE.MeshBasicMaterial({ 
                color: 0xf59e0b,
                transparent: true,
                opacity: 0.8
            });
            const flame = new THREE.Mesh(flameGeo, flameMat);
            flame.position.y = -0.5;
            group.add(flame);
            
            // 动画
            group.userData = {
                animate: (time) => {
                    group.position.y = 4.5 + Math.sin(time * 3) * 0.3;
                    flame.scale.y = 1 + Math.sin(time * 10) * 0.3;
                }
            };
            
            return group;
        }
        
        // 创建书堆
        function createBookStack() {
            const group = new THREE.Group();
            
            const colors = [0xff6b6b, 0x4ecdc4, 0xffe66d, 0x9b59b6, 0x2ecc71];
            for (let i = 0; i < 5; i++) {
                const bookGeo = new THREE.BoxGeometry(1.5, 0.3, 2);
                const bookMat = new THREE.MeshStandardMaterial({ color: colors[i] });
                const book = new THREE.Mesh(bookGeo, bookMat);
                book.position.y = i * 0.35;
                book.rotation.y = (Math.random() - 0.5) * 0.3;
                group.add(book);
            }
            
            return group;
        }
        
        // 创建浮动元素
        function createFloatingElement() {
            const size = Math.random() * 0.4 + 0.1;
            const geometry = new THREE.BoxGeometry(size, size, size);
            const colors = [0x6366f1, 0x10b981, 0x00ff88, 0xff6b6b, 0xf59e0b];
            const material = new THREE.MeshBasicMaterial({ 
                color: colors[Math.floor(Math.random() * colors.length)],
                transparent: true,
                opacity: 0.4
            });
            const element = new THREE.Mesh(geometry, material);
            
            element.position.set(
                (Math.random() - 0.5) * 60,
                Math.random() * 20 + 5,
                (Math.random() - 0.5) * 40
            );
            
            element.userData = {
                speed: Math.random() * 0.02 + 0.01,
                offset: Math.random() * Math.PI * 2,
                animate: (time) => {
                    element.position.y += Math.sin(time + element.userData.offset) * 0.015;
                    element.rotation.x += element.userData.speed;
                    element.rotation.y += element.userData.speed;
                }
            };
            
            scene.add(element);
        }
        
        // 创建星星
        function createStar() {
            const geometry = new THREE.BoxGeometry(0.08, 0.08, 0.08);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xffffff,
                transparent: true,
                opacity: Math.random() * 0.6 + 0.2
            });
            const star = new THREE.Mesh(geometry, material);
            
            star.position.set(
                (Math.random() - 0.5) * 100,
                Math.random() * 40 + 10,
                (Math.random() - 0.5) * 50 - 10
            );
            
            star.userData = {
                animate: (time) => {
                    star.material.opacity = 0.2 + Math.sin(time * 2 + star.position.x) * 0.3;
                    star.rotation.x = time * 0.5;
                    star.rotation.y = time * 0.3;
                }
            };
            
            scene.add(star);
        }
        
        // 绑定事件
        function bindEvents() {
            // 窗口大小调整
            window.addEventListener('resize', onWindowResize, false);
            
            // 鼠标控制
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            let cameraAngle = 0;
            let cameraHeight = 12;
            let cameraRadius = 30;
            
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            
            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            renderer.domElement.addEventListener('mousemove', (e) => {
                // 更新鼠标位置用于射线检测
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                // 拖动旋转
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    cameraAngle -= deltaX * 0.008;
                    cameraHeight = Math.max(5, Math.min(25, cameraHeight - deltaY * 0.05));
                    
                    updateCamera();
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
                
                // 检测悬停
                checkHover();
            });
            
            // 滚轮缩放
            renderer.domElement.addEventListener('wheel', (e) => {
                cameraRadius = Math.max(15, Math.min(50, cameraRadius + e.deltaY * 0.02));
                updateCamera();
            });
            
            // 点击交互
            renderer.domElement.addEventListener('click', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(interactables);
                
                if (intersects.length > 0) {
                    const type = intersects[0].object.userData.type;
                    showPanel(type);
                }
            });
            
            // 触摸支持
            let touchStartX = 0, touchStartY = 0;
            
            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            }, { passive: true });
            
            renderer.domElement.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    const deltaX = e.touches[0].clientX - touchStartX;
                    const deltaY = e.touches[0].clientY - touchStartY;
                    
                    cameraAngle -= deltaX * 0.01;
                    cameraHeight = Math.max(5, Math.min(25, cameraHeight - deltaY * 0.03));
                    
                    updateCamera();
                    
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }
            }, { passive: true });
            
            function updateCamera() {
                camera.position.x = Math.sin(cameraAngle) * cameraRadius;
                camera.position.z = Math.cos(cameraAngle) * cameraRadius;
                camera.position.y = cameraHeight;
                camera.lookAt(0, 0, 0);
            }
        }
        
        // 检测悬停
        function checkHover() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables);
            
            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
        }
        
        // 显示面板
        function showPanel(type) {
            const data = worldData[type];
            if (data) {
                document.getElementById('panel-title').textContent = data.title;
                document.getElementById('panel-content').innerHTML = data.content;
                document.getElementById('info-panel').classList.add('active');
            }
        }
        
        // 关闭面板
        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }
        
        // 窗口大小调整
        function onWindowResize() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        // 动画循环
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // 执行所有动画
            scene.traverse((object) => {
                if (object.userData && object.userData.animate) {
                    object.userData.animate(time);
                }
            });
            
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
    </script>
