name: Build Jetton Monitor Windows

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        
      - name: Download source from release package
        run: |
          # 下载已打包的源码
          curl -L -o jetton-monitor-release.tar.gz "https://github.com/hiyaScott/scott-portfolio/raw/main/research/srpg-analysis/jetton-monitor-v0.1.0-release.tar.gz"
          tar -xzf jetton-monitor-release.tar.gz
          mv jetton-monitor-build jetton-monitor 2>/nul || true
          ls -la
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        
      - name: Install frontend dependencies
        working-directory: ./jetton-monitor
        run: npm install
        
      - name: Build Tauri app
        working-directory: ./jetton-monitor
        run: npm run tauri build
        
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetton-monitor-windows-msi
          path: jetton-monitor/src-tauri/target/release/bundle/msi/*.msi
          
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetton-monitor-windows-exe
          path: jetton-monitor/src-tauri/target/release/bundle/nsis/*.exe
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: jetton-monitor-v0.1.0
          name: "Jetton Monitor v0.1.0 - Windows"
          body: |
            Jetton Monitor Windows 版本
            
            包含:
            - MSI 安装包 (推荐)
            - EXE 单文件版 (免安装)
            
            使用方法:
            1. 下载 MSI 版本，双击安装
            2. 首次启动填写"数据 URL"
            3. 其他全部自动配置
          files: |
            jetton-monitor/src-tauri/target/release/bundle/msi/*.msi
            jetton-monitor/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
