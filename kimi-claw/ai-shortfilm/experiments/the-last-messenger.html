<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最后的信使 (The Last Messenger) - ASCII Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        #screen {
            background: #050505;
            border: 2px solid #333;
            padding: 20px;
            width: 90ch;
            height: 50ch;
            position: relative;
            white-space: pre;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(100, 100, 100, 0.1);
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #canvas > div {
            position: absolute;
            white-space: pre;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        button {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #888;
            padding: 10px 25px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #2a2a2a;
            color: #fff;
            border-color: #666;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .audio-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 12px;
        }
        
        .audio-toggle input[type="checkbox"] {
            accent-color: var(--neon-purple, #9d00ff);
        }
        
        .title {
            position: absolute;
            top: -40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        
        .progress {
            position: absolute;
            bottom: -25px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #1a1a1a;
        }
        
        .progress-bar {
            height: 100%;
            background: #666;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .status {
            position: absolute;
            bottom: -45px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #444;
            font-size: 11px;
        }
        
        /* ASCII Art Styles */
        .robot { color: #a0a0a0; }
        .robot-eye { color: #ff4444; animation: blink 2s infinite; }
        .signal { color: #44ff44; }
        .star { color: #ffffff; }
        .ruins { color: #555; }
        .snow { color: #888; }
        .text { color: #c0c0c0; }
        
        /* Title Card Styles */
        .title-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            animation: titlePulse 3s ease-in-out infinite;
        }
        
        .title-card .main-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(157, 0, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }
        
        .title-card .sub-title {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 4px;
        }
        
        .title-card .episode {
            font-size: 0.9rem;
            color: #666;
            margin-top: 20px;
            letter-spacing: 2px;
        }
        
        .title-decoration {
            color: #9d00ff;
            opacity: 0.5;
            margin: 15px 0;
        }
        
        @keyframes titlePulse {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.02); }
        }
        
        @keyframes blink {
            0%, 90% { opacity: 1; }
            95% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .blink { animation: blink 1s infinite; }
        .pulse { animation: pulse 2s infinite; }
        
        /* Scene transitions */
        .fade-in { animation: fadeIn 1s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-out { animation: fadeOut 1s ease-out forwards; }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
</head>
<body>
    <div id="screen">
        <div class="title">THE LAST MESSENGER | 最后的信使 | ASCII ANIMATION</div>
        <div id="canvas"></div>
        <div class="progress"><div class="progress-bar" id="progress"></div></div>
        <div class="status" id="status">Press START to begin</div>
    </div>
    
    <div class="controls">
        <button id="startBtn">START</button>
        <button id="pauseBtn" disabled>PAUSE</button>
        <button id="resetBtn">RESET</button>
        <label class="audio-toggle">
            <input type="checkbox" id="audioToggle" checked>
            <span>🔊 音效</span>
        </label>
    </div>

    <script>
        // ASCII Art Assets
        const ASSETS = {
            robot: [
                "    ╭────╮     ",
                "   ╱ ◠  ◠ ╲    ",
                "  │  ▓▓▓  │    ",
                "  │ ╭──╮  │    ",
                " ═╧═╯  ╰═╧═    ",
                "   │ ││ │      ",
                "   ┴─┴┴─┴      "
            ],
            robotWalk1: [
                "    ╭────╮     ",
                "   ╱ ◠  ◠ ╲    ",
                "  │  ▓▓▓  │    ",
                "  │ ╭──╮  │    ",
                " ═╧═╯  ╰═╧═    ",
                "   │ │  ╱      ",
                "   ┴─┴─╯       "
            ],
            robotWalk2: [
                "    ╭────╮     ",
                "   ╱ ◠  ◠ ╲    ",
                "  │  ▓▓▓  │    ",
                "  │ ╭──╮  │    ",
                " ═╧═╯  ╰═╧═    ",
                "   ╲  │ │      ",
                "    ╰─┴┴─      "
            ],
            city: [
                "    /\\        /\\        /\\     ",
                "   /  \\  /\\   /  \\  /\\  /  \\    ",
                "  /____\\/  \\_/____\\/  \\/____\\   ",
                "  │    │    │    │    │    │    ",
                "  │    │    │    │    │    │    ",
                "  ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓"
            ],
            tower: [
                "          ▲                   ",
                "         ╱ ╲                  ",
                "        ╱   ╲                 ",
                "       ╱ ▓▓▓ ╲                ",
                "      ╱_______╲               ",
                "          │                   ",
                "          │                   ",
                "          │                   ",
                "         ╱│╲                  ",
                "        ╱ │ ╲                 ",
                "       ══╧═╧══                "
            ],
            stars: [
                "  ·  .      ·    ✦      .   ·  ",
                "     ✦   .     ·     ✦      .  ",
                "  .      ✦    ·      .    ✦    ",
                "     ·     .     ✦      ·      ",
                "  ✦    ·      .     ·     ✦    "
            ],
            message: [
                "╔══════════════════════════════════════╗",
                "║  致未来                              ║",
                "║                                      ║",
                "║  我们曾经存在。                      ║",
                "║  我们曾爱过。                        ║",
                "║  请记得我们。                        ║",
                "║                                      ║",
                "║  [数据传输完成]                       ║",
                "╚══════════════════════════════════════╝"
            ],
            ending: [
                "",
                "         信息已送达                  ",
                "                                    ",
                "         距离: 4.2光年               ",
                "         预计到达: 4年后              ",
                "                                    ",
                "         使命完成                    ",
                ""
            ],
            titleLogo: [
                "    ╭────────────────────────────────╮    ",
                "    │                                │    ",
                "    │     📡  最 後 の 信 使  📡     │    ",
                "    │                                │    ",
                "    │     THE LAST MESSENGER         │    ",
                "    │                                │    ",
                "    ╰────────────────────────────────╯    "
            ]
        };

        // Audio System - Web Audio API
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.isEnabled = true;
                this.oscillators = [];
                this.noiseNodes = [];
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.3;
                    this.masterGain.connect(this.ctx.destination);
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            setEnabled(enabled) {
                this.isEnabled = enabled;
                if (this.masterGain) {
                    this.masterGain.gain.setTargetAtTime(enabled ? 0.3 : 0, this.ctx.currentTime, 0.1);
                }
            }

            // Drone - continuous low frequency for atmosphere
            startDrone(frequency = 60, volume = 0.1) {
                if (!this.isEnabled || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();
                
                osc.type = 'sine';
                osc.frequency.value = frequency;
                
                filter.type = 'lowpass';
                filter.frequency.value = 200;
                
                gain.gain.value = volume;
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                this.oscillators.push({ osc, gain });
                
                return { osc, gain };
            }

            // Footstep sound
            playFootstep() {
                if (!this.isEnabled || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(80, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            }

            // Mechanical startup sound
            playStartup() {
                if (!this.isEnabled || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.5);
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            }

            // Robot eye blink sound
            playBlink() {
                if (!this.isEnabled || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            }

            // Wind/Storm noise
            startWind() {
                if (!this.isEnabled || !this.ctx) return;
                
                const bufferSize = 2 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                
                const gain = this.ctx.createGain();
                gain.gain.value = 0.05;
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                
                noise.start();
                this.noiseNodes.push({ noise, gain });
                
                return { noise, gain };
            }

            // Signal transmission - rising tone
            playSignal() {
                if (!this.isEnabled || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 3);
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 3);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 3);
            }

            // Completion chime
            playChime() {
                if (!this.isEnabled || !this.ctx) return;
                
                const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C major chord
                
                frequencies.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0, this.ctx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 2);
                        
                        osc.connect(gain);
                        gain.connect(this.masterGain);
                        
                        osc.start();
                        osc.stop(this.ctx.currentTime + 2);
                    }, i * 100);
                });
            }

            // Stop all sounds
            stopAll() {
                this.oscillators.forEach(({ osc, gain }) => {
                    try {
                        osc.stop();
                        gain.disconnect();
                    } catch(e) {}
                });
                this.oscillators = [];
                
                this.noiseNodes.forEach(({ noise, gain }) => {
                    try {
                        noise.stop();
                        gain.disconnect();
                    } catch(e) {}
                });
                this.noiseNodes = [];
            }
        }

        // Animation System
        class ASCIIAnimator {
            constructor(audioEngine) {
                this.canvas = document.getElementById('canvas');
                this.progressBar = document.getElementById('progress');
                this.status = document.getElementById('status');
                this.audio = audioEngine;
                this.isPlaying = false;
                this.currentFrame = 0;
                this.frameRate = 12;
                this.totalDuration = 70; // seconds (60s content + 10s title)
                this.totalFrames = this.totalDuration * this.frameRate;
                this.animationId = null;
                this.stars = this.generateStars();
                this.snow = this.generateSnow();
                this.walkCycle = 0;
                this.droneActive = false;
                this.windActive = false;
            }

            generateStars() {
                const stars = [];
                for (let i = 0; i < 50; i++) {
                    stars.push({
                        x: Math.floor(Math.random() * 80),
                        y: Math.floor(Math.random() * 20),
                        char: ['·', '.', '✦', '*'][Math.floor(Math.random() * 4)],
                        blink: Math.random() > 0.7
                    });
                }
                return stars;
            }

            generateSnow() {
                const snow = [];
                for (let i = 0; i < 30; i++) {
                    snow.push({
                        x: Math.floor(Math.random() * 80),
                        y: Math.floor(Math.random() * 40),
                        char: ['·', '°', '∘', '.'][Math.floor(Math.random() * 4)]
                    });
                }
                return snow;
            }

            clear() {
                this.canvas.innerHTML = '';
            }

            drawText(lines, offsetX = 0, offsetY = 0, className = '') {
                lines.forEach((line, i) => {
                    const div = document.createElement('div');
                    div.style.position = 'absolute';
                    div.style.left = offsetX + 'ch';
                    div.style.top = offsetY + i + 'em';
                    div.textContent = line;
                    if (className) div.className = className;
                    this.canvas.appendChild(div);
                });
            }

            drawStars(offsetY = 0) {
                const starLines = Array(20).fill('').map(() => ' '.repeat(80));
                this.stars.forEach(star => {
                    if (star.y < 20) {
                        const line = starLines[star.y];
                        starLines[star.y] = line.substring(0, star.x) + star.char + line.substring(star.x + 1);
                    }
                });
                this.drawText(starLines, 0, offsetY, 'star');
            }

            drawSnow() {
                this.snow.forEach(flake => {
                    flake.y = (flake.y + 0.3) % 40;
                    const div = document.createElement('div');
                    div.style.position = 'absolute';
                    div.style.left = flake.x + 'ch';
                    div.style.top = flake.y + 'em';
                    div.textContent = flake.char;
                    div.className = 'snow';
                    this.canvas.appendChild(div);
                });
            }

            // Title Card Scene (0-10s)
            sceneTitle(frame) {
                this.clear();
                
                // Background stars
                this.drawStars(0);
                
                // Title card
                const titleDiv = document.createElement('div');
                titleDiv.className = 'title-card';
                titleDiv.innerHTML = `
                    <div class="main-title">最后的信使</div>
                    <div class="sub-title">THE LAST MESSENGER</div>
                    <div class="title-decoration">═══════════════════════</div>
                    <div class="episode">实验短片 #001</div>
                `;
                this.canvas.appendChild(titleDiv);
                
                this.status.textContent = frame < 84 ? '影片即将开始...' : 'Press START or wait...';
                
                // Audio: Start drone at 2 seconds
                if (frame === 24 && !this.droneActive) {
                    this.audio.startDrone(55, 0.08);
                    this.droneActive = true;
                }
            }

            // Scene 1: Robot wakes up in ruins (10-20s)
            scene1(frame) {
                this.clear();
                
                // Draw ruins
                this.drawText(ASSETS.city, 20, 15, 'ruins');
                
                // Robot eye blinks after 3 seconds into scene
                if (frame > 36) {
                    const robot = frame % 24 < 12 ? ASSETS.robot : ASSETS.robotWalk1;
                    this.drawText(robot, 33, 28, 'robot');
                    
                    // Glowing eye
                    const eyeDiv = document.createElement('div');
                    eyeDiv.style.position = 'absolute';
                    eyeDiv.style.left = '37ch';
                    eyeDiv.style.top = '29em';
                    eyeDiv.textContent = '◠';
                    eyeDiv.className = 'robot-eye';
                    this.canvas.appendChild(eyeDiv);
                    
                    // Blink sound every 2 seconds
                    if (frame % 24 === 0) {
                        this.audio.playBlink();
                    }
                }
                
                // Startup sound at scene start
                if (frame === 0) {
                    this.audio.playStartup();
                }
                
                this.status.textContent = frame < 36 ? '系统启动中...' : '任务: 送达 | 距离: 未知';
            }

            // Scene 2: Journey through wasteland (20-35s)
            scene2(frame) {
                this.clear();
                const progress = (frame % 72) / 72;
                const robotX = Math.floor(10 + progress * 50);
                
                // Draw horizon
                this.drawText(['_'.repeat(80)], 0, 25, 'ruins');
                
                // Draw walking robot
                const walkCycle = Math.floor(frame / 6) % 2;
                const robot = walkCycle === 0 ? ASSETS.robotWalk1 : ASSETS.robotWalk2;
                this.drawText(robot, robotX, 20, 'robot');
                
                // Footstep sounds
                if (frame % 12 === 0) {
                    this.audio.playFootstep();
                }
                
                // Background elements passing by
                const elementPos = Math.floor((1 - progress) * 70);
                if (elementPos > 10) {
                    this.drawText(['┴─┴'], elementPos, 24, 'ruins');
                }
                
                this.status.textContent = '行进中...';
            }

            // Scene 3: Mountain and tower (35-45s)
            scene3(frame) {
                this.clear();
                this.drawStars(2);
                
                // Tower
                this.drawText(ASSETS.tower, 25, 10, 'ruins');
                
                // Robot looking up
                const robot = ASSETS.robot;
                this.drawText(robot, 30, 32, 'robot');
                
                // Thought bubble
                if (frame > 24) {
                    this.drawText(['╭────────╮'], 45, 20, 'text');
                    this.drawText(['│ 那里 │'], 45, 21, 'text');
                    this.drawText(['╰────────╯'], 45, 22, 'text');
                }
                
                this.status.textContent = '目标锁定: 信号塔';
            }

            // Scene 4: Snow storm (45-55s)
            scene4(frame) {
                this.clear();
                this.drawSnow();
                
                // Tower in background
                this.drawText(ASSETS.tower, 55, 5, 'ruins');
                
                // Robot struggling uphill
                const struggle = frame % 12 < 6;
                const robotY = struggle ? 30 : 31;
                this.drawText(ASSETS.robot, 20, robotY, 'robot');
                
                // Signal dimming
                if (frame > 36) {
                    this.drawText(['[电量: 12%]'], 20, 40, 'robot-eye');
                }
                
                // Start wind at scene start
                if (frame === 0 && !this.windActive) {
                    this.audio.startWind();
                    this.windActive = true;
                }
                
                this.status.textContent = '暴风雪 | 电量不足';
            }

            // Scene 5: Signal transmission (55-65s)
            scene5(frame) {
                this.clear();
                this.drawStars(0);
                
                // Tower top
                this.drawText(['          ▲                   '], 25, 10, 'signal');
                this.drawText(['         ╱ ╲                  '], 25, 11, 'signal');
                this.drawText(['        ╱ ▓▓▓ ╲               '], 25, 12, 'signal');
                
                // Robot at tower
                this.drawText(ASSETS.robot, 32, 30, 'robot');
                
                // Signal beam
                if (frame > 12) {
                    const beamHeight = Math.min((frame - 12) * 2, 20);
                    for (let i = 0; i < beamHeight; i++) {
                        this.drawText(['    │    '], 39, 10 - i, 'signal');
                    }
                }
                
                // Message display
                if (frame > 36) {
                    this.drawText(ASSETS.message, 15, 18, 'text');
                }
                
                // Signal sound at beam start
                if (frame === 12) {
                    this.audio.playSignal();
                }
                
                this.status.textContent = frame > 36 ? '数据传输完成' : '信号发射中...';
            }

            // Scene 6: Ending (65-70s)
            scene6(frame) {
                this.clear();
                this.drawStars(0);
                
                // Tower with fading signal
                this.drawText(['          ▲                   '], 25, 10, 'ruins');
                
                // Robot sitting (dimmed)
                if (frame < 24) {
                    this.drawText(ASSETS.robot, 32, 30, 'ruins');
                }
                
                // Ending text
                if (frame > 24) {
                    this.drawText(ASSETS.ending, 15, 15, 'text');
                }
                
                // Chime at ending start
                if (frame === 0) {
                    this.audio.playChime();
                }
                
                this.status.textContent = frame > 48 ? 'THE END' : '使命完成';
            }

            render() {
                const seconds = this.currentFrame / this.frameRate;
                
                // Scene timeline
                if (seconds < 10) {
                    this.sceneTitle(this.currentFrame);
                } else if (seconds < 20) {
                    this.scene1(this.currentFrame - 120);
                } else if (seconds < 35) {
                    this.scene2(this.currentFrame - 240);
                } else if (seconds < 45) {
                    this.scene3(this.currentFrame - 420);
                } else if (seconds < 55) {
                    this.scene4(this.currentFrame - 540);
                } else if (seconds < 65) {
                    // Stop wind when leaving snow scene
                    if (this.windActive && seconds >= 55) {
                        this.audio.stopAll();
                        this.windActive = false;
                        this.droneActive = false;
                        this.audio.startDrone(50, 0.05);
                        this.droneActive = true;
                    }
                    this.scene5(this.currentFrame - 660);
                } else {
                    this.scene6(this.currentFrame - 780);
                }
                
                // Update progress
                const progress = (this.currentFrame / this.totalFrames) * 100;
                this.progressBar.style.width = progress + '%';
            }

            start() {
                if (this.isPlaying) return;
                this.audio.init();
                this.isPlaying = true;
                this.lastTime = performance.now();
                this.animate();
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
            }

            pause() {
                this.isPlaying = false;
                cancelAnimationFrame(this.animationId);
                this.audio.stopAll();
                this.droneActive = false;
                this.windActive = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('startBtn').textContent = 'RESUME';
            }

            reset() {
                this.isPlaying = false;
                cancelAnimationFrame(this.animationId);
                this.currentFrame = 0;
                this.clear();
                this.progressBar.style.width = '0%';
                this.status.textContent = 'Press START to begin';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('startBtn').textContent = 'START';
                this.audio.stopAll();
                this.droneActive = false;
                this.windActive = false;
                this.sceneTitle(0);
            }

            animate() {
                if (!this.isPlaying) return;
                
                const now = performance.now();
                const delta = now - this.lastTime;
                const frameInterval = 1000 / this.frameRate;
                
                if (delta >= frameInterval) {
                    this.render();
                    this.currentFrame++;
                    this.lastTime = now - (delta % frameInterval);
                    
                    if (this.currentFrame >= this.totalFrames) {
                        this.pause();
                        document.getElementById('startBtn').textContent = 'REPLAY';
                        return;
                    }
                }
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize
        const audioEngine = new AudioEngine();
        const animator = new ASCIIAnimator(audioEngine);
        
        document.getElementById('startBtn').addEventListener('click', () => animator.start());
        document.getElementById('pauseBtn').addEventListener('click', () => animator.pause());
        document.getElementById('resetBtn').addEventListener('click', () => animator.reset());
        document.getElementById('audioToggle').addEventListener('change', (e) => {
            audioEngine.setEnabled(e.target.checked);
        });

        // Initial render - show title card
        animator.sceneTitle(0);
    </script>
</body>
</html>
