<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩追踪管理后台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --bg-hover: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-orange: #f97316;
            --accent-purple: #a855f7;
            --border-color: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* 导航标签 */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .nav-tab {
            padding: 10px 20px;
            background: var(--bg-card);
            border: none;
            border-radius: 8px 8px 0 0;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-tab:hover { background: var(--bg-hover); }
        .nav-tab.active {
            background: var(--accent-blue);
            color: white;
        }

        /* 面板 */
        .panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            display: none;
        }
        .panel.active { display: block; }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 学生管理 */
        .student-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .student-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
        }

        .student-card:hover { border-color: var(--accent-blue); }
        .student-card.active { border-color: var(--accent-green); }

        .student-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .student-card .id-tag {
            display: inline-block;
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .student-card .record-count {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .student-card .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-small:hover { opacity: 0.8; }
        .btn-primary-small { background: var(--accent-blue); color: white; }
        .btn-danger-small { background: var(--accent-red); color: white; }
        .btn-success-small { background: var(--accent-green); color: white; }

        /* 添加学生表单 */
        .add-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: end;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .form-group input {
            padding: 10px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            min-width: 150px;
        }

        .btn-add {
            padding: 10px 25px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 数据录入 */
        .upload-mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-tab {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .mode-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .upload-area .hint {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        /* OCR预览 */
        .ocr-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .preview-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
        }

        .preview-box h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .preview-box img {
            max-width: 100%;
            border-radius: 6px;
        }

        .preview-box textarea {
            width: 100%;
            height: 200px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 10px;
            font-family: monospace;
            font-size: 13px;
            resize: vertical;
        }

        /* 历史记录 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: var(--bg-hover);
        }

        .history-item .info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .history-item .date {
            font-weight: 600;
            min-width: 100px;
        }

        .history-item .scores {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        .history-item .score {
            padding: 4px 10px;
            background: var(--bg-primary);
            border-radius: 15px;
        }

        .history-item .ranks {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .history-item .actions {
            display: flex;
            gap: 8px;
        }

        /* 预览面板 */
        .preview-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
        }

        .result-link {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-link .url {
            font-family: monospace;
            color: var(--accent-blue);
            font-size: 14px;
        }

        .btn-copy {
            padding: 8px 16px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Toast通知 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }

        /* 选中状态 */
        .selected-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .ocr-preview { grid-template-columns: 1fr; }
            .history-item { flex-direction: column; gap: 15px; align-items: flex-start; }
            .history-item .info { flex-direction: column; gap: 10px; }
            .add-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 成绩追踪管理后台</h1>
        <p class="subtitle">管理学生、录入成绩、查看分析</p>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('students')">👥 学生管理</button>
            <button class="nav-tab" onclick="switchTab('input')">📝 数据录入</button>
            <button class="nav-tab" onclick="switchTab('history')">📚 历史记录</button>
            <button class="nav-tab" onclick="switchTab('preview')">👁️ 结果预览</button>
        </div>

        <!-- 学生管理面板 -->
        <div class="panel active" id="panel-students">
            <h2>👥 学生列表</h2>
            <div class="student-list" id="studentList">
                <div class="empty-state">
                    <div class="icon">👤</div>
                    <p>暂无学生，请添加第一个学生</p>
                </div>
            </div>

            <h2 style="margin-top: 30px;">➕ 添加学生</h2>
            <div class="add-form">
                <div class="form-group">
                    <label>学生姓名</label>
                    <input type="text" id="newStudentName" placeholder="如：Max">
                </div>
                <div class="form-group">
                    <label>考试编号</label>
                    <input type="text" id="newStudentId" placeholder="如：B078">
                </div>
                <button class="btn-add" onclick="addStudent()">添加学生</button>
            </div>
        </div>

        <!-- 数据录入面板 -->
        <div class="panel" id="panel-input">
            <h2>📝 录入成绩</h2>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label>选择学生</label>
                <select id="inputStudentSelect" style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-size: 14px;">
                    <option value="">请选择学生...</option>
                </select>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>考试日期</label>
                <input type="date" id="inputDate" style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
            </div>

            <div class="upload-mode-tabs">
                <button class="mode-tab active" onclick="switchUploadMode('excel')">📊 Excel文件</button>
                <button class="mode-tab" onclick="switchUploadMode('image')">📷 图片识别</button>
            </div>

            <!-- Excel上传 -->
            <div id="excelUpload">
                <div class="upload-area" onclick="document.getElementById('mathExcel').click()">
                    <div class="icon">🧮</div>
                    <p>点击上传数学成绩表</p>
                    <p class="hint">支持 .xlsx, .xls 格式</p>
                    <input type="file" id="mathExcel" accept=".xlsx,.xls" onchange="handleExcelUpload(this, 'math')">
                </div>
                <div id="mathExcelStatus"></div>

                <div class="upload-area" onclick="document.getElementById('engExcel').click()">
                    <div class="icon">📝</div>
                    <p>点击上传英语成绩表</p>
                    <p class="hint">支持 .xlsx, .xls 格式</p>
                    <input type="file" id="engExcel" accept=".xlsx,.xls" onchange="handleExcelUpload(this, 'english')">
                </div>
                <div id="engExcelStatus"></div>
            </div>

            <!-- 图片上传 -->
            <div id="imageUpload" style="display: none;">
                <div class="upload-area" onclick="document.getElementById('mathImage').click()">
                    <div class="icon">🧮</div>
                    <p>点击上传数学成绩截图</p>
                    <p class="hint">支持 JPG, PNG 格式，会自动识别文字</p>
                    <input type="file" id="mathImage" accept="image/*" onchange="handleImageUpload(this, 'math')">
                </div>
                <div id="mathImagePreview"></div>

                <div class="upload-area" onclick="document.getElementById('engImage').click()">
                    <div class="icon">📝</div>
                    <p>点击上传英语成绩截图</p>
                    <p class="hint">支持 JPG, PNG 格式，会自动识别文字</p>
                    <input type="file" id="engImage" accept="image/*" onchange="handleImageUpload(this, 'english')">
                </div>
                <div id="engImagePreview"></div>
            </div>

            <button class="btn-add" onclick="submitGrade()" style="width: 100%; margin-top: 20px;">✅ 提交成绩</button>
        </div>

        <!-- 历史记录面板 -->
        <div class="panel" id="panel-history">
            <h2>📚 历史记录</h2>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label>筛选学生</label>
                <select id="historyStudentFilter" onchange="renderHistory()" style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
                    <option value="">全部学生</option>
                </select>
            </div>

            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无历史记录</p>
                </div>
            </div>
        </div>

        <!-- 结果预览面板 -->
        <div class="panel" id="panel-preview">
            <h2>👁️ 结果页面链接</h2>
            
            <div class="student-list" id="previewList">
                <div class="empty-state">
                    <div class="icon">🔗</div>
                    <p>请先添加学生</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 数据存储
        let students = JSON.parse(localStorage.getItem('gradeStudents') || '[]');
        let records = JSON.parse(localStorage.getItem('gradeRecords') || '[]');
        let tempData = { math: null, english: null };
        let ocrResults = { math: '', english: '' };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            renderStudents();
            renderHistory();
            renderPreviews();
            updateSelects();
        });

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
        }

        // 切换上传模式
        function switchUploadMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('excelUpload').style.display = mode === 'excel' ? 'block' : 'none';
            document.getElementById('imageUpload').style.display = mode === 'image' ? 'block' : 'none';
        }

        // 显示Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 添加学生
        function addStudent() {
            const name = document.getElementById('newStudentName').value.trim();
            const id = document.getElementById('newStudentId').value.trim().toUpperCase();

            if (!name || !id) {
                alert('请输入姓名和考试编号');
                return;
            }

            if (students.find(s => s.id === id)) {
                alert('该考试编号已存在');
                return;
            }

            const student = {
                key: name.toLowerCase().replace(/\s+/g, '-'),
                name: name,
                id: id,
                createdAt: Date.now()
            };

            students.push(student);
            localStorage.setItem('gradeStudents', JSON.stringify(students));

            document.getElementById('newStudentName').value = '';
            document.getElementById('newStudentId').value = '';

            renderStudents();
            updateSelects();
            showToast('✅ 添加成功');
        }

        // 删除学生
        function deleteStudent(key) {
            if (!confirm('确定删除该学生？相关历史记录也会被删除。')) return;

            students = students.filter(s => s.key !== key);
            records = records.filter(r => r.studentKey !== key);

            localStorage.setItem('gradeStudents', JSON.stringify(students));
            localStorage.setItem('gradeRecords', JSON.stringify(records));

            renderStudents();
            renderHistory();
            renderPreviews();
            updateSelects();
            showToast('✅ 已删除');
        }

        // 渲染学生列表
        function renderStudents() {
            const container = document.getElementById('studentList');
            
            if (students.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👤</div>
                        <p>暂无学生，请添加第一个学生</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = students.map(s => {
                const recordCount = records.filter(r => r.studentKey === s.key).length;
                return `
                    <div class="student-card" data-key="${s.key}">
                        <h3>${s.name}</h3>
                        <span class="id-tag">编号: ${s.id}</span>
                        <div class="record-count">📊 ${recordCount} 条记录</div>
                        <div class="actions">
                            <button class="btn-small btn-success-small" onclick="viewResult('${s.key}')">查看结果</button>
                            <button class="btn-small btn-danger-small" onclick="deleteStudent('${s.key}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新下拉选择框
        function updateSelects() {
            const options = students.map(s => `<option value="${s.key}">${s.name} (${s.id})</option>`).join('');
            
            document.getElementById('inputStudentSelect').innerHTML = '<option value="">请选择学生...</option>' + options;
            document.getElementById('historyStudentFilter').innerHTML = '<option value="">全部学生</option>' + options;
        }

        // 处理Excel上传
        function handleExcelUpload(input, subject) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    tempData[subject] = jsonData;
                    
                    const statusId = subject + 'ExcelStatus';
                    document.getElementById(statusId).innerHTML = `
                        <div style="background: rgba(34,197,94,0.2); color: #86efac; padding: 10px; border-radius: 6px; margin-top: 10px;">
                            ✅ 已加载: ${file.name} (${jsonData.length} 行)
                        </div>
                    `;
                } catch (err) {
                    alert('解析失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 处理图片上传
        async function handleImageUpload(input, subject) {
            const file = input.files[0];
            if (!file) return;

            const previewId = subject + 'ImagePreview';
            const previewBox = document.getElementById(previewId);

            // 显示预览
            const reader = new FileReader();
            reader.onload = function(e) {
                previewBox.innerHTML = `
                    <div class="ocr-preview">
                        <div class="preview-box">
                            <h4>📷 原图预览</h4>
                            <img src="${e.target.result}" id="${subject}Img">
                        </div>
                        <div class="preview-box">
                            <h4>📝 识别结果（可编辑）</h4>
                            <div id="${subject}OcrLoading">识别中...⏳</div>
                            <textarea id="${subject}OcrText" placeholder="识别结果将显示在这里..."></textarea>
                        </div>
                    </div>
                `;

                // OCR识别
                recognizeText(e.target.result, subject);
            };
            reader.readAsDataURL(file);
        }

        // OCR识别
        async function recognizeText(imageData, subject) {
            try {
                const result = await Tesseract.recognize(
                    imageData,
                    'chi_sim+eng',
                    { logger: m => console.log(m) }
                );

                const text = result.data.text;
                ocrResults[subject] = text;

                document.getElementById(subject + 'OcrLoading').style.display = 'none';
                document.getElementById(subject + 'OcrText').value = text;

                // 尝试解析成绩
                parseOcrGrades(text, subject);
            } catch (err) {
                console.error('OCR失败:', err);
                document.getElementById(subject + 'OcrLoading').textContent = '识别失败，请手动输入';
            }
        }

        // 解析OCR成绩
        function parseOcrGrades(text, subject) {
            // 简单解析：查找学号+分数的模式
            // 格式如：B078 33 或 B078: 33
            const lines = text.split('\n');
            const grades = [];

            lines.forEach(line => {
                // 匹配类似 "B078 33" 或 "B078: 33" 的模式
                const match = line.match(/([A-Z]\d{3})[:\s]+(\d+(?:\.\d+)?)/);
                if (match) {
                    grades.push({
                        examId: match[1],
                        score: parseFloat(match[2]),
                        subject: subject
                    });
                }
            });

            if (grades.length > 0) {
                tempData[subject] = grades;
                showToast(`✅ 识别到 ${grades.length} 条${subject === 'math' ? '数学' : '英语'}成绩`);
            }
        }

        // 提交成绩
        function submitGrade() {
            const studentKey = document.getElementById('inputStudentSelect').value;
            const date = document.getElementById('inputDate').value;

            if (!studentKey) {
                alert('请选择学生');
                return;
            }
            if (!date) {
                alert('请选择日期');
                return;
            }
            if (!tempData.math && !tempData.english) {
                alert('请至少上传一科成绩');
                return;
            }

            const student = students.find(s => s.key === studentKey);
            if (!student) {
                alert('学生不存在');
                return;
            }

            // 解析Excel数据（如果是Excel模式）
            let mathGrades = [];
            let englishGrades = [];

            if (tempData.math) {
                if (Array.isArray(tempData.math)) {
                    // 是Excel原始数据，需要解析
                    mathGrades = parseMathData(tempData.math);
                } else {
                    // 是OCR解析后的数组
                    mathGrades = tempData.math;
                }
            }

            if (tempData.english) {
                if (Array.isArray(tempData.english)) {
                    englishGrades = parseEnglishData(tempData.english);
                } else {
                    englishGrades = tempData.english;
                }
            }

            // 合并并计算排名
            const merged = mergeGrades(mathGrades, englishGrades, student.id);

            // 保存记录
            const record = {
                id: Date.now().toString(),
                studentKey: studentKey,
                studentName: student.name,
                studentId: student.id,
                date: date.replace(/-/g, ''),
                dateDisplay: date,
                data: merged.students,
                maxStudent: merged.maxStudent,
                totalCount: merged.totalCount,
                createdAt: Date.now()
            };

            // 检查是否已有同日期记录
            const existingIndex = records.findIndex(r => 
                r.studentKey === studentKey && r.date === record.date
            );
            
            if (existingIndex >= 0) {
                records[existingIndex] = record;
            } else {
                records.push(record);
            }

            localStorage.setItem('gradeRecords', JSON.stringify(records));

            // 清空临时数据
            tempData = { math: null, english: null };
            document.getElementById('mathExcelStatus').innerHTML = '';
            document.getElementById('engExcelStatus').innerHTML = '';
            document.getElementById('mathImagePreview').innerHTML = '';
            document.getElementById('engImagePreview').innerHTML = '';

            renderStudents();
            renderHistory();
            showToast('✅ 成绩录入成功');
        }

        // 解析数学数据（Excel格式）
        function parseMathData(excelData) {
            const result = [];
            for (let i = 1; i < excelData.length; i++) {
                const row = excelData[i];
                if (!row) continue;
                for (let j = 0; j < 12; j += 3) {
                    const examId = row[j] ? String(row[j]).trim() : null;
                    const score = row[j + 1];
                    if (examId && score && !isNaN(parseFloat(score))) {
                        result.push({ examId, score: parseFloat(score), subject: 'math' });
                    }
                }
            }
            return result;
        }

        // 解析英语数据（Excel格式）
        function parseEnglishData(excelData) {
            const result = [];
            for (let i = 3; i < excelData.length; i++) {
                const row = excelData[i];
                if (!row) continue;
                const camps = [[0, 1], [3, 4], [6, 7], [9, 10]];
                for (const [idIdx, scoreIdx] of camps) {
                    const examId = row[idIdx] ? String(row[idIdx]).trim() : null;
                    const score = row[scoreIdx];
                    if (examId && score && !isNaN(parseFloat(score))) {
                        result.push({ examId, score: parseFloat(score), subject: 'english' });
                    }
                }
            }
            return result;
        }

        // 合并成绩并计算排名
        function mergeGrades(mathData, englishData, targetId) {
            const map = new Map();

            mathData.forEach(item => {
                map.set(item.examId, { examId: item.examId, math: item.score, english: null });
            });

            englishData.forEach(item => {
                if (map.has(item.examId)) {
                    map.get(item.examId).english = item.score;
                } else {
                    map.set(item.examId, { examId: item.examId, math: null, english: item.score });
                }
            });

            const result = Array.from(map.values()).filter(item =>
                item.math !== null && item.english !== null
            );

            result.forEach(item => {
                item.total = item.math + item.english;
            });

            const totalCount = result.length;

            // 计算排名
            const mathSorted = [...result].sort((a, b) => b.math - a.math);
            mathSorted.forEach((item, index) => {
                const target = result.find(r => r.examId === item.examId);
                target.mathRank = index + 1;
                target.mathPct = ((index + 1) / totalCount * 100).toFixed(2);
            });

            const englishSorted = [...result].sort((a, b) => b.english - a.english);
            englishSorted.forEach((item, index) => {
                const target = result.find(r => r.examId === item.examId);
                target.englishRank = index + 1;
                target.englishPct = ((index + 1) / totalCount * 100).toFixed(2);
            });

            const totalSorted = [...result].sort((a, b) => b.total - a.total);
            totalSorted.forEach((item, index) => {
                const target = result.find(r => r.examId === item.examId);
                target.totalRank = index + 1;
                target.totalPct = ((index + 1) / totalCount * 100).toFixed(2);
            });

            const maxStudent = result.find(r => r.examId === targetId);

            return {
                students: result.sort((a, b) => a.totalRank - b.totalRank),
                maxStudent: maxStudent || null,
                totalCount
            };
        }

        // 渲染历史记录
        function renderHistory() {
            const filter = document.getElementById('historyStudentFilter').value;
            const container = document.getElementById('historyList');

            let filteredRecords = records;
            if (filter) {
                filteredRecords = records.filter(r => r.studentKey === filter);
            }

            // 按日期倒序
            filteredRecords.sort((a, b) => b.date.localeCompare(a.date));

            if (filteredRecords.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>暂无历史记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredRecords.map(r => {
                const ms = r.maxStudent || {};
                return `
                    <div class="history-item">
                        <div class="info">
                            <span class="date">${r.dateDisplay}</span>
                            <span style="color: var(--accent-blue);">${r.studentName}</span>
                            <div class="scores">
                                <span class="score">🧮 ${ms.math || '-'}</span>
                                <span class="score">📝 ${ms.english || '-'}</span>
                                <span class="score">📊 ${ms.total || '-'}</span>
                            </div>
                            <div class="ranks">
                                排名: 数学${ms.mathRank || '-'}/${r.totalCount} | 
                                英语${ms.englishRank || '-'}/${r.totalCount} | 
                                总分${ms.totalRank || '-'}/${r.totalCount}
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-small btn-danger-small" onclick="deleteRecord('${r.id}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 删除记录
        function deleteRecord(id) {
            if (!confirm('确定删除这条记录？')) return;

            records = records.filter(r => r.id !== id);
            localStorage.setItem('gradeRecords', JSON.stringify(records));

            renderHistory();
            renderStudents();
            showToast('✅ 已删除');
        }

        // 渲染预览链接
        function renderPreviews() {
            const container = document.getElementById('previewList');

            if (students.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔗</div>
                        <p>请先添加学生</p>
                    </div>
                `;
                return;
            }

            const baseUrl = window.location.href.replace('/admin/', '/students/');

            container.innerHTML = students.map(s => {
                const url = baseUrl + s.key + '/';
                return `
                    <div class="student-card">
                        <h3>${s.name}</h3>
                        <span class="id-tag">编号: ${s.id}</span>
                        <div class="result-link" style="margin-top: 15px;">
                            <span class="url">${url}</span>
                            <button class="btn-copy" onclick="copyLink('${url}')">复制链接</button>
                        </div>
                        <button class="btn-small btn-primary-small" style="margin-top: 10px; width: 100%;"
                                onclick="window.open('${url}', '_blank')">
                            🔗 打开结果页面
                        </button>
                    </div>
                `;
            }).join('');
        }

        // 复制链接
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('✅ 链接已复制');
            });
        }

        // 查看结果
        function viewResult(key) {
            const baseUrl = window.location.href.replace('/admin/', '/students/');
            window.open(baseUrl + key + '/', '_blank');
        }
    </script>
</body>
