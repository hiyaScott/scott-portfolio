<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">成绩追踪结果</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-orange: #f97316;
            --border-color: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .header .id-tag {
            display: inline-block;
            background: var(--bg-card);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }

        /* 最新成绩卡片 */
        .latest-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .latest-card .date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .latest-card .scores-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .score-box {
            text-align: center;
            padding: 20px;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .score-box .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .score-box .score {
            font-size: 42px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .score-box .rank {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .score-box.total .score {
            color: var(--accent-green);
        }

        /* 统计表格 */
        .stats-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .stats-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .stats-table th,
        .stats-table td {
            padding: 14px 16px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stats-table th {
            background: var(--bg-card);
            font-weight: 600;
        }

        .stats-table td.row-label {
            background: var(--bg-card);
            font-weight: 500;
            text-align: left;
        }

        .cell-avg { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .cell-max { background: rgba(34, 197, 94, 0.15); color: #86efac; }
        .cell-first { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
        .cell-orange { background: rgba(249, 115, 22, 0.15); color: #fdba74; }
        .cell-rank { background: rgba(234, 179, 8, 0.15); color: #fde047; }
        .cell-total { background: var(--bg-card); font-weight: 600; }

        /* 图表区域 */
        .charts-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .charts-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }

        .chart-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 20px;
        }

        .chart-box h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* 历史表格 */
        .history-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .history-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .history-table th {
            background: var(--bg-card);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .history-table tr:nth-child(even) {
            background: rgba(255,255,255,0.02);
        }

        .trend-up { color: var(--accent-green); }
        .trend-down { color: var(--accent-red); }
        .trend-flat { color: var(--text-secondary); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .admin-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--accent-blue);
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .latest-card .scores-grid { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
            .stats-table { font-size: 12px; }
            .stats-table th, .stats-table td { padding: 10px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <!-- 动态内容 -->
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParams() {
            const path = window.location.pathname;
            const match = path.match(/\/students\/([^\/]+)/);
            return { studentKey: match ? match[1] : null };
        }

        // 读取数据
        function loadData() {
            const { studentKey } = getUrlParams();
            
            if (!studentKey) {
                showError('缺少学生标识');
                return null;
            }

            const students = JSON.parse(localStorage.getItem('gradeStudents') || '[]');
            const student = students.find(s => s.key === studentKey);

            if (!student) {
                showError('未找到该学生信息');
                return null;
            }

            const records = JSON.parse(localStorage.getItem('gradeRecords') || '[]');
            const studentRecords = records
                .filter(r => r.studentKey === studentKey)
                .sort((a, b) => a.date.localeCompare(b.date));

            return { student, records: studentRecords };
        }

        // 显示错误
        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <h2>${msg}</h2>
                    <p>请从管理后台访问此页面</p>
                    <a href="../admin/" class="admin-link">前往管理后台</a>
                </div>
            `;
        }

        // 显示空状态
        function showEmpty(student) {
            document.getElementById('content').innerHTML = `
                <div class="header">
                    <h1>🎓 ${student.name}</h1>
                    <p class="subtitle">成绩追踪结果</p>
                    <div class="id-tag">编号: ${student.id}</div>
                </div>
                <div class="empty-state">
                    <div class="icon">📊</div>
                    <h2>暂无成绩记录</h2>
                    <p>请在管理后台录入成绩数据</p>
                    <a href="../admin/" class="admin-link">前往管理后台</a>
                </div>
            `;
        }

        // 渲染页面
        function render() {
            const data = loadData();
            if (!data) return;

            const { student, records } = data;

            if (records.length === 0) {
                showEmpty(student);
                return;
            }

            document.getElementById('pageTitle').textContent = `${student.name} - 成绩追踪结果`;

            const latest = records[records.length - 1];
            const ms = latest.maxStudent || {};

            // 计算统计数据
            const stats = calculateStats(records);

            document.getElementById('content').innerHTML = `
                <div class="header">
                    <h1>🎓 ${student.name}</h1>
                    <p class="subtitle">成绩追踪结果</p>
                    <div class="id-tag">编号: ${student.id} | 共 ${records.length} 次考试</div>
                </div>

                <!-- 最新成绩 -->
                <div class="latest-card">
                    <div class="date">最新成绩 · ${latest.dateDisplay}</div>
                    <div class="scores-grid">
                        <div class="score-box">
                            <div class="label">🧮 数学</div>
                            <div class="score">${ms.math || '-'}</div>
                            <div class="rank">排名: ${ms.mathRank || '-'}/${latest.totalCount} (${ms.mathPct || '-'}%)</div>
                        </div>
                        <div class="score-box">
                            <div class="label">📝 英语</div>
                            <div class="score">${ms.english || '-'}</div>
                            <div class="rank">排名: ${ms.englishRank || '-'}/${latest.totalCount} (${ms.englishPct || '-'}%)</div>
                        </div>
                        <div class="score-box total">
                            <div class="label">📊 总分</div>
                            <div class="score">${ms.total || '-'}</div>
                            <div class="rank">排名: ${ms.totalRank || '-'}/${latest.totalCount} (${ms.totalPct || '-'}%)</div>
                        </div>
                    </div>
                </div>

                <!-- 统计分析 -->
                <div class="stats-section">
                    <h2>📈 最新考试统计</h2>
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>数学</th>
                                <th>英语</th>
                                <th>总分</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="row-label">满分</td>
                                <td>50</td>
                                <td>50</td>
                                <td class="cell-total">100</td>
                            </tr>
                            <tr>
                                <td class="row-label">平均分</td>
                                <td class="cell-avg">${stats.math.avg}</td>
                                <td class="cell-avg">${stats.english.avg}</td>
                                <td class="cell-total">${stats.total.avg}</td>
                            </tr>
                            <tr>
                                <td class="row-label">最高分</td>
                                <td class="cell-max">${stats.math.max}</td>
                                <td class="cell-max">${stats.english.max}</td>
                                <td class="cell-total">-</td>
                            </tr>
                            <tr>
                                <td class="row-label">本次第一</td>
                                <td class="cell-first">${stats.math.first}</td>
                                <td class="cell-first">${stats.english.first}</td>
                                <td class="cell-total cell-first">${stats.total.first}</td>
                            </tr>
                            <tr style="height: 10px;"><td colspan="4"></td></tr>
                            <tr>
                                <td class="row-label">绝对名次</td>
                                <td class="cell-rank">${ms.mathRank}/${latest.totalCount}</td>
                                <td class="cell-rank">${ms.englishRank}/${latest.totalCount}</td>
                                <td class="cell-total cell-rank">${ms.totalRank}/${latest.totalCount}</td>
                            </tr>
                            <tr>
                                <td class="row-label">百分比名次</td>
                                <td class="cell-rank">${ms.mathPct}%</td>
                                <td class="cell-rank">${ms.englishPct}%</td>
                                <td class="cell-total cell-rank">${ms.totalPct}%</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 趋势图表 -->
                <div class="charts-section">
                    <h2>📉 排名趋势（2周）</h2>
                    <div class="charts-grid">
                        <div class="chart-box">
                            <h3>数学排名趋势</h3>
                            <div class="chart-container">
                                <canvas id="mathChart"></canvas>
                            </div>
                        </div>
                        <div class="chart-box">
                            <h3>英语排名趋势</h3>
                            <div class="chart-container">
                                <canvas id="engChart"></canvas>
                            </div>
                        </div>
                        <div class="chart-box">
                            <h3>总分排名趋势</h3>
                            <div class="chart-container">
                                <canvas id="totalChart"></canvas>
                            </div>
                        </div>
                        <div class="chart-box">
                            <h3>成绩变化趋势</h3>
                            <div class="chart-container">
                                <canvas id="scoreChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 历史记录 -->
                <div class="history-section">
                    <h2>📚 历史成绩</h2>
                    <div style="overflow-x: auto;">
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>数学</th>
                                    <th>排名</th>
                                    <th>英语</th>
                                    <th>排名</th>
                                    <th>总分</th>
                                    <th>排名</th>
                                    <th>趋势</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${renderHistoryRows(records)}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            // 渲染图表
            renderCharts(records);
        }

        // 计算统计数据
        function calculateStats(records) {
            const latest = records[records.length - 1];
            const data = latest.data || [];
            
            if (data.length === 0) {
                return {
                    math: { avg: '-', max: '-', first: '-' },
                    english: { avg: '-', max: '-', first: '-' },
                    total: { avg: '-', first: '-' }
                };
            }

            const mathScores = data.map(d => d.math).filter(s => !isNaN(s));
            const engScores = data.map(d => d.english).filter(s => !isNaN(s));
            const totalScores = data.map(d => d.total).filter(s => !isNaN(s));

            const first = data.reduce((max, curr) => curr.total > max.total ? curr : max, data[0]);

            return {
                math: {
                    avg: (mathScores.reduce((a, b) => a + b, 0) / mathScores.length).toFixed(1),
                    max: Math.max(...mathScores),
                    first: first.math
                },
                english: {
                    avg: (engScores.reduce((a, b) => a + b, 0) / engScores.length).toFixed(1),
                    max: Math.max(...engScores),
                    first: first.english
                },
                total: {
                    avg: (totalScores.reduce((a, b) => a + b, 0) / totalScores.length).toFixed(1),
                    first: first.total
                }
            };
        }

        // 渲染历史行
        function renderHistoryRows(records) {
            return records.map((r, i) => {
                const ms = r.maxStudent || {};
                const prev = i > 0 ? records[i - 1].maxStudent : null;
                
                let trend = '';
                if (prev && ms.totalRank) {
                    const diff = prev.totalRank - ms.totalRank;
                    if (diff > 0) trend = '<span class="trend-up">↑${diff}</span>';
                    else if (diff < 0) trend = '<span class="trend-down">↓${Math.abs(diff)}</span>';
                    else trend = '<span class="trend-flat">-</span>';
                }

                return `
                    <tr>
                        <td>${r.dateDisplay}</td>
                        <td>${ms.math || '-'}</td>
                        <td>${ms.mathRank || '-'}/${r.totalCount}</td>
                        <td>${ms.english || '-'}</td>
                        <td>${ms.englishRank || '-'}/${r.totalCount}</td>
                        <td><strong>${ms.total || '-'}</strong></td>
                        <td><strong>${ms.totalRank || '-'}/${r.totalCount}</strong></td>
                        <td>${trend}</td>
                    </tr>
                `;
            }).reverse().join('');
        }

        // 渲染图表
        function renderCharts(records) {
            const dates = records.map(r => r.dateDisplay.slice(5)); // MM-DD
            const mathRanks = records.map(r => r.maxStudent?.mathRank || 0);
            const engRanks = records.map(r => r.maxStudent?.englishRank || 0);
            const totalRanks = records.map(r => r.maxStudent?.totalRank || 0);
            const mathScores = records.map(r => r.maxStudent?.math || 0);
            const engScores = records.map(r => r.maxStudent?.english || 0);

            const chartConfig = (ctx, label, data, color) => ({
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '20',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            reverse: label.includes('排名'),
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });

            new Chart(document.getElementById('mathChart'), chartConfig('数学排名', mathRanks, '#3b82f6'));
            new Chart(document.getElementById('engChart'), chartConfig('英语排名', engRanks, '#22c55e'));
            new Chart(document.getElementById('totalChart'), chartConfig('总分排名', totalRanks, '#eab308'));

            // 成绩趋势图
            new Chart(document.getElementById('scoreChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        { label: '数学', data: mathScores, borderColor: '#3b82f6', tension: 0.4 },
                        { label: '英语', data: engScores, borderColor: '#22c55e', tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#94a3b8' } }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        // 初始化
        render();
    </script>
</body>
</html>
