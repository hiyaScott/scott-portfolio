<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩追踪分析系统 PLUS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-purple: #a855f7;
            --border-color: #475569;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        /* Daylight 明亮主题 */
        [data-theme="daylight"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-blue: #2563eb;
            --accent-green: #16a34a;
            --accent-red: #dc2626;
            --accent-yellow: #ca8a04;
            --accent-purple: #9333ea;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 22px;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: background 0.3s;
        }

        .card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        }

        /* 学生选择 */
        .student-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .student-tag {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .student-tag:hover { border-color: var(--accent-blue); }
        .student-tag.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .student-tag .delete-btn {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .student-tag .delete-btn:hover { background: var(--accent-red); }

        /* 添加学生 */
        .add-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-form input {
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .add-form input { flex: 1; max-width: 200px; }

        .add-form-inline {
            display: flex;
            gap: 8px;
        }

        .add-form-inline input {
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .btn-add-student {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px dashed var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .btn-add-student:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn-small {
            padding: 10px 20px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: var(--bg-primary);
        }

        /* 表单行 */
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* 内联表单 - 紧凑模式 */
        .form-inline {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-inline input {
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            flex: 1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            min-width: 150px;
        }

        /* 上传区域 */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .upload-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px 15px;
            border: 2px dashed var(--border-color);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-grid.compact .upload-box {
            padding: 15px 10px;
        }

        .upload-grid.compact .upload-box .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .upload-grid.compact .upload-box p {
            font-size: 13px;
        }

        .upload-box:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-box .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .upload-box p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .upload-box input { display: none; }

        .upload-box.has-file {
            border-color: var(--accent-green);
            border-style: solid;
            background: rgba(34, 197, 94, 0.1);
        }

        /* 按钮 */
        .btn-primary {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: var(--border-color); cursor: not-allowed; }

        /* 统计表格 */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .stats-table th, .stats-table td {
            padding: 14px 16px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stats-table th {
            background: var(--bg-card);
            font-weight: 600;
        }

        .cell-avg { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .cell-max { background: rgba(34, 197, 94, 0.15); color: #86efac; }
        .cell-first { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
        .cell-rank { background: rgba(234, 179, 8, 0.15); color: #fde047; }
        .cell-total { background: var(--bg-card); font-weight: 600; }

        /* 图表 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .chart-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
        }

        .chart-box h3 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-align: center;
        }

        .chart-container { position: relative; height: 200px; }
        
        .chart-container.single { height: 300px; margin-top: 15px; }

        /* 趋势标签页 */
        .trend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .trend-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .trend-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            user-select: none;
        }

        .trend-tab:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .trend-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        /* 历史记录 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-group {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
        }

        .history-group-header {
            background: var(--bg-secondary);
            padding: 10px 15px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-group-count {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .history-item {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .history-item.current-view {
            background: rgba(59, 130, 246, 0.2);
            border-left: 3px solid var(--accent-blue);
        }

        .history-item .info {
            display: flex;
            gap: 12px;
            align-items: center;
            flex: 1;
        }

        .history-item .date {
            font-weight: 600;
            font-size: 14px;
            min-width: auto;
        }

        .history-item .sequence-badge {
            background: var(--accent-purple);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .history-item .subject-tags {
            display: flex;
            gap: 4px;
        }

        .history-item .subject-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
        }

        .history-item .subject-tag.math {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .history-item .subject-tag.english {
            background: rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .history-item .scores {
            display: flex;
            gap: 8px;
            font-size: 13px;
        }

        .history-item .score {
            padding: 2px 8px;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .history-item .delete-btn {
            padding: 4px 10px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .history-item .actions {
            display: flex;
            gap: 6px;
        }

        /* 同步设置 */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 10px;
        }
        .sync-status.connected {
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
        }
        .sync-status.disconnected {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
        }

        .sync-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: monospace;
        }

        .btn-sync {
            padding: 10px 20px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-sync:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .sync-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .sync-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show { opacity: 1; }

        .hidden { display: none !important; }

        /* ========== 移动端适配 ========== */
        @media (max-width: 768px) {
            body { padding: 12px; }
            
            .header { 
                flex-direction: column; 
                align-items: flex-start;
                margin-bottom: 15px;
            }
            
            .header h1 { font-size: 18px; }
            .subtitle { font-size: 12px; }
            
            .card { padding: 15px; margin-bottom: 12px; }
            .card h2 { font-size: 15px; margin-bottom: 12px; }
            
            /* 学生标签 */
            .student-tag { padding: 8px 14px; font-size: 14px; }
            .student-tag .delete-btn { width: 16px; height: 16px; font-size: 10px; }
            
            /* 添加表单 */
            .add-form { flex-direction: column; }
            .add-form input { max-width: 100%; width: 100%; }
            .btn-small { width: 100%; }
            
            /* 表单 */
            .form-row { flex-direction: column; gap: 12px; }
            .form-group input, .form-group select { width: 100%; min-width: auto; }
            
            /* 上传区域 */
            .upload-grid { grid-template-columns: 1fr; gap: 12px; }
            .upload-box { padding: 20px 15px; }
            .upload-box .icon { font-size: 28px; }
            
            /* 统计表格 */
            .stats-table { font-size: 12px; }
            .stats-table th, .stats-table td { padding: 10px 8px; }
            
            /* 图表 */
            .charts-grid { grid-template-columns: 1fr; }
            .chart-container { height: 180px; }
            .chart-container.single { height: 250px; }
            
            /* 趋势标签 */
            .trend-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .trend-tabs {
                width: 100%;
            }
            
            .trend-tab {
                flex: 1;
                text-align: center;
                padding: 8px 10px;
                font-size: 12px;
            }
            
            /* 历史记录 */
            .history-item {
                padding: 10px 12px;
            }
            .history-item .info {
                flex-direction: row;
                gap: 8px;
                align-items: center;
                flex-wrap: wrap;
            }
            .history-item .date {
                font-size: 13px;
                min-width: 45px;
            }
            .history-item .sequence-badge {
                font-size: 10px;
                padding: 1px 6px;
            }
            .history-item .scores {
                gap: 4px;
                font-size: 11px;
            }
            .history-item .score {
                padding: 2px 5px;
            }
            .history-item .delete-btn {
                padding: 2px 8px;
                font-size: 14px;
            }
            
            /* 同步设置 */
            .sync-card h2, .input-card h2 {
                margin-bottom: 0;
            }
            
            /* 同步设置 */
            .sync-actions { 
                flex-direction: row; 
                gap: 8px;
            }
            .btn-sync, .btn-small { 
                flex: 1; 
                padding: 10px 4px; 
                font-size: 12px;
                white-space: nowrap;
            }
            
            /* 内联表单 */
            .form-inline { margin-bottom: 12px; }
            .form-inline input { padding: 8px 10px; font-size: 13px; }
            
            /* 上传区域 */
            .upload-grid.compact { gap: 8px; }
            .upload-grid.compact .upload-box { padding: 12px 8px; }
            .upload-grid.compact .upload-box .icon { font-size: 20px; }
            .upload-grid.compact .upload-box p { font-size: 12px; }
            
            /* Toast */
            .toast { 
                bottom: 20px; 
                left: 10px; 
                right: 10px;
                transform: none;
                text-align: center;
                padding: 10px 15px;
                font-size: 13px;
            }
        }
        
        /* 超小屏幕 */
        @media (max-width: 380px) {
            h1 { font-size: 18px; }
            .student-tag { padding: 6px 12px; font-size: 13px; }
            .stats-table { font-size: 11px; }
            .stats-table th, .stats-table td { padding: 8px 5px; }
            .trend-tab { padding: 6px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="display: flex; align-items: center; gap: 10px;">
                🎓 成绩追踪 <span style="color: var(--accent-yellow);">PLUS</span> 
                <span style="font-size: 13px; color: var(--text-secondary); font-weight: normal;">v3.17.6</span>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" style="margin-left: 8px;">☀️</button>
            </h1>
        </div>

        <!-- 云端同步 -->
        <div class="card sync-card">
            <h2 onclick="toggleSync()" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                <span>☁️ 云端 <span class="sync-status disconnected" id="syncStatus">未连接</span></span>
                <span id="syncToggle">▼</span>
            </h2>
            <div id="syncContent">
                <div id="syncSetup">
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label>GitHub Token</label>
                            <input type="password" id="githubToken" class="sync-input" placeholder="ghp_xxxxxxxxxxxx">
                        </div>
                    </div>
                    <div class="sync-actions">
                        <button class="btn-sync" onclick="connectGitHub()">连接</button>
                        <button class="btn-small" onclick="createGist()" id="createGistBtn" style="display: none;">创建</button>
                    </div>
                </div>
                <div id="syncConnected" style="display: none;">
                    <p class="sync-info" id="gistUrl" style="margin-bottom: 10px;"></p>
                    <div class="sync-actions">
                        <button class="btn-sync" onclick="syncToGitHub()">💾 保存</button>
                        <button class="btn-sync" onclick="syncFromGitHub()">🔄 恢复</button>
                        <button class="btn-small" onclick="disconnectGitHub()" style="background: var(--accent-red);">断开</button>
                    </div>
                    <p class="sync-info" id="lastSync" style="margin-top: 10px;"></p>
                </div>
            </div>
        </div>

        <!-- 学生管理 -->
        <div class="card">
            <h2 style="display: flex; justify-content: space-between; align-items: center;">
                <span>👤 学生</span>
                <button class="btn-icon" onclick="toggleAddStudent()" title="添加学生">+</button>
            </h2>
            <div class="student-list" id="studentList"></div>
            <div id="addStudentForm" class="hidden" style="margin-top: 12px;">
                <div class="add-form-inline">
                    <input type="text" id="newName" placeholder="学生姓名" style="flex: 1;">
                    <button class="btn-small" onclick="addStudent()">确定</button>
                    <button class="btn-small" onclick="toggleAddStudent()" style="background: var(--text-secondary);">取消</button>
                </div>
            </div>
        </div>

        <!-- 数据录入 -->
        <div class="card input-card">
            <h2 onclick="toggleInput()" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                <span>📝 录入 · <span id="currentStudentName">请先选择学生</span></span>
                <span id="inputToggle">▶</span>
            </h2>
            <div id="inputContent" style="display: none;">
                <div class="form-inline">
                    <input type="date" id="examDate">
                    <input type="text" id="todayId" placeholder="考号如 B078">
                </div>

                <div class="upload-grid compact">
                    <div class="upload-box" onclick="document.getElementById('mathFile').click()" id="mathBox">
                        <div class="icon">🧮</div>
                        <p>数学</p>
                        <input type="file" id="mathFile" accept=".xlsx,.xls" onchange="handleFile(this, 'math')">
                    </div>
                    <div class="upload-box" onclick="document.getElementById('engFile').click()" id="engBox">
                        <div class="icon">📝</div>
                        <p>英语</p>
                        <input type="file" id="engFile" accept=".xlsx,.xls" onchange="handleFile(this, 'english')">
                    </div>
                </div>

                <button class="btn-primary" onclick="analyze()" id="analyzeBtn">分析</button>
            </div>
        </div>

        <!-- 排名趋势 -->
        <div class="card hidden" id="trendsSection">
            <div class="trend-header">
                <h2>📉 趋势</h2>
                <div class="trend-tabs">
                    <div class="trend-tab active" onclick="switchTrend('all')" id="tab-all">全部</div>
                    <div class="trend-tab" onclick="switchTrend('math')" id="tab-math">数学</div>
                    <div class="trend-tab" onclick="switchTrend('eng')" id="tab-eng">英语</div>
                    <div class="trend-tab" onclick="switchTrend('total')" id="tab-total">总分</div>
                    <div class="trend-tab" onclick="switchTrend('pct')" id="tab-pct">百分比</div>
                </div>
            </div>
            <div class="chart-container single">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="card" id="historySection">
            <h2>📚 历史 · <span id="historyStudentName">请先选择学生</span></h2>
            <div class="history-list" id="historyList">
                <p style="color: var(--text-secondary); text-align: center; padding: 40px;">选择学生后查看历史记录</p>
            </div>
        </div>

        <!-- 单日分析 -->
        <div id="detailSection" class="hidden">
            <div class="card">
                <h2>📈 分析 · <span id="detailDate"></span></h2>
                <div id="detailTableContainer"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== 数据迁移 ====================
        // 从旧版本数据结构迁移到新版本
        function migrateData() {
            const recordsStr = localStorage.getItem('ga_records');
            if (!recordsStr) return;
            
            try {
                const records = JSON.parse(recordsStr);
                if (!Array.isArray(records) || records.length === 0) return;
                
                let needsMigration = false;
                
                // 检查是否需要迁移
                for (const record of records) {
                    if (!record.id || !record.id.includes('_')) {
                        needsMigration = true;
                        break;
                    }
                }
                
                if (!needsMigration) return;
                
                // 按学生和日期分组
                const grouped = {};
                records.forEach(record => {
                    const key = `${record.studentKey}_${record.date}`;
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(record);
                });
                
                // 为每组分配序号
                const migrated = [];
                Object.values(grouped).forEach(group => {
                    // 按日期排序（旧的在前）
                    group.sort((a, b) => (a.id || 0) - (b.id || 0));
                    
                    group.forEach((record, index) => {
                        const sequence = index + 1;
                        record.id = `${record.date}_${sequence}`;
                        record.sequence = sequence;
                        record.hasMath = record.student?.math > 0;
                        record.hasEnglish = record.student?.english > 0;
                        migrated.push(record);
                    });
                });
                
                localStorage.setItem('ga_records', JSON.stringify(migrated));
                console.log('数据迁移完成:', migrated.length, '条记录');
                
                // 刷新页面以使用新数据
                window.location.reload();
            } catch (e) {
                console.error('数据迁移失败:', e);
            }
        }

        let students = JSON.parse(localStorage.getItem('ga_students') || '[]');
        let records = JSON.parse(localStorage.getItem('ga_records') || '[]');
        let currentStudent = null;
        let currentViewingRecord = null;  // 当前正在查看详情的记录ID
        let tempData = { math: null, english: null };
        let charts = {};
        let currentTrendType = 'all';
        
        // GitHub Gist 同步相关
        let githubToken = localStorage.getItem('ga_github_token') || '';
        let gistId = localStorage.getItem('ga_gist_id') || '';

        document.addEventListener('DOMContentLoaded', async () => {
            // 执行数据迁移
            migrateData();
            
            document.getElementById('examDate').value = new Date().toISOString().split('T')[0];
            
            // 恢复已保存的GitHub配置
            const savedToken = localStorage.getItem('ga_github_token');
            const savedGistId = localStorage.getItem('ga_gist_id');
            
            if (savedToken) {
                document.getElementById('githubToken').value = savedToken;
            }
            
            // 如果有Token和GistId，验证连接状态
            if (savedToken && savedGistId) {
                const isValid = await validateConnection(savedToken, savedGistId);
                if (isValid) {
                    githubToken = savedToken;  // 更新变量
                    gistId = savedGistId;      // 更新变量
                    showSyncConnected();
                } else {
                    // 验证失败，清除保存的配置
                    localStorage.removeItem('ga_gist_id');
                    githubToken = '';
                    gistId = '';
                    showToast('⚠️ 连接已失效，请重新连接');
                }
            }
            
            renderStudents();
            renderHistory();
            renderTrends();
        });

        async function validateConnection(token, id) {
            try {
                const response = await fetch(`https://api.github.com/gists/${id}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                return response.ok;
            } catch (err) {
                return false;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function renderStudents() {
            const container = document.getElementById('studentList');
            
            if (students.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">请先添加学生</p>';
                return;
            }

            container.innerHTML = students.map(s => `
                <div class="student-tag ${currentStudent === s.key ? 'active' : ''}" onclick="selectStudent('${s.key}')">
                    <span>${s.name}</span>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteStudent('${s.key}')">×</button>
                </div>
            `).join('');

            if (currentStudent) {
                const s = students.find(s => s.key === currentStudent);
                document.getElementById('currentStudentName').textContent = s ? s.name : '请先选择学生';
                document.getElementById('historyStudentName').textContent = s ? s.name : '全部';
            } else {
                document.getElementById('currentStudentName').textContent = '请先选择学生';
            }
        }

        function selectStudent(key) {
            currentStudent = key;
            currentViewingRecord = null;  // 切换学生时重置查看状态
            renderStudents();
            renderHistory();
            renderTrends(); // 渲染排名趋势
            document.getElementById('detailSection').classList.add('hidden'); // 隐藏单日详情
            tempData = { math: null, english: null };
            document.getElementById('mathBox').classList.remove('has-file');
            document.getElementById('engBox').classList.remove('has-file');
            document.getElementById('mathFile').value = '';
            document.getElementById('engFile').value = '';
            document.getElementById('todayId').value = '';
        }

        function toggleAddStudent() {
            const form = document.getElementById('addStudentForm');
            
            if (form.classList.contains('hidden')) {
                form.classList.remove('hidden');
                document.getElementById('newName').focus();
            } else {
                form.classList.add('hidden');
                document.getElementById('newName').value = '';
            }
        }

        function toggleSync() {
            const content = document.getElementById('syncContent');
            const toggle = document.getElementById('syncToggle');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                toggle.textContent = '▼';
            } else {
                content.style.display = 'none';
                toggle.textContent = '▶';
            }
        }

        function toggleInput() {
            const content = document.getElementById('inputContent');
            const toggle = document.getElementById('inputToggle');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                toggle.textContent = '▼';
            } else {
                content.style.display = 'none';
                toggle.textContent = '▶';
            }
        }

        function addStudent() {
            const name = document.getElementById('newName').value.trim();
            if (!name) {
                alert('请输入学生姓名');
                return;
            }

            const key = name.toLowerCase().replace(/\s+/g, '-');
            if (students.find(s => s.key === key)) {
                alert('该学生已存在');
                return;
            }

            students.push({ key, name });
            localStorage.setItem('ga_students', JSON.stringify(students));
            
            // 隐藏输入框
            toggleAddStudent();

            if (!currentStudent) currentStudent = key;
            renderStudents();
            showToast('✅ 添加成功');
            
            // 如果已连接GitHub，自动同步
            const token = localStorage.getItem('ga_github_token');
            const id = localStorage.getItem('ga_gist_id');
            if (token && id) {
                syncToGitHub();
            }
        }

        function deleteStudent(key) {
            if (!confirm('确定删除该学生？其历史记录也会被删除。')) return;

            students = students.filter(s => s.key !== key);
            records = records.filter(r => r.studentKey !== key);
            localStorage.setItem('ga_students', JSON.stringify(students));
            localStorage.setItem('ga_records', JSON.stringify(records));

            if (currentStudent === key) currentStudent = students[0]?.key || null;
            renderStudents();
            renderHistory();
            showToast('✅ 已删除');
            
            // 如果已连接GitHub，自动同步
            const token = localStorage.getItem('ga_github_token');
            const id = localStorage.getItem('ga_gist_id');
            if (token && id) {
                syncToGitHub();
            }
        }

        function handleFile(input, subject) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    tempData[subject] = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    document.getElementById(subject === 'math' ? 'mathBox' : 'engBox').classList.add('has-file');
                    showToast(`✅ ${subject === 'math' ? '数学' : '英语'}成绩表已加载`);
                } catch (err) {
                    alert('解析失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function analyze() {
            if (!currentStudent) {
                alert('请先选择学生');
                return;
            }

            const student = students.find(s => s.key === currentStudent);
            const date = document.getElementById('examDate').value;
            const todayId = document.getElementById('todayId').value.trim().toUpperCase();

            if (!date) { alert('请选择日期'); return; }
            if (!todayId) { alert('请输入今日考号'); return; }
            if (!tempData.math && !tempData.english) { alert('请至少上传一个成绩表'); return; }

            // 查找该日期已有的记录，获取最大序号
            const sameDayRecords = records.filter(r => r.studentKey === currentStudent && r.date === date.replace(/-/g, ''));
            const maxSequence = sameDayRecords.length > 0 
                ? Math.max(...sameDayRecords.map(r => r.sequence || 1))
                : 0;
            const newSequence = maxSequence + 1;

            const hasMath = !!tempData.math;
            const hasEnglish = !!tempData.english;

            // 单科考试处理：检查是否需要合并
            let existingRecord = null;
            if (sameDayRecords.length > 0) {
                // 查找相同序号的记录（如果没有上传某科，找最后一科上传的记录）
                const lastRecord = sameDayRecords.sort((a, b) => (a.sequence || 1) - (b.sequence || 1)).pop();
                
                // 如果这次只上传了一科，且上一记录缺少另一科，询问是否合并
                if ((hasMath && !hasEnglish && !lastRecord.hasEnglish) ||
                    (!hasMath && hasEnglish && !lastRecord.hasMath)) {
                    if (confirm(`今天已有第${lastRecord.sequence}次考试记录，是否合并到同一记录？\n\n点击"确定"合并，点击"取消"创建新记录（第${newSequence}次）。`)) {
                        existingRecord = lastRecord;
                    }
                }
            }

            const mathData = tempData.math ? parseMathExcel(tempData.math) : [];
            const engData = tempData.english ? parseEngExcel(tempData.english) : [];
            
            // 如果是合并，使用现有记录的未考科目成绩
            let mergedMathData = mathData;
            let mergedEngData = engData;
            
            if (existingRecord) {
                if (!hasMath && existingRecord.data) {
                    // 从现有记录提取数学成绩
                    const existingMath = existingRecord.data.filter(d => d.math > 0).map(d => ({
                        examId: d.examId,
                        score: d.math
                    }));
                    mergedMathData = existingMath;
                }
                if (!hasEnglish && existingRecord.data) {
                    // 从现有记录提取英语成绩
                    const existingEng = existingRecord.data.filter(d => d.english > 0).map(d => ({
                        examId: d.examId,
                        score: d.english
                    }));
                    mergedEngData = existingEng;
                }
            }
            
            const result = mergeAndCalculate(mergedMathData, mergedEngData, todayId);

            if (!result.student) {
                alert(`未找到考号 ${todayId} 的成绩，请检查数据`);
                return;
            }

            // 确定记录ID和序号
            const recordId = existingRecord 
                ? existingRecord.id 
                : `${date.replace(/-/g, '')}_${newSequence}`;
            const recordSequence = existingRecord ? existingRecord.sequence : newSequence;

            const record = {
                id: recordId,
                sequence: recordSequence,
                studentKey: currentStudent,
                studentName: student.name,
                examId: todayId,
                date: date.replace(/-/g, ''),
                dateDisplay: date,
                hasMath: result.student.math > 0,
                hasEnglish: result.student.english > 0,
                data: result.all,
                student: result.student,
                count: result.count,
                stats: result.stats
            };

            if (existingRecord) {
                const existingIdx = records.findIndex(r => r.id === existingRecord.id);
                if (existingIdx >= 0) {
                    records[existingIdx] = record;
                }
            } else {
                records.push(record);
            }

            localStorage.setItem('ga_records', JSON.stringify(records));
            renderTrends(); // 更新排名趋势
            showDetail(record); // 显示单日详情
            renderHistory();

            tempData = { math: null, english: null };
            document.getElementById('mathBox').classList.remove('has-file');
            document.getElementById('engBox').classList.remove('has-file');
            document.getElementById('mathFile').value = '';
            document.getElementById('engFile').value = '';
            
            const seqText = recordSequence === 1 ? '' : ` 第${recordSequence}次`;
            showToast(existingRecord ? '✅ 已更新' : `✅ 已添加${seqText}`);
            
            // 如果已连接GitHub，自动同步
            const token = localStorage.getItem('ga_github_token');
            const id = localStorage.getItem('ga_gist_id');
            if (token && id) {
                await syncToGitHub();
            }
        }

        function parseMathExcel(data) {
            const result = [];
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                if (!row) continue;
                // 扩大解析范围到30列，适应不同格式的成绩表
                for (let j = 0; j < 30; j += 3) {
                    const id = row[j]?.toString().trim();
                    const score = parseFloat(row[j + 1]);
                    // 仅识别 A/B/C/D 开头的考号（防止异常数据）
                    if (id && /^[ABCD]\d{3}$/.test(id) && !isNaN(score)) {
                        result.push({ examId: id.toUpperCase(), score });
                    }
                }
            }
            console.log('数学成绩解析:', result.length, '条', '最高分:', Math.max(...result.map(d => d.score)));
            return result;
        }

        function parseEngExcel(data) {
            const result = [];
            for (let i = 3; i < data.length; i++) {
                const row = data[i];
                if (!row) continue;
                // 扩大解析范围
                for (let j = 0; j < 30; j += 3) {
                    const id = row[j]?.toString().trim();
                    const score = parseFloat(row[j + 1]);
                    // 仅识别 A/B/C/D 开头的考号（防止异常数据）
                    if (id && /^[ABCD]\d{3}$/.test(id) && !isNaN(score)) {
                        result.push({ examId: id.toUpperCase(), score });
                    }
                }
            }
            console.log('英语成绩解析:', result.length, '条', '最高分:', Math.max(...result.map(d => d.score)));
            return result;
        }

        function mergeAndCalculate(mathData, engData, targetId) {
            // 建立所有出现过的考号映射
            const map = new Map();
            
            // 先收集数学成绩
            mathData.forEach(d => {
                map.set(d.examId, { examId: d.examId, math: d.score, english: null });
            });
            
            // 再收集英语成绩
            engData.forEach(d => {
                if (map.has(d.examId)) {
                    map.get(d.examId).english = d.score;
                } else {
                    map.set(d.examId, { examId: d.examId, math: null, english: d.score });
                }
            });

            // 规则1：未考科目设为0（单科考试时会用现有记录补全）
            const allRaw = Array.from(map.values()).map(d => ({
                examId: d.examId,
                math: d.math !== null ? d.math : 0,
                english: d.english !== null ? d.english : 0
            }));

            // 规则2：只要考了一科就纳入统计
            // 规则3：两科都为0的不计入总排名
            const all = allRaw.filter(d => d.math > 0 || d.english > 0);
            all.forEach(d => d.total = d.math + d.english);

            const count = all.length;

            // 计算排名（并列取最高名次）
            const calcRank = (arr, key) => {
                let currentRank = 1;
                for (let i = 0; i < arr.length; i++) {
                    if (i > 0 && arr[i][key] < arr[i-1][key]) {
                        currentRank = i + 1;
                    }
                    arr[i][key + 'Rank'] = currentRank;
                    arr[i][key + 'Pct'] = ((currentRank / count) * 100).toFixed(1);
                }
            };

            const mathSorted = [...all].sort((a, b) => b.math - a.math);
            calcRank(mathSorted, 'math');

            const engSorted = [...all].sort((a, b) => b.english - a.english);
            calcRank(engSorted, 'english');

            const totalSorted = [...all].sort((a, b) => b.total - a.total);
            calcRank(totalSorted, 'total');

            let student = all.find(d => d.examId === targetId.toUpperCase());

            // 规则4：某科为0不计入该科平均分
            const mathValidScores = all.filter(d => d.math > 0).map(d => d.math);
            const engValidScores = all.filter(d => d.english > 0).map(d => d.english);

            const stats = {
                mathAvg: mathValidScores.length > 0 ? (mathValidScores.reduce((s, v) => s + v, 0) / mathValidScores.length).toFixed(1) : '0.0',
                engAvg: engValidScores.length > 0 ? (engValidScores.reduce((s, v) => s + v, 0) / engValidScores.length).toFixed(1) : '0.0',
                totalAvg: (all.reduce((s, d) => s + d.total, 0) / count).toFixed(1),
                mathMax: mathValidScores.length > 0 ? Math.max(...mathValidScores) : 0,
                engMax: engValidScores.length > 0 ? Math.max(...engValidScores) : 0,
                first: totalSorted[0]
            };

            console.log('统计人数:', count, '数学有效人数:', mathValidScores.length, '英语有效人数:', engValidScores.length);
            console.log('所有被统计的考号:', all.map(d => d.examId).sort());
            console.log('被过滤掉的考号(两科都为0):', allRaw.filter(d => d.math === 0 && d.english === 0).map(d => d.examId));
            console.log('统计数据:', stats);
            return { all, student, count, stats };
        }

        function showDetail(record) {
            document.getElementById('detailSection').classList.remove('hidden');
            
            // 显示日期和次数
            const dateObj = new Date(record.dateDisplay);
            const month = dateObj.getMonth() + 1;
            const day = dateObj.getDate();
            const seqText = record.sequence > 1 ? ` 第${record.sequence}次` : '';
            
            // 添加科目标识
            const subjectTag = record.hasMath && record.hasEnglish ? '' :
                              record.hasMath ? ' [单科-数学]' : ' [单科-英语]';
            document.getElementById('detailDate').textContent = `${month}月${day}日${seqText}${subjectTag}`;

            const s = record.student;
            const st = record.stats;
            const hasMath = record.hasMath;
            const hasEng = record.hasEnglish;
            const hasTotal = hasMath && hasEng;

            // 动态构建表格
            let tableHtml = '<table class="stats-table">';
            
            // 表头
            tableHtml += '<thead><tr><th></th>';
            if (hasMath) tableHtml += '<th>数学</th>';
            if (hasEng) tableHtml += '<th>英语</th>';
            if (hasTotal) tableHtml += '<th>总分</th>';
            tableHtml += '</tr></thead>';
            
            // 表格内容
            tableHtml += '<tbody>';
            
            // 满分行
            tableHtml += '<tr><td class="row-label">满分</td>';
            if (hasMath) tableHtml += '<td>50</td>';
            if (hasEng) tableHtml += '<td>60</td>';
            if (hasTotal) tableHtml += '<td class="cell-total">110</td>';
            tableHtml += '</tr>';
            
            // 平均分行
            tableHtml += '<tr><td class="row-label">平均分</td>';
            if (hasMath) tableHtml += `<td class="cell-avg">${st.mathAvg}</td>`;
            if (hasEng) tableHtml += `<td class="cell-avg">${st.engAvg}</td>`;
            if (hasTotal) tableHtml += `<td class="cell-total">${st.totalAvg}</td>`;
            tableHtml += '</tr>';
            
            // 最高分
            tableHtml += '<tr><td class="row-label">最高分</td>';
            if (hasMath) tableHtml += `<td class="cell-max">${st.mathMax}</td>`;
            if (hasEng) tableHtml += `<td class="cell-max">${st.engMax}</td>`;
            if (hasTotal) tableHtml += '<td class="cell-total">-</td>';
            tableHtml += '</tr>';
            
            // 本次第一
            tableHtml += '<tr><td class="row-label">本次第一</td>';
            if (hasMath) tableHtml += `<td class="cell-first">${st.first.math}</td>`;
            if (hasEng) tableHtml += `<td class="cell-first">${st.first.english}</td>`;
            if (hasTotal) tableHtml += `<td class="cell-total cell-first">${st.first.total}</td>`;
            tableHtml += '</tr>';
            
            // 分隔行
            tableHtml += '<tr style="height: 10px;"><td colspan="' + (1 + (hasMath ? 1 : 0) + (hasEng ? 1 : 0) + (hasTotal ? 1 : 0)) + '"></td></tr>';
            
            // 该生成绩
            tableHtml += '<tr><td class="row-label">该生成绩</td>';
            if (hasMath) tableHtml += `<td class="cell-rank">${s.math}</td>`;
            if (hasEng) tableHtml += `<td class="cell-rank">${s.english}</td>`;
            if (hasTotal) tableHtml += `<td class="cell-total cell-rank">${s.total}</td>`;
            tableHtml += '</tr>';
            
            // 绝对名次
            tableHtml += '<tr><td class="row-label">绝对名次</td>';
            if (hasMath) tableHtml += `<td class="cell-rank">${s.mathRank}/${record.count}</td>`;
            if (hasEng) tableHtml += `<td class="cell-rank">${s.englishRank}/${record.count}</td>`;
            if (hasTotal) tableHtml += `<td class="cell-total cell-rank">${s.totalRank}/${record.count}</td>`;
            tableHtml += '</tr>';
            
            // 百分比 - 只有全科考试才显示
            if (hasTotal) {
                tableHtml += '<tr><td class="row-label">百分比</td>';
                if (hasMath) tableHtml += `<td class="cell-rank">-</td>`;
                if (hasEng) tableHtml += `<td class="cell-rank">-</td>`;
                tableHtml += `<td class="cell-total cell-rank">${s.totalPct}%</td>`;
                tableHtml += '</tr>';
            }
            
            tableHtml += '</tbody></table>';
            
            document.getElementById('detailTableContainer').innerHTML = tableHtml;
            document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth' });
        }

        function renderTrends() {
            const trendsSection = document.getElementById('trendsSection');
            
            if (!currentStudent) {
                trendsSection.classList.add('hidden');
                return;
            }

            const studentRecords = records
                .filter(r => r.studentKey === currentStudent)
                .sort((a, b) => {
                    // 先按日期排序，再按序号排序
                    if (a.date !== b.date) {
                        return a.date.localeCompare(b.date);
                    }
                    return (a.sequence || 1) - (b.sequence || 1);
                });

            if (studentRecords.length === 0) {
                trendsSection.classList.add('hidden');
                return;
            }

            trendsSection.classList.remove('hidden');
            renderCharts(studentRecords);
        }

        let currentTrendData = null;

        function renderCharts(studentRecords) {
            // 构建标签：包括日期和次数信息
            const labels = studentRecords.map(r => {
                const dateObj = new Date(r.dateDisplay);
                const month = dateObj.getMonth() + 1;
                const day = dateObj.getDate();
                const seqSuffix = r.sequence > 1 ? ` #${r.sequence}` : '';
                return `${month}/${day}${seqSuffix}`;
            });
            
            currentTrendData = {
                labels,
                records: studentRecords,
                math: studentRecords.map(r => r.hasMath ? r.student.mathRank : null),
                eng: studentRecords.map(r => r.hasEnglish ? r.student.englishRank : null),
                total: studentRecords.map(r => (r.hasMath && r.hasEnglish) ? r.student.totalRank : null),
                mathScore: studentRecords.map(r => r.hasMath ? r.student.math : null),
                engScore: studentRecords.map(r => r.hasEnglish ? r.student.english : null),
                totalScore: studentRecords.map(r => (r.hasMath && r.hasEnglish) ? r.student.total : null),
                mathPct: studentRecords.map(r => r.hasMath ? parseFloat(r.student.mathPct) : null),
                engPct: studentRecords.map(r => r.hasEnglish ? parseFloat(r.student.englishPct) : null),
                totalPct: studentRecords.map(r => (r.hasMath && r.hasEnglish) ? parseFloat(r.student.totalPct) : null)
            };

            // 默认显示全部
            switchTrend('all');
        }

        function switchTrend(type) {
            currentTrendType = type;
            
            // 更新标签样式
            document.querySelectorAll('.trend-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${type}`).classList.add('active');
            
            if (!currentTrendData) return;
            
            if (charts.trend) {
                charts.trend.destroy();
            }

            const ctx = document.getElementById('trendChart').getContext('2d');

            // 根据主题设置网格和文字颜色
            const isDaylight = document.documentElement.getAttribute('data-theme') === 'daylight';
            const gridColor = isDaylight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
            const textColor = isDaylight ? '#64748b' : '#94a3b8';

            let datasets = [];

            switch (type) {
                case 'all':
                    // 全部：显示数学排名、英语排名、总分排名三条线
                    datasets = [
                        {
                            label: '数学排名',
                            data: currentTrendData.math,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0,
                            spanGaps: true
                        },
                        {
                            label: '英语排名',
                            data: currentTrendData.eng,
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            tension: 0,
                            spanGaps: true
                        },
                        {
                            label: '总分排名',
                            data: currentTrendData.total,
                            borderColor: '#eab308',
                            backgroundColor: 'rgba(234, 179, 8, 0.1)',
                            tension: 0,
                            spanGaps: true
                        }
                    ];
                    break;
                case 'math':
                    datasets = [{
                        label: '数学排名',
                        data: currentTrendData.math,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0,
                        spanGaps: true
                    }];
                    break;
                case 'eng':
                    datasets = [{
                        label: '英语排名',
                        data: currentTrendData.eng,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0,
                        spanGaps: true
                    }];
                    break;
                case 'total':
                    datasets = [{
                        label: '总分排名',
                        data: currentTrendData.total,
                        borderColor: '#eab308',
                        backgroundColor: 'rgba(234, 179, 8, 0.1)',
                        fill: true,
                        tension: 0,
                        spanGaps: true
                    }];
                    break;
                case 'pct':
                    // 百分比：只显示总分百分比
                    datasets = [
                        {
                            label: '总分百分比',
                            data: currentTrendData.totalPct,
                            borderColor: '#eab308',
                            backgroundColor: 'rgba(234, 179, 8, 0.1)',
                            tension: 0,
                            spanGaps: true
                        }
                    ];
                    break;
            }

            const isRankType = type !== 'pct';

            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: currentTrendData.labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: type === 'all' || type === 'pct',
                            labels: { color: textColor }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                title: function(context) {
                                    const idx = context[0].dataIndex;
                                    const record = currentTrendData.records[idx];
                                    const dateObj = new Date(record.dateDisplay);
                                    const month = dateObj.getMonth() + 1;
                                    const day = dateObj.getDate();
                                    const seqText = record.sequence > 1 ? ` 第${record.sequence}次` : '';
                                    return `${month}月${day}日${seqText}`;
                                },
                                label: function(context) {
                                    const idx = context.dataIndex;
                                    const record = currentTrendData.records[idx];
                                    let label = context.dataset.label || '';
                                    let value = context.parsed.y;
                                    
                                    if (value === null) return null;
                                    
                                    if (type === 'pct' || label.includes('百分比')) {
                                        return `${label}: ${value}%`;
                                    } else {
                                        // 显示排名和分数
                                        let score = '';
                                        if (label.includes('数学')) {
                                            score = record.hasMath ? ` (${record.student.math}分)` : '';
                                        } else if (label.includes('英语')) {
                                            score = record.hasEnglish ? ` (${record.student.english}分)` : '';
                                        } else if (label.includes('总分')) {
                                            score = (record.hasMath && record.hasEnglish) ? ` (${record.student.total}分)` : '';
                                        }
                                        return `${label}: 第${value}名${score}`;
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            reverse: isRankType,
                            grid: { color: gridColor },
                            ticks: {
                                color: textColor,
                                stepSize: 1,
                                precision: 0,
                                callback: function(value) {
                                    if (type === 'pct') {
                                        return value + '%';
                                    }
                                    return value;
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: textColor }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            const historySection = document.getElementById('historySection');
            
            if (!currentStudent) {
                document.getElementById('historyStudentName').textContent = '请先选择学生';
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">选择学生后查看历史记录</p>';
                return;
            }
            
            const studentName = students.find(s => s.key === currentStudent)?.name || '';
            document.getElementById('historyStudentName').textContent = studentName;
            
            const filtered = records.filter(r => r.studentKey === currentStudent);
            
            // 按日期降序、序号降序排序（最新的在最上面）
            filtered.sort((a, b) => {
                if (a.date !== b.date) {
                    return b.date.localeCompare(a.date);
                }
                // 同一天内，序号大的（新的）排在前面
                return (b.sequence || 1) - (a.sequence || 1);
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 30px;">暂无记录</p>';
                return;
            }

            // 按日期分组，并保持组内顺序
            const grouped = {};
            filtered.forEach(r => {
                if (!grouped[r.date]) grouped[r.date] = [];
                grouped[r.date].push(r);
            });

            // 获取日期并降序排序，确保最新的日期在上面
            const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

            // 渲染分组的历史记录
            container.innerHTML = sortedDates.map(date => {
                const groupRecords = grouped[date];
                const firstRecord = groupRecords[0];
                const dateObj = new Date(firstRecord.dateDisplay);
                const month = dateObj.getMonth() + 1;
                const day = dateObj.getDate();
                const dateStr = `${month}月${day}日`;
                
                const itemsHtml = groupRecords.map(r => {
                    const s = r.student;
                    const isCurrentView = currentViewingRecord === r.id;
                    
                    // 科目标签
                    const subjectTags = [];
                    if (r.hasMath) subjectTags.push('<span class="subject-tag math">数学</span>');
                    if (r.hasEnglish) subjectTags.push('<span class="subject-tag english">英语</span>');
                    
                    // 构建成绩显示：单科只显示单科，格式为 成绩+名次
                    const scoresHtml = [];
                    if (r.hasMath) {
                        scoresHtml.push(`<span class="score">🧮 ${s.math}分 (${s.mathRank}/${r.count})</span>`);
                    }
                    if (r.hasEnglish) {
                        scoresHtml.push(`<span class="score">📝 ${s.english}分 (${s.englishRank}/${r.count})</span>`);
                    }
                    // 只有两科都有的才显示总分
                    if (r.hasMath && r.hasEnglish) {
                        scoresHtml.push(`<span class="score">📊 ${s.total}分 (${s.totalRank}/${r.count})</span>`);
                    }
                    
                    // 如果同一天有多次考试，显示序号徽章
                    const seqBadge = groupRecords.length > 1 
                        ? `<span class="sequence-badge">第${r.sequence || 1}次</span>` 
                        : '';
                    
                    return `
                        <div class="history-item ${isCurrentView ? 'current-view' : ''}" onclick="viewRecord('${r.id}')">
                            <div class="info">
                                ${seqBadge}
                                <div class="subject-tags">${subjectTags.join('')}</div>
                                <span class="scores">
                                    ${scoresHtml.join('')}
                                </span>
                            </div>
                            <div class="actions" onclick="event.stopPropagation();">
                                <button class="delete-btn" onclick="deleteRecord('${r.id}')">×</button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                return `
                    <div class="history-group">
                        <div class="history-group-header">
                            <span>${dateStr}</span>
                            <span class="history-group-count">${groupRecords.length}次考试</span>
                        </div>
                        ${itemsHtml}
                    </div>
                `;
            }).join('');
        }

        function viewRecord(id) {
            // 如果点击的是当前已展开的记录，则收起
            if (currentViewingRecord === id) {
                document.getElementById('detailSection').classList.add('hidden');
                currentViewingRecord = null;
                renderHistory(); // 更新高亮状态
                return;
            }
            
            const record = records.find(r => r.id === id);
            if (!record) return;
            
            currentViewingRecord = id;
            showDetail(record);
            renderHistory(); // 更新高亮状态
            document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth' });
        }

        function deleteRecord(id) {
            if (!confirm('确定删除这条记录？')) return;
            records = records.filter(r => r.id !== id);
            localStorage.setItem('ga_records', JSON.stringify(records));
            
            // 如果删除的是当前正在查看的记录，收起详情
            if (currentViewingRecord === id) {
                currentViewingRecord = null;
                document.getElementById('detailSection').classList.add('hidden');
            }
            
            renderHistory();
            renderTrends();
            showToast('✅ 已删除');
            
            // 如果已连接GitHub，自动同步
            const token = localStorage.getItem('ga_github_token');
            const gid = localStorage.getItem('ga_gist_id');
            if (token && gid) {
                syncToGitHub();
            }
        }

        // ==================== GitHub Gist 同步功能 ====================

        function showSyncConnected() {
            document.getElementById('syncSetup').style.display = 'none';
            document.getElementById('syncConnected').style.display = 'block';
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '已连接';
            statusEl.className = 'sync-status connected';
            
            if (gistId) {
                document.getElementById('gistUrl').innerHTML = `
                    🔗 Gist ID: <code>${gistId}</code><br>
                    <a href="https://gist.github.com/${gistId}" target="_blank" style="color: var(--accent-blue);">在 GitHub 查看</a>
                `;
            }
            
            const lastSync = localStorage.getItem('ga_last_sync');
            if (lastSync) {
                document.getElementById('lastSync').textContent = `上次同步: ${new Date(lastSync).toLocaleString()}`;
            }
        }

        function showSyncDisconnected() {
            document.getElementById('syncSetup').style.display = 'block';
            document.getElementById('syncConnected').style.display = 'none';
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '未连接';
            statusEl.className = 'sync-status disconnected';
        }

        async function connectGitHub() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                alert('请输入 GitHub Token');
                return;
            }

            localStorage.setItem('ga_github_token', token);

            try {
                const response = await fetch('https://api.github.com/gists', {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (!response.ok) throw new Error('Token 验证失败');
                
                const gists = await response.json();
                const gradeGist = gists.find(g => g.description === 'Grade Analytics Data');
                
                if (gradeGist) {
                    localStorage.setItem('ga_gist_id', gradeGist.id);
                    gistId = gradeGist.id;  // 更新变量
                    showSyncConnected();
                    showToast('✅ 已连接并恢复数据');
                    await syncFromGitHub();
                } else {
                    if (confirm('未找到现有数据，是否创建新的云端存储？')) {
                        await createGist();
                    } else {
                        showToast('已取消，您可以稍后点击"创建新 Gist"');
                        document.getElementById('createGistBtn').style.display = 'inline-block';
                        showSyncConnected();
                        document.getElementById('gistUrl').innerHTML = '<span style="color: var(--accent-yellow);">⚠️ 请点击"创建新 Gist"初始化云端存储</span>';
                    }
                }
            } catch (err) {
                alert('连接失败: ' + err.message);
                localStorage.removeItem('ga_github_token');
            }
        }

        async function createGist() {
            const token = localStorage.getItem('ga_github_token');
            if (!token) return;

            const data = {
                students: students,
                records: records,
                lastUpdated: new Date().toISOString()
            };

            try {
                const response = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        description: 'Grade Analytics Data',
                        public: false,
                        files: {
                            'grade-data.json': {
                                content: JSON.stringify(data, null, 2)
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error('创建失败');
                
                const result = await response.json();
                gistId = result.id;
                localStorage.setItem('ga_gist_id', gistId);
                githubToken = token; // 确保全局变量设置
                
                document.getElementById('createGistBtn').style.display = 'none';
                showSyncConnected();
                showToast('✅ Gist 创建成功并已连接');
            } catch (err) {
                alert('创建失败: ' + err.message);
            }
        }

        async function syncToGitHub() {
            const token = localStorage.getItem('ga_github_token');
            const id = localStorage.getItem('ga_gist_id');
            
            if (!token || !id) {
                alert('未连接 GitHub');
                return;
            }

            const data = {
                students: students,
                records: records,
                lastUpdated: new Date().toISOString()
            };

            try {
                const response = await fetch(`https://api.github.com/gists/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            'grade-data.json': {
                                content: JSON.stringify(data, null, 2)
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error('同步失败');
                
                const now = new Date().toISOString();
                localStorage.setItem('ga_last_sync', now);
                document.getElementById('lastSync').textContent = `上次同步: ${new Date(now).toLocaleString()}`;
                showToast('✅ 已保存到云端');
            } catch (err) {
                alert('同步失败: ' + err.message);
            }
        }

        async function syncFromGitHub() {
            const token = localStorage.getItem('ga_github_token');
            const id = localStorage.getItem('ga_gist_id');
            
            if (!token || !id) {
                alert('未连接 GitHub');
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/gists/${id}`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!response.ok) throw new Error('获取失败');
                
                const result = await response.json();
                const content = result.files['grade-data.json']?.content;
                
                if (!content) throw new Error('未找到数据文件');
                
                const data = JSON.parse(content);
                
                // 合并数据（云端优先）
                if (data.students) {
                    students = data.students;
                    localStorage.setItem('ga_students', JSON.stringify(students));
                }
                if (data.records) {
                    records = data.records;
                    localStorage.setItem('ga_records', JSON.stringify(records));
                }
                
                const now = new Date().toISOString();
                localStorage.setItem('ga_last_sync', now);
                
                renderStudents();
                renderHistory();
                renderTrends();
                
                document.getElementById('lastSync').textContent = `上次同步: ${new Date(now).toLocaleString()}`;
                showToast('✅ 已从云端恢复');
            } catch (err) {
                alert('恢复失败: ' + err.message);
            }
        }

        function disconnectGitHub() {
            if (!confirm('确定断开连接？本地数据仍会保留。')) return;
            
            localStorage.removeItem('ga_github_token');
            localStorage.removeItem('ga_gist_id');
            localStorage.removeItem('ga_last_sync');
            
            document.getElementById('githubToken').value = '';
            document.getElementById('createGistBtn').style.display = 'none';
            showSyncDisconnected();
            showToast('✅ 已断开连接');
        }

        // ==================== 主题切换 ====================

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'daylight' ? 'dark' : 'daylight';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('ga_theme', newTheme);
            
            updateThemeButton(newTheme);
            
            // 重新渲染图表以适应新主题
            renderTrends();
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('themeBtn');
            if (theme === 'daylight') {
                btn.textContent = '🌙';
            } else {
                btn.textContent = '☀️';
            }
        }

        // 页面加载时恢复主题
        const savedTheme = localStorage.getItem('ga_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeButton(savedTheme);
    </script>
</body>
