<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max 成绩追踪分析系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-orange: #f97316;
            --border-color: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: var(--text-primary);
        }

        .date-title {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--accent-blue);
        }

        /* 上传区域 */
        .upload-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px dashed var(--border-color);
        }

        .upload-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .upload-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            border: 2px solid var(--border-color);
            transition: border-color 0.3s;
        }

        .upload-box:hover {
            border-color: var(--accent-blue);
        }

        .upload-box label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .upload-box input[type="file"] {
            width: 100%;
            padding: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .upload-box .file-status {
            margin-top: 10px;
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 6px;
            display: none;
        }

        .upload-box .file-status.success {
            display: block;
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
        }

        .upload-box .file-status.error {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
            display: block;
            margin: 0 auto;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        /* 统计表格 */
        .stats-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .stats-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-section h2 .icon {
            font-size: 20px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .stats-table th,
        .stats-table td {
            padding: 14px 16px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stats-table th {
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 600;
        }

        .stats-table th.subject-header {
            font-size: 16px;
        }

        .stats-table td.row-label {
            background: var(--bg-card);
            font-weight: 500;
            text-align: left;
            min-width: 120px;
        }

        /* 颜色标记 */
        .cell-avg {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }

        .cell-max {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
        }

        .cell-first {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }

        .cell-orange {
            background: rgba(249, 115, 22, 0.15);
            color: #fdba74;
        }

        .cell-rank {
            background: rgba(234, 179, 8, 0.15);
            color: #fde047;
        }

        .cell-total {
            background: var(--bg-card);
            font-weight: 600;
        }

        /* 排名曲线图 */
        .charts-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .charts-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
        }

        .chart-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 20px;
        }

        .chart-box h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* 数据表格 */
        .data-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .data-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th,
        .data-table td {
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .data-table th {
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .data-table tr:nth-child(even) {
            background: rgba(255,255,255,0.02);
        }

        .data-table tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* 隐藏元素 */
        .hidden {
            display: none !important;
        }

        /* 日期选择器 */
        .date-input {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-input label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .date-input input[type="date"] {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        /* 历史数据管理 */
        .history-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .history-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-tag {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-tag:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .history-tag.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-table {
                font-size: 12px;
            }
            
            .stats-table th,
            .stats-table td {
                padding: 10px 8px;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            margin-left: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Max 成绩追踪分析系统</h1>
        
        <!-- 上传区域 -->
        <div class="upload-section">
            <h2>📁 数据上传</h2>
            <div class="date-input">
                <label for="examDate">考试日期：</label>
                <input type="date" id="examDate" value="">
            </div>
            <div class="upload-grid">
                <div class="upload-box">
                    <label>🧮 数学成绩表 (Excel)</label>
                    <input type="file" id="mathFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="mathStatus"></div>
                </div>
                <div class="upload-box">
                    <label>📝 英语成绩表 (Excel)</label>
                    <input type="file" id="englishFile" accept=".xlsx,.xls,.csv" />
                    <div class="file-status" id="englishStatus"></div>
                </div>
            </div>
            <div class="upload-grid" style="margin-top: 15px;">
                <div class="upload-box" style="border-color: #eab308;">
                    <label>🎯 Max 今日编号</label>
                    <input type="text" id="maxStudentId" placeholder="例如: B078" style="width: 100%; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-size: 14px;" />
                    <div style="margin-top: 8px; font-size: 12px; color: var(--text-secondary);">每天Max的编号不同，请输入当天的编号</div>
                </div>
            </div>
            <button class="btn-primary" id="analyzeBtn" onclick="analyzeData()">🚀 开始分析</button>
        </div>

        <!-- 今日统计 -->
        <div id="todayStats" class="hidden">
            <div class="date-title" id="displayDate">20260407</div>
            
            <div class="stats-section">
                <h2><span class="icon">📈</span> 统计分析</h2>
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th class="subject-header">数学</th>
                            <th class="subject-header">英语</th>
                            <th class="subject-header">总分</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="row-label">满分</td>
                            <td>100</td>
                            <td>100</td>
                            <td class="cell-total">200</td>
                        </tr>
                        <tr>
                            <td class="row-label">平均分</td>
                            <td class="cell-avg" id="mathAvg">-</td>
                            <td class="cell-avg" id="englishAvg">-</td>
                            <td class="cell-total" id="totalAvg">-</td>
                        </tr>
                        <tr>
                            <td class="row-label">单项最高</td>
                            <td class="cell-max" id="mathMax">-</td>
                            <td class="cell-max" id="englishMax">-</td>
                            <td class="cell-total">-</td>
                        </tr>
                        <tr>
                            <td class="row-label">本次第一</td>
                            <td class="cell-first" id="mathFirst">-</td>
                            <td class="cell-first" id="englishFirst">-</td>
                            <td class="cell-total cell-first" id="totalFirst">-</td>
                        </tr>
                        <tr style="height: 15px;"><td colspan="4"></td></tr>
                        <tr>
                            <td class="row-label">Max</td>
                            <td class="cell-orange" id="mathMaxScore">-</td>
                            <td class="cell-orange" id="englishMaxScore">-</td>
                            <td class="cell-total cell-orange" id="totalMaxScore">-</td>
                        </tr>
                        <tr style="height: 15px;"><td colspan="4"></td></tr>
                        <tr>
                            <td class="row-label">绝对名次</td>
                            <td class="cell-rank" id="mathAbsRank">-</td>
                            <td class="cell-rank" id="englishAbsRank">-</td>
                            <td class="cell-total cell-rank" id="totalAbsRank">-</td>
                        </tr>
                        <tr>
                            <td class="row-label">百分比名次</td>
                            <td class="cell-rank" id="mathPctRank">-</td>
                            <td class="cell-rank" id="englishPctRank">-</td>
                            <td class="cell-total cell-rank" id="totalPctRank">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 趋势图表 -->
            <div class="charts-section">
                <h2><span class="icon">📉</span> 排名趋势（2周）</h2>
                <div class="charts-grid">
                    <div class="chart-box">
                        <h3>数学排名趋势 - 绝对名次</h3>
                        <div class="chart-container">
                            <canvas id="mathAbsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <h3>英语排名趋势 - 绝对名次</h3>
                        <div class="chart-container">
                            <canvas id="englishAbsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <h3>总分排名趋势 - 绝对名次</h3>
                        <div class="chart-container">
                            <canvas id="totalAbsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <h3>各科目百分比名次趋势</h3>
                        <div class="chart-container">
                            <canvas id="pctChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 详细数据 -->
            <div class="data-section">
                <h2><span class="icon">📋</span> 完整数据</h2>
                <div class="data-table-wrapper">
                    <table class="data-table" id="fullDataTable">
                        <thead>
                            <tr>
                                <th>考试号码</th>
                                <th>数学</th>
                                <th>数学排名</th>
                                <th>英语</th>
                                <th>英语排名</th>
                                <th>总分</th>
                                <th>总分排名</th>
                                <th>总分百分比</th>
                            </tr>
                        </thead>
                        <tbody id="fullDataBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 历史数据 -->
        <div class="history-section">
            <h2>📚 历史数据</h2>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <div class="icon">📝</div>
                    <p>暂无历史数据，请先上传成绩表</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局数据存储
        let currentData = null;
        let historyData = JSON.parse(localStorage.getItem('gradeHistory') || '[]');
        let charts = {};

        // 初始化日期为今天
        document.getElementById('examDate').value = new Date().toISOString().split('T')[0];

        // 文件上传处理
        document.getElementById('mathFile').addEventListener('change', function(e) {
            handleFileUpload(e, 'math');
        });

        document.getElementById('englishFile').addEventListener('change', function(e) {
            handleFileUpload(e, 'english');
        });

        function handleFileUpload(e, type) {
            const file = e.target.files[0];
            const statusEl = document.getElementById(type + 'Status');
            
            if (file) {
                statusEl.textContent = `✅ 已选择: ${file.name}`;
                statusEl.className = 'file-status success';
            } else {
                statusEl.style.display = 'none';
            }
        }

        // 读取Excel文件
        function readExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        resolve(jsonData);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // 解析数学成绩表（多列横向格式）
        function parseMathData(excelData) {
            const result = [];
            // 从第2行开始（跳过标题）
            for (let i = 1; i < excelData.length; i++) {
                const row = excelData[i];
                if (!row) continue;
                
                // 每行有4组数据 (学号, 分数, null, 学号, 分数...)
                for (let j = 0; j < 12; j += 3) {
                    const examId = row[j] ? String(row[j]).trim() : null;
                    const score = row[j + 1];
                    
                    if (examId && score && !isNaN(parseFloat(score))) {
                        result.push({ examId, score: parseFloat(score), subject: 'math' });
                    }
                }
            }
            return result;
        }

        // 解析英语成绩表（分营格式）
        function parseEnglishData(excelData) {
            const result = [];
            // 从第4行开始（跳过标题和表头）
            for (let i = 3; i < excelData.length; i++) {
                const row = excelData[i];
                if (!row) continue;
                
                // 四营数据: A营(0,1), B营(3,4), C营(6,7), D营(9,10)
                const camps = [[0, 1], [3, 4], [6, 7], [9, 10]];
                for (const [idIdx, scoreIdx] of camps) {
                    const examId = row[idIdx] ? String(row[idIdx]).trim() : null;
                    const score = row[scoreIdx];
                    
                    if (examId && score && !isNaN(parseFloat(score))) {
                        result.push({ examId, score: parseFloat(score), subject: 'english' });
                    }
                }
            }
            return result;
        }

        // 分析数据
        async function analyzeData() {
            const mathFile = document.getElementById('mathFile').files[0];
            const englishFile = document.getElementById('englishFile').files[0];
            const examDate = document.getElementById('examDate').value;
            const maxStudentId = document.getElementById('maxStudentId').value.trim();

            if (!mathFile || !englishFile) {
                alert('请同时上传数学和英语成绩表！');
                return;
            }

            if (!maxStudentId) {
                alert('请输入Max今日的编号！');
                return;
            }

            try {
                // 读取两个文件
                const [mathExcel, englishExcel] = await Promise.all([
                    readExcel(mathFile),
                    readExcel(englishFile)
                ]);

                // 解析数据
                const mathData = parseMathData(mathExcel);
                const englishData = parseEnglishData(englishExcel);

                // 合并数据
                const mergedData = mergeData(mathData, englishData, maxStudentId);
                
                if (!mergedData.maxStudent) {
                    alert(`未找到编号为 ${maxStudentId} 的学生，请检查输入是否正确！`);
                    return;
                }
                
                // 计算统计
                const stats = calculateStats(mergedData);
                
                // 保存到历史
                const record = {
                    date: examDate.replace(/-/g, ''),
                    dateDisplay: examDate,
                    maxStudentId: maxStudentId,
                    data: mergedData.students,
                    maxStudent: mergedData.maxStudent,
                    stats: stats,
                    timestamp: Date.now()
                };
                
                // 检查是否已存在同日期数据
                const existingIndex = historyData.findIndex(h => h.date === record.date);
                if (existingIndex >= 0) {
                    historyData[existingIndex] = record;
                } else {
                    historyData.push(record);
                }
                
                // 按日期排序
                historyData.sort((a, b) => a.date.localeCompare(b.date));
                
                // 只保留最近14天
                if (historyData.length > 14) {
                    historyData = historyData.slice(-14);
                }
                
                localStorage.setItem('gradeHistory', JSON.stringify(historyData));
                
                // 显示结果
                currentData = record;
                displayResults(record);
                updateHistoryList();
                
            } catch (err) {
                console.error(err);
                alert('解析失败: ' + err.message);
            }
        }

        // 合并数学和英语数据
        function mergeData(mathData, englishData, maxStudentId) {
            const map = new Map();
            
            // 添加数学成绩
            mathData.forEach(item => {
                map.set(item.examId, { examId: item.examId, math: item.score, english: null });
            });
            
            // 添加英语成绩
            englishData.forEach(item => {
                if (map.has(item.examId)) {
                    map.get(item.examId).english = item.score;
                } else {
                    map.set(item.examId, { examId: item.examId, math: null, english: item.score });
                }
            });
            
            // 转为数组并计算总分（只保留两科都有的学生）
            const result = Array.from(map.values()).filter(item => 
                item.math !== null && item.english !== null
            );
            
            result.forEach(item => {
                item.total = item.math + item.english;
            });
            
            // 计算排名
            const totalCount = result.length;
            
            // 数学排名
            const mathSorted = [...result].sort((a, b) => b.math - a.math);
            mathSorted.forEach((item, index) => {
                const target = result.find(r => r.examId === item.examId);
                target.mathRank = index + 1;
                target.mathPct = ((index + 1) / totalCount * 100).toFixed(2);
            });
            
            // 英语排名
            const englishSorted = [...result].sort((a, b) => b.english - a.english);
            englishSorted.forEach((item, index) => {
                const target = result.find(r => r.examId === item.examId);
                target.englishRank = index + 1;
                target.englishPct = ((index + 1) / totalCount * 100).toFixed(2);
            });
            
            // 总分排名
            const totalSorted = [...result].sort((a, b) => b.total - a.total);
            totalSorted.forEach((item, index) => {
                const target = result.find(r => r.examId === item.examId);
                target.totalRank = index + 1;
                target.totalPct = ((index + 1) / totalCount * 100).toFixed(2);
            });
            
            // 找到Max学生
            const maxStudent = result.find(r => r.examId === maxStudentId);
            
            return {
                students: result.sort((a, b) => a.totalRank - b.totalRank),
                maxStudent: maxStudent || null,
                totalCount
            };
        }

        // 计算统计数据
        function calculateStats(mergedData) {
            const { students, maxStudent, totalCount } = mergedData;
            if (students.length === 0) return null;
            
            const mathScores = students.map(d => d.math);
            const englishScores = students.map(d => d.english);
            const totalScores = students.map(d => d.total);
            
            // 第一名学生
            const topStudent = students.reduce((max, curr) => curr.total > max.total ? curr : max);
            
            // 计算Max的Max指标（假设Max的目标是前10%学生的平均分）
            const top10Percent = Math.ceil(students.length * 0.1);
            const topMathAvg = mathScores.slice(0, top10Percent).reduce((a, b) => a + b, 0) / top10Percent;
            const topEngAvg = englishScores.slice(0, top10Percent).reduce((a, b) => a + b, 0) / top10Percent;
            
            return {
                count: totalCount,
                math: {
                    avg: (mathScores.reduce((a, b) => a + b, 0) / totalCount).toFixed(1),
                    max: Math.max(...mathScores),
                    first: topStudent.math
                },
                english: {
                    avg: (englishScores.reduce((a, b) => a + b, 0) / totalCount).toFixed(1),
                    max: Math.max(...englishScores),
                    first: topStudent.english
                },
                total: {
                    avg: (totalScores.reduce((a, b) => a + b, 0) / totalCount).toFixed(1),
                    first: topStudent.total
                },
                // Max 指标（前10%平均分）
                mathMaxTarget: Math.round(topMathAvg),
                englishMaxTarget: Math.round(topEngAvg),
                totalMaxTarget: Math.round(topMathAvg + topEngAvg),
                // Max学生数据
                maxStudent: maxStudent
            };
        }

        // 显示结果
        function displayResults(record) {
            document.getElementById('todayStats').classList.remove('hidden');
            document.getElementById('displayDate').textContent = record.date;
            
            const stats = record.stats;
            const maxStudent = record.maxStudent || stats.maxStudent;
            
            // 填充统计表
            document.getElementById('mathAvg').textContent = stats.math.avg;
            document.getElementById('englishAvg').textContent = stats.english.avg;
            document.getElementById('totalAvg').textContent = stats.total.avg;
            
            document.getElementById('mathMax').textContent = stats.math.max;
            document.getElementById('englishMax').textContent = stats.english.max;
            
            document.getElementById('mathFirst').textContent = stats.math.first;
            document.getElementById('englishFirst').textContent = stats.english.first;
            document.getElementById('totalFirst').textContent = stats.total.first;
            
            document.getElementById('mathMaxScore').textContent = stats.mathMaxTarget;
            document.getElementById('englishMaxScore').textContent = stats.englishMaxTarget;
            document.getElementById('totalMaxScore').textContent = stats.totalMaxTarget;
            
            // Max学生的排名数据
            if (maxStudent) {
                document.getElementById('mathAbsRank').textContent = `${maxStudent.mathRank}/${stats.count}`;
                document.getElementById('englishAbsRank').textContent = `${maxStudent.englishRank}/${stats.count}`;
                document.getElementById('totalAbsRank').textContent = `${maxStudent.totalRank}/${stats.count}`;
                
                document.getElementById('mathPctRank').textContent = maxStudent.mathPct + '%';
                document.getElementById('englishPctRank').textContent = maxStudent.englishPct + '%';
                document.getElementById('totalPctRank').textContent = maxStudent.totalPct + '%';
            }
            
            // 填充详细数据表
            const tbody = document.getElementById('fullDataBody');
            tbody.innerHTML = record.data.map(d => {
                const isMax = d.examId === (record.maxStudentId || (record.maxStudent && record.maxStudent.examId));
                return `
                <tr style="${isMax ? 'background: rgba(234, 179, 8, 0.2) !important;' : ''}">
                    <td>${d.examId} ${isMax ? '👤' : ''}</td>
                    <td>${d.math}</td>
                    <td>${d.mathRank}</td>
                    <td>${d.english}</td>
                    <td>${d.englishRank}</td>
                    <td><strong>${d.total}</strong></td>
                    <td><strong>${d.totalRank}</strong></td>
                    <td>${d.totalPct}%</td>
                </tr>
            `}).join('');
            
            // 渲染图表
            renderCharts();
        }

        // 渲染图表
        function renderCharts() {
            // 准备历史数据（最近14天）
            const dates = historyData.map(h => h.date.slice(4, 6) + '/' + h.date.slice(6, 8));
            
            // Max的排名数据
            const mathRanks = historyData.map(h => h.maxStudent?.mathRank || 0);
            const englishRanks = historyData.map(h => h.maxStudent?.englishRank || 0);
            const totalRanks = historyData.map(h => h.maxStudent?.totalRank || 0);
            const mathPcts = historyData.map(h => parseFloat(h.maxStudent?.mathPct || 0));
            const englishPcts = historyData.map(h => parseFloat(h.maxStudent?.englishPct || 0));
            const totalPcts = historyData.map(h => parseFloat(h.maxStudent?.totalPct || 0));
            
            // 销毁旧图表
            Object.values(charts).forEach(c => c.destroy());
            
            // 数学绝对名次趋势
            charts.mathAbs = new Chart(document.getElementById('mathAbsChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '数学排名',
                        data: mathRanks,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            reverse: true, // 排名越小越好
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
            
            // 英语绝对名次趋势
            charts.englishAbs = new Chart(document.getElementById('englishAbsChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '英语排名',
                        data: englishRanks,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            reverse: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
            
            // 总分绝对名次趋势
            charts.totalAbs = new Chart(document.getElementById('totalAbsChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '总分排名',
                        data: totalRanks,
                        borderColor: '#eab308',
                        backgroundColor: 'rgba(234, 179, 8, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            reverse: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
            
            // 百分比名次趋势（三科对比）
            charts.pct = new Chart(document.getElementById('pctChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '数学',
                            data: mathPcts,
                            borderColor: '#3b82f6',
                            backgroundColor: 'transparent',
                            tension: 0.4
                        },
                        {
                            label: '英语',
                            data: englishPcts,
                            borderColor: '#22c55e',
                            backgroundColor: 'transparent',
                            tension: 0.4
                        },
                        {
                            label: '总分',
                            data: totalPcts,
                            borderColor: '#eab308',
                            backgroundColor: 'transparent',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#94a3b8' }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { 
                                color: '#94a3b8',
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        // 更新历史列表
        function updateHistoryList() {
            const list = document.getElementById('historyList');
            
            if (historyData.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <p>暂无历史数据，请先上传成绩表</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = historyData.map(h => `
                <div class="history-tag ${currentData?.date === h.date ? 'active' : ''}" 
                     onclick="loadHistory('${h.date}')">
                    ${h.dateDisplay}
                </div>
            `).join('');
        }

        // 加载历史数据
        function loadHistory(date) {
            const record = historyData.find(h => h.date === date);
            if (record) {
                currentData = record;
                displayResults(record);
                updateHistoryList();
            }
        }

        // 初始化
        updateHistoryList();
    </script>
</body>
</html>
