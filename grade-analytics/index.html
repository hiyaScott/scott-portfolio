<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩追踪系统</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            display: block;
            padding: 20px 30px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s;
            border: 1px solid var(--bg-card);
        }

        .menu-item:hover {
            background: var(--bg-card);
            transform: translateY(-2px);
        }

        .menu-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .menu-item .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .menu-item .desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .menu-item.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .menu-item.primary:hover {
            opacity: 0.9;
        }

        .menu-item.primary .desc {
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 成绩追踪系统</h1>
        <p class="subtitle">追踪学生成绩，生成分析报告</p>

        <div class="menu">
            <a href="admin/" class="menu-item primary">
                <div class="icon">⚙️</div>
                <div class="title">管理后台</div>
                <div class="desc">录入成绩、管理学生、查看分析</div>
            </a>

            <a href="students/" class="menu-item">
                <div class="icon">📊</div>
                <div class="title">结果页面</div>
                <div class="desc">查看学生成绩趋势（需先在管理后台选择学生）</div>
            </a>
        </div>
    </div>
</body>
</html>
