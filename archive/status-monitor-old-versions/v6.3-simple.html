<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Jetton 认知负载监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header .subtitle { color: #666; font-size: 14px; }
        .version {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 15px;
        }
        
        .status-card {
            background: linear-gradient(180deg, rgba(35,35,50,0.95) 0%, rgba(25,25,40,0.98) 100%);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }
        .score-display {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
        }
        .score-display.idle { color: #22c55e; }
        .score-display.low { color: #3b82f6; }
        .score-display.medium { color: #eab308; }
        .score-display.high { color: #ef4444; }
        .status-text { font-size: 18px; margin-bottom: 10px; }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .metric {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .metric-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .metric-value { font-size: 20px; font-weight: bold; }
        
        .task-section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .task-section h3 { margin-bottom: 15px; color: #aaa; }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .task-name { font-weight: 500; }
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .task-status.processing { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .task-status.waiting { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .task-status.idle { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        
        .update-time { text-align: center; color: #666; font-size: 12px; margin-top: 20px; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
        
        @media (max-width: 600px) {
            .metrics { grid-template-columns: repeat(3, 1fr); }
            .score-display { font-size: 56px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Shrimp Jetton</h1>
            <div class="subtitle">认知负载实时监控</div>
            <div class="version">v6.3 - 与主页同源</div>
        </div>
        
        <div class="status-card">
            <div id="loadingText">正在获取数据...</div>
            <div id="mainDisplay" style="display:none;">
                <div class="status-text" id="statusText">空闲</div>
                <div class="score-display idle" id="scoreDisplay">0%</div>
            </div>
            <div class="error" id="errorDisplay" style="display:none;"></div>
        </div>
        
        <div class="metrics">
            <div class="metric"><div class="metric-label">活跃会话</div><div class="metric-value" id="sessionsVal">--</div></div>
            <div class="metric"><div class="metric-label">等待中</div><div class="metric-value" id="pendingVal">--</div></div>
            <div class="metric"><div class="metric-label">处理中</div><div class="metric-value" id="processingVal">--</div></div>
            <div class="metric"><div class="metric-label">Token数</div><div class="metric-value" id="tokensVal">--</div></div>
            <div class="metric"><div class="metric-label">预估等待</div><div class="metric-value" id="estVal">--</div></div>
        </div>
        
        <div class="task-section">
            <h3>📋 当前任务队列</h3>
            <div id="taskList"><div style="color:#666;padding:20px;text-align:center;">加载中...</div></div>
        </div>
        
        <div class="update-time" id="updateTime"></div>
    </div>

<script>
// v6.3: 使用和主页完全相同的数据获取方式

// 关键：使用相对路径 ./cognitive-data.json (不是 ./status-monitor/...)
// 因为监控页面在 status-monitor/ 目录下，所以相对路径就是当前目录
var DATA_URL = './cognitive-data.json';

// 获取状态信息
function getStatusInfo(score) {
    if (score >= 75) return { text: '高负载', className: 'high', color: '#ef4444' };
    if (score >= 50) return { text: '中等负载', className: 'medium', color: '#eab308' };
    if (score >= 25) return { text: '轻负载', className: 'low', color: '#3b82f6' };
    return { text: '空闲', className: 'idle', color: '#22c55e' };
}

// 更新UI
function updateUI(data) {
    document.getElementById('loadingText').style.display = 'none';
    document.getElementById('errorDisplay').style.display = 'none';
    document.getElementById('mainDisplay').style.display = 'block';
    
    var score = data.cognitive_score || 0;
    var info = getStatusInfo(score);
    
    var scoreEl = document.getElementById('scoreDisplay');
    scoreEl.textContent = score + '%';
    scoreEl.className = 'score-display ' + info.className;
    
    document.getElementById('statusText').textContent = info.text;
    document.getElementById('statusText').style.color = info.color;
    
    document.getElementById('sessionsVal').textContent = data.active_sessions || 0;
    document.getElementById('pendingVal').textContent = data.pending_count || 0;
    document.getElementById('processingVal').textContent = data.processing_count || 0;
    document.getElementById('tokensVal').textContent = data.total_tokens_formatted || '0';
    
    var queue = (data.processing_count || 0) + (data.pending_count || 0);
    var estText = '立即';
    if (queue === 1) estText = '~30秒';
    else if (queue === 2) estText = '~1分钟';
    else if (queue > 2) estText = '~' + Math.ceil(queue * 0.5) + '分钟';
    document.getElementById('estVal').textContent = estText;
    
    var tasks = data.task_queue || [];
    var taskList = document.getElementById('taskList');
    if (tasks.length === 0) {
        taskList.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">✅ 无活跃任务</div>';
    } else {
        var html = '';
        for (var i = 0; i < tasks.length; i++) {
            var task = tasks[i];
            var statusClass = 'idle';
            var statusText = '已回复';
            var taskStatus = task.status || '';
            
            if (taskStatus.indexOf('处理') !== -1 || taskStatus.indexOf('🔄') !== -1) {
                statusClass = 'processing';
                statusText = '处理中';
            } else if (taskStatus.indexOf('等待') !== -1 || taskStatus.indexOf('⏳') !== -1) {
                statusClass = 'waiting';
                statusText = '等待中';
            }
            
            html += '<div class="task-item">' +
                '<span class="task-name">' + (task.label || '💭 任务') + '</span>' +
                '<span class="task-status ' + statusClass + '"\u003e' + statusText + '</span>' +
                '</div>';
        }
        taskList.innerHTML = html;
    }
    
    document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
}

// 显示错误
function showError(msg) {
    document.getElementById('loadingText').style.display = 'none';
    document.getElementById('mainDisplay').style.display = 'none';
    document.getElementById('errorDisplay').style.display = 'block';
    document.getElementById('errorDisplay').textContent = '错误: ' + msg;
}

// 获取数据 - 使用和主页相同的方式
async function fetchData() {
    try {
        console.log('[v6.3] Fetching from:', DATA_URL);
        var response = await fetch(DATA_URL + '?t=' + Date.now(), {
            method: 'GET',
            cache: 'no-cache'
        });
        
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        
        var data = await response.json();
        console.log('[v6.3] Data received:', data);
        
        updateUI(data);
        
    } catch (err) {
        console.error('[v6.3] Error:', err);
        showError(err.message);
    }
}

// 启动
document.addEventListener('DOMContentLoaded', function() {
    console.log('[v6.3] Starting...');
    fetchData();
    setInterval(fetchData, 30000); // 30秒刷新
});
</script>
</body>
</html>
