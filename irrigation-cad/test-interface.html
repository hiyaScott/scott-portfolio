<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灌溉CAD设计系统 - 测试界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: #1e293b;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #f8fafc; }
        .header .version { font-size: 12px; color: #64748b; }
        .main {
            display: flex;
            height: calc(100vh - 60px);
        }
        .sidebar {
            width: 320px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 20px;
            overflow-y: auto;
        }
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 13px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
        }
        .btn:hover { background: #2563eb; }
        .btn.secondary {
            background: #334155;
        }
        .btn.secondary:hover { background: #475569; }
        .btn.success {
            background: #10b981;
        }
        .btn.success:hover { background: #059669; }
        .canvas-area {
            flex: 1;
            position: relative;
            background: #0f172a;
            overflow: hidden;
        }
        #canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        .canvas-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
        }
        .canvas-controls button {
            padding: 6px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #e2e8f0;
            font-size: 12px;
            cursor: pointer;
        }
        .canvas-controls button:hover {
            background: #334155;
        }
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        .stats-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            min-width: 200px;
            display: none;
        }
        .stats-panel.visible { display: block; }
        .stats-panel h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #f8fafc;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cbd5e1;
        }
        .zone-list {
            margin-top: 8px;
        }
        .zone-item {
            padding: 8px;
            background: #0f172a;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .zone-item .zone-name {
            font-weight: 500;
            color: #f8fafc;
        }
        .zone-item .zone-detail {
            color: #64748b;
            margin-top: 2px;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #64748b;
        }
        .mode-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }
        .mode-selector button {
            flex: 1;
            padding: 8px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
        }
        .mode-selector button.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-input-label {
            display: block;
            padding: 10px;
            background: #0f172a;
            border: 2px dashed #334155;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
        }
        .file-input-label:hover {
            border-color: #3b82f6;
            color: #94a3b8;
        }
    </style>
</head>

    </div>
    
    <div class="main">

            <div class="panel-title" style="margin-top: 20px;">设计参数</div>

            </div>
            
            <div class="panel-title" style="margin-top: 20px;">区域识别</div>
            
            <div class="mode-selector">
                <button class="active" onclick="setMode('green')">绿化</button>
                <button onclick="setMode('forbidden')">禁区</button>

            </div>
            
            <div class="zone-list" id="zoneList">

            </div>
            
            <div class="panel-title" style="margin-top: 20px;">操作</div>
            
            <button class="btn" onclick="runAlgorithm()">

            </button>
            
            <button class="btn success" onclick="exportResults()">

            </button>
            
            <button class="btn secondary" onclick="clearAll()">

            </button>
        </div>
        
        <div class="canvas-area">
            <canvas id="canvas" width="900" height="700"></canvas>
            
            <div class="canvas-controls">

                <button onclick="toggleGrid()">网格</button>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #22c55e;"></div>
                    <span>绿化区域</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ef4444;"></div>
                    <span>禁区(房屋)</span>

                <div class="legend-item">
                    <div class="legend-color" style="background: #64748b;"></div>

                <div class="legend-item">
                    <div class="legend-color" style="background: #3b82f6;"></div>
                    <span>主管</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #06b6d4;"></div>

                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f59e0b;"></div>

            </div>
        </div>
    </div>

        // ============== 坐标转换 ==============
        function worldToCanvas(x, y) {
            return {
                x: (x - 400000) * scale + canvas.width / 2 + offsetX,
                y: (y + 180000) * scale + canvas.height / 2 + offsetY
            };
        }
        
        // ============== 绘制函数 ==============
        function drawGrid() {
            if (!showGrid) return;
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            const gridSize = 10000 * scale;
            const startX = ((offsetX + canvas.width / 2) % gridSize);
            const startY = ((offsetY + canvas.height / 2) % gridSize);
            
            for (let x = startX; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = startY; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        function drawZone(zone, color) {
            if (!zone.points || zone.points.length < 3) return;
            ctx.fillStyle = color + '30';
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            const start = worldToCanvas(zone.points[0][0], zone.points[0][1]);
            ctx.moveTo(start.x, start.y);
            
            for (let i = 1; i < zone.points.length; i++) {
                const p = worldToCanvas(zone.points[i][0], zone.points[i][1]);
                ctx.lineTo(p.x, p.y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // 标签
            const center = getPolygonCenter(zone.points);
            const c = worldToCanvas(center.x, center.y);
            ctx.fillStyle = color;
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(zone.id || 'Zone', c.x, c.y);
        }
        
        function getPolygonCenter(points) {
            let x = 0, y = 0;
            for (const p of points) {
                x += p[0];
                y += p[1];
            }
            return {x: x / points.length, y: y / points.length};
        }
        
        function drawSprinkler(s) {
            const p = worldToCanvas(s.x, s.y);
            
            // 射程圆
            const range = getSprinklerRange(s.type);
            ctx.strokeStyle = '#f59e0b40';
            ctx.fillStyle = '#f59e0b15';
            ctx.beginPath();
            ctx.arc(p.x, p.y, range * 1000 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // 喷头点
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // 标签
            ctx.fillStyle = '#fbbf24';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(s.type, p.x, p.y - 8);
        }
        
        function getSprinklerRange(type) {
            const ranges = {
                'KXF-8': 2.7,
                'KVF-10': 3.4,
                'KVF-12': 3.7,
                'KVF-15': 5.0,
                'KVF-17': 5.5
            };
            return ranges[type] || 3.0;
        }
        
        function drawValve(v) {
            const p = worldToCanvas(v.x, v.y);
            ctx.fillStyle = '#ec4899';
            ctx.strokeStyle = '#f472b6';
            ctx.lineWidth = 2;
            
            // 画阀门符号（菱形）
            const size = 8;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - size);
            ctx.lineTo(p.x + size, p.y);
            ctx.lineTo(p.x, p.y + size);
            ctx.lineTo(p.x - size, p.y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#f9a8d4';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(v.id || 'V', p.x, p.y + 18);
        }
        
        function drawWaterSource() {
            const sx = parseFloat(document.getElementById('sourceX').value);
            const sy = parseFloat(document.getElementById('sourceY').value);
            const p = worldToCanvas(sx, sy);
            
            ctx.fillStyle = '#a855f7';
            ctx.strokeStyle = '#c084fc';
            ctx.lineWidth = 2;
            
            // 画水源符号（圆形带波浪）
            ctx.beginPath();
            ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#e9d5ff';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('水源', p.x, p.y - 14);
        }
        
        function drawPipe(path, color, width = 2) {
            if (!path || path.length < 2) return;
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            const start = worldToCanvas(path[0][0], path[0][1]);
            ctx.moveTo(start.x, start.y);
            
            for (let i = 1; i < path.length; i++) {
                const p = worldToCanvas(path[i][0], path[i][1]);
                ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
        }
        
        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            
            // 绘制区域
            for (const zone of zones) {
                const colors = {
                    'green': '#22c55e',
                    'forbidden': '#ef4444',
                    'hard': '#64748b'
                };
                drawZone(zone, colors[zone.zone_type] || '#94a3b8');
            }
            
            // 绘制管路
            if (mainPipe) {
                drawPipe(mainPipe, '#3b82f6', 4);
            }
            for (const bp of branchPipes) {
                drawPipe(bp, '#06b6d4', 2);
            }
            
            // 绘制水源
            drawWaterSource();
            
            // 绘制阀门
            for (const v of valves) {
                drawValve(v);
            }
            
            // 绘制喷头
            for (const s of sprinklers) {
                drawSprinkler(s);
            }
        }
        
        // ============== 交互控制 ==============
        function zoomIn() {
            scale *= 1.3;
            drawAll();
        }
        
        function zoomOut() {
            scale /= 1.3;
            drawAll();
        }
        
        function resetView() {
            scale = 0.08;
            offsetX = 0;
            offsetY = 0;
            drawAll();
        }
        
        function toggleGrid() {
            showGrid = !showGrid;
            drawAll();
        }
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-selector button').forEach(b => {
                b.classList.toggle('active', false);
            });
            event.target.classList.toggle('active', true);
        }
        
        // 鼠标拖动
        let isDragging = false;
        let dragStartX, dragStartY;
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX - offsetX;
            dragStartY = e.clientY - offsetY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                offsetX = e.clientX - dragStartX;
                offsetY = e.clientY - dragStartY;
                drawAll();
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= factor;
            drawAll();
        });
        
        // ============== 功能函数 ==============
        function loadTestData() {
            // 清空现有数据
            zones = [];
            sprinklers = [];
            valves = [];
            mainPipe = null;
            branchPipes = [];
            
            // 加载测试数据
            for (const z of TEST_DATA.greenZones) {
                zones.push({
                    id: z.id,
                    points: z.points,
                    zone_type: 'green',
                    plant_type: 'lawn'
                });
            }
            
            for (const s of TEST_DATA.sprinklers) {
                sprinklers.push({...s});
            }
            
            for (const v of TEST_DATA.valves) {
                valves.push({...v});
            }
            
            // 更新区域列表UI
            updateZoneList();
            
            // 重置视图并绘制
            resetView();
            
            document.getElementById('fileLabel').innerHTML = 
                '✅ 已加载 4.16 图纸测试数据<br><small>57个喷头，4个绿化区域</small>';
        }
        
        function updateZoneList() {
            const list = document.getElementById('zoneList');
            list.innerHTML = '';
            for (const zone of zones) {
                const div = document.createElement('div');
                div.className = 'zone-item';
                const typeNames = {green: '绿化', forbidden: '禁区', hard: '硬化'};
                div.innerHTML = `
                    <div class="zone-name">${zone.id} (${typeNames[zone.zone_type] || zone.zone_type})</div>
                    <div class="zone-detail">${zone.points.length} 个顶点</div>
                `;
                list.appendChild(div);
            }
        }
        
        // 简单的管路规划算法（前端简化版）
        function runAlgorithm() {
            const waterFlow = parseFloat(document.getElementById('waterFlow').value);
            const sourceX = parseFloat(document.getElementById('sourceX').value);
            const sourceY = parseFloat(document.getElementById('sourceY').value);
            
            // 清空之前的结果
            mainPipe = null;
            branchPipes = [];
            valves = [];
            
            // 1. 找到所有绿化区的中心点
            const zoneCenters = [];
            for (const zone of zones.filter(z => z.zone_type === 'green')) {
                const center = getPolygonCenter(zone.points);
                zoneCenters.push({zone, center});
            }
            
            // 2. 规划主管：从水源连接各绿化区中心
            const mainPath = [[sourceX, sourceY]];
            
            // 按距离水源远近排序
            zoneCenters.sort((a, b) => {
                const da = Math.hypot(a.center.x - sourceX, a.center.y - sourceY);
                const db = Math.hypot(b.center.x - sourceX, b.center.y - sourceY);
                return da - db;
            });
            
            for (const {center} of zoneCenters) {
                mainPath.push([center.x, center.y]);
            }
            
            mainPipe = mainPath;
            
            // 3. 为每个绿化区规划支管和阀门
            let valveCount = 0;
            const sprinklerFlows = {
                'KXF-8': 0.54,
                'KVF-10': 0.56,
                'KVF-12': 0.66,
                'KVF-15': 0.69,
                'KVF-17': 0.71
            };
            
            for (const {zone, center} of zoneCenters) {
                // 找到该区域的喷头
                const zoneSprinklers = sprinklers.filter(s => 
                    pointInPolygon([s.x, s.y], zone.points)
                );
                
                if (zoneSprinklers.length === 0) continue;
                
                // 按喷头类型分组
                const groups = {};
                for (const s of zoneSprinklers) {
                    if (!groups[s.type]) groups[s.type] = [];
                    groups[s.type].push(s);
                }
                
                // 为每组喷头放置阀门和支管
                for (const [type, group] of Object.entries(groups)) {
                    const flowPerSprinkler = sprinklerFlows[type] || 0.6;
                    const maxPerValve = Math.floor(waterFlow / flowPerSprinkler);
                    
                    // 如果喷头数量超过流量限制，拆分多个阀门
                    for (let i = 0; i < group.length; i += maxPerValve) {
                        const subGroup = group.slice(i, i + maxPerValve);
                        
                        // 阀门位置：绿化区边缘靠近主管处
                        const valvePos = {
                            id: `V${++valveCount}`,
                            x: center.x + (Math.random() - 0.5) * 5000,
                            y: center.y - 3000
                        };
                        valves.push(valvePos);
                        
                        // 支管：从阀门到各喷头
                        for (const s of subGroup) {
                            branchPipes.push([
                                [valvePos.x, valvePos.y],
                                [s.x, s.y]
                            ]);
                        }
                    }
                }
            }
            
            // 4. 显示统计
            showStats(zoneCenters, valveCount);
            
            // 5. 重新绘制
            drawAll();
        }
        
        function pointInPolygon(point, polygon) {
            // 简化的点在多边形内判断
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i][0], yi = polygon[i][1];
                const xj = polygon[j][0], yj = polygon[j][1];
                
                const intersect = ((yi > point[1]) !== (yj > point[1])) &&
                    (point[0] < (xj - xi) * (point[1] - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        
        function showStats(zoneCenters, valveCount) {
            const panel = document.getElementById('statsPanel');
            const content = document.getElementById('statsContent');
            
            const mainLength = calculatePathLength(mainPipe);
            let branchLength = 0;
            for (const bp of branchPipes) {
                branchLength += calculatePathLength(bp);
            }
            
            content.innerHTML = `
                <div class="stat-row">
                    <span>绿化区域</span>
                    <span>${zoneCenters.length} 个</span>
                </div>
                <div class="stat-row">
                    <span>喷头总数</span>
                    <span>${sprinklers.length} 个</span>
                </div>
                <div class="stat-row">
                    <span>阀门数量</span>
                    <span>${valveCount} 个</span>
                </div>
                <div class="stat-row">
                    <span>主管长度</span>
                    <span>${mainLength.toFixed(1)} m</span>
                </div>
                <div class="stat-row">
                    <span>支管总长</span>
                    <span>${branchLength.toFixed(1)} m</span>
                </div>
                <div class="stat-row">
                    <span>管长合计</span>
                    <span>${(mainLength + branchLength).toFixed(1)} m</span>
                </div>
                <hr style="border-color: #334155; margin: 10px 0;">
                <div class="stat-row">
                    <span>KXF-8</span>
                    <span>${sprinklers.filter(s => s.type === 'KXF-8').length} 个</span>
                </div>
                <div class="stat-row">
                    <span>KVF-10</span>
                    <span>${sprinklers.filter(s => s.type === 'KVF-10').length} 个</span>
                </div>
                <div class="stat-row">
                    <span>KVF-12</span>
                    <span>${sprinklers.filter(s => s.type === 'KVF-12').length} 个</span>
                </div>
                <div class="stat-row">
                    <span>KVF-15</span>
                    <span>${sprinklers.filter(s => s.type === 'KVF-15').length} 个</span>
                </div>
                <div class="stat-row">
                    <span>KVF-17</span>
                    <span>${sprinklers.filter(s => s.type === 'KVF-17').length} 个</span>
                </div>
            `;
            
            panel.classList.add('visible');
        }
        
        function calculatePathLength(path) {
            if (!path || path.length < 2) return 0;
            let length = 0;
            for (let i = 1; i < path.length; i++) {
                const dx = path[i][0] - path[i-1][0];
                const dy = path[i][1] - path[i-1][1];
                length += Math.sqrt(dx*dx + dy*dy);
            }
            return length / 1000; // 转换为米（假设坐标是毫米）
        }
        
        function clearAll() {
            zones = [];
            sprinklers = [];
            valves = [];
            mainPipe = null;
            branchPipes = [];
            document.getElementById('zoneList').innerHTML = '';
            document.getElementById('statsPanel').classList.remove('visible');
            document.getElementById('fileLabel').innerHTML = 
                '点击上传 DXF/DWG 图纸<br><small>或直接使用下方测试数据</small>';
            resetView();
        }
        
        function exportResults() {
            if (!mainPipe) {
                alert('请先运行管路规划算法');
                return;
            }
            
            const result = {
                project: '灌溉设计测试',
                timestamp: new Date().toISOString(),
                parameters: {
                    waterFlow: document.getElementById('waterFlow').value,
                    sourcePosition: {
                        x: document.getElementById('sourceX').value,
                        y: document.getElementById('sourceY').value
                    },
                    mainDiameter: document.getElementById('mainDia').value
                },
                statistics: {
                    sprinklerCount: sprinklers.length,
                    valveCount: valves.length,
                    zoneCount: zones.filter(z => z.zone_type === 'green').length,
                    mainPipeLength: calculatePathLength(mainPipe).toFixed(1),
                    branchPipeLength: branchPipes.reduce((sum, bp) => sum + calculatePathLength(bp), 0).toFixed(1)
                },
                sprinklers: sprinklers,
                valves: valves,
                mainPipe: mainPipe,
                branchPipes: branchPipes,
                zones: zones
            };
            
            const blob = new Blob([JSON.stringify(result, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `irrigation-design-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function loadDXF(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('fileLabel').innerHTML = 
                `📄 ${file.name}<br><small>解析中...</small>`;
            
            // 这里应该调用后端API解析DXF
            // 简化版：提示用户使用测试数据
            setTimeout(() => {
                document.getElementById('fileLabel').innerHTML = 
                    `📄 ${file.name}<br><small>暂不支持浏览器端解析，请用「加载测试数据」</small>`;
            }, 500);
        }
        
        // ============== 初始化 ==============
        resetView();
    </script>
</body>
