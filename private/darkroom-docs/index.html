        }

            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;

            border: 1px solid rgba(255,255,255,0.1);

        .doc-list {

        }

            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .doc-list li:last-child {
            border-bottom: none;
        }
        .doc-title {
            color: #fff;
            font-weight: 500;
        }
        .doc-meta {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        footer {
            text-align: center;

            color: rgba(255,255,255,0.3);
