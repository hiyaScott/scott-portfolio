<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .glitch {
            font-size: 120px;
            font-weight: 900;
            position: relative;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-5px, 2px); }
            94% { transform: translate(5px, -2px); }
        }
        .message {
            margin-top: 30px;
            font-size: 18px;
            color: rgba(255,255,255,0.5);
        }
        .hidden-form {
            margin-top: 50px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hidden-form:hover {
            opacity: 1;
        }
        .hidden-form input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .hidden-form button {
            background: rgba(0,255,255,0.2);
            border: 1px solid rgba(0,255,255,0.3);
            color: #00ffff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            margin-left: 10px;
        }
        /* 实际内容 - 默认隐藏 */
        .secret-content {
            display: none;
            width: 100%;
            min-height: 100vh;
            background: #0a0a0f;
        }
        .secret-content.visible {
            display: block;
        }
        
        /* 小黑屋样式 */
        .darkroom-header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,0,255,0.2);
        }
        .darkroom-title {
            font-size: 48px;
            font-weight: 900;
            color: #ff00ff;
            text-shadow: 0 0 20px rgba(255,0,255,0.5);
            margin-bottom: 10px;
        }
        .darkroom-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .modules-grid {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .module-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .module-card:hover {
            border-color: rgba(255,0,255,0.3);
            box-shadow: 0 0 30px rgba(255,0,255,0.1);
            transform: translateY(-5px);
        }
        .module-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .module-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }
        .module-desc {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            line-height: 1.6;
        }
        .module-card.crossborder {
            border-color: rgba(0,255,255,0.2);
        }
        .module-card.crossborder:hover {
            border-color: rgba(0,255,255,0.4);
            box-shadow: 0 0 30px rgba(0,255,255,0.1);
        }
        .footer-note {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="../favicon.ico">
</head>
<body>
    <!-- 404 伪装页面 -->
    <div id="fake404" class="fake-404">
        <div class="glitch">404</div>
        <div class="message">Page Not Found</div>
        <div class="hidden-form">
            <input type="password" id="accessKey" placeholder="Enter access key...">
            <button onclick="verifyAccess()">ENTER</button>
        </div>
    </div>

    <!-- 私密内容 -->
    <div id="secretContent" class="secret-content">
        <div class="darkroom-header">
            <div class="darkroom-title">🚪 小黑屋</div>
            <div class="darkroom-subtitle">PRIVATE ACCESS ONLY | RESTRICTED AREA</div>
        </div>

        <div class="modules-grid">
            <!-- 模块1: 小黑屋文档 -->
            <a href="./darkroom-docs/" class="module-card">
                <div class="module-icon">📁</div>
                <div class="module-title">小黑屋文档</div>
                <div class="module-desc">内部工作文档、项目笔记、私密资料存档。仅限授权人员访问。</div>
            </a>

            <!-- 模块2: 跨境电商 -->
            <a href="./cross-border-ecommerce/" class="module-card crossborder">
                <div class="module-icon">🌐</div>
                <div class="module-title">跨境电商知识库</div>
                <div class="module-desc">Shopify、独立站、流量获取、供应链、运营工具等实战指南。</div>
            </a>
        </div>

        <div class="footer-note">
            [ SYSTEM: DARKROOM // ACCESS: GRANTED // SESSION: ACTIVE ]
        </div>
    </div>

    <script>
        // 访问密钥 - 你可以修改这个
        const ACCESS_KEY = 'scott2024';
        
        // 从 URL 获取 token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('key');
        
        // 自动验证
        if (token === ACCESS_KEY) {
            showSecretContent();
        }
        
        function verifyAccess() {
            const input = document.getElementById('accessKey').value;
            if (input === ACCESS_KEY) {
                showSecretContent();
            } else {
                alert('Access Denied');
            }
        }
        
        function showSecretContent() {
            document.getElementById('fake404').style.display = 'none';
            document.getElementById('secretContent').classList.add('visible');
            document.title = '🚪 小黑屋 | Private Access';
        }
        
        // 回车键提交
        document.getElementById('accessKey')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyAccess();
        });
    </script>
</body>
</html>
